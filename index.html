 추천: 우유 한 잔 + 바나나\n\n3️⃣ 취침 1~2시간 전\n• 밤새 성장호르몬 분비를 위한 재료 준비\n• 단, 너무 많이 먹으면 소화로 깊은 잠 방해\n• 추천: 따뜻한 우유 1잔\n\n4️⃣ 각 끼니마다 분산\n• 3번에 나눠 먹는 것이 한 번에 몰아 먹는 것보다 합성 효율 높음\n• 매끼 15~20g 목표\n\n❌ 피해야 할 패턴:\n• 아침 굶기 + 저녁에 몰아 먹기\n• 점심에만 집중적으로 먹기\n• 운동 후 2시간 이상 굶기","tip":"아침 단백질이 가장 중요합니다. 시간이 없어도 우유 한 잔만 마셔도 6.4g의 단백질을 공급할 수 있어요."},"protein_excess":{"type":"answer","title":"단백질을 너무 많이 먹으면 안 좋은가요?","content":"「과유불급」이에요. 단백질도 적정량이 중요합니다.\n\n⚠️ 과다 섭취의 기준:\n체중 1kg당 2.5g 이상 섭취 시 문제 가능\n예) 30kg 아이 → 75g/일 이상이면 과다\n\n🚨 과다 섭취 시 부작용:\n\n신장 부담:\n• 단백질 대사 산물(요소 등)을 신장이 처리\n• 지속 과다 섭취 → 신장 여과 부담 증가\n• 신장 기능이 약한 아이는 특히 주의\n\n칼슘 배출 증가:\n• 단백질 과다 → 소변으로 칼슘 배출 증가\n• 역설적으로 뼈 건강에 마이너스\n\n탈수:\n• 단백질 대사 시 많은 물 필요\n• 수분 섭취 부족하면 탈수 위험\n\n✅ 그래도 적정 범위 내에서는 걱정 없어요:\n• 일반적인 음식으로 과다 섭취는 드묾\n• 보충제(단백질 파우더) 남용 시 주의\n\n💊 단백질 보충제 필요한 경우:\n• 극심한 편식 (고기·생선·달걀·유제품 모두 거부)\n• 채식주의 아이\n• 운동선수급 활동량\n→ 이 외에는 자연 식품이 우선","tip":"일반 식품으로만 먹는다면 과다 섭취 걱정은 거의 안 해도 돼요. 단백질 보충제(파우더 등)를 먹일 때만 용량을 주의하세요."},"zinc_deficiency_detail":{"type":"answer","title":"아연 결핍 — 성장에 어떤 영향을 주나요?","content":"아연은 「성장의 미네랄」로 불릴 만큼 중요합니다.\n\n🔬 아연의 역할:\n• GH-IGF1 축 직접 지원\n• DNA 합성에 필수 (세포 분열)\n• 200개 이상의 효소 기능에 관여\n• 식욕 조절 호르몬에 영향\n• 면역 기능 강화\n\n⚠️ 아연 결핍 신호 5가지:\n1. 성장 지연 (가장 중요)\n2. 식욕 감소 (\"밥을 안 먹어요\")\n3. 잦은 감기·감염\n4. 미각 이상 (\"맛이 없다\"고 함)\n5. 상처 회복 지연\n\n→ 아연 결핍 → 식욕 저하 → 영양 부족 → 성장 지연 악순환!\n\n🦪 아연 최고의 식품:\n• 굴 100g: 16~90mg (하루 권장량의 수배!)\n• 소고기 100g: 4~6mg\n• 달걀 1개: 0.6mg\n• 호박씨 30g: 2.2mg\n• 아몬드 30g: 0.9mg\n\n📊 연령별 권장량:\n• 1~3세: 3mg / 4~8세: 5mg\n• 9~13세: 8mg\n• 14~18세: 남아 11mg, 여아 9mg\n\n💊 아연 보충제 필요한 경우:\n• 극심한 편식\n• 채식주의 아이 (식물성은 흡수율 낮음)\n• 자주 아프고 식욕 없는 경우\n→ 의사 상담 후 보충 권장","tip":"아이가 밥을 안 먹는다면 아연 결핍을 의심해볼 수 있어요. 아연 혈액검사를 통해 확인 후 필요시 보충해보세요."},"iron_absorption_tips":{"type":"answer","title":"철분 흡수 높이는 방법 — 먹는 방법이 더 중요해요","content":"같은 음식이라도 어떻게 먹느냐에 따라 철분 흡수율이 크게 달라집니다.\n\n📊 철분 종류별 흡수율:\n• 헴철 (동물성): 15~35% 흡수\n  소고기, 닭고기, 생선, 굴, 조개\n• 비헴철 (식물성): 2~20% 흡수\n  시금치, 두부, 콩, 렌틸콩\n\n✅ 철분 흡수 UP:\n\n비타민C와 함께 먹기 (흡수율 2~3배 ↑):\n• 소고기볶음 + 파프리카 (비타민C 최다)\n• 시금치나물 + 귤 1개\n• 콩조림 + 방울토마토\n• 닭고기 + 브로콜리\n\n동물성 + 식물성 함께:\n• 고기와 채소를 같이 먹으면 비헴철 흡수도 증가\n• 예) 시금치 돼지고기볶음\n\n❌ 철분 흡수 DOWN:\n• 차·커피 (탄닌): 식사 1시간 전후 피하기\n• 칼슘 (우유·칼슘제): 철분과 흡수 경쟁\n  → 철분 보충제와 칼슘제는 2시간 간격\n• 피틴산 (통곡물, 콩): 흡수 방해\n  → 충분히 익혀 먹으면 감소\n\n🔍 철분 결핍 신호:\n• 빙식증 (얼음 씹고 싶음) ← 특징적!\n• 창백한 피부·점막\n• 쉽게 피로감\n• 집중력 저하\n• 손톱이 잘 부러짐","tip":"비타민C와 함께 먹는 것이 철분 흡수의 핵심이에요. 시금치에 귤, 고기에 파프리카 — 이 조합만 기억하세요!"},"vitk_vitc_bone":{"type":"answer","title":"비타민K·C가 뼈에 어떤 역할을 하나요?","content":"비타민D·칼슘만큼 알려지지 않았지만, 뼈 건강에 꼭 필요한 비타민들입니다.\n\n🦴 비타민K — 칼슘을 뼈에 단단히 붙이는 「접착제」\n\n역할:\n• 오스테오칼신 단백질 활성화\n• 오스테오칼신이 칼슘을 뼈에 단단히 결합\n• 혈관에 칼슘이 쌓이는 것 방지\n\n「녹색은 K」로 기억:\n• 시금치 100g: 450µg (하루 권장량의 450%!)\n• 케일 100g: 700µg\n• 브로콜리 100g: 100µg\n\n주의: 지용성이므로 기름과 함께 먹기\n→ 시금치나물에 참기름, 샐러드에 올리브유\n\n─────────────────────────────\n\n🍊 비타민C — 뼈와 연골의 「철근」\n\n역할:\n• 콜라겐 합성에 필수 (뼈 기질의 30%가 콜라겐)\n• 뼈라는 집의 철근(콜라겐) 역할\n• 식물성 철분 흡수율 2~3배 향상\n• 항산화 → 연골 손상 방지\n\n최고 식품:\n• 파프리카 (빨강/노랑) 100g: 150~200mg\n• 딸기 100g: 70mg\n• 귤 1개: 30~40mg\n• 브로콜리 100g: 90mg\n\n주의: 열에 약함 → 생으로 먹거나 짧게 살짝 데치기","tip":"비타민K는 녹색 채소에 많고, 비타민C는 색깔 있는 채소·과일에 많아요. \"매끼 초록 + 색깔 채소 1가지씩\"이면 두 비타민 모두 충분합니다."},"supplement_caution":{"type":"answer","title":"영양제 복용 시 주의사항 — 상호작용이 핵심이에요","content":"여러 영양제를 함께 먹을 때 순서와 조합이 중요합니다.\n\n⚠️ 함께 먹으면 안 되는 조합:\n\n철분 + 칼슘:\n• 같은 흡수 경로 → 서로 방해\n• 최소 2시간 간격으로 분리 복용\n\n철분 + 아연:\n• 과량 섭취 시 서로 흡수 방해\n• 음식으로 섭취하는 수준은 괜찮음\n• 보충제로 둘 다 복용 시 시간 간격\n\n✅ 함께 먹으면 좋은 조합:\n\n비타민D + 칼슘:\n• 함께 먹어야 흡수 극대화\n• 식후 함께 복용 권장\n\n철분 + 비타민C:\n• 흡수율 2~3배 향상\n• 항상 같이 먹기\n\n📋 보충제 복용 시기 권장:\n• 아침 식후: 비타민D + 칼슘 + 종합비타민\n• 점심 식후: 철분 + 비타민C (단독)\n• 취침 전 우유: 추가 칼슘\n\n⚠️ 절대 주의:\n• 철분 보충제: 아이 손에 닿지 않도록 보관\n• 과다 복용 시 심각한 중독 위험\n• 젤리·츄잉 형태 철분: 아이가 사탕으로 착각 가능\n\n💡 모든 보충제는 필요한 경우에만:\n• 균형 잡힌 식사가 가능하면 보충제 불필요\n• 편식 심할 때, 성장 지연 시 의사 상담 후 결정","tip":"여러 보충제를 동시에 먹이면 오히려 서로 방해할 수 있어요. 철분과 칼슘은 반드시 분리해서 먹여야 합니다."},"meal_snacks_detail":{"type":"answer","title":"성장기 아이에게 좋은 간식 TOP 10","content":"간식도 성장을 도울 수 있어요. 이것들을 활용해보세요.\n\n🏆 성장 최강 간식:\n\n1위. 우유 한 잔 (칼슘 220mg + 단백질 6.4g)\n2위. 그릭요거트 (단백질 10g + 칼슘)\n3위. 삶은 달걀 1~2개 (완전 단백질 6g×2)\n4위. 치즈 슬라이스 (칼슘 + 단백질)\n5위. 견과류 한 줌 (아연 + 마그네슘)\n\n✅ 과일 간식 추천:\n• 키위 1개: 비타민C 70mg (흡수 도움)\n• 딸기 10개: 비타민C 60mg\n• 바나나 1개: 마그네슘 + 에너지\n\n✅ 조합 간식:\n• 우유 + 바나나 스무디\n• 그릭요거트 + 딸기\n• 통밀 크래커 + 치즈\n• 삶은 달걀 + 방울토마토\n\n❌ 피해야 할 간식:\n• 탄산음료·에너지드링크 (칼슘 배출 + 카페인)\n• 사탕·캔디 (혈당 스파이크 → GH 억제)\n• 과자·튀김류 (영양 없고 트랜스지방)\n• 가공육 소시지 (나트륨 과다)\n\n⏰ 간식 타이밍:\n• 학교 후 오후 3~4시: 운동·놀이 전 에너지 보충\n• 취침 1~2시간 전: 우유 1잔 (밤 성장호르몬 재료)","tip":"간식도 성장의 기회예요. 과자 대신 삶은 달걀 하나, 탄산 대신 우유 한 잔으로 바꾸는 것만으로도 차이가 생깁니다."},"meal_eating_out":{"type":"answer","title":"외식할 때 어떤 메뉴를 선택하면 좋나요?","content":"외식도 현명하게 선택하면 성장에 도움이 됩니다.\n\n🥇 추천 메뉴:\n\n한식 (최고!):\n• 불고기·삼겹살 + 채소 → 단백질 + 철분\n• 삼계탕·닭볶음탕 → 단백질 + 콜라겐\n• 생선구이 + 미역국 → 오메가3 + 요오드\n• 콩비지·된장찌개 → 식물성 단백질 + 이소플라본\n\n일식:\n• 연어 덮밥 → 오메가3 + 단백질\n• 참치 초밥 → 양질의 단백질\n• 미소 된장국 → 장 건강\n\n양식:\n• 스테이크 + 샐러드 → 단백질 + 채소 밸런스\n• 오믈렛 → 달걀 단백질\n\n⚠️ 주의가 필요한 메뉴:\n• 중식: 염분 과다, 나트륨↑ → 칼슘 배출\n• 패스트푸드: 주 1회 이하로\n• 라면: 나트륨 과다, 영양 불균형\n\n💡 외식 시 팁:\n• 음식 도착 전 물 한 잔 마시기 (과식 방지)\n• 채소 반찬부터 먼저 먹기 (혈당 안정화)\n• 국물 적게 먹기 (나트륨 줄이기)\n• 다음 날 채소·물 섭취 늘리기 (보상)","tip":"외식 다음 날은 채소를 평소보다 많이, 탄산 대신 물을 많이 마셔보세요. 하루의 균형이 틀어진 걸 다음 날 보완하는 「주간 균형」이 중요해요."},"meal_active_child":{"type":"answer","title":"운동 많이 하는 아이 — 식단을 다르게 해야 하나요?","content":"운동량이 많은 아이는 일반 아이보다 더 많은 영양이 필요합니다.\n\n📊 운동하는 아이 vs 일반 아이 차이:\n\n칼로리:\n• 일반 아이 + 300~500kcal 추가\n• 하루 1~2시간 이상 운동 시\n\n단백질:\n• 일반: 0.95g/kg → 운동: 1.2~1.7g/kg\n\n탄수화물:\n• 운동 에너지원으로 충분히\n• 흰쌀밥·빵 OK (운동 시에는 탄수화물 에너지 필요)\n\n⭐ 운동 후 30분~1시간이 핵심:\n「운동 후 골든타임」에 이것들 주세요:\n• 탄수화물 + 단백질 조합\n• 예시: 바나나 1개 + 우유 200mL\n• 예시: 삶은 달걀 2개 + 과일\n• 예시: 참치 주먹밥\n\n✅ 운동하는 아이 하루 식단 예시:\n• 아침: 달걀 2개 + 우유 + 통밀빵\n• 점심: 닭고기 덮밥 + 야채 충분히\n• 운동 후 간식: 바나나 + 우유\n• 저녁: 생선구이 + 밥 + 나물\n• 취침 전: 우유 1잔\n\n⚠️ 주의:\n• 운동 중 수분 보충 필수 (목 마르기 전에)\n• 과도한 단백질 보충제는 불필요 (자연식품으로 충분)","tip":"축구·수영·태권도 등 활발하게 운동하는 아이라면 점심 도시락에 고기 반찬을 한 가지 더 추가하는 것만으로도 큰 도움이 됩니다."},"meal_short_child":{"type":"answer","title":"저신장 아이 — 특별히 신경 써야 할 영양소","content":"저신장 아이는 일반 아이보다 몇 가지 영양소를 더 신경 써야 합니다.\n\n🎯 저신장 아이 우선 영양소:\n\n1위. 단백질 (체중당 1.2g 이상)\n• 성장호르몬의 재료\n• 매 끼니 단백질 식품 필수\n\n2위. 칼슘 (1,000~1,300mg)\n• 뼈의 원재료\n• 우유 하루 3잔 이상 목표\n\n3위. 비타민D (800~1,000 IU)\n• 칼슘 흡수율 결정\n• 보충제 필요한 경우 많음\n\n4위. 아연 (권장량 상한 내)\n• IGF-1 생성에 필요\n• 식욕 저하 시 결핍 확인\n\n5위. 철분 (특히 여아)\n• 빈혈 시 성장 방해\n• 비타민C와 함께 섭취\n\n📋 아침 식사 절대 안 거르기:\n• 밤새 분비된 성장호르몬의 재료 공급\n• 아침 굶으면 호르몬이 근육을 분해해 에너지로 사용\n\n🥛 저체중 + 저신장 아이:\n• 영양 밀도 높은 식품 추가\n  → 견과류, 아보카도, 올리브유\n• 식사 횟수 늘리기 (하루 5~6회)\n• 아연 결핍 여부 확인\n\n💊 영양제 점검:\n혈액검사로 확인 후 필요한 것만:\n• 비타민D 수치 확인\n• 아연, 철분 상태 확인","tip":"저신장 아이에게 \"많이 먹어야 한다\" 강요보다 \"좋은 것을 골라 먹는다\"는 방식이 더 효과적이에요. 아침 식사 꼭 챙기는 것이 가장 중요합니다."},"acanthosis_explain":{"type":"answer","title":"흑색극세포증 — 때가 아니라 인슐린 저항성 신호예요","recommend":true,"content":"목 뒤, 겨드랑이, 사타구니가 까맣게 두꺼워지는 「흑색극세포증(Acanthosis Nigricans)」은 때가 아닙니다.\n\n🔬 원인:\n혈중 인슐린이 높아지면 (고인슐린혈증)\n→ 피부 세포(각질형성세포)를 과도하게 자극\n→ 색소 침착 + 피부 두꺼워짐\n→ 까맣고 벨벳 같은 질감의 피부\n\n✅ 이것이 의미하는 것:\n• 인슐린 저항성 존재 = 대사증후군·당뇨 전 단계\n• 소아 비만에서 매우 흔함 (비만 청소년 70% 이상 동반)\n• 아무리 씻어도 없어지지 않아요 (피부 문제가 아니라 대사 문제)\n\n📍 주로 나타나는 부위:\n• 목 뒤쪽 (가장 흔함)\n• 겨드랑이\n• 사타구니\n• 손가락 관절 (드물지만 있음)\n\n💡 관리:\n• 흑색극세포증 자체 치료보다 인슐린 저항성 개선이 목표\n• 체중 5~10% 감량 + 운동 + 식이 개선\n• 4~6개월 내 인슐린 저항성 개선되면 피부도 서서히 개선\n• 심한 경우 메트포르민 처방 가능","tip":"흑색극세포증은 몸이 '인슐린 위험 신호'를 피부로 표현한 거예요. 발견 즉시 소아내분비과에서 인슐린 저항성 검사(HOMA-IR)를 받아보세요."},"white_coat_hypertension":{"type":"answer","title":"백의 고혈압 — 병원에서만 혈압이 높게 나와요","content":"의사의 흰 가운(백의)을 보면 긴장해서 병원에서만 혈압이 높게 나오는 현상입니다.\n\n📊 얼마나 흔한가요?\n• 소아청소년의 30~40%가 해당\n• 생각보다 매우 흔해요\n\n✅ 진짜 고혈압과 구별 방법:\n• 가정혈압 측정: 집에서 편안한 상태로 아침·저녁 2회씩 1주일 측정\n• 24시간 활동혈압 측정(ABPM): 가장 정확, 일상생활 중 자동 측정\n\n📏 소아청소년 고혈압 기준:\n• 단순한 수치 기준 없음\n• 나이·성별·키에 따른 백분위 기준\n• 95백분위 이상이면 고혈압\n\n🏥 진짜 고혈압이면:\n• 원인 탐색: 비만, 신장 질환, 부신 종양 등\n• 비만이 원인인 경우가 가장 흔함\n• 체중 감량 5~10%로 혈압 10~15mmHg 하강 가능\n• 생활습관 개선으로도 상당 부분 조절\n\n💡 가정에서 혈압 재는 팁:\n• 5분 안정 후 측정\n• 상완(팔 위쪽) 크기에 맞는 커프 사용\n• 같은 팔, 같은 자세로 일관되게","tip":"병원에서 한 번 높게 나왔다고 바로 고혈압 진단하지 않아요. 가정혈압을 일주일 기록해서 의사에게 보여주세요."},"dyslipidemia_explain":{"type":"answer","title":"이상지질혈증 — 콜레스테롤과 중성지방이 비정상인 상태","content":"혈액 속 콜레스테롤과 중성지방 수치가 비정상인 상태를 이상지질혈증이라고 합니다.\n\n📊 진단 기준:\n• 총 콜레스테롤 ≥200 mg/dL\n• LDL(나쁜 콜레스테롤) ≥130 mg/dL\n• HDL(좋은 콜레스테롤) 남아 <40, 여아 <50 mg/dL\n• 중성지방 ≥130 mg/dL\n\n⚠️ 왜 무서운가요?\n• 비만 아이의 40~50%가 이상지질혈증\n• 증상이 없어서 모르고 지나침\n• 10대에 이미 혈관 내 지방 축적(동맥경화 초기) 시작\n• 방치하면 20~30대에 심근경색·뇌졸중 위험\n\n✅ 치료 전략:\n1. 생활습관 개선 우선 (6~12개월)\n   • 체중 10% 감량 → LDL 10~15% 감소, 중성지방 30% 감소\n   • 탄산음료 → 물 교체 (중성지방 2주 내 반응)\n2. 약물 치료 (생활습관 실패 시)\n   • 스타틴: 10세 이상 사용 가능\n   • LDL 30~50% 감소 효과\n   • 장기 안전성 확인됨\n\n💡 중성지방 가장 빠르게 낮추는 법:\n탄산음료를 물로 바꾸면 2주 내 반응!","tip":"이상지질혈증은 증상이 없어요. 비만한 아이라면 반드시 혈액검사로 확인하세요. 초등학생 때 관리 시작하면 성인 심혈관 질환 위험을 크게 낮출 수 있습니다."},"metabolic_cure":{"type":"answer","title":"대사증후군, 완치될 수 있나요?","content":"「완치」보다는 「정상화」와 「평생 관리」의 개념으로 접근해야 합니다.\n\n✅ 좋은 소식:\n청소년기에 적극 관리하면 진단 기준에서 완전히 벗어날 수 있습니다!\n\n📊 정상화 가능한 조건:\n• 체중 7~10% 감량\n• 규칙적인 운동 (주 5회, 30~60분)\n• 균형 잡힌 식단 (특히 정제 탄수화물·당분 줄이기)\n• 충분한 수면\n\n📈 단계별 개선:\n1단계 (2~4주): 중성지방 개선 (탄산음료 끊기만 해도)\n2단계 (1~3개월): 혈당·인슐린 저항성 개선\n3단계 (3~6개월): 혈압·콜레스테롤 개선\n4단계 (6~12개월): 체중 감량으로 전반적 정상화\n\n🎯 최종 목표:\n진단 기준에서 벗어나 정상 대사 상태 회복\n→ 성인이 되어 심혈관 질환 위험을 처음부터 없던 사람 수준으로 낮추는 것\n\n⚠️ 주의사항:\n• 생활습관을 다시 예전으로 돌리면 재발 가능\n• 「완치」 후에도 건강한 생활습관 유지 필요\n• 1~2년에 한 번 추적 검사 권장","tip":"청소년기의 대사증후군은 어른보다 훨씬 빠르게 개선돼요. 지금 시작하면 성인 만성질환을 예방할 수 있습니다."},"diabetes_chronic_complications":{"type":"answer","title":"소아청소년 당뇨의 만성 합병증","recommend":true,"content":"당뇨병 만성 합병증은 수년에 걸쳐 서서히 진행되며, 소아기 발병은 더욱 심각합니다.\n\n⚠️ 만성 합병증 종류:\n\n🫀 심혈관 질환 (가장 위험)\n• 심근경색 위험 5배\n• 뇌졸중 위험 3배\n• 소아기 발병 시 20~30대에 이미 위험 시작\n\n🫘 신장 질환 (당뇨 신증)\n• 신부전 2.7배\n• 투석 필요해질 수 있음\n\n👁️ 눈 질환 (당뇨 망막병증)\n• 실명 원인 1위\n• 어린이 발병 시 더 오래 노출\n\n🦵 신경 합병증\n• 손발 저림, 통증\n• 감각 저하\n\n🦶 발 궤양\n• 상처 회복 지연 → 감염 → 절단\n\n✅ 합병증 예방 핵심:\n• HbA1c 7% 미만 유지\n• 정기 안과·신장·발 검사\n• 혈압·콜레스테롤 관리\n• 금연 (흡연은 합병증 위험 폭발적 증가)\n\n📅 추적 검사 일정:\n• 매 3개월: HbA1c\n• 매년: 안과 검진, 신장 기능, 신경 검사","tip":"소아기에 발병하면 합병증에 더 오래 노출됩니다. 혈당 관리가 지금 당장 나쁘게 느껴지지 않더라도, 10~20년 후를 위해 꼭 철저하게 관리해야 해요."},"obesity_height_myth":{"type":"answer","title":"\"살 찌면 키로 간다\" — 이건 위험한 오해예요!","content":"어른들 사이에 퍼진 이 말은 의학적으로 틀렸습니다. 오히려 반대예요.\n\n❌ 왜 틀린 말인가요?\n\n비만 → 체지방 ↑ → 렙틴·인슐린 ↑ → 성호르몬 분비 촉진\n→ 성조숙증 발생 가능\n→ 성장판이 일찍 닫힘\n→ 최종 키가 더 작아짐!\n\n📊 실제 연구 결과:\n• 비만 + 성조숙증 동반 시: 유전 목표 키보다 5~8cm 작아질 수 있음\n• 비만만 있어도: 여아 2.3cm, 남아 3.1cm 덜 큼 (스웨덴 대규모 연구)\n\n초등 저학년에는 또래보다 5~8cm 크게 보이는 경우가 있지만\n→ 이건 뼈나이가 빠른 것\n→ 성장판이 일찍 닫혀서 중학교 이후 오히려 최단신이 될 수 있음\n\n✅ 올바른 이해:\n• 적정 체중 유지 = 성장판 보호\n• 체중 관리 = 키 성장 관리\n• 살이 키로 가는 게 아니라, 살이 키를 막는다","tip":"우리 부모님 세대의 경험담이 아이에게는 독이 될 수 있어요. 지금은 과식보다 균형 잡힌 영양이 훨씬 중요합니다."},"obesity_longterm":{"type":"answer","title":"소아비만 → 성인비만으로 이어지나요?","content":"안타깝게도 이어지는 경우가 많습니다.\n\n📊 연구 통계:\n• 소아비만의 75~80%: 성인비만으로 이어짐\n• 고도비만 아이: 절반 이상이 성인비만 지속\n• 사춘기 비만은 어린 시절 비만보다 더 지속성 높음\n\n🔬 왜 이어지나요?\n\n1. 지방세포 수가 결정되는 시기 문제:\n• 사춘기에 지방세포 수가 고정됨\n• 이때 지방세포가 많이 만들어지면\n• 평생 살찌기 쉬운 체질\n\n2. 식습관·생활습관의 지속:\n• 어릴 때 형성된 습관은 성인이 되어도 유지\n• 뇌의 포만 중추 역치가 높게 설정\n\n3. 대사 경로의 프로그래밍:\n• 비만 상태가 오래 지속되면 인슐린 저항성·지방 축적 패턴이 고착\n\n✅ 그러나 청소년기 개입은 효과적:\n• 아직 지방세포 수가 확정되기 전에 개입 가능\n• 생활습관을 바꾸면 되돌릴 수 있음\n• 성인이 되기 전에 정상 체중 달성 → 성인비만 위험 크게 감소","tip":"중학교 이전에 관리를 시작하는 것이 결정적으로 중요해요. 사춘기가 오면 지방세포 수가 고정되기 시작합니다."},"eating_speed_obesity":{"type":"answer","title":"빨리 먹는 습관 — 비만의 숨은 원인이에요","content":"빨리 먹는 습관이 비만을 만드는 것은 과학적으로 증명됩니다.\n\n🧠 포만감의 작동 원리:\n• 위장에 음식이 들어오면 → 포만 호르몬(렙틴, CCK, PYY) 분비\n• 이 신호가 뇌(시상하부)에 도달하는 시간: 최소 15~20분\n• 20분보다 빨리 먹으면 → 이미 과식 후에 배부름을 느낌\n\n📊 연구 결과:\n• 빨리 먹는 아이: 천천히 먹는 아이보다 비만 위험 1.5~2배\n• 식사 시간 5분 미만: 과체중 위험 3배\n\n✅ 천천히 먹기 실천법:\n\n1. 최소 20분 식사 목표:\n• 타이머 놓고 20분 이상 먹기\n• 밥 중간에 숟가락 내려놓기 습관\n\n2. 꼭꼭 씹기 (20~30회):\n• 소화에도 도움\n• 포만 호르몬 분비 시간 확보\n\n3. 식사 중 스크린 OFF:\n• TV·스마트폰 보며 먹으면 포만감 인식 방해\n• 집중해서 맛을 느끼며 먹기\n\n4. 작은 그릇 사용:\n• 시각적 포만감 증가\n• 반자동적으로 적게 담게 됨","tip":"식사 시간을 타이머로 재보세요. 10분이 안 된다면 위험 신호예요. 20분을 목표로 아이와 함께 「느리게 먹기 챌린지」를 해보는 건 어떨까요?"},"obesity_prevention_timing":{"type":"answer","title":"비만 예방 — 언제부터 시작해야 하나요?","content":"임신 중 엄마의 건강 관리부터 시작됩니다.\n\n⏰ 생애주기별 비만 예방 골든타임:\n\n🤰 임신기:\n• 엄마의 과체중·임신성 당뇨 → 태아의 대사 이상 위험\n• 임신 중 적절한 체중 증가 (13~18kg)\n• 모유 수유가 소아비만 예방에 도움\n\n👶 생후 0~2세 (1차 골든타임):\n• 지방세포 수 증식 시작\n• 음식 다양성 노출 시기\n• 주스·단 음료 절대 금지\n• 이 시기 형성된 맛 선호도가 평생 지속\n\n🧒 5~7세 「지방 반등기」(2차 골든타임):\n• Adiposity Rebound: 체지방이 한 번 더 증가하는 생리적 시기\n• 이 시기에 반등이 빠를수록 성인비만 위험↑\n• 신체활동 줄어드는 시기 (유치원→초등) → 주의 필요\n\n🎒 학령기 (8~12세):\n• 학업 스트레스 → 감정적 섭식 패턴 시작\n• 디지털 기기 사용 증가 → 신체활동 감소\n• 학교 급식 + 가정 식사 병행 관리 필요\n\n📌 핵심:\n• 비만이 생기기 전에 예방이 훨씬 쉬움\n• 치료보다 예방의 효율이 10배","tip":"5~7세가 비만 예방의 숨은 골든타임이에요. 이 시기에 신체활동 습관과 건강한 식이 패턴을 잡아두면 평생의 건강이 달라집니다."}},
"ja":{"start":{"type":"question","text":"こんにちは！サムスンジャラダ小児内分泌科の成長・健康相談チャットボットです。何についてお知りになりたいですか？","options":[{"text":"子どもの身長・成長が心配です","next":"growth_main"},{"text":"成長ホルモン治療について知りたい","next":"growth_hormone"},{"text":"性早熟（思春期が早い）が心配です","next":"puberty_main"},{"text":"肥満・過体重が心配です","next":"obesity_main"},{"text":"血糖・脂肪肝など代謝の問題があります","next":"metabolism_main"},{"text":"成長に良い栄養・食事が知りたい","next":"nutrition_main"}]},"growth_main":{"type":"question","text":"お子さんは何歳ですか？","options":[{"text":"0〜3歳（乳幼児）","next":"growth_0_3"},{"text":"4〜8歳（幼稚園・小学校低学年）","next":"growth_4_8"},{"text":"9〜13歳（小学校高学年・中学生）","next":"growth_9_13"},{"text":"14歳以上（中学生以上）","next":"growth_14plus"},{"text":"急に成長が遅くなった気がする","next":"growth_slowdown"},{"text":"骨年齢検査について知りたい","next":"growth_boneage"}]},"growth_0_3":{"type":"question","text":"0〜3歳の成長状況を教えてください。","options":[{"text":"小さく生まれて追いついていない","next":"ans_sga"},{"text":"普通に生まれたが、その後成長が遅れている","next":"ans_growth_0_3_normal"},{"text":"両親が小柄なので、子どもも小さい","next":"ans_familial_short"},{"text":"どのくらい小さければ検査が必要？","next":"ans_growth_check_needed"}]},"growth_4_8":{"type":"question","text":"4〜8歳の成長状況はいかがですか？","options":[{"text":"両親が小柄","next":"ans_familial_short"},{"text":"同年齢の中で最も低い3〜5%","next":"ans_growth_check_needed"},{"text":"年間4cm未満しか育っていない","next":"growth_slowdown"},{"text":"どんな検査が必要？","next":"ans_growth_check_needed"}]},"growth_9_13":{"type":"question","text":"9〜13歳の状況はいかがですか？","options":[{"text":"思春期がまだ来ておらず、身長が低い","next":"ans_9_13_no_puberty"},{"text":"思春期が早く来て、最終身長が心配","next":"ans_9_13_early_puberty"},{"text":"思春期が中後半だが治療チャンスは？","next":"ans_9_13_late_puberty"},{"text":"急に成長が遅くなった","next":"growth_slowdown"}]},"growth_hormone":{"type":"question","text":"成長ホルモン治療について何を知りたいですか？","options":[{"text":"うちの子は治療対象ですか？","next":"gh_eligible"},{"text":"どのくらい効果がありますか？","next":"gh_effect"},{"text":"費用と医療保険は？","next":"gh_cost"},{"text":"副作用はありますか？","next":"gh_safety"},{"text":"注射の方法は？","next":"gh_injection"},{"text":"いつ開始・終了しますか？","next":"gh_timing"}]},"gh_eligible":{"type":"question","text":"お子さんの診断または状況を教えてください。","options":[{"text":"成長ホルモン欠乏症と診断された","next":"ans_gh_deficiency"},{"text":"ターナー症候群（女の子、染色体異常）","next":"ans_gh_turner"},{"text":"低出生体重で追いついていない（SGA）","next":"ans_gh_sga"},{"text":"検査は全て正常でただ低身長（特発性低身長）","next":"ans_gh_iss"},{"text":"プラダーウィリー/ヌーナン/慢性腎不全","next":"ans_gh_other"},{"text":"まだ検査を受けていない","next":"ans_gh_no_test"}]},"puberty_main":{"type":"question","text":"性早熟（思春期早発）についてのご心配は？","options":[{"text":"娘の胸が発達してきた","next":"puberty_girl"},{"text":"息子の睾丸が大きくなってきた","next":"puberty_boy"},{"text":"体臭・陰毛・ニキビのみ（胸・睾丸変化なし）","next":"ans_false_puberty"},{"text":"急に身長が伸び始めた","next":"ans_rapid_growth"},{"text":"GnRH治療（性早熟治療）について知りたい","next":"gnrh_treatment"},{"text":"GnRH+成長ホルモン併用療法を知りたい","next":"gnrh_gh_combo"}]},"puberty_girl":{"type":"question","text":"娘さんは何歳ですか？","options":[{"text":"8歳の誕生日前（性早熟の基準）","next":"puberty_girl_under8"},{"text":"8〜10歳の間","next":"puberty_girl_8_10"},{"text":"10歳以降でちょうど発育が始まった","next":"puberty_girl_normal"},{"text":"乳房発育か脂肪かわからない","next":"puberty_girl_unsure"}]},"puberty_girl_8_10":{"type":"question","text":"8〜10歳の乳房発育、どんな状況ですか？","options":[{"text":"最近気づいた","next":"puberty_girl_new"},{"text":"3〜6ヶ月で急に大きくなった","next":"puberty_girl_progress"},{"text":"6ヶ月以上あるがほとんど変化なし","next":"puberty_girl_stable"},{"text":"乳房なのか脂肪なのかわからない","next":"puberty_girl_unsure"}]},"puberty_boy":{"type":"question","text":"息子さんに何か変化がありますか？","options":[{"text":"睾丸が大きくなってきた（9歳未満）","next":"ans_boy_precocious"},{"text":"声変わり・急激な身長増加","next":"ans_boy_signs"},{"text":"陰毛・体臭のみ、睾丸変化なし","next":"ans_boy_false_puberty"},{"text":"思春期が遅い（14歳以上）","next":"ans_boy_delayed"}]},"obesity_main":{"type":"question","text":"肥満について何がご心配ですか？","options":[{"text":"肥満の診断基準を知りたい","next":"obesity_diagnosis"},{"text":"肥胖は身長に影響しますか？","next":"obesity_height"},{"text":"肥満が性早熟を引き起こしますか？","next":"obesity_puberty"},{"text":"首の後ろ・脇が黒くなった","next":"ans_acanthosis"},{"text":"肥満管理方法について","next":"obesity_management"}]},"obesity_management":{"type":"question","text":"肥満管理についてどの点が知りたいですか？","options":[{"text":"食事療法のアドバイスが欲しい","next":"ans_obesity_diet"},{"text":"運動方法は？","next":"ans_obesity_exercise"},{"text":"全体的な生活習慣改善について","next":"ans_obesity_lifestyle"},{"text":"薬物療法が必要な場合は？","next":"ans_obesity_medicine"}]},"metabolism_main":{"type":"question","text":"代謝の問題についてどの部分が心配ですか？","options":[{"text":"血糖が高いと言われた（糖尿病前段階）","next":"metabolism_prediabetes"},{"text":"コレステロールが高い","next":"metabolism_lipid"},{"text":"脂肪肝がある","next":"metabolism_fatty_liver"},{"text":"インスリン抵抗性指標（HOMA-IR、SPISE）について","next":"metabolism_spise"}]},"nutrition_main":{"type":"question","text":"成長に良い栄養についてどの点を知りたいですか？","options":[{"text":"ビタミンD・カルシウム・マグネシウムについて","next":"nutrition_vitamin_d"},{"text":"タンパク質は成長にどう影響しますか？","next":"nutrition_protein"},{"text":"亜鉛・鉄分は重要ですか？","next":"nutrition_zinc_iron"},{"text":"偏食の子どもへの対処法","next":"nutrition_picky"},{"text":"身長を伸ばす実践的な食事","next":"nutrition_practical"}]},"ans_sga":{"type":"answer","title":"低出生体重児（SGA）——早期発見が大切です","recommend":true,"content":"在胎週数に比べて体重や身長が3パーセンタイル未満で生まれたお子さんを「低出生体重児（SGA）」といいます。\n\n✅ 良い知らせ：85〜90%のお子さんは生後2年以内に正常範囲に追いつきます。\n\n⚠️ 注意が必要な場合：\n• 4歳時点でも身長が3パーセンタイル未満（約10〜15%）\n• このお子さんは4歳から健康保険適用の成長ホルモン治療が可能です\n\n📊 治療効果：平均5〜7cm増加\n• 早く始めるほど効果大\n• 思春期以降に始めると効果が限られます\n\n📌 確認すること：\n• 3ヶ月ごとに身長を測り、成長速度を記録する\n• 4歳まで自然追いつきを見守り、必要なら治療開始","tip":"4歳前に自然に追いつければ理想的ですが、追いつかない場合は4歳になったらすぐに小児内分泌科を受診しましょう。"},"ans_growth_0_3_normal":{"type":"answer","title":"正常出生後の成長遅延——まず原因を探しましょう","recommend":true,"content":"正常に生まれたのに成長が遅れている場合の主な原因をご説明します。\n\n1️⃣ 甲状腺機能低下症\n• 最も多い内分泌疾患\n• 症状：活動量の低下、皮膚乾燥、便秘、元気がない\n• 簡単な血液検査で確認でき、治療で成長が正常化\n\n2️⃣ 成長ホルモン欠乏症\n• 乳児期は低血糖や遷延性黄疸として現れることも\n• 顔が丸く、ぽっちゃりして見える場合\n• IGF-1血液検査でスクリーニング可能\n\n3️⃣ 栄養不足\n• 母乳不足、偏食など\n• 体重も低い場合は栄養の問題が疑われます\n\n4️⃣ 慢性疾患\n• 先天性心疾患、腎疾患、消化器疾患など\n• 頻繁な風邪、授乳困難、嘔吐を伴う場合\n\n📌 受診時の検査：甲状腺機能、IGF-1、一般血液検査、骨年齢X線","tip":"0〜3歳は最も成長が速い時期です。この時期に問題が見つかれば、十分に追いつくことができます。"},"ans_familial_short":{"type":"answer","title":"家族性低身長——正確な評価が治療より先です","content":"両親が共に低身長の場合、お子さんも低身長になりやすく、これを「家族性低身長」といいます。\n\n📌 家族性低身長の特徴：\n• 成長速度は正常（年間5〜6cm）\n• 骨年齢は実際の年齢と一致\n• 成長曲線上で低いパーセンタイルを安定して維持\n• 両親の少なくとも一方が平均より低身長\n\n🧮 遺伝的目標身長（MPH）の計算：\n• 男の子：（父の身長＋母の身長＋13）÷2　予測範囲±5〜10cm\n• 女の子：（父の身長＋母の身長－13）÷2　予測範囲±5〜10cm\n\n例）父170cm、母158cm\n→ 息子の予測：(170+158+13)/2=170.5cm（実際の範囲160〜180cm）\n→ 娘の予測：(170+158-13)/2=157.5cm（実際の範囲147〜167cm）\n\n⚠️ 家族性低身長でも受診が必要な場合：\n• 現在の身長が予測より10cm以上低い\n• 成長速度が突然落ちた\n• 年間4cm未満の成長\n\n✅ 単純な家族性低身長は治療不要で、健康的な生活習慣で十分です。","tip":"遺伝的なものか別の原因があるかは、骨年齢検査とIGF-1検査で確認できます。"},"ans_growth_check_needed":{"type":"answer","title":"専門的な検査をおすすめします","recommend":true,"content":"両親の身長は正常なのにお子さんが低身長の場合、または予測より大幅に低い場合は、系統的な評価が必要です。\n\n🔬 推奨検査：\n\n1. 骨年齢X線 ⭐（最重要）\n• 左手のX線1枚、約5分、完全無痛\n• 成長ポテンシャルの把握＋最終身長の予測\n• 親の身長計算式より2倍正確（誤差±3〜5cm vs ±8〜10cm）\n\n2. IGF-1血液検査\n• 成長ホルモン機能のスクリーニング\n• 採血1回（空腹不要）\n\n3. 甲状腺機能（TSH、遊離T4）\n• 甲状腺機能低下症は成長遅延の一般的な原因\n\n4. 一般血液検査\n• 貧血、炎症、肝腎機能の確認\n\n5. 成長ホルモン負荷試験（必要時）\n• IGF-1が低いか成長速度異常の場合に追加\n• 約2〜3時間、採血4〜6回（留置針で1回のみ穿刺）\n• ピーク値10ng/mL未満で欠乏症を疑います","tip":"原因を早く見つけるほど治療効果が高まります。成長板がまだ開いている今、6ヶ月以上様子見せずに専門医を受診しましょう。"},"ans_9_13_no_puberty":{"type":"answer","title":"思春期前の段階——今が治療のゴールデンタイムです","recommend":true,"content":"思春期がまだ始まっていない今が、成長治療のゴールデンタイムです！\n\n🌟 思春期前の方が良い理由：\n• 成長板がまだ十分に開いています\n• 成長ホルモン治療の効果が思春期開始後の約2倍\n• 2年以上治療を続けると効果がさらに大きくなります\n\n📊 骨年齢で残りの成長ポテンシャルを確認：\n• 女の子で骨年齢11歳未満：十分な治療チャンス\n• 男の子で骨年齢12歳未満：十分な治療チャンス\n\n✅ おすすめの検査：\n1. 骨年齢X線（成長ポテンシャルの評価）\n2. IGF-1血液検査\n3. 成長ホルモン負荷試験（必要時）\n\n💰 保険適用条件を満たす場合：\n• 自己負担：月約21〜36万ウォン（薬代の30%）\n• 治療効果：疾患によって5〜13cmの改善が可能","tip":"思春期が始まると成長板は急速に閉じます。今受診すれば、もっと多くの選択肢があります。"},"ans_9_13_early_puberty":{"type":"answer","title":"早発思春期＋身長の心配——2つを同時に評価しましょう","recommend":true,"content":"思春期が早く来たということは、「急成長期」が前倒しになり、成長板も早く閉じることを意味します。\n\n⚠️ 思春期早発症のパラドックス：\n• 初期：同年代より5〜8cm高く、よく育っているように見える\n• 後期：成長板が早期閉鎖→最終身長が遺伝的予測より5〜15cm低くなることも\n\n📊 研究結果（欧州の長期追跡）：\n• 未治療の思春期早発症：女の子は遺伝的目標身長より平均10cm低い\n• 男の子は平均20cm低い\n\n🔍 今必要な検査：\n1. 骨年齢X線：成長板がどれだけ残っているか\n2. GnRH負荷試験：真性思春期早発症かどうか\n3. 成長ホルモン検査：同時にGHの状態を確認\n\n💡 治療の選択肢：\n• GnRH治療（思春期抑制）で思春期の進行を一時的に止める\n• 必要に応じて成長ホルモンを併用→さらに4〜6cmのアップが可能","tip":"思春期が早く来ても、適切なタイミングで治療すれば最終身長を守れます。今すぐ小児内分泌科へ。"},"ans_9_13_late_puberty":{"type":"answer","title":"思春期中後期——残りのチャンスを正確に把握しましょう","recommend":true,"content":"思春期中後期には、骨年齢X線でどれだけ治療のチャンスが残っているかを確認することが先決です。\n\n📊 骨年齢別の治療可能性：\n• 女の子で骨年齢11歳未満：治療効果十分\n• 女の子で骨年齢11〜12歳：効果あるが限定的\n• 女の子で骨年齢12〜13歳：効果わずか（保険適用も終了間近）\n• 女の子で骨年齢14歳以上：治療の意義なし\n\n• 男の子で骨年齢12歳未満：治療効果十分\n• 男の子で骨年齢12〜14歳：限定的\n• 男の子で骨年齢16歳以上：保険適用終了\n\n⏱️ タイミングが重要：\n初経後は約5〜7cmしか伸びませんが、年間2〜3cmと急減速します。\n初経前の1〜2年が急成長期最後のチャンスです。\n\n✅ 今できること：\n• 骨年齢＋最終身長予測を確認\n• 成長板がまだ開いていたら、すぐに治療開始","tip":"あきらめないでください。成長板が開いている限り、数ヶ月の治療でも意味があります。"},"growth_14plus":{"type":"answer","title":"14歳以上——まず成長板の状態を確認しましょう","recommend":true,"content":"14歳以上は成長板が徐々に閉じていく時期ですが、まだ間に合う可能性もあります。\n\n📊 成長板の状態確認基準：\n• 女の子で骨年齢14〜15歳：成長板はほぼ閉鎖、治療効果はほぼなし\n• 男の子で骨年齢15〜17歳：ほぼ閉鎖\n• 保険適用は女の子が12歳の誕生日前日まで、男の子が13歳の誕生日前日まで\n\n🔍 それでも確認すべきこと：\n1. 骨年齢X線：実際の骨の年齢を確認（暦年齢と異なる場合があります）\n2. 思春期が遅めに始まった場合、骨年齢が暦年齢より低いことも\n3. 特に男の子14歳では、まだ治療効果がある場合も\n\n💡 一つの希望：\n「体質性成長遅延」（遅咲きタイプ）の場合\n• 骨年齢が暦年齢より2〜4年低い\n• 高校生、大学生になっても成長が続くこともある\n• お父さん・お母さんも遅く成長した経歴がある場合に可能性が高い","tip":"あきらめる前にまず骨年齢検査を。骨年齢が低ければ、まだ十分な成長ポテンシャルがある可能性があります。"},"growth_slowdown":{"type":"answer","title":"成長速度が突然落ちた——重要な警告サインです","recommend":true,"content":"成長速度の突然の低下は重要な警告サインです。\n\n📊 年齢別の正常成長速度：\n• 1〜2歳：年間10〜12cm\n• 3〜4歳：年間8〜10cm\n• 5〜10歳（思春期前）：年間5〜7cm ←この時期に4cm未満は要検査\n• 思春期急成長期：年間8〜10cm\n\n⚠️ 以下のいずれかに該当したら受診を：\n• 思春期前のお子さんが年間4cm未満しか伸びない\n• 以前と比べて成長速度が明らかに低下した\n• 6ヶ月間で身長パーセンタイルが2本以上の主要ラインを継続して下回る\n\n🔍 考えられる原因：\n1. 成長ホルモン欠乏症 ——IGF-1低値、負荷試験でピーク10ng/mL未満\n2. 甲状腺機能低下症 ——TSH上昇\n3. 慢性疾患の悪化 ——炎症性腸疾患、腎疾患など\n4. ストレス・心理的原因\n5. 栄養不足\n6. 思春期早発症 ——急成長後の早期終了","tip":"3ヶ月ごとに身長を測って記録しておくと、成長速度が正確につかめます。記録があると診断に非常に役立ちます。"},"growth_boneage":{"type":"answer","title":"骨年齢検査——成長ポテンシャルを最も正確に知る方法","content":"骨年齢検査はお子さんの成長ポテンシャルを評価する最も重要な検査です。\n\n🔬 検査方法：\n左手のX線1枚（約5分、完全無痛、放射線量は極めて少ない）\n手と手首に27個の小さな骨があり、正確な評価が可能です。\n放射線量：約0.0001mSv（国内線往復より遥かに少ない）\n\n📊 予測精度の比較：\n• 親の身長計算式：誤差±8〜10cm（16〜20cmの範囲）\n• 骨年齢による予測：誤差±3〜5cm（思春期前）/ ±2〜3cm（思春期後期）\n\n🎯 骨年齢でわかること：\n• 現在の成長板の状態（どれだけ開いているか）\n• 治療なしの最終身長予測\n• 治療開始・終了タイミングの判断基準\n• 骨年齢が2年以上先行：早期閉鎖のリスク\n• 骨年齢が2年以上遅れ：成長チャンスが十分\n\n⚠️ 知っておくべきこと：\n• 読影する医師によって6ヶ月〜1年の誤差が生じることがある\n• 最近AI補助読影の導入で精度が向上しつつある\n\n🏥 治療終了の判断にも使用：\n• 思春期早発症治療：女の子骨年齢12歳、男の子13歳\n• 成長ホルモン治療：女の子骨年齢14歳、男の子16歳","tip":"骨年齢検査は成長のコンパスです。骨の年齢を知ることで、残りの成長チャンスを正確に把握できます。"},"ans_gh_deficiency":{"type":"answer","title":"成長ホルモン欠乏症——治療効果が最も確実です","recommend":true,"content":"成長ホルモン欠乏症は治療効果が最も確実で、健康保険が適用されます。\n\n📊 治療効果：\n• 治療1年目の平均成長：8〜10cm（一部は12cm以上）\n• 2年目以降：年間6〜7cm（同年代の5〜6cmより高い）\n• 全体的な改善：10〜13cm\n• 早期開始で最大20cm以上も可能\n\n⚠️ 治療しないと？\n欧州の長期追跡研究の結果：\n• 女の子：遺伝的目標身長より平均10cm低い\n• 男の子：遺伝的目標身長より平均20cm低い\n\n💉 治療方法：\n• 体重1kgあたり0.025〜0.035mg/日の皮下注射\n• 体重30kgの場合→1日0.75〜1.05mg\n• 3〜6ヶ月ごとに体重に合わせて用量を再調整\n\n💰 健康保険の適用：\n• 適用時の自己負担：月21〜36万ウォン（薬代の30%）\n• 適用終了：骨年齢が女の子14歳/男の子16歳、または年間成長2cm未満時\n\n✅ 適用条件（2種類以上の負荷試験で）：\n• 両回ともピーク値10ng/mL未満\n• 身長が3パーセンタイル未満\n• 骨年齢が実際の年齢より低い","tip":"早く始めるほど効果が大きくなります。思春期前に2年以上治療すると、効果が約2倍になります。"},"ans_gh_turner":{"type":"answer","title":"ターナー症候群——早く始めるほど良い結果が出ます","recommend":true,"content":"ターナー症候群はX染色体が1本欠けた状態（45,X）で、健康保険が適用されます。\n\n📊 治療効果：\n• 平均7〜8cmの増加\n• 治療なしの平均最終身長：約143cm\n• 治療後：約150cm →7〜8cmの差は日常生活で大きな意味を持ちます\n\n💉 治療方法：\n• 成長ホルモン単独、またはエストロゲンと併用\n• エストロゲン：通常11〜12歳から低用量で開始し、自然な思春期を誘導\n• 併用時は最終身高の改善効果がさらに大きくなります\n\n💰 保険適用条件：\n• 身長が3パーセンタイル未満\n• 染色体検査（核型分析）で確定診断\n• 成長ホルモン負荷試験の結果は問いません（ターナー症候群自体が適用対象）\n\n⏱️ 開始時期：\n• できるだけ早い方が良い（幼いほど治療期間が長く、効果↑）\n• 通常2〜4歳から開始可能","tip":"ターナー症候群では自然な思春期が来ないことが多いです。成長ホルモンとエストロゲンの開始時期の計画が重要です。"},"ans_gh_sga":{"type":"answer","title":"低出生体重児（SGA）——4歳から保険適用で治療できます","recommend":true,"content":"小さく生まれて追いつけていないお子さんは、4歳から健康保険適用の治療が可能です。\n\n📊 治療効果：平均5〜7cmの増加\n• 4歳前に早く始めるほど正常身長への追いつき可能性が高い\n• 思春期以降に開始では効果が限られます\n\n✅ 保険適用条件：\n• 出生時の体重または身長が3パーセンタイル未満（記録が必要）\n• 4歳以降も身長・体重が3パーセンタイル未満\n• 4歳前は自然な追いつきを待ちます\n\n⚠️ 重要なポイント：\n• 出生記録（出生時の体重・身長の記録）は必ず保管してください\n• 2025年1月から適用条件が強化：4歳前の出生記録の書類が必要\n\n💰 費用：\n• 保険適用時：月21〜36万ウォン\n• 治療期間：通常2〜4年（骨年齢を基準に終了）","tip":"4歳前は自然な追いつきを確認し、4歳以降も3パーセンタイル未満なら、すぐに治療を開始するのが最善です。"},"ans_gh_iss":{"type":"answer","title":"特発性低身長（ISS）——慎重な決断が必要です","content":"すべての検査が正常なのに身長が低い場合を「特発性低身長（ISS）」といいます。\n\n⚠️ 正直な効果の説明：\n• 平均効果はわずか3〜5cm（個人差が大きい：7cmの子もいれば、ほぼ効果なしの子も）\n• 事前に効果を予測することは難しいです\n• 遺伝的目標身長を大幅に超えることは、現実的には難しいです\n\n💰 費用の現実：\n• 保険適用外→全額自費\n• 月70〜120万ウォン（体重によって異なる）\n• 2〜3年の治療総費用：約2,000〜4,000万ウォン\n\n📋 決断前に必ず考えること：\n1. お子さんが身長のことで本当に精神的に苦しんでいるか\n2. 1年目の反応を見て決める（年5cm以上なら継続、3cm未満なら停止を検討）\n3. お子さん本人の意思を尊重（毎日注射が必要）\n4. 家庭の経済状況と長期的な計画\n\n🌟 国際的なガイドライン：\n米国小児内分泌学会も「共同意思決定」を推奨\n→ 医師が一方的に決めるのではなく、ご家族が十分な情報を得た上で選択","tip":"特発性低身長は急いで決める必要はありません。十分に相談した上で、経済的・精神的な条件を総合して決めましょう。"},"ans_gh_other":{"type":"answer","title":"その他の保険適用疾患","recommend":true,"content":"プラダー・ウィリ症候群、ヌーナン症候群、慢性腎不全も保険適用対象です。\n\n🔵 プラダー・ウィリ症候群：\n• 15番染色体の異常による遺伝性疾患\n• 効果：平均6〜8cmの増加\n• ただし身長よりも筋肉量の増加と体脂肪の減少が主な目的\n• 強い肥満傾向があるため、治療中の体重管理が不可欠\n• 乳児期からの開始を推奨（筋肉発達のため）\n• 保険適用条件：遺伝子検査で確定\n\n🔵 ヌーナン症候群：\n• 見た目がターナー症候群に似ているが、原因は遺伝子変異\n• 効果：平均4〜6cm（個人差大）\n• 心疾患の合併が多いため、治療前に精密心臓検査が必須\n• 保険適用条件：関連遺伝子検査確定＋身長3パーセンタイル未満\n\n🔵 慢性腎不全に伴う低身長：\n• 効果：平均5〜7cmの増加\n• 移植まで治療を続け、移植後も成長板が開いていれば継続可能\n• 定期的な腎機能モニタリングが必要","tip":"これらの疾患では、成長ホルモン治療が身長だけでなく、全体的な健康と生活の質の向上にも役立ちます。"},"ans_gh_no_test":{"type":"answer","title":"まずは専門科での検査が必要です","recommend":true,"content":"検査を受けていなければ、お子さんに治療が必要かどうかわかりません。小児内分泌科への受診が先決です。\n\n🔬 基本的な検査の流れ：\n\nStep 1. 骨年齢X線（左手）\n• 最初に最も重要\n• 成長ポテンシャルと最終身長の予測\n• 約5分、無痛、低放射線\n\nStep 2. 血液検査\n• IGF-1：成長ホルモン機能のスクリーニング\n• 甲状腺機能（TSH、遊離T4）\n• 一般血液検査（貧血、炎症など）\n• 肝腎機能\n\nStep 3. 成長ホルモン負荷試験（必要時）\n• IGF-1が低いか成長速度異常の場合に追加\n• 約2〜3時間、採血4〜6回（留置針で1回のみ穿刺）\n• ピーク値10ng/mL未満で欠乏症を疑います\n• 保険適用には2種類以上の異なる方法での検査が必要","tip":"検査結果によって治療が必要かどうか、どんな治療が適切かが決まります。検査を先延ばしにすると治療の機会が減ります。"},"gh_effect":{"type":"answer","title":"成長ホルモン治療の効果——疾患と時期によって異なります","content":"診断と開始時期によって、効果には大きな差があります。\n\n📊 疾患別の平均効果：\n🥇 成長ホルモン欠乏症 → 10〜13cm（1年目に8〜10cm）\n🥈 ターナー症候群 → 7〜8cm\n🥉 低出生体重児（SGA）→ 5〜7cm\n　　プラダー・ウィリ → 6〜8cm（筋肉量増加が主効果）\n　　ヌーナン症候群 → 4〜6cm\n　　慢性腎不全 → 5〜7cm\n　　特発性低身長 → 3〜5cm（個人差大）\n\n⏰ 開始時期が最も重要：\n• 骨年齢6歳以下で開始 → 最大効果（平均7.4cm追加）\n• 骨年齢8〜9歳 → 適度な効果\n• 骨年齢11歳以降 → 効果が急減\n• 骨年齢14歳以降 → ほぼ効果なし、保険適用も終了\n\n🌟 効果を最大化する4つの条件：\n1️⃣ 早期開始：思春期前に2年以上治療で効果約2倍\n2️⃣ 毎日欠かさず注射\n   → 遵守率10%向上で年間約1.1cm追加成長\n3️⃣ 適切な用量：体重増加に合わせて3〜6ヶ月ごとに再計算\n4️⃣ 十分な睡眠と栄養の並行","tip":"成長ホルモン治療は短期間で劇的に伸びるのではなく、数年間にわたって治療前より少し多く伸び続けるというイメージです。"},"gh_safety":{"type":"answer","title":"成長ホルモンの安全性——40年間で実証された治療です","content":"成長ホルモン治療は非常に安全です。1985年から遺伝子組み換え技術で製造された製品を使用しています。\n\n✅ 安全な理由：\n• 私たちの体が自然に作るホルモンと100%同じ構造（アミノ酸191個）\n• 体が「異物」として認識しません\n• 世界で40年以上使用、数百万人の治療データがあります\n\n📋 軽微な副作用（3%未満）：\n• 注射部位の赤み・かゆみ・腫れ → 1〜2週間で改善\n• 頭痛 → 1〜2週間で多くの場合消失\n• 筋肉痛・関節痛 → 成長痛に似ており、2〜4週間で改善\n• 手足の軽い浮腫み → 時間とともに消える\n\n⚠️ まれですが知っておくべき副作用：\n• 甲状腺機能低下症：治療開始1年以内に約10〜20%で発症の可能性→血液検査で確認、薬で簡単に修正\n• 血糖上昇：肥満や糖尿病の家族歴があるお子さんのみ注意\n• 脊柱側弯症：定期検診で確認\n• 大腿骨頭骨端線分離症：非常にまれ、急な跛行・股関節痛があれば即受診\n\n🚫 がんのリスク：健康なお子さんでは大規模長期研究で増加なし\n\n🔴 すぐに救急受診を：\n• 激しい頭痛＋嘔吐＋視野障害（頭蓋内圧亢進が疑われる）\n• 急な跛行（大腿骨頭骨端線分離症が疑われる）","tip":"治療中に気になる症状が出たら、必ず主治医に伝えてください。定期的な血液検査と外来受診が安全な治療の要です。"},"gh_cost":{"type":"answer","title":"成長ホルモンの費用と保険——事前に把握して備えましょう","content":"成長ホルモンの薬代は体重や診断によって異なりますが、基本的な範囲は以下の通りです。\n\n💰 基本薬代：\n• 月70〜120万ウォン（体重1kgあたり月約2.5〜4万ウォン）\n• 体重が増えると用量も増え、費用も増加\n例）20kgのお子さん→月約50〜80万ウォン\n例）40kgのお子さん→月約100〜160万ウォン\n\n📋 保険適用時：\n• 自己負担30%→月21〜36万ウォン\n• 処方箋をもとに薬局で受け取り\n• 特別な申請は不要（病院が自動処理）\n\n📋 保険適用終了基準（いずれか1つに該当時）：\n• 骨年齢：女の子14〜15歳/男の子15〜16歳\n• 身長：女の子153cm超/男の子165cm超\n• 年間成長：2cm未満\n\n⚠️ 保険適用外の場合：\n• 特発性低身長：100%自費\n• 月70〜120万ウォン全額自己負担\n• 2〜3年の総費用：約2,000〜4,000万ウォン\n\n💡 節税のポイント——医療費控除：\n• 年間医療費のうち総所得の3%超の部分×15%が控除されます\n• 例）所得5,000万ウォン＋年間医療費500万ウォン\n  →500万-150万（3%）=350万×15%=52.5万ウォンの節税","tip":"治療期間が長いほど費用は増えます。初診時に予想される治療期間と総費用を医師と事前に相談しましょう。"},"gh_injection":{"type":"answer","title":"成長ホルモンの注射方法——最初は緊張しますが、すぐに慣れます","content":"毎日の皮下注射です。最初は緊張しますが、ほとんどの方が1〜2週間で慣れます！\n\n💉 基本情報：\n• 針の太さ：0.23mm（蚊の針より細い）\n• 皮下注射→筋肉注射よりずっと痛くない\n• 最適な時間：就寝直前（夜9〜10時）\n  →睡眠中の成長ホルモンの自然分泌ピークに合わせます\n\n🎯 4箇所のローテーション（毎日変える）：\n1. 腹部：へそから5cm以上離れた左右（最も推奨）\n2. 太もも：前面および外側上1/3\n3. 上腕後面：三頭筋部位\n4. 臀部：外上方\n\n⚠️ 同じ箇所に打ち続けると？\n脂肪萎縮（くぼみ）または硬結（硬いしこり）→薬の吸収が妨げられる→治療効果が低下\n\n📋 注射の手順：\n1. 手をよく洗う（20秒以上）\n2. 冷蔵庫から取り出して15〜30分室温に戻す（冷たいと痛い）\n3. アルコール綿で皮膚を消毒し、10〜15秒乾燥\n4. 皮膚を軽くつまんで2〜3cm持ち上げる\n5. 90度で素早く刺す（ためらうと痛い）\n6. 最後まで押して「10秒キープ」（逆流防止の要！）\n7. 90度で素早く抜く→ガーゼで10秒押さえる（こすらない、あざになる）\n\n🧒 お子さんが怖がっているとき：\n• 選択肢を与える：「今日はお腹の右側？左側？」\n• シールチャート：毎日注射できたらシール、週の目標達成で小さなご褒美\n• 10分前に予告：「もうすぐ注射の時間だよ」\n• 絶対NGな言葉：「全然痛くないよ」→約束を破ると信頼が崩れます","tip":"毎日同じ時間に注射するルーティンを作ると、打ち忘れがなくなります。継続率が高いほど治療効果も大きくなります。"},"gh_timing":{"type":"answer","title":"治療の開始・終了のタイミング——骨年齢が基準です","content":"成長ホルモン治療の開始・終了は骨年齢を基準に判断します。\n\n🟢 治療開始のタイミング：\n• 早いほど良い（骨年齢が低いほど効果↑）\n• 最適な時期：思春期開始前（女の子骨年齢6〜9歳、男の子8〜10歳）\n• 思春期前に2年以上治療すると効果が約2倍に\n\n🔴 治療終了の基準（保険適用終了）：\n• 女の子骨年齢14〜15歳/男の子骨年齢15〜16歳\n• 女の子身長153cm超/男の子165cm超\n• 年間成長2cm未満（この時点で続けても効果はない）\n\n💡 保険終了後の自費継続：\n• 医学的に必要と判断される場合は自費で継続可能\n• 骨年齢は基準に達しているがまだ2cm以上伸びている場合は医師と相談\n\n📅 治療中のモニタリングスケジュール：\n• 最初の3ヶ月：毎月受診（身長・体重、副作用の確認）\n• 安定期：3〜6ヶ月ごとに受診\n• 3〜6ヶ月ごと：IGF-1検査（目標0〜+2標準偏差）\n• 6〜12ヶ月ごと：骨年齢X線\n• 年1回：甲状腺機能、血糖","tip":"治療を突然やめると成長速度が落ちます。終了のタイミングは必ず医師と十分に話し合ってから決めましょう。"},"puberty_girl_under8":{"type":"answer","title":"8歳未満での乳房発育——小児内分泌科への受診が必要です","recommend":true,"urgent":true,"content":"8歳（住民登録上の満年齢）になる前の乳房発育は、医学的定義の思春期早発症です。早急な評価が必要です。\n\n📌 満年齢の正確な計算方法：\n生年月日を基準に、今年の年 - 生まれた年（今年誕生日がまだなら -1）\n\n🔬 病院での検査内容：\n1. 骨年齢X線（最重要）\n   → どのくらい先行しているかを確認\n2. GnRH負荷試験（真性か偽性かの鑑別の要）\n   → LHピーク値5IU/L以上＝真性思春期早発症の確定\n   → 90分、採血5回（留置針）\n3. 腹部超音波（子宮・卵巣の大きさを確認）\n4. 頭部MRI\n   → 6歳未満：必須\n   → 6〜8歳：進行が速い場合や神経症状がある場合\n\n⚠️ 治療の必要性の判断：\n• 骨年齢が実際の年齢より2年以上先行し、進行が速い→積極的に治療を検討\n• 骨年齢があまり先行せず進行が遅い→経過観察も選択肢\n\n📊 治療しないと？\n• 女の子の遺伝的目標身長より平均10cm低くなる（欧州長期研究）\n• 初経が9〜10歳で早く来ることも","tip":"早期に診断・治療するほど最終身長を守れます。気づいたその日に、ためらわず受診してください。"},"puberty_girl_new":{"type":"answer","title":"新たに気づいた乳房発育——評価を受けましょう","recommend":true,"content":"最近気づいたのであれば、小児内分泌科で評価を受けてください。\n\n📌 8〜10歳での乳房発育：\n• 8歳以降は医学的な「思春期早発症」の基準は外れますが、評価は必要です\n• 8〜9歳：進行が速ければ治療を検討/遅ければ経過観察\n• 9〜10歳：すでに正常な思春期の範囲に入っています\n\n🔍 評価のポイント：\n• 進行速度は速いか？（6ヶ月以内にタナーステージ2段階以上の進行）\n• 骨年齢が実際の年齢より2年以上先行しているか？\n• 急成長期がすでに来ているか？\n• 予測最終身長が遺伝的目標より5cm以上低いか？\n\n📊 治療の検討基準（いずれかに該当する場合）：\n• GnRH負荷試験でLHピーク5IU/L以上\n• 骨年齢が実際の年齢より2年以上先行\n• 予測最終身長が遺伝的目標より明らかに低い\n• 急速な進行により心理的苦痛がある","tip":"発育に気づいた日付と変化のスピードをメモしておくと、医師にとって非常に役立つ情報になります。"},"puberty_girl_progress":{"type":"answer","title":"乳房発育が急速に進行中——早めに受診を","recommend":true,"content":"3〜6ヶ月で明らかに大きくなっているなら、進行が速く、評価と治療が必要な可能性が高いです。\n\n⚠️ 急速な進行が意味すること：\n• 骨年齢も急速に先行している可能性が高い\n• 成長板の早期閉鎖のリスク\n• 予測最終身長が下がり続ける可能性\n\n📊 GnRH治療の効果（骨年齢による）：\n• 骨年齢6歳前に開始：平均7.4cmの追加改善（最大効果）\n• 骨年齢8〜9歳：効果はあるが限定的\n• 骨年齢10〜11歳：さらに限定的\n• 骨年齢11歳以上：ほぼ効果なし\n\n🔬 今すぐ必要な検査：\n1. 骨年齢X線\n2. GnRH負荷試験（LHピーク5IU/L以上＝真性）\n3. 腹部超音波（子宮・卵巣の成熟度）\n4. 頭部MRI（必要時）\n\n💉 治療（GnRH注射）を始めると：\n• 急速な思春期の進行が止まるか緩やかになる\n• 骨年齢の進行速度が正常化\n• 初経を同年代と同じくらいの時期に遅らせる\n• 最終身長の損失を防ぐ","tip":"進行が速いほど、早く治療を始めることが効果を高めます。今日中に予約を取りましょう。"},"puberty_girl_stable":{"type":"answer","title":"6ヶ月以上変化なし——乳腺早期発育の可能性があります","content":"長い間変化がないなら、「乳腺早期発育（Premature Thelarche）」の可能性があります。\n\n📊 乳腺早期発育の特徴：\n• 乳房発育のみで、他の思春期サインなし\n  （陰毛、おりもの、身長の急成長なし）\n• 骨年齢は正常かわずかに先行\n• 成長速度は正常（年5〜6cm）\n• GnRH負荷試験：LHピーク低値（＜2IU/L、FSH優位の反応）\n\n✅ 予後：\n• 90%以上が治療なしで自然に改善\n• 51%は乳腺組織が完全に消える\n• 2歳未満での発症で思春期早発症への移行は約2%\n\n⚠️ ただし定期的な観察は必要です：\n• 最初の3〜6ヶ月ごとに外来受診\n• 確認事項：乳房の大きさの変化、陰毛・おりものの有無、成長速度\n\n🔴 以下の症状が出たらすぐに受診：\n• 乳房が急速に大きくなった\n• 陰毛またはおりものが出た\n• 身長が急に速く伸び始めた","tip":"乳腺早期発育はほとんどの場合、心配しなくて大丈夫です。ただし定期的なチェックは必要です。"},"puberty_girl_normal":{"type":"answer","title":"10歳以降の乳房発育——正常な思春期の範囲です","content":"10歳以降の乳房発育は正常な思春期の始まりです。\n\n📊 女の子の思春期の正常な時期：\n• 乳房発育開始：平均9〜11歳（正常範囲は8〜13歳）\n• 陰毛発育：通常、乳房発育の6ヶ月〜1年後\n• 急成長期：乳房発育開始の6ヶ月〜1年後\n• 初経：乳房発育開始から平均2〜2.5年後（平均12〜13歳）\n\n📈 初経後の成長量：\n• 初経前の1年：約8〜10cm（急成長のピーク）\n• 初経後1年目：約2〜3cm\n• 初経後2年目：約1〜2cm\n• その後はほぼ止まる→合計あと約5〜7cm\n\n✅ 心配しなくてよい場合：\n• 思春期のステージが自然に進んでいる\n• 骨年齢が実際の年齢と1年以内の差\n• 予測最終身長が遺伝的目標の範囲内\n\n⚠️ 受診が必要な場合：\n• 6ヶ月以内に思春期が2ステージ以上急速に進んだ\n• 初経が10歳前に来そうな場合\n• 予測最終身長が遺伝的目標より5cm以上低い","tip":"正常な思春期が始まっています。バランスの良い栄養と十分な睡眠で、残りの成長を最大化しましょう。"},"puberty_girl_unsure":{"type":"answer","title":"乳腺組織vs脂肪——見分け方","content":"多くの保護者の方から同じご質問をいただきます。簡単に見分ける方法があります。\n\n👆 自宅での確認方法：\n• 乳腺組織：乳頭のすぐ下に小さく硬い塊の感触\n  （軽く押すと少し痛みを感じることも、ボタンや小石のような感触）\n• 脂肪の蓄積：全体的に柔らかくぶよぶよしている\n  （乳頭の下に硬い部分がない）\n\n📊 片方だけ先に出る場合：\n正常です！乳腺早期発育や思春期初期に片方だけ先に出るのはよくあることです。\n\n🏥 病院での確認方法：\n• 医師の触診（触って確認）\n• 乳房超音波：乳腺組織vs脂肪を明確に区別できる、完全無痛\n• 超音波で乳腺組織が確認できた＝乳房発育の始まり\n\n✅ 自宅で硬い塊を感じた場合：\n8歳未満→すぐに受診、8歳以上→変化を観察しながら受診","tip":"迷ったときは病院での超音波検査が最も正確です。検査自体は簡単で、5〜10分で終わります。"},"ans_boy_precocious":{"type":"answer","title":"9歳未満での精巣増大——専門科での評価が必要です","recommend":true,"urgent":true,"content":"男の子が9歳（住民登録上の満年齢）になる前に精巣が大きくなるのは、思春期早発症の基準に当たります。\n\n📏 精巣の大きさの基準：\n• 4mL以上（長径約2.5cm以上）＝思春期の始まり\n• 保護者が正確に判断するのは難しく、専門医の診察が必要\n\n⚠️ 男の子の思春期早発症がより深刻な理由：\n• 女の子と違い、男の子では器質的病変（脳腫瘍など）の可能性がより高い\n• かつては40〜75%に原因疾患があったが、近年7〜16%に低下。それでも注意が必要\n• 男の子の思春期早発症はまれなため、より徹底的な検査が必要\n\n🔬 必ず受けるべき検査：\n1. 骨年齢X線（必須）\n2. GnRH負荷試験（LHピーク5IU/L以上＝真性）\n3. 頭部MRI（男の子は必須）\n   → 視床下部過誤腫（良性腫瘍）、脳下垂体腫瘍などを除外\n4. 血中性ホルモン（テストステロン、LH、FSH、DHEA-S）\n5. 精巣超音波（精巣腫瘍の除外）\n\n📊 治療効果：\n• 欧州の長期追跡：未治療の男の子は遺伝的目標身長より平均20cm低い\n• 女の子（10cm低い）より身長の損失が大きい","tip":"男の子の思春期早発症はまれだからこそ、より積極的に評価する必要があります。できるだけ早く小児内分泌科を受診してください。"},"ans_boy_signs":{"type":"answer","title":"思春期のサイン——タイミングとスピードが重要です","content":"声変わり、ひげ、身長の急成長は思春期中後期のサインです。\n\n📊 男の子の思春期の順番：\n1. 精巣増大（4mL以上）← 思春期の始まり\n2. 陰毛の発育（精巣増大から6ヶ月〜1年後）\n3. 身長急成長期（精巣増大から1〜2年後、平均13〜15歳）\n   → 年間9〜10cmの急成長、約2〜3年続く\n4. 声変わり（急成長とほぼ同じ時期）\n5. ひげの発育（思春期の最後のサイン）\n   → ひげが生え始めると急成長はもうすぐ終わり\n\n📈 男の子の思春期の総成長量：\n• 急成長期：25〜30cm（女の子より5〜7cm多い）\n• 女の子より思春期が2年遅れて始まるが、2〜3年長く続く\n• これが男性が平均13cm高い理由です\n\n✅ 正常な範囲：\n• 思春期の開始：10〜12歳\n• 9歳前に始まる＝思春期早発症\n• 14歳以降になっても始まらない＝思春期遅発症の評価が必要\n\n🔬 評価が必要な場合：\n• 思春期が9歳前に始まった\n• 骨年齢が実際の年齢より2年以上先行\n• 予測最終身長が遺伝的目標より明らかに低い","tip":"ひげが生え始めると急成長期はもうすぐ終わりです。残りの成長を最大化する生活習慣が大切です。"},"ans_boy_false_puberty":{"type":"answer","title":"偽性思春期早発症——原因が異なります","content":"精巣の変化がなく、陰毛・体臭だけの場合、偽性思春期早発症（副腎性）の可能性が高いです。\n\n📌 真性と偽性の違い：\n• 真性：脳からの信号→精巣・卵巣の刺激→性ホルモン分泌\n  男の子：精巣が先に大きくなる\n• 偽性：脳と無関係に副腎から直接アンドロゲンが分泌\n  男の子：精巣のサイズは正常、陰毛・体臭・にきびのみ\n\n📌 最も多い原因——早発副腎皮質機能亢進（Premature Adrenarche）：\n• 副腎からDHEA-Sが早めに分泌される\n• ほとんどの場合予後は良好（完全な思春期に進展することはまれ）\n• ただし1〜2年以内に真性への移行がないか確認が必要\n\n🏥 確認が必要な理由：\nまれに副腎腫瘍や先天性副腎皮質過形成が原因のことがあります\n血液検査（DHEA-S、テストステロン、17-OHP）での確認が必須\n\n⚠️ 注意：\nGnRH負荷試験でLHの反応なし→偽性思春期早発症の確認\nGnRH治療は偽性思春期早発症には効果なし（原因治療が必要）","tip":"陰毛や体臭があっても精巣のサイズが正常なら、全く異なるアプローチが必要です。必ず専門医を受診してください。"},"ans_boy_delayed":{"type":"answer","title":"男の子の思春期遅発症——ほとんどは体質性です","recommend":true,"content":"14歳になっても精巣増大（4mL以上）がない場合、思春期遅発症として評価します。\n\n📊 体質性成長遅延（60〜80%）：\n• 「遅咲き」タイプ——最終的に正常に成長します\n• 特徴：両親のどちらかも遅く成長した（父親が「高校3年に急に伸びた」など）\n• 骨年齢が実際の年齢より1〜3年低い\n• 身長は低くても、成長速度自体は正常（年4〜5cm）\n\n✅ 待てる場合：\n• お父さんに遅く成長した経歴がある\n• 骨年齢が低い（成長板がまだ十分に開いている）\n• 検査が正常（成長ホルモン、甲状腺など）\n\n⚠️ 病的な思春期遅発症の可能性：\n• クラインフェルター症候群（47,XXY）\n• 下垂体機能異常\n• 慢性消耗性疾患（クローン病、慢性腎不全など）\n• 重度の栄養不良\n\n💊 治療の選択肢（体質性の場合）：\n• ほとんどは待てば自然に思春期が来ます\n• 精神的なストレスが強い場合：少量のテストステロンで思春期を誘導することも\n• 治療しても最終身長は正常範囲内（遺伝的目標内）\n\n🔬 検査：骨年齢＋成長ホルモン負荷試験＋染色体検査（クラインフェルター除外）","tip":"体質性思春期遅発症であれば心配いりません。友達がみんな成長して相対的に小さく見える時期を乗り越えれば、最終的に正常な身長に達します。"},"ans_false_puberty":{"type":"answer","title":"偽性思春期早発症——原因も治療も異なります","content":"乳房発育（女の子）や精巣増大（男の子）がなく、陰毛・体臭・にきびだけの場合、「偽性思春期早発症」が疑われます。\n\n🔵 真性と偽性の比較：\n区分 | 真性思春期早発症 | 偽性思春期早発症\n脳の信号 | あり | なし\n女の子 | 乳房発育が先 | 乳房発育なし\n男の子 | 精巣が先に大きくなる | 精巣のサイズは正常\n共通 | LH↑、FSH↑ | DHEA-S↑、LHは正常\n治療 | GnRH注射 | 原因治療\n\n📌 最も多い原因——早発副腎皮質機能亢進：\n• 副腎からDHEA-Sが早めに分泌\n• ほとんどは予後良好で、自然に正常な思春期へ移行\n• 時間とともに真性へ移行する場合もある→経過観察が必要\n\n🔬 必要な検査：\n• DHEA-S、テストステロン、17-OHP（副腎由来の確認）\n• GnRH負荷試験（真性を除外）\n• 副腎・骨盤超音波","tip":"偽性思春期早発症は真性とは原因が全く異なり、GnRH注射は効果ありません。正確な鑑別が重要です。"},"ans_early_menarche":{"type":"answer","title":"初経が早かった場合——残りの成長チャンスを確認しましょう","recommend":true,"content":"初経は急成長期がもうすぐ終わるサインです。\n\n📊 初経後の平均成長量：\n• 初経当年：約2〜3cm\n• 翌年：約1〜2cm\n• その後：ほぼ成長しない\n• 初経後の総成長：約5〜7cm\n\n📌 骨年齢で残りの成長を確認：\n初経直後でも骨年齢が12歳未満なら、まだ治療のチャンスがある場合があります。\n\n⚠️ 10歳前に初経が来た場合：\n思春期早発症の治療が遅かった可能性があります。骨年齢X線での確認が必要です。\n\n✅ 残りの成長を最大化するための戦略：\n• 十分な睡眠（夜10時前の就寝を推奨）\n• タンパク質＋カルシウム＋ビタミンDの十分な摂取\n• ストレスを最小限に\n• 定期的な運動（縄跳び、バレーボールなどジャンプ系の運動）\n\n🔴 治療の可否の確認：\n• 骨年齢12歳未満＋まだ急成長中→治療に意味あり\n• 骨年齢14歳以上→治療の効果なし","tip":"初経が来てもあきらめないで。骨年齢検査で残りのチャンスを正確に把握してから決断しましょう。"},"ans_rapid_growth":{"type":"answer","title":"急に身長が伸び始めた——思春期早発症のサインかもしれません","recommend":true,"content":"突然の急成長は思春期早発症の初期サインである場合があります。\n\n⚠️ 思春期早発症のパラドックス：\n• 短期的に：同年代より5〜8cm高く、よく育っているように見える\n• 身長パーセンタイルが突然上昇（例：50→75パーセンタイル）\n• 長期的に：成長板が早期に閉じ、最終身長が予測より5〜15cm低くなることも\n\n📊 正常成長vs思春期早発症初期の成長速度：\n• 正常（思春期前）：年間5〜7cm\n• 思春期早発症初期：年間8〜10cm以上（急成長期が早まって始まる）\n\n🔍 同時に確認すること：\n• 乳房発育（女の子）/ 精巣増大（男の子）\n• 陰毛、体臭、にきび\n• 最近の身長パーセンタイルの変化の記録\n\n🔬 おすすめの検査：\n• 骨年齢X線（成長板の成熟度を確認）\n• GnRH負荷試験（思春期が進行しているかどうか）\n• 血中性ホルモン値","tip":"急に身長が伸びたことを喜ぶ前に、骨年齢検査で成長板の状態を確認しましょう。"},"gnrh_treatment":{"type":"answer","title":"GnRH治療（思春期早発症の治療）について詳しく","content":"真性思春期早発症に使うGnRH類似体（アゴニスト）の注射です。\n\n🔬 作用のしくみ：\n脳下垂体のGnRH受容体を持続的に占有→脱感作（desensitization）\n→LH・FSHの分泌が減少→性ホルモン抑制→思春期の進行が止まる\n\n💊 薬の種類：\n• ロイプロリド系：Luprin（루프린）、Lupeer（루페어）、Eligard\n• トリプトレリン系：Diphereline（디페렐린）、Decapeptyl（데카펩틸）\n• 1ヶ月型/3ヶ月型/6ヶ月型から選択可能\n\n💉 注射方法：\n• 筋肉注射（臀部）：トリプトレリン系\n• 皮下注射（腹部）：一部のロイプロリド系\n• 筋肉注射はバイオアベイラビリティが皮下注射の約1.5〜2倍\n\n⏱️ 注射の間隔（絶対に遅れてはいけません）：\n• 1ヶ月型：25〜29日以内\n• 3ヶ月型：77〜87日以内\n• 6ヶ月型：154〜175日以内\n\n💰 費用：\n保険適用時：\n• 1ヶ月型：1回約4〜5万ウォン（月4〜5万ウォン）\n• 3ヶ月型：1回約12〜15万ウォン\n保険適用外：\n• 1ヶ月型：1回約11万ウォン\n• 3ヶ月型：1回約33万ウォン\n\n✅ 保険適用条件（2025年1月強化）：\n• 8歳前（女の子）/9歳前（男の子）に始まった第二次性徴の記録が必要\n• GnRH負荷試験でLHピーク5IU/L以上\n• 骨年齢の先行\n• 保険期間：女の子は12歳の誕生日前日まで/男の子は13歳の誕生日前日まで\n\n🕒 治療期間と終了：\n• 通常2〜4年\n• 終了：女の子骨年齢12〜12.5歳/男の子骨年齢13〜13.5歳\n• 初経：治療終了後平均約1年後","tip":"注射の日付は絶対に遅らせないでください。遅れると性ホルモンが再び上昇することがあります（ブレークスルー現象）。"},"gnrh_gh_combo":{"type":"answer","title":"GnRH＋成長ホルモン併用療法——いつ考えるべきか","content":"思春期早発症の治療（GnRH）に加えて成長ホルモンを使う併用療法です。\n\n🎯 併用療法の適応：\n以下のいずれか1つ以上に該当する場合に検討：\n① 骨年齢から予測される最終身長が3パーセンタイル未満\n② GnRH単独治療中に年間成長4cm未満（相対的成長ホルモン不足）\n③ 予測身長が遺伝的目標身長より明らかに低い\n\n📊 効果：\n• GnRH単独：予測身長の保全（損失を防ぐ）\n• 併用療法：単独に比べてさらに4〜6cmの上乗せ\n• 例：目標155cm→単独154〜157cm→併用160〜162cm\n\nメカニズム：\n• GnRH：骨年齢の進行を遅らせる（時間を稼ぐ）\n• 成長ホルモン：IGF-1経路を追加で活性化（性ホルモンとは独立した経路）\n• 2つの効果がシナジーを生む\n\n💰 費用（併用の場合）：\n• GnRH（保険適用外）：月約11万ウォン\n• 成長ホルモン（自費）：月約80〜130万ウォン（体重による）\n• 合計：月約91〜141万ウォン\n• 1年間の費用：約1,000〜1,600万ウォン\n• 2〜3年の総費用：約2,000〜5,000万ウォン\n\n⚠️ 成長ホルモンの保険適用：\n思春期早発症との併用成長ホルモンはほとんど保険適用外\n→ただし成長ホルモン欠乏症も同時に診断された場合は適用可能（まれ）\n\n✅ 開始の推奨：\nGnRH単独療法を6〜12ヶ月行い、成長の反応を確認してから決定\n→年間成長4cm未満なら、積極的に併用を検討","tip":"費用負担は大きいですが、この治療で得られる身長の差も大きいです。主治医と十分に相談し、ご家族みんなで決断しましょう。"},"obesity_diagnosis":{"type":"answer","title":"小児肥満の診断基準——成人とは異なります","content":"お子さんには成人の基準（BMI 25以上）は適用できません。年齢・性別によるパーセンタイルで判断します。\n\n📊 小児のBMIパーセンタイルの分類：\n• 5パーセンタイル未満 → 低体重\n• 5〜84パーセンタイル → 正常\n• 85〜94パーセンタイル → 過体重（注意段階）\n• 95パーセンタイル以上 → 肥満\n• 95パーセンタイルの120%以上 → 高度肥満\n\n🧮 BMIの計算方法：\n体重（kg）÷身長（m）²＝BMI\n例）身長140cm（1.4m）、体重45kg → BMI＝45÷1.96≈23\n\n📏 肥満度（標準体重との比較）：\n• （実際の体重－標準体重）÷標準体重×100\n• +10〜+20%：過体重\n• +20〜+30%：軽度肥満\n• +30〜+50%：中等度肥満\n• +50%以上：高度肥満\n\n⚖️ 体脂肪率（最も正確）：\n• 男の子25%以上 → 肥満\n• 女の子30%以上 → 肥満\n• 体成分分析装置（InBody）で測定、無痛\n\n⚠️ すぐに受診が必要な場合：\n• BMIが95パーセンタイル以上\n• 肥満なのに身長が低い（内分泌疾患が疑われる）","tip":"肥満なのに身長も低い場合は、単純な肥満ではない可能性があります。単純肥満のお子さんは逆に同年代より身長が高いことが多いです。"},"obesity_height":{"type":"answer","title":"肥満が身長に与える影響——最初は高いが、最終的には損をします","content":"肥満のお子さんの成長は「早送りモード」——最初は速いが、早く終わります。\n\n📊 2つの顔：\n\n✅ 初期（保護者が喜ぶ段階）：\n• 同年代より5〜8cm高く、身長75〜95パーセンタイル\n• 骨年齢が0.5〜1.5年先行\n• 理由：脂肪→レプチン↑→IGF-1↑、インスリン↑→成長板の刺激\n\n⚠️ 後期（実際の問題）：\n• 青年期に思春期が早く始まる\n• 成長板が早期に閉じる→予想より早く成長が止まる\n• 友達がまだ伸びているときに止まっている\n\n📊 研究結果：\n• 肥満のみの場合：女の子で2.3cm、男の子で3.1cm低くなる（スウェーデンの大規模研究）\n• 肥満＋急速な思春期早発症が重なると：遺伝的目標より5〜8cm低くなることも\n\n💡 ただし、肥満のみ（思春期早発症なし）では最終身長への影響は比較的小さいこともあります。\n\n🎯 核心：\n肥満→思春期早発症を引き起こす→最終身長の損失、という連鎖が問題です。\n\n✅ 対策：\n体重管理＝身長管理\n• 体重が5〜10%減ると、レプチン↓→骨年齢の進行速度が正常化","tip":"小学校低学年で友達より高いからと安心していると、中学生になって一番低くなることも。"},"obesity_puberty":{"type":"answer","title":"肥満と思春期早発症の関係——体重管理＝思春期管理","content":"肥満は思春期早発症の最も重要なリスクファクターの一つです。\n\n🔬 メカニズム：\n脂肪↑→レプチン（Leptin）↑→脳のKisspeptinシステム↑\n→GnRH分泌↑→LH・FSH↑→性ホルモン↑→思春期が早く始まる\n\nレプチンは食欲を調節するホルモンであると同時に、思春期を開始させるシグナル物質でもあります。\n\n📊 研究結果：\n• 1年以上肥満が続いた女の子：思春期早発症のリスクが増加\n• 肥満の女の子の思春期早発症発症率：正常体重の女の子の約2〜3倍\n\n✅ 体重管理のメリット：\n• レプチンの減少→早発思春期のリスク低減\n• インスリン抵抗性の改善→性ホルモンの正常化\n• 骨年齢の進行速度の正常化\n\n⚠️ 成長期の急激な減量は禁物：\n目標は「身長が伸びながら体重を維持」であり、急激なダイエットは成長を妨げます","tip":"思春期早発症が心配なら、体重管理が最善の予防策です。特に小学校入学前から健康的な食習慣を身につけることが重要です。"},"ans_acanthosis":{"type":"answer","title":"黒色表皮腫——インスリン抵抗性の皮膚サインです","recommend":true,"content":"首の後ろ、わきの下、股の付け根が黒く厚くなる「黒色表皮腫（Acanthosis Nigricans）」です。\n\n🔍 特徴：\n• どれだけ洗っても垢のように見える\n• ビロードのように柔らかく厚みのある感触\n• 最も多い部位：首の後ろ、わきの下、股の付け根\n\n🧬 なぜ起こるのか？\n血液中のインスリン濃度が高くなる（高インスリン血症）\n→皮膚細胞（ケラチノサイト）が過剰に増殖\n→メラニンが沈着\n→黒く厚い皮膚が形成される\n\nインスリンが高い＝インスリン抵抗性がある\nインスリン抵抗性＝糖尿病前症・メタボリックシンドロームの前段階\n\n📊 統計：\n• 黒色表皮腫がある肥満青少年の70%以上に高インスリン血症\n• 60%以上にインスリン抵抗性が確認される\n\n✅ 必要な検査：\n• 空腹時インスリン（15µU/mL以上＝高インスリン血症）\n• HOMA-IR（インスリン抵抗性の指標）\n• 空腹時血糖、HbA1c\n• 血中脂質（コレステロール、中性脂肪）\n\n💡 治療：\n• 黒色表皮腫そのものより、インスリン抵抗性の治療が先決\n• 体重5〜10%減＋運動＋食事改善\n• 4〜6ヶ月でインスリン抵抗性が改善すると、皮膚も徐々によくなります","tip":"黒色表皮腫は体が「糖尿病に向かっている」と発する皮膚の警告ランプです。見つけたら必ず小児内分泌科でインスリン抵抗性の検査を受けてください。"},"ans_obesity_diet":{"type":"answer","title":"成長期のお子さんのための肥満食事療法","content":"⚠️ 最も重要な原則：絶対にお子さんを「空腹にしてはいけない」！\n目標は「食事の内容を最適化する」ことです。\n\n📋 5つの食事の核心原則：\n\n1️⃣ 毎食1種類のタンパク質食品を含める\n朝食：卵・牛乳・ヨーグルト・チーズのいずれか\n昼食：肉・魚・豆腐・卵のいずれか\n夕食：魚か豆腐（週2〜3回は肉類）\n\n2️⃣ 1日2〜3回の乳製品（カルシウム補給）\n\n3️⃣ お皿の半分は野菜\nさまざまな色の野菜（色ごとに異なる栄養素）\n\n4️⃣ 白米→雑穀米、白パン→全粒粉パン\n精製炭水化物を減らして血糖スパイクを防ぐ\n\n5️⃣ 飲み物は水だけ（ジュース・炭酸飲料は禁止）\n100%果汁でも糖分が多い\n\n🚫 絶対NG：\n• 空腹にさせる（成長を妨げ、筋肉が減少する）\n• 食べ物を賞罰に使う\n• 子どもだけがダイエット（家族全員で取り組む）\n• 夜食（特に夜9時以降→成長ホルモンの正常分泌を妨げる）","tip":"食事中はテレビやスマホをオフに。画面を見ながら食べると、脳が満腹感を正確に感じられず、無意識に食べ過ぎてしまいます。"},"ans_obesity_exercise":{"type":"answer","title":"成長期のお子さんに合った運動","content":"📌 目標：1日60分以上の中程度の強度の運動（WHO推奨）\n中程度＝少し息が上がるが、会話はできる程度\n\n✅ おすすめの運動：\n• 早歩き：家族でご飯の後に30分散歩\n• 水泳：関節への負担なく全身を使う\n• サイクリング、サッカー、バスケ、バドミントン\n• 縄跳び：成長板を刺激し、心肺機能も向上\n\n💪 筋力トレーニングについての誤解：\n「子どもが筋トレをすると背が伸びなくなる？」→ ❌ 誤った常識です！\n米国小児科学会2020・2024年ガイドライン：積極的に推奨\n• 適切に設計された筋力トレーニングは成長板・身体に害なし\n• むしろ骨密度の向上に有益\n• 肥満のお子さんには有酸素運動より先に効果が出ることも\n\n✅ おすすめの筋力トレーニング（自重）：\n• スクワット、腕立て伏せ、プランク、ランジ\n\n📅 運動を続けるコツ：\n1. お子さんが好きな運動を選ぶ（強制した運動は続かない）\n2. 親と一緒に（親が定期的に運動するとお子さんも5倍活発に）\n3. 日常の中に動きを増やす：エレベーターより階段、近距離は歩く","tip":"「30分運動する」は重く感じますが、「運動服に着替える」は簡単です。習慣を2分以内にできる最小の行動に分解しましょう。"},"ans_obesity_lifestyle":{"type":"answer","title":"生活習慣の改善——毎日1%の魔法","content":"🌟 毎日1%変化する魔法：\n今日一段多く階段を上り、明日コップ一杯多く水を飲む——それが積み重なると6ヶ月後には全然違うお子さんになっています。\n（毎日1%の改善＝1年後に約37倍の向上）\n\n📱 スクリーンタイムを減らす：\n• 6歳以上：学習以外の目的で1日2時間以内（米国小児科学会）\n• スクリーン5時間以上：肥満リスク5倍\n• 食事中の画面は禁止（満腹感の認識を妨げる）\n\n😴 十分な睡眠：\n• 小学生（6〜12歳）：1日9〜12時間\n• 中高生（13〜18歳）：8〜10時間\n• 睡眠不足→肥満リスク58%増加\n• 睡眠不足→食欲増進ホルモン（グレリン）↑、満腹ホルモン（レプチン）↓\n\n🏠 環境改善が意志力より重要：\n• 冷蔵庫に果物・野菜を入れる\n• お菓子は買わない（「ないから食べない」は「あっても我慢する」より簡単）\n• 水をテーブルの上に、炭酸飲料は冷蔵庫の奥に\n• リモコンは引き出しの中、縄跳びをリビングに\n\n👨‍👩‍👧 家族全員で取り組む：\n• 家族そろっての食事を週3回以上→肥満リスク12%低減\n• 親が野菜を好んで食べると、お子さんも野菜を食べる確率が3倍に","tip":"最も効果的な肥満治療は、家族全員の生活習慣の変化です。お子さん一人の戦いにしないでください。"},"ans_obesity_medicine":{"type":"answer","title":"小児肥満の薬物療法——補助的な手段です","content":"薬物療法は最初の選択肢ではありません。特定の条件下で、生活習慣改善の補助として検討します。\n\n📌 薬物療法を開始する条件（すべてに該当する場合）：\n• 12歳以上\n• BMIが95パーセンタイル以上\n• 合併症がある（糖尿病前症・高血圧・脂質異常症など）\n• 6ヶ月以上生活習慣を改善しても効果不十分\n\n💊 使用できる薬：\n\n1. メトホルミン（最もよく使われる）\n• もともとは糖尿病の薬、インスリン抵抗性を改善し、食欲もわずかに低下\n• 体重減少効果：平均2〜3kg（多くはない）\n• 副作用：初期の下痢・腹痛（1〜2週間で多くの場合改善）\n• メリット：安全性が実証されており、価格が安い\n\n2. GLP-1受容体アゴニスト（強力だが高価）\n• 代表薬：Saxenda（リラグルチド）、Wegovy（セマグルチド）\n• 体重減少：10〜15%（強力な効果）\n• 12歳以上の肥満青少年に承認済み（STEP TEENS試験）\n• 副作用：初期の吐き気・嘔吐（ゆっくり増量すれば多くは改善）\n• デメリット：保険適用外、月30〜50万ウォン\n• 中断すると体重が戻るリスクがある\n\n⚠️ 薬は生活習慣の改善と必ず並行して行うことで効果が出ます。","tip":"薬はあくまでツールです。服薬中も食事管理・運動を必ず一緒に行いましょう。"},"metabolism_prediabetes":{"type":"answer","title":"糖尿病前症——今が逆転できるゴールデンタイムです","recommend":true,"content":"血糖が正常より高いが、糖尿病の基準には達していない状態を「糖尿病前症」といいます。\n\n📊 診断基準：\n• 糖尿病前症：空腹時血糖100〜125mg/dL または HbA1c 5.7〜6.4%\n• 糖尿病：空腹時血糖≥126mg/dL または HbA1c≥6.5%\n\n⚠️ 小児青少年の2型糖尿病が成人より危険な理由：\n• 30歳未満での発症：心筋梗塞のリスク5倍、脳卒中3倍、死亡3倍\n• 若いほど血管が長く傷つけられる\n• 成人より進行が速く、合併症も早く現れる\n\n✅ 朗報——ゴールデンタイム：\n• DPP研究（2002年）：生活習慣改善→糖尿病発症を58%予防\n• メトホルミン単独では：31%（生活習慣改善の半分の効果）\n• 4〜6ヶ月の生活習慣改善で十分に逆転可能\n\n🔬 推奨される検査（10歳以上かつ過体重＋危険因子がある場合）：\n• 空腹時血糖\n• HbA1c\n• 空腹時インスリン＋HOMA-IR\n• OGTT（必要時）\n\n💊 治療の優先順位：\n1位：生活習慣改善（食事・運動）\n→ 体重5〜7%減少で糖尿病への進行が著しく減少\n2位：メトホルミン（6ヶ月間効果なしの場合）","tip":"糖尿病前症の段階で生活習慣改善で逆転させる方が、薬より2倍効果的です。今が変えられる最後のチャンスです。"},"metabolism_lipid":{"type":"answer","title":"脂質異常症——10代で動脈硬化が始まることも","content":"高コレステロールは肥満のお子さんに非常に多く見られます（40〜50%に脂質異常症）。\n\n📊 診断基準：\n• 総コレステロール≥200mg/dL\n• LDL（悪玉コレステロール）≥130mg/dL\n• HDL（善玉コレステロール）男の子<40、女の子<50mg/dL\n• 中性脂肪≥130mg/dL\n\n⚠️ なぜ怖いのか？\n10代の子どもの血管ですでに脂肪線条（早期動脈硬化）が見つかった研究があります。\n放置すると→血管内に硬いプラークが形成→血管が狭くなる→若くても心筋梗塞・脳卒中のリスク\n\n✅ 治療効果（体重10%減少で）：\n• 収縮期血圧が10〜15mmHg低下\n• LDLが約10〜15%減少\n• HDLが約8〜10%増加\n• 中性脂肪が約30%減少（最も速く反応）\n\n💊 薬物療法（6〜12ヶ月の生活習慣改善が不十分な場合）：\n• スタチン系（10歳以上から使用可能）\n• LDLを30〜50%減少させる効果\n• 長期使用の安全性が確認されており、成長・思春期・性ホルモンへの影響なし\n\n📌 中性脂肪を素早く下げる方法：\n• 炭酸飲料→水に替える（2週間で効果）\n• 精製炭水化物を減らす\n• Omega-3の摂取（週2〜3回の青魚）","tip":"高コレステロールは症状がないため、知らないまま過ぎることが多いです。肥満のお子さんは必ず血液検査を受けましょう。"},"metabolism_fatty_liver":{"type":"answer","title":"脂肪肝——静かだが深刻な病気です","content":"肥満のお子さんの約40%に脂肪肝があります。ほとんどは全く症状がありません！\n\n🔍 脂肪肝とは？\n肝臓の重さの5%以上が脂肪で占められた状態\n超音波検査で肝臓が白く明るく見えます（bright liver）\n\n⚠️ 原因：\n• 内臓脂肪の影響：腹腔深部の内臓脂肪から脂肪酸が直接肝臓に流れ込む\n• インスリン抵抗性の重なり：肝臓での脂肪分解が妨げられ、脂肪が蓄積\n• 液体果糖の害：炭酸飲料・ジュースの果糖は肝臓でしか代謝できない\n\n📊 進行の段階：\n単純性脂肪肝→脂肪性肝炎（NASH）→肝線維化→肝硬変\n（最初の3段階は逆転可能）\n\n✅ 治療：\n現在、小児青少年の脂肪肝に承認された専用薬はない\n→生活習慣改善が唯一の治療法\n\n• 体重3〜5%減：脂肪が減り始め、ALTが改善\n• 体重7〜10%減：肝臓の炎症・線維化も改善\n• 注意：急激な減量は脂肪肝を悪化させる（週0.5〜1kgのゆっくりしたペースで）\n• 炭酸飲料・ジュース→水に変えるだけで最も速く効果\n• 低炭水化物食が最も効果的\n• 運動は体重が減らなくても、単独で肝臓の脂肪を減らす効果がある","tip":"炭酸飲料を水に変えるだけで脂肪肝が改善することも。果糖が脂肪肝の主犯です。"},"metabolism_spise":{"type":"answer","title":"HOMA-IR & SPISE——インスリン抵抗性を正確に測る方法","content":"📊 HOMA-IR（インスリン抵抗性の評価）：\n計算式：（空腹時血糖×空腹時インスリン）÷405\n\n⚠️ 重要：小児青少年の基準は成人と異なります！（成人の基準2.5を直接当てはめてはいけません）\n• 思春期前の男の子：2.67以上で疑い\n• 思春期前の女の子：2.22以上で疑い\n• 思春期の男の子：5.22以上で疑い\n• 思春期の女の子：3.82以上で疑い\n\n空腹時インスリンの基準：\n• 5〜15µU/mL：正常\n• 15以上：高インスリン血症の疑い\n• 20以上：高インスリン血症の確認\n\n📊 SPISE指数（新しい指標）：\n空腹時インスリンなしでインスリン感受性を評価できます！\n計算式：600×HDL^0.185 / TG^0.2×BMI^1.338\n\n✅ SPISEのメリット：\n• 追加採血なしで基本の血液検査値から計算可能\n• インスリンより結果が安定している\n• 2025年の研究：メタボリックシンドロームの予測精度86%（HOMA-IRより高い）\n\n💡 SPISEを改善する戦略：\n• BMIを下げる（最も大きな影響：1.338乗で計算される）\n• HDLを上げる：週5回の有酸素運動、Omega-3の摂取\n• 中性脂肪を下げる：炭酸飲料→水、精製炭水化物を減らす\n  （2週間以内に最も速く反応）","tip":"SPISEを3〜6ヶ月ごとに計算することで、お子さんの生活習慣改善の効果を数値で確認できます。"},"nutrition_vitamin_d":{"type":"answer","title":"ビタミンD・カルシウム・マグネシウム——成長の3大支柱","content":"この3つは「三角形の協力関係」にあります：\nビタミンD（鍵）→カルシウム（原材料）→マグネシウム（Dを活性化）\nどれか一つが不足すると、効果が大幅に落ちます。\n\n☀️ ビタミンD：\n• 韓国の子ども・青少年の約70〜80%が不足状態\n• ビタミンD不足時のカルシウム吸収率：10〜15%\n• ビタミンD十分時のカルシウム吸収率：30〜40%（2〜3倍の差！）\n\n💡 重要：いくら牛乳を飲んでも、ビタミンDがないと吸収されません\n\n推奨量：\n• 0〜12ヶ月：400IU\n• 1〜18歳：600IU\n• 不足状態：1,000〜2,000IU\n\n⚠️ 韓国の冬（11〜2月）：日光だけでは合成できない\n（北緯33度以上、冬はUVBが不十分）\n→ サプリメントでの補充が必須\n\n目標血中濃度：30〜50ng/mL\nサプリの選び方：D3（コレカルシフェロール）>D2\n\n🥛 カルシウム：\n年齢別の1日推奨量：\n• 1〜3歳：700mg（牛乳約3杯）\n• 4〜8歳：1,000mg（牛乳約4〜5杯）\n• 9〜18歳：1,300mg（牛乳約6杯）← 急成長期、必要量が最高\n\n最適な食品：牛乳（200mL＝220mg）、小魚（骨ごと食べる）、豆腐、チーズ\n炭酸飲料・塩分の多い食事・カフェインはカルシウムを奪います\n\n🥜 マグネシウム：\n• ビタミンDを活性化するための必須補酵素\n• カルシウムとマグネシウムを2:1の比率で摂ることを推奨\n• 最適な食品：ナッツ類（かぼちゃの種30g＝150mg）、濃い緑の葉野菜、全粒穀物","tip":"毎日牛乳2〜3杯＋ビタミンDサプリ＋多種類の野菜・ナッツ＝成長の基本の組み合わせです。"},"nutrition_protein":{"type":"answer","title":"タンパク質——成長の原材料","content":"タンパク質がなければ、どんなに成長ホルモンを打っても意味がありません！\nタンパク質は筋肉、骨、ホルモン、免疫細胞、すべての原材料です。\n\n📊 年齢別の1日必要量（体重1kgあたり）：\n• 1〜3歳：1.0〜1.2g/kg\n• 4〜13歳：0.95g/kg\n• 14〜18歳：0.85g/kg\n\n実際の例：\n• 体重20kg、6歳→1日約19g\n• 体重30kg、9歳→1日約28.5g\n• 体重50kg、15歳→1日約42.5g\n→鶏胸肉100g（タンパク質23g）＋卵1個（6g）で体重30kgの子の1日分を十分にカバーできます\n\n🥩 主な食品のタンパク質含量：\n• 鶏胸肉100g：23g\n• ツナ缶100g：24g（最高）\n• 中くらいの卵1個：6g\n• 牛乳200mL：6.4g\n• 豆腐100g：8g\n• ゆでた豆類100g：9g\n\n✅ 1日の食事例（体重30kg、目標30g）：\n• 朝食：卵1個（6g）＋牛乳200mL（6.4g）\n• 昼食：鶏胸肉80g（18g）\n• 夕食：豆腐1/4丁（8g）\n→合計38.4g ✓\n\n⚠️ 過剰摂取に注意（2.5g/kg以上）：\n腎臓への負担、カルシウムの排泄増加、脱水のリスク","tip":"毎食1種類のタンパク質食品を含めるだけで、1日の推奨量が自然に満たされます。"},"nutrition_zinc_iron":{"type":"answer","title":"亜鉛と鉄——重要なサポート栄養素","content":"🔵 亜鉛——「成長のミネラル」\n\n亜鉛が不足すると、成長ホルモンが正常に分泌されていてもIGF-1が減少します！\n\n歴史的な発見：1958年、Prasad博士\nイランで21歳男性が10歳の発達状態→亜鉛欠乏を確認\n→亜鉛の補充後、1年で12.7〜15.2cmも成長！\n\n年齢別の推奨量：\n• 1〜3歳：3mg / 4〜8歳：5mg / 9〜13歳：8mg\n• 14〜18歳：男の子11mg、女の子9mg\n\n最高の食品：牡蠣（100g＝16〜90mg、1日の推奨量をはるかに超える！）\n動物性：牛肉、鶏肉、卵、乳製品\n植物性：かぼちゃの種、豆類、ナッツ類（フィチン酸のため吸収率が低い）\n\n亜鉛不足→食欲低下→さらに悪化という悪循環に注意！\n\n🔴 鉄——酸素を運ぶエネルギー源\n\n欠乏すると成長遅延のリスクが2倍\nメカニズム：鉄不足→酸素供給↓→エネルギー不足→細胞分裂↓→IGF-1が減少\n\n年齢別の推奨量：\n• 1〜3歳：7mg / 4〜8歳：10mg / 9〜13歳：8mg\n• 14〜18歳：男の子11mg、女の子15mg（生理による損失のため）\n\n最高の食品：\n• ヘム鉄（動物性、吸収率15〜35%）：牛のレバー、鶏のレバー、牛肉、牡蠣\n• 非ヘム鉄（植物性、吸収率2〜20%）：白豆、レンズ豆、豆腐、ほうれん草\n\n核心のコツ：ビタミンCと一緒に摂ると吸収率が2〜3倍アップ\n\n欠乏のサイン：異食症（氷をかじりたくなる）＝鉄欠乏の特徴的な症状","tip":"牡蠣は亜鉛の王者です。月に一度食べるだけでも亜鉛補給に大きく役立ちます。"},"nutrition_picky":{"type":"answer","title":"偏食のお子さんへの対処法——忍耐が鍵です","content":"🥦 野菜を食べない子：\n• 野菜を「隠す」：細かく刻んでひき肉に混ぜる、炒めご飯に入れる\n• 形を変える：にんじんを星形・ハート形にクッキー型で切る\n• ソースにつけて食べる：ヨーグルトソース、ピーナッツバター\n• 甘い野菜から始める：ミニトマト、にんじん、さつまいも、とうもろこし\n\n🥩 肉を食べない子：\n• 固い食感や臭みが嫌なことが多い→柔らかく調理：ミートボール、ハンバーグ\n• 肉を食べなくてもOK：魚・卵・豆腐・豆類で十分タンパク質を補える\n\n🥛 牛乳を飲まない子：\n• 温度や味を変える：温めて飲む、ほんの少しカカオを加える\n• シリアルに混ぜる、バナナと一緒にスムージーにする\n• 代替品：ヨーグルト、チーズ、カルシウム強化豆乳、小魚\n\n✅ 偏食を克服する7つの原則：\n1. 忍耐：新しい食べ物は10〜15回接触して初めて受け入れる→今日食べなくてもあきらめない\n2. 絶対に強制しない：「全部食べてから！」→トラウマになることも\n3. まず親がお手本を：子どもの前でおいしそうに食べる\n4. ほんの一口でも心から褒める：「今日ほうれん草を一口食べたね、えらい！」\n5. 一緒に料理する：自分で作ったものは食べたくなる\n6. 選択肢を与える：「ブロッコリーにする？にんじんにする？」（どちらも野菜）\n7. 食事の時間を楽しく：食卓で叱られ続けると食事そのものが嫌になる","tip":"偏食は意志の問題ではありません。子どもの脳が新しい味を受け入れるのに時間が必要なだけです。10〜15回提供すれば、多くの場合受け入れます。"},"nutrition_practical":{"type":"answer","title":"身長を伸ばすための実践食——これだけ守ればOK","content":"📋 5つの核心原則（難しく考えず、これだけやれば大丈夫！）：\n\n1️⃣ 毎食1種類のタンパク質食品\n朝食：卵・牛乳・ヨーグルト・チーズ・ピーナッツバタートーストのいずれか\n昼食：肉・魚・卵・豆腐のいずれか\n夕食：魚か豆腐（週3〜4回は肉類）\n\n2️⃣ 1日2〜3回の乳製品\n朝の牛乳1杯＋おやつのヨーグルト＋就寝前の牛乳1杯\n→1日のカルシウム摂取440〜660mgを確保\n\n3️⃣ 毎食1〜2種類のカラフルな野菜\n緑（ほうれん草・ブロッコリー）＋橙（にんじん・パプリカ）＋白（大根・キャベツ）\n\n4️⃣ 全粒穀物＋果物\n白米→雑穀米、白いパン→全粒粉パン\n果物：1日2〜3回（ジュースではなく生の果物）\n\n5️⃣ 1週間単位でバランスを取る\n今日野菜が少なかった分は明日補えばいい\n\n🌙 就寝前のルーティン：\n• 就寝前：温めた牛乳一杯（カルシウム＋トリプトファンで睡眠を促進）\n• 就寝前の高糖分おやつ：絶対NG（インスリン↑→成長ホルモン↓）\n\n🏆 成長の最強コンボ：\n十分な睡眠＋バランスの良い食事＋定期的な運動\n→成長ホルモンの最大分泌＋骨・筋肉の最適な成長","tip":"完璧な食事より、80点の食事を毎日続ける方が効果的です。今日から一つずつ変えていきましょう。"},"booking":{"type":"booking"}},
"es":{"start":{"type":"question","text":"¡Hola! Soy el asesor de salud y crecimiento de Samsung Jarada. ¿En qué puedo ayudarte hoy?","options":[{"text":"Me preocupa la estatura de mi hijo","next":"growth_main"},{"text":"Quiero saber sobre la terapia con hormona de crecimiento","next":"growth_hormone"},{"text":"Me preocupa la pubertad precoz","next":"puberty_main"},{"text":"Mi hijo tiene sobrepeso u obesidad","next":"obesity_main"},{"text":"Mi hijo tiene problemas de glucosa o hígado graso","next":"metabolism_main"},{"text":"Quiero conocer la nutrición para el crecimiento","next":"nutrition_main"}]},"growth_main":{"type":"question","text":"¿Cuántos años tiene tu hijo/a?","options":[{"text":"0–3 años (bebé/niño pequeño)","next":"growth_0_3"},{"text":"4–8 años (preescolar/primaria temprana)","next":"growth_4_8"},{"text":"9–13 años (primaria tarde/secundaria)","next":"growth_9_13"},{"text":"14 años o más","next":"growth_14plus"},{"text":"El crecimiento parece haberse frenado de repente","next":"growth_slowdown"},{"text":"Quiero saber sobre la prueba de edad ósea","next":"growth_boneage"}]},"growth_0_3":{"type":"question","text":"¿Cuál es la situación de crecimiento de tu bebé (0–3 años)?","options":[{"text":"Nació pequeño y no está recuperando el retraso","next":"ans_sga"},{"text":"Nació normal pero lleva un retraso","next":"ans_growth_0_3_normal"},{"text":"Los padres son bajos","next":"ans_familial_short"},{"text":"¿Cuán bajo es demasiado bajo para hacerse pruebas?","next":"ans_growth_check_needed"}]},"growth_4_8":{"type":"question","text":"¿Cómo está el crecimiento del niño de 4–8 años?","options":[{"text":"Ambos padres son bajos","next":"ans_familial_short"},{"text":"Está entre los 3–5 más bajos de su clase","next":"ans_growth_check_needed"},{"text":"Parece crecer menos de 4 cm al año","next":"growth_slowdown"},{"text":"¿Qué pruebas necesitamos?","next":"ans_growth_check_needed"}]},"growth_9_13":{"type":"question","text":"¿Cuál es la situación del niño de 9–13 años?","options":[{"text":"La pubertad aún no ha comenzado y es bajo","next":"ans_9_13_no_puberty"},{"text":"La pubertad llegó pronto — me preocupa la estatura final","next":"ans_9_13_early_puberty"},{"text":"La pubertad está en etapa media/tardía — ¿hay oportunidad de tratamiento?","next":"ans_9_13_late_puberty"},{"text":"El crecimiento se ha desacelerado notablemente","next":"growth_slowdown"}]},"growth_hormone":{"type":"question","text":"¿Qué aspecto de la terapia con HC te interesa?","options":[{"text":"¿Es mi hijo candidato al tratamiento?","next":"gh_eligible"},{"text":"¿Cuánto más alto podría crecer?","next":"gh_effect"},{"text":"¿Cuáles son los costos y la cobertura del seguro?","next":"gh_cost"},{"text":"¿Hay efectos secundarios?","next":"gh_safety"},{"text":"¿Cómo se administran las inyecciones?","next":"gh_injection"},{"text":"¿Cuándo empezamos y terminamos el tratamiento?","next":"gh_timing"}]},"gh_eligible":{"type":"question","text":"¿Cuál es el diagnóstico actual de tu hijo?","options":[{"text":"Deficiencia de hormona de crecimiento","next":"ans_gh_deficiency"},{"text":"Síndrome de Turner (niña, cromosomas)","next":"ans_gh_turner"},{"text":"Pequeño para la edad gestacional (SGA) — no está recuperando","next":"ans_gh_sga"},{"text":"Todas las pruebas normales — simplemente bajo (TBI)","next":"ans_gh_iss"},{"text":"Prader-Willi / Noonan / Enfermedad renal crónica","next":"ans_gh_other"},{"text":"Aún no nos han hecho pruebas","next":"ans_gh_no_test"}]},"puberty_main":{"type":"question","text":"¿Cuáles son tus preocupaciones sobre la pubertad precoz?","options":[{"text":"Mi hija parece estar desarrollando los senos","next":"puberty_girl"},{"text":"Los testículos de mi hijo parecen agrandados","next":"puberty_boy"},{"text":"Olor corporal/vello púbico/acné (sin cambios en senos/testículos)","next":"ans_false_puberty"},{"text":"La estatura está aumentando muy rápidamente","next":"ans_rapid_growth"},{"text":"Quiero saber sobre el tratamiento GnRH para pubertad precoz","next":"gnrh_treatment"},{"text":"Quiero saber sobre la terapia combinada GnRH + HC","next":"gnrh_gh_combo"}]},"puberty_girl":{"type":"question","text":"¿Cuántos años tiene tu hija?","options":[{"text":"Aún no tiene 8 años (umbral de pubertad precoz)","next":"puberty_girl_under8"},{"text":"Entre 8 y 10 años","next":"puberty_girl_8_10"},{"text":"10 años o más — desarrollo mamario reciente","next":"puberty_girl_normal"},{"text":"No sé si es tejido mamario o grasa","next":"puberty_girl_unsure"}]},"puberty_girl_8_10":{"type":"question","text":"Desarrollo mamario entre 8–10 años — ¿cuál es la situación?","options":[{"text":"Lo noté recientemente por primera vez","next":"puberty_girl_new"},{"text":"Ha crecido notablemente en los últimos 3–6 meses","next":"puberty_girl_progress"},{"text":"Lleva 6+ meses con poco cambio","next":"puberty_girl_stable"},{"text":"No sé si es tejido mamario o grasa","next":"puberty_girl_unsure"}]},"puberty_boy":{"type":"question","text":"¿Qué cambios notas en tu hijo?","options":[{"text":"Los testículos parecen agrandados (menor de 9 años)","next":"ans_boy_precocious"},{"text":"Cambio de voz, crecimiento acelerado","next":"ans_boy_signs"},{"text":"Solo vello púbico/olor corporal — sin cambios en los testículos","next":"ans_boy_false_puberty"},{"text":"La pubertad parece muy tardía (14 años o más)","next":"ans_boy_delayed"}]},"obesity_main":{"type":"question","text":"¿Qué aspecto del peso u obesidad de tu hijo te preocupa?","options":[{"text":"¿Cuáles son los criterios para la obesidad infantil?","next":"obesity_diagnosis"},{"text":"¿La obesidad afecta la estatura?","next":"obesity_height"},{"text":"¿Puede la obesidad causar pubertad precoz?","next":"obesity_puberty"},{"text":"La nuca o las axilas se han oscurecido","next":"ans_acanthosis"},{"text":"¿Cómo manejamos la obesidad infantil?","next":"obesity_management"}]},"obesity_management":{"type":"question","text":"¿Qué aspecto del manejo de la obesidad te interesa?","options":[{"text":"Enfoques dietéticos","next":"ans_obesity_diet"},{"text":"Recomendaciones de ejercicio","next":"ans_obesity_exercise"},{"text":"Cambios de estilo de vida en general","next":"ans_obesity_lifestyle"},{"text":"¿Cuándo es apropiada la medicación?","next":"ans_obesity_medicine"}]},"metabolism_main":{"type":"question","text":"¿Qué problema metabólico te preocupa?","options":[{"text":"El azúcar en sangre está alta (prediabetes)","next":"metabolism_prediabetes"},{"text":"Colesterol o triglicéridos altos","next":"metabolism_lipid"},{"text":"Se encontró hígado graso","next":"metabolism_fatty_liver"},{"text":"Quiero entender HOMA-IR y SPISE","next":"metabolism_spise"}]},"nutrition_main":{"type":"question","text":"¿Qué aspecto de la nutrición para el crecimiento te interesa?","options":[{"text":"Vitamina D, calcio y magnesio","next":"nutrition_vitamin_d"},{"text":"¿Cómo afecta la proteína al crecimiento?","next":"nutrition_protein"},{"text":"¿Son importantes el zinc y el hierro?","next":"nutrition_zinc_iron"},{"text":"Mi hijo es muy selectivo con la comida","next":"nutrition_picky"},{"text":"¿Cómo es una dieta efectiva para el crecimiento en la práctica?","next":"nutrition_practical"}]},"ans_sga":{"type":"answer","title":"Pequeño para la Edad Gestacional (PEG) — La detección temprana es clave","recommend":true,"content":"Los bebés que nacen con peso o talla por debajo del percentil 3 para su edad gestacional se llaman «Pequeño para la Edad Gestacional (PEG)».\n\n✅ Buena noticia: el 85–90% de estos niños se pone al día de manera natural en los primeros 2 años.\n\n⚠️ Cuándo preocuparse:\n• Talla aún por debajo del percentil 3 a los 4 años (aprox. 10–15%)\n• Estos niños pueden recibir tratamiento con hormona de crecimiento cubierto por el seguro desde los 4 años\n\n📊 Resultados del tratamiento: ganancia promedio de 5–7 cm\n• Cuanto antes se empiece, mejor será el resultado\n• Empezar en la pubertad limita la efectividad\n\n📌 A tener en cuenta:\n• Medir la talla cada 3 meses para registrar la velocidad de crecimiento\n• Esperar recuperación espontánea hasta los 4 años; si no ocurre, iniciar tratamiento","tip":"Si la recuperación espontánea no ocurre antes de los 4 años, acudir a endocrinología pediátrica a los 4 años es la mejor opción."},"ans_growth_0_3_normal":{"type":"answer","title":"Retraso del crecimiento con nacimiento normal — Primero hay que encontrar la causa","recommend":true,"content":"Cuando un niño nace con peso normal pero su crecimiento se va quedando atrás, las principales causas son:\n\n1️⃣ Hipotiroidismo\n• Causa endocrina más frecuente\n• Síntomas: menos actividad, piel seca, estreñimiento, cansancio\n• Se confirma con una analítica sencilla; el crecimiento se normaliza con tratamiento\n\n2️⃣ Déficit de hormona de crecimiento\n• En lactantes puede manifestarse como hipoglucemia o ictericia prolongada\n• Cara redondeada, aspecto regordete\n• La IGF-1 en sangre permite hacer el cribado inicial\n\n3️⃣ Nutrición insuficiente\n• Poca leche materna, alimentación muy selectiva, etc.\n• Si el peso también está bajo, lo más probable es que sea un problema nutricional\n\n4️⃣ Enfermedad crónica\n• Cardiopatía congénita, nefropatía, enfermedades digestivas, etc.\n• Sospecha si hay infecciones frecuentes, dificultad para alimentarse o vómitos\n\n📌 Análisis recomendados: función tiroidea, IGF-1, hemograma completo, radiografía de edad ósea","tip":"Los 0–3 años son la etapa de mayor crecimiento. Si se detecta un problema ahora, aún hay tiempo para ponerse al día."},"ans_familial_short":{"type":"answer","title":"Talla baja familiar — Primero evaluar con precisión","content":"Cuando ambos progenitores son bajos, es probable que el niño también lo sea. Esto se llama «talla baja familiar».\n\n📌 Características:\n• Velocidad de crecimiento normal (5–6 cm/año)\n• Edad ósea acorde con la edad cronológica\n• Sigue una curva baja pero estable\n• Al menos uno de los progenitores está por debajo de la media\n\n🧮 Talla diana genética (TDG):\n• Niños: (talla padre + talla madre + 13) ÷ 2 — margen ±5–10 cm\n• Niñas: (talla padre + talla madre – 13) ÷ 2 — margen ±5–10 cm\n\nEjemplo: padre 170 cm, madre 158 cm\n→ Hijo estimado: (170+158+13)/2 = 170,5 cm (rango real 160–180 cm)\n→ Hija estimada: (170+158–13)/2 = 157,5 cm (rango real 147–167 cm)\n\n⚠️ Incluso en talla baja familiar, consultar si:\n• La talla actual está 10 cm o más por debajo de lo estimado\n• La velocidad de crecimiento cae de repente\n• Crece menos de 4 cm al año\n\n✅ La talla baja familiar pura no necesita tratamiento; con un estilo de vida saludable es suficiente.","tip":"Para saber si es genética u otra causa, se recomienda hacer una radiografía de edad ósea y un análisis de IGF-1."},"ans_growth_check_needed":{"type":"answer","title":"Se recomienda evaluación especializada","recommend":true,"content":"Si los progenitores tienen talla normal pero el niño es significativamente bajo, o está muy por debajo de la talla estimada, es necesaria una evaluación completa.\n\n🔬 Estudios recomendados:\n\n1. Radiografía de edad ósea ⭐ (la más importante)\n• Radiografía de la mano izquierda, unos 5 minutos, completamente indolora\n• Evalúa el potencial de crecimiento y predice la talla final\n• El doble de precisa que la fórmula de talla de los padres (error ±3–5 cm vs ±8–10 cm)\n\n2. Análisis de IGF-1 en sangre\n• Cribado de la función de la hormona de crecimiento\n• Una sola extracción, sin ayunas\n\n3. Función tiroidea (TSH, T4 libre)\n• El hipotiroidismo es causa frecuente de retraso del crecimiento\n\n4. Hemograma completo\n• Anemia, inflamación, función hepática y renal\n\n5. Prueba de estimulación de GH (si se indica)\n• Si el IGF-1 está bajo o la velocidad de crecimiento es anormal\n• Unas 2–3 horas, 4–6 extracciones de sangre (catéter venoso único)\n• Pico < 10 ng/mL sugiere déficit de GH","tip":"Cuanto antes se encuentre la causa, mejor será el resultado del tratamiento. Con las placas de crecimiento aún abiertas, no espere más de 6 meses: consulte al especialista."},"ans_9_13_no_puberty":{"type":"answer","title":"Etapa prepuberal — Ahora es el momento de oro para el tratamiento","recommend":true,"content":"Si la pubertad aún no ha empezado, ¡estáis en el momento de oro para el tratamiento del crecimiento!\n\n🌟 ¿Por qué es mejor antes de la pubertad?\n• Las placas de crecimiento están todavía bien abiertas\n• El tratamiento con GH es aproximadamente el doble de eficaz que cuando ya ha empezado la pubertad\n• Dos o más años de tratamiento aumentan significativamente los resultados\n\n📊 La edad ósea confirma el potencial restante:\n• Niñas con edad ósea < 11 años: amplia oportunidad de tratamiento\n• Niños con edad ósea < 12 años: amplia oportunidad de tratamiento\n\n✅ Evaluaciones recomendadas:\n1. Radiografía de edad ósea\n2. Análisis de IGF-1\n3. Prueba de estimulación de GH (si se indica)\n\n💰 Si se cumplen los criterios del seguro:\n• Copago: aprox. 210.000–360.000 wones/mes (30% del coste del medicamento)\n• Ganancia potencial: 5–13 cm según el diagnóstico","tip":"Una vez que empieza la pubertad, las placas de crecimiento se cierran rápidamente. Consúltenos ahora, mientras hay más opciones disponibles."},"ans_9_13_early_puberty":{"type":"answer","title":"Pubertad precoz + preocupación por la talla — Hay que evaluar las dos cosas","recommend":true,"content":"Que la pubertad haya llegado pronto significa que el «estirón» empezará antes de lo normal, y las placas de crecimiento se cerrarán también antes.\n\n⚠️ La paradoja de la pubertad precoz:\n• A corto plazo: el niño puede ser 5–8 cm más alto que sus compañeros\n• A largo plazo: el cierre prematuro de las placas puede resultar en una talla final 5–15 cm por debajo del potencial genético\n\n📊 Evidencia científica (seguimiento europeo a largo plazo):\n• Pubertad precoz no tratada: las niñas acaban unos 10 cm por debajo de su talla diana genética\n• Los niños acaban unos 20 cm por debajo\n\n🔍 Estudios necesarios ahora:\n1. Radiografía de edad ósea: ¿cuánto potencial queda?\n2. Test de estimulación con GnRH: ¿es pubertad precoz central verdadera?\n3. Valoración de GH: evaluación simultánea del estado de la hormona de crecimiento\n\n💡 Opciones de tratamiento:\n• Análogos de GnRH (supresión de la pubertad)\n• En combinación con GH si es necesario → ganancia adicional de 4–6 cm","tip":"La pubertad precoz no tiene por qué significar baja estatura: el tratamiento a tiempo puede proteger la talla final. Consulta hoy a un endocrinólogo pediátrico."},"ans_9_13_late_puberty":{"type":"answer","title":"Pubertad media o tardía — Evaluemos las oportunidades que quedan","recommend":true,"content":"En la pubertad media o tardía, una radiografía de edad ósea es el primer paso para saber cuánta oportunidad queda.\n\n📊 Posibilidad de tratamiento según la edad ósea:\n• Niñas < edad ósea 11 años: buena respuesta al tratamiento\n• Niñas edad ósea 11–12 años: efecto limitado\n• Niñas edad ósea 12–13 años: efecto mínimo (el seguro también está llegando a su fin)\n• Niñas edad ósea ≥ 14 años: el tratamiento no tiene sentido\n\n• Niños < edad ósea 12 años: buena respuesta\n• Niños edad ósea 12–14 años: limitado\n• Niños edad ósea ≥ 16 años: el seguro finaliza\n\n⏱️ El tiempo es clave:\nTras la primera regla solo quedan unos 5–7 cm de crecimiento, y a un ritmo de apenas 2–3 cm/año.\nEl año o dos antes de la primera regla es la última ventana para una ganancia significativa.\n\n✅ Qué hacer ahora:\n• Confirmar edad ósea + predicción de talla final\n• Empezar tratamiento de inmediato si las placas siguen abiertas","tip":"No se rinda. Aunque las placas estén abiertas solo un poco, hasta unos meses de tratamiento pueden marcar la diferencia."},"growth_14plus":{"type":"answer","title":"14 años o más — Primero hay que ver el estado de las placas de crecimiento","recommend":true,"content":"A partir de los 14 años las placas de crecimiento se van cerrando, pero quizá aún no sea demasiado tarde.\n\n📊 Estado de las placas según la edad ósea:\n• Niñas con edad ósea 14–15 años: placas casi cerradas, poco margen de tratamiento\n• Niños con edad ósea 15–17 años: placas casi cerradas\n• El seguro cubre el tratamiento hasta el día anterior al 12.º cumpleaños de las niñas y al 13.º de los niños\n\n🔍 Vale la pena comprobar:\n1. Radiografía de edad ósea: la edad ósea puede diferir de la cronológica\n2. Si la pubertad empezó tarde, la edad ósea puede ser menor de lo esperado\n3. En niños de 14 años, aún puede haber margen de tratamiento en algunos casos\n\n💡 Un motivo de esperanza:\n«Retraso constitucional del crecimiento y la pubertad» (los que maduran tarde)\n• La edad ósea es 2–4 años inferior a la cronológica\n• Algunos adolescentes siguen creciendo hasta los últimos años de secundaria o la universidad\n• Más probable si alguno de los padres también maduró tarde","tip":"Antes de rendirse, haga una radiografía de edad ósea. Una edad ósea baja puede significar que aún hay un potencial de crecimiento considerable."},"growth_slowdown":{"type":"answer","title":"Ralentización brusca del crecimiento — Una señal de alerta importante","recommend":true,"content":"Una caída repentina en la velocidad de crecimiento es una señal de alerta importante.\n\n📊 Velocidad de crecimiento normal según la edad:\n• 1–2 años: 10–12 cm/año\n• 3–4 años: 8–10 cm/año\n• 5–10 años (prepuberal): 5–7 cm/año ← menos de 4 cm en este período requiere evaluación\n• Estirón puberal: 8–10 cm/año\n\n⚠️ Consultar si se da alguno de estos casos:\n• Un niño prepuberal crece menos de 4 cm al año\n• La velocidad de crecimiento ha caído notablemente en comparación con antes\n• El percentil de talla ha cruzado hacia abajo 2 o más líneas principales en 6 meses\n\n🔍 Posibles causas:\n1. Déficit de hormona de crecimiento — IGF-1 baja, pico < 10 ng/mL en la prueba de estimulación\n2. Hipotiroidismo — TSH elevada\n3. Empeoramiento de una enfermedad crónica\n4. Estrés o causas psicológicas\n5. Nutrición insuficiente\n6. Pubertad precoz — estirón rápido seguido de parada precoz","tip":"Medir la talla cada 3 meses y registrarla permite calcular la velocidad de crecimiento con precisión. Tener esos datos ayuda mucho en el diagnóstico."},"growth_boneage":{"type":"answer","title":"Prueba de edad ósea — La forma más precisa de conocer el potencial de crecimiento","content":"La prueba de edad ósea es la exploración más importante para evaluar el potencial de crecimiento de tu hijo.\n\n🔬 Cómo funciona:\nUna sola radiografía de la mano izquierda (unos 5 minutos, completamente indolora, dosis de radiación muy baja)\nLos 27 huesecillos de la mano y la muñeca permiten una evaluación muy precisa.\nDosis de radiación: aprox. 0,0001 mSv (menos que un vuelo doméstico de ida y vuelta)\n\n📊 Comparación de precisión en la predicción:\n• Fórmula de talla de los padres: error ±8–10 cm\n• Predicción por edad ósea: error ±3–5 cm (prepuberal) / ±2–3 cm (pubertad tardía)\n\n🎯 Lo que nos dice la edad ósea:\n• Estado actual de las placas de crecimiento\n• Talla final predicha sin tratamiento\n• Cuándo empezar o parar el tratamiento\n• Edad ósea >2 años por delante: riesgo de cierre prematuro\n• Edad ósea >2 años por detrás: amplio potencial de crecimiento restante\n\n⚠️ Limitaciones a conocer:\n• Puede haber variabilidad de 6–12 meses entre distintos radiólogos\n• La lectura asistida por IA está mejorando la precisión\n• Solo tiene sentido a partir de los 5 años\n\n🏥 También se usa para decidir cuándo parar el tratamiento:\n• Tratamiento de pubertad precoz: niñas edad ósea 12 años, niños 13 años\n• Tratamiento con GH: niñas edad ósea 14 años, niños 16 años","tip":"La edad ósea es la brújula del crecimiento. Conocer la edad esquelética permite saber exactamente cuánto potencial de crecimiento queda."},"ans_gh_deficiency":{"type":"answer","title":"Déficit de hormona de crecimiento — La mejor respuesta al tratamiento","recommend":true,"content":"El déficit de GH ofrece los resultados más predecibles y está cubierto por el seguro de salud.\n\n📊 Resultados del tratamiento:\n• 1.er año: media de 8–10 cm (algunos superan los 12 cm)\n• Años siguientes: 6–7 cm/año (frente a 5–6 cm de sus compañeros)\n• Mejora global: 10–13 cm\n• Con inicio muy temprano: posible superar los 20 cm\n\n⚠️ ¿Qué pasa sin tratamiento?\nDatos de seguimiento europeo a largo plazo:\n• Niñas: media de 10 cm por debajo de la talla diana genética\n• Niños: media de 20 cm por debajo\n\n💉 Protocolo de tratamiento:\n• Inyección subcutánea de 0,025–0,035 mg/kg/día\n• Niño de 30 kg → 0,75–1,05 mg/día\n• Reajustar la dosis cada 3–6 meses según el aumento de peso\n\n💰 Cobertura del seguro:\n• Con seguro: aprox. 210.000–360.000 wones/mes (30% del coste del fármaco)\n• Fin de cobertura: edad ósea 14 años (niñas) / 16 años (niños), o < 2 cm de crecimiento/año\n\n✅ Criterios de cobertura (2 pruebas de estimulación diferentes requeridas):\n• Ambos picos < 10 ng/mL\n• Talla por debajo del percentil 3\n• Edad ósea inferior a la cronológica","tip":"Empezar antes produce resultados mucho mejores. Dos o más años de tratamiento antes de la pubertad aproximadamente duplican el beneficio esperado."},"ans_gh_turner":{"type":"answer","title":"Síndrome de Turner — Cuanto antes se empiece, mejor","recommend":true,"content":"El síndrome de Turner implica la pérdida de un cromosoma X (45,X) y está cubierto por el seguro.\n\n📊 Resultados del tratamiento:\n• Ganancia media: 7–8 cm\n• Sin tratamiento: talla final media ~143 cm\n• Con tratamiento: ~150 cm — una diferencia de 7–8 cm que es muy significativa en el día a día\n\n💉 Tratamiento:\n• GH sola, o combinada con estrógenos\n• Estrógenos: normalmente se inician a dosis bajas alrededor de los 11–12 años para inducir la pubertad\n• El enfoque combinado suele dar mejores resultados en talla final\n\n💰 Criterios de cobertura:\n• Talla por debajo del percentil 3\n• Cariotipo confirmando el diagnóstico\n• No se necesita prueba de estimulación de GH (el síndrome de Turner per se es criterio de cobertura)","tip":"En el síndrome de Turner, la pubertad espontánea no siempre aparece. Es importante planificar bien el momento de inicio tanto de la GH como de los estrógenos."},"ans_gh_sga":{"type":"answer","title":"PEG — Cobertura del seguro desde los 4 años","recommend":true,"content":"Los niños nacidos pequeños que no se han puesto al día tienen cobertura del seguro para tratamiento con GH a partir de los 4 años.\n\n📊 Resultados: ganancia media de 5–7 cm\n• Empezar antes de los 4 años ofrece las mejores posibilidades de alcanzar la talla normal\n• Empezar en la pubertad es mucho menos eficaz\n\n✅ Criterios de cobertura:\n• Peso o talla al nacer por debajo del percentil 3 (necesario documentar)\n• Aún por debajo del percentil 3 después de los 4 años\n• Esperar recuperación espontánea antes de los 4 años\n\n⚠️ Importante:\n• Los registros del nacimiento (peso y talla al nacer) son imprescindibles — guárdelos\n• Desde enero de 2025: se requiere documentación del nacimiento para la aprobación del seguro","tip":"Si no hay recuperación espontánea antes de los 4 años, iniciar el tratamiento de inmediato — sin más demoras."},"ans_gh_iss":{"type":"answer","title":"Talla Baja Idiopática (TBI) — Decisión que requiere reflexión","content":"La TBI se diagnostica cuando todas las pruebas son normales y el niño simplemente es bajo, sin causa identificable.\n\n⚠️ Visión honesta de la eficacia:\n• Ganancia media: solo 3–5 cm (gran variabilidad individual: desde 0 hasta 7 cm)\n• Es imposible predecir de antemano la respuesta individual\n• Muy difícil superar significativamente la talla diana genética\n\n💰 Realidad económica:\n• Sin cobertura del seguro — 100% a cargo del paciente\n• 70.000–120.000 wones/mes (varía según el peso)\n• 2–3 años de tratamiento en total: aproximadamente 20–40 millones de wones\n\n📋 Antes de decidir, considere:\n1. ¿Sufre el niño de verdad a causa de su talla?\n2. Reevaluar tras el primer año: continuar si crece ≥5 cm, replantear si crece < 3 cm\n3. La opinión del propio niño (las inyecciones son diarias)\n4. La situación económica familiar a largo plazo\n\n🌟 Guías internacionales:\nLa Sociedad Pediátrica de Endocrinología recomienda la «toma de decisión compartida»\n→ La familia elige tras revisar toda la evidencia disponible, con el médico como guía","tip":"Con la TBI no hay prisa para decidir. Tómense el tiempo necesario para consultar, y valoren conjuntamente el aspecto económico y emocional."},"ans_gh_other":{"type":"answer","title":"Otras afecciones con cobertura del seguro","recommend":true,"content":"El síndrome de Prader-Willi, el síndrome de Noonan y la enfermedad renal crónica también tienen cobertura.\n\n🔵 Síndrome de Prader-Willi:\n• Causado por una alteración del cromosoma 15\n• Ganancia media: 6–8 cm\n• El objetivo principal no es solo la talla, sino aumentar la masa muscular y reducir la grasa\n• Tendencia marcada a la obesidad — el control del peso es indispensable durante el tratamiento\n• Se recomienda empezar en la etapa de lactante (para el desarrollo muscular)\n• Criterios de cobertura: confirmación genética\n\n🔵 Síndrome de Noonan:\n• Apariencia similar al síndrome de Turner, pero causado por una mutación génica\n• Ganancia media: 4–6 cm (gran variabilidad)\n• Si hay cardiopatía asociada, evaluación cardíaca exhaustiva antes de empezar\n• Criterios de cobertura: mutación genética confirmada + talla < percentil 3\n\n🔵 Talla baja asociada a enfermedad renal crónica:\n• Ganancia media: 5–7 cm\n• Tratar hasta el trasplante; puede continuar tras él si las placas siguen abiertas\n• Monitoreo renal periódico imprescindible","tip":"En estas afecciones, el tratamiento con GH mejora no solo la talla sino también la salud general y la calidad de vida."},"ans_gh_no_test":{"type":"answer","title":"Paso 1: Evaluación especializada","recommend":true,"content":"Sin hacerse las pruebas, no hay forma de saber si tu hijo necesita tratamiento. Lo primero es una visita a endocrinología pediátrica.\n\n🔬 Secuencia de evaluación estándar:\n\nPaso 1. Radiografía de edad ósea (mano izquierda)\n• Primera y más importante\n• Revela el potencial de crecimiento y predice la talla final\n• ~5 minutos, indolora, baja radiación\n\nPaso 2. Análisis de sangre\n• IGF-1: cribado de la función de GH\n• Función tiroidea (TSH, T4 libre)\n• Hemograma completo (anemia, inflamación)\n• Función hepática y renal\n\nPaso 3. Prueba de estimulación de GH (si está indicada)\n• Si el IGF-1 es bajo o la velocidad de crecimiento es anormal\n• ~2–3 horas, 4–6 extracciones de sangre (catéter venoso único)\n• Pico < 10 ng/mL sugiere déficit de GH\n• El seguro requiere 2 pruebas con métodos distintos","tip":"Los resultados de las pruebas determinan si el tratamiento es necesario y cuál es el más adecuado. Posponer las pruebas significa perder tiempo de tratamiento valioso."},"gh_effect":{"type":"answer","title":"Eficacia del tratamiento con GH — El diagnóstico y el momento lo son todo","content":"Los resultados varían considerablemente según el diagnóstico y el momento en que se inicia el tratamiento.\n\n📊 Ganancia media por afección:\n🥇 Déficit de GH → 10–13 cm (8–10 cm el 1.er año)\n🥈 Síndrome de Turner → 7–8 cm\n🥉 PEG → 5–7 cm\n　　Prader-Willi → 6–8 cm (ganancia muscular es el beneficio principal)\n　　Síndrome de Noonan → 4–6 cm\n　　ERC → 5–7 cm\n　　TBI → 3–5 cm (muy variable)\n\n⏰ El momento es el factor más determinante:\n• Edad ósea ≤6 al inicio → efecto máximo (~7,4 cm adicionales de media)\n• Edad ósea 8–9 → buen efecto\n• Edad ósea ≥11 → el efecto disminuye significativamente\n• Edad ósea ≥14 → efecto mínimo, cobertura del seguro finaliza\n\n🌟 Cuatro factores que maximizan los resultados:\n1️⃣ Inicio temprano: 2+ años antes de la pubertad duplica aprox. el beneficio esperado\n2️⃣ Inyecciones diarias sin fallar\n   → Cada 10% de mejora en la adherencia añade ~1,1 cm/año\n3️⃣ Dosis correcta: recalcular cada 3–6 meses según el aumento de peso\n4️⃣ Sueño y nutrición adecuados en paralelo","tip":"El tratamiento con GH no produce una transformación rápida y espec
