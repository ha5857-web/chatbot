<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Samsung Jarada Growth Advisor</title>
<style>
:root{--gd:#1a6b45;--gm:#2d9b6b;--gl:#e8f7f0;--gp:#f3fdf8;--go:#c9933a;--gol:#fdf3e3;--td:#1a2520;--tm:#4a5e55;--tl:#8a9e94;--bg:#f7faf8;--wh:#ffffff;--sh:0 2px 16px rgba(26,107,69,.10);--rm:18px;--rb:12px;--fn:-apple-system,"Noto Sans","Segoe UI","Hiragino Sans",sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fn);background:var(--bg);color:var(--td);display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.hdr{background:var(--gd);padding:12px 16px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.15);z-index:10}
.hdr-logo{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hdr-info{flex:1;min-width:0}
.hdr-t{font-size:13.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-s{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px}
.hbtn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:10px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;color:white;font-size:13px;font-weight:600;flex-shrink:0;font-family:var(--fn);white-space:nowrap;-webkit-tap-highlight-color:transparent}
.hbtn:active{background:rgba(255,255,255,.3)}
.sibtn{width:32px;height:32px;background:rgba(255,255,255,.15);border:none;border-radius:8px;color:white;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.prg{height:3px;background:var(--gl);flex-shrink:0}
.prg-f{height:100%;background:linear-gradient(90deg,var(--gm),var(--go));transition:width .4s;border-radius:2px}
.chat{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:#cde;border-radius:2px}
.row{display:flex;align-items:flex-end;gap:8px;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.row.bot{justify-content:flex-start}.row.usr{justify-content:flex-end}
.ava{width:34px;height:34px;background:var(--gd);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.bub{max-width:84%;padding:12px 15px;border-radius:var(--rm);line-height:1.65;font-size:14px}
.bub.bot{background:var(--wh);color:var(--td);border-bottom-left-radius:4px;box-shadow:var(--sh)}
.bub.usr{background:var(--gm);color:white;border-bottom-right-radius:4px}
.b-tit{font-size:13px;font-weight:700;color:var(--gd);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--gl)}
.b-cnt{white-space:pre-line;font-size:13.5px;line-height:1.75;color:var(--tm)}
.b-tip{margin-top:10px;padding:8px 11px;background:var(--gol);border-left:3px solid var(--go);border-radius:6px;font-size:12.5px;color:#7a5a20;line-height:1.5}
.u-bdg{display:inline-flex;align-items:center;gap:4px;background:#fff0f0;color:#cc2222;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;margin-bottom:8px;border:1px solid #ffcccc}
.r-cta{margin-top:12px;padding:10px 13px;background:var(--gl);border-radius:10px;font-size:12.5px;color:var(--gd);border:1px solid #bde8d4}
.opts{flex-shrink:0;padding:8px 16px 4px;background:var(--wh);border-top:1px solid #e8f0ec;box-shadow:0 -4px 16px rgba(0,0,0,.06);max-height:40vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ohint{font-size:11px;color:var(--tl);text-align:center;padding:8px 0 10px}
.obtn{width:100%;display:flex;align-items:center;gap:10px;padding:11px 15px;margin-bottom:8px;background:var(--gp);border:1.5px solid #d0ead9;border-radius:var(--rb);font-size:13.5px;color:var(--td);text-align:left;cursor:pointer;transition:all .18s;line-height:1.4;font-family:var(--fn);-webkit-tap-highlight-color:transparent}
.obtn:active{background:var(--gm);color:white;border-color:var(--gm)}
.oarr{margin-left:auto;font-size:16px;color:var(--gm);flex-shrink:0}
.obtn:active .oarr{color:rgba(255,255,255,.8)}
.nav{display:flex;gap:8px;margin-top:4px;margin-bottom:8px}
.nbtn{flex:1;padding:10px;background:var(--wh);border:1.5px solid #d0ead9;border-radius:10px;font-size:12px;color:var(--gd);font-weight:600;cursor:pointer;text-align:center;font-family:var(--fn);-webkit-tap-highlight-color:transparent}
.nbtn:active{background:var(--gl);border-color:var(--gm)}
.inp-area{flex-shrink:0;padding:8px 16px 12px;background:var(--wh);border-top:1px solid #e8f0ec}
.inp-row{display:flex;gap:8px;align-items:center}
.inp-box{flex:1;padding:11px 14px;border:1.5px solid #d0ead9;border-radius:12px;font-size:14px;font-family:var(--fn);color:var(--td);background:var(--gp);outline:none;transition:border-color .2s}
.inp-box:focus{border-color:var(--gm);background:var(--wh)}
.inp-box::placeholder{color:var(--tl)}
.snd{width:40px;height:40px;background:var(--gm);border:none;border-radius:12px;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.snd:active{background:var(--gd)}.snd:disabled{background:#b0d4c2;cursor:not-allowed}
.i-hint{font-size:10.5px;color:var(--tl);text-align:center;margin-top:5px}
.bk-card{background:linear-gradient(135deg,var(--gd),#0f4a2f);color:white;border-radius:16px;padding:18px;margin:4px 0;box-shadow:0 4px 20px rgba(26,107,69,.3)}
.bk-card h3{font-size:15px;font-weight:800;margin-bottom:12px}
.bk-row{display:flex;align-items:flex-start;gap:8px;margin:8px 0;font-size:13px;line-height:1.5;color:rgba(255,255,255,.9)}
.bk-ico{font-size:15px;flex-shrink:0;margin-top:1px}
.bk-btn{margin-top:14px;background:var(--go);border:none;border-radius:10px;color:white;font-size:15px;font-weight:800;width:100%;padding:13px;cursor:pointer;font-family:var(--fn)}
.typing{display:flex;gap:5px;align-items:center;padding:10px 14px;background:var(--wh);border-radius:var(--rm);border-bottom-left-radius:4px;box-shadow:var(--sh);width:fit-content}
.dot{width:7px;height:7px;background:var(--gm);border-radius:50%;animation:bo .9s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.rt-bub{background:var(--wh);border-radius:var(--rm);border-bottom-left-radius:4px;box-shadow:var(--sh);padding:10px 14px;font-size:13px;color:var(--tm);display:flex;align-items:center;gap:8px;max-width:82%}
.rt-spin{width:14px;height:14px;border:2px solid var(--gl);border-top-color:var(--gm);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;justify-content:center;max-width:480px;margin:0 auto}
.ov.open{display:flex}
.sheet{background:var(--wh);border-radius:22px 22px 0 0;width:100%;padding:8px 0 36px;animation:su .25s ease}
@keyframes su{from{transform:translateY(60%);opacity:0}to{transform:translateY(0);opacity:1}}
.handle{width:36px;height:4px;background:#dde;border-radius:2px;margin:10px auto 14px}
.sh-ttl{font-size:12px;font-weight:700;color:var(--tl);text-align:center;padding:0 0 14px;letter-spacing:.8px;text-transform:uppercase}
.lg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px}
.lg-opt{display:flex;align-items:center;gap:10px;padding:13px 14px;border:1.5px solid #e0ede7;border-radius:14px;cursor:pointer;background:var(--gp);-webkit-tap-highlight-color:transparent}
.lg-opt:active,.lg-opt.act{background:var(--gd);border-color:var(--gd);color:white}
.lg-fl{font-size:22px;flex-shrink:0}.lg-nm{font-size:13.5px;font-weight:700}
.lg-nat{font-size:10.5px;color:var(--tl);margin-top:1px}
.lg-opt.act .lg-nat,.lg-opt:active .lg-nat{color:rgba(255,255,255,.65)}
.lg-ck{font-size:14px;flex-shrink:0;display:none}
.lg-opt.act .lg-ck{display:block}
.sh-cancel{margin:14px 16px 0;width:calc(100% - 32px);padding:13px;background:#f2f5f3;border:none;border-radius:12px;font-size:14px;font-weight:600;color:var(--tm);cursor:pointer;font-family:var(--fn)}
.cov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:none;align-items:center;justify-content:center;max-width:480px;margin:0 auto;padding:20px}
.cov.open{display:flex}
.csheet{background:var(--wh);border-radius:20px;width:100%;padding:24px;animation:fi .2s ease}
.c-ttl{font-size:17px;font-weight:800;color:var(--td);margin-bottom:6px}
.c-desc{font-size:13px;color:var(--tm);line-height:1.6;margin-bottom:16px}
.c-inp{width:100%;padding:12px 14px;border:1.5px solid #d0ead9;border-radius:12px;font-size:14px;font-family:var(--fn);outline:none;color:var(--td);transition:border-color .2s}
.c-inp:focus{border-color:var(--gm)}
.c-btns{display:flex;gap:10px;margin-top:14px}
.c-ok{flex:2;padding:13px;background:var(--gm);border:none;border-radius:12px;color:white;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--fn)}
.c-cancel{flex:1;padding:13px;background:#f2f5f3;border:none;border-radius:12px;color:var(--tm);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fn)}

.ai-direct{padding:2px 0}
.ai-badge{display:inline-block;font-size:10px;background:#e8f4ff;color:#1a6fa8;border-radius:8px;padding:2px 8px;margin-bottom:6px;font-weight:600}
.ai-body{font-size:14px;line-height:1.6;color:#222}
.ai-remain{margin-top:8px;font-size:11px;color:#888;text-align:right}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">🌱</div>
  <div class="hdr-info">
    <div class="hdr-t" id="hT">삼성자라다 성장 건강 상담</div>
    <div class="hdr-s" id="hS">소아내분비과 · AI 건강 상담</div>
  </div>
  <button class="sibtn" onclick="openAK()">⚙️</button>
  <button class="hbtn" onclick="openLang()">
    <span id="lF">🇰🇷</span><span id="lN">한국어</span>
  </button>
</div>
<div class="prg"><div class="prg-f" id="pF" style="width:10%"></div></div>
<div class="chat" id="chat"></div>
<div class="opts" id="opts">
  <div class="ohint" id="oH">궁금한 항목을 선택하세요 👇</div>
  <div id="oL"></div>
</div>
<div class="inp-area">
  <div class="inp-row">
    <input class="inp-box" id="inp" type="text" maxlength="200"
      placeholder="궁금한 것을 직접 질문해 보세요..."
      onkeydown="if(event.key==='Enter')sendQ()">
    <button class="snd" id="sndBtn" onclick="sendQ()">↑</button>
  </div>
  <div class="i-hint" id="iH">자유롭게 질문하면 관련 항목으로 안내해 드려요</div>
</div>
<div class="ov" id="langOv" onclick="if(event.target===this)closeLang()">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sh-ttl" id="shT">Select Language</div>
    <div class="lg-grid" id="lgG"></div>
    <button class="sh-cancel" id="shC" onclick="closeLang()">취소</button>
  </div>
</div>
<div class="cov" id="akOv">
  <div class="csheet">
    <div class="c-ttl">🔑 Claude API Key</div>
    <div class="c-desc">자유 질문 라우팅에 사용됩니다.<br>키는 이 탭에만 저장됩니다.</div>
    <input class="c-inp" id="akI" type="password" placeholder="sk-ant-api03-...">
    <div class="c-btns">
      <button class="c-ok" onclick="saveAK()">저장</button>
      <button class="c-cancel" onclick="closeAK()">취소</button>
    </div>
  </div>
</div>
<script>

const TR={
"ko":{"start":{"type":"question","text":"안녕하세요! 저는 삼성자라다 소아청소년과의 성장·건강 상담 챗봇이에요. 어떤 부분이 궁금하신가요?","options":[{"text":"우리 아이 키 성장이 걱정돼요","next":"growth_main"},{"text":"성장호르몬 치료가 궁금해요","next":"growth_hormone"},{"text":"성조숙증이 걱정돼요","next":"puberty_main"},{"text":"비만·과체중이 걱정돼요","next":"obesity_main"},{"text":"혈당·지방간 등 대사 문제가 있어요","next":"metabolism_main"},{"text":"성장에 좋은 영양·식단이 궁금해요","next":"nutrition_main"}]},"growth_main":{"type":"question","text":"아이의 키 성장에 대해 조금 더 알려주세요. 아이 나이가 어떻게 되나요?","options":[{"text":"0~3세 (영아·유아)","next":"growth_0_3"},{"text":"4~8세 (학령전기·초등 저학년)","next":"growth_4_8"},{"text":"9~13세 (초등 중고학년·중학생)","next":"growth_9_13"},{"text":"14세 이상 (중학생 이상)","next":"growth_14plus"},{"text":"갑자기 성장 속도가 느려진 것 같아요","next":"growth_slowdown"},{"text":"골연령 검사가 궁금해요","next":"growth_boneage"},{"text":"집에서 키 올바르게 측정하는 방법","next":"growth_measurement"},{"text":"성장곡선 읽는 법과 병원 가야 할 때","next":"growth_chart_reading"},{"text":"성장호르몬이 어떻게 키를 키우는지 기초 원리가 궁금해요","next":"gh_basics"},{"text":"백분위수·성장곡선 읽는 법이 궁금해요","next":"growth_basics"}]},"growth_0_3":{"type":"question","text":"0~3세 시기의 성장은 어떤 상황인가요?","options":[{"text":"작게 태어났는데 따라잡지 못하고 있어요","next":"ans_sga"},{"text":"정상 출생이었는데 성장이 뒤처져요","next":"ans_growth_0_3_normal"},{"text":"부모가 작아서 아이도 작은 것 같아요","next":"ans_familial_short"},{"text":"얼마나 작으면 검사를 받아야 하나요?","next":"ans_growth_check_needed"}]},"ans_sga":{"type":"answer","title":"부당경량아 (SGA) — 조기 발견이 중요해요","recommend":true,"content":"재태주수에 비해 체중이나 키가 3백분위 미만으로 작게 태어난 경우를 「부당경량아(SGA)」라고 해요.\n\n✅ 좋은 소식: 85~90%는 출생 후 2년 안에 정상 범위로 따라잡아요.\n\n⚠️ 주의가 필요한 경우:\n• 만 4세에도 키가 3백분위 미만인 경우 (약 10~15%)\n• 이런 아이는 만 4세부터 건강보험 급여로 성장호르몬 치료 가능해요\n\n📊 치료 효과: 평균 5~7cm 증가\n• 조기 시작할수록 효과 커요 (4세 전 시작 시 또래 수준 따라잡기 가능성 높음)\n• 만 4세 이후로 미루면 치료 효과 제한적\n\n📌 병원에서 확인할 사항:\n• 매 3개월 신장 측정 → 성장 속도 추적\n• 만 4세까지 경과 관찰, 필요 시 성장호르몬 치료 시작","tip":"4세 이전에 자연 따라잡기가 이루어지면 더 좋지만, 만약 안 된다면 4세부터 바로 소아내분비과 진료를 받는 것이 최선이에요."},"ans_growth_0_3_normal":{"type":"answer","title":"정상 출생 후 성장 지연 — 원인을 찾는 게 우선이에요","recommend":true,"content":"정상으로 태어났지만 성장이 뒤처지는 경우, 주요 원인은 다음과 같아요:\n\n1️⃣ 갑상선 기능 저하증\n• 가장 흔한 내분비 원인\n• 증상: 활동량 감소, 피부 건조, 변비, 무기력\n• 간단한 혈액검사로 확인 가능, 치료하면 성장 정상화\n\n2️⃣ 성장호르몬 결핍증\n• 영아기 성장호르몬 결핍은 저혈당, 황달 지속으로 나타나기도 함\n• 얼굴이 동그랗고 뚱뚱해 보이는 경우 의심\n• IGF-1 혈액검사로 선별 가능\n\n3️⃣ 영양 불량\n• 모유 수유 중 모유 부족, 편식 등\n• 체중도 함께 작으면 영양 문제 가능성 높음\n\n4️⃣ 만성 질환\n• 선천성 심장병, 신장 질환, 소화기 질환 등\n• 잦은 감기, 수유 어려움, 구토 등이 동반되면 의심\n\n📌 권장 검사:\n• 갑상선 기능 (TSH, free T4)\n• IGF-1\n• 혈액 일반검사 (빈혈, 염증 등)\n• 골연령 X-ray","tip":"0~3세는 가장 빠르게 자라는 시기예요. 이 시기에 문제를 발견하면 충분히 따라잡을 수 있어요."},"ans_familial_short":{"type":"answer","title":"가족성 저신장 — 치료보다 정확한 파악이 먼저예요","content":"부모가 둘 다 작으면 아이도 작을 가능성이 높아요. 이를 「가족성 저신장」이라고 해요.\n\n📌 가족성 저신장의 특징:\n• 성장 속도는 정상 (매년 5~6cm)\n• 골연령이 실제 나이와 일치\n• 성장곡선에서 낮은 백분위를 유지하며 안정적\n• 부모 중 한 명 이상이 평균보다 작음\n\n🧮 유전 목표 키 (MPH) 계산:\n• 남아: (아버지 키 + 어머니 키 + 13) ÷ 2 → 예측 범위 ±5~10cm\n• 여아: (아버지 키 + 어머니 키 - 13) ÷ 2 → 예측 범위 ±5~10cm\n\n예) 아버지 170cm, 어머니 158cm\n→ 남아 예측: (170+158+13)/2 = 170.5cm (실제 범위 160~180cm)\n→ 여아 예측: (170+158-13)/2 = 157.5cm (실제 범위 147~167cm)\n\n⚠️ 가족성 저신장이더라도 진료가 필요한 경우:\n• 현재 키가 예측보다 10cm 이상 작을 때\n• 성장 속도가 갑자기 떨어졌을 때\n• 매년 4cm 미만 성장할 때\n\n✅ 단순 가족성 저신장은 치료 필요 없이 건강한 생활습관으로 충분해요.","tip":"유전 때문에 작은 것인지, 다른 이유가 있는 것인지 구별하려면 한 번 소아내분비과에서 골연령 검사와 IGF-1 검사를 받아보는 걸 권장해요."},"ans_growth_check_needed":{"type":"answer","title":"전문 검사를 권장드려요","recommend":true,"content":"부모 키가 정상인데 아이만 작거나, 예측 키보다 많이 작다면 꼭 평가가 필요해요.\n\n🔬 권장 검사 항목:\n\n1. 골연령 검사 ⭐ (가장 중요)\n• 왼손 X-ray, 약 5분, 완전 무통\n• 성장 잠재력 파악 + 예상 최종 키 예측\n• 부모 키 공식보다 2배 정확 (오차 ±3~5cm vs ±8~10cm)\n\n2. IGF-1 혈액검사\n• 성장호르몬 기능 선별검사\n• 단순 혈액 1회 채취 (공복 불필요)\n\n3. 갑상선 기능 (TSH, free T4)\n• 갑상선 저하증은 성장 지연의 흔한 원인\n\n4. 일반 혈액검사\n• 빈혈, 염증, 간/신장 기능 확인\n\n5. 성장호르몬 자극검사 (필요 시)\n• IGF-1이 낮거나 성장 속도 이상 시 추가\n• 2~3시간 소요, 혈액 4~6회 채취 (유치 삽입으로 반복 채혈 없음)\n• 피크값 10ng/mL 이상 = 정상\n\n💡 검사 비용 참고:\n• 골연령 + IGF-1 + 갑상선 기능: 합계 약 5~8만 원\n• 성장호르몬 자극검사: 약 15~20만 원 추가","tip":"조기에 원인을 찾을수록 치료 효과가 높아요. 성장판이 열려있는 지금, 6개월 이상 지켜보지 말고 빨리 전문의를 만나세요."},"growth_4_8":{"type":"question","text":"4~8세 시기의 성장은 어떤 상황인가요?","options":[{"text":"부모가 작아서 아이도 작은 것 같아요","next":"ans_familial_short"},{"text":"100명 중 3~5번째로 작아요 (3~5백분위)","next":"ans_growth_check_needed"},{"text":"매년 4cm도 안 자라는 것 같아요","next":"growth_slowdown"},{"text":"키가 작은데 어떤 검사를 받아야 하나요?","next":"ans_growth_check_needed"}]},"growth_9_13":{"type":"question","text":"9~13세 시기, 어떤 상황인가요?","options":[{"text":"사춘기가 아직 안 왔는데 키가 작아요","next":"ans_9_13_no_puberty"},{"text":"사춘기가 일찍 왔고 키 성장이 멈출까 걱정돼요","next":"ans_9_13_early_puberty"},{"text":"사춘기가 이미 중후반인데 치료 기회가 있나요?","next":"ans_9_13_late_puberty"},{"text":"성장 속도가 갑자기 느려진 것 같아요","next":"growth_slowdown"}]},"ans_9_13_no_puberty":{"type":"answer","title":"사춘기 전 단계 — 지금이 치료 황금기예요","recommend":true,"content":"사춘기가 아직 시작 안 됐다면 성장 치료의 황금기예요!\n\n🌟 왜 사춘기 전이 좋은가요?\n• 성장판이 아직 활짝 열려있어요\n• 성장호르몬 치료 효과가 사춘기 시작 후보다 약 2배 높아요\n• 2년 이상 치료하면 효과가 크게 증대돼요\n\n📊 골연령으로 남은 성장 가능성 확인:\n• 여아 골연령 11세 이전: 충분한 치료 기회\n• 남아 골연령 12세 이전: 충분한 치료 기회\n\n✅ 검사 권장 사항:\n1. 골연령 검사 (성장 잠재력 파악)\n2. IGF-1 혈액검사\n3. 성장호르몬 자극검사 (필요 시)\n\n💰 급여 적용 조건이 맞으면:\n• 월 21~36만 원 (약값의 30%)으로 치료 가능\n• 치료 효과: 질환별로 5~13cm 개선 가능","tip":"사춘기가 시작되면 성장판이 빠르게 닫혀요. 지금 평가받으면 더 많은 선택지가 있어요."},"ans_9_13_early_puberty":{"type":"answer","title":"사춘기 조기 + 키 걱정 — 두 가지를 함께 봐야 해요","recommend":true,"content":"사춘기가 일찍 왔다면 「급속 성장기」가 빨리 온 것이고, 이는 성장판도 일찍 닫힌다는 뜻이에요.\n\n⚠️ 성조숙증의 역설:\n• 초반: 또래보다 5~8cm 크고 잘 크는 것처럼 보여요\n• 후반: 성장판이 일찍 닫혀 최종 키가 유전 예측보다 5~15cm 작아질 수 있어요\n\n📊 연구 결과 (유럽 장기 추적):\n• 치료 안 한 성조숙증: 여아 유전 목표보다 평균 10cm 미달\n• 남아는 평균 20cm 미달\n\n🔍 지금 필요한 것:\n1. 골연령 검사: 성장판이 얼마나 남았는지 확인\n2. GnRH 자극검사: 진성 성조숙증 여부 확인\n3. 성장호르몬 검사: 동시에 성장호르몬 상태도 확인\n\n💡 치료 옵션:\n• GnRH 치료(성조숙증 치료)로 사춘기를 잠시 멈추기\n• 필요 시 성장호르몬 병행 치료로 키 추가 확보\n• 두 치료를 같이 하면 단독보다 4~6cm 추가 가능","tip":"사춘기가 조기에 왔어도 적시에 치료하면 최종 키를 지킬 수 있어요. 지금 바로 소아내분비과를 찾아주세요."},"ans_9_13_late_puberty":{"type":"answer","title":"사춘기 중후반 — 남은 기회를 정확히 파악해야 해요","recommend":true,"content":"사춘기 중후반에는 골연령 검사로 치료 기회가 얼마나 남았는지 먼저 확인해야 해요.\n\n📊 골연령별 치료 가능성:\n• 여아 골연령 11세 미만: 치료 효과 충분\n• 여아 골연령 11~12세: 치료 효과 있지만 제한적\n• 여아 골연령 12~13세: 효과 미미 (보험 급여도 종료 시점)\n• 여아 골연령 14세↑: 치료 의미 없음\n\n• 남아 골연령 12세 미만: 치료 효과 충분\n• 남아 골연령 12~14세: 제한적\n• 남아 골연령 16세↑: 보험 급여 종료\n\n⏱️ 속도가 중요해요:\n초경 후에도 약 5~7cm 더 자라지만, 1년에 2~3cm 정도로 급격히 느려져요.\n초경 전 1~2년이 급속 성장기 마지막 기회예요.\n\n✅ 지금 할 수 있는 것:\n• 골연령 + 예측 최종 키 확인\n• 아직 성장판이 열려있다면 치료 즉시 시작","tip":"늦었다고 포기하지 마세요. 아직 성장판이 열려있다면 몇 개월의 치료도 의미 있어요."},"growth_14plus":{"type":"answer","title":"14세 이상 — 성장판 상태를 먼저 확인해요","recommend":true,"content":"14세 이상은 성장판이 닫혀가는 시기예요. 그러나 아직 늦지 않았을 수 있어요.\n\n📊 성장판 상태 확인 기준:\n• 여아 골연령 14~15세: 성장판 거의 닫힘, 치료 효과 거의 없음\n• 남아 골연령 15~17세: 성장판 거의 닫힘\n• 건강보험 급여도 여아 만 12세, 남아 만 13세 생일 전날까지\n\n🔍 그래도 확인해야 할 것:\n1. 골연령 검사: 실제 뼈 나이 확인 (달력 나이와 다를 수 있음)\n2. 사춘기가 늦게 시작했다면 골연령이 실제 나이보다 낮을 수 있어요\n3. 특히 남아 만 14세는 아직 치료 효과가 있는 경우도 있음\n\n💡 한 가지 희망:\n「체질성 성장 지연」(늦게 크는 체질)인 경우\n• 골연령이 2~4년 낮게 측정됨\n• 고등학교, 심지어 대학교 때까지 계속 자는 경우도 있음\n• 아버지/어머니도 늦게 자란 병력이 있으면 가능성 높음","tip":"실망하기 전에 골연령 검사를 받아보세요. 골연령이 낮으면 아직 충분한 성장 가능성이 있을 수 있어요."},"growth_slowdown":{"type":"answer","title":"성장 속도가 갑자기 느려졌다면 — 주의 신호예요","recommend":true,"content":"성장 속도가 갑자기 느려지는 건 중요한 주의 신호예요.\n\n📊 나이별 정상 성장 속도:\n• 1~2세: 연간 10~12cm\n• 3~4세: 연간 8~10cm\n• 5~10세 (사춘기 전): 연간 5~7cm ← 이 시기 4cm 미만이면 검사 필요\n• 사춘기 급속 성장기: 연간 8~10cm\n\n⚠️ 다음 중 하나라도 해당하면 진료 필요:\n• 사춘기 전 아이가 1년에 4cm 미만 성장\n• 성장 속도가 이전보다 갑자기 눈에 띄게 감소\n• 6개월 사이 키 백분위가 2개 이상의 주요 백분위선을 지속 하락\n\n🔍 가능한 원인:\n1. 성장호르몬 결핍증 — IGF-1 감소, 자극검사 피크 10ng/mL 미만\n2. 갑상선 기능 저하증 — TSH 상승\n3. 만성 질환 악화 — 염증성 장질환, 신장 질환 등\n4. 스트레스 / 심리적 원인 — 심리적 성장 장애\n5. 영양 불량 — 심한 편식, 다이어트\n6. 성조숙증 — 급속 성장 후 조기 종료","tip":"3개월마다 키를 측정해두면 성장 속도를 정확히 파악할 수 있어요. 기록이 있으면 진단에 큰 도움이 돼요."},"growth_boneage":{"type":"question","text":"골연령 검사에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"검사 방법과 방사선 안전성이 궁금해요","next":"boneage_method_detail"},{"text":"왜 오른손이 아닌 왼손으로 하나요?","next":"boneage_why_left"},{"text":"골연령이 실제 나이보다 빠른/느린 건 무슨 의미인가요?","next":"boneage_fast_slow"},{"text":"예측 키는 얼마나 정확한가요?","next":"boneage_accuracy"},{"text":"성장호르몬/성조숙증 치료 종료 기준이 궁금해요","next":"boneage_treatment_end"}]},"growth_hormone":{"type":"question","text":"성장호르몬 치료에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"우리 아이가 치료 대상인가요?","next":"gh_eligible"},{"text":"치료하면 얼마나 효과가 있나요?","next":"gh_effect"},{"text":"비용과 건강보험이 궁금해요","next":"gh_cost"},{"text":"부작용은 없나요?","next":"gh_safety"},{"text":"주사 맞는 방법이 궁금해요","next":"gh_injection"},{"text":"치료를 언제 시작/중단하나요?","next":"gh_timing"},{"text":"성장호르몬 자극검사 — 준비·과정·결과 해석","next":"gh_stimulation_test"},{"text":"검사 과정이 자세히 궁금해요 (IGF-1·자극검사)","next":"gh_test_detail"},{"text":"치료 중 부작용 모니터링이 궁금해요","next":"gh_monitoring"}]},"gh_eligible":{"type":"question","text":"현재 아이의 진단명이나 상황이 어떤가요?","options":[{"text":"성장호르몬 결핍증 진단받았어요","next":"ans_gh_deficiency"},{"text":"터너증후군이에요 (여아, 염색체 이상)","next":"ans_gh_turner"},{"text":"작게 태어났고 지금도 따라잡지 못해요 (부당경량아)","next":"ans_gh_sga"},{"text":"검사는 정상인데 그냥 작아요 (특발성 저신장)","next":"ans_gh_iss"},{"text":"프라더-윌리/누난/만성신부전이에요","next":"ans_gh_other"},{"text":"아직 검사를 안 해봤어요","next":"ans_gh_no_test"}]},"ans_gh_deficiency":{"type":"answer","title":"성장호르몬 결핍증 — 치료 효과가 가장 확실해요","recommend":true,"content":"성장호르몬 결핍증은 치료 효과가 가장 확실하고, 건강보험 급여가 적용돼요.\n\n📊 치료 효과:\n• 치료 첫 해 평균 8~10cm 성장 (일부는 12cm 이상)\n• 두 번째 해부터 연간 6~7cm (또래 5~6cm보다 높음)\n• 전체적으로 10~13cm 개선\n• 조기 시작 시 최대 20cm 이상도 가능\n\n⚠️ 치료 안 하면?\n유럽 장기 추적 연구 결과:\n• 여아: 유전 목표 키보다 평균 10cm 미달\n• 남아: 유전 목표 키보다 평균 20cm 미달\n\n💉 치료 방법:\n• 체중 1kg당 0.025~0.035mg/일 피하주사\n• 체중 30kg 기준 → 하루 0.75~1.05mg\n• 체중이 늘면 3~6개월마다 용량 재조정 필요\n\n💰 건강보험 급여:\n• 급여 시 개인 부담: 월 21~36만 원 (약값의 30%)\n• 급여 종료: 골연령 여아 14세/남아 16세, 또는 연간 성장 2cm 미만 시\n• 급여 종료 후 자비 치료 가능 (효과 있으면)\n\n✅ 급여 조건 (2가지 이상의 자극검사에서):\n• 피크값 두 번 모두 10ng/mL 미만\n• 신장 3백분위 미만\n• 골연령이 실제 나이보다 낮음","tip":"조기에 시작할수록 효과가 훨씬 커요. 사춘기 전 2년 이상 치료하면 효과가 약 2배 증대돼요."},"ans_gh_turner":{"type":"answer","title":"터너증후군 — 빨리 시작할수록 좋아요","recommend":true,"content":"터너증후군은 X염색체 하나가 결실된 상태로 (45,X), 건강보험 급여가 적용돼요.\n\n📊 치료 효과:\n• 평균 7~8cm 증가\n• 치료 없으면 평균 최종 키 약 143cm\n• 치료 후 약 150cm 가능 → 7~8cm 차이가 일상에서 큰 의미를 가져요\n\n💉 치료 방법:\n• 성장호르몬 단독, 또는 에스트로겐 병행\n• 에스트로겐: 보통 11~12세부터 저용량으로 시작, 자연 청춘기 유도\n• 에스트로겐 병행 시 최종 키 개선 효과 더 커짐\n\n💰 급여 조건:\n• 신장 3백분위 미만\n• 염색체 검사 (핵형 분석)로 확진\n• 성장호르몬 자극검사 결과와 무관 (터너증후군 자체가 급여 대상)\n\n⏱️ 시작 시기:\n• 가능한 한 빨리 시작 (어릴수록 치료 기간 길어 효과 ↑)\n• 보통 2~4세부터 시작 가능","tip":"터너증후군은 자연 사춘기가 오지 않는 경우가 많아요. 성장호르몬과 함께 에스트로겐 시작 시기를 잘 계획하는 것이 중요해요."},"ans_gh_sga":{"type":"answer","title":"부당경량아 (SGA) — 만 4세부터 급여 치료 가능해요","recommend":true,"content":"작게 태어났는데 따라잡지 못하는 아이는 만 4세부터 건강보험 급여가 적용돼요.\n\n📊 치료 효과: 평균 5~7cm 증가\n• 4세 전 조기 시작할수록 최종 키에 도달 가능성 높음\n• 청소년기 이후 시작은 효과 제한적\n\n✅ 급여 조건:\n• 출생 시 체중 또는 키가 3백분위 미만 (기록 필요)\n• 만 4세 이후에도 키/체중이 3백분위 미만\n• 만 4세 이전은 자연 따라잡기를 기다려요\n\n⚠️ 중요 포인트:\n• 출생 기록(출산 기록지)이 중요해요 — 출생 시 체중/키 기록 보관 필수\n• 2025년 1월부터 급여 강화: 4세 전 출생 기록 서류 필요\n\n💰 비용:\n• 급여 적용 시: 월 21~36만 원\n• 치료 기간: 보통 2~4년 (골연령 기준 종료)","tip":"만 4세 전에는 자연 따라잡기를 확인하고, 4세 이후에도 3백분위 미만이면 바로 치료를 시작하는 것이 좋아요."},"ans_gh_iss":{"type":"answer","title":"특발성 저신장 (ISS) — 신중한 결정이 필요해요","content":"모든 검사가 정상인데 그냥 작은 경우, 「특발성 저신장(ISS)」이라고 해요.\n\n⚠️ 솔직한 효과 안내:\n• 평균 효과는 3~5cm (개인차 크게 차이: 어떤 아이는 7cm, 어떤 아이는 거의 0cm)\n• 치료 전에 효과를 예측하기 어려워요\n• 유전 목표 키를 크게 초과하기는 현실적으로 어려워요\n\n💰 비용 현실:\n• 급여 적용 불가 → 100% 자비 부담\n• 월 70~120만 원 (체중에 따라 다름)\n• 2~3년 치료 시 총 비용: 약 2,000~4,000만 원\n\n📋 결정 전 반드시 고려할 것:\n1. 아이가 키 때문에 실제로 심리적 고통이 있는가\n2. 첫 해 반응 확인 후 결정: 1년에 5cm 이상이면 계속, 3cm 미만이면 중단 고려\n3. 아이 본인의 의견 존중 (주사를 매일 맞아야 함)\n4. 가정 경제 상황과 장기 계획\n\n🌟 국제 지침:\n미국 소아내분비학회도 「공동 의사결정」 권고\n→ 의사가 일방적으로 결정하지 않고, 가족이 모든 정보를 충분히 이해한 후 선택","tip":"특발성 저신장은 치료 여부를 서두르지 않아도 돼요. 충분히 상담받고, 경제적·심리적 여건을 종합해서 결정하세요."},"ans_gh_other":{"type":"answer","title":"기타 급여 대상 질환들","recommend":true,"content":"프라더-윌리, 누난증후군, 만성 신부전도 급여 대상이에요.\n\n🔵 프라더-윌리 증후군:\n• 15번 염색체 이상으로 생기는 유전 질환\n• 효과: 평균 6~8cm 증가\n• 단, 키보다 근육량 증가와 체지방 감소가 주요 목적\n• 비만 경향이 강해 치료 중에도 체중 관리 필수\n• 영아기부터 시작 권고 (근육 발달 위해)\n• 급여 조건: 유전자 검사로 확진\n\n🔵 누난증후군:\n• 외모가 터너증후군과 비슷하지만 유전자 돌연변이 원인\n• 효과: 평균 4~6cm 증가 (개인차 큼)\n• 심장 질환 동반 시 치료 전 심장 정밀 검사 필수\n• 급여 조건: 관련 유전자 검사 확진 + 신장 3백분위 미만\n\n🔵 만성 신부전 동반 저신장:\n• 효과: 평균 5~7cm\n• 이식 전까지 치료, 이식 후 성장판 열려있으면 계속 가능\n• 신장 기능 정기 모니터링 필수\n• 급여 조건: 신장 3백분위 미만 + 골연령 낮음","tip":"이들 질환은 성장호르몬 치료가 키뿐만 아니라 전반적인 건강과 삶의 질에도 도움이 돼요."},"ans_gh_no_test":{"type":"answer","title":"첫 번째 단계: 전문과 검사","recommend":true,"content":"검사를 안 해봤다면, 아이에게 치료가 필요한지 알 수 없어요. 소아내분비과 방문이 먼저예요.\n\n🔬 기본 검사 순서:\n\nStep 1. 골연령 X-ray (왼손)\n• 가장 먼저, 가장 중요\n• 성장 잠재력과 예상 최종 키 파악\n• 약 5분, 무통, 저방사선\n\nStep 2. 혈액검사\n• IGF-1: 성장호르몬 기능 선별\n• 갑상선 기능 (TSH, free T4)\n• 일반 혈액검사 (빈혈, 염증 등)\n• 간·신장 기능\n\nStep 3. 성장호르몬 자극검사 (필요 시)\n• IGF-1 낮거나 성장 속도 이상 시 추가\n• 2~3시간 소요, 혈액 4~6회 (유치 삽입)\n• 피크값 10ng/mL 미만이면 성장호르몬 결핍증 의심\n• 보험 적용을 위해 2종 이상의 다른 방법으로 검사 필요\n\n💡 검사 비용 참고:\n• 골연령 + IGF-1 + 갑상선: 합계 약 5~8만 원\n• 성장호르몬 자극검사: 약 15~25만 원\n• 실손보험 적용 가능 여부 사전 확인 권장","tip":"검사 결과에 따라 치료가 필요한지, 어떤 치료가 맞는지 달라져요. 지금 검사를 미루면 치료 기회가 줄어들 수 있어요."},"gh_effect":{"type":"answer","title":"성장호르몬 치료 효과 — 질환별로 다르고, 시기가 중요해요","content":"진단과 시작 시기에 따라 효과 차이가 커요:\n\n📊 질환별 평균 효과:\n🥇 성장호르몬 결핍증 → 10~13cm (첫 해 8~10cm)\n🥈 터너증후군 → 7~8cm\n🥉 부당경량아 (SGA) → 5~7cm\n　　프라더-윌리 → 6~8cm (근육량 증가가 주효과)\n　　누난증후군 → 4~6cm\n　　만성 신부전 → 5~7cm\n　　특발성 저신장 → 3~5cm (개인차 큼)\n\n⏰ 시작 시기가 핵심이에요:\n• 골연령 6세 이하 시작 → 최고 효과 (평균 7.4cm 추가)\n• 골연령 8~9세 시작 → 적절한 효과\n• 골연령 11세 이후 시작 → 효과 급감\n• 골연령 14세 이후 → 거의 효과 없음, 보험 급여도 종료\n\n🌟 효과를 최대화하는 4가지 조건:\n1️⃣ 조기 시작: 사춘기 전 2년 이상 치료하면 효과 약 2배\n2️⃣ 규칙적 주사: 매일 빠짐없이\n   → 순응도 10% 향상 시 연간 약 1.1cm 추가 성장\n   → 주 1회 이상 빠지면 성장 속도 현저히 저하\n3️⃣ 적절한 용량: 체중 증가에 따라 3~6개월마다 재산정\n4️⃣ 수면·영양 병행: 충분한 수면 + 단백질·칼슘 섭취\n\n📌 치료 중단 후:\n• 이미 성장한 키는 줄지 않아요\n• 중단하면 치료 전 성장 속도로 돌아감\n• 목표 키에 도달 전 조기 중단은 금물","tip":"성장호르몬 치료는 단기간에 劇的으로 크는 것이 아니라, 수년간 꾸준히 치료 전보다 조금씩 더 자라는 방식이에요."},"gh_safety":{"type":"answer","title":"성장호르몬 안전성 — 40년간 검증된 치료예요","content":"성장호르몬 치료는 매우 안전해요. 1985년부터 유전자 재조합 기술로 생산된 제품을 사용해요.\n\n✅ 안전한 이유:\n• 우리 몸이 자연적으로 만드는 호르몬과 100% 동일한 구조 (아미노산 191개)\n• 몸이 '외부 물질'로 인식하지 않아요\n• 전 세계 40년 이상 사용, 수백만 명 치료 데이터\n\n📋 경미한 부작용 (3% 미만):\n• 주사 부위 발적/가려움/부종 → 1~2주 내 호전\n• 두통 → 1~2주 후 대부분 사라짐\n• 근육통/관절통 → 성장통 비슷, 2~4주 후 호전\n• 손발 경미한 부종 → 시간 지나면 사라짐\n\n⚠️ 드물지만 알아야 할 부작용:\n• 갑상선 기능 저하증: 치료 시작 후 1년 내 약 10~20%에서 발생 가능 → 혈액검사로 확인, 약으로 쉽게 교정\n• 혈당 상승: 비만/당뇨 가족력 있는 아이에서만 주의 → 매년 혈당 검사\n• 척추측만증: 정기 검사 시 확인 (특히 터너증후군, 프라더-윌리)\n• 대퇴골두 골단 분리: 매우 드묾, 갑작스러운 절뚝거림/고관절 통증 시 즉시 내원\n\n🚫 암 위험성:\n• 대규모 장기 연구: 건강한 아이는 암 발생 위험 증가 없음\n• 암 병력 있어도 완전 관해 후 개별 평가로 치료 가능\n\n🚫 말단비대증:\n• 치료 용량 범위 내에서는 절대 발생하지 않아요\n• 정기적 IGF-1 모니터링으로 과잉 방지\n\n🔴 즉시 응급실 내원:\n• 심한 두통 + 구토 + 시야 장애 (뇌압 상승 의심)\n• 갑작스러운 절뚝거림 (대퇴골두 골단 분리 의심)","tip":"치료 중 이상 증상이 생기면 항상 담당 의사에게 알려주세요. 정기적인 혈액검사와 외래 방문이 안전한 치료의 핵심이에요."},"gh_cost":{"type":"answer","title":"성장호르몬 비용과 보험 — 정확히 알고 준비하세요","content":"성장호르몬 약값은 체중과 진단에 따라 다르지만 기본 범위는 이렇습니다.\n\n💰 기본 약값:\n• 월 70~120만 원 (체중 1kg당 약 2.5~4만 원/월)\n• 체중이 늘면 용량도 늘어 비용도 증가\n예) 20kg 아이 → 월 약 50~80만 원\n예) 40kg 아이 → 월 약 100~160만 원\n\n📋 급여 적용 시:\n• 개인 부담 30% → 월 21~36만 원\n• 1개월 기준, 처방전 받아 약국에서 수령\n• 별도 급여 신청 불필요 (병원에서 자동 처리)\n\n📋 급여 종료 기준 (어느 하나라도 해당 시):\n• 골연령: 여아 14~15세 / 남아 15~16세 도달\n• 신장: 여아 153cm 초과 / 남아 165cm 초과\n• 연간 성장: 2cm 미만\n\n⚠️ 급여 안 되는 경우:\n• 특발성 저신장: 100% 자비\n• 월 70~120만 원 전액 부담\n• 2~3년 총 비용: 약 2,000~4,000만 원\n\n💡 절세 팁 — 의료비 세액공제:\n• 연간 의료비 중 총소득의 3% 초과분 × 15% 공제\n• 예) 소득 5천만 원 + 연간 의료비 500만 원\n  → 500만 - 150만(3%) = 350만 × 15% = 52.5만 원 절세\n• 6세 미만: 한도 없음\n• 7세 이상: 연 700만 원 한도\n• 실손보험 가입자: 보험사에 급여 여부 사전 확인","tip":"치료 기간이 길수록 비용이 커요. 첫 방문 시 예상 치료 기간과 총 비용을 의사와 미리 상담하세요."},"gh_injection":{"type":"answer","title":"성장호르몬 주사 방법 — 처음엔 무섭지만 금방 익숙해져요","content":"매일 피하주사로 맞아요. 처음엔 긴장되지만 대부분 1~2주면 익숙해져요!\n\n💉 기본 정보:\n• 바늘 굵기: 0.23mm (모기 주둥이보다 가늘어요)\n• 피하주사 → 근육주사보다 훨씬 덜 아파요\n• 최적 시간: 잠자기 직전 (밤 9~10시)\n  → 자는 동안 성장호르몬 자연 분비 고조와 맞춰요\n\n🎯 주사 부위 4곳 로테이션 (매일 바꿔야 해요):\n1. 복부: 배꼽에서 5cm 이상 떨어진 좌우 (최선택)\n2. 허벅지: 앞면 및 외측 상 1/3 부위\n3. 팔 뒤쪽: 삼두근 부위\n4. 엉덩이: 외상방\n\n⚠️ 같은 부위 계속 맞으면?\n지방 함몰(오목하게 꺼짐) 또는 경결(딱딱한 덩어리) → 약물 흡수 방해 → 치료 효과 감소\n\n📋 주사 절차:\n1. 손 깨끗이 씻기 (20초 이상)\n2. 냉장고에서 꺼내 15~30분 상온화 (냉약은 더 아파요)\n3. 알코올 솜으로 피부 소독, 10~15초 건조\n4. 피부를 가볍게 2~3cm 집어 올리기\n5. 90도 수직으로 빠르게 찌르기 (망설이면 더 아파요)\n6. 버튼 끝까지 누르고 「10초 유지」 (역류 방지 핵심!)\n7. 90도로 빠르게 뽑기 → 거즈로 10초 눌러주기 (비비면 멍)\n\n🧒 아이가 무서워할 때:\n• 선택권 주기: \"오늘은 배 오른쪽? 왼쪽?\"\n• 스티커 차트: 매일 맞으면 스티커, 주 목표 달성 시 소상\n• 주사 전 10분: \"곧 맞을 시간이야\" 예고하기\n• 절대 말해선 안 되는 것: \"전혀 안 아파\" (속임 → 신뢰 손상)\n\n📦 보관 및 관리:\n• 2~8°C 냉장 보관 (냉동 금지)\n• 개봉 후 28~30일 이내 사용\n• 여행 시 아이스팩 + 아이스박스\n• 사용한 바늘: 전용 폐기통(Sharps Container)에 수거\n• 3~6개월마다 체중 재측정 → 용량 재조정 (의사와 상의)","tip":"매일 같은 시간에 맞는 루틴을 만들면 빠짐없이 치료할 수 있어요. 순응도가 높을수록 치료 효과가 커져요."},"gh_timing":{"type":"answer","title":"치료 시작과 종료 시점 — 골연령이 기준이에요","content":"성장호르몬 치료의 시작과 종료는 골연령을 기준으로 판단해요.\n\n🟢 치료 시작 시기:\n• 빠를수록 좋아요 (골연령이 낮을수록 효과 ↑)\n• 최적 시기: 사춘기 시작 전 (여아 골연령 6~9세, 남아 골연령 8~10세)\n• 사춘기 전 2년 이상 치료 시 효과 약 2배\n\n🔴 치료 종료 기준 (보험 급여 종료):\n• 여아 골연령 14~15세 / 남아 골연령 15~16세\n• 여아 신장 153cm 초과 / 남아 165cm 초과\n• 연간 성장 2cm 미만 (이 시점이 되면 계속해도 효과 없음)\n\n💡 급여 종료 후 자비 치료:\n• 의학적으로 필요하다고 판단되면 자비로 계속 가능\n• 골연령은 기준에 달했지만 아직 2cm 이상 성장 중이면 의사와 상의\n\n📅 치료 중 모니터링 스케줄:\n• 처음 3개월: 매월 내원 (키/몸무게, 부작용 확인)\n• 안정기: 3~6개월마다 내원\n• 매 3~6개월: IGF-1 검사 (목표 0~ +2표준편차)\n• 6~12개월마다: 골연령 X-ray\n• 연 1회: 갑상선 기능, 혈당","tip":"치료를 갑자기 중단하면 성장 속도가 떨어져요. 종료 시점은 의사와 충분히 상의하고 결정하세요."},"puberty_main":{"type":"question","text":"성조숙증(사춘기 조기 시작)에 대해 어떤 부분이 걱정되시나요?","options":[{"text":"딸아이 가슴이 발달하는 것 같아요","next":"puberty_girl"},{"text":"아들 고환이 커지는 것 같아요","next":"puberty_boy"},{"text":"체취, 음모, 여드름이 생겼어요 (가슴/고환 변화 없음)","next":"ans_false_puberty"},{"text":"키가 갑자기 빠르게 자라고 있어요","next":"ans_rapid_growth"},{"text":"성조숙증 치료(GnRH 주사)가 궁금해요","next":"gnrh_treatment"},{"text":"성조숙증 + 성장호르몬 병행 치료가 궁금해요","next":"gnrh_gh_combo"},{"text":"딸아이 사춘기 발달 단계(타너 단계)가 궁금해요","next":"tanner_stage_girl"},{"text":"아들 사춘기 발달 단계(타너 단계)가 궁금해요","next":"tanner_stage_boy"},{"text":"진단 검사 과정이 자세히 궁금해요 (GnRH·뇌MRI)","next":"puberty_diagnosis_detail"}]},"puberty_girl":{"type":"question","text":"딸아이 나이가 어떻게 되나요?","options":[{"text":"만 8세 생일 전이에요 (성조숙증 기준)","next":"puberty_girl_under8"},{"text":"만 8~10세 사이예요","next":"puberty_girl_8_10"},{"text":"만 10세 이후인데 유방 발달이 막 시작됐어요","next":"puberty_girl_normal"},{"text":"유방 발달인지 지방인지 모르겠어요","next":"puberty_girl_unsure"}]},"puberty_girl_under8":{"type":"answer","title":"만 8세 미만 유방 발달 — 즉시 소아내분비과 방문 필요","recommend":true,"urgent":true,"content":"만 8세(주민등록 만 나이) 이전의 유방 발달은 의학적 정의의 성조숙증이에요. 빠른 평가가 필요해요.\n\n📌 만 나이 정확히 계산하는 법:\n생년월일 기준 만 나이 = 올해 연도 - 출생 연도 (생일 아직 안 지났으면 -1)\n예) 2017년 5월 15일생 → 2025년 1월 현재 = 만 7세 (5월 생일 안 지남)\n\n🔬 병원에서 받을 검사:\n1. 골연령 X-ray (가장 중요)\n   → 얼마나 앞서있는지 확인\n2. GnRH 자극검사 (진성 vs 가성 감별 핵심)\n   → LH 피크값 5IU/L 이상 = 진성 성조숙증 확진\n   → 90분, 혈액 5회 (유치 삽입)\n3. 복부 초음파 (자궁·난소 크기 확인)\n   → 초경 전 자궁길이 4cm 미만이면 아직 초기\n4. 뇌 MRI\n   → 만 6세 이하: 필수\n   → 6~8세: 진행이 빠르거나 신경 증상 있을 때\n\n⚠️ 치료 필요 여부 판단:\n• 골연령이 실제 나이보다 2년 이상 앞서고\n• 진행이 빠른 경우 → 치료 적극 고려\n• 골연령이 많이 앞서지 않고 진행 느리면 경과 관찰\n\n📊 치료 안 하면?\n• 여아 유전 목표 키보다 평균 10cm 미달 (유럽 장기 연구)\n• 초경이 9~10세에 일찍 올 수 있음","tip":"빠른 진단과 치료가 최종 키를 지키는 열쇠예요. 발견하는 순간 지체하지 말고 소아내분비과를 찾아주세요."},"puberty_girl_8_10":{"type":"question","text":"만 8~10세 유방 발달, 어떤 상황인가요?","options":[{"text":"최근에 처음 발견했어요","next":"puberty_girl_new"},{"text":"3~6개월 사이에 많이 커진 것 같아요","next":"puberty_girl_progress"},{"text":"6개월 이상 됐는데 거의 변화 없어요","next":"puberty_girl_stable"},{"text":"유방 발달인지 지방인지 모르겠어요","next":"puberty_girl_unsure"},{"text":"조기 유방 발육 vs 성조숙증, 정확한 구별법이 궁금해요","next":"premature_thelarche_detail"}]},"puberty_girl_new":{"type":"answer","title":"새로 발견된 유방 발달 — 평가를 받아보세요","recommend":true,"content":"최근 처음 발견했다면 소아내분비과에서 평가를 받아보세요.\n\n📌 만 8~10세 유방 발달:\n• 만 8세 이후는 의학적 「성조숙증」 기준은 아니지만 평가는 필요해요\n• 8~9세: 진행 빠르면 치료 고려 / 느리면 경과 관찰\n• 9~10세: 이미 정상 사춘기 범위에 걸쳐있어요\n\n🔍 평가 포인트:\n• 진행 속도가 빠른가? (6개월 내 2단계 이상 진행)\n• 골연령이 실제 나이보다 2년 이상 앞서는가?\n• 급속 성장기가 왔는가? (갑자기 키가 빠르게 자라는 경우)\n• 예측 최종 키가 유전 목표보다 5cm 이상 낮은가?\n\n📊 치료 기준 (이 중 해당 시 고려):\n• GnRH 자극검사 LH 피크 5IU/L 이상\n• 골연령이 실제 나이보다 2년 이상 초과\n• 예측 최종 키가 유전 목표보다 명확히 낮음\n• 빠른 진행으로 심리적 고통\n\n✅ 검사 비용 참고:\n• 골연령 + 혈액검사 기본: 약 5~8만 원\n• GnRH 자극검사 추가: 약 15~20만 원\n• 복부 초음파: 약 3~5만 원","tip":"발달을 처음 발견한 날짜, 변화 속도를 기록해두면 의사에게 큰 도움이 돼요."},"puberty_girl_progress":{"type":"answer","title":"유방 발달이 빠르게 진행 중 — 빨리 진료받으세요","recommend":true,"content":"3~6개월 안에 계속 커지고 있다면 진행 속도가 빠른 것으로, 평가와 치료가 필요할 수 있어요.\n\n⚠️ 빠른 진행의 의미:\n• 골연령도 빠르게 앞서갈 가능성 높음\n• 성장판 조기 폐쇄 위험\n• 예측 최종 키 지속 하락 가능\n\n📊 GnRH 치료 효과 (골연령 기준):\n• 골연령 6세 이전 시작: 평균 7.4cm 추가 개선 (최고 효과)\n• 골연령 8~9세 시작: 효과 있지만 제한적\n• 골연령 10~11세 시작: 더 제한적\n• 골연령 11세 이상: 거의 효과 없음\n\n🔬 지금 필요한 검사:\n1. 골연령 X-ray\n2. GnRH 자극검사 (LH 피크 5IU/L↑ = 진성 성조숙증)\n3. 복부 초음파 (자궁·난소 성숙도)\n4. 뇌 MRI (필요 시)\n\n💉 치료(GnRH 주사) 시작하면:\n• 빠른 사춘기 진행이 멈추거나 느려짐\n• 골연령 진행 속도 정상화\n• 초경을 동갑 친구들과 비슷하게 늦춰줌\n• 최종 키 손실 예방","tip":"빠른 진행일수록 빨리 시작해야 효과가 커요. 오늘 당장 예약하세요."},"puberty_girl_stable":{"type":"question","text":"6개월 이상 변화가 없는 유방 발육(조기 유방 발육증)에 대해 더 알고 싶은 점은?","options":[{"text":"성조숙증과 어떻게 구별하나요?","next":"thelarche_vs_precocious"},{"text":"저절로 없어지나요? 예후가 궁금해요","next":"thelarche_prognosis"},{"text":"환경호르몬이 원인인가요?","next":"thelarche_cause"},{"text":"추적 관찰을 어떻게 해야 하나요?","next":"thelarche_followup"}]},"puberty_girl_normal":{"type":"answer","title":"만 10세 이후 유방 발달 — 정상 사춘기 범위예요","content":"만 10세 이후의 유방 발달은 정상 사춘기의 시작이에요.\n\n📊 여아 사춘기 정상 시기:\n• 유방 발달 시작: 평균 9~11세 (8~13세가 정상 범위)\n• 음모 발달: 보통 유방 발달 6개월~1년 후\n• 급속 성장기: 유방 발달 시작 6개월~1년 후\n• 초경: 유방 발달 시작 후 평균 2~2.5년 (평균 12~13세)\n\n📈 초경 후 성장:\n• 초경 전 1년: 약 8~10cm 성장 (급속 성장 최고조)\n• 초경 후 1년: 약 2~3cm\n• 초경 후 2년: 약 1~2cm\n• 이후 성장 거의 멈춤 → 총 5~7cm 추가\n\n✅ 걱정하지 않아도 되는 경우:\n• 사춘기 단계가 자연스럽게 진행\n• 골연령이 실제 나이보다 1년 이내 차이\n• 예측 최종 키가 유전 목표 키 범위 내\n\n⚠️ 진료 필요한 경우:\n• 6개월 이내 사춘기가 2단계 이상 급격히 진행\n• 초경이 10세 이전에 올 것 같은 경우\n• 예측 최종 키가 유전 목표보다 5cm 이상 낮음","tip":"정상 사춘기가 시작됐어요. 균형 잡힌 영양과 충분한 수면으로 남은 성장을 최대화하세요."},"puberty_girl_unsure":{"type":"answer","title":"유방 선조직 vs 지방 구별법","content":"많은 부모님이 같은 질문을 하세요. 간단하게 구별할 수 있어요.\n\n👆 집에서 확인하는 방법:\n• 유방 선조직: 유두 바로 아래에 작은 딱딱한 덩어리 느낌\n  (살짝 눌리면 약간 아플 수 있음, 단추나 자갈처럼 느껴짐)\n• 지방 축적: 전체적으로 부드럽고 물렁물렁함\n  (유두 아래 딱딱한 부분이 없음)\n\n📊 한쪽만 먼저 나오는 경우:\n정상이에요! 조기 유방 발육이나 사춘기 초기에 한쪽만 먼저 생기는 경우 매우 흔해요.\n\n🏥 병원에서 확인하는 방법:\n• 의사가 촉진(만져서 확인)\n• 유방 초음파: 유선 조직 vs 지방 명확히 구분 가능, 완전 무통\n• 초음파에서 유선 조직 확인 = 유방 발달 시작\n\n✅ 집에서 딱딱한 덩어리가 느껴진다면:\n만 8세 이전이면 즉시 내원, 만 8세 이후면 변화 양상 관찰 후 내원","tip":"불확실할 때는 병원에서 초음파로 확인하는 것이 가장 정확해요. 검사 자체는 간단하고 5~10분이면 돼요."},"puberty_boy":{"type":"question","text":"아들 아이에게 어떤 변화가 있나요?","options":[{"text":"고환이 커진 것 같아요 (만 9세 미만)","next":"ans_boy_precocious"},{"text":"변성기, 키 급성장이 왔어요","next":"ans_boy_signs"},{"text":"음모/체취만 있고 고환 변화는 없어요","next":"ans_boy_false_puberty"},{"text":"사춘기가 너무 늦은 것 같아요 (만 14세 이상)","next":"ans_boy_delayed"}]},"ans_boy_precocious":{"type":"answer","title":"만 9세 전 고환 증대 — 즉시 전문 평가 필요해요","recommend":true,"urgent":true,"content":"남아의 경우 만 9세(주민등록 만 나이) 이전 고환 증대는 성조숙증 기준이에요.\n\n📏 고환 크기 기준:\n• 4mL 이상 (길이 약 2.5cm 이상) = 사춘기 시작\n• 고환 크기는 부모님이 확인하기 어려워 전문의 진찰 필요\n\n⚠️ 남아 성조숙증이 더 심각한 이유:\n• 여아와 달리 남아는 기질적 병변(뇌 종양 등) 가능성이 더 높아요\n• 과거 기질적 원인: 40~75% → 최근 7~16%로 감소했지만 여전히 주의\n• 남아 성조숙증은 드물기 때문에 더 철저한 검사가 필요\n\n🔬 반드시 받아야 할 검사:\n1. 골연령 X-ray (필수)\n2. GnRH 자극검사 (LH 피크 5IU/L↑ = 진성)\n3. 뇌 MRI (남아는 필수)\n   → 하시 마토 과오종(양성 종양), 뇌하수체 종양 등 배제\n4. 혈중 성호르몬 (테스토스테론, LH, FSH, DHEA-S)\n5. 고환 초음파 (고환 종양 배제)\n\n💰 비용:\n• 기본 검사 + 뇌 MRI: 약 25~45만 원\n• 급여 적용 시 훨씬 감소 (뇌 병변 확인 시 대부분 급여)\n\n📊 치료 효과:\n• 유럽 장기 추적: 남아 치료 안 하면 유전 목표보다 평균 20cm 미달\n• 여아(10cm 미달)보다 남아가 더 큰 키 손실","tip":"남아 성조숙증은 드물기 때문에 더 적극적으로 평가해야 해요. 가능한 한 빨리 소아내분비과를 찾아주세요."},"ans_boy_signs":{"type":"answer","title":"사춘기 신호 — 시기와 속도가 핵심이에요","content":"변성기, 수염, 키 급성장은 사춘기 중후반 신호예요.\n\n📊 남아 사춘기 순서:\n1. 고환 증대 (4mL↑) ← 사춘기 시작\n2. 음모 발달 (고환 증대 후 6개월~1년)\n3. 키 급속 성장기 (고환 증대 후 1~2년, 평균 13~15세)\n   → 연간 9~10cm 급성장, 약 2~3년 지속\n4. 변성기 (급성장과 비슷한 시기)\n5. 수염 발달 (사춘기 가장 마지막 신호)\n   → 수염이 나면 급성장 끝에 가까워요\n\n📈 남아의 총 사춘기 성장:\n• 급속 성장기: 25~30cm (여아보다 5~7cm 더 큼)\n• 여아보다 사춘기 2년 늦게 시작하는 대신 2~3년 더 지속\n• 이게 남성이 평균 13cm 더 큰 이유\n\n✅ 정상 범위:\n• 사춘기 시작: 10~12세\n• 9세 이전 시작 = 성조숙증\n• 14세 이후에도 시작 안 하면 = 사춘기 지연 평가 필요\n\n🔬 평가 필요한 경우:\n• 사춘기가 9세 이전에 시작\n• 골연령이 실제 나이보다 2년 이상 초과\n• 예측 최종 키가 유전 목표보다 크게 낮음","tip":"수염이 나기 시작했다면 급성장 시기가 거의 끝나가고 있어요. 남은 성장을 최대화하는 생활습관이 중요해요."},"ans_boy_false_puberty":{"type":"answer","title":"가성 성조숙증 (부신성) — 원인이 달라요","content":"고환 변화 없이 음모·체취만 있다면, 가성 성조숙증(부신성)일 가능성이 높아요.\n\n📌 진성 vs 가성 차이:\n• 진성: 뇌에서 신호 → 고환/난소 자극 → 성호르몬 분비\n  남아: 고환이 먼저 커져요\n• 가성: 뇌와 무관하게 부신에서 직접 안드로겐 분비\n  남아: 고환 크기는 정상, 음모/체취/여드름만\n\n🔬 가장 흔한 원인 — 조기 부신 기능 항진:\n• 부신에서 DHEA-S를 일찍 분비\n• 대부분 예후 좋음 (완전한 사춘기로 진행 드묾)\n• 단, 1~2년 내 진성 성조숙증으로 진행 여부 확인 필요\n\n🏥 확인이 필요한 이유:\n드물지만 부신 종양이나 선천성 부신 과형성이 원인일 수 있어요.\n반드시 혈액검사(DHEA-S, 테스토스테론, 17-OHP) 확인 필요\n\n⚠️ 주의:\nGnRH 자극검사에서 LH 반응 없음 → 가성 성조숙증 확인\nGnRH 치료는 가성 성조숙증에는 효과 없음 (원인 치료 필요)","tip":"음모나 체취가 있어도 고환 크기가 정상이면 완전히 다른 접근이 필요해요. 반드시 전문의 진찰을 받으세요."},"ans_boy_delayed":{"type":"answer","title":"남아 사춘기 지연 — 체질적인 경우가 대부분이에요","recommend":true,"content":"남아가 만 14세까지 고환 증대(4mL↑)가 없으면 사춘기 지연으로 평가해요.\n\n📊 체질성 성장 지연 (60~80%):\n• 늦게 피는 타입 — 결국 정상으로 자라요\n• 특징: 부모님 중 한 명도 늦게 컸을 것 (아버지가 \"고3에 키 컸다\" 등)\n• 골연령이 실제 나이보다 1~3년 낮음\n• 키가 작아도 성장 속도 자체는 정상 (연 4~5cm)\n\n✅ 기다려도 되는 경우:\n• 아버지 늦게 큰 병력\n• 골연령 낮음 (성장판 아직 충분히 열려있음)\n• 검사 정상 (성장호르몬, 갑상선 등)\n• 키가 작아도 꾸준히 자라고 있음\n\n⚠️ 병적 사춘기 지연 가능성:\n• 클라인펠터 증후군 (47,XXY)\n• 뇌하수체 기능 이상\n• 만성 소모성 질환 (크론병, 만성 신부전 등)\n• 심한 영양 결핍\n\n💊 치료 옵션 (체질성인 경우):\n• 대부분 기다리면 자연 사춘기 도래\n• 심한 심리적 스트레스 시: 소량 테스토스테론으로 사춘기 유도 가능\n• 치료해도 최종 키는 정상 (유전 목표 범위 내)\n\n🔬 검사:\n골연령 + 성장호르몬 자극검사 + 염색체 검사 (클라인펠터 배제)","tip":"체질성 사춘기 지연이라면 걱정하지 않아도 돼요. 친구들이 다 커서 상대적으로 작아 보이는 시기를 버티면 결국 정상 키에 도달해요."},"ans_false_puberty":{"type":"answer","title":"가성 성조숙증 — 원인이 다르고 치료도 달라요","content":"유방 발달(여아) 또는 고환 증대(남아) 없이 음모·체취·여드름만 있다면 「가성 성조숙증」을 의심해요.\n\n🔵 진성 vs 가성 비교:\n구분 | 진성 성조숙증 | 가성 성조숙증\n뇌 신호 | 있음 | 없음\n여아 | 유방 발달이 먼저 | 유방 발달 없음\n남아 | 고환이 먼저 커짐 | 고환 크기 정상\n공통 | LH↑, FSH↑ | DHEA-S↑, LH 정상\n치료 | GnRH 주사 | 원인 치료\n\n📌 가장 흔한 원인 — 조기 부신 기능 항진:\n• 부신에서 DHEA-S를 일찍 분비\n• 전체 가성 성조숙증의 다수 차지\n• 대부분 예후 양호, 정상 사춘기로 자연 진행\n• 단, 시간이 지나 진성으로 진행하는 경우 있음 → 추적 관찰 필요\n\n⚠️ 드물지만 주의:\n• 부신 종양, 난소/고환 종양\n• 선천성 부신 과형성 (남아에서 남성호르몬 과다)\n\n🔬 필요 검사:\n• DHEA-S, 테스토스테론, 17-OHP (부신 기원 확인)\n• GnRH 자극검사 (진성 배제)\n• 부신/골반 초음파","tip":"가성 성조숙증은 진성과 원인이 완전히 달라서 GnRH 주사가 효과 없어요. 정확한 감별이 중요해요."},"ans_early_menarche":{"type":"answer","title":"초경이 일찍 왔다면 — 남은 성장 기회가 얼마인지 확인해요","recommend":true,"content":"초경은 급속 성장기가 거의 끝났다는 신호예요.\n\n📊 초경 후 평균 성장량:\n• 초경 당해 연도: 약 2~3cm\n• 그 다음 해: 약 1~2cm\n• 이후: 거의 성장 없음\n• 초경 이후 총 성장: 약 5~7cm\n\n📌 골연령으로 남은 성장 확인:\n초경 직후라도 골연령이 12세 미만이면 아직 치료 기회가 있을 수 있어요.\n\n⚠️ 초경이 10세 이전이라면:\n성조숙증 치료가 늦은 것일 수 있어요. 골연령 X-ray로 확인이 필요해요.\n\n✅ 남은 성장 최대화 전략:\n• 충분한 수면 (밤 10시 이전 취침 권장)\n• 단백질 + 칼슘 + 비타민D 충분 섭취\n• 스트레스 최소화\n• 규칙적인 운동 (줄넘기, 배구 등 점프 운동)\n\n🔴 치료 가능 여부 확인:\n• 골연령 12세 미만 + 아직 급속 성장 중이면 치료 의미 있음\n• 골연령 14세 이상이면 치료 효과 없음","tip":"초경 후라도 포기하지 마세요. 골연령 검사로 남은 기회를 정확히 파악하고 나서 결정하세요."},"ans_rapid_growth":{"type":"answer","title":"키가 갑자기 확 자란다면 — 성조숙증 신호일 수 있어요","recommend":true,"content":"키가 갑자기 빠르게 자라는 건 성조숙증의 초기 신호일 수 있어요.\n\n⚠️ 성조숙증의 역설:\n• 초반: 또래보다 5~8cm 크고 잘 크는 것처럼 보여요\n• 키 백분위도 갑자기 올라가요 (예: 50→75백분위)\n• 후반: 성장판이 일찍 닫혀 최종 키가 예상보다 5~15cm 작아질 수 있어요\n\n📊 정상 성장 vs 성조숙증 초기 성장:\n• 정상: 연간 5~7cm (사춘기 전)\n• 성조숙증 초기: 연간 8~10cm 이상 (급속 성장 조기 시작)\n\n🔍 동시에 확인할 것:\n• 유방 발달 (여아) / 고환 증대 (남아)\n• 음모, 체취, 여드름\n• 신장 백분위 최근 변화 기록\n\n🔬 권장 검사:\n• 골연령 X-ray (성장판 성숙도 확인)\n• GnRH 자극검사 (사춘기 진행 여부)\n• 혈중 성호르몬 수치\n\n📌 지금 키가 큰 아이가 나중에 반드시 큰 건 아니에요:\n소아과 의사들은 이런 아이를 \"빨리 시작해서 일찍 끝나는 아이\"라고 표현해요.","tip":"갑자기 키가 많이 자랐다고 기뻐하기 전에 골연령 검사로 성장판 상태를 확인해보세요."},"gnrh_treatment":{"type":"question","text":"GnRH 치료(성조숙증 치료)에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"치료 원리와 효과가 궁금해요","next":"gnrh_how_work"},{"text":"치료 기간과 종료 시점이 궁금해요","next":"gnrh_duration"},{"text":"플레어업 현상이 뭔가요?","next":"gnrh_flare_up"},{"text":"급여 조건과 비용이 궁금해요","next":"gnrh_insurance_detail"},{"text":"약물 종류와 주사 방법이 궁금해요","next":"gnrh_drugs_detail"}]},"gnrh_gh_combo":{"type":"answer","title":"GnRH + 성장호르몬 병행 치료 — 언제 고려하나요?","content":"성조숙증 치료(GnRH) 중에 성장호르몬을 함께 쓰는 병행 치료예요.\n\n🎯 병행 치료 적응증:\n다음 중 하나 이상 해당 시 고려:\n① 골연령 예측 최종 키가 3백분위 미만\n② GnRH 단독 치료 중 연간 성장 4cm 미만 (상대적 성장호르몬 부족)\n③ 유전 목표 키보다 예측 키가 명확히 낮음\n\n📊 효과:\n• GnRH 단독: 예측 키 보존 (손실 방지)\n• 병행 치료: 단독보다 4~6cm 추가 개선\n• 예시: 목표 155cm → 단독 154~157cm → 병행 160~162cm\n\n메커니즘:\n• GnRH: 골연령 진행 늦춤 (시간 벌기)\n• 성장호르몬: IGF-1 경로 추가 자극 (성호르몬과 독립적 경로)\n• 두 효과가 시너지\n\n💰 비용 (병행 시):\n• GnRH (비급여): 월 약 11만 원\n• 성장호르몬 (자비): 월 약 80~130만 원 (체중에 따라)\n• 합계: 월 약 91~141만 원\n• 1년 비용: 약 1,000~1,600만 원\n• 2~3년 총 비용: 약 2,000~5,000만 원\n\n⚠️ 성장호르몬 급여:\n성조숙증에 병행하는 성장호르몬은 대부분 급여 안 됨\n→ 단, 성장호르몬 결핍증을 동시에 진단받으면 급여 가능 (드묾)\n\n✅ 병행 치료 시작 권고:\nGnRH 단독 6~12개월 치료 후 성장 반응 확인 후 결정\n→ 연간 성장 4cm 미만이면 병행 적극 고려","tip":"비용 부담이 크지만, 이 치료를 통해 얻을 수 있는 키 차이도 커요. 주치의와 충분히 상담 후 가족이 함께 결정하세요."},"obesity_main":{"type":"question","text":"비만에 대해 어떤 부분이 걱정되시나요?","options":[{"text":"우리 아이가 비만인지 진단 기준이 궁금해요","next":"obesity_diagnosis"},{"text":"비만이 키 성장에 영향을 주나요?","next":"obesity_height"},{"text":"비만이 성조숙증을 유발하나요?","next":"obesity_puberty"},{"text":"목뒤/겨드랑이가 검게 됐어요","next":"ans_acanthosis"},{"text":"비만 관리 방법이 궁금해요","next":"obesity_management"},{"text":"몇 살부터 비만 예방이 중요한가요? (생애주기별)","next":"obesity_lifecycle"},{"text":"5~7세 체지방 반등(Adiposity Rebound)이 뭔가요?","next":"adiposity_rebound"},{"text":"어릴 때 찐 살은 다 키로 간다는 말, 사실인가요?","next":"obesity_height_myth"},{"text":"소아비만이면 성인이 되어도 비만인가요?","next":"obesity_longterm"},{"text":"빨리 먹는 습관이 비만을 만드나요?","next":"eating_speed_obesity"},{"text":"비만 예방은 언제부터 시작해야 하나요?","next":"obesity_prevention_timing"}]},"obesity_diagnosis":{"type":"answer","title":"소아 비만 진단 기준 — 성인 기준과 달라요","content":"아이는 성인 기준(BMI 25↑)을 적용할 수 없어요. 연령·성별에 따른 백분위수로 판단해요.\n\n📊 소아 BMI 백분위 분류:\n• 5백분위 미만 → 저체중\n• 5~84백분위 → 정상\n• 85~94백분위 → 과체중 (주의 단계)\n• 95백분위 이상 → 비만\n• 95백분위의 120% 이상 → 중증 비만\n\n🧮 BMI 계산법:\n체중(kg) ÷ 키(m)² = BMI\n예) 키 140cm(1.4m), 체중 45kg → BMI = 45 ÷ 1.96 ≈ 23\n\n📏 비만도 (표준체중 대비):\n• (실제 체중 - 표준체중) ÷ 표준체중 × 100\n• +10~+20%: 과체중\n• +20~+30%: 경도 비만\n• +30~+50%: 중등도 비만\n• +50%↑: 고도 비만\n\n⚖️ 체지방률 (가장 정확):\n• 남아 25% 이상 → 비만\n• 여아 30% 이상 → 비만\n• 체성분분석기(인바디)로 측정, 비통증\n\n⚠️ 즉시 내원 필요:\n• BMI 95백분위 이상\n• 비만한데 키가 작으면 (내분비 질환 의심)\n  → 갑상선 저하증, 쿠싱 증후군 등 배제 필요","tip":"비만인데 키까지 작다면 단순 비만이 아닐 수 있어요. 단순 비만 아이는 오히려 또래보다 키가 큰 경우가 많아요."},"obesity_height":{"type":"answer","title":"비만이 키 성장에 미치는 영향 — 초반에는 크지만 결국 손해예요","content":"비만 아이의 성장은 「빨리감기 모드」예요 — 처음엔 빠르지만 일찍 끝나요.\n\n📊 두 가지 얼굴:\n\n✅ 초반 (부모가 좋아하는 단계):\n• 또래보다 5~8cm 크고 키 75~95백분위\n• 골연령 0.5~1.5년 초과\n• 이유: 지방 → 렙틴↑ → IGF-1↑, 인슐린↑ → 성장판 자극\n\n⚠️ 후반 (실제 문제):\n• 청소년기에 청소기가 일찍 시작\n• 성장판이 조기 폐쇄 → 생각보다 일찍 성장 멈춤\n• 친구들이 클 때 이미 멈춰있음\n\n📊 연구 결과:\n• 비만만 있는 경우: 여아 2.3cm, 남아 3.1cm 덜 자람 (스웨덴 대규모 연구)\n• 비만 + 빠른 성조숙증 병발 시: 유전 목표보다 5~8cm 미달\n  (예: 목표 159cm → 실제 151cm, 연구 기준)\n\n💡 단, 비만 단독(성조숙증 없는 경우)은 최종 키 영향이 크지 않을 수 있어요.\n\n🎯 핵심:\n비만 → 성조숙증 유발 → 최종 키 손실 이 연결고리가 문제예요.\n\n✅ 대처법:\n체중 관리가 곧 키 관리예요\n• 체중 5~10% 감소 시 렙틴↓ → 골연령 진행 속도 정상화","tip":"초등학교 때 친구들보다 키 커서 좋다고 방심하면 중학교 때 작아질 수 있어요."},"obesity_puberty":{"type":"answer","title":"비만과 성조숙증의 관계 — 체중 관리가 사춘기도 관리해요","content":"비만은 성조숙증의 가장 중요한 위험 인자 중 하나예요.\n\n🔬 기전:\n지방↑ → 렙틴(Leptin)↑ → 뇌 하시모토 시스템(Kisspeptin)↑\n→ GnRH 분비↑ → LH·FSH↑ → 성호르몬↑ → 사춘기 조기 시작\n\n렙틴은 음식 섭취를 조절하는 호르몬이기도 하지만\n동시에 사춘기를 시작하는 신호 물질이기도 해요.\n\n📊 연구 결과:\n• 비만 지속 1년 이상인 여아: 성조숙증 위험 증가\n• 비만 여아의 성조숙증 발병률: 정상 체중 여아의 약 2~3배\n\n📈 비만 아이의 사춘기 패턴:\n• 여아 8세 전후 유방 발달 시작 가능\n• 남아는 상대적으로 덜 뚜렷 (여아에서 더 명확한 경향)\n\n✅ 체중 관리의 이점:\n• 렙틴 감소 → 조기 사춘기 위험 감소\n• 인슐린 저항성 개선 → 성호르몬 정상화\n• 골연령 진행 속도 정상화\n• 연구: 체중 5~10% 감소 시 비만 관련 성조숙증 위험 유의미하게 감소\n\n⚠️ 성장기 급격한 체중 감량은 금물:\n목표는 「키 크면서 체중 유지」, 급격한 다이어트는 성장 방해","tip":"성조숙증 걱정된다면 체중 관리가 최선의 예방이에요. 특히 초등학교 입학 전부터 건강한 식습관 형성이 중요해요."},"ans_acanthosis":{"type":"answer","title":"흑색극세포증 — 인슐린 저항성의 피부 신호예요","recommend":true,"content":"목뒤, 겨드랑이, 사타구니가 검고 두꺼워지는 「흑색극세포증(Acanthosis Nigricans)」이에요.\n\n🔍 특징:\n• 아무리 씻어도 때처럼 보여요\n• 벨벳처럼 부드럽고 두꺼운 느낌\n• 가장 흔한 부위: 목뒤, 겨드랑이, 사타구니\n\n🧬 왜 생기나요?\n혈액 속 인슐린 농도가 높아지면 (고인슐린혈증)\n→ 피부 세포(케라티노사이트) 과증식\n→ 멜라닌 침착\n→ 검고 두꺼운 피부 형성\n\n인슐린이 높다 = 인슐린 저항성이 있다는 신호\n인슐린 저항성 = 당뇨전단계·대사증후군의 전 단계\n\n📊 통계:\n• 흑색극세포증이 있는 비만 청소년의 70% 이상에서 고인슐린혈증\n• 60% 이상에서 인슐린 저항성 확인\n\n✅ 필요한 검사:\n• 공복 인슐린 (15µU/mL↑ = 고인슐린혈증)\n• HOMA-IR (인슐린 저항성 지표)\n• 공복 혈당, 당화혈색소\n• 혈중 지질 (콜레스테롤, 중성지방)\n\n💡 치료:\n• 흑색극세포증 자체 치료보다 인슐린 저항성 치료가 먼저\n• 체중 5~10% 감량 + 운동 + 식이 개선\n• 4~6개월 내 인슐린 저항성 호전 시 피부도 점점 나아져요\n• 메트포르민(당뇨약): 인슐린 저항성 심할 때 처방 가능","tip":"흑색극세포증은 몸이 \"당뇨로 가고 있어요\"라고 보내는 피부 경고등이에요. 발견하면 꼭 소아내분비과에서 인슐린 저항성 검사를 받으세요."},"obesity_management":{"type":"question","text":"비만 관리 방법에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"식이요법이 궁금해요","next":"ans_obesity_diet"},{"text":"운동 방법이 궁금해요","next":"ans_obesity_exercise"},{"text":"생활 습관 전반이 궁금해요","next":"ans_obesity_lifestyle"},{"text":"약물 치료가 필요한 경우가 있나요?","next":"ans_obesity_medicine"},{"text":"GLP-1 약물 치료(Saxenda·Wegovy) 상세 안내","next":"glp1_detail"},{"text":"중증 비만 수술 치료 — 언제, 어떻게?","next":"obesity_surgery"}]},"ans_obesity_diet":{"type":"answer","title":"성장기 아이를 위한 비만 식이요법","content":"⚠️ 가장 중요한 원칙: 아이에게 \"굶기기\"는 절대 안 돼요!\n목표는 \"식사 구성 최적화\"예요.\n\n📋 5가지 핵심 식사 원칙:\n\n1️⃣ 매끼 단백질 식품 1가지\n아침: 달걀·우유·요거트·치즈 중 하나\n점심: 고기·생선·두부·달걀 중 하나\n저녁: 생선 또는 두부 (주 2~3회 고기)\n\n2️⃣ 하루 2~3회 유제품 (칼슘 보충)\n\n3️⃣ 밥그릇 절반은 채소\n다양한 색깔 채소 (색깔마다 다른 영양소)\n\n4️⃣ 흰쌀밥 → 잡곡밥, 흰빵 → 통밀빵\n정제 탄수화물 줄이면 혈당 스파이크 감소\n\n5️⃣ 음료는 물만 (과일주스·탄산음료 금지)\n100% 과일주스도 당분 높아요\n\n🚫 절대 안 되는 것:\n• 굶기기 (성장 방해, 근육 손실)\n• 음식으로 상벌하기\n• 혼자만 다이어트 식단 (가족 모두 함께)\n• 야식 (특히 밤 9시 이후 → 성장호르몬 분비 방해)\n\n📊 칼로리보다 영양 비율이 중요:\n탄수화물 50~60% / 단백질 15~20% / 지방 20~30%\n\n💡 외식 전략:\n• 한식·일식 추천 (탄·단·지 균형)\n• 중식·패스트푸드: 나트륨 과다, 주 1회 이하\n• 외식 다음날: 채소·과일 늘리고 충분한 수분","tip":"식사 시간에는 TV·스마트폰 끄기! 화면 보면서 먹으면 포만감을 느끼지 못해 과식하게 돼요."},"ans_obesity_exercise":{"type":"answer","title":"성장기 아이에게 맞는 운동","content":"📌 목표: 하루 60분 이상 중등도 운동 (WHO 권장)\n중등도 = 약간 숨이 찬데 대화는 가능한 정도\n\n✅ 추천 운동:\n• 빠르게 걷기: 온 가족이 식후 30분 산책\n• 수영: 관절 부담 없이 전신 운동\n• 자전거, 축구, 농구, 배드민턴\n• 줄넘기: 성장판 자극 + 심폐기능 향상\n\n💪 근력 운동에 대한 오해:\n\"아이가 근력 운동 하면 키 안 큰다?\" → ❌ 잘못된 상식!\n미국소아과학회 2020·2024 지침: 적극 권장\n• 적절히 설계된 근력 운동은 성장판·신체에 해 없음\n• 오히려 골밀도 향상\n• 비만 아이에게 유산소보다 근력 운동이 먼저 효과적인 경우도\n\n✅ 추천 근력 운동 (자체 체중):\n• 스쿼트, 팔굽혀펴기, 플랭크, 런지\n\n📅 운동 지속 비결:\n1. 아이가 좋아하는 운동 선택 (억지로 하면 지속 안 됨)\n2. 부모가 함께 (부모 운동 시 아이가 활동적일 확률 5배↑)\n3. 작은 변화부터: 엘리베이터 대신 계단, 가까운 거리 걷기\n\n📊 운동의 인슐린 저항성 개선 효과:\n• 운동 후 최장 48시간 효과 지속\n• 격일 운동도 충분히 인슐린 감수성 유지 가능","tip":"\"30분 운동\"보다 \"매일 엘리베이터 대신 계단\"이 지속하기 쉬워요. 작은 것부터 시작해요."},"ans_obesity_lifestyle":{"type":"answer","title":"생활 습관 개선 — 매일 1%씩의 마법","content":"🌟 매일 1%씩 변화하는 마법:\n오늘 계단 한 층 더, 내일 물 한 잔 더 — 쌓이면 6개월 후 아이가 완전히 달라져요.\n(매일 1% 개선 = 1년 후 37배 나아짐)\n\n📱 스크린 시간 줄이기:\n• 만 6세↑: 비학습 목적 하루 2시간 이하 (미국소아과학회)\n• 스크린 5시간↑: 비만 위험 5배\n• 밥 먹을 때 화면 금지 (포만감 인식 방해)\n\n😴 충분한 수면:\n• 초등생 (6~12세): 9~12시간\n• 중고생 (13~18세): 8~10시간\n• 수면 부족 → 비만 위험 58%↑\n• 수면 부족 → 식욕 촉진 호르몬(그렐린)↑, 포만 호르몬(렙틴)↓\n\n🏠 환경 개선이 의지력보다 중요:\n• 냉장고에 과일·채소 채우기\n• 과자·탄산음료 사지 않기 (\"없으니까 안 먹는 것\"이 \"참는 것\"보다 쉬움)\n• 물을 식탁 위에, 탄산음료는 냉장고 맨 뒤에\n• 리모컨은 서랍 속, 줄넘기는 거실에\n\n👨‍👩‍👧 온 가족이 함께:\n• 가족 공동 식사 주 3회↑ → 비만 위험 12%↓\n• 부모가 채소 즐기면 아이도 채소 먹을 확률 3배↑\n• 절대 금지 발언: \"왜 이렇게 뚱뚱해\" → 자존감↓, 폭식↑\n• 대체 발언: \"우리 몸이 소중해서 건강하게 먹고 움직이는 거야\"\n\n💊 칭찬은 행동에 집중:\n\"오늘 채소 다 먹었네!\" \"오늘 계단으로 왔네!\" → 행동 강화\n\"살 빠졌네\" \"많이 먹지 마\" → 결과·부정 언급 금물","tip":"가장 효과적인 비만 치료는 가족 전체의 생활습관 변화예요. 아이 혼자만의 전쟁으로 만들지 마세요."},"ans_obesity_medicine":{"type":"answer","title":"소아 비만 약물 치료 — 보조 수단이에요","content":"약물 치료는 첫 번째 선택이 아니에요. 특정 조건에서 생활습관 개선의 보조로 고려해요.\n\n📌 약물 치료 시작 조건 (모두 해당 시):\n• 만 12세 이상\n• BMI 95백분위 이상\n• 합병증 있음 (당뇨전단계·고혈압·혈지이상 등)\n• 6개월 이상 생활습관 개선에도 효과 불충분\n\n💊 사용 가능한 약물:\n\n1. 메트포르민 (가장 흔히 사용)\n• 원래 당뇨약, 인슐린 저항성 개선 + 식욕 약간 감소\n• 체중 감량 효과: 평균 2~3kg (많지 않음)\n• 부작용: 초기 설사·복통 (1~2주 내 호전)\n• 장점: 안전성 검증, 저렴 (하루 수백 원)\n\n2. GLP-1 수용체 작동제 (강력하지만 비싸요)\n• 대표 약: Saxenda(리라글루타이드), Wegovy(세마글루타이드)\n• 체중 감량: 10~15% (강력한 효과)\n• 12세 이상 비만 청소년 승인 (STEP TEENS 연구)\n• 부작용: 초기 구역·구토 (서서히 용량 올리면 대부분 호전)\n• 단점: 비급여, 월 30~50만 원\n• 중단 시 반동 가능성 있음\n\n3. 올리스타트 (거의 사용 안 함)\n• 지방 흡수 억제\n• 부작용: 지방변, 변실금이 심해 청소년이 감당하기 힘듦\n• 효과도 낮아 거의 사용 안 됨\n\n⚠️ 약물은 생활습관 개선과 반드시 병행해야 효과가 나요.","tip":"약물 치료는 도구일 뿐이에요. 약을 먹더라도 식습관·운동은 반드시 함께 해야 해요."},"metabolism_main":{"type":"question","text":"대사 문제에 대해 어떤 부분이 걱정되시나요?","options":[{"text":"혈당이 높다고 해요 (당뇨전단계)","next":"metabolism_prediabetes"},{"text":"콜레스테롤이 높다고 해요","next":"metabolism_lipid"},{"text":"지방간이 있다고 해요","next":"metabolism_fatty_liver"},{"text":"인슐린 저항성 지표(HOMA-IR, SPISE)가 궁금해요","next":"metabolism_spise"},{"text":"대사증후군 — 여러 대사 이상이 동시에 온다는 게 뭔가요?","next":"metabolic_syndrome"},{"text":"연속혈당측정기(Libre)로 혈당을 모니터링하고 싶어요","next":"cgm_libre"},{"text":"흑색극세포증(목뒤·겨드랑이 까매짐)이 뭔가요?","next":"acanthosis_explain"},{"text":"백의 고혈압이란 무엇인가요?","next":"white_coat_hypertension"},{"text":"이상지질혈증이란 무엇인가요?","next":"dyslipidemia_explain"},{"text":"대사증후군이 완치될 수 있나요?","next":"metabolic_cure"},{"text":"당뇨병 만성 합병증이 궁금해요","next":"diabetes_chronic_complications"}]},"metabolism_prediabetes":{"type":"answer","title":"당뇨전단계 — 지금이 되돌릴 수 있는 황금 시기예요","recommend":true,"content":"혈당이 정상보다 높지만 당뇨 기준에 미치지 않는 상태를 「당뇨전단계」라고 해요.\n\n📊 진단 기준:\n• 당뇨전단계: 공복혈당 100~125mg/dL 또는 당화혈색소 5.7~6.4%\n• 당뇨: 공복혈당 ≥126mg/dL 또는 당화혈색소 ≥6.5%\n\n⚠️ 소아청소년 2형 당뇨가 성인보다 더 위험한 이유:\n• 30세 이하 발병 시 심근경색 5배, 뇌졸중 3배, 사망 3배 위험\n• 어릴수록 혈관이 더 오래 손상됨\n• 진행이 성인보다 빠름, 합병증도 빨리 옴\n\n✅ 좋은 소식 — 황금 시기:\n• DPP 연구(2002년): 생활습관 개선 → 당뇨 발병 58% 예방\n• 메트포르민 단독: 31% 예방 (생활습관 개선의 절반 효과)\n• 4~6개월 생활습관 개선으로 충분히 역전 가능\n\n🔬 추천 검사 (10세 이상이고 과체중+위험인자 있을 때):\n• 공복혈당\n• 당화혈색소 (HbA1c)\n• 공복 인슐린 + HOMA-IR\n• OGTT (경구 포도당 내성 검사, 필요 시)\n\n💊 치료 순서:\n1순위: 생활습관 개선 (식이·운동)\n→ 체중 5~7% 감량 시 당뇨 진행 현저히 감소\n2순위: 메트포르민 (6개월 효과 없을 때)\n3순위: GLP-1 작동제 (중증 또는 메트포르민 효과 불충분 시)","tip":"당뇨전단계에서 생활습관 개선으로 되돌리는 것이 약보다 2배 효과적이에요. 지금이 바꿀 수 있는 마지막 기회예요."},"metabolism_lipid":{"type":"answer","title":"이상지질혈증 — 10대도 동맥경화가 시작될 수 있어요","content":"고콜레스테롤은 비만 아이에게 매우 흔해요 (40~50%에서 이상지질혈증).\n\n📊 진단 기준:\n• 총콜레스테롤 ≥200mg/dL\n• LDL (나쁜 콜레스테롤) ≥130mg/dL\n• HDL (좋은 콜레스테롤) 남아 <40, 여아 <50mg/dL\n• 중성지방 ≥130mg/dL\n\n⚠️ 왜 무서운가요?\n10대 혈관에서 이미 지방줄(지질 조항)이 발견됐다는 연구 있음\n방치하면 → 혈관 내 플라크(딱딱한 기름 덩어리) 형성 → 혈관 좁아짐\n→ 젊은 나이에도 심근경색, 뇌졸중 가능\n\n✅ 치료 효과:\n• 체중 10% 감량:\n  → 수축기혈압 10~15mmHg 감소\n  → LDL 10~15% 감소\n  → HDL 8~10% 증가\n  → 중성지방 30% 감소 (가장 빠르게 반응)\n\n💊 약물 (6~12개월 생활습관 개선 실패 시):\n• 스타틴 계열 (10세 이상 사용 가능)\n• LDL 30~50% 감소 효과\n• 장기 사용 시 성장·사춘기·성호르몬 영향 없음 (연구 확인)\n\n📌 중성지방 빠르게 낮추는 법:\n• 탄산음료→물 교체 (2주 내 효과)\n• 정제 탄수화물 줄이기\n• Omega-3 섭취 (주 2~3회 등푸른 생선)","tip":"고콜레스테롤은 증상이 없어서 모르고 지나가는 경우가 많아요. 비만 아이라면 반드시 혈액검사를 받아보세요."},"metabolism_fatty_liver":{"type":"answer","title":"지방간 — 조용하지만 심각한 질병이에요","content":"비만 아이 중 약 40%에서 지방간이 있어요. 대부분 증상이 없어요!\n\n🔍 지방간이란?\n간 무게의 5% 이상이 지방으로 채워진 상태\n초음파에서 간이 밝게 보여 「bright liver」라고도 해요.\n\n⚠️ 원인:\n• 내장지방 → 지방산이 간으로 직접 유입\n• 인슐린 저항성 → 간의 지방 분해 방해\n• 액체 과당 위험: 탄산음료·과일주스의 과당은 간에서만 대사\n  → 대량 섭취 시 간 집중 손상\n\n📊 진행 단계:\n단순 지방간 → 지방성 간염(NASH) → 간 섬유화 → 간경변\n(처음 3단계는 되돌릴 수 있어요)\n\n✅ 치료:\n현재 소아청소년 지방간 전용 승인 약물 없음\n→ 생활습관 개선만이 치료\n\n• 체중 3~5% 감량: 지방 감소 시작, ALT 개선\n• 체중 7~10% 감량: 간 염증·섬유화까지 개선\n• 주의: 급격한 체중 감량은 지방간 악화 (주당 0.5~1kg 속도)\n• 탄산음료·과일주스 → 물로 교체 (가장 빠른 효과)\n• 저탄수화물 식이가 가장 효과적\n• 운동: 체중 감량 없어도 지방간 감소 효과\n\n🔬 검사:\n• 혈액: ALT, AST (남아 26 미만, 여아 22 미만이 정상)\n• 복부 초음파\n• FibroScan (필요 시): 지방량·섬유화 정도 객관적 측정","tip":"탄산음료를 물로만 바꿔도 지방간이 개선될 수 있어요. 과당이 지방간의 주범이에요."},"metabolism_spise":{"type":"answer","title":"HOMA-IR & SPISE — 인슐린 저항성 정확히 측정하는 법","content":"📊 HOMA-IR (인슐린 저항성 평가):\n계산식: (공복혈당 × 공복인슐린) ÷ 405\n\n⚠️ 중요: 소아청소년 기준이 성인과 달라요! (성인 2.5 직접 적용 금지)\n• 사춘기 전 남아: 2.67↑ 의심\n• 사춘기 전 여아: 2.22↑ 의심\n• 사춘기 남아: 5.22↑ 의심\n• 사춘기 여아: 3.82↑ 의심\n\n공복 인슐린 기준:\n• 5~15µU/mL: 정상\n• 15↑: 고인슐린혈증 의심\n• 20↑: 고인슐린혈증 확인\n\n📊 SPISE 지수 (새로운 지표):\n공복 인슐린 없이 인슐린 저항성 평가 가능!\n계산식: 600 × HDL^0.185 / TG^0.2 × BMI^1.338\n\n✅ SPISE의 장점:\n• 추가 채혈 없이 기본 혈액검사 수치로 계산 가능\n• 인슐린보다 결과가 더 안정적 (인슐린은 5~10분마다 변동)\n• 2025년 연구: 대사증후군 예측 정확도 86% (HOMA-IR보다 높음)\n• SPISE 낮은 아이 → 추적 6.5년 후 당뇨전단계 위험 4배\n\n🔍 SPISE 해석:\n• 수치가 높을수록 좋음 (인슐린이 잘 작용함)\n• 절대값보다 변화 추세가 중요\n예) 10세 남아 SPISE 5.0 → 3개월 후 6.0 → 6개월 후 6.5\n= 인슐린 감수성이 점점 개선되고 있어요\n\n💡 SPISE 개선 전략:\n• BMI 감소 (가장 큰 영향: 1.338제곱으로 반영)\n• HDL 증가: 유산소 운동 주 5회, Omega-3 섭취\n• 중성지방 감소: 탄산음료 → 물, 정제 탄수화물 감소\n  (2주 내 가장 빠르게 반응)","tip":"SPISE는 매 3~6개월마다 계산해보면 아이의 생활습관 개선 효과를 숫자로 확인할 수 있어요."},"nutrition_main":{"type":"question","text":"성장에 도움이 되는 영양에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"비타민D, 칼슘, 마그네슘이 궁금해요","next":"nutrition_vitamin_d"},{"text":"단백질이 성장에 어떤 영향을 주나요?","next":"nutrition_protein"},{"text":"아연, 철분이 중요한가요?","next":"nutrition_zinc_iron"},{"text":"아이가 편식이 심해요","next":"nutrition_picky"},{"text":"키 크는 실전 식단이 궁금해요","next":"nutrition_practical"}]},"nutrition_vitamin_d":{"type":"question","text":"비타민D·칼슘에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"비타민D가 칼슘 흡수에 왜 그렇게 중요한가요?","next":"vitd_calcium_link"},{"text":"햇빛으로는 언제 얼마나 만들어지나요?","next":"vitd_sun"},{"text":"보충제는 어떻게 고르고 먹이나요?","next":"vitd_supplement_guide"},{"text":"칼슘이 많은 음식과 먹이는 팁이 궁금해요","next":"calcium_foods"}]},"nutrition_protein":{"type":"question","text":"단백질과 성장에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"성장에 단백질이 왜 그렇게 중요한가요?","next":"protein_why_detail"},{"text":"아이에게 하루 얼마나 필요한가요?","next":"protein_daily_need"},{"text":"어떤 음식이 단백질이 많나요?","next":"protein_best_foods"},{"text":"언제 먹이는 게 효과적인가요?","next":"protein_timing_detail"},{"text":"너무 많이 먹으면 안 좋은가요?","next":"protein_excess"}]},"nutrition_zinc_iron":{"type":"question","text":"아연·철분·기타 영양소에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"아연 결핍이 성장에 어떤 영향을 주나요?","next":"zinc_deficiency_detail"},{"text":"철분 흡수를 높이는 방법이 궁금해요","next":"iron_absorption_tips"},{"text":"비타민K·C는 뼈에 어떤 역할을 하나요?","next":"vitk_vitc_bone"},{"text":"영양제(보충제) 복용 시 주의사항이 있나요?","next":"supplement_caution"}]},"nutrition_picky":{"type":"answer","title":"편식 아이 대처법 — 인내심이 핵심이에요","content":"🥦 채소 안 먹는 아이:\n• 채소를 「안 보이게」: 잘게 썰어 고기 속에 넣기, 볶음밥에 넣기\n• 모양 바꾸기: 당근 별모양·하트모양 쿠키 커터로 자르기\n• 소스에 찍어 먹기: 요거트 소스, 땅콩버터\n• 단맛 채소부터 시작: 방울토마토, 당근, 고구마, 옥수수\n\n🥩 고기 안 먹는 아이:\n• 질긴 식감이 싫은 것 → 부드럽게 조리: 미트볼, 함박스테이크\n• 고기 없어도 OK: 생선·달걀·두부·콩류로 단백질 충분 가능\n\n🥛 우유 안 마시는 아이:\n• 온도·맛 바꾸기: 따뜻하게, 카카오 약간 첨가\n• 시리얼에 넣어주기, 바나나 우유 스무디\n• 대체: 요거트, 치즈, 칼슘강화 두유, 잔멸치\n\n✅ 편식 극복 7원칙:\n1. 인내심: 새 음식은 최소 10~15번 노출해야 수용 → 오늘 안 먹어도 포기 금지\n2. 강요 절대 금지: \"다 먹어!\" → 트라우마 형성\n3. 부모 먼저 맛있게: 아이 앞에서 맛있게 먹는 모습 보여주기\n4. 조금이라도 칭찬: \"오늘 시금치 하나 먹었네, 잘했어!\"\n5. 함께 요리하기: 직접 만든 음식에 애착 생김 → 먹고 싶어짐\n6. 선택권 주기: \"브로콜리 먹을래? 당근 먹을래?\" (둘 다 채소)\n7. 식사 시간 즐겁게: 밥 먹으면서 혼나면 음식 자체를 싫어하게 됨","tip":"편식은 의지의 문제가 아니에요. 아이의 뇌가 새로운 맛을 받아들이는 데 시간이 필요한 거예요. 10~15번 제공하면 대부분 수용해요."},"nutrition_practical":{"type":"question","text":"실전 성장 식단에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"성장기 아이에게 좋은 간식이 뭐가 있나요?","next":"meal_snacks_detail"},{"text":"외식할 때 어떤 메뉴를 선택하면 좋나요?","next":"meal_eating_out"},{"text":"운동을 많이 하는 아이 식단이 따로 있나요?","next":"meal_active_child"},{"text":"저신장 아이는 특별히 뭘 더 먹어야 하나요?","next":"meal_short_child"}]},"booking":{"type":"booking"},"growth_measurement":{"type":"answer","title":"키 올바르게 측정하는 법 — 정확도가 진단을 좌우해요","content":"가정에서 잘못 측정하면 3cm 이상 오차가 생길 수 있어요. 정확한 측정이 진단의 첫걸음입니다.\n\n📅 얼마나 자주?\n• 3개월(12주)마다 1회가 최적\n• 매주·매일 측정 → 오차 범위 내 변동만 확인됨, 불안만 커짐\n• 사춘기 급성장기는 2개월마다로 단축 가능\n• 측정일 고정 권장: 3월 1일, 6월 1일, 9월 1일, 12월 1일\n\n⏰ 언제?\n• 아침 기상 직후 (기상→배변→식전 순서)\n• 이유: 하루 동안 척추 디스크가 눌려 저녁에 최대 2cm 감소\n• 같은 시간대에 측정해야 비교 의미가 있음\n\n📏 측정 방법 (4점 벽 밀착법):\n1. 딱딱한 바닥에 맨발로 서기 (카펫·쿠션 금지)\n2. 뒤꿈치·엉덩이·어깨뼈·뒤통수 → 벽에 동시 4점 밀착\n3. 발은 모아서, 정면을 바라보되 턱을 살짝 당김\n4. 숨을 크게 들이쉬고 최대한 곧게 서기\n   → \"머리가 천장에 닿을 것 같이\" 유도해주세요\n5. 딱딱한 책이나 자를 머리 위에 수평으로 대고 표시\n6. 줄자로 바닥부터 표시까지 측정 (소수점 1자리까지)\n\n🚫 흔한 오측정 원인:\n• 신발 신고 측정\n• 카펫·소파 위에서 측정\n• 머리핀·고무줄 달린 채 측정 (1cm 이상 오차)\n• 저녁에 측정\n• 너무 자주 측정 (매일/매주)\n\n📝 기록 방법:\n날짜 / 신장 / 측정 시각 / 특이사항(감기·수술 직후 등)\n→ 병원 방문 시 이 기록을 가져오면 정확한 성장 속도 평가 가능","tip":"아침 기상 직후, 4점 벽 밀착, 딱딱한 바닥 — 이 세 가지만 지켜도 가정 측정 오차를 1cm 이내로 줄일 수 있어요."},"growth_chart_reading":{"type":"answer","title":"성장곡선 읽는 법 — 숫자보다 방향이 중요해요","content":"병원에서 성장곡선 표를 보셨나요? 복잡해 보이지만 핵심은 딱 하나입니다.\n\n📊 백분위수란?\n100명을 키 순서로 세웠을 때 내 아이의 위치\n• 50백분위: 100명 중 50번째 (평균)\n• 10백분위: 100명 중 10번째 (낮지만 정상)\n• 3백분위: 100명 중 3번째 → 평가 필요 고려\n• 정상 범위: 3~97백분위 (100명 중 94명이 이 안에)\n\n🎯 핵심: 백분위 숫자보다 변화 추세가 중요\n\n✅ 걱정하지 않아도 되는 경우:\n• 10백분위를 따라가도 3세 때도 10백분위, 5세도 10백분위, 7세도 10백분위\n  → 자기 궤도를 안정적으로 유지하면 완전히 정상\n• 부모가 작고 아이도 낮은 백분위를 유지한다면: 가족성 저신장 가능성\n\n⚠️ 주의해야 하는 경우:\n• 50백분위 → 25백분위 → 10백분위로 계속 하락\n  → 2개 이상의 주요 백분위선을 지속 하향 돌파 시 의사 상담 필요\n\n📋 연령별 정상 성장 속도:\n• 출생~1세: 약 25cm\n• 1~2세: 약 10~12cm\n• 2~3세: 약 8~10cm\n• 3세~사춘기 전: 약 5~7cm ← 이 시기 4cm 미만이면 검사 필요\n• 사춘기 급성장기: 여아 8~10cm, 남아 10~12cm\n\n🏥 병원 방문이 필요한 5가지 상황:\n① 3세~사춘기 전에 1년 4cm 미만 성장\n② 2개 이상 주요 백분위선을 지속 하락\n③ 3백분위 미만 (100명 중 3번째보다 작음)\n④ 사춘기가 시작됐는데 키 급성장이 없음\n⑤ 사춘기 전인데 1년에 8cm 이상 — 성조숙증 조기 신호\n\n⚖️ 키와 체중의 균형도 확인:\n• 키는 크는데 체중 안 늘면: 영양 부족 신호\n  → 성장 속도도 실제로는 느릴 수 있음\n• 체중만 늘고 키 안 크면: 비만·성조숙증 위험\n  → 비만 아이는 초반엔 또래보다 커 보이지만 최종 키는 손해","tip":"3개월마다 측정해서 기록해두면 1년 성장량을 정확히 알 수 있어요. '왠지 작은 것 같아'보다 '올해 3.5cm 밖에 안 컸어요'가 훨씬 정확한 정보예요."},"tanner_stage_girl":{"type":"answer","title":"여아 사춘기 발달 단계 (Tanner Stage) — 우리 딸은 몇 기일까요?","content":"병원에서 「타너 2기」「타너 3기」라는 말을 들으셨나요? 이게 무엇인지 정확히 알면 아이의 사춘기 진행 상황을 이해하는 데 큰 도움이 됩니다.\n\n📊 여아 타너 단계 (유방 기준):\n\n1기 — 사춘기 전 상태\n• 유방 평평, 유선 조직 없음, 음모 없음\n• 완전히 어린이 상태\n\n2기 ⭐ — 사춘기 시작\n• 유두 아래 작은 딱딱한 덩어리(유방 싹, 乳芽) 촉지\n• 유륜 살짝 넓어짐\n• 「2기 = 사춘기 시작」의 공식 기준\n• 8세 이전 = 성조숙증 / 8~13세 = 정상 / 13세 이후 = 사춘기 지연\n• 평균 9~11세\n\n3기 — 유방과 유륜이 함께 커짐\n• 유방과 유륜이 동시에 커지지만 경계선 아직 불명확\n• 음모가 나타나기 시작 (음순을 따라 연하고 가는 털)\n\n4기 — 유륜이 유방 위로 돌출\n• 유방 위에 유륜·유두가 따로 올라온 형태\n• 음모가 성인에 가깝지만 대퇴부 안쪽까지 퍼지지 않음\n• 초경이 보통 이 시기(또는 3기 후반)에 옴\n\n5기 — 성인\n• 유방 완전 발달, 유륜과 유방이 같은 면\n• 유두만 돌출\n• 음모가 대퇴 내측까지\n\n⏱️ 여아 사춘기 정상 순서:\n유방 발달 2기 → 급성장기 시작 (6~12개월 후) → 음모 (1~1.5년 후)\n→ 초경 (유방 발달 후 평균 2~2.5년)\n\n📈 초경 후 성장량:\n• 초경 직전 1년: 약 8~10cm (급성장 절정)\n• 초경 후 1년: 약 2~3cm\n• 초경 후 2년: 약 1~2cm\n• 이후 거의 종료 → 총 5~7cm 추가\n\n⚠️ 타너 단계 불일치 주의:\n여아에서 유방은 2기인데 음모가 이미 3~4기라면\n→ 난소나 부신 이상 가능성, 추가 검사 필요","tip":"타너 2기가 확인된 시점부터 평균 2~2.5년 후 초경이 옵니다. 골연령 검사로 이 시기를 더 정확히 예측할 수 있어요."},"tanner_stage_boy":{"type":"answer","title":"남아 사춘기 발달 단계 (Tanner Stage) — 우리 아들은 몇 기일까요?","content":"남아의 사춘기는 여아보다 약 2년 늦게 시작되지만, 더 오래 지속되어 최종 키가 평균 13cm 더 큽니다.\n\n📊 남아 타너 단계 (고환 기준):\n\n1기 — 사춘기 전 상태\n• 고환 3mL 이하, 음경 어린이 크기, 음모 없음\n\n2기 ⭐ — 사춘기 시작\n• 고환 4mL 이상 (음낭 피부가 얇아지고 색이 살짝 어두워짐)\n• 음경은 아직 변화 없음\n• 「2기 = 사춘기 시작」의 공식 기준\n• 9세 이전 = 성조숙증 / 10~14세 = 정상 / 14세 이후 = 사춘기 지연\n• 평균 10~12세\n\n3기 — 고환 약 10mL, 음경 길이 증가\n• 음경 주로 길이가 늘어남\n• 음모 나타나기 시작 (음경 밑동에 가는 털)\n\n4기 — 고환 약 15mL, 음경 굵기 증가\n• 음경 길이+굵기 모두 증가, 귀두 발달\n• 변성기 시작 (목소리 굵어짐)\n• 음모 성인에 가까움 (대퇴부까지 아직 미도달)\n\n5기 — 성인\n• 고환 20mL 이상, 음경 성인 크기\n• 음모 대퇴 내측·배꼽 방향까지\n• 수염 발달 (사춘기의 마지막 신호)\n\n⏱️ 남아 사춘기 정상 순서:\n고환 증대(2기) → 음경 성장 → 음모 → 급성장기(1~2년 후, 평균 13~15세)\n→ 변성기 → 수염\n\n📈 급성장기:\n• 고환 증대 후 1~2년 뒤 시작\n• 연간 9~10cm, 2~3년간 지속\n• 총 급성장량: 25~30cm (여아보다 5~7cm 더)\n\n🔚 급성장 종료 신호:\n수염이 나기 시작하면 급성장기 거의 끝 → 이후 성장 급감\n\n⚠️ 타너 단계 불일치 주의:\n고환은 작은데 음모가 많이 나 있다면\n→ 부신 호르몬 이상(가성 성조숙증) 가능성\n→ DHEA-S 혈액검사 필요","tip":"수염이 나기 시작하면 급성장은 거의 끝이에요. 이 시기를 기다리지 말고 고환 증대(2기)가 확인되는 순간 골연령 검사와 성장 속도를 체크하는 것이 현명합니다."},"gh_stimulation_test":{"type":"answer","title":"성장호르몬 자극검사 — 검사 전 준비부터 결과 해석까지","content":"건강보험 급여로 성장호르몬 치료를 받으려면 반드시 거쳐야 하는 검사예요. 미리 알면 훨씬 덜 힘듭니다.\n\n🔬 자극검사가 필요한 이유:\nIGF-1은 선별검사(간접 평가)로, IGF-1이 낮다고 바로 급여 치료가 되지 않아요.\n자극검사만이 성장호르몬 결핍증의 「금 표준(Gold Standard)」이에요.\n\n📋 검사 전 준비 (가장 중요!):\n• 전날 자정부터 공복 8시간 (물은 소량 OK, 주스·탄산 음료 금지)\n  → 음식 섭취 시 혈당 상승 → 성장호르몬 분비 억제 → 위양성 결과\n• 헐렁하고 편안한 옷 착용 (2~3시간 누워있어야 함, 소매 올리기 쉬운 것)\n• 좋아하는 책이나 장난감 지참 (2~3시간 대기 필요)\n• 아이의 불안 최소화\n  → \"조금 아프지만 금방 끝나\"고 미리 솔직하게 알려주기\n  → 너무 긴장하면 스트레스 호르몬 상승 → 결과 영향\n• 복용 중인 약물 사전 고지 (특히 스테로이드, 갑상선호르몬)\n\n🏥 검사 당일 진행 과정:\n1. 공복 내원 → 정맥 유치침 1회 삽입 (이후 채혈은 유치침으로 무통)\n2. 자극 약물 투여: 클로니딘, 아르기닌, 글루카곤, 인슐린 등\n   → 약물이 뇌에서 성장호르몬 분비를 자극\n3. 30분마다 채혈 × 4~6회 (총 2~3시간)\n4. 가능한 조용히 휴식 (격렬한 놀이 금지)\n\n📊 결과 해석 (피크값 기준):\n• ≥ 10 ng/mL: 정상 → 급여 불가 (다른 원인 찾아야 함)\n• 7~10 ng/mL: 경계 범위 → 다른 지표와 종합 판단\n• 5~7 ng/mL: 부분 결핍 → 급여 가능, 대부분 치료 권장\n• < 5 ng/mL: 완전 결핍 → 급여 가능, 치료 필수\n\n⚠️ 급여 조건 (중요!):\n• 2종류 이상 다른 방법의 자극검사에서 모두 피크값 < 10 ng/mL\n• 단 1회 검사로는 급여 안 됨 (정상인도 컨디션 나쁠 때 낮게 나올 수 있음)\n\n🔍 자극검사만으로 결정하지 않아요:\n의사가 종합적으로 보는 것들:\n• 성장 속도 (GV) ← 가장 중요\n• IGF-1 수치\n• 골연령\n• 현재 키\n• 가족력","tip":"자극검사 결과만으로 치료 여부를 결정하지 않아요. IGF-1이 낮아도 GV가 정상이면 치료 불필요, 자극검사가 경계여도 GV가 나쁘면 치료를 고려합니다. 수치 하나가 아닌 종합 판단이 핵심입니다."},"premature_thelarche_detail":{"type":"answer","title":"조기 유방 발육 vs 진성 성조숙증 — 5가지 감별 포인트","content":"유방이 발달해도 90% 이상은 치료가 필요 없는 「조기 유방 발육」이에요. 하지만 나머지 10%는 진성 성조숙증입니다. 이 두 가지를 구별하는 5가지 포인트를 알아보세요.\n\n📌 정의:\n조기 유방 발육(Premature Thelarche) = 8세 이전 유방 발달만 단독으로 나타남\n• 2세 이하에서 가장 흔함\n• 다른 사춘기 징후가 전혀 없음\n\n🔍 5가지 감별 포인트:\n\n1️⃣ 다른 사춘기 징후 있나요?\n조기 유방 발육:\n• 유방만 발달, 음모·질 분비물·급성장 없음\n• \"그냥 가슴만 살짝 나왔어요\"\n진성 성조숙증:\n• 유방 발달 후 6~12개월 내 음모, 질 분비물 추가\n• 키도 갑자기 빠르게 자람\n\n2️⃣ 골연령이 얼마나 앞서나요?\n조기 유방 발육: 골연령 정상 or 6개월 미만 초과\n진성 성조숙증: 골연령 2년 이상 초과\n또는 처음엔 정상이었는데 6개월 만에 1.5년 급진행\n\n3️⃣ 성장 속도가 빨라졌나요?\n조기 유방 발육: 나이에 맞는 정상 성장 속도 유지\n진성 성조숙증: 성장 속도 갑자기 증가, 백분위 급상승\n\n4️⃣ GnRH 자극검사 결과:\n조기 유방 발육: LH 피크 < 2 IU/L (FSH 위주 반응, 뇌하수체 미활성)\n진성 성조숙증: LH 피크 ≥ 5 IU/L ← 확진 기준\n경계: 3~4 IU/L → 3~6개월 후 재평가\n\n5️⃣ 복부 초음파 소견:\n조기 유방 발육:\n• 자궁 길이 < 4cm, 난소 < 2mL\n• 자궁 내막 얇음\n진성 성조숙증:\n• 자궁 길이 > 4cm (서양배 모양)\n• 난소 증대, 큰 난포(≥ 4mm) 여러 개\n\n✅ 조기 유방 발육의 예후:\n• 90% 이상: 치료 없이 자연 호전\n• 51%: 유선 조직 완전 소실\n• 87%: 완전 또는 거의 완전히 소실\n• 진성 성조숙증으로 진행: 5~10% (2세 이하에서 발생 시 약 2%)\n• 정상 나이(8~13세)에 사춘기 옴, 최종 키 영향 없음\n\n⏰ 추적 관찰 일정:\n• 처음 3~6개월마다 내원\n• 확인 사항: 유방 크기 변화, 음모·질 분비물 유무, 성장 속도\n• 다음 증상 시 즉시 내원:\n  음모 발생 / 질 분비물 / 유방 급속 증대 / 키 갑자기 빠른 성장","tip":"환경 호르몬(플라스틱, 내분비 교란물질)이 원인이라고 걱정하시는 분들이 많은데, 현재 과학적으로 명확한 증거는 없습니다. 유리·스테인리스 용기 사용 정도의 일반적 건강 수칙으로 충분합니다."},"adiposity_rebound":{"type":"answer","title":"Adiposity Rebound (체지방 반등) — 5~7세 비만 예방의 핵심 개념","content":"「Adiposity Rebound」는 소아과 의사들이 가장 주목하는 비만 예방 개념 중 하나입니다.\n\n🔬 Adiposity Rebound란?\n• 영아기 이후 BMI(체지방)가 줄어들다가 다시 올라가는 시점\n• 정상적으로는 5~7세 사이에 시작됨\n• 이 시기가 「지방세포 제2차 급증기」\n\n📊 정상 BMI 변화 패턴:\n태어날 때 → 1세 전후 통통 → BMI 감소 시작\n→ 5~7세: Adiposity Rebound 시작 (BMI 다시 상승)\n→ 이 상승이 너무 이르거나 급격하면 위험\n\n⚠️ 왜 이 시기가 중요한가?\n\n지방세포 수는 두 번 급격히 증가:\n• 1차: 영아기 (12~18개월)\n• 2차: 5~7세 ← Adiposity Rebound 시기\n\n한번 늘어난 지방세포 수는 성인이 돼도 거의 줄지 않아요\n(크기는 줄일 수 있지만, 수는 평생 유지)\n\n📊 Adiposity Rebound 시기별 비만 위험:\n• 3세에 시작: 7세에 시작한 아이보다 평생 비만 위험 2~3배\n• 시작이 빠를수록 + 올라가는 폭이 클수록 → 위험\n\n✅ 이 시기(4~7세)에 해야 할 것:\n\n모니터링:\n• 6개월~1년마다 소아과에서 신장·체중 측정\n• BMI 백분위 변화 추이를 그래프로 확인\n• BMI 백분위 급상승 = 위험 신호, \"더 보자\"는 태도 금물\n\n생활 습관:\n• 매일 1시간 이상 달리고 뛰는 신체 활동\n• 화면 시간 2시간 이하 (특히 식사 중 화면 금지)\n• 식사 중 TV·스마트폰 금지\n• 유치원 환경 확인: 점심 메뉴, 간식, 야외 활동 시간\n\n🔴 위험 신호:\n• BMI 백분위 85 이상으로 급상승\n• 짧은 기간에 바지·신발 사이즈 급증가\n• 배만 나오는 형태의 체형 변화","tip":"Adiposity Rebound는 아이가 자연스럽게 조금 살이 오르는 시기예요. 이때 '아직 어리니까'라고 넘기지 말고, 6개월마다 BMI 백분위를 체크하는 것만으로도 조기 발견이 가능합니다."},"obesity_lifecycle":{"type":"answer","title":"생애주기별 비만 예방 — 시기마다 핵심이 달라요","content":"비만 예방의 효과는 시작 시점에 따라 완전히 달라집니다. 각 시기별 핵심을 알아보세요.\n\n🔑 왜 영아·유아기가 그토록 중요한가?\n3가지 이유:\n① 지방세포 수가 이 시기에 급증 → 한번 늘어난 세포 수는 평생 유지\n② 식습관의 기본 설정이 0~5세에 완성\n③ 대사 시스템이 이 시기에 초기화(프로그래밍)\n\n📅 시기별 핵심 관리:\n\n🤰 임신기 (출생 전)\n• 과도한 영양 → 태아 비만·대사 질환 위험\n• 영양 부족 → '절약 체질' 형성 → 나중에 쉽게 살 찜\n• 특히 위험: 저체중 출생 후 급속 추격 성장 → 대사증후군 위험\n• 균형이 핵심: 너무 많이도, 너무 적게도 안 됨\n\n👶 신생아·영아기 (0~12개월)\n• 지방세포 제1차 급증 시작 (12~18개월)\n• 모유 수유 → 비만 위험 13~22% 감소\n  이유: 자율 조절 수유 / 단백질 적정량 / 장내 균 / 식욕 호르몬\n• 보완식 첫 번째 음식: 반드시 채소!\n  (과일부터 시작하면 단맛에 길들어 채소 거부)\n\n🚶 유아기 (1~3세)\n• 단맛·짠맛 선호도 형성 시기\n• 음식-감정 연결 고리 형성 시작\n  → 달래기 위해 과자 주면 평생 스트레스 = 과자 패턴 형성\n• 식사 규칙성·식사량 자기조절 능력 형성\n• 필수: 하루 3시간 이상 신체 활동 (WHO 권고)\n• 화면: 2세 미만 최소화, 2~3세 하루 1시간 이하\n\n🏫 학령전기 4~5세 (Adiposity Rebound 준비)\n• 유치원 환경 체크: 점심 메뉴, 간식, 야외 활동 시간\n• 6~12개월마다 BMI 백분위 추적 시작\n• BMI 급상승 = 위험 신호, 즉시 대응\n\n🏃 학령전기 5~7세 (Adiposity Rebound 핵심)\n• 지방세포 제2차 급증기\n• 일찍 시작할수록 평생 비만 위험 2~3배\n• 이 시기 시작된 과체중은 방치하면 안 됨\n• 주요 위협: 학원 증가 → 신체 활동 감소, 친구와 간식·패스트푸드","tip":"'아직 어리니까 괜찮다'가 가장 위험한 생각이에요. 오히려 어릴수록 개입 효과가 크고, 지방세포 수가 결정되는 이 시기가 지나면 훨씬 어려워집니다."},"metabolic_syndrome":{"type":"answer","title":"대사증후군 — 여러 대사 이상이 동시에 터지는 도미노","recommend":true,"content":"대사증후군은 어느 날 갑자기 생기는 것이 아니라, 몸 안에서 도미노처럼 연쇄 진행됩니다.\n\n🔬 4단계 연쇄 메커니즘:\n1단계: 내장지방 축적\n   → 복강 깊숙이 내장지방 쌓임, 이 지방이 염증 물질 지속 분비\n\n2단계 (핵심): 인슐린 저항성 발생\n   → 염증 물질이 인슐린 신호 교란 → 세포가 인슐린에 반응 저하\n   → 혈당 상승 시작\n\n3단계: 고인슐린혈증 악순환\n   → 혈당 올라가니 췌장이 인슐린 더 분비\n   → 그래도 세포 반응 더 나빠짐 → 악순환\n\n4단계: 5가지 대사 이상 동시 폭발\n   혈당 상승 + 중성지방 상승 + 혈압 상승 + 동맥경화 진행 + HDL 감소\n\n📊 진단 기준 (5개 중 3개 이상):\n① 복부 비만: 허리 남아 ≥90cm, 여아 ≥85cm\n② 중성지방 ≥ 150 mg/dL\n③ HDL 낮음: 남아 < 40, 여아 < 50 mg/dL\n④ 혈압 ≥ 130/85 mmHg\n⑤ 공복혈당 ≥ 100 mg/dL 또는 당화혈색소 ≥ 5.7%\n\n⚠️ 얼마나 흔한가요?\n• 비만 청소년의 약 30% = 대사증후군\n• 비만 청소년의 약 90% = 1개 이상 위험인자 보유\n• 국내 유병률: 2007년 6.8% → 2018년 13.4% (10년간 2배)\n\n💥 왜 무서운가요?\n단기: 지방간, 다낭성 난소 증후군, 수면무호흡, 심리 문제\n장기: 2형 당뇨병으로 가는 고속도로\n• 30세 미만 2형 당뇨 발병 시:\n  심근경색 5배, 뇌졸중 3배, 신부전 3배 위험\n\n✅ 치료:\n• 목표: 1년 내 체중 7~10% 감량 (주 0.5kg씩 천천히)\n  → 급격한 감량은 실패 확률 높음\n• 체중 7~10% 감량 시 모든 대사 지표 대폭 개선\n• 6~12개월 효과 불충분 시 약물:\n  - 메트포르민 (혈당·인슐린 저항성)\n  - 스타틴 (콜레스테롤)\n  - 혈압약 (혈압 높을 때)\n\n🌟 가장 중요한 사실:\n청소년기 = 대사증후군을 역전시킬 수 있는 황금기\n혈관이 아직 건강하고, 자기 회복력이 강하고, 생활 습관 가소성이 높음\n이 시기를 놓치면 성인이 되어 되돌리기 훨씬 어려워집니다","tip":"대사증후군 진단을 받았어도 너무 무서워하지 마세요. 오히려 이 진단이 '지금 바꿀 수 있는 마지막 경고등'이에요. 청소년기에 발견한 것은 행운입니다."},"cgm_libre":{"type":"answer","title":"연속혈당측정기(Libre) — 비만 아이의 혈당 패턴을 실시간으로","content":"\"닭볶음탕 먹고 나서 혈당이 얼마나 오를까요?\" 이 질문의 답을 Libre로 바로 확인할 수 있어요.\n\n🔬 CGM(연속혈당측정기)이란?\n• 팔 뒤쪽(삼두근)에 센서 부착 → 24시간 연속 혈당 측정\n• 스마트폰으로 스캔하면 즉시 현재 혈당 + 8시간 그래프 확인\n• 따로 손가락 채혈 불필요\n\n📊 Libre가 보여주는 것들:\n• 현재 혈당 수치\n• 8시간 혈당 변화 그래프\n• 추세 화살표 (상승 ↑ / 안정 → / 하락 ↓)\n• Time In Range: 하루 중 정상 범위(70~180 mg/dL) 내 시간 비율 (목표 70% 이상)\n• 평균 혈당 + 변동폭\n\n🎯 비만 아이에게 특히 유용한 이유:\n\n① 공복 혈액검사로는 놓치는 문제 발견\n• 공복 혈당 95 = '정상'으로 기록됨\n• 하지만 식후 혈당 180 = 당뇨 전단계 수준\n• Libre로만 이런 「숨어있는 고혈당」 발견 가능\n\n② 음식-혈당 연결을 눈으로 보여줌\n• \"떡볶이 먹고 30분 후 혈당 +50\" 화면을 보여주면\n  아이가 스스로 \"와, 이렇게 많이 올랐어?!\" → 자발적 변화 시작\n• 다음 날 현미밥+닭가슴살 → 혈당 완만하게 소폭 상승\n  아이 스스로 깨달음: \"이런 음식을 먹어야 하는구나\"\n\n③ 운동 효과 즉시 확인\n• 혈당 130 → 30분 걷기 → 혈당 100\n• 숫자가 내려가는 것을 눈으로 보는 순간 운동 동기 폭발\n\n🔧 사용 방법:\n1. 팔 뒤쪽 소독 후 전용 부착기로 센서 삽입 (1초 미만 따끔)\n2. FreeStyle LibreLink 앱으로 스마트폰을 센서에 1~4cm 근접 스캔\n3. 최소 8시간마다 스캔 (데이터 누락 방지)\n4. 권장: 기상 시 / 식전·식후 / 운동 전·후 / 취침 전 스캔\n5. 가족 모니터링: LibreLinkUp 앱으로 부모 스마트폰에서 실시간 확인 가능\n\n⚠️ 한계와 주의사항:\n• 혈관 속 혈당이 아닌 조직액 측정 → 혈당과 5~15분 차이, ±10~20% 오차\n• 중요한 순간(저혈당 의심 시)에는 손가락 채혈로 확인 필요\n• 격렬한 운동·땀 많이 흘릴 때 센서 탈락 가능 (전용 고정 스티커 활용)\n\n💰 비용:\n• 센서 1개: 약 7~8만 원 (14일 사용)\n• 월 비용: 약 14~16만 원 (센서 2개)\n• 급여: 1형 당뇨 = 30% 부담 / 2형 당뇨·비만 = 비급여 전액 자부담\n\n🌟 추천 사용 방법:\n• 2~4주 집중 사용 (교육 투자 개념)\n• 한번 혈당 패턴 파악 후 → 평생 활용 가능한 지식 획득\n• 3개월 후 재평가 시 다시 단기 사용 가능","tip":"Libre는 치료 도구가 아닌 교육 도구예요. '이 음식을 먹으면 혈당이 이렇게 되는구나'를 아이 스스로 눈으로 보게 하는 것이 핵심입니다. 아이가 스스로 변화하게 만드는 가장 강력한 방법입니다."},"glp1_detail":{"type":"answer","title":"GLP-1 수용체 작동제 (Saxenda·Wegovy) — 새로운 비만 치료 옵션","content":"장에서 자연적으로 나오는 호르몬의 원리를 이용한 강력한 비만 치료제예요.\n\n🔬 작용 원리:\nGLP-1(글루카곤 유사 펩타이드-1) = 식사 후 장에서 자연 분비되는 호르몬\n→ 췌장에서 인슐린 분비 보조 + 위 배출 속도 느리게 + 뇌에 포만감 신호 전달\n\n문제: 자연 호르몬은 수분 만에 분해됨\n해결: 과학자들이 수시간~수일 작용하는 약물로 개발 → GLP-1 수용체 작동제\n\n💊 약물 종류:\n\n리라글루타이드 (Saxenda):\n• 1일 1회 피하주사\n• 국내 12세 이상 소아청소년 비만 치료 승인\n• 바늘 매우 가늘어 대부분 잘 적응\n\n세마글루타이드 (Wegovy):\n• 1주 1회 피하주사 (편리성 ↑)\n• 리라글루타이드보다 효과 더 강력\n• 국내 12세 이상 승인\n\n리벨서스 (경구정):\n• 알약 형태로 복용 (주사 없음)\n• 단, 국내에서는 현재 당뇨 치료에만 승인 (비만 적용 제한적)\n\n📊 효과 (STEP TEENS 연구 - 청소년 대상 임상시험):\n• 위약 대비 체중 약 10~15% 감소 (매우 강력한 효과)\n• 시간표:\n  1~2주 후: 식욕 감소 시작\n  4주 후: 체중 감소 시작\n  약 6개월: 최대 효과 도달\n• 체중 감량 외: 혈당, 혈압, 지방간 등 대사 지표 전반 개선\n\n⚠️ 부작용:\n가장 흔한 (30~40%):\n• 오심·구토·설사·변비\n• 매우 천천히 용량 올리면 대부분 호전 (수주 내)\n\n드문 (즉시 병원 방문):\n• 췌장염·담낭염: 윗배 극심한 통증이 등 쪽으로 퍼지면 즉시 응급실\n\n🚫 절대 금기:\n• 갑상선 수질암 가족력\n• 췌장염 기왕력\n• 임신 중\n\n💰 비용과 현실:\n• 비급여 → 월 약 30~50만 원 전액 자부담\n• 중단 시 반동 위험: 식욕 돌아오고 체중 반등 가능\n  → 전문의와 장기 유지 계획 필수\n\n⭐ 중요: 생활 습관 개선과 반드시 병행해야\n약물만으로는 최대 효과 불가, 식이·운동 동시 진행 필수","tip":"GLP-1 치료제는 '기적의 약'이 아닙니다. 식욕을 낮춰주는 도구일 뿐이고, 그 기회를 활용해 식습관과 운동 패턴을 바꾸는 노력이 함께해야 의미가 있어요."},"obesity_surgery":{"type":"answer","title":"중증 비만 수술 치료 — 대부분에게 해당하지 않는 최후의 수단","content":"먼저 말씀드립니다: 이 내용은 대부분의 아이들에게 해당하지 않아요. 이미 의사에게 수술을 여러 번 권고받은 극소수를 위한 정보입니다.\n\n⚠️ 수술은 되돌릴 수 없는 선택입니다:\n• 절제된 위는 복원 불가\n• 성장기 영양 흡수 제한 → 최종 키 영향 가능\n• 종신 영양제 복용 필수\n• 종신 특수 식이 방법 유지 필수\n\n📋 수술 적응증 (4가지 모두 충족해야 함):\n\n① 성장 완료\n• 최소 13~14세 이상 + 골연령 검사로 확인\n\n② 고도 비만\n• BMI ≥ 40 또는\n• BMI ≥ 35 + 심각한 합병증 동반\n• (참고: 키 160cm에 BMI 40 = 체중 102kg 이상)\n\n③ 비수술 치료 6~12개월 이상 무효\n• 식이·운동·약물 치료 모두 시도했지만 효과 없음\n• \"3개월 해봤는데 안 되더라고요\" → 충분하지 않음\n\n④ 생명을 위협하는 합병증\n• 약으로도 조절 안 되는 2형 당뇨\n• 야간 호흡 정지가 있는 심한 수면무호흡\n• 진행 중인 지방성 간염 + 간 섬유화\n• 단순 비만만으로는 수술 적응증 안 됨\n\n🔪 수술 후 영구 관리 (평생 지켜야 할 규칙):\n• 매 식사 반 공기 이하 (소량씩 자주)\n• 한 입 30번 이상 천천히 씹기\n• 탄산음료 영구 금지\n• 식사 전후 30분간 물도 금지\n• 종신 영양제: 종합비타민 + 칼슘 + 철분\n\n💰 한국의 현실:\n• 수술 가능 병원: 극소수의 대형 대학병원만\n• 수술비: 약 1,000~2,000만 원\n• 대부분 비급여\n• 수술 후 지속 관리비 + 영양제비 추가 발생\n\n⚠️ 반동 위험:\n수술 1~2년 후 체중의 10~20% 다시 증가하는 경우 흔함\n→ 식이 원칙 안 지키거나 운동 안 하면 위가 다시 늘어남\n\n🏥 다학제 팀이 필요해요:\n외과 + 소아내분비과 + 정신건강의학과 + 영양사가 함께하는 병원 선택 필수","tip":"수술은 시작이지 끝이 아닙니다. 수술 성공의 80%는 이후 생활 습관 유지에 달려있어요. 아이 본인이 수술 후 변화를 충분히 이해하고 스스로 결정해야 의미 있습니다."},"gh_basics":{"type":"question","text":"성장호르몬 기초에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"성장호르몬은 우리 몸 어디에서 만들어지나요?","next":"gh_where_made"},{"text":"언제 가장 많이 분비되나요?","next":"gh_when_peak"},{"text":"IGF-1이 뭔가요? 성장호르몬과 어떻게 다른가요?","next":"gh_igf1_explain"},{"text":"성장에 필요한 5가지 요소가 뭔가요?","next":"gh_5_factors"},{"text":"깊은 잠(서파수면)을 자기 위한 환경 조성법은?","next":"gh_sleep_env"}]},"gh_where_made":{"type":"answer","title":"성장호르몬은 뇌하수체에서 만들어져요","content":"뇌 깊숙한 곳에 있는 완두콩 크기의 「뇌하수체」에서 만들어집니다.\n\n🧠 구조와 원리:\n• 시상하부(사령관) → 뇌하수체(공장) → 혈액(고속도로) → 간/성장판\n• 시상하부가 명령을 내리면 뇌하수체가 호르몬을 혈액으로 분비\n• 둘은 「뇌하수체문맥계」라는 전용 혈관망으로 연결\n\n📊 조절 시스템:\n• 액셀: GHRH(방출호르몬) → 분비 촉진\n• 브레이크: 소마토스타틴(억제호르몬) → 분비 억제\n• 음성 피드백: IGF-1이 충분해지면 뇌에 신호 → 자동으로 분비 감소\n\n💡 성장호르몬의 역할 (키만이 아니에요!):\n• 뼈 길이 성장 + 밀도 강화\n• 근육 단백질 합성\n• 복부 지방 분해\n• 심장·간 등 장기 발달\n• 대사 조절 (혈당, 지방 등)","tip":"뇌하수체는 완두콩보다 작지만, 성장·갑상선·부신·생식 등 우리 몸의 거의 모든 호르몬을 조율하는 「마스터 컨트롤 센터」예요."},"gh_when_peak":{"type":"answer","title":"성장호르몬은 자는 동안 가장 많이 분비돼요","content":"잠든 후 첫 1~2시간, 특히 「서파수면(깊은 잠)」 단계에서 하루 분비량의 절반 이상이 나옵니다.\n\n⏰ 분비 타임라인:\n• 밤 9~10시 취침 → 11시~0시 사이 최대 분비\n• 서파수면: 뇌파가 느리고 깊은 단계, 몸이 가장 편안\n• 운동 후 분비도 있지만 수면 중의 1/5 수준\n\n🌙 꼭 지켜야 할 수면 원칙:\n• 취침 시간: 밤 9~10시 사이 권장\n• 총 수면 시간: 초등학생 9~11시간, 중학생 8~10시간\n• 취침 전 단 음식: 혈당 상승 → 인슐린 과다 → 성장호르몬 억제\n• 취침 전 스마트폰: 블루라이트 → 멜라토닌 억제 → 깊은 잠 방해\n\n📊 수면 부족의 영향:\n• 서파수면 감소 → 성장호르몬 분비 감소\n• 만성 수면 부족 아이: 또래보다 최종 키 1~3cm 낮을 수 있음","tip":"\"잘 때 큰다\"는 말은 과학적 사실이에요. 최고의 성장 비결은 취침 전 스마트폰 대신 일찍 자는 것!"},"gh_igf1_explain":{"type":"answer","title":"IGF-1 — 성장호르몬의 '현장 일꾼'이에요","content":"성장호르몬이 「명령서」라면 IGF-1은 「현장에서 실제 일하는 일꾼」입니다.\n\n📊 둘의 차이:\n구분 | 성장호르몬(GH) | IGF-1\n만들어지는 곳 | 뇌하수체 | 주로 간\n혈중 지속 시간 | 약 20분 | 12~15시간\n역할 | 명령 전달 | 실제 성장 실행\n검사 방법 | 자극검사(2~3시간) | 혈액 1회 채취\n\n🎯 IGF-1이 중요한 이유:\n• 성장판에 직접 작용해 세포 분열 → 뼈가 길어짐\n• 혈중에 오래 머물러 안정적 성장 효과\n• 간 뿐 아니라 성장판에서도 직접 생성 (이중 시스템)\n\n🔬 임상적 의미:\n• IGF-1 혈액검사: 성장호르몬 결핍 선별 검사로 사용\n• 단 1회 채혈로 가능 (공복 불필요)\n• 낮으면 → 성장호르몬 자극검사 추가 권장\n• 정상이어도 키가 작다면 → 다른 원인 탐색","tip":"IGF-1을 높이는 자연적인 방법: ① 충분한 수면 ② 운동 (특히 전신 운동) ③ 충분한 단백질 섭취 ④ 아연 충분히 섭취"},"gh_5_factors":{"type":"answer","title":"성장에 필요한 5대 요소","content":"키 성장은 단 하나의 요소가 아니라 5가지가 함께 작용합니다.\n\n🏆 성장의 5대 요소:\n\n1️⃣ 호르몬 (성장·갑상선)\n• 성장호르몬: 간→IGF-1→성장판 자극\n• 갑상선호르몬: 부족하면 성장 전반 저하\n\n2️⃣ 영양 (단백질·칼슘·비타민D)\n• 단백질: 성장의 원재료 (없으면 호르몬이 있어도 못 자람)\n• 칼슘: 뼈의 원재료\n• 비타민D: 칼슘 흡수율 2~3배 향상\n\n3️⃣ 수면 (깊은 잠)\n• 서파수면 중 성장호르몬 최대 분비\n• 9시간 이상 권장\n\n4️⃣ 운동 (성장판 자극)\n• 줄넘기·농구·달리기: 성장판에 적절한 자극\n• 적절한 근력 운동: 뼈 밀도 강화\n\n5️⃣ 스트레스 관리\n• 만성 스트레스 → 코티솔 증가 → 성장호르몬 억제\n• 정서적 안정이 키 성장에도 직결","tip":"5가지 중 하나라도 결핍되면 효율이 떨어져요. 특히 영양이 부족한 상태에서 성장호르몬 주사를 맞아도 원재료가 없으면 제대로 작용하지 못합니다."},"gh_sleep_env":{"type":"answer","title":"깊은 잠을 자기 위한 환경 조성법","content":"깊은 잠(서파수면)을 잘 자야 성장호르몬이 제대로 분비됩니다.\n\n🌙 수면 환경 체크리스트:\n\n✅ 방 온도: 18~20°C (약간 서늘하게)\n• 체온이 낮아져야 깊은 잠에 들 수 있음\n• 너무 더우면 깊은 잠 방해\n\n✅ 방 밝기: 최대한 어둡게\n• 멜라토닌: 어두워야 분비 (깊은 잠 유도)\n• 스마트폰·TV 블루라이트: 멜라토닌 억제\n\n✅ 취침 1시간 전 루틴:\n• 스마트폰·게임 OFF\n• 따뜻한 목욕 (체온 올렸다가 낮추는 효과)\n• 가벼운 스트레칭\n\n✅ 기상 시간 일정 유지:\n• 주말도 평일과 1시간 이내 차이\n• 수면 리듬 유지가 핵심\n\n❌ 수면 방해 요인:\n• 취침 2~3시간 내 야식 (소화 과정이 깊은 잠 방해)\n• 단 음식 (혈당 상승 → 인슐린 → GH 억제)\n• 카페인 (초콜릿, 콜라에도 포함)\n\n📊 연구 결과:\n하루 30분 일찍 자는 것만으로도 IGF-1 수치가 약 15% 상승한다는 연구가 있어요.","tip":"\"일찍 자는 아이가 잘 큰다\"는 말은 정말입니다. 취침 시간이 밤 9~10시 이후로 넘어가면, 성장호르몬 분비 피크를 놓치게 됩니다."},"growth_basics":{"type":"question","text":"키 성장 기초와 백분위수에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"백분위수란 무엇이고 어떻게 보나요?","next":"growth_percentile_explain"},{"text":"집에서 키를 정확하게 재는 방법이 있나요?","next":"growth_measure_method"},{"text":"나이별로 얼마나 자라야 정상인가요?","next":"growth_speed_by_age"},{"text":"성장곡선은 어떻게 읽나요?","next":"growth_curve_reading"},{"text":"병원에 꼭 가야 하는 5가지 신호는?","next":"growth_when_hospital"}]},"growth_percentile_explain":{"type":"answer","title":"백분위수 — 또래 100명 중 몇 번째인지를 나타내요","content":"백분위수는 또래 100명을 키 순서대로 세웠을 때의 위치입니다.\n\n📊 기본 이해:\n• 50백분위 = 100명 중 50번째 = 평균\n• 25백분위 = 100명 중 뒤에서 26번째 (평균보다 작지만 정상)\n• 3~97백분위 = 의학적으로 모두 정상 범위\n\n✅ 핵심 포인트:\n50백분위가 무조건 좋은 것이 아니에요!\n• 10백분위더라도 자기 선을 꾸준히 따라가면 → 정상\n• 50백분위더라도 백분위수가 계속 떨어지면 → 주의\n\n⚠️ 걱정되는 경우:\n• 3백분위 미만: 100명 중 3번째로 작음 → 전문과 평가 권장\n• 두 개 주요 백분위선(예: 50→25→10) 하향 돌파 → 원인 탐색 필요\n\n📏 어떤 백분위수가 중요한가요?\n주요 백분위선: 3, 10, 25, 50, 75, 90, 97\n이 선들을 \"가로지르지 않고 평행하게\" 따라가는 것이 건강한 성장","tip":"키는 절대값보다 \"추세\"가 중요해요. 3개월마다 측정해서 백분위수가 일정하게 유지되는지 확인하는 습관을 들여보세요."},"growth_measure_method":{"type":"answer","title":"집에서 키를 정확하게 재는 방법","content":"측정 방법에 따라 최대 2~3cm 차이가 날 수 있어요. 정확한 측정이 중요합니다.\n\n📏 올바른 측정 자세 (4점 밀착):\n1. 뒤꿈치 → 벽에 붙이기\n2. 엉덩이 → 벽에 붙이기\n3. 어깨 → 벽에 붙이기\n4. 뒤통수 → 벽에 붙이기\n5. 시선: 정면, 귀와 눈이 수평\n6. 척추: 기지개 켜듯 쭉 펴기\n7. 머리 위에 책을 수평으로 놓고 표시\n\n⏰ 언제 재야 정확한가?\n• 아침 기상 직후가 가장 정확 (저녁은 0.5~2cm 작음)\n• 왜? 종일 중력에 눌려 척추 추간판이 압축됨\n• 반드시 신발·양말 벗고 측정\n\n📅 얼마나 자주 재야 하나요?\n• 3개월(12주) 주기 권장\n• 일주일 성장은 1mm 이내 → 측정 오차에 묻힘\n• 계절 변화에 맞춰 재면 기억하기 쉬움 (3/1, 6/1, 9/1, 12/1)\n\n❌ 흔한 실수:\n• 신발·양말 착용한 채 측정\n• 푹신한 카펫 위 측정 (발이 가라앉음)\n• 머리핀·머리끈 착용 상태\n• 뒤꿈치가 벽에서 떨어진 채 측정","tip":"성장 기록을 남길 때는 날짜·시간·체중도 함께 기록하세요. 병원 방문 시 '1년 동안 3.5cm 컸어요'처럼 구체적인 수치를 말할 수 있으면 진단에 큰 도움이 됩니다."},"growth_speed_by_age":{"type":"answer","title":"나이별 정상 성장 속도","content":"나이에 따라 정상 성장 속도가 크게 다릅니다.\n\n📊 나이별 정상 성장 속도:\n\n0~1세: 25cm (일생 중 가장 빠름!)\n1~2세: 10~12cm\n2~3세: 8~10cm\n3세~사춘기 전: 5~7cm/년 ← 이 시기가 가장 중요한 기준\n사춘기 급성장기:\n  • 여아: 8~10cm/년 (1~2년)\n  • 남아: 10~12cm/년 (2~3년)\n\n⚠️ 연간 4cm 미만이면 (사춘기 전):\n• 반드시 소아내분비과 평가 필요\n• 성장호르몬 결핍, 갑상선 저하증, 영양 부족 등 원인 탐색\n\n📌 사춘기 급성장 시기:\n• 여아: 유방 발달 후 6개월~1년 뒤\n• 남아: 고환 증대 후 1~2년 뒤\n• 이 시기에 급성장이 없으면 → 평가 필요\n\n💡 키와 몸무게를 함께 봐야 해요:\n• 키는 크는데 몸무게 안 늘면: 영양 부족 가능성\n• 몸무게만 늘고 키 안 크면: 비만·성조숙증 위험","tip":"초등학교 1~2학년(7~8세)이 '황금 치료 시기'예요. 이때 성장 속도가 느리다면 바로 검사받는 것이 좋습니다. 사춘기가 시작되면 치료 효과가 절반으로 줄어요."},"growth_curve_reading":{"type":"answer","title":"성장곡선 읽는 법 — 점보다 선이 중요해요","content":"성장곡선은 아이의 성장 추세를 한눈에 보여주는 가장 강력한 도구입니다.\n\n📈 읽는 방법:\n1. 가로축 = 나이 / 세로축 = 키\n2. 측정값을 3~6개월마다 점으로 찍기\n3. 점들을 연결해 \"선\"을 만들기\n4. 이 선이 표준 백분위선과 평행하면 정상\n\n✅ 건강한 성장 패턴:\n• 낮은 백분위더라도 자기 선을 꾸준히 따라 올라가면 OK\n• 부모 키에 맞는 백분위를 유지하면 OK\n\n⚠️ 주의가 필요한 패턴:\n• 두 개의 주요 백분위선을 가로질러 하락\n• 6개월 이상 전혀 성장이 없음\n• 또래들은 사춘기 급성장 중인데 혼자만 안 오름\n\n📌 중요한 포인트:\n• 단 한 번의 측정보다 \"추세\"를 보는 것이 핵심\n• 예) 지금 25백분위이지만 1년 전 75백분위였다면 → 원인 탐색 필요\n\n🔍 성장곡선 활용 팁:\n• 3개월마다 같은 조건(아침, 같은 자세)으로 측정\n• 질환관리 앱이나 소아과 앱의 성장 기록 기능 활용","tip":"성장곡선에서 점 하나(지금 키)보다 선의 방향(추세)이 훨씬 중요해요. 의사도 한 번 측정보다 시간에 따른 변화를 더 중요하게 봅니다."},"growth_when_hospital":{"type":"answer","title":"이럴 때는 꼭 병원에 가야 해요 — 5가지 신호","recommend":true,"content":"다음 5가지 중 하나라도 해당하면 소아내분비과 방문을 권장합니다.\n\n🚨 병원 방문 신호 5가지:\n\n1️⃣ 연간 성장 4cm 미만 (사춘기 전)\n   → 성장호르몬 결핍, 갑상선 저하증 등 배제\n\n2️⃣ 백분위수가 두 개 이상의 주요 선을 하향 돌파\n   → 예) 6개월 만에 50→10백분위\n\n3️⃣ 키가 3백분위 미만\n   → 100명 중 3번째로 작음\n\n4️⃣ 사춘기가 왔는데 급성장이 없음\n   → 성장판이 먼저 닫히는 경우 (성조숙증 가능성)\n\n5️⃣ 사춘기 전인데 갑자기 연 8cm 이상 급성장\n   → 성조숙증 초기 신호 (역설적으로 주의 필요)\n\n⬆️ 추가로 확인할 신호:\n• 부모 평균 키에 비해 10cm 이상 작음\n• 머리가 상대적으로 유난히 커 보임\n• 빈번한 저혈당, 심한 신생아 황달 경력\n\n📋 병원 방문 시 챙길 것:\n• 연도별 키·몸무게 기록\n• 부모 양쪽 키\n• 출생 기록 (출생 시 체중·신장)\n• 사진 (얼굴 변화 확인에 도움)","tip":"\"아직 지켜볼게요\"라는 마음에 6개월~1년 미루다가 치료 기회를 잃는 경우가 많아요. 의심되면 빨리 가서 검사받는 것이 최선입니다."},"boneage_method_detail":{"type":"answer","title":"골연령 검사 방법 — 왼손 X-ray 한 장이면 돼요","content":"골연령 검사는 왼손을 X-ray 촬영하는 매우 간단한 검사입니다.\n\n🔬 검사 과정:\n1. 촬영판 위에 왼손바닥을 쫙 펴서 올리기\n2. 10초 이내로 사진 한 장 찍으면 끝\n3. 주사·채혈 전혀 없음\n4. 소요 시간: 5분\n\n☢️ 방사선 안전성:\n• 흉부 X-ray의 1/20 수준 (매우 적음)\n• 제주도 비행기 왕복 시 받는 우주방사선보다 적음\n• WHO 기준으로 연간 수백 번 찍어도 안전한 수준\n\n🦴 무엇을 보는 건가요?\n손가락·손바닥·손목의 20개 이상 뼈를 관찰:\n• 나이에 따라 순차적으로 나타나는 8개 손목뼈(수근골) 모양\n• 성장판(골단)의 형태와 유합 정도\n\n📅 검사 주기:\n• 정상 성장기: 1년에 1회\n• 성장호르몬·성조숙증 치료 중: 6개월마다\n• 뼈나이가 실제보다 2년 이상 빠른 경우: 더 자주","tip":"만 5세 미만에서는 뼈가 충분히 발달하지 않아 판독이 부정확할 수 있어요. 만 5세 이후부터 의미 있는 결과를 얻을 수 있습니다."},"boneage_why_left":{"type":"answer","title":"왜 왼손으로 골연령 검사를 하나요?","content":"1930년대부터 축적된 전 세계 모든 골연령 표준 데이터가 「왼손」을 기준으로 만들어졌기 때문입니다.\n\n📚 역사적 이유:\n• 1930년대 Greulich-Pyle 아틀라스 창시 시 왼손 기준으로 설정\n• 이후 모든 표준 데이터베이스가 왼손 기준 구축\n• 전 세계 공통 기준 유지를 위해 현재까지 왼손 사용\n\n🔑 추가 이유:\n• 대다수가 오른손잡이 → 오른손은 부상이 많아 데이터 변동성 있음\n• 왼손이 더 \"표준적인\" 발달 상태를 반영\n\n✋ 오른손잡이인데 왼손으로 해도 정확한가요?\n네! 손을 사용하는 정도가 골연령에 미치는 영향은 무시할 수 있을 정도로 작습니다. 양손의 뼈 성숙도 차이는 거의 없어요.\n\n🤖 최근 변화:\n• AI 판독 시스템 도입으로 정확도 향상\n• 의사 간 판독 오차(기존 6개월~1년) 감소 추세\n• 일부 병원에서는 AI 보조 판독 사용 중","tip":"왼손이 어색하더라도 걱정 마세요. 왼손 측정이 전 세계 표준이고, 결과 정확도에 영향을 주지 않습니다."},"boneage_fast_slow":{"type":"answer","title":"골연령이 실제 나이보다 빠르거나 느리면?","content":"골연령이 실제 나이와 다를 때의 의미를 정확히 알아야 합니다.\n\n📊 골연령이 실제 나이보다 「빠른」 경우:\n\n⚠️ 의미:\n• 뼈가 실제 나이보다 일찍 늙고 있음\n• 성장판이 일찍 닫힐 가능성 높음\n• 지금은 또래보다 크지만 최종 키는 작을 수 있음\n\n주요 원인:\n• 비만 (렙틴·인슐린이 뼈 성숙 촉진)\n• 성조숙증 (성호르몬 → 성장판 조기 폐쇄)\n• 갑상선 기능 항진증 등\n\n2년 이상 앞서면: 전문의 평가 필수\n\n─────────────────────────────\n\n📊 골연령이 실제 나이보다 「느린」 경우:\n\n✅ 긍정적 신호일 때:\n• 체질성 성장지연 (늦게 크는 체질)\n• 성장판이 더 오래 열려 있음 → 더 오래 자람\n• 지금 작아도 결국 정상 키에 도달\n\n⚠️ 주의가 필요할 때:\n• 성장 속도도 느린 경우 (연 4cm 미만)\n• 성장호르몬 결핍, 영양 불량, 갑상선 저하증 등\n\n구별법: 성장 속도가 정상(5~6cm/년)인가?\n• 정상이면 → 체질성, 기다리면 됨\n• 느리면 → 원인 탐색 필요","tip":"골연령만 보지 말고 성장 속도와 함께 해석해야 합니다. 골연령이 느려도 성장 속도가 정상이면 걱정 없어요!"},"boneage_accuracy":{"type":"answer","title":"골연령으로 예측 키, 얼마나 정확한가요?","content":"골연령 예측 키는 부모 키 공식보다 훨씬 정확하지만, 완벽하지는 않아요.\n\n📊 방법별 정확도 비교:\n\n부모 키 공식 (MPH):\n• 오차 범위: ±8~10cm\n• 총 가능 범위: 20cm\n• 예) 예측 170cm → 실제 160~180cm\n\n골연령 기반 예측:\n• 사춘기 전: 오차 ±5~7cm\n• 사춘기 중기: 오차 ±3~5cm\n• 사춘기 후반: 오차 ±2~3cm (가장 정확)\n\n📌 정확도가 높아지는 조건:\n• 사춘기가 진행될수록 정확\n• 현재 키 + 골연령 + 성장 속도를 함께 고려할 때\n• Bayley-Pinneau법 (사춘기 후반에 정확)\n\n💡 실제 활용 방법:\n• 예측 키 자체보다 「유전 목표 키(MPH)」와의 차이를 봐요\n• 예측 키가 유전 목표보다 5cm 이상 낮으면 → 치료 고려\n\n⚠️ 주의:\n• 골연령 판독은 의사마다 6개월~1년 오차 가능\n• AI 판독 도입으로 개선 중이지만 아직 완벽하지 않음","tip":"예측 키는 확정이 아니라 방향을 보는 도구예요. 치료 여부는 예측 키 하나보다 성장 속도, 유전 목표, 골연령을 종합해서 결정합니다."},"boneage_treatment_end":{"type":"answer","title":"골연령이 치료 종료 기준에 어떻게 사용되나요?","content":"성장호르몬 치료와 성조숙증 치료 모두 골연령을 기준으로 종료를 결정합니다.\n\n📋 성조숙증 치료 (GnRH 주사) 종료 기준:\n• 여아 골연령 12~12.5세\n• 남아 골연령 13~13.5세\n• → 또래의 정상 사춘기 시기와 일치시켜 종료\n• 종료 후 평균 1년 내 초경\n\n📋 성장호르몬 치료 종료 기준:\n급여 종료 기준 (건강보험):\n• 여아 골연령 14~15세\n• 남아 골연령 15~16세\n• 여아 신장 153cm 초과 / 남아 165cm 초과\n• 연간 성장 2cm 미만\n\n자비 치료는 이후에도 가능\n\n💡 왜 달력 나이가 아닌 골연령을 쓰나요?\n• 성장판이 닫히는 시기가 실제로는 골연령에 달려 있음\n• 달력 나이 14세여도 골연령 11세면 → 치료 효과 있음\n• 달력 나이 11세여도 골연령 14세면 → 치료 효과 없음\n\n📅 골연령 추적 주기:\n• 치료 중: 6개월마다\n• 안정기: 1년마다","tip":"치료 종료는 의사가 골연령 검사 결과를 보고 결정합니다. 달력 나이가 14세여도 골연령이 낮으면 치료를 계속할 수 있어요."},"gh_test_detail":{"type":"question","text":"성장호르몬 검사에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"IGF-1 검사와 자극검사의 차이가 뭔가요?","next":"gh_test_types"},{"text":"자극검사는 어떻게 진행되나요?","next":"gh_stim_test_detail"},{"text":"결과를 어떻게 해석하나요?","next":"gh_test_result_reading"},{"text":"검사 전 어떻게 준비해야 하나요?","next":"gh_test_preparation"},{"text":"자극검사에 부작용이 있나요?","next":"gh_stim_side_effect"}]},"gh_test_types":{"type":"answer","title":"IGF-1 검사 vs 자극검사 — 선별 vs 확진","content":"두 검사는 목적과 방식이 완전히 다릅니다.\n\n📊 비교표:\n\n구분 | IGF-1 혈액검사 | 성장호르몬 자극검사\n목적 | 선별(스크리닝) | 확진(진단)\n소요 시간 | 5분 | 2~3시간\n채혈 횟수 | 1회 | 4~6회 (유치 1회)\n금식 여부 | 불필요 | 8시간 금식 필수\n비용 | 낮음 | 높음\n정확도 | 간접 지표 | 금표준(gold standard)\n\n🔬 IGF-1의 한계:\n• 영양 상태, 간 기능에 따라 수치 변동\n• 정상 수치여도 GH 결핍일 수 있음 (위음성 가능)\n• 따라서 IGF-1만으로 확진 불가\n\n✅ 언제 어떤 검사를?\n• IGF-1 먼저 → 낮으면 자극검사 추가\n• 또는 임상적으로 강하게 의심되면 바로 자극검사\n• 보험 급여를 위해서는 자극검사가 필수\n\n💡 자극검사가 \"금표준\"인 이유:\n성장호르몬은 맥동성으로 분비 → 1회 측정으로는 결핍 판단 불가\n자극검사는 인위적으로 분비를 최대한 유도해 최고값을 측정","tip":"IGF-1 검사가 정상이어도 성장이 느리고 다른 이상 신호가 있다면, 자극검사까지 받아보는 게 좋습니다."},"gh_stim_test_detail":{"type":"answer","title":"성장호르몬 자극검사 — 어떻게 진행되나요?","content":"「금표준(Gold Standard)」 검사입니다. 정확하지만 시간이 걸려요.\n\n📋 검사 순서:\n1. 전날 밤 12시부터 8시간 금식 (물은 OK)\n2. 오전 일찍 병원 도착\n3. 정맥 유치 바늘 1회만 삽입 (이후 채혈은 여기서)\n4. 자극 약물 투여\n5. 30분 간격으로 4~5회 채혈\n6. 약 2~3시간 후 종료\n\n💊 사용하는 자극 약물:\n• 클로니딘: 부작용 적음, 가장 흔히 사용\n• 아르기닌: 아미노산 형태, 주사\n• 글루카곤: 저혈당 위험 없음\n• 인슐린: 가장 강력, 저혈당 모니터링 필요\n• 보험 급여: 서로 다른 방법으로 2종 이상 필요\n\n📊 결과 판독:\n• 피크값 ≥10ng/mL: 정상 (보험 불가)\n• 7~10: 경계\n• 5~7: 부분 결핍\n• <5: 완전 결핍 (치료 강력 권장)\n\n⏳ 기다리는 동안:\n• 병원 침대에서 안정 취하기\n• 책·태블릿·장난감 지참 권장\n• 보호자 1명 동반 필수","tip":"자극검사는 아이도 부모도 힘든 검사예요. 하지만 치료 여부를 정확히 판단하고 보험을 적용받기 위해 반드시 필요한 과정입니다."},"gh_test_result_reading":{"type":"answer","title":"성장호르몬 자극검사 결과 해석법","content":"수치만이 아니라 여러 요소를 종합해서 판단합니다.\n\n📊 피크값 기준:\n• ≥10ng/mL: 정상 → 성장호르몬 결핍 아님\n• 7~10ng/mL: 경계 → 추가 관찰\n• 5~7ng/mL: 부분 결핍 → 치료
