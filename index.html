tacular. Funciona manteniendo una velocidad de crecimiento superior a la basal durante varios años, acumulando gradualmente una mejor talla final."},"gh_safety":{"type":"answer","title":"Seguridad de la hormona de crecimiento — Validada en más de 40 años de uso","content":"El tratamiento con GH es muy seguro. El producto usado se fabrica mediante tecnología de ADN recombinante desde 1985.\n\n✅ Por qué es segura:\n• Estructura 100% idéntica a la GH humana natural (191 aminoácidos)\n• El organismo no la reconoce como «extraña»\n• Más de 40 años de uso en todo el mundo, millones de pacientes tratados\n\n📋 Efectos secundarios leves (< 3%):\n• Enrojecimiento, picor o hinchazón en el punto de inyección → se resuelve en 1–2 semanas\n• Dolor de cabeza → normalmente desaparece en 1–2 semanas\n• Dolores musculares o articulares → como dolores de crecimiento, mejoran en 2–4 semanas\n• Ligera hinchazón en manos o pies → se resuelve sola con el tiempo\n\n⚠️ Menos frecuentes pero a tener en cuenta:\n• Hipotiroidismo: ~10–20% de los casos de déficit múltiple hipofisario puede desarrollarlo → fácil de controlar con analítica y medicación\n• Elevación de glucosa: solo es relevante en niños con obesidad o antecedentes familiares de diabetes\n• Escoliosis: monitoreo en revisiones, especialmente en Turner y Prader-Willi\n• Deslizamiento de la epífisis femoral: muy raro; si hay cojera brusca o dolor de cadera, acudir a urgencias\n\n🚫 Riesgo de cáncer: sin aumento en estudios a largo plazo y gran escala en niños sanos\n\n🔴 Urgencias: ir a urgencias de inmediato si hay:\n• Cefalea intensa + vómitos + alteraciones visuales (posible hipertensión intracraneal)\n• Cojera brusca (posible deslizamiento epifisario)","tip":"Comunica cualquier síntoma inusual al médico de inmediato. Las analíticas periódicas y las revisiones regulares son la clave para un tratamiento seguro."},"gh_cost":{"type":"answer","title":"Coste de la GH y seguro — Conviene estar informado","content":"El coste del medicamento varía según el peso y el diagnóstico. Este es el rango general:\n\n💰 Coste base del medicamento:\n• 70.000–120.000 wones/mes (aprox. 2.500–4.000 wones/kg/mes)\n• El coste aumenta conforme el niño crece y hay que ajustar la dosis\nEjemplos:\n• Niño de 20 kg → aprox. 50.000–80.000 wones/mes\n• Niño de 40 kg → aprox. 100.000–160.000 wones/mes\n\n📋 Con cobertura del seguro:\n• Copago 30% → aprox. 21.000–36.000 wones/mes\n• Receta en el médico, medicamento en la farmacia\n• No se necesita solicitud especial (el hospital lo gestiona automáticamente)\n\n📋 Criterios para finalizar la cobertura (cualquiera de estos):\n• Edad ósea: niñas 14–15 años / niños 15–16 años\n• Talla: niñas > 153 cm / niños > 165 cm\n• Crecimiento anual < 2 cm\n\n⚠️ Sin cobertura del seguro:\n• TBI (talla baja idiopática): 100% a cargo del paciente\n• 70.000–120.000 wones/mes íntegros\n• 2–3 años de tratamiento en total: aproximadamente 20–40 millones de wones\n\n💡 Consejo fiscal — Deducción por gastos médicos:\n• En Corea, los gastos médicos que superen el 3% de la renta total tienen una deducción del 15%\n• Ejemplo: renta 50 millones + gastos médicos 5 millones\n  → (5M – 1,5M) × 15% = 525.000 wones de ahorro fiscal","tip":"Cuanto más dura el tratamiento, más coste acumula. Pregunte al médico en la primera visita cuánto tiempo podría durar el tratamiento y cuál sería el coste total estimado."},"gh_injection":{"type":"answer","title":"Técnica de inyección de GH — Al principio intimida, pero se convierte en rutina","content":"Se administra como una inyección subcutánea diaria. La mayoría de las familias se sienten cómodas con el proceso en 1–2 semanas.\n\n💉 Datos básicos:\n• Diámetro de la aguja: 0,23 mm (más delgada que el estilete de un mosquito)\n• Inyección subcutánea: mucho menos dolorosa que la intramuscular\n• Hora ideal: justo antes de dormir (21–22 h)\n  → Coincide con el pico de secreción natural nocturna de GH\n\n🎯 Rotar entre 4 zonas (cambiar cada día):\n1. Abdomen: al menos 5 cm del ombligo, lado izquierdo y derecho (preferido)\n2. Muslo: cara anterior y parte externa, tercio superior\n3. Parte posterior del brazo: zona del tríceps\n4. Nalga: cuadrante superoexterno\n\n⚠️ Inyectar siempre en el mismo sitio provoca:\nLipodistrofia (hundimiento) o lipohipertrofia (nódulo duro) → dificulta la absorción → reduce la eficacia\n\n📋 Pasos de la inyección:\n1. Lavarse bien las manos (más de 20 segundos)\n2. Sacar el medicamento de la nevera 15–30 min antes (el frío duele más)\n3. Limpiar la piel con una torunda de alcohol; dejar secar 10–15 segundos\n4. Pellizcar suavemente 2–3 cm de piel\n5. Insertar a 90°, con un movimiento rápido y seguro (la duda aumenta el dolor)\n6. Presionar hasta el fondo y «mantener 10 segundos» (¡clave para evitar fugas!)\n7. Retirar a 90° → presionar suavemente con una gasa 10 segundos (no frotar — provoca moratones)\n\n🧒 Cuando el niño tiene miedo:\n• Dar opciones: «¿Hoy en el lado izquierdo o el derecho del abdomen?\"\n• Tabla de pegatinas: una pegatina por cada inyección, premio cuando se completa la semana\n• Avisar 10 minutos antes: «Pronto toca la inyección»\n• Nunca decir «no duele nada» — romper la promesa destruye la confianza","tip":"Crear una rutina a la misma hora cada noche evita los olvidos. Una mayor adherencia se traduce directamente en mejores resultados."},"gh_timing":{"type":"answer","title":"Cuándo empezar y parar el tratamiento — La edad ósea marca la pauta","content":"El inicio y la finalización del tratamiento con GH se basan principalmente en la edad ósea.\n\n🟢 Cuándo empezar:\n• Cuanto antes, mejor (menor edad ósea = mayor efecto)\n• Momento óptimo: antes de la pubertad (niñas edad ósea 6–9, niños edad ósea 8–10)\n• 2+ años de tratamiento prepuberal aproximadamente duplica la ganancia esperada\n\n🔴 Criterios para finalizar (fin de cobertura del seguro):\n• Niñas edad ósea 14–15 / niños edad ósea 15–16\n• Talla: niñas > 153 cm / niños > 165 cm\n• Crecimiento anual < 2 cm\n\n💡 Continuar con pago propio tras el fin del seguro:\n• Si el crecimiento sigue siendo significativo, puede considerarse continuar a cargo propio\n• Consultar con el médico si la cobertura termina pero el niño sigue creciendo > 2 cm/año\n\n📅 Programa de seguimiento durante el tratamiento:\n• Primeros 3 meses: visita mensual (talla/peso, efectos secundarios, técnica de inyección)\n• Fase estable: cada 3–6 meses\n• Cada 3–6 meses: IGF-1 (objetivo: 0 a +2 DE)\n• Cada 6–12 meses: radiografía de edad ósea\n• Anualmente: función tiroidea, glucemia","tip":"No parar de golpe — la velocidad de crecimiento volverá al nivel inicial. Cualquier decisión de parar debe tomarse siempre con el médico."},"puberty_girl_under8":{"type":"answer","title":"Desarrollo mamario antes de los 8 años — Consultar al especialista de inmediato","recommend":true,"urgent":true,"content":"El desarrollo mamario antes de los 8 años (edad cronológica) cumple la definición médica de pubertad precoz. Es necesaria una evaluación urgente.\n\n🔬 Pruebas que pedirá el médico:\n1. Radiografía de edad ósea (la más importante)\n   → ¿Cuánto se ha adelantado la maduración?\n2. Test de estimulación con GnRH (clave para distinguir central de periférico)\n   → Pico de LH ≥ 5 UI/L = pubertad precoz central confirmada\n   → 90 minutos, 5 extracciones de sangre (catéter venoso único)\n3. Ecografía pélvica (tamaño del útero y los ovarios)\n4. RM cerebral\n   → Menores de 6 años: obligatoria\n   → 6–8 años: si hay progresión rápida o síntomas neurológicos\n\n⚠️ Factores para decidir el tratamiento:\n• Edad ósea > 2 años por delante + progresión rápida → tratamiento muy recomendado\n• Edad ósea sin adelanto significativo + progresión lenta → observación posible\n\n📊 Sin tratamiento:\n• Las niñas acaban unos 10 cm por debajo de su talla diana (datos europeos a largo plazo)\n• La primera regla puede adelantarse a los 9–10 años","tip":"Un diagnóstico y tratamiento tempranos protegen la talla final. No dude — consulte al especialista hoy mismo."},"puberty_girl_new":{"type":"answer","title":"Desarrollo mamario recién detectado — Conviene una evaluación","recommend":true,"content":"Si acaba de notarlo, consulte en endocrinología pediátrica para una evaluación.\n\n📌 Desarrollo mamario entre los 8 y los 10 años:\n• A partir de los 8 años no cumple técnicamente la definición de «pubertad precoz», pero sigue necesitando evaluación\n• 8–9 años: si hay progresión rápida, valorar tratamiento; si es lenta, observar\n• 9–10 años: ya dentro del rango de pubertad normal\n\n🔍 Preguntas clave en la evaluación:\n• ¿La progresión es rápida? (¿2 estadios de Tanner en 6 meses?)\n• ¿La edad ósea está > 2 años por delante?\n• ¿Ha empezado ya el estirón?\n• ¿La talla final predicha está significativamente por debajo de la talla diana genética?\n\n📊 Criterios para considerar tratamiento (si se cumple alguno):\n• Test de estimulación con GnRH con pico de LH ≥ 5 UI/L\n• Edad ósea > 2 años por delante\n• Talla final predicha muy por debajo de la diana genética\n• Progresión rápida que causa malestar psicológico","tip":"Anotar la fecha en que se detectó el desarrollo y con qué rapidez ha cambiado es información muy valiosa para el médico."},"puberty_girl_progress":{"type":"answer","title":"Desarrollo mamario que avanza rápidamente — Consultar pronto","recommend":true,"content":"Si ha crecido notablemente en 3–6 meses, la progresión es rápida y probablemente se necesite evaluación y tratamiento.\n\n⚠️ Lo que implica una progresión rápida:\n• La edad ósea también está avanzando probablemente con rapidez\n• Riesgo de cierre prematuro de las placas de crecimiento\n• La talla final predicha puede ir bajando\n\n📊 Efecto del tratamiento con análogos de GnRH (según la edad ósea al inicio):\n• Edad ósea < 6 años al inicio: ~7,4 cm adicionales de ganancia media (máximo beneficio)\n• Edad ósea 8–9: beneficioso pero más limitado\n• Edad ósea 10–11: aún más limitado\n• Edad ósea ≥ 11: efecto mínimo\n\n💉 Con el tratamiento (inyecciones de análogos de GnRH):\n• La progresión puberal rápida se frena o detiene\n• La velocidad de avance de la edad ósea se normaliza\n• La primera regla se retrasa hasta una edad similar a la de las compañeras\n• Se previene la pérdida de talla final","tip":"Cuanto más rápida es la progresión, más urgente es el tratamiento para que sea eficaz. Pide cita hoy."},"puberty_girl_stable":{"type":"answer","title":"Sin cambios en más de 6 meses — Puede ser telarca precoz","content":"Si lleva meses sin cambios, puede tratarse de «telarca precoz» — desarrollo mamario aislado con un pronóstico generalmente muy bueno.\n\n📊 Características de la telarca precoz:\n• Solo desarrollo mamario, sin otros signos de pubertad\n  (sin vello púbico, flujo vaginal ni aceleración del crecimiento)\n• Edad ósea normal o levemente adelantada\n• Velocidad de crecimiento normal\n• Test de estimulación con GnRH: pico de LH muy bajo (< 2 UI/L, respuesta dominada por FSH)\n\n✅ Pronóstico:\n• Más del 90% se resuelve espontáneamente sin tratamiento\n• En el 51%, el tejido mamario desaparece por completo\n• Riesgo de evolución a pubertad precoz verdadera: ~2% si el inicio fue antes de los 2 años\n\n⚠️ Aun así, es necesario un seguimiento regular:\n• Revisiones cada 3–6 meses al principio\n• Observar: cambios en el tamaño del pecho, aparición de vello púbico o flujo vaginal, velocidad de crecimiento\n\n🔴 Acudir de inmediato si:\n• El pecho crece rápidamente\n• Aparece vello púbico o flujo vaginal\n• La talla empieza a crecer de forma acelerada","tip":"La telarca precoz es habitualmente tranquilizadora — pero hay que hacer un seguimiento periódico."},"puberty_girl_normal":{"type":"answer","title":"Desarrollo mamario a partir de los 10 años — Rango de pubertad normal","content":"El desarrollo mamario a partir de los 10 años es el inicio de una pubertad normal.\n\n📊 Cronología normal de la pubertad en niñas:\n• Inicio del desarrollo mamario: promedio 9–11 años (rango normal 8–13 años)\n• Vello púbico: habitualmente 6 meses–1 año después del inicio mamario\n• Estirón: 6 meses–1 año después del inicio del desarrollo mamario\n• Primera regla: promedio 2–2,5 años después del inicio mamario (promedio 12–13 años)\n\n📈 Crecimiento tras la primera regla:\n• El año antes: ~8–10 cm (pico del estirón)\n• 1.er año después: ~2–3 cm\n• 2.º año después: ~1–2 cm\n• Luego casi nada → total de ~5–7 cm más\n\n✅ No hay de qué preocuparse si:\n• La pubertad avanza de forma natural por sus estadios\n• La edad ósea está a menos de 1 año de la cronológica\n• La talla final predicha está dentro del rango de la talla diana genética\n\n⚠️ Consultar si:\n• La pubertad avanza 2 o más estadios en 6 meses\n• La primera regla parece que llegará antes de los 10 años\n• La talla final predicha está más de 5 cm por debajo de la diana genética","tip":"La pubertad normal está en marcha. Maximiza el crecimiento restante con una nutrición equilibrada y sueño suficiente."},"puberty_girl_unsure":{"type":"answer","title":"Tejido mamario vs grasa — Cómo distinguirlos","content":"Muchos padres hacen esta misma pregunta. Es más fácil de lo que parece distinguirlos.\n\n👆 Comprobación en casa:\n• Tejido mamario glandular: se nota un pequeño nódulo firme justo debajo del pezón\n  (puede doler ligeramente al presionar — sensación como un botón pequeño o una piedrecita)\n• Acumulación de grasa: todo blando y esponjoso\n  (sin zona dura directamente bajo el pezón)\n\n📊 Si solo aparece en un lado:\n¡Completamente normal! Es muy frecuente en la telarca precoz y el inicio de la pubertad que un lado aparezca primero.\n\n🏥 Confirmación en la consulta:\n• Exploración física del médico (palpación)\n• Ecografía mamaria: distingue claramente tejido glandular de grasa; completamente indolora, 5–10 min\n• Hallar tejido glandular en la ecografía = inicio del desarrollo mamario confirmado\n\n✅ Si se nota un nódulo firme en casa:\nMenos de 8 años → consultar de inmediato\n8 años o más → observar la evolución y consultar cuando sea necesario","tip":"Si hay dudas, una ecografía mamaria en el centro de salud es la confirmación más precisa. Rápida e indolora."},"ans_boy_precocious":{"type":"answer","title":"Aumento del tamaño testicular antes de los 9 años — Evaluación especializada urgente","recommend":true,"urgent":true,"content":"Un aumento del tamaño testicular antes de los 9 años cumple los criterios diagnósticos de pubertad precoz.\n\n📏 Criterio de tamaño testicular:\n• ≥ 4 mL (longitud ~2,5 cm) = inicio de pubertad\n• Los padres normalmente no pueden evaluarlo con precisión — se necesita la exploración del especialista\n\n⚠️ Por qué la pubertad precoz en niños requiere mayor atención:\n• A diferencia de las niñas, los niños tienen una tasa más alta de patología orgánica subyacente (lesiones cerebrales, etc.)\n• Históricamente el 40–75% tenía causas identificables; ahora es el 7–16%, pero sigue siendo significativo\n• La pubertad precoz es rara en niños, lo que hace aún más importante investigarla a fondo\n\n🔬 Pruebas imprescindibles:\n1. Radiografía de edad ósea (obligatoria)\n2. Test de estimulación con GnRH (pico LH ≥ 5 UI/L = pubertad precoz central verdadera)\n3. RM cerebral (obligatoria en niños)\n   → Descartar hamartoma hipotalámico (tumor benigno), tumor hipofisario, etc.\n4. Hormonas sexuales en sangre (testosterona, LH, FSH, DHEA-S)\n5. Ecografía testicular (descartar tumor testicular)\n\n📊 Datos sin tratamiento:\n• Datos europeos a largo plazo: los niños acaban ~20 cm por debajo de la talla diana genética\n• El doble de pérdida de talla que en las niñas (~10 cm)","tip":"La pubertad precoz en niños es rara pero grave. Acude a endocrinología pediátrica lo antes posible."},"ans_boy_signs":{"type":"answer","title":"Señales de pubertad en niños — El momento y la velocidad son lo que importa","content":"El cambio de voz, el vello facial y el estirón son señales de la pubertad media-tardía.\n\n📊 Secuencia normal de la pubertad en niños:\n1. Aumento testicular (≥ 4 mL) ← comienzo de la pubertad\n2. Vello púbico (6 meses–1 año después del aumento testicular)\n3. Estirón (1–2 años después del aumento testicular, máximo hacia los 13–15 años)\n   → 9–10 cm/año durante el pico, ~2–3 años de duración\n4. Cambio de voz (alrededor del mismo momento que el estirón)\n5. Vello facial (el último signo de la pubertad)\n   → Cuando aparece el vello facial, el estirón está llegando a su fin\n\n📈 Crecimiento total en la pubertad masculina:\n• Estirón: 25–30 cm (5–7 cm más que las niñas)\n• La pubertad empieza ~2 años más tarde que en ellas, pero dura 2–3 años más\n• Esto explica que los hombres sean de media ~13 cm más altos\n\n✅ Rangos normales:\n• Inicio de la pubertad: 10–12 años\n• Antes de los 9 años = pubertad precoz\n• Sin signos a los 14 años = retraso puberal — requiere evaluación\n\n🔬 Consultar si:\n• La pubertad empezó antes de los 9 años\n• La edad ósea está > 2 años por delante de la cronológica\n• La talla final predicha está significativamente por debajo de la diana genética","tip":"Cuando aparece el vello facial, el estirón principal está llegando a su fin. A partir de ahí, los hábitos de vida saludables son la clave para maximizar el crecimiento restante."},"ans_boy_false_puberty":{"type":"answer","title":"Pubertad precoz periférica — Una causa distinta","content":"Si solo hay vello púbico y olor corporal sin ningún cambio testicular, lo más probable es una pubertad precoz periférica (adrenal).\n\n📌 Diferencia entre central y periférica:\n• Central: señal del cerebro → estimulación de gónadas → hormonas sexuales\n  Niños: los testículos se agrandan primero\n• Periférica: las glándulas suprarrenales secretan andrógenos directamente, sin señal del cerebro\n  Niños: tamaño testicular normal, solo vello púbico / olor corporal / acné\n\n📌 Causa más frecuente — Adrenarquia precoz:\n• Las suprarrenales producen DHEA-S antes de tiempo\n• Pronóstico habitualmente excelente — raramente progresa a pubertad completa\n• Pero hay que monitorizar durante 1–2 años para descartar progresión a pubertad central\n\n🏥 Por qué hay que evaluarlo:\nEn casos raros puede haber un tumor suprarrenal o una hiperplasia suprarrenal congénita.\nSon imprescindibles las analíticas (DHEA-S, testosterona, 17-OHP) para descartarlas.\n\n⚠️ Punto clave:\nTest de estimulación con GnRH → sin respuesta de LH = confirma tipo periférico\nLos análogos de GnRH no son efectivos en la pubertad precoz periférica (hay que tratar la causa)","tip":"El vello púbico y el olor corporal con tamaño testicular normal requieren un enfoque diagnóstico completamente distinto. Consultar al especialista."},"ans_boy_delayed":{"type":"answer","title":"Retraso puberal en niños — Lo más frecuente es el retraso constitucional","recommend":true,"content":"Si a los 14 años no hay aumento testicular (< 4 mL), se evalúa como retraso puberal.\n\n📊 Retraso constitucional del crecimiento y la pubertad (RCCP) — 60–80%:\n• «Los que maduran tarde» — el desarrollo final es normal\n• Señal clave: uno de los padres (habitualmente el padre) también maduró tarde\n• Edad ósea 1–3 años por debajo de la cronológica\n• Aunque bajo, sigue creciendo a un ritmo normal (4–5 cm/año)\n\n✅ Cuándo esperar:\n• Padre con antecedentes de maduración tardía\n• Edad ósea baja (placas de crecimiento bien abiertas)\n• Analíticas normales (GH, tiroides, etc.)\n• Crecimiento continuo y estable\n\n⚠️ Causas patológicas a descartar:\n• Síndrome de Klinefelter (47, XXY)\n• Disfunción hipofisaria\n• Enfermedad crónica debilitante (Crohn, IRC, etc.)\n• Desnutrición grave\n\n💊 Opción de tratamiento (en el RCCP):\n• La mayoría entrará en la pubertad de forma natural con el tiempo\n• Si hay gran sufrimiento psicológico: se puede inducir la pubertad con dosis bajas de testosterona\n• Con o sin tratamiento, la talla final queda dentro del rango genético normal\n\n🔬 Estudios: edad ósea + prueba de estimulación de GH + cariotipo (para descartar Klinefelter)","tip":"El RCCP simplemente significa un comienzo más tardío — la talla final suele ser normal. La parte difícil es aguantar el momento en que todos los compañeros ya han crecido."},"ans_false_puberty":{"type":"answer","title":"Pubertad precoz periférica — Causa diferente, tratamiento diferente","content":"Si hay vello púbico / olor corporal / acné SIN desarrollo mamario (niñas) ni aumento testicular (niños), se sospecha «pubertad precoz periférica».\n\n🔵 Comparación central vs periférica:\nCaracterística | Central | Periférica\nSeñal cerebral | Presente | Ausente\nNiñas | Desarrollo mamario primero | Sin desarrollo mamario\nNiños | Testículos se agrandan primero | Tamaño testicular normal\nAmbos | LH↑, FSH↑ | DHEA-S↑, LH normal\nTratamiento | Análogos de GnRH | Tratar la causa\n\n📌 Causa más frecuente — adrenarquia precoz:\n• Las suprarrenales producen DHEA-S antes de tiempo\n• Habitualmente benigno, con transición natural a pubertad normal\n• Algunos pueden progresar a pubertad central → requiere seguimiento\n\n🔬 Estudios necesarios:\n• DHEA-S, testosterona, 17-OHP\n• Test de estimulación con GnRH (para descartar causa central)\n• Ecografía suprarrenal/pélvica","tip":"La pubertad precoz periférica tiene un mecanismo completamente distinto de la central — los análogos de GnRH no sirven. El diagnóstico preciso es lo primero."},"ans_early_menarche":{"type":"answer","title":"Primera regla temprana — Evaluar cuánto crecimiento queda","recommend":true,"content":"La primera regla señala que el pico de crecimiento está llegando a su fin.\n\n📊 Crecimiento medio tras la primera regla:\n• El año en que aparece: ~2–3 cm\n• 2.º año: ~1–2 cm\n• Después: prácticamente nada\n• Total tras la primera regla: ~5–7 cm\n\n📌 La edad ósea determina cuánto queda:\nSi la edad ósea es < 12 justo después de la primera regla, puede que aún quede una ventana de tratamiento.\n\n⚠️ Primera regla antes de los 10 años:\nPuede indicar que el tratamiento de una pubertad precoz llegó tarde. Se necesita una radiografía de edad ósea urgente.\n\n✅ Estrategias para maximizar el crecimiento restante:\n• Dormir lo suficiente (acostarse antes de las 22:00)\n• Ingesta adecuada de proteínas + calcio + vitamina D\n• Minimizar el estrés\n• Ejercicio regular (saltar a la comba, voleibol y otros ejercicios de impacto)","tip":"No rendirse tras la primera regla. Una radiografía de edad ósea permite saber exactamente cuánto margen de crecimiento queda."},"ans_rapid_growth":{"type":"answer","title":"Estirón repentino — Puede ser señal de pubertad precoz","recommend":true,"content":"Una aceleración repentina de la talla puede ser una señal temprana de pubertad precoz.\n\n⚠️ La paradoja de la pubertad precoz:\n• A corto plazo: el niño puede ser 5–8 cm más alto que sus compañeros\n• El percentil de talla puede subir bruscamente (ej.: del 50 al 75)\n• A largo plazo: el cierre prematuro de las placas puede resultar en una talla final 5–15 cm por debajo del potencial\n\n📊 Crecimiento normal vs pubertad precoz incipiente:\n• Normal (prepuberal): 5–7 cm/año\n• Pubertad precoz incipiente: 8–10+ cm/año (estirón desencadenado antes de tiempo)\n\n🔍 Comprobar simultáneamente:\n• Desarrollo mamario (niñas) / aumento testicular (niños)\n• Vello púbico, olor corporal, acné\n• Evolución reciente del percentil de talla\n\n🔬 Evaluación recomendada:\n• Radiografía de edad ósea\n• Test de estimulación con GnRH\n• Hormonas sexuales en sangre","tip":"No celebrar el estirón sin comprobar antes si las placas de crecimiento están avanzando demasiado rápido."},"gnrh_treatment":{"type":"answer","title":"Tratamiento con análogos de GnRH — Guía detallada","content":"Los análogos de GnRH (agonistas) son el tratamiento estándar para la pubertad precoz central verdadera.\n\n🔬 Mecanismo de acción:\nOcupación continua de los receptores de GnRH hipofisarios → desensibilización\n→ Producción de LH y FSH ↓ → hormonas sexuales suprimidas → progresión puberal se detiene\n\n💊 Medicamentos disponibles:\n• Leuprolide: Luprin, Lupeer, Eligard\n• Triptorelina: Diphereline, Decapeptyl\n• Disponibles en formulaciones de 1, 3 o 6 meses\n\n💉 Vía de administración:\n• IM (glúteo): Diphereline, Decapeptyl\n• SC (abdomen): algunas formulaciones de leuprolide\n• La biodisponibilidad IM es ~1,5–2× mayor que la SC\n\n⏱️ Intervalos de inyección — NO retrasar:\n• 1 mes: cada 25–29 días\n• 3 meses: cada 77–87 días\n• 6 meses: cada 154–175 días\n\n💰 Costes:\nCon seguro:\n• 1 mes: ~40.000–50.000 wones por inyección\n• 3 meses: ~120.000–150.000 wones por inyección\nSin seguro:\n• 1 mes: ~110.000 wones\n• 3 meses: ~330.000 wones\n\n✅ Criterios de cobertura (reforzados en enero de 2025):\n• Documentación de caracteres sexuales secundarios antes de los 8 años (niñas)/9 (niños)\n• Test GnRH con pico de LH ≥ 5 UI/L\n• Edad ósea adelantada\n• Cobertura: hasta la víspera del 12.º cumpleaños (niñas) / 13.º (niños)\n\n🕒 Duración y finalización:\n• Tratamiento típico: 2–4 años\n• Parar: niñas edad ósea 12–12,5 / niños edad ósea 13–13,5\n• Primera regla: ~1 año después de parar el tratamiento","tip":"Nunca retrasar las inyecciones — puede producirse un rebote de las hormonas sexuales (fenómeno de escape)."},"gnrh_gh_combo":{"type":"answer","title":"Tratamiento combinado GnRH + GH — ¿Cuándo considerarlo?","content":"Algunos niños en tratamiento con análogos de GnRH también reciben hormona de crecimiento para mejorar aún más la talla final.\n\n🎯 Candidatos para la terapia combinada:\nAl menos uno de los siguientes:\n① Talla final predicha por edad ósea < percentil 3\n② Velocidad de crecimiento < 4 cm/año con GnRH solo (déficit relativo de GH)\n③ Talla predicha claramente por debajo de la talla diana genética\n\n📊 Eficacia esperada:\n• GnRH solo: prevenir la pérdida de talla (estabilizar la talla predicha)\n• Terapia combinada: ~4–6 cm adicionales\n• Ejemplo: diana 155 cm → GnRH solo 154–157 cm → combinado 160–162 cm\n\nMecanismo:\n• GnRH: frena el avance de la edad ósea (gana tiempo)\n• GH: activa adicionalmente la vía IGF-1 (independiente de las hormonas sexuales)\n• Efecto sinérgico\n\n💰 Coste del tratamiento combinado (pago propio):\n• GnRH: ~110.000 wones/mes\n• GH añadida: ~800.000–1.300.000 wones/mes\n• Total combinado: ~910.000–1.410.000 wones/mes\n• Coste anual: ~10–16 millones de wones\n• Total 2–3 años: ~20–50 millones de wones\n\n✅ Enfoque recomendado:\nEvaluar la respuesta de crecimiento tras 6–12 meses de GnRH solo → añadir GH si crecimiento < 4 cm/año","tip":"El coste es considerable, pero la ganancia potencial en talla también lo es. Hablarlo en profundidad con el especialista y decidirlo en familia."},"obesity_diagnosis":{"type":"answer","title":"Criterios de obesidad infantil — Distintos de los del adulto","content":"En niños no se aplican los mismos criterios que en adultos (IMC > 25). Se usa una clasificación por percentiles según la edad y el sexo.\n\n📊 Clasificación del IMC pediátrico:\n• < Percentil 5 → Bajo peso\n• Percentil 5–84 → Normopeso\n• Percentil 85–94 → Sobrepeso\n• Percentil ≥ 95 → Obesidad\n• ≥ 120% del Percentil 95 → Obesidad grave\n\n🧮 Cálculo del IMC:\nPeso (kg) ÷ Talla (m)² = IMC\nEjemplo: talla 140 cm (1,4 m), peso 45 kg → IMC = 45 ÷ 1,96 ≈ 23\n\n⚖️ Porcentaje de grasa corporal (el más preciso):\n• Niños ≥ 25% → obesidad\n• Niñas ≥ 30% → obesidad\n• Se mide con la báscula de bioimpedancia (InBody); indoloro\n\n⚠️ Consultar de inmediato si:\n• IMC ≥ percentil 95\n• Obesidad Y talla baja (hay que descartar enfermedad endocrina)\n  — La obesidad simple habitualmente hace que los niños sean más altos, no más bajos","tip":"Si el niño tiene sobrepeso Y está por debajo de la talla esperada, puede que no sea obesidad simple. Conviene evaluarlo."},"obesity_height":{"type":"answer","title":"Cómo afecta la obesidad al crecimiento — Alto al principio, perjudicado al final","content":"El crecimiento de los niños obesos está en «modo acelerado» — rápido al comienzo, pero con final temprano.\n\n📊 El patrón bifásico:\n\n✅ Fase inicial (los padres se alegran):\n• 5–8 cm más alto que los compañeros, percentil de talla 75–95\n• Edad ósea 0,5–1,5 años por delante\n• Causa: grasa → leptina↑ → IGF-1↑, insulina↑ → estimulación de las placas de crecimiento\n\n⚠️ Fase tardía (el problema real):\n• La pubertad se desencadena antes\n• Las placas se cierran pronto → el crecimiento se para antes de lo esperado\n• Mientras los compañeros siguen creciendo, este niño ya se ha parado\n\n📊 Evidencia científica:\n• Solo obesidad: niñas ~2,3 cm menos, niños ~3,1 cm menos en talla final (estudio sueco de gran escala)\n• Obesidad + pubertad precoz rápida: hasta 5–8 cm por debajo de la talla diana\n\n💡 Nota: la obesidad sin pubertad precoz tiene un impacto moderado en la talla final.\n\n🎯 El problema clave:\nObesidad → desencadena pubertad precoz → pérdida de talla final. Esa cadena es lo que hay que romper.\n\n✅ Solución:\nControlar el peso ES controlar la talla.\n• Una reducción del 5–10% del peso → leptina↓ → normalización de la velocidad de avance de la edad ósea","tip":"Ser el más alto de la clase en primaria puede ser engañoso — ese mismo niño puede ser el más bajo en secundaria."},"obesity_puberty":{"type":"answer","title":"Obesidad y pubertad precoz — Controlar el peso ES controlar la pubertad","content":"La obesidad es uno de los factores de riesgo más importantes para la pubertad precoz.\n\n🔬 El mecanismo:\nExceso de grasa → leptina↑ → activación del sistema Kisspeptina cerebral\n→ GnRH↑ → LH y FSH↑ → hormonas sexuales↑ → pubertad se adelanta\n\nLa leptina regula el apetito pero también actúa como señal de que el cuerpo está listo para la pubertad.\n\n📊 Evidencia científica:\n• Niñas con obesidad durante 1 año o más: riesgo significativamente mayor de pubertad precoz\n• Las niñas obesas desarrollan pubertad precoz a una tasa 2–3 veces mayor que las de peso normal\n\n✅ Beneficios del control del peso:\n• Reducción de la leptina → menor riesgo de pubertad adelantada\n• Mejora de la resistencia a la insulina → normalización de las hormonas sexuales\n• La velocidad de avance de la edad ósea se normaliza\n\n⚠️ Perder peso de forma brusca durante la etapa de crecimiento es peligroso:\nEl objetivo es «seguir creciendo en talla mientras se estabiliza el peso»\nLas dietas agresivas interfieren con el crecimiento","tip":"Si hay preocupación por la pubertad precoz, el control del peso es la mejor prevención. Establecer hábitos alimentarios saludables antes de la edad escolar es fundamental."},"ans_acanthosis":{"type":"answer","title":"Acantosis nigricans — La señal cutánea de la resistencia a la insulina","recommend":true,"content":"Un oscurecimiento y engrosamiento de la piel en la nuca, las axilas o las ingles se llama «acantosis nigricans».\n\n🔍 Características:\n• Parece suciedad que no se quita con el lavado\n• Textura aterciopelada, suave y gruesa\n• Zonas más frecuentes: nuca, axilas, ingles\n\n🧬 ¿Por qué ocurre?\nNiveles elevados de insulina en sangre (hiperinsulinemia)\n→ Sobreestimulación de las células de la piel (queratinocitos) → depósito de melanina\n→ Piel oscura y engrosada\n\nInsulina alta = señal de resistencia a la insulina\nResistencia a la insulina = etapa previa a la prediabetes y al síndrome metabólico\n\n📊 Estadísticas:\n• Más del 70% de los adolescentes obesos con acantosis nigricans tiene hiperinsulinemia\n• Más del 60% tiene resistencia a la insulina confirmada\n\n✅ Estudios necesarios:\n• Insulina en ayunas (≥ 15 µU/mL = hiperinsulinemia)\n• HOMA-IR (índice de resistencia a la insulina)\n• Glucemia en ayunas, HbA1c\n• Perfil lipídico (colesterol, triglicéridos)\n\n💡 Tratamiento:\n• Tratar la resistencia a la insulina subyacente, no la piel en sí\n• Pérdida del 5–10% del peso + ejercicio + mejora dietética\n• La piel mejora gradualmente a medida que se resuelve la resistencia a la insulina en 4–6 meses","tip":"La acantosis nigricans es la señal de alarma cutánea de que el metabolismo se dirige hacia la diabetes. Si aparece, consultar a endocrinología pediátrica para evaluar la resistencia a la insulina."},"ans_obesity_diet":{"type":"answer","title":"Alimentación para niños en etapa de crecimiento con sobrepeso","content":"⚠️ La regla más importante: ¡NUNCA dejar pasar hambre al niño!\nEl objetivo es «optimizar la composición de lo que come», no «comer menos».\n\n📋 5 principios fundamentales de la alimentación:\n\n1️⃣ Una fuente de proteínas en cada comida\nDesayuno: uno de — huevo, leche, yogur, queso, tostada con mantequilla de cacahuete\nAlmuerzo: uno de — carne, pescado, huevo, tofu\nCena: pescado o tofu (carne 2–3 veces por semana)\n\n2️⃣ 2–3 raciones de lácteos al día (para el calcio)\n\n3️⃣ La mitad del plato: verduras\nVariedad de colores (cada color = diferentes nutrientes)\n\n4️⃣ Arroz blanco → arroz integral, pan blanco → pan integral\nReducir los hidratos refinados amortigua los picos de glucemia\n\n5️⃣ Solo agua como bebida (nada de zumos ni refrescos)\nIncluso el zumo 100% natural tiene mucho azúcar\n\n🚫 Absolutos a evitar:\n• Dejar al niño con hambre (frena el crecimiento, provoca pérdida muscular)\n• Usar la comida como premio o castigo\n• Que solo el niño haga dieta mientras el resto de la familia come normal\n• Comer tarde por la noche (especialmente después de las 21:00 → suprime la GH nocturna)","tip":"Apagar las pantallas durante las comidas. Comer viendo la tele o el móvil impide al cerebro percibir la saciedad, lo que lleva a comer más sin darse cuenta."},"ans_obesity_exercise":{"type":"answer","title":"Ejercicio adecuado para niños en etapa de crecimiento con sobrepeso","content":"📌 Meta: 60+ minutos de actividad física de intensidad moderada al día (recomendación OMS)\nIntensidad moderada = se nota la respiración pero se puede hablar\n\n✅ Actividades recomendadas:\n• Caminar a paso rápido: paseo familiar de 30 minutos después de cenar\n• Natación: ejercicio de cuerpo completo sin impacto articular\n• Ciclismo, fútbol, baloncesto, bádminton\n• Saltar a la comba: estimula las placas de crecimiento y mejora el sistema cardiovascular\n\n💪 Desmontando el mito de la musculación:\n«¿El entrenamiento de fuerza inhibe el crecimiento en los niños?» → ❌ Falso.\nGuías AAP 2020 y 2024: lo recomiendan activamente\n• Los programas bien diseñados no dañan las placas de crecimiento\n• Incluso mejoran la densidad ósea\n• En niños obesos, puede ser más eficaz que el ejercicio aeróbico solo\n\n✅ Ejercicios de fuerza recomendados (con el propio peso corporal):\n• Sentadillas, flexiones, plancha, zancadas\n\n📅 Claves para mantener la constancia:\n1. Dejar al niño elegir la actividad que le gusta — el ejercicio forzado no dura\n2. Hacerlo en familia (con padres activos, los niños son 5 veces más activos)\n3. Incorporar movimiento al día a día: escaleras en vez de ascensor, caminar distancias cortas","tip":"«Hacer ejercicio 30 minutos» puede sonar pesado, pero «ponerse la ropa deportiva» es fácil. Divide cualquier hábito nuevo en la acción mínima que se puede hacer en 2 minutos."},"ans_obesity_lifestyle":{"type":"answer","title":"Cambios de estilo de vida — La magia del 1% diario","content":"🌟 La magia de mejorar un 1% cada día:\nHoy un tramo más de escaleras, mañana un vaso más de agua — en 6 meses el niño habrá cambiado por completo.\n(Mejorar un 1% cada día = 37 veces mejor en un año)\n\n📱 Reducir el tiempo de pantalla:\n• A partir de 6 años: máximo 2 horas/día para uso recreativo (guías AAP)\n• Más de 5 horas de pantalla al día: 5 veces más riesgo de obesidad\n• Pantallas prohibidas durante las comidas (interfieren con la señal de saciedad)\n\n😴 Dormir lo suficiente:\n• Escolares (6–12 años): 9–12 horas por noche\n• Adolescentes (13–18 años): 8–10 horas\n• Dormir poco → aumenta el riesgo de obesidad un 58%\n• Falta de sueño → grelina (hambre) ↑, leptina (saciedad) ↓\n\n🏠 El entorno importa más que la fuerza de voluntad:\n• Llenar la nevera de frutas y verduras\n• Simplemente no comprar snacks («no hay, así que no como» es más fácil que «resisto»)\n• Agua en la mesa, refrescos al fondo de la nevera\n• El mando a distancia en un cajón, la comba en el salón\n\n👨‍👩‍👧 Implicación de toda la familia:\n• ≥3 comidas familiares a la semana → reduce el riesgo de obesidad un 12%\n• Padres que comen verduras con gusto → hijos con 3 veces más probabilidad de comerlas","tip":"El tratamiento más eficaz de la obesidad infantil es el cambio de estilo de vida de toda la familia. No hagáis al niño luchar solo."},"ans_obesity_medicine":{"type":"answer","title":"Medicamentos para la obesidad infantil — Una herramienta complementaria","content":"Los medicamentos nunca son la primera opción. Se consideran como apoyo a los cambios de estilo de vida bajo condiciones específicas.\n\n📌 Criterios para el tratamiento farmacológico (todos deben cumplirse):\n• 12 años o más\n• IMC ≥ percentil 95\n• Comorbilidades presentes (prediabetes, hipertensión, dislipemia, etc.)\n• 6 o más meses de cambios de estilo de vida con resultados insuficientes\n\n💊 Medicamentos disponibles:\n\n1. Metformina (el más utilizado)\n• Originalmente para diabetes; mejora la sensibilidad a la insulina y reduce ligeramente el apetito\n• Pérdida de peso: media de 2–3 kg (moderada)\n• Efectos secundarios: molestias gastrointestinales iniciales — generalmente mejoran en 1–2 semanas\n• Ventajas: amplio historial de seguridad, muy barato\n\n2. Agonistas del receptor de GLP-1 (los más potentes, pero caros)\n• Ejemplos: Saxenda (liraglutida), Wegovy (semaglutida)\n• Pérdida de peso: 10–15% del peso corporal (potente)\n• Aprobados para obesidad en mayores de 12 años (ensayo STEP TEENS)\n• Efectos secundarios: náuseas/vómitos al inicio, mejoran con titulación lenta de la dosis\n• Inconveniente: sin cobertura del seguro, ~300.000–500.000 wones/mes\n• Riesgo de recuperar el peso tras suspender\n\n⚠️ Los medicamentos solo funcionan si se combinan con los cambios de estilo de vida.","tip":"Los medicamentos son herramientas, no soluciones mágicas. La dieta y el ejercicio son imprescindibles también durante el tratamiento farmacológico."},"metabolism_prediabetes":{"type":"answer","title":"Prediabetes — Ahora es el momento de oro para revertirla","recommend":true,"content":"La prediabetes significa que la glucosa en sangre está por encima de lo normal, pero sin llegar al umbral de la diabetes.\n\n📊 Criterios diagnósticos:\n• Prediabetes: glucemia en ayunas 100–125 mg/dL o HbA1c 5,7–6,4%\n• Diabetes: glucemia en ayunas ≥ 126 mg/dL o HbA1c ≥ 6,5%\n\n⚠️ Por qué la diabetes tipo 2 en niños es más peligrosa que en adultos:\n• Inicio antes de los 30 años: 5× más riesgo de infarto, 3× más de ictus, 3× más de muerte\n• Cuanto antes comienza, más años de daño vascular acumulado\n• Progresa más rápido que en adultos, y las complicaciones llegan antes\n\n✅ Buenas noticias — ahora es el momento:\n• Estudio DPP (2002): cambios de estilo de vida → 58% de reducción en la aparición de diabetes\n• Metformina sola: solo 31% (la mitad de eficaz que los cambios de estilo de vida)\n• 4–6 meses de cambios de hábitos pueden revertir la situación completamente\n\n🔬 Estudios recomendados (≥10 años, sobrepeso + factores de riesgo):\n• Glucemia en ayunas\n• HbA1c\n• Insulina en ayunas + HOMA-IR\n• TTOG (si se indica)\n\n💊 Prioridades de tratamiento:\n1.ª prioridad: cambios de estilo de vida (dieta + ejercicio)\n→ Una pérdida del 5–7% del peso reduce significativamente la progresión a diabetes\n2.ª prioridad: metformina (si los cambios de estilo de vida solos son insuficientes en 6 meses)","tip":"Los cambios de estilo de vida duplican la eficacia de la metformina para revertir la prediabetes. Este es el último mejor momento para cambiar el rumbo."},"metabolism_lipid":{"type":"answer","title":"Dislipemia — La aterosclerosis puede empezar en la adolescencia","content":"El colesterol alto es muy frecuente en niños obesos (40–50% tienen dislipemia).\n\n📊 Criterios diagnósticos:\n• Colesterol total ≥ 200 mg/dL\n• LDL (colesterol «malo») ≥ 130 mg/dL\n• HDL (colesterol «bueno») < 40 mg/dL (niños) / < 50 mg/dL (niñas)\n• Triglicéridos ≥ 130 mg/dL\n\n⚠️ Por qué es grave:\nEstudios de autopsia han encontrado estrías grasas (aterosclerosis incipiente) en los vasos sanguíneos de adolescentes. Si no se trata → formación de placas → arterias estrechas → riesgo de infarto o ictus incluso en personas jóvenes.\n\n✅ Impacto de una pérdida del 10% del peso:\n• Presión sistólica baja 10–15 mmHg\n• LDL baja ~10–15%\n• HDL sube ~8–10%\n• Triglicéridos bajan ~30% (responden más rápido)\n\n💊 Medicamentos (si los cambios de estilo de vida son insuficientes en 6–12 meses):\n• Estatinas (aprobadas a partir de los 10 años)\n• Reducen el LDL un 30–50%\n• Seguridad confirmada a largo plazo: no afectan al crecimiento, la pubertad ni las hormonas\n\n📌 Cómo bajar los triglicéridos rápidamente:\n• Cambiar los refrescos por agua (efecto en 2 semanas)\n• Reducir los hidratos refinados\n• Aumentar los omega-3 (pescado azul 2–3 veces por semana)","tip":"El colesterol alto no da síntomas — muchas veces pasa desapercibido. Si tu hijo tiene sobrepeso, pide un análisis de sangre con perfil lipídico."},"metabolism_fatty_liver":{"type":"answer","title":"Hígado graso — Una enfermedad silenciosa pero grave","content":"Aproximadamente el 40% de los niños obesos tiene hígado graso. ¡La mayoría no tiene ningún síntoma!\n\n🔍 ¿Qué es el hígado graso?\nAcumulación de grasa en más del 5% del peso del hígado. El hígado aparece «brillante» en la ecografía (bright liver).\n\n⚠️ Causas:\n• Grasa visceral: los ácidos grasos liberados por la grasa abdominal profunda llegan directamente al hígado\n• Resistencia a la insulina: la degradación de grasa en el hígado se altera, favoreciendo su acumulación\n• Fructosa líquida: la fructosa de los refrescos y zumos solo se puede metabolizar en el hígado\n\n📊 Fases de progresión:\nEsteatosis simple → NASH (inflamación) → fibrosis → cirrosis\n(Las tres primeras fases son reversibles)\n\n✅ Tratamiento:\nNo hay medicamentos aprobados para el hígado graso pediátrico → los cambios de estilo de vida son el único tratamiento\n\n• Pérdida del 3–5% del peso: la grasa empieza a reducirse, la ALT mejora\n• Pérdida del 7–10%: la inflamación y la fibrosis también mejoran\n• Atención: la pérdida de peso brusca puede empeorar el hígado graso (bajar 0,5–1 kg/semana)\n• Sustituir refrescos/zumos por agua: el efecto más rápido\n• La dieta baja en hidratos es la más eficaz\n• El ejercicio por sí solo reduce la grasa hepática, incluso sin pérdida de peso","tip":"Solo cambiar los refrescos por agua puede mejorar el hígado graso. La fructosa es el principal culpable."},"metabolism_spise":{"type":"answer","title":"HOMA-IR y SPISE — Cómo medir la resistencia a la insulina con precisión","content":"📊 HOMA-IR (evaluación de la resistencia a la insulina):\nFórmula: (glucemia en ayunas × insulina en ayunas) ÷ 405\n\n⚠️ Fundamental: los valores de corte pediátricos son distintos de los del adulto — NO usar el punto de corte de 2,5 del adulto\n• Niños prepuberales: sospecha ≥ 2,67\n• Niñas prepuberales: sospecha ≥ 2,22\n• Niños puberales: sospecha ≥ 5,22\n• Niñas puberales: sospecha ≥ 3,82\n\nInsulina en ayunas de referencia:\n• 5–15 µU/mL: normal\n• > 15: sospecha de hiperinsulinemia\n• > 20: hiperinsulinemia confirmada\n\n📊 Índice SPISE (indicador más moderno y cómodo):\n¡Sin insulina en ayunas para estimar la sensibilidad a la insulina!\nFórmula: 600 × HDL^0,185 / TG^0,2 × IMC^1,338\n\n✅ Ventajas del SPISE:\n• Se calcula a partir de la analítica rutinaria, sin extracción adicional\n• Más estable que la insulina (la insulina fluctúa cada 5–10 minutos)\n• Estudio 2025: 86% de precisión para predecir síndrome metabólico (supera al HOMA-IR)\n\n💡 Cómo mejorar el SPISE:\n• Bajar el IMC (mayor impacto: aparece como IMC^1,338)\n• Subir el HDL: ejercicio aeróbico 5×/semana, suplementos de omega-3\n• Bajar los triglicéridos: cambiar refrescos por agua, reducir hidratos refinados\n  (Los triglicéridos responden antes — en 2 semanas)","tip":"Calculando el SPISE cada 3–6 meses se puede ver en números el efecto real de los cambios de estilo de vida del niño."},"nutrition_vitamin_d":{"type":"answer","title":"Vitamina D · Calcio · Magnesio — Los tres pilares del crecimiento","content":"Estos tres nutrientes forman un «triángulo sinérgico»:\nVitamina D (la llave) → Calcio (la materia prima) → Magnesio (activa la vitamina D)\nLa deficiencia de cualquiera de ellos reduce drásticamente la eficacia de los otros.\n\n☀️ Vitamina D:\n• Aprox. el 70–80% de los niños y adolescentes coreanos tiene niveles insuficientes\n• Con déficit de vitamina D: absorción de calcio del 10–15%\n• Con vitamina D suficiente: absorción del 30–40% — ¡2–3 veces más!\n\n💡 Clave: por mucha leche que tome el niño, sin vitamina D el calcio no se absorbe bien.\n\nDosis recomendadas:\n• 0–12 meses: 400 UI\n• 1–18 años: 600 UI\n• Si hay deficiencia: 1.000–2.000 UI\n\n⚠️ Invierno en Corea (nov–feb): la luz solar no genera vitamina D suficiente (latitud > 33°, UVB insuficiente)\n→ Suplementación imprescindible en invierno\n\nNivel objetivo en sangre: 30–50 ng/mL\nElegir el suplemento: D3 (colecalciferol) > D2 (más eficaz)\n\n🥛 Calcio:\nIngestas diarias recomendadas por edad:\n• 1–3 años: 700 mg (~3 vasos de leche)\n• 4–8 años: 1.000 mg (~4–5 vasos)\n• 9–18 años: 1.300 mg (~6 vasos) ← Necesidades más altas: etapa del estirón\n\nMejores fuentes: leche (220 mg/200 mL), pescado pequeño entero (con espinas), tofu, queso\nLos refrescos, la comida salada y la cafeína «roban» calcio\n\n🥜 Magnesio:\n• Cofactor esencial para activar la vitamina D\n• Relación calcio:magnesio ideal de 2:1\n• Mejores fuentes: frutos secos (pipas de calabaza 30 g = 150 mg), verduras de hoja oscura, cereales integrales","tip":"Cada día: 2–3 vasos de leche + suplemento de vitamina D + verduras y frutos secos variados = la base de la nutrición para crecer."},"nutrition_protein":{"type":"answer","title":"Proteínas — La materia prima del crecimiento","content":"Sin proteínas suficientes, ningún tratamiento con hormona de crecimiento funcionará bien.\nLas proteínas son la materia prima de músculos, huesos, hormonas, enzimas y células inmunitarias — de todo.\n\n📊 Necesidades diarias (por kg de peso corporal):\n• 1–3 años: 1,0–1,2 g/kg\n• 4–13 años: 0,95 g/kg\n• 14–18 años: 0,85 g/kg\n\nEjemplos reales:\n• 20 kg, 6 años → ~19 g/día\n• 30 kg, 9 años → ~28,5 g/día\n• 50 kg, 15 años → ~42,5 g/día\n→ Con 100 g de pechuga de pollo (23 g) + 1 huevo (6 g) se cubre la necesidad diaria de un niño de 30 kg\n\n🥩 Contenido proteico de alimentos comunes:\n• Pechuga de pollo 100 g: 23 g\n• Atún en lata 100 g: 24 g (el más alto)\n• 1 huevo mediano: 6 g\n• Leche 200 mL: 6,4 g\n• Tofu 100 g: 8 g\n• Legumbres cocidas 100 g: 9 g\n\n✅ Menú diario de ejemplo (niño de 30 kg, objetivo 30 g):\n• Desayuno: 1 huevo (6 g) + leche 200 mL (6,4 g)\n• Almuerzo: 80 g de pechuga de pollo (18 g)\n• Cena: ¼ de bloque de tofu (8 g)\n→ Total: 38,4 g ✓\n\n⚠️ Exceso de proteínas (> 2,5 g/kg/día):\nSobrecarga renal, mayor excreción de calcio, riesgo de deshidratación","tip":"Simplemente incluyendo un alimento proteico en cada comida se cubre la ingesta diaria recomendada de forma natural."},"nutrition_zinc_iron":{"type":"answer","title":"Zinc y hierro — Nutrientes de apoyo fundamentales","content":"🔵 Zinc — «El mineral del crecimiento»\n\n¡La deficiencia de zinc reduce IGF-1 aunque la GH se secrete con normalidad!\n\nDescubrimiento histórico: Dr. Prasad, 1958\nEn Irán, un hombre de 21 años tenía el desarrollo de un niño de 10 → se confirmó déficit grave de zinc\n→ Tras la suplementación: creció 12,7–15,2 cm en solo 1 año.\n\nIngestas diarias recomendadas:\n• 1–3 años: 3 mg / 4–8 años: 5 mg / 9–13 años: 8 mg\n• 14–18 años: niños 11 mg, niñas 9 mg\n\nMejor fuente: ostras (100 g = 16–90 mg — ¡días de ingesta recomendada en una sola ración!)\nFuentes animales: ternera, pollo, huevos, lácteos\nFuentes vegetales: pipas de calabaza, legumbres, frutos secos (absorción menor por el fitato)\n\nDéficit de zinc → pérdida de apetito → más deficiencia → círculo vicioso. ¡Hay que vigilarlo!\n\n🔴 Hierro — El transportador de oxígeno\n\nLa deficiencia duplica el riesgo de retraso del crecimiento\nMecanismo: déficit de hierro → menos oxígeno → falta de energía → células se dividen más lento → IGF-1 baja\n\nIngestas diarias recomendadas:\n• 1–3 años: 7 mg / 4–8 años: 10 mg / 9–13 años: 8 mg\n• 14–18 años: niños 11 mg, niñas 15 mg (pérdidas menstruales)\n\nMejores fuentes:\n• Hierro hemo (animal, absorción 15–35%): hígado de ternera, hígado de pollo, carne de ternera, ostras\n• Hierro no hemo (vegetal, absorción 2–20%): alubias blancas, lentejas, tofu, espinacas\n\nClave: tomar vitamina C con el hierro multiplica su absorción por 2–3\n\nSigno de deficiencia: pica (deseo compulsivo de mascar hielo) — síntoma característico del déficit de hierro","tip":"Las ostras son la reina del zinc. Comerlas una vez al mes ya es una ayuda considerable."},"nutrition_picky":{"type":"answer","title":"El niño muy selectivo con la comida — La paciencia es el secreto","content":"🥦 El niño que no come verduras:\n• Camuflarlas: picarlas muy finas y mezclarlas con carne picada o arroz\n• Cambiar la forma: cortar las zanahorias con cortadores de galletas en estrellas o corazones\n• Ofrecerlas con salsas: salsa de yogur, mantequilla de cacahuete\n• Empezar por las de sabor dulce: tomates cherry, zanahoria, boniato, maíz\n\n🥩 El niño que no come carne:\n• A menudo el problema es la textura dura o el olor → cocinarla más tierna: albóndigas, hamburguesas caseras\n• No es obligatorio comer carne: pescado, huevo, tofu y legumbres cubren perfectamente las proteínas\n\n🥛 El niño que no bebe leche:\n• Probar temperatura o sabor: leche templada, con un toque de cacao\n• Mezclada con cereales o en un batido con plátano\n• Alternativas: yogur, queso, bebida de soja enriquecida en calcio, pescado pequeño\n\n✅ 7 reglas para superar los problemas de alimentación:\n1. Paciencia: un niño necesita probar un alimento nuevo entre 10 y 15 veces antes de aceptarlo — no rendirse hoy\n2. Nunca obligar: «¡Te lo tienes que comer todo!» puede crear aversiones duraderas\n3. Ser el modelo: comer con entusiasmo delante del niño\n4. Celebrar hasta el más pequeño logro: «¡Has probado una hojita de espinaca, genial!\"\n5. Cocinar juntos: lo que uno mismo hace, apetece más\n6. Dar opciones dentro de límites: «¿Prefieres brócoli o zanahoria?» (ambas son verduras)\n7. Que las comidas sean un momento agradable: si siempre hay tensión en la mesa, el niño acabará odiando comer","tip":"El rechazo de alimentos no es un problema de voluntad. El cerebro del niño simplemente necesita tiempo para aceptar sabores nuevos. Con 10–15 exposiciones, la mayoría los acaba aceptando."},"nutrition_practical":{"type":"answer","title":"Alimentación práctica para crecer — Solo hay que seguir estas reglas","content":"📋 5 principios básicos (sin complicarlo — con esto es suficiente):\n\n1️⃣ Una fuente de proteínas en cada comida\nDesayuno: huevo, leche, yogur, tostada con queso o con mantequilla de cacahuete — elige uno\nAlmuerzo: carne, pescado, huevo o tofu — elige uno\nCena: pescado o tofu (carne 3–4 veces por semana)\n\n2️⃣ 2–3 raciones de lácteos al día\nVaso de leche por la mañana + yogur a media tarde + vaso de leche antes de dormir\n→ 440–660 mg de calcio diarios garantizados\n\n3️⃣ 1–2 verduras de distintos colores en cada comida\nVerde (espinacas, brócoli) + naranja (zanahoria, pimiento) + blanco (rábano, col)\n\n4️⃣ Cereales integrales + fruta entera\nArroz blanco → arroz integral, pan blanco → pan integral\nFruta: 2–3 veces al día (pieza entera, no zumo)\n\n5️⃣ Equilibrio semanal, no diario\nSi hoy faltaron las verduras, mañana se compensan\n\n🌙 Rutina antes de dormir:\n• Antes de acostarse: un vaso de leche templada (calcio + triptófano favorece el sueño)\n• Evitar snacks azucarados antes de dormir: ¡prohibido! (insulina↑ → GH↓)\n\n🏆 La combinación ganadora para crecer:\nSueño suficiente + alimentación equilibrada + ejercicio regular\n→ Máxima secreción de GH + crecimiento óptimo de huesos y músculos","tip":"Una dieta de 80 puntos que se sigue todos los días supera a una dieta perfecta que se abandona a la semana. Empieza hoy con un solo cambio."},"booking":{"type":"booking"}},
"vi":{"start":{"type":"question","text":"Xin chào! Tôi là trợ lý tư vấn sức khỏe và tăng trưởng của Phòng khám Nhi khoa Samsung Jarada. Hôm nay bạn muốn biết điều gì?","options":[{"text":"Tôi lo lắng về chiều cao của con","next":"growth_main"},{"text":"Tôi muốn tìm hiểu về liệu pháp hormone tăng trưởng","next":"growth_hormone"},{"text":"Tôi lo lắng về dậy thì sớm","next":"puberty_main"},{"text":"Con tôi thừa cân hoặc béo phì","next":"obesity_main"},{"text":"Con có vấn đề về đường huyết hoặc gan nhiễm mỡ","next":"metabolism_main"},{"text":"Tôi muốn biết về dinh dưỡng cho sự tăng trưởng","next":"nutrition_main"}]},"growth_main":{"type":"question","text":"Con bạn bao nhiêu tuổi?","options":[{"text":"0–3 tuổi (trẻ sơ sinh/mẫu giáo)","next":"growth_0_3"},{"text":"4–8 tuổi (mầm non/tiểu học đầu)","next":"growth_4_8"},{"text":"9–13 tuổi (tiểu học cuối/THCS)","next":"growth_9_13"},{"text":"14 tuổi trở lên","next":"growth_14plus"},{"text":"Tốc độ tăng trưởng giảm đột ngột","next":"growth_slowdown"},{"text":"Muốn biết về xét nghiệm tuổi xương","next":"growth_boneage"}]},"growth_0_3":{"type":"question","text":"Tình trạng tăng trưởng của con 0–3 tuổi là gì?","options":[{"text":"Sinh ra nhỏ và không bắt kịp","next":"ans_sga"},{"text":"Sinh bình thường nhưng chậm lớn sau đó","next":"ans_growth_0_3_normal"},{"text":"Bố mẹ đều thấp","next":"ans_familial_short"},{"text":"Thấp bao nhiêu thì cần xét nghiệm?","next":"ans_growth_check_needed"}]},"growth_4_8":{"type":"question","text":"Tình trạng tăng trưởng của con 4–8 tuổi là gì?","options":[{"text":"Bố mẹ đều thấp","next":"ans_familial_short"},{"text":"Thuộc 3–5% thấp nhất trong lớp","next":"ans_growth_check_needed"},{"text":"Có vẻ tăng chưa đến 4cm/năm","next":"growth_slowdown"},{"text":"Cần làm những xét nghiệm gì?","next":"ans_growth_check_needed"}]},"growth_9_13":{"type":"question","text":"Tình trạng của con 9–13 tuổi như thế nào?","options":[{"text":"Chưa dậy thì và chiều cao thấp","next":"ans_9_13_no_puberty"},{"text":"Dậy thì sớm — lo lắng về chiều cao cuối cùng","next":"ans_9_13_early_puberty"},{"text":"Đã ở giai đoạn dậy thì giữa/muộn — còn cơ hội điều trị?","next":"ans_9_13_late_puberty"},{"text":"Tốc độ tăng trưởng đột ngột chậm lại","next":"growth_slowdown"}]},"growth_hormone":{"type":"question","text":"Bạn muốn biết điều gì về liệu pháp hormone tăng trưởng?","options":[{"text":"Con tôi có phải là đối tượng điều trị không?","next":"gh_eligible"},{"text":"Con có thể cao thêm bao nhiêu?","next":"gh_effect"},{"text":"Chi phí và bảo hiểm y tế như thế nào?","next":"gh_cost"},{"text":"Có tác dụng phụ không?","next":"gh_safety"},{"text":"Cách tiêm thuốc như thế nào?","next":"gh_injection"},{"text":"Bắt đầu và dừng điều trị khi nào?","next":"gh_timing"}]},"gh_eligible":{"type":"question","text":"Chẩn đoán hoặc tình trạng hiện tại của con là gì?","options":[{"text":"Được chẩn đoán thiếu hormone tăng trưởng","next":"ans_gh_deficiency"},{"text":"Hội chứng Turner (bé gái, bất thường nhiễm sắc thể)","next":"ans_gh_turner"},{"text":"Sinh nhỏ so với tuổi thai và vẫn chưa bắt kịp (SGA)","next":"ans_gh_sga"},{"text":"Tất cả xét nghiệm bình thường — chỉ thấp người","next":"ans_gh_iss"},{"text":"Prader-Willi / Noonan / Bệnh thận mạn","next":"ans_gh_other"},{"text":"Chưa làm xét nghiệm","next":"ans_gh_no_test"}]},"puberty_main":{"type":"question","text":"Bạn lo lắng điều gì về dậy thì sớm?","options":[{"text":"Con gái có vẻ bắt đầu phát triển ngực","next":"puberty_girl"},{"text":"Tinh hoàn của con trai có vẻ to hơn","next":"puberty_boy"},{"text":"Chỉ có mùi cơ thể/lông mu/mụn trứng cá (không thay đổi ngực/tinh hoàn)","next":"ans_false_puberty"},{"text":"Chiều cao tăng đột ngột rất nhanh","next":"ans_rapid_growth"},{"text":"Muốn biết về điều trị GnRH cho dậy thì sớm","next":"gnrh_treatment"},{"text":"Muốn biết về liệu pháp phối hợp GnRH + hormone tăng trưởng","next":"gnrh_gh_combo"}]},"puberty_girl":{"type":"question","text":"Con gái bạn bao nhiêu tuổi?","options":[{"text":"Chưa đủ 8 tuổi (ngưỡng dậy thì sớm)","next":"puberty_girl_under8"},{"text":"Từ 8 đến 10 tuổi","next":"puberty_girl_8_10"},{"text":"Trên 10 tuổi — ngực mới bắt đầu phát triển","next":"puberty_girl_normal"},{"text":"Không biết là mô tuyến vú hay mỡ","next":"puberty_girl_unsure"}]},"puberty_girl_8_10":{"type":"question","text":"Phát triển ngực ở 8–10 tuổi — tình trạng như thế nào?","options":[{"text":"Mới phát hiện gần đây","next":"pubbury_girl_new"},{"text":"Đã lớn rõ trong 3–6 tháng qua","next":"puberty_girl_progress"},{"text":"Đã có hơn 6 tháng nhưng ít thay đổi","next":"puberty_girl_stable"},{"text":"Không biết là mô tuyến hay mỡ","next":"puberty_girl_unsure"}]},"puberty_boy":{"type":"question","text":"Con trai bạn có những thay đổi gì?","options":[{"text":"Tinh hoàn có vẻ to hơn (dưới 9 tuổi)","next":"ans_boy_precocious"},{"text":"Vỡ giọng, chiều cao tăng nhanh","next":"ans_boy_signs"},{"text":"Chỉ có lông mu/mùi cơ thể — tinh hoàn không thay đổi","next":"ans_boy_false_puberty"},{"text":"Dậy thì có vẻ rất muộn (14 tuổi trở lên)","next":"ans_boy_delayed"}]},"obesity_main":{"type":"question","text":"Điều gì về cân nặng hoặc béo phì của con làm bạn lo lắng?","options":[{"text":"Tiêu chí béo phì ở trẻ em là gì?","next":"obesity_diagnosis"},{"text":"Béo phì có ảnh hưởng đến chiều cao không?","next":"obesity_height"},{"text":"Béo phì có thể gây dậy thì sớm không?","next":"obesity_puberty"},{"text":"Vùng cổ sau hoặc nách bị thâm đen","next":"ans_acanthosis"},{"text":"Làm thế nào để kiểm soát béo phì ở trẻ?","next":"obesity_management"}]},"obesity_management":{"type":"question","text":"Bạn muốn biết điều gì về kiểm soát béo phì?","options":[{"text":"Chế độ ăn uống","next":"ans_obesity_diet"},{"text":"Khuyến nghị tập thể dục","next":"ans_obesity_exercise"},{"text":"Thay đổi lối sống tổng thể","next":"ans_obesity_lifestyle"},{"text":"Khi nào dùng thuốc là phù hợp?","next":"ans_obesity_medicine"}]},"metabolism_main":{"type":"question","text":"Bạn lo lắng về vấn đề chuyển hóa nào?","options":[{"text":"Đường huyết cao (tiền tiểu đường)","next":"metabolism_prediabetes"},{"text":"Cholesterol hoặc triglyceride cao","next":"metabolism_lipid"},{"text":"Phát hiện gan nhiễm mỡ","next":"metabolism_fatty_liver"},{"text":"Muốn hiểu HOMA-IR và SPISE","next":"metabolism_spise"}]},"nutrition_main":{"type":"question","text":"Bạn muốn biết điều gì về dinh dưỡng cho sự tăng trưởng?","options":[{"text":"Vitamin D, canxi và magiê","next":"nutrition_vitamin_d"},{"text":"Protein ảnh hưởng đến tăng trưởng như thế nào?","next":"nutrition_protein"},{"text":"Kẽm và sắt có quan trọng không?","next":"nutrition_zinc_iron"},{"text":"Con tôi ăn rất kén chọn","next":"nutrition_picky"},{"text":"Chế độ ăn tăng chiều cao thực tế","next":"nutrition_practical"}]},"ans_sga":{"type":"answer","title":"Nhỏ hơn so với tuổi thai (SGA) — Phát hiện sớm là điều quan trọng","recommend":true,"content":"Trẻ sinh ra với cân nặng hoặc chiều cao dưới bách phân vị thứ 3 so với tuổi thai được gọi là «Nhỏ hơn so với tuổi thai (SGA)».\n\n✅ Tin vui: 85–90% trẻ SGA sẽ bắt kịp tăng trưởng bình thường trong vòng 2 năm đầu sau sinh.\n\n⚠️ Khi nào cần chú ý:\n• Chiều cao vẫn dưới bách phân vị 3 lúc 4 tuổi (khoảng 10–15%)\n• Những trẻ này có thể điều trị hormone tăng trưởng được bảo hiểm y tế từ 4 tuổi\n\n📊 Hiệu quả điều trị: tăng trung bình 5–7 cm\n• Bắt đầu càng sớm, hiệu quả càng tốt\n• Bắt đầu sau tuổi dậy thì, hiệu quả giảm nhiều\n\n📌 Cần theo dõi:\n• Đo chiều cao mỗi 3 tháng để theo dõi tốc độ tăng trưởng\n• Chờ đợi bắt kịp tự nhiên đến 4 tuổi; nếu không bắt kịp thì bắt đầu điều trị","tip":"Nếu không bắt kịp trước 4 tuổi, hãy đến khám nội tiết nhi ngay khi trẻ tròn 4 tuổi — đó là lựa chọn tốt nhất."},"ans_growth_0_3_normal":{"type":"answer","title":"Sinh bình thường nhưng chậm lớn — Trước tiên cần tìm nguyên nhân","recommend":true,"content":"Khi trẻ sinh ra bình thường nhưng sau đó tăng trưởng bị tụt lại, các nguyên nhân chính bao gồm:\n\n1️⃣ Suy giáp\n• Nguyên nhân nội tiết phổ biến nhất\n• Triệu chứng: giảm hoạt động, da khô, táo bón, mệt mỏi\n• Xét nghiệm máu đơn giản có thể xác nhận; điều trị giúp tăng trưởng trở lại bình thường\n\n2️⃣ Thiếu hormone tăng trưởng\n• Ở trẻ nhũ nhi có thể biểu hiện là hạ đường huyết hoặc vàng da kéo dài\n• Khuôn mặt tròn, trông bụ bẫm\n• Xét nghiệm IGF-1 trong máu để sàng lọc\n\n3️⃣ Dinh dưỡng không đủ\n• Thiếu sữa mẹ, ăn uống quá chọn lọc...\n• Nếu cân nặng cũng thấp thì khả năng do dinh dưỡng cao\n\n4️⃣ Bệnh mãn tính\n• Tim bẩm sinh, bệnh thận, bệnh tiêu hóa...\n• Nghi ngờ khi hay bị cảm, khó bú, nôn ói\n\n📌 Xét nghiệm được đề nghị: chức năng tuyến giáp, IGF-1, công thức máu toàn bộ, X-quang tuổi xương","tip":"0–3 tuổi là giai đoạn tăng trưởng nhanh nhất. Nếu phát hiện vấn đề lúc này, trẻ hoàn toàn có thể bắt kịp được."},"ans_familial_short":{"type":"answer","title":"Thấp lùn gia đình — Đánh giá chính xác quan trọng hơn điều trị","content":"Khi cả bố và mẹ đều thấp, con cái thường cũng thấp. Đây gọi là «thấp lùn gia đình».\n\n📌 Đặc điểm:\n• Tốc độ tăng trưởng bình thường (5–6 cm/năm)\n• Tuổi xương phù hợp với tuổi thật\n• Theo dõi ổn định ở bách phân vị thấp\n• Ít nhất một trong hai bố mẹ thấp hơn trung bình\n\n🧮 Chiều cao mục tiêu di truyền (MPH):\n• Bé trai: (chiều cao bố + chiều cao mẹ + 13) ÷ 2 — sai số ±5–10 cm\n• Bé gái: (chiều cao bố + chiều cao mẹ – 13) ÷ 2 — sai số ±5–10 cm\n\nVí dụ: Bố 170 cm, Mẹ 158 cm\n→ Con trai ước tính: (170+158+13)/2 = 170,5 cm (thực tế 160–180 cm)\n→ Con gái ước tính: (170+158–13)/2 = 157,5 cm (thực tế 147–167 cm)\n\n⚠️ Dù là thấp lùn gia đình, vẫn cần khám khi:\n• Chiều cao hiện tại thấp hơn dự đoán ≥10 cm\n• Tốc độ tăng trưởng đột ngột giảm\n• Tăng dưới 4 cm/năm\n\n✅ Thấp lùn gia đình đơn thuần không cần điều trị — lối sống lành mạnh là đủ.","tip":"Để phân biệt nguyên nhân di truyền hay có nguyên nhân khác, nên làm X-quang tuổi xương và xét nghiệm IGF-1."},"ans_growth_check_needed":{"type":"answer","title":"Nên được đánh giá chuyên khoa","recommend":true,"content":"Khi bố mẹ chiều cao bình thường nhưng con thấp đáng kể, hoặc thấp hơn nhiều so với dự đoán, cần được đánh giá toàn diện.\n\n🔬 Xét nghiệm được đề nghị:\n\n1. X-quang tuổi xương ⭐ (quan trọng nhất)\n• X-quang bàn tay trái, khoảng 5 phút, hoàn toàn không đau\n• Đánh giá tiềm năng tăng trưởng + dự đoán chiều cao cuối cùng\n• Chính xác gấp đôi công thức chiều cao bố mẹ (sai số ±3–5 cm so với ±8–10 cm)\n\n2. Xét nghiệm IGF-1 trong máu\n• Sàng lọc chức năng hormone tăng trưởng\n• Lấy máu một lần (không cần nhịn ăn)\n\n3. Chức năng tuyến giáp (TSH, T4 tự do)\n• Suy giáp là nguyên nhân phổ biến của chậm tăng trưởng\n\n4. Công thức máu toàn bộ\n• Thiếu máu, viêm, chức năng gan thận\n\n5. Nghiệm pháp kích thích hormone tăng trưởng (khi cần)\n• Khi IGF-1 thấp hoặc tốc độ tăng trưởng bất thường\n• Khoảng 2–3 giờ, lấy máu 4–6 lần (đặt kim một lần)\n• Đỉnh < 10 ng/mL gợi ý thiếu hụt GH","tip":"Tìm được nguyên nhân càng sớm, hiệu quả điều trị càng cao. Trong khi sụn tăng trưởng còn mở, đừng chờ đợi quá 6 tháng — hãy đến gặp bác sĩ chuyên khoa."},"ans_9_13_no_puberty":{"type":"answer","title":"Giai đoạn trước dậy thì — Đây là thời điểm vàng để điều trị","recommend":true,"content":"Nếu dậy thì chưa bắt đầu, đây là thời điểm vàng để điều trị tăng trưởng!\n\n🌟 Tại sao trước dậy thì lại tốt hơn?\n• Sụn tăng trưởng vẫn còn mở rộng\n• Hiệu quả điều trị hormone tăng trưởng cao gấp khoảng 2 lần so với sau khi dậy thì\n• Điều trị 2 năm trở lên sẽ có hiệu quả đáng kể\n\n📊 Tuổi xương xác nhận tiềm năng tăng trưởng còn lại:\n• Bé gái tuổi xương < 11: nhiều cơ hội điều trị\n• Bé trai tuổi xương < 12: nhiều cơ hội điều trị\n\n✅ Đánh giá được đề nghị:\n1. X-quang tuổi xương\n2. Xét nghiệm IGF-1\n3. Nghiệm pháp kích thích GH (khi cần)\n\n💰 Nếu đáp ứng điều kiện bảo hiểm:\n• Đồng chi trả: khoảng 210.000–360.000 won/tháng (30% chi phí thuốc)\n• Hiệu quả tiềm năng: 5–13 cm tùy chẩn đoán","tip":"Khi dậy thì bắt đầu, sụn tăng trưởng sẽ đóng nhanh. Khám ngay bây giờ trong khi còn nhiều lựa chọn hơn."},"ans_9_13_early_puberty":{"type":"answer","title":"Dậy thì sớm + lo lắng về chiều cao — Cần đánh giá cả hai","recommend":true,"content":"Dậy thì đến sớm có nghĩa là «giai đoạn tăng trưởng vọt» đến sớm hơn — và sụn tăng trưởng cũng sẽ đóng sớm hơn.\n\n⚠️ Nghịch lý của dậy thì sớm:\n• Ngắn hạn: trẻ có thể cao hơn bạn bè 5–8 cm, trông có vẻ phát triển tốt\n• Dài hạn: sụn tăng trưởng đóng sớm → chiều cao cuối cùng có thể thấp hơn tiềm năng di truyền 5–15 cm\n\n📊 Bằng chứng nghiên cứu (theo dõi dài hạn tại châu Âu):\n• Dậy thì sớm không điều trị: bé gái thấp hơn chiều cao mục tiêu di truyền trung bình 10 cm\n• Bé trai thấp hơn trung bình 20 cm\n\n🔍 Xét nghiệm cần thiết ngay bây giờ:\n1. X-quang tuổi xương: còn bao nhiêu tiềm năng?\n2. Nghiệm pháp kích thích GnRH: có phải dậy thì sớm trung ương thực sự không?\n3. Đánh giá hormone tăng trưởng: kiểm tra đồng thời tình trạng GH\n\n💡 Các lựa chọn điều trị:\n• Điều trị GnRH (ức chế dậy thì)\n• Kết hợp với hormone tăng trưởng khi cần → tăng thêm 4–6 cm","tip":"Dậy thì sớm không nhất thiết đồng nghĩa với thấp — điều trị kịp thời có thể bảo vệ chiều cao cuối cùng. Đến khám nội tiết nhi ngay hôm nay."},"ans_9_13_late_puberty":{"type":"answer","title":"Giữa/cuối giai đoạn dậy thì — Đánh giá chính xác cơ hội còn lại","recommend":true,"content":"Ở giữa hoặc cuối giai đoạn dậy thì, X-quang tuổi xương là bước đầu tiên để biết còn bao nhiêu cơ hội.\n\n📊 Khả năng điều trị theo tuổi xương:\n• Bé gái tuổi xương < 11: hiệu quả điều trị tốt\n• Bé gái tuổi xương 11–12: hạn chế\n• Bé gái tuổi xương 12–13: rất hạn chế (bảo hiểm cũng sắp kết thúc)\n• Bé gái tuổi xương ≥ 14: điều trị không còn ý nghĩa\n\n• Bé trai tuổi xương < 12: hiệu quả tốt\n• Bé trai tuổi xương 12–14: hạn chế\n• Bé trai tuổi xương ≥ 16: bảo hiểm kết thúc\n\n⏱️ Thời gian là yếu tố quan trọng:\nSau kỳ kinh đầu tiên chỉ còn tăng trưởng khoảng 5–7 cm, với tốc độ 2–3 cm/năm.\n1–2 năm trước kỳ kinh đầu tiên là cơ hội cuối cùng để tăng trưởng có ý nghĩa.\n\n✅ Có thể làm ngay bây giờ:\n• Xác nhận tuổi xương + dự đoán chiều cao cuối cùng\n• Bắt đầu điều trị ngay nếu sụn vẫn còn mở","tip":"Đừng bỏ cuộc. Khi sụn tăng trưởng vẫn còn mở, dù chỉ vài tháng điều trị cũng có ý nghĩa."},"growth_14plus":{"type":"answer","title":"14 tuổi trở lên — Trước tiên kiểm tra tình trạng sụn tăng trưởng","recommend":true,"content":"Từ 14 tuổi, sụn tăng trưởng dần đóng lại — nhưng có thể vẫn chưa quá muộn.\n\n📊 Tình trạng sụn theo tuổi xương:\n• Bé gái tuổi xương 14–15: sụn gần đóng, ít cơ hội điều trị\n• Bé trai tuổi xương 15–17: gần đóng\n• Bảo hiểm chi trả đến trước ngày sinh nhật 12 tuổi (bé gái) và 13 tuổi (bé trai)\n\n🔍 Vẫn đáng kiểm tra:\n1. X-quang tuổi xương: tuổi xương thực tế có thể khác với tuổi đời\n2. Nếu dậy thì muộn, tuổi xương có thể thấp hơn tuổi đời\n3. Đặc biệt bé trai 14 tuổi đôi khi vẫn còn cơ hội điều trị\n\n💡 Một hy vọng:\n«Chậm phát triển thể chất» (dậy thì muộn theo thể chất)\n• Tuổi xương thấp hơn tuổi đời 2–4 năm\n• Một số trẻ vẫn tiếp tục cao đến năm cấp 3 hoặc đại học\n• Khả năng cao hơn nếu bố hoặc mẹ cũng từng dậy thì muộn","tip":"Trước khi từ bỏ, hãy làm X-quang tuổi xương. Tuổi xương thấp có thể có nghĩa là vẫn còn tiềm năng tăng trưởng đáng kể."},"growth_slowdown":{"type":"answer","title":"Tốc độ tăng trưởng đột ngột chậm lại — Dấu hiệu cảnh báo quan trọng","recommend":true,"content":"Tốc độ tăng trưởng đột ngột giảm là dấu hiệu cảnh báo quan trọng cần chú ý.\n\n📊 Tốc độ tăng trưởng bình thường theo tuổi:\n• 1–2 tuổi: 10–12 cm/năm\n• 3–4 tuổi: 8–10 cm/năm\n• 5–10 tuổi (trước dậy thì): 5–7 cm/năm ← Dưới 4 cm/năm cần kiểm tra\n• Giai đoạn tăng trưởng vọt dậy thì: 8–10 cm/năm\n\n⚠️ Đến khám khi có bất kỳ điều nào sau đây:\n• Trẻ trước dậy thì tăng dưới 4 cm/năm\n• Tốc độ tăng trưởng giảm rõ rệt so với trước\n• Bách phân vị chiều cao giảm qua 2 đường chính trong 6 tháng\n\n🔍 Nguyên nhân có thể:\n1. Thiếu hormone tăng trưởng — IGF-1 thấp, đỉnh < 10 ng/mL trong nghiệm pháp kích thích\n2. Suy giáp — TSH tăng cao\n3. Bệnh mãn tính nặng hơn — Crohn, bệnh thận...\n4. Căng thẳng/nguyên nhân tâm lý\n5. Dinh dưỡng kém\n6. Dậy thì sớm — tăng trưởng vọt sớm rồi dừng sớm","tip":"Đo và ghi lại chiều cao mỗi 3 tháng giúp theo dõi tốc độ tăng trưởng chính xác. Có hồ sơ theo dõi sẽ rất hữu ích khi đi khám."},"growth_boneage":{"type":"answer","title":"Xét nghiệm tuổi xương — Cách chính xác nhất để đánh giá tiềm năng tăng trưởng","content":"Xét nghiệm tuổi xương là kiểm tra quan trọng nhất để đánh giá tiềm năng tăng trưởng của trẻ.\n\n🔬 Cách thực hiện:\nX-quang bàn tay trái 1 tấm (khoảng 5 phút, hoàn toàn không đau, lượng phóng xạ rất thấp)\n27 xương nhỏ ở bàn tay và cổ tay cho phép đánh giá chính xác mức độ trưởng thành xương.\nLượng phóng xạ: khoảng 0,0001 mSv (thấp hơn nhiều so với chuyến bay nội địa)\n\n📊 So sánh độ chính xác dự đoán:\n• Công thức chiều cao bố mẹ: sai số ±8–10 cm\n• Dự đoán theo tuổi xương: sai số ±3–5 cm (trước dậy thì) / ±2–3 cm (cuối dậy thì)\n\n🎯 Tuổi xương cho biết:\n• Tình trạng sụn tăng trưởng hiện tại (còn mở bao nhiêu)\n• Dự đoán chiều cao cuối cùng không điều trị\n• Thời điểm bắt đầu/kết thúc điều trị\n• Tuổi xương hơn 2 năm so với tuổi đời: nguy cơ đóng sớm\n• Tuổi xương thấp hơn 2 năm: còn nhiều tiềm năng tăng trưởng\n\n⚠️ Cần biết:\n• Có thể có sai số 6–12 tháng giữa các bác sĩ đọc phim khác nhau\n• Đọc phim hỗ trợ AI đang cải thiện độ chính xác\n• Có ý nghĩa từ 5 tuổi trở lên\n\n🏥 Cũng dùng để quyết định khi nào kết thúc điều trị:\n• Điều trị dậy thì sớm: bé gái tuổi xương 12, bé trai 13\n• Điều trị hormone tăng trưởng: bé gái tuổi xương 14, bé trai 16","tip":"Tuổi xương là la bàn của sự tăng trưởng. Biết tuổi xương mới có thể đánh giá chính xác cơ hội tăng trưởng còn lại là bao nhiêu."},"ans_gh_deficiency":{"type":"answer","title":"Thiếu hormone tăng trưởng — Hiệu quả điều trị rõ ràng nhất","recommend":true,"content":"Thiếu hormone tăng trưởng có kết quả điều trị rõ ràng nhất và được bảo hiểm y tế chi trả.\n\n📊 Hiệu quả điều trị:\n• Năm điều trị đầu tiên: trung bình 8–10 cm (một số đạt hơn 12 cm)\n• Năm thứ 2 trở đi: 6–7 cm/năm (cao hơn 5–6 cm của bạn cùng lứa)\n• Cải thiện toàn bộ: 10–13 cm\n• Bắt đầu sớm có thể đạt hơn 20 cm\n\n⚠️ Nếu không điều trị?\nKết quả từ nghiên cứu theo dõi dài hạn tại châu Âu:\n• Bé gái: trung bình thấp hơn chiều cao mục tiêu di truyền 10 cm\n• Bé trai: trung bình thấp hơn 20 cm\n\n💉 Phương pháp điều trị:\n• Tiêm dưới da 0,025–0,035 mg/kg/ngày\n• Trẻ 30 kg → 0,75–1,05 mg/ngày\n• Tính lại liều mỗi 3–6 tháng khi cân nặng tăng\n\n💰 Bảo hiểm y tế:\n• Đồng chi trả: 210.000–360.000 won/tháng (30% chi phí thuốc)\n• Kết thúc bảo hiểm: tuổi xương 14 (bé gái) / 16 (bé trai), hoặc tăng < 2 cm/năm\n\n✅ Điều kiện được bảo hiểm (cần 2 loại nghiệm pháp khác nhau):\n• Cả hai lần đỉnh < 10 ng/mL\n• Chiều cao dưới bách phân vị 3\n• Tuổi xương thấp hơn tuổi đời","tip":"Bắt đầu sớm cho kết quả tốt hơn nhiều. Điều trị 2 năm trở lên trước dậy thì, hiệu quả tăng khoảng gấp đôi."},"ans_gh_turner":{"type":"answer","title":"Hội chứng Turner — Càng sớm càng tốt","recommend":true,"content":"Hội chứng Turner là tình trạng mất một nhiễm sắc thể X (45,X) và được bảo hiểm y tế chi trả.\n\n📊 Hiệu quả điều trị:\n• Tăng trung bình 7–8 cm\n• Không điều trị: chiều cao cuối cùng trung bình ~143 cm\n• Sau điều trị: ~150 cm — chênh lệch 7–8 cm rất có ý nghĩa trong cuộc sống hàng ngày\n\n💉 Điều trị:\n• GH đơn độc, hoặc kết hợp với estrogen\n• Estrogen: thường bắt đầu liều thấp vào khoảng 11–12 tuổi để kích thích dậy thì\n• Kết hợp estrogen cho kết quả chiều cao cuối cùng tốt hơn\n\n💰 Điều kiện bảo hiểm:\n• Chiều cao dưới bách phân vị 3\n• Phân tích nhiễm sắc thể (karyotype) xác nhận chẩn đoán\n• Không cần nghiệm pháp kích thích GH (hội chứng Turner tự nó đủ điều kiện)","tip":"Hội chứng Turner thường không có dậy thì tự nhiên. Lên kế hoạch thời điểm bắt đầu cả GH và estrogen là rất quan trọng."},"ans_gh_sga":{"type":"answer","title":"SGA — Được bảo hiểm từ 4 tuổi","recommend":true,"content":"Trẻ sinh nhỏ mà chưa bắt kịp được bảo hiểm y tế điều trị hormone tăng trưởng từ 4 tuổi.\n\n📊 Hiệu quả: tăng trung bình 5–7 cm\n• Bắt đầu trước 4 tuổi cho cơ hội bắt kịp chiều cao bình thường tốt nhất\n• Bắt đầu sau tuổi dậy thì hiệu quả hạn chế nhiều\n\n✅ Điều kiện bảo hiểm:\n• Cân nặng hoặc chiều cao lúc sinh dưới bách phân vị 3 (cần tài liệu)\n• Vẫn dưới bách phân vị 3 sau 4 tuổi\n• Chờ bắt kịp tự nhiên trước 4 tuổi\n\n⚠️ Quan trọng:\n• Hồ sơ sinh (ghi chép cân nặng/chiều cao lúc sinh) rất cần thiết — hãy lưu giữ\n• Từ tháng 1/2025: cần tài liệu sinh trước 4 tuổi để được duyệt bảo hiểm","tip":"Nếu không bắt kịp trước 4 tuổi, bắt đầu điều trị ngay — đừng trì hoãn thêm."},"ans_gh_iss":{"type":"answer","title":"Thấp vô căn (ISS) — Quyết định cần cân nhắc kỹ","content":"ISS được chẩn đoán khi tất cả xét nghiệm bình thường nhưng trẻ đơn giản là thấp, không rõ nguyên nhân.\n\n⚠️ Đánh giá trung thực về hiệu quả:\n• Tăng trung bình chỉ 3–5 cm (dao động lớn giữa các cá nhân: từ 0 đến 7 cm)\n• Không thể dự đoán trước phản ứng của từng trẻ\n• Rất khó vượt đáng kể chiều cao mục tiêu di truyền\n\n💰 Thực tế chi phí:\n• Không được bảo hiểm — 100% tự chi trả\n• 70.000–120.000 won/tháng (tùy theo cân nặng)\n• 2–3 năm điều trị tổng cộng: khoảng 20–40 triệu won\n\n📋 Trước khi quyết định, cân nhắc:\n1. Trẻ có thực sự đang đau khổ vì chiều cao không?\n2. Đánh giá lại sau năm đầu: tiếp tục nếu tăng ≥5 cm, xem xét dừng nếu < 3 cm\n3. Ý kiến của chính trẻ (cần tiêm hàng ngày)\n4. Tình trạng tài chính gia đình về lâu dài\n\n🌟 Hướng dẫn quốc tế:\nHội Nội tiết Nhi Hoa Kỳ khuyến nghị «quyết định chung»\n→ Gia đình chọn lựa sau khi xem xét đầy đủ bằng chứng, với bác sĩ hướng dẫn","tip":"Không cần vội vàng với ISS. Hãy tham khảo ý kiến đầy đủ, cân nhắc yếu tố tài chính và cảm xúc rồi quyết định cùng nhau."},"ans_gh_other":{"type":"answer","title":"Các bệnh lý khác được bảo hiểm","recommend":true,"content":"Hội chứng Prader-Willi, hội chứng Noonan và bệnh thận mãn tính cũng được bảo hiểm.\n\n🔵 Hội chứng Prader-Willi:\n• Do bất thường nhiễm sắc thể 15\n• Tăng trung bình 6–8 cm\n• Mục tiêu chính không chỉ là chiều cao mà còn tăng khối cơ và giảm mỡ\n• Xu hướng béo phì mạnh — kiểm soát cân nặng trong điều trị là bắt buộc\n• Khuyến nghị bắt đầu từ giai đoạn nhũ nhi\n• Điều kiện bảo hiểm: xác nhận bằng xét nghiệm gen\n\n🔵 Hội chứng Noonan:\n• Ngoại hình giống hội chứng Turner nhưng do đột biến gen\n• Tăng trung bình 4–6 cm (dao động lớn)\n• Đánh giá tim kỹ trước điều trị (thường kèm bệnh tim)\n• Điều kiện bảo hiểm: đột biến gen liên quan + chiều cao dưới bách phân vị 3\n\n🔵 Thấp lùn do bệnh thận mãn tính:\n• Tăng trung bình 5–7 cm\n• Điều trị cho đến khi ghép tạng; có thể tiếp tục sau ghép nếu sụn vẫn còn mở\n• Cần theo dõi chức năng thận định kỳ","tip":"Với các bệnh lý này, điều trị hormone tăng trưởng giúp cải thiện không chỉ chiều cao mà còn sức khỏe tổng thể và chất lượng cuộc sống."},"ans_gh_no_test":{"type":"answer","title":"Bước 1: Đánh giá chuyên khoa","recommend":true,"content":"Nếu chưa làm xét nghiệm, không thể biết trẻ có cần điều trị không. Việc đầu tiên là đến khám nội tiết nhi.\n\n🔬 Trình tự đánh giá cơ bản:\n\nBước 1. X-quang tuổi xương (bàn tay trái)\n• Đầu tiên và quan trọng nhất\n• Tiết lộ tiềm năng tăng trưởng và dự đoán chiều cao cuối cùng\n• Khoảng 5 phút, không đau, phóng xạ thấp\n\nBước 2. Xét nghiệm máu\n• IGF-1: sàng lọc chức năng GH\n• Chức năng tuyến giáp (TSH, T4 tự do)\n• Công thức máu toàn bộ (thiếu máu, viêm)\n• Chức năng gan và thận\n\nBước 3. Nghiệm pháp kích thích GH (khi có chỉ định)\n• Khi IGF-1 thấp hoặc tốc độ tăng trưởng bất thường\n• Khoảng 2–3 giờ, lấy máu 4–6 lần (đặt kim một lần)\n• Đỉnh < 10 ng/mL gợi ý thiếu GH\n• Bảo hiểm yêu cầu 2 loại nghiệm pháp khác nhau","tip":"Kết quả xét nghiệm xác định có cần điều trị không và loại điều trị nào phù hợp. Hoãn xét nghiệm nghĩa là mất thời gian điều trị quý báu."},"gh_effect":{"type":"answer","title":"Hiệu quả điều trị GH — Chẩn đoán và thời điểm là tất cả","content":"Kết quả thay đổi đáng kể tùy theo chẩn đoán và thời điểm bắt đầu điều trị.\n\n📊 Tăng trung bình theo bệnh lý:\n🥇 Thiếu hormone tăng trưởng → 10–13 cm (8–10 cm năm đầu)\n🥈 Hội chứng Turner → 7–8 cm\n🥉 SGA → 5–7 cm\n　　Prader-Willi → 6–8 cm (tăng cơ là lợi ích chính)\n　　Hội chứng Noonan → 4–6 cm\n　　Bệnh thận mãn → 5–7 cm\n　　ISS → 3–5 cm (dao động lớn)\n\n⏰ Thời điểm là yếu tố quyết định nhất:\n• Tuổi xương ≤6 khi bắt đầu → hiệu quả tối đa (~7,4 cm thêm trung bình)\n• Tuổi xương 8–9 → hiệu quả tốt\n• Tuổi xương ≥11 → hiệu quả giảm đáng kể\n• Tuổi xương ≥14 → hiệu quả tối thiểu, bảo hiểm kết thúc\n\n🌟 Bốn yếu tố tối đa hóa kết quả:\n1️⃣ Bắt đầu sớm: 2+ năm trước dậy thì gần như nhân đôi lợi ích\n2️⃣ Tiêm hàng ngày không bỏ lỡ\n   → Mỗi 10% cải thiện tuân thủ thêm ~1,1 cm/năm\n3️⃣ Liều đúng: tính lại mỗi 3–6 tháng khi cân nặng thay đổi\n4️⃣ Ngủ đủ giấc và dinh dưỡng tốt song song","tip":"Điều trị GH không tạo ra sự biến đổi劇tính trong thời gian ngắn. Nó hoạt động bằng cách duy trì tốc độ tăng trưởng cao hơn mức cơ bản trong nhiều năm, tích lũy dần để đạt chiều cao cuối cùng tốt hơn."},"gh_safety":{"type":"answer","title":"Độ an toàn của hormone tăng trưởng — Được kiểm chứng hơn 40 năm","content":"Điều trị GH rất an toàn. Sản phẩm được sản xuất bằng công nghệ tái tổ hợp DNA từ năm 1985.\n\n✅ Tại sao an toàn:\n• Cấu trúc giống 100% GH tự nhiên của cơ thể người (191 axit amin)\n• Cơ thể không nhận ra nó là «vật lạ»\n• Hơn 40 năm sử dụng toàn cầu, dữ liệu từ hàng triệu bệnh nhân\n\n📋 Tác dụng phụ nhẹ (< 3%):\n• Đỏ/ngứa/sưng tại chỗ tiêm → giảm trong 1–2 tuần\n• Đau đầu → thường biến mất trong 1–2 tuần\n• Đau cơ/khớp → giống đau tăng trưởng, cải thiện trong 2–4 tuần\n• Phù nhẹ ở tay chân → tự hết theo thời gian\n\n⚠️ Ít gặp nhưng cần biết:\n• Suy giáp: ~10–20% trường hợp thiếu hụt tuyến yên đa tuyến có thể phát triển → xét nghiệm máu theo dõi, dễ điều chỉnh bằng thuốc\n• Tăng đường huyết: chỉ đáng lo với trẻ béo phì hoặc có tiền sử gia đình tiểu đường\n• Vẹo cột sống: theo dõi tại các lần khám\n• Trượt đầu xương đùi: rất hiếm; nếu đột ngột跛hành hoặc đau háng → đến cấp cứu ngay\n\n🚫 Nguy cơ un
