 고려\n• <5ng/mL: 완전 결핍 → 즉시 치료 강력 권장\n\n🔍 수치 외에 함께 고려하는 요소:\n1. 성장 속도 (가장 중요!)\n   → 연간 4cm 미만이면 수치가 경계여도 치료 고려\n2. IGF-1 수치\n   → 낮으면 결핍 가능성 높음\n3. 골연령\n   → 치료 가능한 기간이 얼마 남았는지\n4. 현재 키 위치\n   → 하위 3백분위 미만이면 더 적극적으로\n5. 가족력\n   → 부모 키에 비해 얼마나 작은지\n\n💡 경계값(7~10)이 나왔을 때:\n• 6개월~1년 성장 속도 추가 관찰\n• 다른 요인들 종합 검토\n• 필요시 재검사\n\n✅ 완전 결핍(<5)이면:\n치료 반응이 매우 좋음 → 첫 해 평균 10~12cm","tip":"수치가 10 이상이어도 다른 조건들이 이상하면 치료를 고려할 수 있어요. 숫자 하나보다 전체적인 그림을 보는 것이 중요합니다."},"gh_test_preparation":{"type":"answer","title":"성장호르몬 자극검사 준비 — 이렇게 하면 돼요","content":"검사 전 준비를 잘 해야 정확한 결과가 나옵니다.\n\n📋 검사 전날 (D-1):\n• 밤 12시 이후부터 완전 금식\n• 단, 물은 마셔도 됨\n• 평소와 같이 자기\n• 격렬한 운동 피하기\n\n🌅 검사 당일 (D-day):\n• 최대한 일찍 병원 도착 (오전 9시 이전 권장)\n• 소매 걷기 편한 헐렁한 옷 착용\n• 아이가 좋아하는 장난감·책·태블릿 지참\n• 보호자 1명 동반 필수 (2~3시간 함께 있어야 함)\n\n✅ 검사 중 주의사항:\n• 유치 바늘 삽입 부위 건드리지 않기\n• 30분마다 채혈 시 최대한 안정\n• 클로니딘 사용 시: 졸음 유발 가능 (정상)\n• 인슐린 사용 시: 저혈당 증상(식은땀, 떨림) 의료진에게 즉시 알리기\n\n❓ 자주 묻는 질문:\nQ. 아침약을 먹어도 되나요?\nA. 의사에게 미리 확인 (대부분 금식 기간에 복용 금지)\n\nQ. 철분제·영양제도 중단해야 하나요?\nA. 검사 전 의사에게 복용 중인 모든 약물 알리기","tip":"검사 당일 아이가 충분히 금식을 했는지 확인하세요. 금식이 제대로 안 되면 자극 반응이 억제되어 결핍이 있어도 정상으로 나올 수 있어요."},"gh_stim_side_effect":{"type":"answer","title":"자극검사 부작용 — 대부분 일시적이에요","content":"사용하는 약물에 따라 다르지만 대부분 경미하고 일시적입니다.\n\n💊 약물별 주요 부작용:\n\n클로니딘:\n• 졸음 (가장 흔함, 검사 후 충분히 쉬면 됨)\n• 혈압 일시 저하\n• 두통\n• → 대부분 귀가 후 2~3시간 내 회복\n\n아르기닌:\n• 구역, 구토\n• 두통\n• → 주입 속도 조절로 줄일 수 있음\n\n글루카곤:\n• 구역, 구토\n• 두통\n• → 식사 후 저혈당 주의\n\n인슐린 (가장 강력, 드물게 사용):\n• 저혈당 (가장 주의!)\n• 식은땀, 어지러움, 손 떨림\n• 병원에서 즉시 포도당 보충\n\n✅ 안심해도 되는 이유:\n• 모든 부작용은 의료진이 예상하고 대비함\n• 검사실에서 24시간 모니터링 가능\n• 부작용으로 심각한 상황이 된 사례는 극히 드묾\n\n⚠️ 귀가 후 주의사항:\n• 클로니딘 사용 시: 당일 격렬한 활동 피하기\n• 졸음이 심하면 낮잠 허용","tip":"검사가 무서워서 미루는 분들이 많은데, 대부분의 부작용은 일시적이고 병원에서 즉시 처리됩니다. 치료 기회를 잃는 것이 더 아깝습니다."},"gh_monitoring":{"type":"question","text":"성장호르몬 치료 중 모니터링에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"주사 부위가 붓거나 빨개져요 — 정상인가요?","next":"gh_side_injection_site"},{"text":"두통, 다리 통증 등 부작용이 걱정돼요","next":"gh_side_common"},{"text":"병원 방문 주기와 정기 검사가 궁금해요","next":"gh_monitoring_schedule"},{"text":"어떤 증상일 때 즉시 응급실에 가야 하나요?","next":"gh_emergency_signs"}]},"gh_side_injection_site":{"type":"answer","title":"주사 부위 부작용 — 이렇게 관리하세요","content":"주사 부위 반응은 가장 흔한 부작용이에요. 대부분 관리로 해결됩니다.\n\n🔴 흔한 반응:\n• 빨갛게 부어오름\n• 약간의 가려움\n• 피부 약간 두꺼워짐\n→ 며칠 내 저절로 호전, 치료 중단 불필요\n\n⚠️ 주의가 필요한 상태:\n• 딱딱하게 굳는 경결 (Lipohypertrophy)\n  → 같은 부위에 반복 주사한 결과\n  → 약물 흡수 방해 → 치료 효과 감소\n• 함몰 (Lipoatrophy)\n  → 드물지만 지방 조직 손실\n  → 부위 로테이션으로 예방 가능\n\n✅ 관리 방법:\n1. 반드시 4곳 이상 로테이션\n   복부 → 허벅지 → 팔 뒤쪽 → 엉덩이 순환\n2. 같은 부위 연속 주사 절대 금지\n3. 주사 15~30분 전 냉장고에서 꺼내 상온화\n   (차가운 약물은 통증·반응 증가)\n4. 주사 후 발적: 찬 물수건으로 가볍게 찜질\n5. 주사 전 알코올 소독 후 10~15초 충분히 건조","tip":"딱딱한 경결이 생기면 그 부위는 최소 4주 이상 쉬어야 해요. 경결 부위에 계속 주사하면 약물 흡수가 나빠져 치료 효과가 떨어집니다."},"gh_side_common":{"type":"answer","title":"두통·다리 통증 등 흔한 부작용 대처법","content":"성장호르몬 치료 중 나타날 수 있는 부작용들과 대처법입니다.\n\n📋 흔한 부작용 (3% 미만):\n\n두통:\n• 치료 초기 1~2주 내 흔함\n• 대부분 2주 안에 자연 소실\n• 타이레놀로 조절 가능\n• ⚠️ 예외: 구토 동반 + 아침에 심하면 → 즉시 연락\n\n근육통·관절통 (성장통 비슷):\n• 성장호르몬이 근골격에 작용하며 발생\n• 따뜻한 찜질, 스트레칭으로 완화\n• 2~4주 내 대부분 소실\n\n손발 부종:\n• 치료 초기 일시적 나트륨·수분 저류\n• 용량 조절 또는 시간이 지나면 호전\n\n갑상선 기능 저하:\n• 일부에서 TSH 수치 일시 저하\n• 6개월마다 혈액검사로 확인\n• 필요 시 갑상선 호르몬 보충\n\n⚠️ 절뚝거림·고관절 통증:\n• 대퇴골두 골단 분리증 의심 신호\n• 즉시 병원 내원 (응급 가능성)\n\n⚠️ 등이 휘는 것 같으면:\n• 척추측만증 확인\n• 정기 검진에서 체크","tip":"대부분의 부작용은 치료 초기에 잠시 나타났다가 사라져요. 하지만 절뚝거림, 심한 두통+구토는 즉시 연락해야 하는 응급 신호입니다."},"gh_monitoring_schedule":{"type":"answer","title":"치료 중 모니터링 일정 — 이렇게 관리해요","content":"성장호르몬 치료는 정기적인 모니터링이 안전하고 효과적인 치료의 핵심입니다.\n\n📅 병원 방문 일정:\n\n처음 3개월: 매월 방문\n• 주사 적응 확인\n• 부작용 체크\n• 주사 기술 점검\n• 키/몸무게 측정\n\n안정기 이후: 3~6개월마다\n• 키 성장 확인\n• 용량 재조정 여부 검토\n\n🔬 정기 검사 일정:\n\n매 3~6개월:\n• 혈액검사: IGF-1 (목표: 0~+2 SDS)\n• 갑상선 기능 (TSH, 유리T4)\n\n매 6~12개월:\n• 골연령 X-ray (성장판 진행 상황)\n\n당뇨 위험군 (비만, 가족력):\n• 혈당 추가 검사\n\n🏠 집에서 매일 확인할 것:\n1. 주사 날짜·부위 기록\n2. 주사 부위 상태 (경결·함몰 여부)\n3. 이상 증상 (두통, 절뚝거림 등)\n\n📊 IGF-1 목표 범위:\n• +2 SDS 초과: 용량 줄이기\n• -2 SDS 이하: 용량 늘리기 또는 주사 기술 확인","tip":"주사 기록 앱이나 수첩을 활용하세요. 날짜·부위를 기록하면 경결 예방에도 도움이 되고, 병원 방문 시 순응도 확인에도 사용됩니다."},"gh_emergency_signs":{"type":"answer","title":"즉시 응급실에 가야 하는 3가지 신호","recommend":true,"urgent":true,"content":"성장호르몬 치료 중 다음 증상은 응급 상황입니다. 즉시 응급실로!\n\n🚨 응급 증상 3가지:\n\n1️⃣ 심한 두통 + 구토 + 시야 장애\n→ 두개내압 상승(가성 뇌종양) 의심\n증상: 아침에 특히 심한 두통, 구토, 흐리게 보임\n→ 치료를 일시 중단하면 대부분 회복\n\n2️⃣ 갑작스러운 절뚝거림 + 고관절·무릎 통증\n→ 대퇴골두 골단 분리증 의심\n특히: 비만 남아에서 더 흔함\n→ 즉각 치료 필요, 방치하면 영구 장애 가능\n\n3️⃣ 주사 부위 고름 + 38.5°C 이상 발열\n→ 심한 세균 감염 의심\n→ 주사 기구 오염 또는 피부 세균 감염\n\n⚠️ 이럴 때 즉시 담당 의사에게 연락:\n• 갑작스러운 시력 변화\n• 심한 알레르기 반응 (발진 + 호흡 곤란)\n• 극심한 근육·관절통으로 일상생활 불가\n\n✅ 일반 부작용과 구별:\n• 단순 두통 (약 먹으면 나음) → 경과 관찰\n• 주사 부위 발적 (며칠 내 호전) → 경과 관찰\n• 성장통 비슷한 다리 통증 → 경과 관찰","tip":"불안하면 언제든 담당 의사에게 연락하세요. 증상 사진을 찍어두면 전화 상담 시 도움이 됩니다."},"puberty_diagnosis_detail":{"type":"question","text":"성조숙증 진단 검사에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"태너 단계란 무엇인가요?","next":"tanner_stage_explain"},{"text":"GnRH 자극검사는 어떻게 진행되나요?","next":"gnrh_stim_test"},{"text":"뇌 MRI가 꼭 필요한가요?","next":"puberty_mri_need"},{"text":"진단 검사 비용이 궁금해요","next":"puberty_diagnosis_cost"},{"text":"검사 결과에 따라 어떻게 진행되나요?","next":"puberty_after_diagnosis"}]},"tanner_stage_explain":{"type":"answer","title":"태너 단계 — 사춘기 발달 정도를 1~5단계로 평가해요","content":"태너 단계는 사춘기 발달 정도를 1(사춘기 전)~5(성인)까지 나누는 의학적 기준입니다.\n\n👧 여아 태너 단계:\n• 1기: 사춘기 전 (유방·음모 없음)\n• 2기: 유두 아래 작은 경결 (유방 시작), 음모 시작 ← 사춘기 시작\n• 3기: 유방·유륜 동시 증대, 음모 증가\n• 4기: 유륜이 유방 위로 돌출\n• 5기: 성인형 유방 (유륜 함몰), 성인 음모\n\n성조숙증: 만 8세 전에 2기 도달\n정상 범위: 8~13세 사이에 2기 도달\n\n👦 남아 태너 단계:\n• 1기: 사춘기 전 (고환 3mL 이하)\n• 2기: 고환 4mL 이상 ← 사춘기 시작\n• 3기: 고환 10mL, 음경 신장, 음모 증가\n• 4기: 고환 15mL, 변성기\n• 5기: 성인 (고환 20mL 이상)\n\n성조숙증: 만 9세 전에 2기 도달\n정상 범위: 9~14세 사이에 2기 도달\n\n💡 오키드계측기:\n고환 크기를 재는 타원형 구슬 모음\n병원에서 태너 단계 평가 시 사용","tip":"태너 단계는 달력 나이와 독립적이에요. 같은 9세라도 태너 1기(미발달)~3기(중기)까지 다양할 수 있습니다."},"gnrh_stim_test":{"type":"answer","title":"GnRH 자극검사 — 성조숙증 확진의 핵심 검사","content":"진성 성조숙증 여부를 확진하는 「금표준」 검사입니다.\n\n🔬 검사 원리:\n인공 GnRH를 주사해 뇌하수체가 얼마나 반응하는지 확인\n→ 성조숙증이면 LH가 크게 상승\n→ 아직 사춘기 전이면 FSH 중심의 낮은 반응\n\n📋 검사 진행:\n1. 병원 도착 (금식 불필요)\n2. 팔에 유치 바늘 1회 삽입\n3. GnRH 유사체(렐리펙트 등) 주사\n4. 0·30·60·90분에 총 4~5회 채혈\n5. 약 90분~2시간 소요\n\n📊 결과 해석:\n• LH 피크 ≥5 IU/L → 진성 성조숙증 ✓\n• LH 피크 <2 IU/L, FSH 우세 → 조기 유방 발육증 (치료 불필요)\n• LH 2~5: 경계 → 추적 관찰\n\n💰 비용 (2025년 기준):\n• 자극검사: 약 5~10만 원 (급여 적용 시)\n• 골반 초음파: 약 3~5만 원\n• 골연령 X-ray: 약 2~3만 원\n• 뇌 MRI: 급여 시 10~20만 원 (비급여 40~60만 원)\n\n⚠️ 주의사항:\n유치 바늘 제거 전까지 팔 움직임 최소화","tip":"GnRH 자극검사는 아이도 부모도 긴장되지만, 이 검사 없이는 치료 여부도, 보험 적용도 결정할 수 없어요. 꼭 필요한 과정입니다."},"puberty_mri_need":{"type":"answer","title":"뇌 MRI — 꼭 받아야 하나요?","content":"모든 아이에게 필요하지는 않아요. 상황에 따라 다릅니다.\n\n📋 뇌 MRI가 필요한 경우:\n\n여아:\n• 만 6세 미만에서 성조숙증 → 필수\n• 6~8세이지만 급격히 빠른 진행\n• 두통·시력 이상·신경 증상 동반\n\n남아:\n• 성조숙증 진단 시 → 항상 필수\n  이유: 남아 성조숙증의 7~16%에서 뇌 병변 발견\n  여아보다 기질적 원인 확률 높음\n\n🧠 MRI에서 확인하는 것:\n• 시상하부 과오종 (양성 종양, 가장 흔한 원인)\n• 뇌하수체 종양\n• 뇌종양\n• 기타 뇌 구조 이상\n\n⚠️ 아이가 가만히 못 있을 때:\n• 20~30분 동안 움직이지 않아야 함\n• 만 7세 미만은 수면 진정 필요할 수 있음\n• 사전에 의사와 상담\n\n💰 비용:\n• 급여 적용 시: 10~20만 원\n• 비급여: 40~60만 원\n• 성조숙증 진단 후 뇌 병변 의심되면 대부분 급여 적용 가능","tip":"여아 만 6~8세는 MRI가 필수는 아니지만, 진행이 매우 빠르다면 찍는 게 안전해요. 남아는 무조건 찍는 것이 권장됩니다."},"puberty_diagnosis_cost":{"type":"answer","title":"성조숙증 진단 검사 비용","content":"2025년 기준 급여 적용 시 예상 비용입니다.\n\n💰 주요 검사 비용 (급여 적용 시):\n\n• 혈액검사 (기본 호르몬): 약 3~5만 원\n• 골연령 X-ray: 약 2~3만 원\n• 골반 초음파 (여아): 약 3~5만 원\n• GnRH 자극검사: 약 5~10만 원\n• 뇌 MRI: 10~20만 원 (비급여 40~60만 원)\n\n첫 방문 예상 총액 (MRI 제외): 약 15~25만 원\n뇌 MRI 포함 시: 약 25~45만 원\n\n📋 급여 적용 기준:\n• 성조숙증 진단 기준 충족 시 대부분 급여\n• 뇌 MRI는 뇌 병변 의심 판단 시 급여 가능\n• 초음파는 급여/비급여 병원마다 다를 수 있음\n\n💡 절약 팁:\n• 실손보험 가입 여부 확인 (비급여 일부 보상 가능)\n• 검사 전 보험 적용 여부 미리 확인 요청\n• 대학병원보다 소아내분비 전문 클리닉이 비용 낮을 수 있음","tip":"진단 검사 비용은 한 번이지만 치료비는 수년간 발생해요. 치료 시작 전에 보험 급여 여부를 꼭 확인하세요."},"puberty_after_diagnosis":{"type":"answer","title":"검사 결과에 따라 어떻게 달라지나요?","content":"GnRH 자극검사 결과에 따라 3가지 방향으로 나뉩니다.\n\n1️⃣ LH 피크 ≥5 → 진성 성조숙증 확진\n→ 치료 시작 (GnRH 주사)\n→ 골연령, 최종 키 예측 후 치료 계획 수립\n→ 뇌 MRI 추가 (남아 필수, 여아 상황에 따라)\n\n2️⃣ LH 피크 <2, FSH 우세 → 조기 유방 발육증\n→ 치료 불필요\n→ 3~6개월마다 추적 관찰\n→ 다음 4가지 나타나면 즉시 재평가:\n  • 유방이 빠르게 커짐\n  • 음모 발달\n  • 키 급성장\n  • 질 분비물\n\n3️⃣ LH 피크 2~5 → 경계값 (빠른 사춘기)\n→ 진성과 가성 중간 상태\n→ 3~6개월마다 경과 관찰\n→ 골연령 빠르면 치료 고려\n→ 성장 속도 유지되면 기다릴 수도 있음\n\n✅ 가성 성조숙증인 경우:\n원인(낭종, 종양, 외부 에스트로겐 노출) 제거\n→ 원인 제거 후 사춘기 중단 여부 확인","tip":"검사 결과가 경계값이라고 실망하지 마세요. 경계값은 치료가 필요 없을 수도 있고, 3~6개월 관찰 후 치료 시작해도 늦지 않은 경우가 많아요."},"gnrh_how_work":{"type":"answer","title":"GnRH 치료 원리와 효과","content":"GnRH 유사체는 「도어벨 계속 누르기」 방식으로 성호르몬을 억제합니다.\n\n🔬 작용 원리:\n\n정상: 뇌에서 GnRH를 「맥동성」으로 분비 (띵동! 띵동! 간헐적)\n→ 뇌하수체 반응 → LH·FSH 분비 → 성호르몬 생성\n\nGnRH 주사 후: GnRH를 「지속적」으로 억제 (꾹~~ 계속 누름)\n→ 뇌하수체 수용체 탈감작(무감각화)\n→ LH·FSH 분비 격감\n→ 성호르몬 억제\n→ 사춘기 진행 멈춤\n\n📊 치료 효과:\n• 성호르몬 분비 억제\n• 골연령 진행 속도 정상화 (빨라지던 것 멈춤)\n• 성장판이 더 오래 열려 있게 됨\n• 최종 키 보호\n• 조기 초경 예방\n\n🕒 효과 나타나는 시기:\n• 2~4주: 성호르몬 억제 시작\n• 3~6개월: 완전 억제\n• 첫 1~2주 「플레어업」: 일시적 호르몬 상승 (정상 반응)\n\n✅ 40년 이상 검증된 안전한 치료:\n• 생식 기능 정상 (치료 종료 후 정상 임신 가능)\n• 골밀도 정상 (회복됨)\n• 대사 이상 없음","tip":"치료를 시작하면 초기 1~2주간 플레어업으로 여아는 소량 질 출혈이 있을 수 있어요. 걱정하지 마세요 — 이는 치료가 작동하는 정상적인 과정입니다."},"gnrh_duration":{"type":"answer","title":"GnRH 치료 기간과 종료 시점","content":"치료 기간은 아이마다 다르지만, 보통 2~4년입니다.\n\n📅 치료 기간:\n• 평균 2~4년\n• 시작이 빠를수록 (만 6세 전) → 더 긴 치료, 더 큰 효과\n• 시작이 늦을수록 (만 8세 이후) → 짧은 치료, 제한적 효과\n\n🔴 치료 종료 시점:\n\n여아: 골연령 12~12.5세\n• 이 시기 = 또래의 정상 사춘기 시기\n• 중단 후 평균 1년 내 초경\n\n남아: 골연령 13~13.5세\n\n⚠️ 이때는 종료 고려:\n• 또래의 정상 사춘기 시기에 맞춰 종료\n• 골연령이 이미 많이 앞서 있어 치료 효과 없을 때\n• 아이가 극심한 부담감 호소 시\n\n💡 종료 후 무슨 일이?\n• 억제되었던 사춘기가 자연스럽게 재개\n• 여아: 종료 후 1년(0.9~1.5년) 내 초경\n• 남아: 종료 후 6~12개월 내 사춘기 진행\n• 생식 기능 완전히 정상으로 회복\n\n📊 급여 종료 연령 (건강보험):\n• 여아 만 11세 → 자동 비급여 전환\n• 여아 만 12세 → 이후에도 필요 시 비급여 치료 가능\n• 남아 만 12세 → 자동 비급여\n• 남아 만 13세 → 이후 비급여","tip":"치료 종료 후 사춘기가 재개되는 것은 정상이에요. 오히려 또래와 비슷한 시기에 초경이 오는 것이 치료 성공의 지표입니다."},"gnrh_flare_up":{"type":"answer","title":"플레어업 현상 — 처음에 호르몬이 잠깐 오르는 현상","content":"GnRH 주사를 처음 맞은 후 7~10일간 성호르몬이 일시적으로 상승하는 현상입니다.\n\n❓ 왜 일어나나요?\n주사 초기에는 억제 전에 뇌하수체가 강하게 반응\n→ 성호르몬이 잠시 더 분비됨\n→ 이후 수용체가 탈감작되며 억제 시작\n\n📊 플레어업 증상:\n여아:\n• 소량의 질 출혈 (소량, 자연 소실)\n• 유방 통증\n• 약간의 감정 기복\n\n남아:\n• 일시적 음경 발기\n• 기분 변화\n\n✅ 안심해도 되는 이유:\n• 7~14일 내 자연 소실\n• 치료가 정상적으로 작동하는 과정\n• 멈추거나 감량할 필요 없음\n\n⚠️ 언제 병원에 연락?\n• 질 출혈이 2주 이상 지속\n• 출혈량이 많아 생리 수준\n• 심한 복통 동반\n\n💡 다음 주사부터는?\n플레어업은 처음에만 발생\n이후에는 꾸준히 억제만 됨","tip":"첫 주사 후 딸아이에게 소량 질 출혈이 생겨도 당황하지 마세요. 약이 작동하는 정상 과정이에요. 2주 이상 지속되거나 양이 많으면 연락주세요."},"gnrh_insurance_detail":{"type":"answer","title":"GnRH 치료 급여 조건과 비용 상세","content":"2025년 1월 강화된 기준 기준으로 설명드립니다.\n\n✅ 급여 조건 5가지 (모두 충족해야 함):\n\n1. 이차 성징 발현 시점\n   • 여아: 만 8세 미만 시작 기록 필요\n   • 남아: 만 9세 미만 시작 기록 필요\n   • ⚠️ 2025년부터 \"의학적으로 확인 가능한 시점\" 필요\n   • 부모 진술만으로 소급 인정 안 될 수 있음\n\n2. GnRH 자극검사 LH 피크 ≥5 IU/L\n\n3. 골연령 초과 (실제 나이보다 앞선 상태)\n\n4. 치료 시작 나이\n   • 여아 만 9세 미만\n   • 남아 만 10세 미만\n\n5. 급여 지속 기간\n   • 여아 만 11세까지 (이후 비급여 전환)\n   • 남아 만 12세까지\n\n💰 비용 비교:\n\n급여 적용 시:\n• 1개월형: 월 약 4~5만 원\n• 3개월형: 회당 약 12~15만 원\n• 연간: 약 50~60만 원\n\n비급여 시:\n• 1개월형: 월 약 11만 원\n• 3개월형: 회당 약 33만 원\n• 연간: 약 130~400만 원\n\n💡 실손보험 확인:\n가입 시기에 따라 비급여 일부 보상 가능","tip":"이차 성징이 의심되면 빨리 병원을 방문해서 기록을 남겨두세요. 2025년부터 기준이 강화되어 늦게 방문하면 급여 적용이 어려울 수 있어요."},"gnrh_drugs_detail":{"type":"answer","title":"GnRH 약물 종류와 주사 방법","content":"국내에서 사용 가능한 GnRH 유사체는 크게 두 계열입니다.\n\n💊 약물 계열:\n\n류프로렐린 계열:\n• 제품명: 루프린, 루페어, Eligard\n• 주사 방법: 피하주사 또는 근육주사\n• 제형: 1개월형, 3개월형\n\n트립토렐린 계열:\n• 제품명: 디페렐린, 데카펩틸\n• 주사 방법: 근육주사 (엉덩이)\n• 제형: 1개월형, 3개월형\n\n두 계열의 효과와 안전성은 동등\n의사가 상황에 맞게 선택\n\n⏱️ 주사 간격 (절대 늦추면 안 됩니다!):\n• 1개월형: 25~29일 이내\n• 3개월형: 77~87일 이내\n\n늦추면 → 성호르몬 일시 상승 (돌파 현상)\n→ 골연령 진행이 다시 빨라질 수 있음\n\n💉 근육주사 vs 피하주사:\n• 근육주사: 생체이용률 높음, 통증 약간 더 있음\n• 피하주사: 통증 적음, 집에서 자가 주사 가능 (일부 제형)\n• 의사가 아이 상황에 맞게 결정\n\n🏥 주사는 병원에서만:\n성조숙증 주사는 병원 방문 시 맞음\n(성장호르몬과 달리 집에서 자가주사 아님)","tip":"주사 날짜를 달력·스마트폰에 꼭 기록해두세요. 하루 이틀 늦는 것도 「돌파 현상」을 일으킬 수 있어요."},"thelarche_vs_precocious":{"type":"answer","title":"조기 유방 발육증 vs 성조숙증 — 어떻게 구별하나요?","content":"가장 중요한 차이는 「다른 사춘기 징후의 유무」입니다.\n\n📊 비교표:\n\n항목 | 조기 유방 발육증 | 진성 성조숙증\n유방 변화 | 있음 | 있음\n음모 발달 | 없음 | 있음\n키 급성장 | 없음 | 있음 (7~8cm↑)\n질 분비물 | 없음 | 있음\n골연령 | 정상 or 경미 초과 | 2년 이상 초과\nGnRH LH 피크 | <2 IU/L | ≥5 IU/L\n치료 필요 | 대부분 불필요 | 필요\n예후 | 87% 자연 호전 | 치료 안 하면 최종 키 손실\n\n🔑 핵심 구별 포인트:\n• 음모 발달 → 진성 성조숙증 강력 시사\n• 키 급성장 → 진성 시사\n• 질 분비물 → 진성 시사\n• 유방만 있고 위 3가지 없음 → 조기 유방 발육증 가능성\n\n✅ 확진 방법:\n• GnRH 자극검사\n  LH <2 → 조기 유방 발육증\n  LH ≥5 → 진성 성조숙증","tip":"음모, 질 분비물, 급성장 중 하나라도 있으면 단순 조기 유방 발육증이 아닐 수 있어요. 빨리 진료받으세요."},"thelarche_prognosis":{"type":"answer","title":"조기 유방 발육증 — 예후와 경과","content":"조기 유방 발육증은 대부분 걱정 없이 좋아집니다.\n\n📊 예후 통계:\n• 87%: 저절로 호전 (51% 완전 소실, 36% 거의 소실)\n• 13%: 사춘기 때까지 유지 (정상 사춘기 시 같이 커짐)\n• 약 10%만: 진성 성조숙증으로 진행\n• 특히 만 2세 이하 발생: 성조숙증 진행 확률 약 2%로 매우 낮음\n\n✅ 조기 유방 발육증이면:\n• 최종 키: 정상 (성장판 조기 폐쇄 없음)\n• 사춘기 시작 시기: 정상\n• 초경 시기: 정상\n• 생식 기능: 정상\n• 유방암 위험: 전혀 증가 없음\n\n📅 추적 관찰 방법:\n• 처음 6개월: 3개월마다 방문\n• 안정적이면: 6개월마다\n• 확인 내용: 유방 크기, 음모, 질 분비물, 성장 속도\n\n🔴 성조숙증으로 넘어가는 4가지 신호:\n1. 유방이 빠르게 커짐\n2. 음모 발달\n3. 질 분비물\n4. 키가 갑자기 7~8cm/년 이상 성장\n\n→ 이 중 하나라도 나타나면 즉시 재평가!","tip":"조기 유방 발육증은 치료가 \"필요 없는\" 것이지 \"방치\"하는 게 아니에요. 3~6개월 정기 추적만 잘 하면 됩니다."},"thelarche_cause":{"type":"answer","title":"조기 유방 발육증 — 환경호르몬이 원인인가요?","content":"부모님들이 가장 많이 걱정하는 부분입니다. 현재까지의 연구 결과를 알려드립니다.\n\n🔬 원인:\n\n대부분 (특발성):\n• 원인 불명\n• 유방 조직이 여성호르몬에 일시적으로 민감하게 반응\n• 난소에서 에스트로겐이 잠깐 분비됐다 멈춤\n\n환경호르몬 가능성:\n• 일부 연구: 라벤더·티트리 오일 사용 후 멍울 → 중단 후 감소\n• 플라스틱(BPA): 가능성 제기되나 인과관계 불명확\n• 콩 제품: 식물성 에스트로겐, 영향 미미\n• 유제품: 연구 결과 불일치\n\n⚠️ 환경호르몬 우려 시 실천 가이드:\n• 전자레인지: 플라스틱 용기 → 유리·스테인리스 교체\n• 라벤더·티트리 오일: 잠시 중단 후 경과 관찰\n• 영수증: 자주 만지지 않도록\n\n❌ 과도한 걱정은 불필요:\n• 대부분은 환경호르몬과 무관\n• 부모님이 미안해할 필요 없음\n• 원인보다 경과 관찰이 더 중요","tip":"명확한 원인 없이 생기는 경우가 대부분이에요. 환경호르몬을 줄이려는 노력은 좋지만, 그것 때문에 생겼다고 자책할 필요는 없어요."},"thelarche_followup":{"type":"answer","title":"조기 유방 발육증 추적 관찰 — 집에서 확인할 것들","content":"정기 병원 방문과 함께 집에서도 주기적으로 확인해주세요.\n\n🏥 병원 방문 주기:\n• 처음 6개월: 3개월마다\n• 이후 안정적이면: 6개월마다\n• 이상 신호 시: 즉시 방문\n\n🔍 집에서 매달 확인할 사항:\n\n1. 유방 크기 변화\n   • 빠르게 커지는지 (3개월 내 1단계 이상 변화)\n   • 한쪽만 있다가 양쪽으로 변했는지\n\n2. 음모 발달 여부\n   • 서혜부·음부에 잔털 있는지\n\n3. 질 분비물 여부\n   • 속옷에 노란색·흰색 분비물\n\n4. 키 성장 속도\n   • 3개월마다 키 측정 기록\n   • 갑자기 빠르게 크는지\n\n⚠️ 즉시 병원 연락할 신호:\n• 유방이 1개월 내 눈에 띄게 커짐\n• 음모 발달\n• 질 분비물\n• 3개월에 2cm 이상 성장\n\n📝 기록 관리:\n• 사진으로 유방 변화 기록 (3개월마다)\n• 키 기록 (날짜 포함)\n→ 병원 방문 시 변화 추적에 도움","tip":"이상 신호를 모르고 지나치는 경우가 많아요. 3개월마다 키 재고 유방 크기 확인하는 습관을 들여주세요."},"vitd_calcium_link":{"type":"answer","title":"비타민D가 칼슘 흡수에 왜 그렇게 중요한가요?","content":"비타민D는 칼슘의 「열쇠」입니다. 열쇠 없이는 문이 열리지 않아요.\n\n🔑 작용 원리:\n1. 비타민D가 소장 세포에 신호 전달\n2. 칼슘 운반 단백질(Calbindin) 생성 촉진\n3. 이 단백질이 칼슘을 장에서 혈액으로 능동 수송\n\n📊 흡수율 차이:\n• 비타민D 부족 시: 칼슘 흡수율 10~15%\n• 비타민D 충분 시: 칼슘 흡수율 30~40%\n→ 같은 우유를 마셔도 2~3배 차이!\n\n💡 실제 계산:\n• 우유 200mL = 칼슘 220mg\n• 비타민D 부족 시: 실제 흡수 22~33mg\n• 비타민D 충분 시: 실제 흡수 66~88mg\n→ 흡수량 3배 차이\n\n🥛 칼슘만 먹어도 의미가 없는 경우:\n• 비타민D 없으면 칼슘의 대부분이 그냥 배출됨\n• 「비타민D 없이 칼슘 보충 = 돈 낭비」\n\n⚠️ 칼슘을 빼앗는 것들:\n• 탄산음료 (인산): 칼슘 배출 촉진\n• 짠 음식: 소변으로 칼슘 손실\n• 카페인: 칼슘 흡수 방해","tip":"우유를 매일 충분히 마시는데도 골밀도가 낮다면 비타민D 수치를 먼저 확인해보세요. 비타민D 없이는 아무리 칼슘을 먹어도 흡수가 안 됩니다."},"vitd_sun":{"type":"answer","title":"햇빛으로 비타민D 만들기 — 얼마나 해야 하나요?","content":"비타민D는 햇빛(자외선 UVB)이 피부에 닿을 때 합성됩니다.\n\n☀️ 효과적인 햇빛 노출 조건:\n• 시간: 오전 10시~오후 2시 사이\n  (UVB가 대기층을 통과하는 시간)\n• 부위: 얼굴 + 팔 정도 노출\n• 시간: 15~30분 (피부색에 따라 다름)\n• 자외선 차단제: 바르면 합성 거의 안 됨\n\n❌ 한국에서 햇빛으로 합성이 어려운 경우:\n• 겨울 (11~2월): 북위 33도 이상에서 UVB 부족\n  → 이 기간은 아무리 햇빛 쬐어도 합성 안 됨\n• 실내 생활 (유리창은 UVB 차단)\n• 미세먼지가 심한 날\n• 야외 활동 적은 아이\n\n📊 한국 아이들의 현실:\n• 한국 아이의 70~80%가 비타민D 부족\n• 실내 생활 ↑, 자외선 차단제 ↑, 미세먼지 ↑\n→ 햇빛만으로는 부족한 경우가 대부분\n\n💊 결론:\n• 여름: 야외 활동 30분 정도면 어느 정도 보충 가능\n• 가을~봄: 보충제 필수\n• 겨울: 반드시 보충제\n\n혈중 목표 농도: 30~50 ng/mL\n(혈액검사로 확인 가능)","tip":"한국의 겨울에는 아무리 햇빛을 많이 쬐어도 비타민D가 만들어지지 않아요. 11월부터 3월까지는 반드시 보충제가 필요합니다."},"vitd_supplement_guide":{"type":"answer","title":"비타민D 보충제 선택과 복용 가이드","content":"올바른 비타민D 보충제 선택법과 복용 방법을 알려드립니다.\n\n💊 D3 vs D2:\n• 비타민D3 (콜레칼시페롤): 권장 ✓\n  동물성, 우리 몸에서 자연적으로 만들어지는 형태\n  효과 D2의 1.5~2배\n• 비타민D2 (에르고칼시페롤): 2순위\n  식물성, 체내 활용율 낮음\n→ 제품 선택 시 「D3」 확인\n\n📏 연령별 권장 용량:\n• 0~12개월: 400 IU/일\n• 1~18세: 600 IU/일\n• 결핍 상태 (혈중 <20ng/mL): 1,000~2,000 IU/일\n• 치료용 (의사 처방): 최대 4,000 IU/일\n\n⏰ 언제 먹이나요?\n• 지용성 비타민 → 식사 중 또는 직후 (기름과 함께 흡수↑)\n• 아침 식사 후 권장\n• 매일 같은 시간 (일정한 습관)\n\n🧪 혈중 농도 확인:\n• 목표: 30~50 ng/mL\n• 20 미만: 결핍\n• 보충 시작 3개월 후 혈액검사 권장\n\n💰 보충제 선택 팁:\n• 성분: 비타민D3 단독 or D3+K2 복합\n• 형태: 액상(유아), 씹어먹는 젤리(소아), 캡슐(청소년)\n• 브랜드보다 성분 확인이 중요","tip":"비타민D는 지용성이라 식사와 함께 먹어야 흡수가 잘 돼요. 공복에 먹으면 흡수율이 떨어집니다."},"calcium_foods":{"type":"answer","title":"칼슘 많은 음식과 현실적인 섭취 팁","content":"칼슘이 풍부한 식품과 실제로 먹이는 방법을 알려드립니다.\n\n🥛 칼슘 함량 TOP 식품:\n• 우유 200mL: 220mg ★★★\n• 멸치 작은 것 20g: 200mg ★★★\n• 치즈 30g: 180~210mg ★★★\n• 요거트 100g: 120~150mg ★★\n• 두부 100g: 80~100mg ★★\n• 뱅어포 10g: 150mg ★★★\n• 깨 10g: 130mg ★★\n• 브로콜리 100g: 40~50mg ★\n\n📊 연령별 하루 칼슘 권장량:\n• 1~3세: 700mg (우유 약 3잔)\n• 4~8세: 1,000mg (우유 약 4~5잔)\n• 9~18세: 1,300mg (우유 약 6잔) ← 가장 중요!\n\n✅ 현실적인 섭취 전략:\n\n우유 거부하는 아이:\n• 우유 → 따뜻하게 + 소량 꿀\n• 요거트 스무디 (냉동 과일 + 요거트)\n• 뱅어포 조림 (밥 반찬)\n• 미역국 (다시마도 칼슘 많음)\n\n매일 목표 달성 조합 예시 (9세, 1,300mg 목표):\n• 아침 우유 1잔 (220mg)\n• 점심 멸치볶음 + 치즈 (350mg)\n• 저녁 두부찌개 + 저녁 우유 (320mg)\n• 간식 요거트 (150mg)\n→ 합계 약 1,040mg ✓\n\n⚠️ 칼슘 흡수 방해 요소:\n• 탄산음료 속 인산\n• 짠 음식 (나트륨과 함께 배출)\n• 철분·아연 보충제 (동시 복용 피하기)","tip":"멸치는 칼슘 챔피언! 뼈까지 먹을 수 있는 멸치볶음, 멸치국물은 아이 칼슘 보충에 최고예요. 우유 못 먹는 아이라면 멸치가 훌륭한 대안입니다."},"protein_why_detail":{"type":"answer","title":"단백질이 성장에 왜 그렇게 중요한가요?","content":"단백질은 성장의 「원재료」입니다. 설계도(호르몬)가 있어도 재료 없으면 집을 못 짓습니다.\n\n🏗️ 단백질이 필요한 이유:\n\n1. 성장호르몬 자체가 단백질\n   → 단백질 없으면 호르몬 생성 불가\n\n2. IGF-1 생성에 단백질이 재료\n   → 간이 IGF-1 만들 때 아미노산 필요\n\n3. 뼈 기질(콜라겐)의 30%가 단백질\n   → 칼슘이 달라붙는 구조물 형성\n\n4. 근육의 75%가 단백질\n   → 성장기 근육 발달에 필수\n\n5. 면역세포·효소·호르몬 모두 단백질\n   → 건강 유지의 기반\n\n📊 단백질 섭취가 부족하면:\n• 성장호르몬 주사를 맞아도 효과 반감\n• IGF-1 수치 저하 (영양 부족 시)\n• 성장 속도 저하\n• 면역력 저하 → 자주 아프면 성장 방해\n\n💡 아미노산의 중요성:\n• 단백질을 구성하는 기본 단위\n• 필수 아미노산 9가지: 체내 합성 불가 → 음식으로 반드시 섭취\n• 동물성 단백질: 필수 아미노산 완전 포함 (완전 단백질)\n• 식물성 단백질: 일부 필수 아미노산 부족 → 다양하게 조합 필요","tip":"성장호르몬 치료 중인 아이라면 단백질 섭취가 더욱 중요해요. 주사는 신호를 보내는 것, 단백질은 그 신호에 반응해 성장을 실행하는 재료입니다."},"protein_daily_need":{"type":"answer","title":"아이에게 하루 단백질이 얼마나 필요한가요?","content":"나이와 체중에 따라 권장량이 다릅니다.\n\n📊 연령별 권장량 (체중 1kg당):\n• 1~3세: 1.0~1.2g/kg\n• 4~13세: 0.95g/kg\n• 14~18세: 0.85g/kg\n• 운동 많이 하는 경우: 1.2~1.7g/kg\n• 성장호르몬 치료 중: 1.2g/kg 권장\n\n🧮 체중별 하루 필요량 (학령기 기준, 0.95g):\n• 20kg: 약 19g\n• 30kg: 약 28.5g\n• 40kg: 약 38g\n• 50kg: 약 47.5g\n\n📋 하루 30g 채우기 (체중 30kg 기준):\n\n아침: 달걀 1개(6g) + 우유 200mL(6.4g) = 12.4g\n점심: 닭가슴살 80g(18g) = 18g\n저녁: 두부 ¼모(8g) = 8g\n→ 합계: 38.4g ✓\n\n💡 분산 섭취가 효과적:\n한 번에 몰아 먹는 것보다 끼니마다 나눠 먹어야\n→ 단백질 합성 효율 극대화\n→ 아침 단백질이 특히 중요 (밤새 성장호르몬의 재료 공급)\n\n⚠️ 과다 섭취 주의 (2.5g/kg 이상):\n• 신장에 부담\n• 칼슘 배출 증가 (뼈 약해짐)\n• 탈수 가능성","tip":"매 끼니 단백질 식품 하나씩만 포함해도 하루 권장량이 자연스럽게 채워져요. 복잡하게 계산하기 어려우면 이 원칙 하나만 지켜보세요."},"protein_best_foods":{"type":"answer","title":"단백질 많은 음식 TOP — 현실 식단에 적용하기","content":"아이가 먹기 좋은 고단백 식품을 알려드립니다.\n\n🥩 동물성 단백질 (흡수율 높음):\n• 닭가슴살 100g: 23g ★★★\n• 참치통조림 100g: 24g ★★★\n• 연어 100g: 20g ★★★\n• 돼지 안심 100g: 22g ★★\n• 소 안심 100g: 21g ★★\n• 달걀 1개 (중): 6g ★★\n• 우유 200mL: 6.4g ★★\n• 그릭요거트 100g: 10g ★★\n• 치즈 30g: 7g ★★\n\n🌱 식물성 단백질 (다양하게 조합해야):\n• 삶은 콩 100g: 9g ★\n• 두부 100g: 8g ★\n• 땅콩버터 30g: 7g ★\n• 귀리 40g (조리 전): 5g ★\n• 아몬드 30g: 6g ★\n\n✅ 아이가 잘 먹는 형태로 변형하기:\n• 달걀: 스크램블·반숙·달걀찜·김밥 속\n• 닭: 치킨너겟·볶음·국물 요리\n• 두부: 순두부찌개·두부부침\n• 참치: 참치김밥·참치주먹밥\n• 우유: 스무디·시리얼에 적용\n\n🔑 동물성:식물성 황금 비율:\n동물성 60~70% + 식물성 30~40%\n동물성으로 필수 아미노산 확보\n식물성으로 섬유질·장 건강 챙기기","tip":"참치통조림은 단백질 챔피언! 저렴하고 조리 쉬우며 아이들도 잘 먹어요. 오일 제거 후 그냥 먹거나 밥에 비벼도 좋습니다."},"protein_timing_detail":{"type":"answer","title":"단백질 섭취 타이밍 — 언제 먹이는 게 가장 효과적인가요?","content":"언제 먹느냐도 성장에 영향을 줍니다.\n\n⭐ 최고의 타이밍 4가지:\n\n1️⃣ 아침 식사 (필수!)\n• 밤새 분비된 성장호르몬의 재료 공급\n• 아침 단백질 없으면 밤에 분비된 GH가 근육을 분해해 에너지로 사용\n• 시간 없을 때: 우유 + 삶은 달걀 하나\n\n2️⃣ 운동 후 30분~1시간 이내\n• 근육 합성 「골든타임」\n• 이 시간에 단백질 공급 → 근육 재생 + 성장 자극\n• 추천: 우유 한 잔 + 바나나\n\n3️⃣ 취침 1~2시간 전\n• 밤새 성장호르몬 분비를 위한 재료 준비\n• 단, 너무 많이 먹으면 소화로 깊은 잠 방해\n• 추천: 따뜻한 우유 1잔\n\n4️⃣ 각 끼니마다 분산\n• 3번에 나눠 먹는 것이 한 번에 몰아 먹는 것보다 합성 효율 높음\n• 매끼 15~20g 목표\n\n❌ 피해야 할 패턴:\n• 아침 굶기 + 저녁에 몰아 먹기\n• 점심에만 집중적으로 먹기\n• 운동 후 2시간 이상 굶기","tip":"아침 단백질이 가장 중요합니다. 시간이 없어도 우유 한 잔만 마셔도 6.4g의 단백질을 공급할 수 있어요."},"protein_excess":{"type":"answer","title":"단백질을 너무 많이 먹으면 안 좋은가요?","content":"「과유불급」이에요. 단백질도 적정량이 중요합니다.\n\n⚠️ 과다 섭취의 기준:\n체중 1kg당 2.5g 이상 섭취 시 문제 가능\n예) 30kg 아이 → 75g/일 이상이면 과다\n\n🚨 과다 섭취 시 부작용:\n\n신장 부담:\n• 단백질 대사 산물(요소 등)을 신장이 처리\n• 지속 과다 섭취 → 신장 여과 부담 증가\n• 신장 기능이 약한 아이는 특히 주의\n\n칼슘 배출 증가:\n• 단백질 과다 → 소변으로 칼슘 배출 증가\n• 역설적으로 뼈 건강에 마이너스\n\n탈수:\n• 단백질 대사 시 많은 물 필요\n• 수분 섭취 부족하면 탈수 위험\n\n✅ 그래도 적정 범위 내에서는 걱정 없어요:\n• 일반적인 음식으로 과다 섭취는 드묾\n• 보충제(단백질 파우더) 남용 시 주의\n\n💊 단백질 보충제 필요한 경우:\n• 극심한 편식 (고기·생선·달걀·유제품 모두 거부)\n• 채식주의 아이\n• 운동선수급 활동량\n→ 이 외에는 자연 식품이 우선","tip":"일반 식품으로만 먹는다면 과다 섭취 걱정은 거의 안 해도 돼요. 단백질 보충제(파우더 등)를 먹일 때만 용량을 주의하세요."},"zinc_deficiency_detail":{"type":"answer","title":"아연 결핍 — 성장에 어떤 영향을 주나요?","content":"아연은 「성장의 미네랄」로 불릴 만큼 중요합니다.\n\n🔬 아연의 역할:\n• GH-IGF1 축 직접 지원\n• DNA 합성에 필수 (세포 분열)\n• 200개 이상의 효소 기능에 관여\n• 식욕 조절 호르몬에 영향\n• 면역 기능 강화\n\n⚠️ 아연 결핍 신호 5가지:\n1. 성장 지연 (가장 중요)\n2. 식욕 감소 (\"밥을 안 먹어요\")\n3. 잦은 감기·감염\n4. 미각 이상 (\"맛이 없다\"고 함)\n5. 상처 회복 지연\n\n→ 아연 결핍 → 식욕 저하 → 영양 부족 → 성장 지연 악순환!\n\n🦪 아연 최고의 식품:\n• 굴 100g: 16~90mg (하루 권장량의 수배!)\n• 소고기 100g: 4~6mg\n• 달걀 1개: 0.6mg\n• 호박씨 30g: 2.2mg\n• 아몬드 30g: 0.9mg\n\n📊 연령별 권장량:\n• 1~3세: 3mg / 4~8세: 5mg\n• 9~13세: 8mg\n• 14~18세: 남아 11mg, 여아 9mg\n\n💊 아연 보충제 필요한 경우:\n• 극심한 편식\n• 채식주의 아이 (식물성은 흡수율 낮음)\n• 자주 아프고 식욕 없는 경우\n→ 의사 상담 후 보충 권장","tip":"아이가 밥을 안 먹는다면 아연 결핍을 의심해볼 수 있어요. 아연 혈액검사를 통해 확인 후 필요시 보충해보세요."},"iron_absorption_tips":{"type":"answer","title":"철분 흡수 높이는 방법 — 먹는 방법이 더 중요해요","content":"같은 음식이라도 어떻게 먹느냐에 따라 철분 흡수율이 크게 달라집니다.\n\n📊 철분 종류별 흡수율:\n• 헴철 (동물성): 15~35% 흡수\n  소고기, 닭고기, 생선, 굴, 조개\n• 비헴철 (식물성): 2~20% 흡수\n  시금치, 두부, 콩, 렌틸콩\n\n✅ 철분 흡수 UP:\n\n비타민C와 함께 먹기 (흡수율 2~3배 ↑):\n• 소고기볶음 + 파프리카 (비타민C 최다)\n• 시금치나물 + 귤 1개\n• 콩조림 + 방울토마토\n• 닭고기 + 브로콜리\n\n동물성 + 식물성 함께:\n• 고기와 채소를 같이 먹으면 비헴철 흡수도 증가\n• 예) 시금치 돼지고기볶음\n\n❌ 철분 흡수 DOWN:\n• 차·커피 (탄닌): 식사 1시간 전후 피하기\n• 칼슘 (우유·칼슘제): 철분과 흡수 경쟁\n  → 철분 보충제와 칼슘제는 2시간 간격\n• 피틴산 (통곡물, 콩): 흡수 방해\n  → 충분히 익혀 먹으면 감소\n\n🔍 철분 결핍 신호:\n• 빙식증 (얼음 씹고 싶음) ← 특징적!\n• 창백한 피부·점막\n• 쉽게 피로감\n• 집중력 저하\n• 손톱이 잘 부러짐","tip":"비타민C와 함께 먹는 것이 철분 흡수의 핵심이에요. 시금치에 귤, 고기에 파프리카 — 이 조합만 기억하세요!"},"vitk_vitc_bone":{"type":"answer","title":"비타민K·C가 뼈에 어떤 역할을 하나요?","content":"비타민D·칼슘만큼 알려지지 않았지만, 뼈 건강에 꼭 필요한 비타민들입니다.\n\n🦴 비타민K — 칼슘을 뼈에 단단히 붙이는 「접착제」\n\n역할:\n• 오스테오칼신 단백질 활성화\n• 오스테오칼신이 칼슘을 뼈에 단단히 결합\n• 혈관에 칼슘이 쌓이는 것 방지\n\n「녹색은 K」로 기억:\n• 시금치 100g: 450µg (하루 권장량의 450%!)\n• 케일 100g: 700µg\n• 브로콜리 100g: 100µg\n\n주의: 지용성이므로 기름과 함께 먹기\n→ 시금치나물에 참기름, 샐러드에 올리브유\n\n─────────────────────────────\n\n🍊 비타민C — 뼈와 연골의 「철근」\n\n역할:\n• 콜라겐 합성에 필수 (뼈 기질의 30%가 콜라겐)\n• 뼈라는 집의 철근(콜라겐) 역할\n• 식물성 철분 흡수율 2~3배 향상\n• 항산화 → 연골 손상 방지\n\n최고 식품:\n• 파프리카 (빨강/노랑) 100g: 150~200mg\n• 딸기 100g: 70mg\n• 귤 1개: 30~40mg\n• 브로콜리 100g: 90mg\n\n주의: 열에 약함 → 생으로 먹거나 짧게 살짝 데치기","tip":"비타민K는 녹색 채소에 많고, 비타민C는 색깔 있는 채소·과일에 많아요. \"매끼 초록 + 색깔 채소 1가지씩\"이면 두 비타민 모두 충분합니다."},"supplement_caution":{"type":"answer","title":"영양제 복용 시 주의사항 — 상호작용이 핵심이에요","content":"여러 영양제를 함께 먹을 때 순서와 조합이 중요합니다.\n\n⚠️ 함께 먹으면 안 되는 조합:\n\n철분 + 칼슘:\n• 같은 흡수 경로 → 서로 방해\n• 최소 2시간 간격으로 분리 복용\n\n철분 + 아연:\n• 과량 섭취 시 서로 흡수 방해\n• 음식으로 섭취하는 수준은 괜찮음\n• 보충제로 둘 다 복용 시 시간 간격\n\n✅ 함께 먹으면 좋은 조합:\n\n비타민D + 칼슘:\n• 함께 먹어야 흡수 극대화\n• 식후 함께 복용 권장\n\n철분 + 비타민C:\n• 흡수율 2~3배 향상\n• 항상 같이 먹기\n\n📋 보충제 복용 시기 권장:\n• 아침 식후: 비타민D + 칼슘 + 종합비타민\n• 점심 식후: 철분 + 비타민C (단독)\n• 취침 전 우유: 추가 칼슘\n\n⚠️ 절대 주의:\n• 철분 보충제: 아이 손에 닿지 않도록 보관\n• 과다 복용 시 심각한 중독 위험\n• 젤리·츄잉 형태 철분: 아이가 사탕으로 착각 가능\n\n💡 모든 보충제는 필요한 경우에만:\n• 균형 잡힌 식사가 가능하면 보충제 불필요\n• 편식 심할 때, 성장 지연 시 의사 상담 후 결정","tip":"여러 보충제를 동시에 먹이면 오히려 서로 방해할 수 있어요. 철분과 칼슘은 반드시 분리해서 먹여야 합니다."},"meal_snacks_detail":{"type":"answer","title":"성장기 아이에게 좋은 간식 TOP 10","content":"간식도 성장을 도울 수 있어요. 이것들을 활용해보세요.\n\n🏆 성장 최강 간식:\n\n1위. 우유 한 잔 (칼슘 220mg + 단백질 6.4g)\n2위. 그릭요거트 (단백질 10g + 칼슘)\n3위. 삶은 달걀 1~2개 (완전 단백질 6g×2)\n4위. 치즈 슬라이스 (칼슘 + 단백질)\n5위. 견과류 한 줌 (아연 + 마그네슘)\n\n✅ 과일 간식 추천:\n• 키위 1개: 비타민C 70mg (흡수 도움)\n• 딸기 10개: 비타민C 60mg\n• 바나나 1개: 마그네슘 + 에너지\n\n✅ 조합 간식:\n• 우유 + 바나나 스무디\n• 그릭요거트 + 딸기\n• 통밀 크래커 + 치즈\n• 삶은 달걀 + 방울토마토\n\n❌ 피해야 할 간식:\n• 탄산음료·에너지드링크 (칼슘 배출 + 카페인)\n• 사탕·캔디 (혈당 스파이크 → GH 억제)\n• 과자·튀김류 (영양 없고 트랜스지방)\n• 가공육 소시지 (나트륨 과다)\n\n⏰ 간식 타이밍:\n• 학교 후 오후 3~4시: 운동·놀이 전 에너지 보충\n• 취침 1~2시간 전: 우유 1잔 (밤 성장호르몬 재료)","tip":"간식도 성장의 기회예요. 과자 대신 삶은 달걀 하나, 탄산 대신 우유 한 잔으로 바꾸는 것만으로도 차이가 생깁니다."},"meal_eating_out":{"type":"answer","title":"외식할 때 어떤 메뉴를 선택하면 좋나요?","content":"외식도 현명하게 선택하면 성장에 도움이 됩니다.\n\n🥇 추천 메뉴:\n\n한식 (최고!):\n• 불고기·삼겹살 + 채소 → 단백질 + 철분\n• 삼계탕·닭볶음탕 → 단백질 + 콜라겐\n• 생선구이 + 미역국 → 오메가3 + 요오드\n• 콩비지·된장찌개 → 식물성 단백질 + 이소플라본\n\n일식:\n• 연어 덮밥 → 오메가3 + 단백질\n• 참치 초밥 → 양질의 단백질\n• 미소 된장국 → 장 건강\n\n양식:\n• 스테이크 + 샐러드 → 단백질 + 채소 밸런스\n• 오믈렛 → 달걀 단백질\n\n⚠️ 주의가 필요한 메뉴:\n• 중식: 염분 과다, 나트륨↑ → 칼슘 배출\n• 패스트푸드: 주 1회 이하로\n• 라면: 나트륨 과다, 영양 불균형\n\n💡 외식 시 팁:\n• 음식 도착 전 물 한 잔 마시기 (과식 방지)\n• 채소 반찬부터 먼저 먹기 (혈당 안정화)\n• 국물 적게 먹기 (나트륨 줄이기)\n• 다음 날 채소·물 섭취 늘리기 (보상)","tip":"외식 다음 날은 채소를 평소보다 많이, 탄산 대신 물을 많이 마셔보세요. 하루의 균형이 틀어진 걸 다음 날 보완하는 「주간 균형」이 중요해요."},"meal_active_child":{"type":"answer","title":"운동 많이 하는 아이 — 식단을 다르게 해야 하나요?","content":"운동량이 많은 아이는 일반 아이보다 더 많은 영양이 필요합니다.\n\n📊 운동하는 아이 vs 일반 아이 차이:\n\n칼로리:\n• 일반 아이 + 300~500kcal 추가\n• 하루 1~2시간 이상 운동 시\n\n단백질:\n• 일반: 0.95g/kg → 운동: 1.2~1.7g/kg\n\n탄수화물:\n• 운동 에너지원으로 충분히\n• 흰쌀밥·빵 OK (운동 시에는 탄수화물 에너지 필요)\n\n⭐ 운동 후 30분~1시간이 핵심:\n「운동 후 골든타임」에 이것들 주세요:\n• 탄수화물 + 단백질 조합\n• 예시: 바나나 1개 + 우유 200mL\n• 예시: 삶은 달걀 2개 + 과일\n• 예시: 참치 주먹밥\n\n✅ 운동하는 아이 하루 식단 예시:\n• 아침: 달걀 2개 + 우유 + 통밀빵\n• 점심: 닭고기 덮밥 + 야채 충분히\n• 운동 후 간식: 바나나 + 우유\n• 저녁: 생선구이 + 밥 + 나물\n• 취침 전: 우유 1잔\n\n⚠️ 주의:\n• 운동 중 수분 보충 필수 (목 마르기 전에)\n• 과도한 단백질 보충제는 불필요 (자연식품으로 충분)","tip":"축구·수영·태권도 등 활발하게 운동하는 아이라면 점심 도시락에 고기 반찬을 한 가지 더 추가하는 것만으로도 큰 도움이 됩니다."},"meal_short_child":{"type":"answer","title":"저신장 아이 — 특별히 신경 써야 할 영양소","content":"저신장 아이는 일반 아이보다 몇 가지 영양소를 더 신경 써야 합니다.\n\n🎯 저신장 아이 우선 영양소:\n\n1위. 단백질 (체중당 1.2g 이상)\n• 성장호르몬의 재료\n• 매 끼니 단백질 식품 필수\n\n2위. 칼슘 (1,000~1,300mg)\n• 뼈의 원재료\n• 우유 하루 3잔 이상 목표\n\n3위. 비타민D (800~1,000 IU)\n• 칼슘 흡수율 결정\n• 보충제 필요한 경우 많음\n\n4위. 아연 (권장량 상한 내)\n• IGF-1 생성에 필요\n• 식욕 저하 시 결핍 확인\n\n5위. 철분 (특히 여아)\n• 빈혈 시 성장 방해\n• 비타민C와 함께 섭취\n\n📋 아침 식사 절대 안 거르기:\n• 밤새 분비된 성장호르몬의 재료 공급\n• 아침 굶으면 호르몬이 근육을 분해해 에너지로 사용\n\n🥛 저체중 + 저신장 아이:\n• 영양 밀도 높은 식품 추가\n  → 견과류, 아보카도, 올리브유\n• 식사 횟수 늘리기 (하루 5~6회)\n• 아연 결핍 여부 확인\n\n💊 영양제 점검:\n혈액검사로 확인 후 필요한 것만:\n• 비타민D 수치 확인\n• 아연, 철분 상태 확인","tip":"저신장 아이에게 \"많이 먹어야 한다\" 강요보다 \"좋은 것을 골라 먹는다\"는 방식이 더 효과적이에요. 아침 식사 꼭 챙기는 것이 가장 중요합니다."},"acanthosis_explain":{"type":"answer","title":"흑색극세포증 — 때가 아니라 인슐린 저항성 신호예요","recommend":true,"content":"목 뒤, 겨드랑이, 사타구니가 까맣게 두꺼워지는 「흑색극세포증(Acanthosis Nigricans)」은 때가 아닙니다.\n\n🔬 원인:\n혈중 인슐린이 높아지면 (고인슐린혈증)\n→ 피부 세포(각질형성세포)를 과도하게 자극\n→ 색소 침착 + 피부 두꺼워짐\n→ 까맣고 벨벳 같은 질감의 피부\n\n✅ 이것이 의미하는 것:\n• 인슐린 저항성 존재 = 대사증후군·당뇨 전 단계\n• 소아 비만에서 매우 흔함 (비만 청소년 70% 이상 동반)\n• 아무리 씻어도 없어지지 않아요 (피부 문제가 아니라 대사 문제)\n\n📍 주로 나타나는 부위:\n• 목 뒤쪽 (가장 흔함)\n• 겨드랑이\n• 사타구니\n• 손가락 관절 (드물지만 있음)\n\n💡 관리:\n• 흑색극세포증 자체 치료보다 인슐린 저항성 개선이 목표\n• 체중 5~10% 감량 + 운동 + 식이 개선\n• 4~6개월 내 인슐린 저항성 개선되면 피부도 서서히 개선\n• 심한 경우 메트포르민 처방 가능","tip":"흑색극세포증은 몸이 '인슐린 위험 신호'를 피부로 표현한 거예요. 발견 즉시 소아내분비과에서 인슐린 저항성 검사(HOMA-IR)를 받아보세요."},"white_coat_hypertension":{"type":"answer","title":"백의 고혈압 — 병원에서만 혈압이 높게 나와요","content":"의사의 흰 가운(백의)을 보면 긴장해서 병원에서만 혈압이 높게 나오는 현상입니다.\n\n📊 얼마나 흔한가요?\n• 소아청소년의 30~40%가 해당\n• 생각보다 매우 흔해요\n\n✅ 진짜 고혈압과 구별 방법:\n• 가정혈압 측정: 집에서 편안한 상태로 아침·저녁 2회씩 1주일 측정\n• 24시간 활동혈압 측정(ABPM): 가장 정확, 일상생활 중 자동 측정\n\n📏 소아청소년 고혈압 기준:\n• 단순한 수치 기준 없음\n• 나이·성별·키에 따른 백분위 기준\n• 95백분위 이상이면 고혈압\n\n🏥 진짜 고혈압이면:\n• 원인 탐색: 비만, 신장 질환, 부신 종양 등\n• 비만이 원인인 경우가 가장 흔함\n• 체중 감량 5~10%로 혈압 10~15mmHg 하강 가능\n• 생활습관 개선으로도 상당 부분 조절\n\n💡 가정에서 혈압 재는 팁:\n• 5분 안정 후 측정\n• 상완(팔 위쪽) 크기에 맞는 커프 사용\n• 같은 팔, 같은 자세로 일관되게","tip":"병원에서 한 번 높게 나왔다고 바로 고혈압 진단하지 않아요. 가정혈압을 일주일 기록해서 의사에게 보여주세요."},"dyslipidemia_explain":{"type":"answer","title":"이상지질혈증 — 콜레스테롤과 중성지방이 비정상인 상태","content":"혈액 속 콜레스테롤과 중성지방 수치가 비정상인 상태를 이상지질혈증이라고 합니다.\n\n📊 진단 기준:\n• 총 콜레스테롤 ≥200 mg/dL\n• LDL(나쁜 콜레스테롤) ≥130 mg/dL\n• HDL(좋은 콜레스테롤) 남아 <40, 여아 <50 mg/dL\n• 중성지방 ≥130 mg/dL\n\n⚠️ 왜 무서운가요?\n• 비만 아이의 40~50%가 이상지질혈증\n• 증상이 없어서 모르고 지나침\n• 10대에 이미 혈관 내 지방 축적(동맥경화 초기) 시작\n• 방치하면 20~30대에 심근경색·뇌졸중 위험\n\n✅ 치료 전략:\n1. 생활습관 개선 우선 (6~12개월)\n   • 체중 10% 감량 → LDL 10~15% 감소, 중성지방 30% 감소\n   • 탄산음료 → 물 교체 (중성지방 2주 내 반응)\n2. 약물 치료 (생활습관 실패 시)\n   • 스타틴: 10세 이상 사용 가능\n   • LDL 30~50% 감소 효과\n   • 장기 안전성 확인됨\n\n💡 중성지방 가장 빠르게 낮추는 법:\n탄산음료를 물로 바꾸면 2주 내 반응!","tip":"이상지질혈증은 증상이 없어요. 비만한 아이라면 반드시 혈액검사로 확인하세요. 초등학생 때 관리 시작하면 성인 심혈관 질환 위험을 크게 낮출 수 있습니다."},"metabolic_cure":{"type":"answer","title":"대사증후군, 완치될 수 있나요?","content":"「완치」보다는 「정상화」와 「평생 관리」의 개념으로 접근해야 합니다.\n\n✅ 좋은 소식:\n청소년기에 적극 관리하면 진단 기준에서 완전히 벗어날 수 있습니다!\n\n📊 정상화 가능한 조건:\n• 체중 7~10% 감량\n• 규칙적인 운동 (주 5회, 30~60분)\n• 균형 잡힌 식단 (특히 정제 탄수화물·당분 줄이기)\n• 충분한 수면\n\n📈 단계별 개선:\n1단계 (2~4주): 중성지방 개선 (탄산음료 끊기만 해도)\n2단계 (1~3개월): 혈당·인슐린 저항성 개선\n3단계 (3~6개월): 혈압·콜레스테롤 개선\n4단계 (6~12개월): 체중 감량으로 전반적 정상화\n\n🎯 최종 목표:\n진단 기준에서 벗어나 정상 대사 상태 회복\n→ 성인이 되어 심혈관 질환 위험을 처음부터 없던 사람 수준으로 낮추는 것\n\n⚠️ 주의사항:\n• 생활습관을 다시 예전으로 돌리면 재발 가능\n• 「완치」 후에도 건강한 생활습관 유지 필요\n• 1~2년에 한 번 추적 검사 권장","tip":"청소년기의 대사증후군은 어른보다 훨씬 빠르게 개선돼요. 지금 시작하면 성인 만성질환을 예방할 수 있습니다."},"diabetes_chronic_complications":{"type":"answer","title":"소아청소년 당뇨의 만성 합병증","recommend":true,"content":"당뇨병 만성 합병증은 수년에 걸쳐 서서히 진행되며, 소아기 발병은 더욱 심각합니다.\n\n⚠️ 만성 합병증 종류:\n\n🫀 심혈관 질환 (가장 위험)\n• 심근경색 위험 5배\n• 뇌졸중 위험 3배\n• 소아기 발병 시 20~30대에 이미 위험 시작\n\n🫘 신장 질환 (당뇨 신증)\n• 신부전 2.7배\n• 투석 필요해질 수 있음\n\n👁️ 눈 질환 (당뇨 망막병증)\n• 실명 원인 1위\n• 어린이 발병 시 더 오래 노출\n\n🦵 신경 합병증\n• 손발 저림, 통증\n• 감각 저하\n\n🦶 발 궤양\n• 상처 회복 지연 → 감염 → 절단\n\n✅ 합병증 예방 핵심:\n• HbA1c 7% 미만 유지\n• 정기 안과·신장·발 검사\n• 혈압·콜레스테롤 관리\n• 금연 (흡연은 합병증 위험 폭발적 증가)\n\n📅 추적 검사 일정:\n• 매 3개월: HbA1c\n• 매년: 안과 검진, 신장 기능, 신경 검사","tip":"소아기에 발병하면 합병증에 더 오래 노출됩니다. 혈당 관리가 지금 당장 나쁘게 느껴지지 않더라도, 10~20년 후를 위해 꼭 철저하게 관리해야 해요."},"obesity_height_myth":{"type":"answer","title":"\"살 찌면 키로 간다\" — 이건 위험한 오해예요!","content":"어른들 사이에 퍼진 이 말은 의학적으로 틀렸습니다. 오히려 반대예요.\n\n❌ 왜 틀린 말인가요?\n\n비만 → 체지방 ↑ → 렙틴·인슐린 ↑ → 성호르몬 분비 촉진\n→ 성조숙증 발생 가능\n→ 성장판이 일찍 닫힘\n→ 최종 키가 더 작아짐!\n\n📊 실제 연구 결과:\n• 비만 + 성조숙증 동반 시: 유전 목표 키보다 5~8cm 작아질 수 있음\n• 비만만 있어도: 여아 2.3cm, 남아 3.1cm 덜 큼 (스웨덴 대규모 연구)\n\n초등 저학년에는 또래보다 5~8cm 크게 보이는 경우가 있지만\n→ 이건 뼈나이가 빠른 것\n→ 성장판이 일찍 닫혀서 중학교 이후 오히려 최단신이 될 수 있음\n\n✅ 올바른 이해:\n• 적정 체중 유지 = 성장판 보호\n• 체중 관리 = 키 성장 관리\n• 살이 키로 가는 게 아니라, 살이 키를 막는다","tip":"우리 부모님 세대의 경험담이 아이에게는 독이 될 수 있어요. 지금은 과식보다 균형 잡힌 영양이 훨씬 중요합니다."},"obesity_longterm":{"type":"answer","title":"소아비만 → 성인비만으로 이어지나요?","content":"안타깝게도 이어지는 경우가 많습니다.\n\n📊 연구 통계:\n• 소아비만의 75~80%: 성인비만으로 이어짐\n• 고도비만 아이: 절반 이상이 성인비만 지속\n• 사춘기 비만은 어린 시절 비만보다 더 지속성 높음\n\n🔬 왜 이어지나요?\n\n1. 지방세포 수가 결정되는 시기 문제:\n• 사춘기에 지방세포 수가 고정됨\n• 이때 지방세포가 많이 만들어지면\n• 평생 살찌기 쉬운 체질\n\n2. 식습관·생활습관의 지속:\n• 어릴 때 형성된 습관은 성인이 되어도 유지\n• 뇌의 포만 중추 역치가 높게 설정\n\n3. 대사 경로의 프로그래밍:\n• 비만 상태가 오래 지속되면 인슐린 저항성·지방 축적 패턴이 고착\n\n✅ 그러나 청소년기 개입은 효과적:\n• 아직 지방세포 수가 확정되기 전에 개입 가능\n• 생활습관을 바꾸면 되돌릴 수 있음\n• 성인이 되기 전에 정상 체중 달성 → 성인비만 위험 크게 감소","tip":"중학교 이전에 관리를 시작하는 것이 결정적으로 중요해요. 사춘기가 오면 지방세포 수가 고정되기 시작합니다."},"eating_speed_obesity":{"type":"answer","title":"빨리 먹는 습관 — 비만의 숨은 원인이에요","content":"빨리 먹는 습관이 비만을 만드는 것은 과학적으로 증명됩니다.\n\n🧠 포만감의 작동 원리:\n• 위장에 음식이 들어오면 → 포만 호르몬(렙틴, CCK, PYY) 분비\n• 이 신호가 뇌(시상하부)에 도달하는 시간: 최소 15~20분\n• 20분보다 빨리 먹으면 → 이미 과식 후에 배부름을 느낌\n\n📊 연구 결과:\n• 빨리 먹는 아이: 천천히 먹는 아이보다 비만 위험 1.5~2배\n• 식사 시간 5분 미만: 과체중 위험 3배\n\n✅ 천천히 먹기 실천법:\n\n1. 최소 20분 식사 목표:\n• 타이머 놓고 20분 이상 먹기\n• 밥 중간에 숟가락 내려놓기 습관\n\n2. 꼭꼭 씹기 (20~30회):\n• 소화에도 도움\n• 포만 호르몬 분비 시간 확보\n\n3. 식사 중 스크린 OFF:\n• TV·스마트폰 보며 먹으면 포만감 인식 방해\n• 집중해서 맛을 느끼며 먹기\n\n4. 작은 그릇 사용:\n• 시각적 포만감 증가\n• 반자동적으로 적게 담게 됨","tip":"식사 시간을 타이머로 재보세요. 10분이 안 된다면 위험 신호예요. 20분을 목표로 아이와 함께 「느리게 먹기 챌린지」를 해보는 건 어떨까요?"},"obesity_prevention_timing":{"type":"answer","title":"비만 예방 — 언제부터 시작해야 하나요?","content":"임신 중 엄마의 건강 관리부터 시작됩니다.\n\n⏰ 생애주기별 비만 예방 골든타임:\n\n🤰 임신기:\n• 엄마의 과체중·임신성 당뇨 → 태아의 대사 이상 위험\n• 임신 중 적절한 체중 증가 (13~18kg)\n• 모유 수유가 소아비만 예방에 도움\n\n👶 생후 0~2세 (1차 골든타임):\n• 지방세포 수 증식 시작\n• 음식 다양성 노출 시기\n• 주스·단 음료 절대 금지\n• 이 시기 형성된 맛 선호도가 평생 지속\n\n🧒 5~7세 「지방 반등기」(2차 골든타임):\n• Adiposity Rebound: 체지방이 한 번 더 증가하는 생리적 시기\n• 이 시기에 반등이 빠를수록 성인비만 위험↑\n• 신체활동 줄어드는 시기 (유치원→초등) → 주의 필요\n\n🎒 학령기 (8~12세):\n• 학업 스트레스 → 감정적 섭식 패턴 시작\n• 디지털 기기 사용 증가 → 신체활동 감소\n• 학교 급식 + 가정 식사 병행 관리 필요\n\n📌 핵심:\n• 비만이 생기기 전에 예방이 훨씬 쉬움\n• 치료보다 예방의 효율이 10배","tip":"5~7세가 비만 예방의 숨은 골든타임이에요. 이 시기에 신체활동 습관과 건강한 식이 패턴을 잡아두면 평생의 건강이 달라집니다."}},
"zh":{"start":{"type":"question","text":"您好！我是三星자라다小儿内分泌科的成长健康咨询机器人。请问您有什么问题？","options":[{"text":"担心孩子的身高生长","next":"growth_main"},{"text":"想了解生长激素治疗","next":"growth_hormone"},{"text":"担心性早熟","next":"puberty_main"},{"text":"担心肥胖/超重","next":"obesity_main"},{"text":"孩子有血糖/脂肪肝等代谢问题","next":"metabolism_main"},{"text":"想了解有助于生长的营养和饮食","next":"nutrition_main"}]},"growth_main":{"type":"question","text":"请告诉我孩子的年龄段：","options":[{"text":"0~3岁（婴幼儿期）","next":"growth_0_3"},{"text":"4~8岁（学龄前·小学低年级）","next":"growth_4_8"},{"text":"9~13岁（小学高年级·初中生）","next":"growth_9_13"},{"text":"14岁以上（初中生以上）","next":"growth_14plus"},{"text":"感觉生长速度突然变慢了","next":"growth_slowdown"},{"text":"想了解骨龄检查","next":"growth_boneage"}]},"growth_0_3":{"type":"question","text":"0~3岁阶段，孩子的生长情况如何？","options":[{"text":"出生时偏小，现在仍未追上来","next":"ans_sga"},{"text":"正常出生，但生长落后","next":"ans_growth_0_3_normal"},{"text":"父母偏矮，孩子也偏矮","next":"ans_familial_short"},{"text":"多矮需要去检查？","next":"ans_growth_check_needed"}]},"ans_sga":{"type":"answer","title":"小于胎龄儿（SGA）——早期发现很重要","recommend":true,"content":"出生时体重或身高低于同胎龄第3百分位的情况称为「小于胎龄儿（SGA）」。\n\n✅ 好消息：85~90%的孩子在出生后2年内能追赶上来。\n\n⚠️ 需要关注的情况：\n• 满4周岁时身高仍在第3百分位以下（约10~15%）\n• 这类孩子从满4岁起可享受医保报销的生长激素治疗\n\n📊 治疗效果：平均增加5~7cm\n• 越早开始效果越好\n• 4岁以后再开始效果有限\n\n📌 建议：\n• 每3个月测量身高，追踪生长速度\n• 满4岁前观察自然追赶，如未追上则立即开始治疗","tip":"4岁前如能自然追赶当然最好。若未追赶，4岁起立即就诊小儿内分泌科是最佳选择。"},"ans_growth_0_3_normal":{"type":"answer","title":"正常出生后生长迟缓——首先查找原因","recommend":true,"content":"正常出生但生长落后的情况，主要原因如下：\n\n1️⃣ 甲状腺功能减退症\n• 最常见的内分泌原因\n• 症状：活动量减少、皮肤干燥、便秘、无力\n• 通过简单血液检查即可确认，治疗后生长可恢复正常\n\n2️⃣ 生长激素缺乏症\n• 婴儿期生长激素缺乏可能表现为低血糖或黄疸持续\n• 脸部圆润、略显肥胖时需怀疑\n• IGF-1血液检查可进行筛查\n\n3️⃣ 营养不良\n• 母乳不足、偏食等\n• 体重同时偏轻时营养问题可能性高\n\n4️⃣ 慢性疾病\n• 先天性心脏病、肾脏疾病、消化系统疾病等\n• 频繁感冒、喂养困难、呕吐时需怀疑\n\n📌 推荐检查：甲状腺功能、IGF-1、一般血液检查、骨龄X光","tip":"0~3岁是生长最快的阶段，此时发现问题完全可以追赶上来。"},"ans_familial_short":{"type":"answer","title":"家族性矮小——首先准确评估","content":"父母都偏矮，孩子也偏矮的情况称为「家族性矮小」。\n\n📌 特征：\n• 生长速度正常（每年5~6cm）\n• 骨龄与实际年龄相符\n• 身高百分位稳定，保持在较低水平\n\n🧮 遗传目标身高（MPH）计算：\n• 男孩：（父亲身高＋母亲身高＋13）÷2，误差±5~10cm\n• 女孩：（父亲身高＋母亲身高－13）÷2，误差±5~10cm\n\n例：父亲170cm，母亲158cm\n→ 男孩预测：（170+158+13）/2=170.5cm（实际范围160~180cm）\n→ 女孩预测：（170+158-13）/2=157.5cm（实际范围147~167cm）\n\n⚠️ 即使是家族性矮小，以下情况仍需就诊：\n• 当前身高比预测低10cm以上\n• 生长速度突然下降\n• 每年生长不足4cm\n\n✅ 单纯家族性矮小无需治疗，通过健康生活习惯即可。","tip":"是遗传因素还是其他原因导致的矮小，需要通过骨龄检查和IGF-1检查来区分。"},"ans_growth_check_needed":{"type":"answer","title":"建议进行专科检查","recommend":true,"content":"父母身高正常但孩子偏矮，或比预测身高低很多时，需要进行评估。\n\n🔬 推荐检查项目：\n\n1. 骨龄检查 ⭐（最重要）\n• 左手X光，约5分钟，完全无痛\n• 了解生长潜力＋预测最终身高\n• 比父母身高公式准确2倍（误差±3~5cm vs ±8~10cm）\n\n2. IGF-1血液检查\n• 生长激素功能筛查\n• 一次采血即可（无需空腹）\n\n3. 甲状腺功能（TSH、游离T4）\n• 甲状腺功能减退是生长迟缓的常见原因\n\n4. 一般血液检查\n• 确认贫血、炎症、肝肾功能\n\n5. 生长激素激发试验（必要时）\n• IGF-1偏低或生长速度异常时追加\n• 约2~3小时，采血4~6次（留置针，无需反复穿刺）\n• 峰值10ng/mL以上为正常\n\n💡 检查费用参考：\n• 骨龄+IGF-1+甲状腺功能：合计约5~8万韩元\n• 生长激素激发试验：约追加15~25万韩元","tip":"越早找到原因，治疗效果越好。生长板还开着的现在，不要等6个月以上，尽快就诊专科医生。"},"growth_4_8":{"type":"question","text":"4~8岁阶段，孩子的生长情况如何？","options":[{"text":"父母偏矮，孩子也偏矮","next":"ans_familial_short"},{"text":"在100名中排名第3~5位（3~5百分位）","next":"ans_growth_check_needed"},{"text":"感觉每年不到4cm","next":"growth_slowdown"},{"text":"个子矮，需要做哪些检查？","next":"ans_growth_check_needed"}]},"growth_9_13":{"type":"question","text":"9~13岁阶段，孩子的情况如何？","options":[{"text":"还没到青春期，个子比较矮","next":"ans_9_13_no_puberty"},{"text":"青春期来得早，担心生长停止","next":"ans_9_13_early_puberty"},{"text":"青春期已经进入中后期，还有治疗机会吗？","next":"ans_9_13_late_puberty"},{"text":"感觉生长速度突然变慢","next":"growth_slowdown"}]},"ans_9_13_no_puberty":{"type":"answer","title":"青春期前阶段——现在是治疗黄金期","recommend":true,"content":"还没开始青春期是生长治疗的黄金期！\n\n🌟 为什么青春期前更好？\n• 生长板还完全开放\n• 生长激素治疗效果约为青春期开始后的2倍\n• 治疗2年以上效果显著增加\n\n📊 通过骨龄确认剩余生长可能性：\n• 女孩骨龄11岁前：治疗机会充足\n• 男孩骨龄12岁前：治疗机会充足\n\n✅ 推荐检查：骨龄X光、IGF-1血液检查、生长激素激发试验（必要时）\n\n💰 符合医保条件时：\n• 每月约21~36万韩元（药费的30%）\n• 治疗效果：根据疾病不同可改善5~13cm","tip":"青春期开始后，生长板会迅速关闭。现在评估，选择更多。"},"ans_9_13_early_puberty":{"type":"answer","title":"青春期提前+担心身高——需同时关注两方面","recommend":true,"content":"青春期来得早意味着「急速生长期」提前，生长板也将提前关闭。\n\n⚠️ 性早熟的悖论：\n• 初期：比同龄人高5~8cm，看起来长得很好\n• 后期：生长板提前关闭，最终身高可能比遗传预测低5~15cm\n\n📊 研究结果（欧洲长期随访）：\n• 未治疗的性早熟：女孩比遗传目标身高平均矮10cm\n• 男孩平均矮20cm\n\n🔍 现在需要做的：\n1. 骨龄检查：确认生长板还剩多少\n2. GnRH激发试验：确认是否为真性性早熟\n3. 生长激素检查：同时确认生长激素状态\n\n💡 治疗选择：\n• GnRH治疗（性早熟治疗）暂时停止青春期\n• 必要时联合生长激素治疗，可额外增加4~6cm","tip":"青春期提前也可以通过适时治疗保住最终身高。请立即就诊小儿内分泌科。"},"ans_9_13_late_puberty":{"type":"answer","title":"青春期中后期——准确了解剩余机会","recommend":true,"content":"青春期中后期需先通过骨龄检查确认剩余治疗机会。\n\n📊 骨龄与治疗可能性：\n• 女孩骨龄11岁未满：治疗效果充足\n• 女孩骨龄11~12岁：有效果但有限\n• 女孩骨龄12~13岁：效果微小（也是医保报销终止时点）\n• 女孩骨龄14岁以上：治疗无意义\n\n• 男孩骨龄12岁未满：治疗效果充足\n• 男孩骨龄12~14岁：有限\n• 男孩骨龄16岁以上：医保报销终止\n\n⏱️ 速度很重要：\n初潮后还能再长约5~7cm，但每年骤降至2~3cm。\n初潮前1~2年是急速生长期的最后机会。\n\n✅ 现在可以做的：\n• 骨龄+预测最终身高确认\n• 如果生长板仍开放，立即开始治疗","tip":"不要放弃说太晚了。如果生长板还开着，即使几个月的治疗也有意义。"},"growth_14plus":{"type":"answer","title":"14岁以上——先确认生长板状态","recommend":true,"content":"14岁以上是生长板逐渐关闭的时期。但也许还不算晚。\n\n📊 生长板状态确认基准：\n• 女孩骨龄14~15岁：生长板几乎关闭，治疗效果几乎没有\n• 男孩骨龄15~17岁：几乎关闭\n• 医保报销也是女孩满12岁、男孩满13岁生日前一天截止\n\n🔍 仍需确认的：\n1. 骨龄检查：确认实际骨龄（可能与日历年龄不同）\n2. 如果青春期来得晚，骨龄可能比实际年龄低\n3. 特别是男孩14岁有时仍有治疗效果\n\n💡 一个希望：\n「体质性生长延迟」（晚长型）情况：\n• 骨龄比实际低2~4年\n• 甚至到大学时还在继续长高\n• 父亲/母亲也有晚长的历史时可能性高","tip":"失望前先做骨龄检查。如果骨龄低，可能还有充足的生长可能性。"},"growth_slowdown":{"type":"answer","title":"生长速度突然变慢——重要的警示信号","recommend":true,"content":"生长速度突然变慢是重要的警示信号。\n\n📊 按年龄的正常生长速度：\n• 1~2岁：每年10~12cm\n• 3~4岁：每年8~10cm\n• 5~10岁（青春期前）：每年5~7cm ← 此时不足4cm需检查\n• 青春期急速生长期：每年8~10cm\n\n⚠️ 以下情况中有一项即需就诊：\n• 青春期前孩子1年生长不足4cm\n• 生长速度比以前明显突然减少\n• 6个月内身高百分位持续下降2个以上主要百分位线\n\n🔍 可能原因：\n1. 生长激素缺乏症\n2. 甲状腺功能减退症\n3. 慢性疾病恶化\n4. 心理性原因\n5. 营养不良\n6. 性早熟","tip":"每3个月记录一次身高，可以准确掌握生长速度。有记录，诊断更容易。"},"growth_boneage":{"type":"answer","title":"骨龄检查——最准确了解生长潜力","content":"骨龄检查是评估孩子生长潜力的最重要检查。\n\n🔬 检查方法：\n左手X光1张（约5分钟，完全无痛，放射量极少）\n手和手腕共有27块小骨，精度高。\n\n📊 预测精度比较：\n• 父母身高公式：误差±8~10cm（16~20cm范围）\n• 骨龄预测：误差±3~5cm（青春期前）/ ±2~3cm（青春期后半）\n\n🎯 骨龄告诉我们的：\n• 当前生长板状态（还开多少）\n• 预期最终身高\n• 治疗开始/终止时机判断基准\n• 骨龄比实际年龄超过2年：提前关闭风险\n• 骨龄比实际年龄低2年：生长机会充足\n\n⚠️ 注意事项：\n• 不同医生判读可能有6个月~1年误差\n• 近期引入AI判读，精度提升\n• 满5岁以上才能得到有意义的结果\n\n🏥 治疗终止基准：\n• 性早熟治疗：女孩骨龄12岁，男孩13岁\n• 生长激素治疗：女孩骨龄14岁，男孩16岁","tip":"骨龄检查是生长的指南针。知道骨骼年龄才能准确掌握剩余生长机会。"},"growth_hormone":{"type":"question","text":"关于生长激素治疗，您想了解哪方面？","options":[{"text":"我的孩子是治疗对象吗？","next":"gh_eligible"},{"text":"治疗的话能长多少？","next":"gh_effect"},{"text":"费用和医保报销是？","next":"gh_cost"},{"text":"有副作用吗？","next":"gh_safety"},{"text":"注射方法是什么？","next":"gh_injection"},{"text":"什么时候开始/停止治疗？","next":"gh_timing"}]},"gh_eligible":{"type":"question","text":"孩子目前的诊断或情况是什么？","options":[{"text":"诊断为生长激素缺乏症","next":"ans_gh_deficiency"},{"text":"特纳综合征（女孩，染色体异常）","next":"ans_gh_turner"},{"text":"出生时偏小，现在也未追上（小于胎龄儿）","next":"ans_gh_sga"},{"text":"检查都正常，就是个子矮（特发性矮小）","next":"ans_gh_iss"},{"text":"普拉德-威利/努南综合征/慢性肾功能不全","next":"ans_gh_other"},{"text":"还没做过检查","next":"ans_gh_no_test"}]},"ans_gh_deficiency":{"type":"answer","title":"生长激素缺乏症——治疗效果最确实","recommend":true,"content":"生长激素缺乏症治疗效果最确实，可享受健康保险报销。\n\n📊 治疗效果：\n• 治疗第1年平均8~10cm生长（部分12cm以上）\n• 第2年起每年6~7cm（同龄5~6cm以上）\n• 整体改善10~13cm\n• 早期开始可达20cm以上\n\n⚠️ 不治疗会怎样？\n欧洲长期随访研究结果：\n• 女孩：比遗传目标身高平均矮10cm\n• 男孩：比遗传目标身高平均矮20cm\n\n💉 治疗方法：\n• 每公斤体重0.025~0.035mg/日皮下注射\n• 体重30kg基准 → 每日0.75~1.05mg\n• 每3~6个月重新调整用量\n\n💰 健康保险报销：\n• 报销时个人负担：每月21~36万韩元（药费的30%）\n• 报销终止：骨龄女孩14岁/男孩16岁，或每年生长不足2cm时\n\n✅ 报销条件：\n• 2种以上激发试验峰值均不足10ng/mL\n• 身高3百分位以下\n• 骨龄低于实际年龄","tip":"越早开始效果越大。青春期前治疗2年以上，效果约为2倍。"},"ans_gh_turner":{"type":"answer","title":"特纳综合征——越早开始越好","recommend":true,"content":"特纳综合征是X染色体一条缺失的状态（45,X），可享受健康保险报销。\n\n📊 治疗效果：\n• 平均增加7~8cm\n• 不治疗时平均最终身高约143cm\n• 治疗后约150cm → 7~8cm差异在日常生活中意义重大\n\n💉 治疗方法：\n• 单独生长激素，或联合雌激素\n• 雌激素：通常从11~12岁开始低剂量，诱导自然青春期\n• 联合雌激素时最终身高改善效果更大\n\n💰 报销条件：\n• 身高3百分位以下\n• 染色体检查（核型分析）确诊\n• 与生长激素激发试验结果无关（特纳综合征本身为报销对象）\n\n⏱️ 开始时机：\n• 越早越好（越小，治疗期越长，效果↑）\n• 通常可从2~4岁开始","tip":"特纳综合征很多情况下不会自然来青春期。生长激素和雌激素开始时机的规划很重要。"},"ans_gh_sga":{"type":"answer","title":"小于胎龄儿（SGA）——满4岁起可享报销治疗","recommend":true,"content":"出生时偏小但未追赶上来的孩子，从满4岁起可享受健康保险报销治疗。\n\n📊 治疗效果：平均增加5~7cm\n• 越早开始最终身高越接近正常\n• 青少年期以后开始效果有限\n\n✅ 报销条件：\n• 出生时体重或身高低于3百分位（需要记录）\n• 满4岁后身高/体重仍在3百分位以下\n• 满4岁前等待自然追赶\n\n⚠️ 重要提示：\n• 出生记录（分娩记录）很重要——必须保存出生时体重/身高记录\n• 2025年1月起报销强化：需要4岁前出生记录文件\n\n💰 费用：\n• 报销时：每月21~36万韩元\n• 治疗期：通常2~4年（以骨龄为基准终止）","tip":"满4岁前等待自然追赶，4岁后仍在3百分位以下则立即开始治疗。"},"ans_gh_iss":{"type":"answer","title":"特发性矮小（ISS）——需要慎重决定","content":"所有检查都正常但就是个子矮的情况，称为「特发性矮小（ISS）」。\n\n⚠️ 诚实的效果说明：\n• 平均效果仅3~5cm（个体差异大：有的7cm，有的几乎为0）\n• 治疗前难以预测效果\n• 超过遗传目标身高在现实中很难实现\n\n💰 费用现实：\n• 不能享受报销 → 100%自费\n• 每月70~120万韩元（根据体重不同）\n• 治疗2~3年总费用：约2,000~4,000万韩元\n\n📋 决定前必须考虑：\n1. 孩子是否因身高真的有心理痛苦\n2. 第1年反应确认后再决定：每年5cm以上则继续，不足3cm则考虑停止\n3. 孩子本人的意愿（每天需要打针）\n4. 家庭经济状况和长期计划\n\n🌟 国际指南：\n美国小儿内分泌学会也推荐「共同决策」\n→ 不是医生单方决定，而是家庭充分了解所有信息后自主选择","tip":"特发性矮小不需要着急决定。充分咨询后，综合经济和心理条件再决定。"},"ans_gh_other":{"type":"answer","title":"其他报销对象疾病","recommend":true,"content":"普拉德-威利综合征、努南综合征、慢性肾功能不全也是报销对象。\n\n🔵 普拉德-威利综合征：\n• 15号染色体异常导致的遗传疾病\n• 效果：平均增加6~8cm\n• 主要目的是增加肌肉量和减少体脂肪\n• 肥胖倾向强，治疗中体重管理必不可少\n• 推荐从婴儿期开始（为了肌肉发育）\n• 报销条件：基因检查确诊\n\n🔵 努南综合征：\n• 外观与特纳综合征相似，但原因是基因突变\n• 效果：平均增加4~6cm（个体差异大）\n• 合并心脏疾病时，治疗前需要进行精密心脏检查\n• 报销条件：相关基因检查确诊+身高3百分位以下\n\n🔵 慢性肾功能不全伴矮小：\n• 效果：平均增加5~7cm\n• 移植前治疗，移植后生长板仍开放时可继续\n• 必须定期监测肾功能\n• 报销条件：身高3百分位以下+骨龄低","tip":"这些疾病的生长激素治疗不仅对身高，对整体健康和生活质量也有帮助。"},"ans_gh_no_test":{"type":"answer","title":"第一步：专科检查","recommend":true,"content":"没有做过检查的话，无法知道孩子是否需要治疗。先就诊小儿内分泌科。\n\n🔬 基本检查顺序：\n\nStep 1. 骨龄X光（左手）\n• 最先、最重要\n• 了解生长潜力和预测最终身高\n• 约5分钟，无痛，低放射线\n\nStep 2. 血液检查\n• IGF-1：生长激素功能筛查\n• 甲状腺功能（TSH、游离T4）\n• 一般血液检查（贫血、炎症等）\n• 肝肾功能\n\nStep 3. 生长激素激发试验（必要时）\n• IGF-1偏低或生长速度异常时追加\n• 约2~3小时，采血4~6次（留置针）\n• 峰值不足10ng/mL时怀疑生长激素缺乏症\n• 为享受医保需要进行2种以上不同方法的检查\n\n💡 检查费用参考：\n• 骨龄+IGF-1+甲状腺：合计约5~8万韩元\n• 生长激素激发试验：约追加15~25万韩元","tip":"根据检查结果才知道是否需要治疗、适合哪种治疗。现在推迟检查会减少治疗机会。"},"gh_effect":{"type":"answer","title":"生长激素治疗效果——因疾病和时机而不同","content":"根据诊断和开始时机，效果差异很大。\n\n📊 各疾病平均效果：\n🥇 生长激素缺乏症 → 10~13cm（第1年8~10cm）\n🥈 特纳综合征 → 7~8cm\n🥉 小于胎龄儿（SGA）→ 5~7cm\n　　普拉德-威利 → 6~8cm（增加肌肉量是主效果）\n　　努南综合征 → 4~6cm\n　　慢性肾功能不全 → 5~7cm\n　　特发性矮小 → 3~5cm（个体差异大）\n\n⏰ 开始时机是关键：\n• 骨龄6岁以下开始 → 最大效果（平均追加7.4cm）\n• 骨龄8~9岁开始 → 适当效果\n• 骨龄11岁以后开始 → 效果急剧减少\n• 骨龄14岁以后 → 几乎没有效果，医保报销也终止\n\n🌟 最大化效果的4个条件：\n1️⃣ 早期开始：青春期前2年以上治疗效果约为2倍\n2️⃣ 规律注射：每天不漏\n   → 依从性提升10%时每年追加约1.1cm\n3️⃣ 适当用量：每3~6个月根据体重增加重新计算\n4️⃣ 充足睡眠·营养并行","tip":"生长激素治疗不是短期内戏剧性地变高，而是数年间持续比治疗前稍微多长一点。"},"gh_safety":{"type":"answer","title":"生长激素安全性——40年验证的治疗","content":"生长激素治疗非常安全。从1985年起使用基因重组技术生产的产品。\n\n✅ 安全的理由：\n• 与我们身体自然产生的激素100%相同结构（氨基酸191个）\n• 身体不会将其识别为「外来物质」\n• 全球使用40年以上，数百万人的治疗数据\n\n📋 轻微副作用（3%以下）：\n• 注射部位发红/瘙痒/浮肿 → 1~2周内好转\n• 头痛 → 1~2周后大部分消失\n• 肌肉痛/关节痛 → 类似生长痛，2~4周后好转\n• 手脚轻微浮肿 → 时间过后消失\n\n⚠️ 少见但需了解的副作用：\n• 甲状腺功能减退症：治疗开始1年内约10~20%可能发生 → 通过血液检查确认，用药易纠正\n• 血糖升高：仅在肥胖/有糖尿病家族史的孩子中注意 → 每年血糖检查\n• 脊柱侧弯：定期检查时确认\n• 股骨头骨骺分离：极罕见，突然跛行/髋关节疼痛时立即就诊\n\n🚫 癌症风险：健康孩子大规模长期研究没有增加\n🚫 肢端肥大症：治疗剂量范围内绝对不会发生","tip":"治疗中出现异常症状时，请务必告知主治医生。定期血液检查和外来就诊是安全治疗的核心。"},"gh_cost":{"type":"answer","title":"生长激素费用和保险——提前了解准备好","content":"生长激素药费根据体重和诊断不同而异，基本范围如下。\n\n💰 基本药费：\n• 每月70~120万韩元（每公斤体重约2.5~4万韩元/月）\n• 体重增加则用量增加，费用也增加\n例）20kg孩子 → 每月约50~80万韩元\n例）40kg孩子 → 每月约100~160万韩元\n\n📋 享受报销时：\n• 个人负担30% → 每月21~36万韩元\n• 医院自动处理，无需单独申请报销\n\n📋 报销终止基准（符合以下任一）：\n• 骨龄：女孩14~15岁/男孩15~16岁\n• 身高：女孩超过153cm/男孩超过165cm\n• 每年生长：不足2cm\n\n⚠️ 不能享受报销的情况：\n• 特发性矮小：100%自费\n• 每月70~120万韩元全额负担\n• 治疗2~3年总费用：约2,000~4,000万韩元\n\n💡 节税技巧——医疗费税额抵减：\n• 年度医疗费中超过总所得3%部分×15%抵减\n• 例）所得5千万韩元+年医疗费500万韩元\n  → 500万-150万（3%）=350万×15%=52.5万韩元节税\n• 6岁未满：没有限额\n• 7岁以上：年700万韩元限额","tip":"治疗期越长费用越大。首次就诊时与医生提前相谈预期治疗期和总费用。"},"gh_injection":{"type":"answer","title":"生长激素注射方法——一开始紧张，很快就习惯了","content":"每天皮下注射。一开始紧张，但大部分1~2周就习惯了！\n\n💉 基本信息：\n• 针头粗细：0.23mm（比蚊子嘴还细）\n• 皮下注射 → 比肌肉注射痛得少得多\n• 最佳时间：临睡前（晚9~10时）\n  → 与睡眠中生长激素自然分泌高峰相配合\n\n🎯 注射部位4处轮换（每天换）：\n1. 腹部：距肚脐5cm以上左右（最佳选择）\n2. 大腿：前面及外侧上1/3部位\n3. 上臂后面：三头肌部位\n4. 臀部：外上方\n\n⚠️ 一直打同一部位会怎样？\n脂肪凹陷（凹进去）或硬结（硬块）→ 影响药物吸收 → 治疗效果减少\n\n📋 注射程序：\n1. 洗手（20秒以上）\n2. 从冰箱取出15~30分钟回温（冷药更痛）\n3. 酒精棉消毒皮肤，晾干10~15秒\n4. 轻轻捏起皮肤2~3cm\n5. 90度垂直快速刺入（犹豫更痛）\n6. 按到底并「保持10秒」（防逆流核心！）\n7. 90度快速拔出 → 纱布压10秒（不要揉，否则会瘀青）\n\n📦 保管及管理：\n• 2~8°C冷藏保管（禁止冷冻）\n• 开封后28~30天内使用\n• 旅行时冰袋+冰箱包\n• 每3~6个月重新测量体重→调整用量","tip":"每天同一时间注射形成习惯，就不会漏打了。依从性越高，治疗效果越大。"},"gh_timing":{"type":"answer","title":"治疗开始和终止时机——以骨龄为基准","content":"生长激素治疗的开始和终止以骨龄为基准判断。\n\n🟢 治疗开始时机：\n• 越早越好（骨龄越低，效果↑）\n• 最佳时机：青春期开始前\n• 青春期前2年以上治疗效果约为2倍\n\n🔴 治疗终止基准（医保报销终止）：\n• 女孩骨龄14~15岁/男孩骨龄15~16岁\n• 女孩身高超过153cm/男孩超过165cm\n• 每年生长不足2cm\n\n💡 报销终止后继续自费治疗：\n• 医学上认为有必要时可自费继续\n• 如果骨龄达到基准但仍在生长2cm以上，与医生商量\n\n📅 治疗中监测时间表：\n• 最初3个月：每月就诊（身高/体重，确认副作用）\n• 稳定期：每3~6个月就诊\n• 每3~6个月：IGF-1检查（目标0~+2标准差）\n• 每6~12个月：骨龄X光\n• 每年1次：甲状腺功能、血糖","tip":"突然停止治疗生长速度会下降。终止时机与医生充分商量后决定。"},"puberty_main":{"type":"question","text":"关于性早熟（青春期过早开始）有什么担心？","options":[{"text":"女儿好像在发育乳房","next":"puberty_girl"},{"text":"儿子的睾丸好像在增大","next":"puberty_boy"},{"text":"出现了体味/阴毛/痤疮（没有乳房/睾丸变化）","next":"ans_false_puberty"},{"text":"个子突然长得很快","next":"ans_rapid_growth"},{"text":"想了解性早熟治疗（GnRH注射）","next":"gnrh_treatment"},{"text":"想了解性早熟+生长激素联合治疗","next":"gnrh_gh_combo"}]},"puberty_girl":{"type":"question","text":"女儿几岁了？","options":[{"text":"满8周岁生日前（性早熟基准）","next":"puberty_girl_under8"},{"text":"满8~10岁之间","next":"puberty_girl_8_10"},{"text":"满10岁以后，乳房发育刚开始","next":"puberty_girl_normal"},{"text":"不知道是乳房发育还是脂肪","next":"puberty_girl_unsure"}]},"puberty_girl_under8":{"type":"answer","title":"满8岁未满乳房发育——需立即就诊小儿内分泌科","recommend":true,"urgent":true,"content":"满8岁（户籍周岁）前乳房发育是医学定义的性早熟。需要快速评估。\n\n📌 准确计算周岁的方法：\n以出生日期为基准的周岁=今年-出生年（当年生日还未到则-1）\n\n🔬 医院将进行的检查：\n1. 骨龄X光（最重要）\n   → 确认超前多少\n2. GnRH激发试验（真性vs假性鉴别核心）\n   → LH峰值5IU/L以上=真性性早熟确诊\n   → 90分钟，采血5次（留置针）\n3. 腹部超声（子宫·卵巢大小确认）\n4. 脑部MRI\n   → 满6岁以下：必须\n   → 6~8岁：进展快或有神经症状时\n\n⚠️ 治疗必要性判断：\n• 骨龄比实际年龄超前2年以上且进展快 → 积极考虑治疗\n• 骨龄未超前很多且进展慢 → 可以观察\n\n📊 不治疗会怎样？\n• 女孩比遗传目标身高平均矮10cm（欧洲长期研究）\n• 初潮可能在9~10岁提前","tip":"快速诊断和治疗是保护最终身高的关键。发现的那一刻，请不要拖延，立即就诊小儿内分泌科。"},"puberty_girl_8_10":{"type":"question","text":"满8~10岁的乳房发育，情况如何？","options":[{"text":"最近刚发现","next":"puberty_girl_new"},{"text":"3~6个月内明显增大","next":"puberty_girl_progress"},{"text":"6个月以上了，几乎没有变化","next":"puberty_girl_stable"},{"text":"不知道是乳房发育还是脂肪","next":"puberty_girl_unsure"}]},"puberty_girl_new":{"type":"answer","title":"新发现的乳房发育——接受评估","recommend":true,"content":"最近刚发现的话，请在小儿内分泌科接受评估。\n\n📌 满8~10岁乳房发育：\n• 满8岁以后在医学上不是「性早熟」基准，但仍需评估\n• 8~9岁：进展快则考虑治疗/慢则观察\n• 9~10岁：已在正常青春期范围内\n\n🔍 评估要点：\n• 进展速度是否快？（6个月内2期以上进展）\n• 骨龄是否比实际年龄超前2年以上？\n• 是否来了急速生长期？\n• 预测最终身高是否比遗传目标低5cm以上？\n\n📊 治疗基准（符合以下时考虑）：\n• GnRH激发试验LH峰值5IU/L以上\n• 骨龄比实际年龄超前2年以上\n• 预测最终身高明显低于遗传目标\n• 进展快速造成心理困扰","tip":"记录发现发育的日期和变化速度，对医生很有帮助。"},"puberty_girl_progress":{"type":"answer","title":"乳房发育快速进展——尽快就诊","recommend":true,"content":"3~6个月内持续增大的话，进展速度快，可能需要评估和治疗。\n\n⚠️ 快速进展的意义：\n• 骨龄也可能快速超前\n• 生长板提前关闭风险\n• 预测最终身高持续下降可能\n\n📊 GnRH治疗效果（骨龄基准）：\n• 骨龄6岁前开始：平均追加7.4cm改善（最佳效果）\n• 骨龄8~9岁开始：有效果但有限\n• 骨龄10~11岁开始：更有限\n• 骨龄11岁以上：几乎没有效果\n\n🔬 现在需要的检查：\n1. 骨龄X光\n2. GnRH激发试验（LH峰5IU/L↑=真性性早熟）\n3. 腹部超声（子宫·卵巢成熟度）\n4. 脑部MRI（必要时）\n\n💉 开始治疗（GnRH注射）时：\n• 快速的青春期进展停止或减缓\n• 骨龄进展速度正常化\n• 初潮延迟到与同学差不多时间\n• 预防最终身高损失","tip":"进展越快，越要快速开始才有效果。今天就预约吧。"},"puberty_girl_stable":{"type":"answer","title":"6个月以上无变化——可能是乳腺早期发育","content":"很长时间了但没有变化的话，可能是「乳腺早期发育（Premature Thelarche）」。\n\n📊 乳腺早期发育的特征：\n• 只有乳房发育，没有其他青春期征兆\n  （没有阴毛、阴道分泌物、身高急速增长）\n• 骨龄正常或稍微超前\n• 生长速度正常（每年5~6cm）\n• GnRH激发试验：LH峰值低（<2IU/L，FSH中心反应）\n\n✅ 预后：\n• 90%以上无治疗自然好转\n• 51%乳腺组织完全消失\n• 2岁内发生时进展为性早熟的概率约2%\n\n⚠️ 但仍需定期观察：\n• 最初每3~6个月外来就诊\n• 确认事项：乳房大小变化、阴毛/阴道分泌物有无、生长速度\n\n🔴 出现以下症状立即就诊：\n• 乳房突然快速增大\n• 出现阴毛或阴道分泌物\n• 身高突然快速增长","tip":"乳腺早期发育大部分不用担心。但定期检查是必要的。"},"puberty_girl_normal":{"type":"answer","title":"满10岁以后乳房发育——正常青春期范围","content":"满10岁以后的乳房发育是正常青春期的开始。\n\n📊 女孩青春期正常时机：\n• 乳房发育开始：平均9~11岁（8~13岁为正常范围）\n• 阴毛发育：通常乳房发育6个月~1年后\n• 急速生长期：乳房发育开始6个月~1年后\n• 初潮：乳房发育开始后平均2~2.5年（平均12~13岁）\n\n📈 初潮后的生长：\n• 初潮前1年：约8~10cm生长（急速生长最高峰）\n• 初潮后1年：约2~3cm\n• 初潮后2年：约1~2cm\n• 此后生长几乎停止 → 总追加5~7cm\n\n✅ 不需要担心的情况：\n• 青春期阶段自然进展\n• 骨龄比实际年龄差距在1年以内\n• 预测最终身高在遗传目标身高范围内\n\n⚠️ 需要就诊的情况：\n• 6个月内青春期急剧进展2期以上\n• 初潮看起来会在10岁前来\n• 预测最终身高比遗传目标低5cm以上","tip":"正常青春期开始了。通过均衡营养和充足睡眠最大化剩余生长。"},"puberty_girl_unsure":{"type":"answer","title":"乳腺组织vs脂肪——区别方法","content":"很多父母都问同样的问题。可以简单区分。\n\n👆 在家确认的方法：\n• 乳腺组织：乳头正下方感觉到小小硬块\n  （轻轻按压可能略微疼痛，感觉像纽扣或小石子）\n• 脂肪堆积：整体软软的\n  （乳头下方没有硬的部分）\n\n📊 只有一侧先出现的情况：\n正常！乳腺早期发育或青春期初期只有一侧先出现的情况非常常见。\n\n🏥 在医院确认的方法：\n• 医生触诊（摸着确认）\n• 乳房超声：乳腺组织vs脂肪可以明确区分，完全无痛\n• 超声确认乳腺组织=乳房发育开始\n\n✅ 在家感觉到硬块的话：\n满8岁前请立即就诊，满8岁后观察变化后就诊","tip":"不确定时在医院用超声确认是最准确的。检查本身简单，5~10分钟就可以了。"},"puberty_boy":{"type":"question","text":"儿子孩子有什么变化？","options":[{"text":"睾丸好像增大了（满9岁未满）","next":"ans_boy_precocious"},{"text":"变声、身高急速增长来了","next":"ans_boy_signs"},{"text":"只有阴毛/体味，没有睾丸变化","next":"ans_boy_false_puberty"},{"text":"青春期好像太晚了（满14岁以上）","next":"ans_boy_delayed"}]},"ans_boy_precocious":{"type":"answer","title":"满9岁前睾丸增大——需立即进行专科评估","recommend":true,"urgent":true,"content":"男孩满9岁（户籍周岁）前睾丸增大是性早熟基准。\n\n📏 睾丸大小基准：\n• 4mL以上（长径约2.5cm以上）=青春期开始\n• 睾丸大小父母难以确认，需专科医生诊查\n\n⚠️ 男孩性早熟更严重的原因：\n• 与女孩不同，男孩器质性病变（脑肿瘤等）可能性更高\n• 过去器质性原因：40~75% → 近年7~16%降低，但仍需注意\n• 男孩性早熟罕见，因此需要更彻底的检查\n\n🔬 必须接受的检查：\n1. 骨龄X光（必须）\n2. GnRH激发试验（LH峰5IU/L↑=真性）\n3. 脑部MRI（男孩必须）\n   → 排除下丘脑过误瘤（良性肿瘤）、垂体肿瘤等\n4. 血中性激素（睾酮、LH、FSH、DHEA-S）\n5. 睾丸超声（排除睾丸肿瘤）\n\n💰 费用：\n• 基本检查+脑部MRI：约25~45万韩元\n• 报销时大幅减少（确认脑部病变时大部分报销）\n\n📊 治疗效果：\n• 欧洲长期随访：不治疗男孩平均比遗传目标矮20cm\n• 比女孩（矮10cm）损失更大","tip":"男孩性早熟很罕见，因此需要更积极地评估。尽快就诊小儿内分泌科。"},"ans_boy_signs":{"type":"answer","title":"青春期信号——时机和速度是核心","content":"变声、胡须、身高急速增长是青春期中后期信号。\n\n📊 男孩青春期顺序：\n1. 睾丸增大（4mL↑）← 青春期开始\n2. 阴毛发育（睾丸增大后6个月~1年）\n3. 身高急速生长期（睾丸增大后1~2年，平均13~15岁）\n   → 每年9~10cm急速增长，约2~3年持续\n4. 变声（与急速生长差不多时期）\n5. 胡须发育（青春期最后信号）\n   → 长出胡须说明急速生长接近结束\n\n📈 男孩总青春期生长：\n• 急速生长期：25~30cm（比女孩多5~7cm）\n• 比女孩晚2年开始青春期，反而持续2~3年更长\n• 这就是男性平均高13cm的理由\n\n✅ 正常范围：\n• 青春期开始：10~12岁\n• 9岁前开始=性早熟\n• 14岁以后还没开始=青春期延迟需评估","tip":"长出胡须就说明急速生长期快要结束了。最大化剩余生长的生活习惯很重要。"},"ans_boy_false_puberty":{"type":"answer","title":"假性性早熟——原因不同","content":"没有睾丸变化，只有阴毛·体味时，假性性早熟（肾上腺性）可能性高。\n\n📌 真性vs假性区别：\n• 真性：脑部信号→睾丸/卵巢刺激→性激素分泌\n  男孩：睾丸先增大\n• 假性：与脑无关，肾上腺直接分泌雄激素\n  男孩：睾丸大小正常，只有阴毛/体味/痤疮\n\n🔬 最常见原因——早发肾上腺功能亢进：\n• 肾上腺早期分泌DHEA-S\n• 大部分预后良好（很少进展为完全青春期）\n• 但需确认1~2年内是否进展为真性性早熟 → 追踪观察必要\n\n⚠️ 需要确认的理由：\n罕见但肾上腺肿瘤或先天性肾上腺皮质增生可能是原因\n必须进行血液检查（DHEA-S、睾酮、17-OHP）\n\n⚠️ 注意：\nGnRH激发试验中无LH反应 → 确认假性性早熟\nGnRH治疗对假性性早熟无效（需要原因治疗）","tip":"只有阴毛或体味但睾丸大小正常，需要完全不同的方法。必须接受专科医生诊查。"},"ans_boy_delayed":{"type":"answer","title":"男孩青春期延迟——大部分是体质性的","recommend":true,"content":"男孩满14岁仍无睾丸增大（4mL↑）时，评估为青春期延迟。\n\n📊 体质性生长延迟（60~80%）：\n• 晚开花型——最终正常生长\n• 特征：父母中有一方也晚长（父亲「高三时才长高」等）\n• 骨龄比实际年龄低1~3年\n• 即使个子矮，生长速度本身正常（每年4~5cm）\n\n✅ 可以等待的情况：\n• 父亲晚长的既往史\n• 骨龄低（生长板还充分开放）\n• 检查正常（生长激素、甲状腺等）\n\n⚠️ 病理性青春期延迟的可能性：\n• 克兰费尔特综合征（47,XXY）\n• 垂体功能异常\n• 慢性消耗性疾病\n• 严重营养不良\n\n💊 治疗选择（体质性情况）：\n• 大部分等待就会自然来青春期\n• 严重心理压力时：少量睾酮诱导青春期\n• 最终身高在正常范围内\n\n🔬 检查：骨龄+生长激素激发试验+染色体检查","tip":"体质性青春期延迟不需要担心。熬过朋友们都长高、相对显矮的时期，最终能达到正常身高。"},"ans_false_puberty":{"type":"answer","title":"假性性早熟——原因不同，治疗也不同","content":"没有乳房发育（女孩）或睾丸增大（男孩），只有阴毛·体味·痤疮时，怀疑「假性性早熟」。\n\n🔵 真性vs假性比较：\n区分 | 真性性早熟 | 假性性早熟\n脑部信号 | 有 | 没有\n女孩 | 乳房先发育 | 没有乳房发育\n男孩 | 睾丸先增大 | 睾丸大小正常\n共同 | LH↑、FSH↑ | DHEA-S↑、LH正常\n治疗 | GnRH注射 | 原因治疗\n\n📌 最常见原因——早发肾上腺功能亢进：\n• 肾上腺早期分泌DHEA-S\n• 大部分预后良好，自然进展为正常青春期\n• 但随时间推移可能进展为真性 → 追踪观察必要\n\n⚠️ 罕见但需注意：\n• 肾上腺肿瘤、卵巢/睾丸肿瘤\n• 先天性肾上腺皮质增生（男孩男性激素过多）\n\n🔬 必要检查：DHEA-S、睾酮、17-OHP（肾上腺来源确认）、GnRH激发试验（排除真性）","tip":"假性性早熟与真性原因完全不同，GnRH注射无效。准确鉴别很重要。"},"ans_early_menarche":{"type":"answer","title":"初潮来得早——确认剩余生长机会","recommend":true,"content":"初潮是急速生长期即将结束的信号。\n\n📊 初潮后平均生长量：\n• 初潮当年：约2~3cm\n• 下一年：约1~2cm\n• 之后：几乎没有生长\n• 初潮后总生长：约5~7cm\n\n📌 通过骨龄确认剩余生长：\n初潮后马上，如果骨龄12岁未满，仍可能有治疗机会。\n\n⚠️ 初潮在10岁前来的话：\n性早熟治疗可能来晚了。需要骨龄X光确认。\n\n✅ 最大化剩余生长战略：\n• 充足睡眠（推荐晚10点前就寝）\n• 蛋白质+钙+维生素D充足摄取\n• 最小化压力\n• 规律运动（跳绳、排球等跳跃运动）","tip":"初潮后也不要放弃。通过骨龄检查准确掌握剩余机会后再决定。"},"ans_rapid_growth":{"type":"answer","title":"个子突然长得很快——可能是性早熟信号","recommend":true,"content":"个子突然快速增长可能是性早熟的初期信号。\n\n⚠️ 性早熟的悖论：\n• 初期：比同龄人高5~8cm，看起来长得很好\n• 身高百分位也突然上升\n• 后期：生长板提前关闭，最终身高可能比预期矮5~15cm\n\n📊 正常生长vs性早熟初期生长：\n• 正常：每年5~7cm（青春期前）\n• 性早熟初期：每年8~10cm以上（急速生长期提前开始）\n\n🔍 同时确认的：\n• 乳房发育（女孩）/睾丸增大（男孩）\n• 阴毛、体味、痤疮\n• 最近身高百分位变化记录\n\n🔬 推荐检查：\n• 骨龄X光（生长板成熟度确认）\n• GnRH激发试验（青春期进展与否）\n• 血中性激素数值","tip":"个子长得多不要高兴，先通过骨龄检查确认生长板状态。"},"gnrh_treatment":{"type":"answer","title":"GnRH治疗（性早熟治疗）详细说明","content":"用于真性性早熟的GnRH类似物（激动剂）注射。\n\n🔬 作用原理：\n持续占用脑垂体GnRH受体 → 脱敏（desensitization）\n→ LH·FSH分泌减少 → 性激素抑制 → 青春期进展停止\n\n💊 药物种类：\n• 亮丙瑞林系列：Luprin（루프린）、Lupeer（루페어）、Eligard\n• 曲普瑞林系列：Diphereline（디페렐린）、Decapeptyl（데카펩틸）\n• 可选1个月型/3个月型/6个月型\n\n💉 注射方法：\n• 肌肉注射（臀部）：曲普瑞林系列\n• 皮下注射（腹部）：部分亮丙瑞林系列\n• 肌肉注射生物利用率约为皮下注射的1.5~2倍\n\n⏱️ 注射间隔（绝对不能晚）：\n• 1个月型：25~29日内（绝对不能晚2周以上）\n• 3个月型：77~87日内\n• 6个月型：154~175日内\n\n💰 费用：\n报销时：\n• 1个月型：每次约4~5万韩元（月4~5万韩元）\n• 3个月型：每次约12~15万韩元\n非报销时：\n• 1个月型：每次约11万韩元\n• 3个月型：每次约33万韩元\n\n✅ 报销条件（2025年1月强化）：\n• 需要满8岁前（女孩）/满9岁前（男孩）开始的第二性征记录\n• GnRH激发试验LH峰值5IU/L以上\n• 骨龄超前\n• 报销期间：女孩满12岁生日前一天/男孩满13岁生日前一天\n\n🕒 治疗期间和终止：\n• 通常2~4年\n• 终止：女孩骨龄12~12.5岁/男孩骨龄13~13.5岁\n• 初潮：治疗终止后平均约1年后","tip":"注射日期绝对不能拖延。晚了性激素可能再次升高（突破现象）。"},"gnrh_gh_combo":{"type":"answer","title":"GnRH+生长激素联合治疗——什么时候考虑？","content":"性早熟治疗（GnRH）中同时使用生长激素的联合治疗。\n\n🎯 联合治疗适应证：\n符合以下一项以上时考虑：\n① 骨龄预测最终身高在3百分位以下\n② GnRH单独治疗中每年生长不足4cm（相对生长激素不足）\n③ 遗传目标身高比预测身高明显低\n\n📊 效果：\n• GnRH单独：保存预测身高（防止损失）\n• 联合治疗：比单独多追加4~6cm改善\n• 示例：目标155cm → 单独154~157cm → 联合160~162cm\n\n机制：\n• GnRH：骨龄进展减慢（争取时间）\n• 生长激素：额外刺激IGF-1通路（与性激素独立通路）\n• 两种效果产生协同效应\n\n💰 费用（联合时）：\n• GnRH（非报销）：每月约11万韩元\n• 生长激素（自费）：每月约80~130万韩元（根据体重）\n• 合计：每月约91~141万韩元\n• 1年费用：约1,000~1,600万韩元\n• 2~3年总费用：约2,000~5,000万韩元\n\n⚠️ 生长激素报销：\n性早熟联合的生长激素大部分不能报销\n→ 但同时确诊生长激素缺乏症时可报销（罕见）\n\n✅ 联合治疗开始建议：\nGnRH单独6~12个月治疗后确认生长反应后决定\n→ 每年生长不足4cm时积极考虑联合","tip":"费用负担大，但通过这个治疗可能获得的身高差异也很大。与主治医生充分相谈后家庭共同决定。"},"obesity_main":{"type":"question","text":"关于肥胖有什么担心？","options":[{"text":"想了解孩子是否肥胖的诊断标准","next":"obesity_diagnosis"},{"text":"肥胖会影响身高生长吗？","next":"obesity_height"},{"text":"肥胖会诱发性早熟吗？","next":"obesity_puberty"},{"text":"脖子后面/腋下变黑了","next":"ans_acanthosis"},{"text":"想了解肥胖管理方法","next":"obesity_management"}]},"obesity_diagnosis":{"type":"answer","title":"小儿肥胖诊断标准——与成人标准不同","content":"孩子不能适用成人标准（BMI25以上）。以年龄·性别的百分位数判断。\n\n📊 小儿BMI百分位分类：\n• 5百分位未满 → 低体重\n• 5~84百分位 → 正常\n• 85~94百分位 → 超重（注意阶段）\n• 95百分位以上 → 肥胖\n• 95百分位的120%以上 → 重度肥胖\n\n🧮 BMI计算法：\n体重（kg）÷身高（m）²=BMI\n例）身高140cm（1.4m），体重45kg → BMI=45÷1.96≈23\n\n📏 肥胖度（对比标准体重）：\n• （实际体重-标准体重）÷标准体重×100\n• +10~+20%：超重\n• +20~+30%：轻度肥胖\n• +30~+50%：中度肥胖\n• +50%↑：重度肥胖\n\n⚖️ 体脂率（最准确）：\n• 男孩25%以上 → 肥胖\n• 女孩30%以上 → 肥胖\n• 体成分分析仪（InBody）测量，无痛\n\n⚠️ 需立即就诊：\n• BMI95百分位以上\n• 肥胖且个子矮时（怀疑内分泌疾病）","tip":"肥胖但个子也矮时，可能不是单纯肥胖。单纯肥胖孩子反而比同龄人个子更高的情况多。"},"obesity_height":{"type":"answer","title":"肥胖对身高生长的影响——初期高但最终吃亏","content":"肥胖孩子的生长是「快进模式」——初期快，但早结束。\n\n📊 两种面貌：\n\n✅ 初期（父母喜欢的阶段）：\n• 比同龄人高5~8cm，身高75~95百分位\n• 骨龄超前0.5~1.5年\n• 理由：脂肪→瘦素↑→IGF-1↑，胰岛素↑→生长板刺激\n\n⚠️ 后期（实际问题）：\n• 青少年期青春期早期开始\n• 生长板提前关闭 → 比预想更早停止生长\n• 朋友们还在长高时已经停了\n\n📊 研究结果：\n• 只有肥胖的情况：女孩少长2.3cm，男孩少长3.1cm（瑞典大规模研究）\n• 肥胖+快速性早熟并发时：比遗传目标身高低5~8cm\n\n💡 但是，单纯肥胖（无性早熟）对最终身高影响可能不大。\n\n🎯 核心：\n肥胖→性早熟诱发→最终身高损失 这个连接才是问题。\n\n✅ 对策：\n体重管理就是身高管理","tip":"小学时比朋友高就放心的话，中学时可能会变矮。"},"obesity_puberty":{"type":"answer","title":"肥胖与性早熟的关系——体重管理就是青春期管理","content":"肥胖是性早熟最重要的危险因素之一。\n\n🔬 机制：\n脂肪↑→瘦素（Leptin）↑→脑Kisspeptin系统↑\n→GnRH分泌↑→LH·FSH↑→性激素↑→青春期提前开始\n\n瘦素是调节食物摄入的激素，同时也是开始青春期的信号物质。\n\n📊 研究结果：\n• 肥胖持续1年以上的女孩：性早熟风险增加\n• 肥胖女孩的性早熟发生率：正常体重女孩的约2~3倍\n\n✅ 体重管理的好处：\n• 瘦素减少→提前青春期风险减少\n• 胰岛素抵抗改善→性激素正常化\n• 骨龄进展速度正常化\n\n⚠️ 成长期急剧体重减量是禁忌：\n目标是「长高同时维持体重」，急剧节食会妨碍生长","tip":"担心性早熟就进行体重管理是最好的预防。特别是小学入学前形成健康饮食习惯很重要。"},"ans_acanthosis":{"type":"answer","title":"黑棘皮症——胰岛素抵抗的皮肤信号","recommend":true,"content":"脖子后面、腋下、腹股沟变黑变厚的「黑棘皮症（Acanthosis Nigricans）」。\n\n🔍 特征：\n• 怎么洗也像有污垢一样\n• 像天鹅绒一样柔软且厚实的感觉\n• 最常见部位：脖子后面、腋下、腹股沟\n\n🧬 为什么会出现？\n血液中胰岛素浓度升高时（高胰岛素血症）\n→皮肤细胞（角质形成细胞）过度增殖\n→黑色素沉着\n→黑色且厚实的皮肤形成\n\n胰岛素高=有胰岛素抵抗的信号\n胰岛素抵抗=糖尿病前期·代谢综合征的前阶段\n\n📊 统计：\n• 有黑棘皮症的肥胖青少年70%以上存在高胰岛素血症\n• 60%以上确认胰岛素抵抗\n\n✅ 需要的检查：\n• 空腹胰岛素（15µU/mL↑=高胰岛素血症）\n• HOMA-IR（胰岛素抵抗指标）\n• 空腹血糖、糖化血红蛋白\n• 血中脂质（胆固醇、中性脂肪）\n\n💡 治疗：\n• 不是直接治疗黑棘皮症，而是先治疗胰岛素抵抗\n• 体重5~10%减量+运动+饮食改善\n• 4~6个月内胰岛素抵抗好转时皮肤也逐渐改善","tip":"黑棘皮症是身体发出的「正在走向糖尿病」的皮肤警报。发现时请务必在小儿内分泌科接受胰岛素抵抗检查。"},"obesity_management":{"type":"question","text":"关于肥胖管理方法，您想了解哪方面？","options":[{"text":"想了解饮食疗法","next":"ans_obesity_diet"},{"text":"想了解运动方法","next":"ans_obesity_exercise"},{"text":"想了解整体生活习惯","next":"ans_obesity_lifestyle"},{"text":"有需要药物治疗的情况吗？","next":"ans_obesity_medicine"}]},"ans_obesity_diet":{"type":"answer","title":"成长期儿童的肥胖饮食疗法","content":"⚠️ 最重要的原则：绝对不能让孩子「挨饿」！\n目标是「饮食构成最优化」。\n\n📋 5个核心饮食原则：\n\n1️⃣ 每餐包含1种蛋白质食品\n早餐：鸡蛋·牛奶·酸奶·奶酪中选一个\n午餐：肉·鱼·豆腐·鸡蛋中选一个\n晚餐：鱼或豆腐（一周3~4次肉类）\n\n2️⃣ 一天2~3次乳制品（补钙）\n\n3️⃣ 餐盘一半装蔬菜\n各种颜色蔬菜（每种颜色营养素不同）\n\n4️⃣ 白米饭→杂粮饭，白面包→全麦面包\n减少精制碳水化合物，减少血糖飙升\n\n5️⃣ 饮料只喝水（禁止果汁·碳酸饮料）\n100%纯果汁糖分也很高\n\n🚫 绝对禁止：\n• 让孩子挨饿（妨碍生长，肌肉损失）\n• 以食物作为奖惩\n• 只有孩子一个人节食（全家一起）\n• 夜宵（特别是晚9点以后→妨碍生长激素正常分泌）\n\n📊 比热量数字更重要的是营养比例：\n碳水化合物50~60% / 蛋白质15~20% / 脂肪20~30%","tip":"吃饭时关掉电视和手机！边看屏幕边吃饭，大脑难以准确感知饱腹感，容易不知不觉过量进食。"},"ans_obesity_exercise":{"type":"answer","title":"适合成长期儿童的运动","content":"📌 目标：每天60分钟以上中等强度运动（WHO推荐）\n中等强度=略微气喘但可以说话的程度\n\n✅ 推荐运动：\n• 快步走：全家饭后散步30分钟\n• 游泳：对关节无负担，全身运动\n• 自行车、足球、篮球、羽毛球\n• 跳绳：刺激生长板+提高心肺功能\n\n💪 关于力量训练的误解：\n「孩子做力量训练个子不长」→ ❌ 错误常识！\n美国儿科学会2020·2024指南：积极推荐\n• 适当设计的力量训练对生长板·身体无害\n• 反而有助于提高骨密度\n• 对肥胖孩子，有时力量训练比有氧运动更有效\n\n✅ 推荐力量训练（自体重量）：\n• 深蹲、俯卧撑、平板支撑、弓步\n\n📅 运动持续诀窍：\n1. 选择孩子喜欢的运动（强迫的运动坚持不住）\n2. 与父母一起（父母运动时孩子积极活动的概率5倍↑）\n3. 从小变化开始：楼梯代替电梯，近距离步行","tip":"「运动30分钟」听起来有压力，但「换上运动服」很容易——把习惯分解成2分钟内可以做的最小行动。"},"ans_obesity_lifestyle":{"type":"answer","title":"生活习惯改善——每天1%的魔法","content":"🌟 每天1%变化的魔法：\n今天多走一层楼梯，明天多喝一杯水——积累起来6个月后孩子会完全不同。\n（每天1%改善=1年后提升约37倍）\n\n📱 减少屏幕时间：\n• 6岁以上：非学习目的每天2小时以下\n• 屏幕5小时以上：肥胖风险5倍\n• 吃饭时禁止屏幕（妨碍饱腹感认知）\n\n😴 充足的睡眠：\n• 小学生（6~12岁）：每天9~12小时\n• 初高中生（13~18岁）：8~10小时\n• 睡眠不足→肥胖风险58%↑\n\n🏠 环境改善比意志力更重要：\n• 冰箱里放水果·蔬菜\n• 不购买零食\n• 水放在餐桌上，碳酸饮料放在冰箱最后面\n• 遥控器放进抽屉，跳绳放在客厅\n\n👨‍👩‍👧 全家人一起：\n• 家族共同用餐一周3次以上→肥胖风险12%↓\n• 父母喜欢吃蔬菜→孩子也吃蔬菜的概率3倍↑\n\n📝 绝对不能说的话：「为什么这么胖」\n→ 自尊心↓，暴食↑\n替代发言：「我们的身体很宝贵，健康地吃、快乐地运动，身体就会越来越强壮」","tip":"最有效的肥胖治疗是全家生活习惯的改变。不要让孩子一个人独自战斗。"},"ans_obesity_medicine":{"type":"answer","title":"小儿肥胖药物治疗——是辅助手段","content":"药物治疗不是第一选择。在特定条件下作为生活习惯改善的辅助来考虑。\n\n📌 药物治疗开始条件（全部符合时）：\n• 12岁以上\n• BMI95百分位以上\n• 有合并症（糖尿病前期·高血压·血脂异常等）\n• 6个月以上生活习惯改善效果不足\n\n💊 可使用的药物：\n\n1. 二甲双胍（最常用）\n• 原本是糖尿病药，改善胰岛素抵抗+稍减食欲\n• 减重效果：平均2~3kg\n• 副作用：初期腹泻·腹痛（1~2周内好转）\n• 优点：安全性验证，价格低廉\n\n2. GLP-1受体激动剂（强力但贵）\n• 代表药：Saxenda（利拉鲁肽）、Wegovy（司马鲁肽）\n• 减重：10~15%（强力效果）\n• 12岁以上肥胖青少年已获批准\n• 副作用：初期恶心·呕吐（缓慢增加剂量大部分好转）\n• 缺点：非报销，每月30~50万韩元\n\n3. 奥利司他（几乎不用）\n• 脂肪吸收抑制\n• 副作用：脂肪便、大便失禁严重，效果也有限\n\n⚠️ 药物必须与生活习惯改善并行才有效。","tip":"药物只是工具。服药期间饮食习惯·运动也必须一起做。"},"metabolism_main":{"type":"question","text":"关于代谢问题，有什么担心？","options":[{"text":"说血糖高（糖尿病前期）","next":"metabolism_prediabetes"},{"text":"说胆固醇高","next":"metabolism_lipid"},{"text":"说有脂肪肝","next":"metabolism_fatty_liver"},{"text":"想了解胰岛素抵抗指标（HOMA-IR、SPISE）","next":"metabolism_spise"}]},"metabolism_prediabetes":{"type":"answer","title":"糖尿病前期——现在是可以逆转的黄金时期","recommend":true,"content":"血糖比正常高但未达到糖尿病标准的状态称为「糖尿病前期」。\n\n📊 诊断标准：\n• 糖尿病前期：空腹血糖100~125mg/dL 或 糖化血红蛋白5.7~6.4%\n• 糖尿病：空腹血糖≥126mg/dL 或 糖化血红蛋白≥6.5%\n\n⚠️ 小儿青少年2型糖尿病比成人更危险的理由：\n• 30岁以下发病时心肌梗死5倍，脑卒中3倍，死亡3倍风险\n• 越年轻血管损伤越长\n• 进展比成人快，合并症也来得早\n\n✅ 好消息——黄金时期：\n• DPP研究（2002年）：生活习惯改善→糖尿病发病58%预防\n• 单独二甲双胍：31%预防（生活习惯改善的一半效果）\n• 4~6个月生活习惯改善可以充分逆转\n\n💊 治疗顺序：\n1顺位：生活习惯改善（饮食·运动）\n→ 体重5~7%减量时糖尿病进展明显减少\n2顺位：二甲双胍（6个月无效时）\n3顺位：GLP-1激动剂（重症或二甲双胍效果不足时）","tip":"糖尿病前期通过生活习惯改善逆转，比药物效果好2倍。现在是可以改变的最后机会。"},"metabolism_lipid":{"type":"answer","title":"血脂异常——10多岁也可能开始动脉硬化","content":"高胆固醇在肥胖孩子中非常普遍（40~50%有血脂异常）。\n\n📊 诊断标准：\n• 总胆固醇≥200mg/dL\n• LDL（坏胆固醇）≥130mg/dL\n• HDL（好胆固醇）男孩<40，女孩<50mg/dL\n• 中性脂肪≥130mg/dL\n\n⚠️ 为什么可怕？\n10多岁血管中已经发现脂肪纹的研究\n放任不管→血管内形成硬块→血管变窄→年轻时也可能发生心肌梗死、脑卒中\n\n✅ 治疗效果：\n• 体重减轻10%：\n  → 收缩压降低10~15mmHg\n  → LDL减少10~15%\n  → HDL增加8~10%\n  → 中性脂肪减少30%（反应最快）\n\n💊 药物（生活习惯改善6~12个月失败时）：\n• 他汀类（10岁以上可用）\n• LDL降低30~50%效果\n• 不影响生长·青春期·性激素（研究确认）\n\n📌 快速降低中性脂肪的方法：\n• 碳酸饮料→水替换（2周内见效）\n• 减少精制碳水化合物\n• Omega-3摄取","tip":"高胆固醇因为没有症状很多情况下不知道就过去了。肥胖孩子请务必接受血液检查。"},"metabolism_fatty_liver":{"type":"answer","title":"脂肪肝——沉默但严重的疾病","content":"肥胖孩子中约40%有脂肪肝。大部分没有症状！\n\n🔍 什么是脂肪肝？\n肝脏重量的5%以上被脂肪填充的状态\n超声检查下肝脏明亮，医学上称为「bright liver」。\n\n⚠️ 原因：\n• 内脏脂肪→脂肪酸直接流入肝脏\n• 胰岛素抵抗→肝脏脂肪分解受阻\n• 液态果糖危害：碳酸饮料·果汁的果糖只能在肝脏代谢\n  → 大量摄取时集中损伤肝脏\n\n📊 进展阶段：\n单纯脂肪肝→脂肪性肝炎（NASH）→肝纤维化→肝硬化\n（前3个阶段可逆转）\n\n✅ 治疗：\n目前没有批准用于儿童青少年脂肪肝的专用药物\n→ 只有生活习惯改善是治疗\n\n• 体重减轻3~5%：脂肪开始减少，ALT改善\n• 体重减轻7~10%：肝脏炎症·纤维化也改善\n• 注意：急剧体重减量会加重脂肪肝（每周0.5~1kg缓慢进行）\n• 碳酸饮料·果汁→水替换（最快效果）\n• 运动：即使没有体重减量，运动本身也能减少肝脏脂肪","tip":"只是把碳酸饮料换成水也能改善脂肪肝。果糖是脂肪肝的主犯。"},"metabolism_spise":{"type":"answer","title":"HOMA-IR & SPISE——准确测量胰岛素抵抗的方法","content":"📊 HOMA-IR（胰岛素抵抗评估）：\n计算式：（空腹血糖×空腹胰岛素）÷405\n\n⚠️ 重要：小儿青少年标准与成人不同！（不能直接适用成人标准2.5）\n• 青春期前男孩：2.67以上怀疑\n• 青春期前女孩：2.22以上怀疑\n• 青春期男孩：5.22以上怀疑\n• 青春期女孩：3.82以上怀疑\n\n空腹胰岛素标准：\n• 5~15µU/mL：正常\n• 15以上：怀疑高胰岛素血症\n• 20以上：确认高胰岛素血症\n\n📊 SPISE指数（新指标）：\n不用空腹胰岛素就能评估胰岛素抵抗！\n计算式：600×HDL^0.185 / TG^0.2×BMI^1.338\n\n✅ SPISE的优点：\n• 不追加采血，用基本血液检查数值计算\n• 结果比胰岛素更稳定（胰岛素每5~10分钟变动）\n• 2025年研究：代谢综合征预测准确度86%（比HOMA-IR高）\n\n💡 SPISE改善战略：\n• 降低BMI（影响最大：以1.338次方反映）\n• 提高HDL：每周5次30~60分钟有氧运动、摄取Omega-3\n• 降低中性脂肪：碳酸饮料→水，减少精制碳水化合物\n  （2周内反应最快）","tip":"SPISE每3~6个月计算一次，可以用数字确认孩子生活习惯改善的效果。"},"nutrition_main":{"type":"question","text":"关于有助于生长的营养，想了解哪方面？","options":[{"text":"想了解维生素D、钙、镁","next":"nutrition_vitamin_d"},{"text":"蛋白质对生长有什么影响？","next":"nutrition_protein"},{"text":"锌、铁重要吗？","next":"nutrition_zinc_iron"},{"text":"孩子偏食严重","next":"nutrition_picky"},{"text":"想了解长高的实战饮食方案","next":"nutrition_practical"}]},"nutrition_vitamin_d":{"type":"answer","title":"维生素D·钙·镁——生长的三大支柱","content":"三者是「三角协作关系」：\n维生素D（钥匙）→钙（原材料）→镁（激活D）\n任何一种不足效果都会大幅降低。\n\n☀️ 维生素D：\n• 韩国儿童青少年约70~80%处于不足状态\n• 维生素D不足时钙吸收率：10~15%\n• 维生素D充足时钙吸收率：30~40%（相差2~3倍！）\n\n💡 核心：无论喝多少牛奶，没有维生素D就不吸收\n\n推荐量：\n• 0~12个月：400IU\n• 1~18岁：600IU\n• 不足状态：1,000~2,000IU\n\n⚠️ 韩国冬季（11~2月）：只靠阳光不能合成\n（北纬33度以上，冬季UVB不足）\n→ 必须补充保健食品\n\n目标血中浓度：30~50ng/mL\n保健食品选择：D3（胆钙化醇）>D2（效果1.5~2倍）\n\n🥛 钙：\n按年龄的每日推荐量：\n• 1~3岁：700mg（牛奶约3杯）\n• 4~8岁：1,000mg（牛奶约4~5杯）\n• 9~18岁：1,300mg（牛奶约6杯）← 急速生长期，需要量最高\n\n最佳食品：牛奶（200mL=220mg）、小鱼（带骨食用）、豆腐、奶酪\n碳酸饮料·咸食·咖啡因会抢走钙\n\n🥜 镁：\n• 激活维生素D的必须辅酶\n• 推荐与钙以2:1比例摄取\n• 最佳食品：坚果（南瓜子30g=150mg）、深绿色蔬菜、全谷物","tip":"每天牛奶2~3杯+维生素D保健食品+各种蔬菜·坚果=生长的基本组合。"},"nutrition_protein":{"type":"answer","title":"蛋白质——生长的原材料","content":"没有蛋白质，无论注射多少生长激素都没用！\n蛋白质是肌肉、骨骼、激素、免疫细胞的原材料。\n\n📊 按年龄的需要量（每公斤体重）：\n• 1~3岁：1.0~1.2g/kg\n• 4~13岁：0.95g/kg\n• 14~18岁：0.85g/kg\n\n实际示例：\n• 体重20kg 6岁→每天约19g\n• 体重30kg 9岁→每天约28.5g\n• 体重50kg 15岁→每天约42.5g\n→ 鸡胸肉100g（蛋白质23g），鸡蛋1个（6g）就足以实现\n\n🥩 主要食品的蛋白质含量：\n• 鸡胸肉100g：23g\n• 金枪鱼100g：24g（最高）\n• 中等大小鸡蛋1个：6g\n• 牛奶200mL：6.4g\n• 豆腐100g：8g\n• 煮熟的豆子100g：9g\n• 杏仁30g：6g\n\n✅ 每天的饮食方案（体重30kg基准，目标30g）：\n• 早餐：鸡蛋1个（6g）+牛奶200mL（6.4g）\n• 午餐：鸡胸肉80g（18g）\n• 晚餐：豆腐1/4块（8g）\n→ 合计38.4g ✓\n\n⚠️ 过量摄取注意（2.5g/kg以上）：\n肾脏负担+钙排出增加+脱水","tip":"每餐包含一种蛋白质食品，一天推荐量就会自然地补充完毕。"},"nutrition_zinc_iron":{"type":"answer","title":"锌和铁——重要的辅助营养素","content":"🔵 锌——「生长的矿物质」\n\n锌不足时即使生长激素正常分泌，IGF-1也会减少！\n\n历史性发现：1958年Prasad博士\n在伊朗发现21岁男性处于10岁发育状态→确认锌缺乏\n→ 补充锌后1年长高12.7~15.2cm！\n\n按年龄推荐量：\n• 1~3岁：3mg / 4~8岁：5mg / 9~13岁：8mg\n• 14~18岁：男孩11mg，女孩9mg\n\n最佳食品：牡蛎（100g=16~90mg，远超每日推荐量！）\n动物性食品：牛肉、鸡肉、鸡蛋、乳制品\n植物性：南瓜子、豆类、坚果类（因植酸吸收率低）\n\n锌不足→食欲下降→恶性循环注意！\n\n🔴 铁——运输氧气的能量源\n\n缺乏时生长迟缓风险2倍\n机制：铁不足→供氧↓→能量不足→细胞分裂↓→IGF-1减少\n\n按年龄推荐量：\n• 1~3岁：7mg / 4~8岁：10mg / 9~13岁：8mg\n• 14~18岁：男孩11mg，女孩15mg（生理期血液损失）\n\n最佳食品：\n• 血铁（动物性，吸收率15~35%）：牛肝、鸡肝、牛肉、牡蛎、蛤蜊\n• 非血铁（植物性，吸收率2~20%）：白豆、扁豆、豆腐、菠菜\n\n核心技巧：与维生素C一起吃吸收率2~3倍↑\n\n缺乏信号：冰食癖（经常咀嚼冰块）=铁缺乏特征性症状","tip":"牡蛎是锌的王者。一个月吃一次也对补锌大有帮助。"},"nutrition_picky":{"type":"answer","title":"偏食孩子的应对法——耐心是核心","content":"🥦 不吃蔬菜的孩子：\n• 蔬菜「隐身」：切细放进肉里，放进炒饭\n• 改变形状：胡萝卜用星形·心形饼干模切\n• 用酱汁蘸着吃：酸奶酱、花生酱\n• 从甜味蔬菜开始：小番茄、胡萝卜、红薯、玉米\n\n🥩 不吃肉的孩子：\n• 质地太硬或有腥味→柔软地做：肉丸、汉堡肉饼\n• 不吃肉也OK：鱼·鸡蛋·豆腐·豆类充分补充蛋白质\n\n🥛 不喝牛奶的孩子：\n• 改变温度·味道：温热，加一点可可粉\n• 放在麦片里，或与香蕉一起打成奶昔\n• 替代：酸奶、奶酪、钙强化豆浆、小银鱼\n\n✅ 克服偏食的7原则：\n1. 耐心：新食物需要最少10~15次接触才会接受 → 今天不吃也不要放弃\n2. 绝对不强迫：「全部吃完才能走！」→ 造成心理创伤\n3. 父母先做榜样：在孩子面前美味地吃\n4. 哪怕一小口也要真诚地称赞：「今天吃了菠菜，很棒！」\n5. 一起做饭：对自己做的食物产生情感→想吃\n6. 给予选择权：「要吃西兰花还是胡萝卜？」（都是蔬菜）\n7. 用餐时间要开心：在饭桌上总被批评会讨厌吃饭本身","tip":"偏食不是意志力问题。孩子的大脑需要时间接受新味道。提供10~15次大部分就会接受。"},"nutrition_practical":{"type":"answer","title":"长高的实战饮食方案——只要做到这几点","content":"📋 5个核心原则（不要想得复杂，只要做到这个！）：\n\n1️⃣ 每餐包含1种蛋白质食品\n早餐：鸡蛋·牛奶·酸奶·奶酪·花生酱吐司中选一个\n午餐：肉·鱼·鸡蛋·豆腐中选一个\n晚餐：鱼或豆腐（一周3~4次肉类）\n\n2️⃣ 一天2~3次乳制品\n早餐牛奶1杯+间食酸奶+就寝前牛奶1杯\n→ 一天钙摄取440~660mg确保\n\n3️⃣ 每餐各种颜色蔬菜1~2种\n绿色（菠菜·西兰花）+橙色（胡萝卜·彩椒）+白色（萝卜·卷心菜）\n\n4️⃣ 全谷物+水果\n白米饭→杂粮饭，白面包→全麦面包\n水果：一天2~3次（生果而不是果汁）\n\n5️⃣ 以一周为单位的均衡\n今天蔬菜没吃够，明天多吃就行\n\n🌙 就寝前推荐例行程序：\n• 就寝前：温热牛奶一杯（钙+色氨酸诱导睡眠）\n• 就寝前高糖零食：绝对禁止（胰岛素↑→生长激素↓）\n\n🏆 生长最强组合：\n充足的睡眠+均衡饮食+规律运动\n→ 生长激素最大分泌+骨骼·肌肉最优生长","tip":"比完美的饮食更有效的是80分的持续饮食。今天就开始一件事的改变吧。"},"booking":{"type":"booking"},"growth_measurement":{"type":"answer","title":"키 올바르게 측정하는 법 — 정확도가 진단을 좌우해요","content":"가정에서 잘못 측정하면 3cm 이상 오차가 생길 수 있어요. 정확한 측정이 진단의 첫걸음입니다.\n\n📅 얼마나 자주?\n• 3개월(12주)마다 1회가 최적\n• 매주·매일 측정 → 오차 범위 내 변동만 확인됨, 불안만 커짐\n• 사춘기 급성장기는 2개월마다로 단축 가능\n• 측정일 고정 권장: 3월 1일, 6월 1일, 9월 1일, 12월 1일\n\n⏰ 언제?\n• 아침 기상 직후 (기상→배변→식전 순서)\n• 이유: 하루 동안 척추 디스크가 눌려 저녁에 최대 2cm 감소\n• 같은 시간대에 측정해야 비교 의미가 있음\n\n📏 측정 방법 (4점 벽 밀착법):\n1. 딱딱한 바닥에 맨발로 서기 (카펫·쿠션 금지)\n2. 뒤꿈치·엉덩이·어깨뼈·뒤통수 → 벽에 동시 4점 밀착\n3. 발은 모아서, 정면을 바라보되 턱을 살짝 당김\n4. 숨을 크게 들이쉬고 최대한 곧게 서기\n   → \"머리가 천장에 닿을 것 같이\" 유도해주세요\n5. 딱딱한 책이나 자를 머리 위에 수평으로 대고 표시\n6. 줄자로 바닥부터 표시까지 측정 (소수점 1자리까지)\n\n🚫 흔한 오측정 원인:\n• 신발 신고 측정\n• 카펫·소파 위에서 측정\n• 머리핀·고무줄 달린 채 측정 (1cm 이상 오차)\n• 저녁에 측정\n• 너무 자주 측정 (매일/매주)\n\n📝 기록 방법:\n날짜 / 신장 / 측정 시각 / 특이사항(감기·수술 직후 등)\n→ 병원 방문 시 이 기록을 가져오면 정확한 성장 속도 평가 가능","tip":"아침 기상 직후, 4점 벽 밀착, 딱딱한 바닥 — 이 세 가지만 지켜도 가정 측정 오차를 1cm 이내로 줄일 수 있어요."},"growth_chart_reading":{"type":"answer","title":"성장곡선 읽는 법 — 숫자보다 방향이 중요해요","content":"병원에서 성장곡선 표를 보셨나요? 복잡해 보이지만 핵심은 딱 하나입니다.\n\n📊 백분위수란?\n100명을 키 순서로 세웠을 때 내 아이의 위치\n• 50백분위: 100명 중 50번째 (평균)\n• 10백분위: 100명 중 10번째 (낮지만 정상)\n• 3백분위: 100명 중 3번째 → 평가 필요 고려\n• 정상 범위: 3~97백분위 (100명 중 94명이 이 안에)\n\n🎯 핵심: 백분위 숫자보다 변화 추세가 중요\n\n✅ 걱정하지 않아도 되는 경우:\n• 10백분위를 따라가도 3세 때도 10백분위, 5세도 10백분위, 7세도 10백분위\n  → 자기 궤도를 안정적으로 유지하면 완전히 정상\n• 부모가 작고 아이도 낮은 백분위를 유지한다면: 가족성 저신장 가능성\n\n⚠️ 주의해야 하는 경우:\n• 50백분위 → 25백분위 → 10백분위로 계속 하락\n  → 2개 이상의 주요 백분위선을 지속 하향 돌파 시 의사 상담 필요\n\n📋 연령별 정상 성장 속도:\n• 출생~1세: 약 25cm\n• 1~2세: 약 10~12cm\n• 2~3세: 약 8~10cm\n• 3세~사춘기 전: 약 5~7cm ← 이 시기 4cm 미만이면 검사 필요\n• 사춘기 급성장기: 여아 8~10cm, 남아 10~12cm\n\n🏥 병원 방문이 필요한 5가지 상황:\n① 3세~사춘기 전에 1년 4cm 미만 성장\n② 2개 이상 주요 백분위선을 지속 하락\n③ 3백분위 미만 (100명 중 3번째보다 작음)\n④ 사춘기가 시작됐는데 키 급성장이 없음\n⑤ 사춘기 전인데 1년에 8cm 이상 — 성조숙증 조기 신호\n\n⚖️ 키와 체중의 균형도 확인:\n• 키는 크는데 체중 안 늘면: 영양 부족 신호\n  → 성장 속도도 실제로는 느릴 수 있음\n• 체중만 늘고 키 안 크면: 비만·성조숙증 위험\n  → 비만 아이는 초반엔 또래보다 커 보이지만 최종 키는 손해","tip":"3개월마다 측정해서 기록해두면 1년 성장량을 정확히 알 수 있어요. '왠지 작은 것 같아'보다 '올해 3.5cm 밖에 안 컸어요'가 훨씬 정확한 정보예요."},"tanner_stage_girl":{"type":"answer","title":"여아 사춘기 발달 단계 (Tanner Stage) — 우리 딸은 몇 기일까요?","content":"병원에서 「타너 2기」「타너 3기」라는 말을 들으셨나요? 이게 무엇인지 정확히 알면 아이의 사춘기 진행 상황을 이해하는 데 큰 도움이 됩니다.\n\n📊 여아 타너 단계 (유방 기준):\n\n1기 — 사춘기 전 상태\n• 유방 평평, 유선 조직 없음, 음모 없음\n• 완전히 어린이 상태\n\n2기 ⭐ — 사춘기 시작\n• 유두 아래 작은 딱딱한 덩어리(유방 싹, 乳芽) 촉지\n• 유륜 살짝 넓어짐\n• 「2기 = 사춘기 시작」의 공식 기준\n• 8세 이전 = 성조숙증 / 8~13세 = 정상 / 13세 이후 = 사춘기 지연\n• 평균 9~11세\n\n3기 — 유방과 유륜이 함께 커짐\n• 유방과 유륜이 동시에 커지지만 경계선 아직 불명확\n• 음모가 나타나기 시작 (음순을 따라 연하고 가는 털)\n\n4기 — 유륜이 유방 위로 돌출\n• 유방 위에 유륜·유두가 따로 올라온 형태\n• 음모가 성인에 가깝지만 대퇴부 안쪽까지 퍼지지 않음\n• 초경이 보통 이 시기(또는 3기 후반)에 옴\n\n5기 — 성인\n• 유방 완전 발달, 유륜과 유방이 같은 면\n• 유두만 돌출\n• 음모가 대퇴 내측까지\n\n⏱️ 여아 사춘기 정상 순서:\n유방 발달 2기 → 급성장기 시작 (6~12개월 후) → 음모 (1~1.5년 후)\n→ 초경 (유방 발달 후 평균 2~2.5년)\n\n📈 초경 후 성장량:\n• 초경 직전 1년: 약 8~10cm (급성장 절정)\n• 초경 후 1년: 약 2~3cm\n• 초경 후 2년: 약 1~2cm\n• 이후 거의 종료 → 총 5~7cm 추가\n\n⚠️ 타너 단계 불일치 주의:\n여아에서 유방은 2기인데 음모가 이미 3~4기라면\n→ 난소나 부신 이상 가능성, 추가 검사 필요","tip":"타너 2기가 확인된 시점부터 평균 2~2.5년 후 초경이 옵니다. 골연령 검사로 이 시기를 더 정확히 예측할 수 있어요."},"tanner_stage_boy":{"type":"answer","title":"남아 사춘기 발달 단계 (Tanner Stage) — 우리 아들은 몇 기일까요?","content":"남아의 사춘기는 여아보다 약 2년 늦게 시작되지만, 더 오래 지속되어 최종 키가 평균 13cm 더 큽니다.\n\n📊 남아 타너 단계 (고환 기준):\n\n1기 — 사춘기 전 상태\n• 고환 3mL 이하, 음경 어린이 크기, 음모 없음\n\n2기 ⭐ — 사춘기 시작\n• 고환 4mL 이상 (음낭 피부가 얇아지고 색이 살짝 어두워짐)\n• 음경은 아직 변화 없음\n• 「2기 = 사춘기 시작」의 공식 기준\n• 9세 이전 = 성조숙증 / 10~14세 = 정상 / 14세 이후 = 사춘기 지연\n• 평균 10~12세\n\n3기 — 고환 약 10mL, 음경 길이 증가\n• 음경 주로 길이가 늘어남\n• 음모 나타나기 시작 (음경 밑동에 가는 털)\n\n4기 — 고환 약 15mL, 음경 굵기 증가\n• 음경 길이+굵기 모두 증가, 귀두 발달\n• 변성기 시작 (목소리 굵어짐)\n• 음모 성인에 가까움 (대퇴부까지 아직 미도달)\n\n5기 — 성인\n• 고환 20mL 이상, 음경 성인 크기\n• 음모 대퇴 내측·배꼽 방향까지\n• 수염 발달 (사춘기의 마지막 신호)\n\n⏱️ 남아 사춘기 정상 순서:\n고환 증대(2기) → 음경 성장 → 음모 → 급성장기(1~2년 후, 평균 13~15세)\n→ 변성기 → 수염\n\n📈 급성장기:\n• 고환 증대 후 1~2년 뒤 시작\n• 연간 9~10cm, 2~3년간 지속\n• 총 급성장량: 25~30cm (여아보다 5~7cm 더)\n\n🔚 급성장 종료 신호:\n수염이 나기 시작하면 급성장기 거의 끝 → 이후 성장 급감\n\n⚠️ 타너 단계 불일치 주의:\n고환은 작은데 음모가 많이 나 있다면\n→ 부신 호르몬 이상(가성 성조숙증) 가능성\n→ DHEA-S 혈액검사 필요","tip":"수염이 나기 시작하면 급성장은 거의 끝이에요. 이 시기를 기다리지 말고 고환 증대(2기)가 확인되는 순간 골연령 검사와 성장 속도를 체크하는 것이 현명합니다."},"gh_stimulation_test":{"type":"answer","title":"성장호르몬 자극검사 — 검사 전 준비부터 결과 해석까지","content":"건강보험 급여로 성장호르몬 치료를 받으려면 반드시 거쳐야 하는 검사예요. 미리 알면 훨씬 덜 힘듭니다.\n\n🔬 자극검사가 필요한 이유:\nIGF-1은 선별검사(간접 평가)로, IGF-1이 낮다고 바로 급여 치료가 되지 않아요.\n자극검사만이 성장호르몬 결핍증의 「금 표준(Gold Standard)」이에요.\n\n📋 검사 전 준비 (가장 중요!):\n• 전날 자정부터 공복 8시간 (물은 소량 OK, 주스·탄산 음료 금지)\n  → 음식 섭취 시 혈당 상승 → 성장호르몬 분비 억제 → 위양성 결과\n• 헐렁하고 편안한 옷 착용 (2~3시간 누워있어야 함, 소매 올리기 쉬운 것)\n• 좋아하는 책이나 장난감 지참 (2~3시간 대기 필요)\n• 아이의 불안 최소화\n  → \"조금 아프지만 금방 끝나\"고 미리 솔직하게 알려주기\n  → 너무 긴장하면 스트레스 호르몬 상승 → 결과 영향\n• 복용 중인 약물 사전 고지 (특히 스테로이드, 갑상선호르몬)\n\n🏥 검사 당일 진행 과정:\n1. 공복 내원 → 정맥 유치침 1회 삽입 (이후 채혈은 유치침으로 무통)\n2. 자극 약물 투여: 클로니딘, 아르기닌, 글루카곤, 인슐린 등\n   → 약물이 뇌에서 성장호르몬 분비를 자극\n3. 30분마다 채혈 × 4~6회 (총 2~3시간)\n4. 가능한 조용히 휴식 (격렬한 놀이 금지)\n\n📊 결과 해석 (피크값 기준):\n• ≥ 10 ng/mL: 정상 → 급여 불가 (다른 원인 찾아야 함)\n• 7~10 ng/mL: 경계 범위 → 다른 지표와 종합 판단\n• 5~7 ng/mL: 부분 결핍 → 급여 가능, 대부분 치료 권장\n• < 5 ng/mL: 완전 결핍 → 급여 가능, 치료 필수\n\n⚠️ 급여 조건 (중요!):\n• 2종류 이상 다른 방법의 자극검사에서 모두 피크값 < 10 ng/mL\n• 단 1회 검사로는 급여 안 됨 (정상인도 컨디션 나쁠 때 낮게 나올 수 있음)\n\n🔍 자극검사만으로 결정하지 않아요:\n의사가 종합적으로 보는 것들:\n• 성장 속도 (GV) ← 가장 중요\n• IGF-1 수치\n• 골연령\n• 현재 키\n• 가족력","tip":"자극검사 결과만으로 치료 여부를 결정하지 않아요. IGF-1이 낮아도 GV가 정상이면 치료 불필요, 자극검사가 경계여도 GV가 나쁘면 치료를 고려합니다. 수치 하나가 아닌 종합 판단이 핵심입니다."},"premature_thelarche_detail":{"type":"answer","title":"조기 유방 발육 vs 진성 성조숙증 — 5가지 감별 포인트","content":"유방이 발달해도 90% 이상은 치료가 필요 없는 「조기 유방 발육」이에요. 하지만 나머지 10%는 진성 성조숙증입니다. 이 두 가지를 구별하는 5가지 포인트를 알아보세요.\n\n📌 정의:\n조기 유방 발육(Premature Thelarche) = 8세 이전 유방 발달만 단독으로 나타남\n• 2세 이하에서 가장 흔함\n• 다른 사춘기 징후가 전혀 없음\n\n🔍 5가지 감별 포인트:\n\n1️⃣ 다른 사춘기 징후 있나요?\n조기 유방 발육:\n• 유방만 발달, 음모·질 분비물·급성장 없음\n• \"그냥 가슴만 살짝 나왔어요\"\n진성 성조숙증:\n• 유방 발달 후 6~12개월 내 음모, 질 분비물 추가\n• 키도 갑자기 빠르게 자람\n\n2️⃣ 골연령이 얼마나 앞서나요?\n조기 유방 발육: 골연령 정상 or 6개월 미만 초과\n진성 성조숙증: 골연령 2년 이상 초과\n또는 처음엔 정상이었는데 6개월 만에 1.5년 급진행\n\n3️⃣ 성장 속도가 빨라졌나요?\n조기 유방 발육: 나이에 맞는 정상 성장 속도 유지\n진성 성조숙증: 성장 속도 갑자기 증가, 백분위 급상승\n\n4️⃣ GnRH 자극검사 결과:\n조기 유방 발육: LH 피크 < 2 IU/L (FSH 위주 반응, 뇌하수체 미활성)\n진성 성조숙증: LH 피크 ≥ 5 IU/L ← 확진 기준\n경계: 3~4 IU/L → 3~6개월 후 재평가\n\n5️⃣ 복부 초음파 소견:\n조기 유방 발육:\n• 자궁 길이 < 4cm, 난소 < 2mL\n• 자궁 내막 얇음\n진성 성조숙증:\n• 자궁 길이 > 4cm (서양배 모양)\n• 난소 증대, 큰 난포(≥ 4mm) 여러 개\n\n✅ 조기 유방 발육의 예후:\n• 90% 이상: 치료 없이 자연 호전\n• 51%: 유선 조직 완전 소실\n• 87%: 완전 또는 거의 완전히 소실\n• 진성 성조숙증으로 진행: 5~10% (2세 이하에서 발생 시 약 2%)\n• 정상 나이(8~13세)에 사춘기 옴, 최종 키 영향 없음\n\n⏰ 추적 관찰 일정:\n• 처음 3~6개월마다 내원\n• 확인 사항: 유방 크기 변화, 음모·질 분비물 유무, 성장 속도\n• 다음 증상 시 즉시 내원:\n  음모 발생 / 질 분비물 / 유방 급속 증대 / 키 갑자기 빠른 성장","tip":"환경 호르몬(플라스틱, 내분비 교란물질)이 원인이라고 걱정하시는 분들이 많은데, 현재 과학적으로 명확한 증거는 없습니다. 유리·스테인리스 용기 사용 정도의 일반적 건강 수칙으로 충분합니다."},"adiposity_rebound":{"type":"answer","title":"Adiposity Rebound (체지방 반등) — 5~7세 비만 예방의 핵심 개념","content":"「Adiposity Rebound」는 소아과 의사들이 가장 주목하는 비만 예방 개념 중 하나입니다.\n\n🔬 Adiposity Rebound란?\n• 영아기 이후 BMI(체지방)가 줄어들다가 다시 올라가는 시점\n• 정상적으로는 5~7세 사이에 시작됨\n• 이 시기가 「지방세포 제2차 급증기」\n\n📊 정상 BMI 변화 패턴:\n태어날 때 → 1세 전후 통통 → BMI 감소 시작\n→ 5~7세: Adiposity Rebound 시작 (BMI 다시 상승)\n→ 이 상승이 너무 이르거나 급격하면 위험\n\n⚠️ 왜 이 시기가 중요한가?\n\n지방세포 수는 두 번 급격히 증가:\n• 1차: 영아기 (12~18개월)\n• 2차: 5~7세 ← Adiposity Rebound 시기\n\n한번 늘어난 지방세포 수는 성인이 돼도 거의 줄지 않아요\n(크기는 줄일 수 있지만, 수는 평생 유지)\n\n📊 Adiposity Rebound 시기별 비만 위험:\n• 3세에 시작: 7세에 시작한 아이보다 평생 비만 위험 2~3배\n• 시작이 빠를수록 + 올라가는 폭이 클수록 → 위험\n\n✅ 이 시기(4~7세)에 해야 할 것:\n\n모니터링:\n• 6개월~1년마다 소아과에서 신장·체중 측정\n• BMI 백분위 변화 추이를 그래프로 확인\n• BMI 백분위 급상승 = 위험 신호, \"더 보자\"는 태도 금물\n\n생활 습관:\n• 매일 1시간 이상 달리고 뛰는 신체 활동\n• 화면 시간 2시간 이하 (특히 식사 중 화면 금지)\n• 식사 중 TV·스마트폰 금지\n• 유치원 환경 확인: 점심 메뉴, 간식, 야외 활동 시간\n\n🔴 위험 신호:\n• BMI 백분위 85 이상으로 급상승\n• 짧은 기간에 바지·신발 사이즈 급증가\n• 배만 나오는 형태의 체형 변화","tip":"Adiposity Rebound는 아이가 자연스럽게 조금 살이 오르는 시기예요. 이때 '아직 어리니까'라고 넘기지 말고, 6개월마다 BMI 백분위를 체크하는 것만으로도 조기 발견이 가능합니다."},"obesity_lifecycle":{"type":"answer","title":"생애주기별 비만 예방 — 시기마다 핵심이 달라요","content":"비만 예방의 효과는 시작 시점에 따라 완전히 달라집니다. 각 시기별 핵심을 알아보세요.\n\n🔑 왜 영아·유아기가 그토록 중요한가?\n3가지 이유:\n① 지방세포 수가 이 시기에 급증 → 한번 늘어난 세포 수는 평생 유지\n② 식습관의 기본 설정이 0~5세에 완성\n③ 대사 시스템이 이 시기에 초기화(프로그래밍)\n\n📅 시기별 핵심 관리:\n\n🤰 임신기 (출생 전)\n• 과도한 영양 → 태아 비만·대사 질환 위험\n• 영양 부족 → '절약 체질' 형성 → 나중에 쉽게 살 찜\n• 특히 위험: 저체중 출생 후 급속 추격 성장 → 대사증후군 위험\n• 균형이 핵심: 너무 많이도, 너무 적게도 안 됨\n\n👶 신생아·영아기 (0~12개월)\n• 지방세포 제1차 급증 시작 (12~18개월)\n• 모유 수유 → 비만 위험 13~22% 감소\n  이유: 자율 조절 수유 / 단백질 적정량 / 장내 균 / 식욕 호르몬\n• 보완식 첫 번째 음식: 반드시 채소!\n  (과일부터 시작하면 단맛에 길들어 채소 거부)\n\n🚶 유아기 (1~3세)\n• 단맛·짠맛 선호도 형성 시기\n• 음식-감정 연결 고리 형성 시작\n  → 달래기 위해 과자 주면 평생 스트레스 = 과자 패턴 형성\n• 식사 규칙성·식사량 자기조절 능력 형성\n• 필수: 하루 3시간 이상 신체 활동 (WHO 권고)\n• 화면: 2세 미만 최소화, 2~3세 하루 1시간 이하\n\n🏫 학령전기 4~5세 (Adiposity Rebound 준비)\n• 유치원 환경 체크: 점심 메뉴, 간식, 야외 활동 시간\n• 6~12개월마다 BMI 백분위 추적 시작\n• BMI 급상승 = 위험 신호, 즉시 대응\n\n🏃 학령전기 5~7세 (Adiposity Rebound 핵심)\n• 지방세포 제2차 급증기\n• 일찍 시작할수록 평생 비만 위험 2~3배\n• 이 시기 시작된 과체중은 방치하면 안 됨\n• 주요 위협: 학원 증가 → 신체 활동 감소, 친구와 간식·패스트푸드","tip":"'아직 어리니까 괜찮다'가 가장 위험한 생각이에요. 오히려 어릴수록 개입 효과가 크고, 지방세포 수가 결정되는 이 시기가 지나면 훨씬 어려워집니다."},"metabolic_syndrome":{"type":"answer","title":"대사증후군 — 여러 대사 이상이 동시에 터지는 도미노","recommend":true,"content":"대사증후군은 어느 날 갑자기 생기는 것이 아니라, 몸 안에서 도미노처럼 연쇄 진행됩니다.\n\n🔬 4단계 연쇄 메커니즘:\n1단계: 내장지방 축적\n   → 복강 깊숙이 내장지방 쌓임, 이 지방이 염증 물질 지속 분비\n\n2단계 (핵심): 인슐린 저항성 발생\n   → 염증 물질이 인슐린 신호 교란 → 세포가 인슐린에 반응 저하\n   → 혈당 상승 시작\n\n3단계: 고인슐린혈증 악순환\n   → 혈당 올라가니 췌장이 인슐린 더 분비\n   → 그래도 세포 반응 더 나빠짐 → 악순환\n\n4단계: 5가지 대사 이상 동시 폭발\n   혈당 상승 + 중성지방 상승 + 혈압 상승 + 동맥경화 진행 + HDL 감소\n\n📊 진단 기준 (5개 중 3개 이상):\n① 복부 비만: 허리 남아 ≥90cm, 여아 ≥85cm\n② 중성지방 ≥ 150 mg/dL\n③ HDL 낮음: 남아 < 40, 여아 < 50 mg/dL\n④ 혈압 ≥ 130/85 mmHg\n⑤ 공복혈당 ≥ 100 mg/dL 또는 당화혈색소 ≥ 5.7%\n\n⚠️ 얼마나 흔한가요?\n• 비만 청소년의 약 30% = 대사증후군\n• 비만 청소년의 약 90% = 1개 이상 위험인자 보유\n• 국내 유병률: 2007년 6.8% → 2018년 13.4% (10년간 2배)\n\n💥 왜 무서운가요?\n단기: 지방간, 다낭성 난소 증후군, 수면무호흡, 심리 문제\n장기: 2형 당뇨병으로 가는 고속도로\n• 30세 미만 2형 당뇨 발병 시:\n  심근경색 5배, 뇌졸중 3배, 신부전 3배 위험\n\n✅ 치료:\n• 목표: 1년 내 체중 7~10% 감량 (주 0.5kg씩 천천히)\n  → 급격한 감량은 실패 확률 높음\n• 체중 7~10% 감량 시 모든 대사 지표 대폭 개선\n• 6~12개월 효과 불충분 시 약물:\n  - 메트포르민 (혈당·인슐린 저항성)\n  - 스타틴 (콜레스테롤)\n  - 혈압약 (혈압 높을 때)\n\n🌟 가장 중요한 사실:\n청소년기 = 대사증후군을 역전시킬 수 있는 황금기\n혈관이 아직 건강하고, 자기 회복력이 강하고, 생활 습관 가소성이 높음\n이 시기를 놓치면 성인이 되어 되돌리기 훨씬 어려워집니다","tip":"대사증후군 진단을 받았어도 너무 무서워하지 마세요. 오히려 이 진단이 '지금 바꿀 수 있는 마지막 경고등'이에요. 청소년기에 발견한 것은 행운입니다."},"cgm_libre":{"type":"answer","title":"연속혈당측정기(Libre) — 비만 아이의 혈당 패턴을 실시간으로","content":"\"닭볶음탕 먹고 나서 혈당이 얼마나 오를까요?\" 이 질문의 답을 Libre로 바로 확인할 수 있어요.\n\n🔬 CGM(연속혈당측정기)이란?\n• 팔 뒤쪽(삼두근)에 센서 부착 → 24시간 연속 혈당 측정\n• 스마트폰으로 스캔하면 즉시 현재 혈당 + 8시간 그래프 확인\n• 따로 손가락 채혈 불필요\n\n📊 Libre가 보여주는 것들:\n• 현재 혈당 수치\n• 8시간 혈당 변화 그래프\n• 추세 화살표 (상승 ↑ / 안정 → / 하락 ↓)\n• Time In Range: 하루 중 정상 범위(70~180 mg/dL) 내 시간 비율 (목표 70% 이상)\n• 평균 혈당 + 변동폭\n\n🎯 비만 아이에게 특히 유용한 이유:\n\n① 공복 혈액검사로는 놓치는 문제 발견\n• 공복 혈당 95 = '정상'으로 기록됨\n• 하지만 식후 혈당 180 = 당뇨 전단계 수준\n• Libre로만 이런 「숨어있는 고혈당」 발견 가능\n\n② 음식-혈당 연결을 눈으로 보여줌\n• \"떡볶이 먹고 30분 후 혈당 +50\" 화면을 보여주면\n  아이가 스스로 \"와, 이렇게 많이 올랐어?!\" → 자발적 변화 시작\n• 다음 날 현미밥+닭가슴살 → 혈당 완만하게 소폭 상승\n  아이 스스로 깨달음: \"이런 음식을 먹어야 하는구나\"\n\n③ 운동 효과 즉시 확인\n• 혈당 130 → 30분 걷기 → 혈당 100\n• 숫자가 내려가는 것을 눈으로 보는 순간 운동 동기 폭발\n\n🔧 사용 방법:\n1. 팔 뒤쪽 소독 후 전용 부착기로 센서 삽입 (1초 미만 따끔)\n2. FreeStyle LibreLink 앱으로 스마트폰을 센서에 1~4cm 근접 스캔\n3. 최소 8시간마다 스캔 (데이터 누락 방지)\n4. 권장: 기상 시 / 식전·식후 / 운동 전·후 / 취침 전 스캔\n5. 가족 모니터링: LibreLinkUp 앱으로 부모 스마트폰에서 실시간 확인 가능\n\n⚠️ 한계와 주의사항:\n• 혈관 속 혈당이 아닌 조직액 측정 → 혈당과 5~15분 차이, ±10~20% 오차\n• 중요한 순간(저혈당 의심 시)에는 손가락 채혈로 확인 필요\n• 격렬한 운동·땀 많이 흘릴 때 센서 탈락 가능 (전용 고정 스티커 활용)\n\n💰 비용:\n• 센서 1개: 약 7~8만 원 (14일 사용)\n• 월 비용: 약 14~16만 원 (센서 2개)\n• 급여: 1형 당뇨 = 30% 부담 / 2형 당뇨·비만 = 비급여 전액 자부담\n\n🌟 추천 사용 방법:\n• 2~4주 집중 사용 (교육 투자 개념)\n• 한번 혈당 패턴 파악 후 → 평생 활용 가능한 지식 획득\n• 3개월 후 재평가 시 다시 단기 사용 가능","tip":"Libre는 치료 도구가 아닌 교육 도구예요. '이 음식을 먹으면 혈당이 이렇게 되는구나'를 아이 스스로 눈으로 보게 하는 것이 핵심입니다. 아이가 스스로 변화하게 만드는 가장 강력한 방법입니다."},"glp1_detail":{"type":"answer","title":"GLP-1 수용체 작동제 (Saxenda·Wegovy) — 새로운 비만 치료 옵션","content":"장에서 자연적으로 나오는 호르몬의 원리를 이용한 강력한 비만 치료제예요.\n\n🔬 작용 원리:\nGLP-1(글루카곤 유사 펩타이드-1) = 식사 후 장에서 자연 분비되는 호르몬\n→ 췌장에서 인슐린 분비 보조 + 위 배출 속도 느리게 + 뇌에 포만감 신호 전달\n\n문제: 자연 호르몬은 수분 만에 분해됨\n해결: 과학자들이 수시간~수일 작용하는 약물로 개발 → GLP-1 수용체 작동제\n\n💊 약물 종류:\n\n리라글루타이드 (Saxenda):\n• 1일 1회 피하주사\n• 국내 12세 이상 소아청소년 비만 치료 승인\n• 바늘 매우 가늘어 대부분 잘 적응\n\n세마글루타이드 (Wegovy):\n• 1주 1회 피하주사 (편리성 ↑)\n• 리라글루타이드보다 효과 더 강력\n• 국내 12세 이상 승인\n\n리벨서스 (경구정):\n• 알약 형태로 복용 (주사 없음)\n• 단, 국내에서는 현재 당뇨 치료에만 승인 (비만 적용 제한적)\n\n📊 효과 (STEP TEENS 연구 - 청소년 대상 임상시험):\n• 위약 대비 체중 약 10~15% 감소 (매우 강력한 효과)\n• 시간표:\n  1~2주 후: 식욕 감소 시작\n  4주 후: 체중 감소 시작\n  약 6개월: 최대 효과 도달\n• 체중 감량 외: 혈당, 혈압, 지방간 등 대사 지표 전반 개선\n\n⚠️ 부작용:\n가장 흔한 (30~40%):\n• 오심·구토·설사·변비\n• 매우 천천히 용량 올리면 대부분 호전 (수주 내)\n\n드문 (즉시 병원 방문):\n• 췌장염·담낭염: 윗배 극심한 통증이 등 쪽으로 퍼지면 즉시 응급실\n\n🚫 절대 금기:\n• 갑상선 수질암 가족력\n• 췌장염 기왕력\n• 임신 중\n\n💰 비용과 현실:\n• 비급여 → 월 약 30~50만 원 전액 자부담\n• 중단 시 반동 위험: 식욕 돌아오고 체중 반등 가능\n  → 전문의와 장기 유지 계획 필수\n\n⭐ 중요: 생활 습관 개선과 반드시 병행해야\n약물만으로는 최대 효과 불가, 식이·운동 동시 진행 필수","tip":"GLP-1 치료제는 '기적의 약'이 아닙니다. 식욕을 낮춰주는 도구일 뿐이고, 그 기회를 활용해 식습관과 운동 패턴을 바꾸는 노력이 함께해야 의미가 있어요."},"obesity_surgery":{"type":"answer","title":"중증 비만 수술 치료 — 대부분에게 해당하지 않는 최후의 수단","content":"먼저 말씀드립니다: 이 내용은 대부분의 아이들에게 해당하지 않아요. 이미 의사에게 수술을 여러 번 권고받은 극소수를 위한 정보입니다.\n\n⚠️ 수술은 되돌릴 수 없는 선택입니다:\n• 절제된 위는 복원 불가\n• 성장기 영양 흡수 제한 → 최종 키 영향 가능\n• 종신 영양제 복용 필수\n• 종신 특수 식이 방법 유지 필수\n\n📋 수술 적응증 (4가지 모두 충족해야 함):\n\n① 성장 완료\n• 최소 13~14세 이상 + 골연령 검사로 확인\n\n② 고도 비만\n• BMI ≥ 40 또는\n• BMI ≥ 35 + 심각한 합병증 동반\n• (참고: 키 160cm에 BMI 40 = 체중 102kg 이상)\n\n③ 비수술 치료 6~12개월 이상 무효\n• 식이·운동·약물 치료 모두 시도했지만 효과 없음\n• \"3개월 해봤는데 안 되더라고요\" → 충분하지 않음\n\n④ 생명을 위협하는 합병증\n• 약으로도 조절 안 되는 2형 당뇨\n• 야간 호흡 정지가 있는 심한 수면무호흡\n• 진행 중인 지방성 간염 + 간 섬유화\n• 단순 비만만으로는 수술 적응증 안 됨\n\n🔪 수술 후 영구 관리 (평생 지켜야 할 규칙):\n• 매 식사 반 공기 이하 (소량씩 자주)\n• 한 입 30번 이상 천천히 씹기\n• 탄산음료 영구 금지\n• 식사 전후 30분간 물도 금지\n• 종신 영양제: 종합비타민 + 칼슘 + 철분\n\n💰 한국의 현실:\n• 수술 가능 병원: 극소수의 대형 대학병원만\n• 수술비: 약 1,000~2,000만 원\n• 대부분 비급여\n• 수술 후 지속 관리비 + 영양제비 추가 발생\n\n⚠️ 반동 위험:\n수술 1~2년 후 체중의 10~20% 다시 증가하는 경우 흔함\n→ 식이 원칙 안 지키거나 운동 안 하면 위가 다시 늘어남\n\n🏥 다학제 팀이 필요해요:\n외과 + 소아내분비과 + 정신건강의학과 + 영양사가 함께하는 병원 선택 필수","tip":"수술은 시작이지 끝이 아닙니다. 수술 성공의 80%는 이후 생활 습관 유지에 달려있어요. 아이 본인이 수술 후 변화를 충분히 이해하고 스스로 결정해야 의미 있습니다."},"gh_basics":{"type":"question","text":"성장호르몬 기초에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"성장호르몬은 우리 몸 어디에서 만들어지나요?","next":"gh_where_made"},{"text":"언제 가장 많이 분비되나요?","next":"gh_when_peak"},{"text":"IGF-1이 뭔가요? 성장호르몬과 어떻게 다른가요?","next":"gh_igf1_explain"},{"text":"성장에 필요한 5가지 요소가 뭔가요?","next":"gh_5_factors"},{"text":"깊은 잠(서파수면)을 자기 위한 환경 조성법은?","next":"gh_sleep_env"}]},"gh_where_made":{"type":"answer","title":"성장호르몬은 뇌하수체에서 만들어져요","content":"뇌 깊숙한 곳에 있는 완두콩 크기의 「뇌하수체」에서 만들어집니다.\n\n🧠 구조와 원리:\n• 시상하부(사령관) → 뇌하수체(공장) → 혈액(고속도로) → 간/성장판\n• 시상하부가 명령을 내리면 뇌하수체가 호르몬을 혈액으로 분비\n• 둘은 「뇌하수체문맥계」라는 전용 혈관망으로 연결\n\n📊 조절 시스템:\n• 액셀: GHRH(방출호르몬) → 분비 촉진\n• 브레이크: 소마토스타틴(억제호르몬) → 분비 억제\n• 음성 피드백: IGF-1이 충분해지면 뇌에 신호 → 자동으로 분비 감소\n\n💡 성장호르몬의 역할 (키만이 아니에요!):\n• 뼈 길이 성장 + 밀도 강화\n• 근육 단백질 합성\n• 복부 지방 분해\n• 심장·간 등 장기 발달\n• 대사 조절 (혈당, 지방 등)","tip":"뇌하수체는 완두콩보다 작지만, 성장·갑상선·부신·생식 등 우리 몸의 거의 모든 호르몬을 조율하는 「마스터 컨트롤 센터」예요."},"gh_when_peak":{"type":"answer","title":"성장호르몬은 자는 동안 가장 많이 분비돼요","content":"잠든 후 첫 1~2시간, 특히 「서파수면(깊은 잠)」 단계에서 하루 분비량의 절반 이상이 나옵니다.\n\n⏰ 분비 타임라인:\n• 밤 9~10시 취침 → 11시~0시 사이 최대 분비\n• 서파수면: 뇌파가 느리고 깊은 단계, 몸이 가장 편안\n• 운동 후 분비도 있지만 수면 중의 1/5 수준\n\n🌙 꼭 지켜야 할 수면 원칙:\n• 취침 시간: 밤 9~10시 사이 권장\n• 총 수면 시간: 초등학생 9~11시간, 중학생 8~10시간\n• 취침 전 단 음식: 혈당 상승 → 인슐린 과다 → 성장호르몬 억제\n• 취침 전 스마트폰: 블루라이트 → 멜라토닌 억제 → 깊은 잠 방해\n\n📊 수면 부족의 영향:\n• 서파수면 감소 → 성장호르몬 분비 감소\n• 만성 수면 부족 아이: 또래보다 최종 키 1~3cm 낮을 수 있음","tip":"\"잘 때 큰다\"는 말은 과학적 사실이에요. 최고의 성장 비결은 취침 전 스마트폰 대신 일찍 자는 것!"},"gh_igf1_explain":{"type":"answer","title":"IGF-1 — 성장호르몬의 '현장 일꾼'이에요","content":"성장호르몬이 「명령서」라면 IGF-1은 「현장에서 실제 일하는 일꾼」입니다.\n\n📊 둘의 차이:\n구분 | 성장호르몬(GH) | IGF-1\n만들어지는 곳 | 뇌하수체 | 주로 간\n혈중 지속 시간 | 약 20분 | 12~15시간\n역할 | 명령 전달 | 실제 성장 실행\n검사 방법 | 자극검사(2~3시간) | 혈액 1회 채취\n\n🎯 IGF-1이 중요한 이유:\n• 성장판에 직접 작용해 세포 분열 → 뼈가 길어짐\n• 혈중에 오래 머물러 안정적 성장 효과\n• 간 뿐 아니라 성장판에서도 직접 생성 (이중 시스템)\n\n🔬 임상적 의미:\n• IGF-1 혈액검사: 성장호르몬 결핍 선별 검사로 사용\n• 단 1회 채혈로 가능 (공복 불필요)\n• 낮으면 → 성장호르몬 자극검사 추가 권장\n• 정상이어도 키가 작다면 → 다른 원인 탐색","tip":"IGF-1을 높이는 자연적인 방법: ① 충분한 수면 ② 운동 (특히 전신 운동) ③ 충분한 단백질 섭취 ④ 아연 충분히 섭취"},"gh_5_factors":{"type":"answer
