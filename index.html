","title":"성장에 필요한 5대 요소","content":"키 성장은 단 하나의 요소가 아니라 5가지가 함께 작용합니다.\n\n🏆 성장의 5대 요소:\n\n1️⃣ 호르몬 (성장·갑상선)\n• 성장호르몬: 간→IGF-1→성장판 자극\n• 갑상선호르몬: 부족하면 성장 전반 저하\n\n2️⃣ 영양 (단백질·칼슘·비타민D)\n• 단백질: 성장의 원재료 (없으면 호르몬이 있어도 못 자람)\n• 칼슘: 뼈의 원재료\n• 비타민D: 칼슘 흡수율 2~3배 향상\n\n3️⃣ 수면 (깊은 잠)\n• 서파수면 중 성장호르몬 최대 분비\n• 9시간 이상 권장\n\n4️⃣ 운동 (성장판 자극)\n• 줄넘기·농구·달리기: 성장판에 적절한 자극\n• 적절한 근력 운동: 뼈 밀도 강화\n\n5️⃣ 스트레스 관리\n• 만성 스트레스 → 코티솔 증가 → 성장호르몬 억제\n• 정서적 안정이 키 성장에도 직결","tip":"5가지 중 하나라도 결핍되면 효율이 떨어져요. 특히 영양이 부족한 상태에서 성장호르몬 주사를 맞아도 원재료가 없으면 제대로 작용하지 못합니다."},"gh_sleep_env":{"type":"answer","title":"깊은 잠을 자기 위한 환경 조성법","content":"깊은 잠(서파수면)을 잘 자야 성장호르몬이 제대로 분비됩니다.\n\n🌙 수면 환경 체크리스트:\n\n✅ 방 온도: 18~20°C (약간 서늘하게)\n• 체온이 낮아져야 깊은 잠에 들 수 있음\n• 너무 더우면 깊은 잠 방해\n\n✅ 방 밝기: 최대한 어둡게\n• 멜라토닌: 어두워야 분비 (깊은 잠 유도)\n• 스마트폰·TV 블루라이트: 멜라토닌 억제\n\n✅ 취침 1시간 전 루틴:\n• 스마트폰·게임 OFF\n• 따뜻한 목욕 (체온 올렸다가 낮추는 효과)\n• 가벼운 스트레칭\n\n✅ 기상 시간 일정 유지:\n• 주말도 평일과 1시간 이내 차이\n• 수면 리듬 유지가 핵심\n\n❌ 수면 방해 요인:\n• 취침 2~3시간 내 야식 (소화 과정이 깊은 잠 방해)\n• 단 음식 (혈당 상승 → 인슐린 → GH 억제)\n• 카페인 (초콜릿, 콜라에도 포함)\n\n📊 연구 결과:\n하루 30분 일찍 자는 것만으로도 IGF-1 수치가 약 15% 상승한다는 연구가 있어요.","tip":"\"일찍 자는 아이가 잘 큰다\"는 말은 정말입니다. 취침 시간이 밤 9~10시 이후로 넘어가면, 성장호르몬 분비 피크를 놓치게 됩니다."},"growth_basics":{"type":"question","text":"키 성장 기초와 백분위수에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"백분위수란 무엇이고 어떻게 보나요?","next":"growth_percentile_explain"},{"text":"집에서 키를 정확하게 재는 방법이 있나요?","next":"growth_measure_method"},{"text":"나이별로 얼마나 자라야 정상인가요?","next":"growth_speed_by_age"},{"text":"성장곡선은 어떻게 읽나요?","next":"growth_curve_reading"},{"text":"병원에 꼭 가야 하는 5가지 신호는?","next":"growth_when_hospital"}]},"growth_percentile_explain":{"type":"answer","title":"백분위수 — 또래 100명 중 몇 번째인지를 나타내요","content":"백분위수는 또래 100명을 키 순서대로 세웠을 때의 위치입니다.\n\n📊 기본 이해:\n• 50백분위 = 100명 중 50번째 = 평균\n• 25백분위 = 100명 중 뒤에서 26번째 (평균보다 작지만 정상)\n• 3~97백분위 = 의학적으로 모두 정상 범위\n\n✅ 핵심 포인트:\n50백분위가 무조건 좋은 것이 아니에요!\n• 10백분위더라도 자기 선을 꾸준히 따라가면 → 정상\n• 50백분위더라도 백분위수가 계속 떨어지면 → 주의\n\n⚠️ 걱정되는 경우:\n• 3백분위 미만: 100명 중 3번째로 작음 → 전문과 평가 권장\n• 두 개 주요 백분위선(예: 50→25→10) 하향 돌파 → 원인 탐색 필요\n\n📏 어떤 백분위수가 중요한가요?\n주요 백분위선: 3, 10, 25, 50, 75, 90, 97\n이 선들을 \"가로지르지 않고 평행하게\" 따라가는 것이 건강한 성장","tip":"키는 절대값보다 \"추세\"가 중요해요. 3개월마다 측정해서 백분위수가 일정하게 유지되는지 확인하는 습관을 들여보세요."},"growth_measure_method":{"type":"answer","title":"집에서 키를 정확하게 재는 방법","content":"측정 방법에 따라 최대 2~3cm 차이가 날 수 있어요. 정확한 측정이 중요합니다.\n\n📏 올바른 측정 자세 (4점 밀착):\n1. 뒤꿈치 → 벽에 붙이기\n2. 엉덩이 → 벽에 붙이기\n3. 어깨 → 벽에 붙이기\n4. 뒤통수 → 벽에 붙이기\n5. 시선: 정면, 귀와 눈이 수평\n6. 척추: 기지개 켜듯 쭉 펴기\n7. 머리 위에 책을 수평으로 놓고 표시\n\n⏰ 언제 재야 정확한가?\n• 아침 기상 직후가 가장 정확 (저녁은 0.5~2cm 작음)\n• 왜? 종일 중력에 눌려 척추 추간판이 압축됨\n• 반드시 신발·양말 벗고 측정\n\n📅 얼마나 자주 재야 하나요?\n• 3개월(12주) 주기 권장\n• 일주일 성장은 1mm 이내 → 측정 오차에 묻힘\n• 계절 변화에 맞춰 재면 기억하기 쉬움 (3/1, 6/1, 9/1, 12/1)\n\n❌ 흔한 실수:\n• 신발·양말 착용한 채 측정\n• 푹신한 카펫 위 측정 (발이 가라앉음)\n• 머리핀·머리끈 착용 상태\n• 뒤꿈치가 벽에서 떨어진 채 측정","tip":"성장 기록을 남길 때는 날짜·시간·체중도 함께 기록하세요. 병원 방문 시 '1년 동안 3.5cm 컸어요'처럼 구체적인 수치를 말할 수 있으면 진단에 큰 도움이 됩니다."},"growth_speed_by_age":{"type":"answer","title":"나이별 정상 성장 속도","content":"나이에 따라 정상 성장 속도가 크게 다릅니다.\n\n📊 나이별 정상 성장 속도:\n\n0~1세: 25cm (일생 중 가장 빠름!)\n1~2세: 10~12cm\n2~3세: 8~10cm\n3세~사춘기 전: 5~7cm/년 ← 이 시기가 가장 중요한 기준\n사춘기 급성장기:\n  • 여아: 8~10cm/년 (1~2년)\n  • 남아: 10~12cm/년 (2~3년)\n\n⚠️ 연간 4cm 미만이면 (사춘기 전):\n• 반드시 소아내분비과 평가 필요\n• 성장호르몬 결핍, 갑상선 저하증, 영양 부족 등 원인 탐색\n\n📌 사춘기 급성장 시기:\n• 여아: 유방 발달 후 6개월~1년 뒤\n• 남아: 고환 증대 후 1~2년 뒤\n• 이 시기에 급성장이 없으면 → 평가 필요\n\n💡 키와 몸무게를 함께 봐야 해요:\n• 키는 크는데 몸무게 안 늘면: 영양 부족 가능성\n• 몸무게만 늘고 키 안 크면: 비만·성조숙증 위험","tip":"초등학교 1~2학년(7~8세)이 '황금 치료 시기'예요. 이때 성장 속도가 느리다면 바로 검사받는 것이 좋습니다. 사춘기가 시작되면 치료 효과가 절반으로 줄어요."},"growth_curve_reading":{"type":"answer","title":"성장곡선 읽는 법 — 점보다 선이 중요해요","content":"성장곡선은 아이의 성장 추세를 한눈에 보여주는 가장 강력한 도구입니다.\n\n📈 읽는 방법:\n1. 가로축 = 나이 / 세로축 = 키\n2. 측정값을 3~6개월마다 점으로 찍기\n3. 점들을 연결해 \"선\"을 만들기\n4. 이 선이 표준 백분위선과 평행하면 정상\n\n✅ 건강한 성장 패턴:\n• 낮은 백분위더라도 자기 선을 꾸준히 따라 올라가면 OK\n• 부모 키에 맞는 백분위를 유지하면 OK\n\n⚠️ 주의가 필요한 패턴:\n• 두 개의 주요 백분위선을 가로질러 하락\n• 6개월 이상 전혀 성장이 없음\n• 또래들은 사춘기 급성장 중인데 혼자만 안 오름\n\n📌 중요한 포인트:\n• 단 한 번의 측정보다 \"추세\"를 보는 것이 핵심\n• 예) 지금 25백분위이지만 1년 전 75백분위였다면 → 원인 탐색 필요\n\n🔍 성장곡선 활용 팁:\n• 3개월마다 같은 조건(아침, 같은 자세)으로 측정\n• 질환관리 앱이나 소아과 앱의 성장 기록 기능 활용","tip":"성장곡선에서 점 하나(지금 키)보다 선의 방향(추세)이 훨씬 중요해요. 의사도 한 번 측정보다 시간에 따른 변화를 더 중요하게 봅니다."},"growth_when_hospital":{"type":"answer","title":"이럴 때는 꼭 병원에 가야 해요 — 5가지 신호","recommend":true,"content":"다음 5가지 중 하나라도 해당하면 소아내분비과 방문을 권장합니다.\n\n🚨 병원 방문 신호 5가지:\n\n1️⃣ 연간 성장 4cm 미만 (사춘기 전)\n   → 성장호르몬 결핍, 갑상선 저하증 등 배제\n\n2️⃣ 백분위수가 두 개 이상의 주요 선을 하향 돌파\n   → 예) 6개월 만에 50→10백분위\n\n3️⃣ 키가 3백분위 미만\n   → 100명 중 3번째로 작음\n\n4️⃣ 사춘기가 왔는데 급성장이 없음\n   → 성장판이 먼저 닫히는 경우 (성조숙증 가능성)\n\n5️⃣ 사춘기 전인데 갑자기 연 8cm 이상 급성장\n   → 성조숙증 초기 신호 (역설적으로 주의 필요)\n\n⬆️ 추가로 확인할 신호:\n• 부모 평균 키에 비해 10cm 이상 작음\n• 머리가 상대적으로 유난히 커 보임\n• 빈번한 저혈당, 심한 신생아 황달 경력\n\n📋 병원 방문 시 챙길 것:\n• 연도별 키·몸무게 기록\n• 부모 양쪽 키\n• 출생 기록 (출생 시 체중·신장)\n• 사진 (얼굴 변화 확인에 도움)","tip":"\"아직 지켜볼게요\"라는 마음에 6개월~1년 미루다가 치료 기회를 잃는 경우가 많아요. 의심되면 빨리 가서 검사받는 것이 최선입니다."},"boneage_method_detail":{"type":"answer","title":"골연령 검사 방법 — 왼손 X-ray 한 장이면 돼요","content":"골연령 검사는 왼손을 X-ray 촬영하는 매우 간단한 검사입니다.\n\n🔬 검사 과정:\n1. 촬영판 위에 왼손바닥을 쫙 펴서 올리기\n2. 10초 이내로 사진 한 장 찍으면 끝\n3. 주사·채혈 전혀 없음\n4. 소요 시간: 5분\n\n☢️ 방사선 안전성:\n• 흉부 X-ray의 1/20 수준 (매우 적음)\n• 제주도 비행기 왕복 시 받는 우주방사선보다 적음\n• WHO 기준으로 연간 수백 번 찍어도 안전한 수준\n\n🦴 무엇을 보는 건가요?\n손가락·손바닥·손목의 20개 이상 뼈를 관찰:\n• 나이에 따라 순차적으로 나타나는 8개 손목뼈(수근골) 모양\n• 성장판(골단)의 형태와 유합 정도\n\n📅 검사 주기:\n• 정상 성장기: 1년에 1회\n• 성장호르몬·성조숙증 치료 중: 6개월마다\n• 뼈나이가 실제보다 2년 이상 빠른 경우: 더 자주","tip":"만 5세 미만에서는 뼈가 충분히 발달하지 않아 판독이 부정확할 수 있어요. 만 5세 이후부터 의미 있는 결과를 얻을 수 있습니다."},"boneage_why_left":{"type":"answer","title":"왜 왼손으로 골연령 검사를 하나요?","content":"1930년대부터 축적된 전 세계 모든 골연령 표준 데이터가 「왼손」을 기준으로 만들어졌기 때문입니다.\n\n📚 역사적 이유:\n• 1930년대 Greulich-Pyle 아틀라스 창시 시 왼손 기준으로 설정\n• 이후 모든 표준 데이터베이스가 왼손 기준 구축\n• 전 세계 공통 기준 유지를 위해 현재까지 왼손 사용\n\n🔑 추가 이유:\n• 대다수가 오른손잡이 → 오른손은 부상이 많아 데이터 변동성 있음\n• 왼손이 더 \"표준적인\" 발달 상태를 반영\n\n✋ 오른손잡이인데 왼손으로 해도 정확한가요?\n네! 손을 사용하는 정도가 골연령에 미치는 영향은 무시할 수 있을 정도로 작습니다. 양손의 뼈 성숙도 차이는 거의 없어요.\n\n🤖 최근 변화:\n• AI 판독 시스템 도입으로 정확도 향상\n• 의사 간 판독 오차(기존 6개월~1년) 감소 추세\n• 일부 병원에서는 AI 보조 판독 사용 중","tip":"왼손이 어색하더라도 걱정 마세요. 왼손 측정이 전 세계 표준이고, 결과 정확도에 영향을 주지 않습니다."},"boneage_fast_slow":{"type":"answer","title":"골연령이 실제 나이보다 빠르거나 느리면?","content":"골연령이 실제 나이와 다를 때의 의미를 정확히 알아야 합니다.\n\n📊 골연령이 실제 나이보다 「빠른」 경우:\n\n⚠️ 의미:\n• 뼈가 실제 나이보다 일찍 늙고 있음\n• 성장판이 일찍 닫힐 가능성 높음\n• 지금은 또래보다 크지만 최종 키는 작을 수 있음\n\n주요 원인:\n• 비만 (렙틴·인슐린이 뼈 성숙 촉진)\n• 성조숙증 (성호르몬 → 성장판 조기 폐쇄)\n• 갑상선 기능 항진증 등\n\n2년 이상 앞서면: 전문의 평가 필수\n\n─────────────────────────────\n\n📊 골연령이 실제 나이보다 「느린」 경우:\n\n✅ 긍정적 신호일 때:\n• 체질성 성장지연 (늦게 크는 체질)\n• 성장판이 더 오래 열려 있음 → 더 오래 자람\n• 지금 작아도 결국 정상 키에 도달\n\n⚠️ 주의가 필요할 때:\n• 성장 속도도 느린 경우 (연 4cm 미만)\n• 성장호르몬 결핍, 영양 불량, 갑상선 저하증 등\n\n구별법: 성장 속도가 정상(5~6cm/년)인가?\n• 정상이면 → 체질성, 기다리면 됨\n• 느리면 → 원인 탐색 필요","tip":"골연령만 보지 말고 성장 속도와 함께 해석해야 합니다. 골연령이 느려도 성장 속도가 정상이면 걱정 없어요!"},"boneage_accuracy":{"type":"answer","title":"골연령으로 예측 키, 얼마나 정확한가요?","content":"골연령 예측 키는 부모 키 공식보다 훨씬 정확하지만, 완벽하지는 않아요.\n\n📊 방법별 정확도 비교:\n\n부모 키 공식 (MPH):\n• 오차 범위: ±8~10cm\n• 총 가능 범위: 20cm\n• 예) 예측 170cm → 실제 160~180cm\n\n골연령 기반 예측:\n• 사춘기 전: 오차 ±5~7cm\n• 사춘기 중기: 오차 ±3~5cm\n• 사춘기 후반: 오차 ±2~3cm (가장 정확)\n\n📌 정확도가 높아지는 조건:\n• 사춘기가 진행될수록 정확\n• 현재 키 + 골연령 + 성장 속도를 함께 고려할 때\n• Bayley-Pinneau법 (사춘기 후반에 정확)\n\n💡 실제 활용 방법:\n• 예측 키 자체보다 「유전 목표 키(MPH)」와의 차이를 봐요\n• 예측 키가 유전 목표보다 5cm 이상 낮으면 → 치료 고려\n\n⚠️ 주의:\n• 골연령 판독은 의사마다 6개월~1년 오차 가능\n• AI 판독 도입으로 개선 중이지만 아직 완벽하지 않음","tip":"예측 키는 확정이 아니라 방향을 보는 도구예요. 치료 여부는 예측 키 하나보다 성장 속도, 유전 목표, 골연령을 종합해서 결정합니다."},"boneage_treatment_end":{"type":"answer","title":"골연령이 치료 종료 기준에 어떻게 사용되나요?","content":"성장호르몬 치료와 성조숙증 치료 모두 골연령을 기준으로 종료를 결정합니다.\n\n📋 성조숙증 치료 (GnRH 주사) 종료 기준:\n• 여아 골연령 12~12.5세\n• 남아 골연령 13~13.5세\n• → 또래의 정상 사춘기 시기와 일치시켜 종료\n• 종료 후 평균 1년 내 초경\n\n📋 성장호르몬 치료 종료 기준:\n급여 종료 기준 (건강보험):\n• 여아 골연령 14~15세\n• 남아 골연령 15~16세\n• 여아 신장 153cm 초과 / 남아 165cm 초과\n• 연간 성장 2cm 미만\n\n자비 치료는 이후에도 가능\n\n💡 왜 달력 나이가 아닌 골연령을 쓰나요?\n• 성장판이 닫히는 시기가 실제로는 골연령에 달려 있음\n• 달력 나이 14세여도 골연령 11세면 → 치료 효과 있음\n• 달력 나이 11세여도 골연령 14세면 → 치료 효과 없음\n\n📅 골연령 추적 주기:\n• 치료 중: 6개월마다\n• 안정기: 1년마다","tip":"치료 종료는 의사가 골연령 검사 결과를 보고 결정합니다. 달력 나이가 14세여도 골연령이 낮으면 치료를 계속할 수 있어요."},"gh_test_detail":{"type":"question","text":"성장호르몬 검사에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"IGF-1 검사와 자극검사의 차이가 뭔가요?","next":"gh_test_types"},{"text":"자극검사는 어떻게 진행되나요?","next":"gh_stim_test_detail"},{"text":"결과를 어떻게 해석하나요?","next":"gh_test_result_reading"},{"text":"검사 전 어떻게 준비해야 하나요?","next":"gh_test_preparation"},{"text":"자극검사에 부작용이 있나요?","next":"gh_stim_side_effect"}]},"gh_test_types":{"type":"answer","title":"IGF-1 검사 vs 자극검사 — 선별 vs 확진","content":"두 검사는 목적과 방식이 완전히 다릅니다.\n\n📊 비교표:\n\n구분 | IGF-1 혈액검사 | 성장호르몬 자극검사\n목적 | 선별(스크리닝) | 확진(진단)\n소요 시간 | 5분 | 2~3시간\n채혈 횟수 | 1회 | 4~6회 (유치 1회)\n금식 여부 | 불필요 | 8시간 금식 필수\n비용 | 낮음 | 높음\n정확도 | 간접 지표 | 금표준(gold standard)\n\n🔬 IGF-1의 한계:\n• 영양 상태, 간 기능에 따라 수치 변동\n• 정상 수치여도 GH 결핍일 수 있음 (위음성 가능)\n• 따라서 IGF-1만으로 확진 불가\n\n✅ 언제 어떤 검사를?\n• IGF-1 먼저 → 낮으면 자극검사 추가\n• 또는 임상적으로 강하게 의심되면 바로 자극검사\n• 보험 급여를 위해서는 자극검사가 필수\n\n💡 자극검사가 \"금표준\"인 이유:\n성장호르몬은 맥동성으로 분비 → 1회 측정으로는 결핍 판단 불가\n자극검사는 인위적으로 분비를 최대한 유도해 최고값을 측정","tip":"IGF-1 검사가 정상이어도 성장이 느리고 다른 이상 신호가 있다면, 자극검사까지 받아보는 게 좋습니다."},"gh_stim_test_detail":{"type":"answer","title":"성장호르몬 자극검사 — 어떻게 진행되나요?","content":"「금표준(Gold Standard)」 검사입니다. 정확하지만 시간이 걸려요.\n\n📋 검사 순서:\n1. 전날 밤 12시부터 8시간 금식 (물은 OK)\n2. 오전 일찍 병원 도착\n3. 정맥 유치 바늘 1회만 삽입 (이후 채혈은 여기서)\n4. 자극 약물 투여\n5. 30분 간격으로 4~5회 채혈\n6. 약 2~3시간 후 종료\n\n💊 사용하는 자극 약물:\n• 클로니딘: 부작용 적음, 가장 흔히 사용\n• 아르기닌: 아미노산 형태, 주사\n• 글루카곤: 저혈당 위험 없음\n• 인슐린: 가장 강력, 저혈당 모니터링 필요\n• 보험 급여: 서로 다른 방법으로 2종 이상 필요\n\n📊 결과 판독:\n• 피크값 ≥10ng/mL: 정상 (보험 불가)\n• 7~10: 경계\n• 5~7: 부분 결핍\n• <5: 완전 결핍 (치료 강력 권장)\n\n⏳ 기다리는 동안:\n• 병원 침대에서 안정 취하기\n• 책·태블릿·장난감 지참 권장\n• 보호자 1명 동반 필수","tip":"자극검사는 아이도 부모도 힘든 검사예요. 하지만 치료 여부를 정확히 판단하고 보험을 적용받기 위해 반드시 필요한 과정입니다."},"gh_test_result_reading":{"type":"answer","title":"성장호르몬 자극검사 결과 해석법","content":"수치만이 아니라 여러 요소를 종합해서 판단합니다.\n\n📊 피크값 기준:\n• ≥10ng/mL: 정상 → 성장호르몬 결핍 아님\n• 7~10ng/mL: 경계 → 추가 관찰\n• 5~7ng/mL: 부분 결핍 → 치료 고려\n• <5ng/mL: 완전 결핍 → 즉시 치료 강력 권장\n\n🔍 수치 외에 함께 고려하는 요소:\n1. 성장 속도 (가장 중요!)\n   → 연간 4cm 미만이면 수치가 경계여도 치료 고려\n2. IGF-1 수치\n   → 낮으면 결핍 가능성 높음\n3. 골연령\n   → 치료 가능한 기간이 얼마 남았는지\n4. 현재 키 위치\n   → 하위 3백분위 미만이면 더 적극적으로\n5. 가족력\n   → 부모 키에 비해 얼마나 작은지\n\n💡 경계값(7~10)이 나왔을 때:\n• 6개월~1년 성장 속도 추가 관찰\n• 다른 요인들 종합 검토\n• 필요시 재검사\n\n✅ 완전 결핍(<5)이면:\n치료 반응이 매우 좋음 → 첫 해 평균 10~12cm","tip":"수치가 10 이상이어도 다른 조건들이 이상하면 치료를 고려할 수 있어요. 숫자 하나보다 전체적인 그림을 보는 것이 중요합니다."},"gh_test_preparation":{"type":"answer","title":"성장호르몬 자극검사 준비 — 이렇게 하면 돼요","content":"검사 전 준비를 잘 해야 정확한 결과가 나옵니다.\n\n📋 검사 전날 (D-1):\n• 밤 12시 이후부터 완전 금식\n• 단, 물은 마셔도 됨\n• 평소와 같이 자기\n• 격렬한 운동 피하기\n\n🌅 검사 당일 (D-day):\n• 최대한 일찍 병원 도착 (오전 9시 이전 권장)\n• 소매 걷기 편한 헐렁한 옷 착용\n• 아이가 좋아하는 장난감·책·태블릿 지참\n• 보호자 1명 동반 필수 (2~3시간 함께 있어야 함)\n\n✅ 검사 중 주의사항:\n• 유치 바늘 삽입 부위 건드리지 않기\n• 30분마다 채혈 시 최대한 안정\n• 클로니딘 사용 시: 졸음 유발 가능 (정상)\n• 인슐린 사용 시: 저혈당 증상(식은땀, 떨림) 의료진에게 즉시 알리기\n\n❓ 자주 묻는 질문:\nQ. 아침약을 먹어도 되나요?\nA. 의사에게 미리 확인 (대부분 금식 기간에 복용 금지)\n\nQ. 철분제·영양제도 중단해야 하나요?\nA. 검사 전 의사에게 복용 중인 모든 약물 알리기","tip":"검사 당일 아이가 충분히 금식을 했는지 확인하세요. 금식이 제대로 안 되면 자극 반응이 억제되어 결핍이 있어도 정상으로 나올 수 있어요."},"gh_stim_side_effect":{"type":"answer","title":"자극검사 부작용 — 대부분 일시적이에요","content":"사용하는 약물에 따라 다르지만 대부분 경미하고 일시적입니다.\n\n💊 약물별 주요 부작용:\n\n클로니딘:\n• 졸음 (가장 흔함, 검사 후 충분히 쉬면 됨)\n• 혈압 일시 저하\n• 두통\n• → 대부분 귀가 후 2~3시간 내 회복\n\n아르기닌:\n• 구역, 구토\n• 두통\n• → 주입 속도 조절로 줄일 수 있음\n\n글루카곤:\n• 구역, 구토\n• 두통\n• → 식사 후 저혈당 주의\n\n인슐린 (가장 강력, 드물게 사용):\n• 저혈당 (가장 주의!)\n• 식은땀, 어지러움, 손 떨림\n• 병원에서 즉시 포도당 보충\n\n✅ 안심해도 되는 이유:\n• 모든 부작용은 의료진이 예상하고 대비함\n• 검사실에서 24시간 모니터링 가능\n• 부작용으로 심각한 상황이 된 사례는 극히 드묾\n\n⚠️ 귀가 후 주의사항:\n• 클로니딘 사용 시: 당일 격렬한 활동 피하기\n• 졸음이 심하면 낮잠 허용","tip":"검사가 무서워서 미루는 분들이 많은데, 대부분의 부작용은 일시적이고 병원에서 즉시 처리됩니다. 치료 기회를 잃는 것이 더 아깝습니다."},"gh_monitoring":{"type":"question","text":"성장호르몬 치료 중 모니터링에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"주사 부위가 붓거나 빨개져요 — 정상인가요?","next":"gh_side_injection_site"},{"text":"두통, 다리 통증 등 부작용이 걱정돼요","next":"gh_side_common"},{"text":"병원 방문 주기와 정기 검사가 궁금해요","next":"gh_monitoring_schedule"},{"text":"어떤 증상일 때 즉시 응급실에 가야 하나요?","next":"gh_emergency_signs"}]},"gh_side_injection_site":{"type":"answer","title":"주사 부위 부작용 — 이렇게 관리하세요","content":"주사 부위 반응은 가장 흔한 부작용이에요. 대부분 관리로 해결됩니다.\n\n🔴 흔한 반응:\n• 빨갛게 부어오름\n• 약간의 가려움\n• 피부 약간 두꺼워짐\n→ 며칠 내 저절로 호전, 치료 중단 불필요\n\n⚠️ 주의가 필요한 상태:\n• 딱딱하게 굳는 경결 (Lipohypertrophy)\n  → 같은 부위에 반복 주사한 결과\n  → 약물 흡수 방해 → 치료 효과 감소\n• 함몰 (Lipoatrophy)\n  → 드물지만 지방 조직 손실\n  → 부위 로테이션으로 예방 가능\n\n✅ 관리 방법:\n1. 반드시 4곳 이상 로테이션\n   복부 → 허벅지 → 팔 뒤쪽 → 엉덩이 순환\n2. 같은 부위 연속 주사 절대 금지\n3. 주사 15~30분 전 냉장고에서 꺼내 상온화\n   (차가운 약물은 통증·반응 증가)\n4. 주사 후 발적: 찬 물수건으로 가볍게 찜질\n5. 주사 전 알코올 소독 후 10~15초 충분히 건조","tip":"딱딱한 경결이 생기면 그 부위는 최소 4주 이상 쉬어야 해요. 경결 부위에 계속 주사하면 약물 흡수가 나빠져 치료 효과가 떨어집니다."},"gh_side_common":{"type":"answer","title":"두통·다리 통증 등 흔한 부작용 대처법","content":"성장호르몬 치료 중 나타날 수 있는 부작용들과 대처법입니다.\n\n📋 흔한 부작용 (3% 미만):\n\n두통:\n• 치료 초기 1~2주 내 흔함\n• 대부분 2주 안에 자연 소실\n• 타이레놀로 조절 가능\n• ⚠️ 예외: 구토 동반 + 아침에 심하면 → 즉시 연락\n\n근육통·관절통 (성장통 비슷):\n• 성장호르몬이 근골격에 작용하며 발생\n• 따뜻한 찜질, 스트레칭으로 완화\n• 2~4주 내 대부분 소실\n\n손발 부종:\n• 치료 초기 일시적 나트륨·수분 저류\n• 용량 조절 또는 시간이 지나면 호전\n\n갑상선 기능 저하:\n• 일부에서 TSH 수치 일시 저하\n• 6개월마다 혈액검사로 확인\n• 필요 시 갑상선 호르몬 보충\n\n⚠️ 절뚝거림·고관절 통증:\n• 대퇴골두 골단 분리증 의심 신호\n• 즉시 병원 내원 (응급 가능성)\n\n⚠️ 등이 휘는 것 같으면:\n• 척추측만증 확인\n• 정기 검진에서 체크","tip":"대부분의 부작용은 치료 초기에 잠시 나타났다가 사라져요. 하지만 절뚝거림, 심한 두통+구토는 즉시 연락해야 하는 응급 신호입니다."},"gh_monitoring_schedule":{"type":"answer","title":"치료 중 모니터링 일정 — 이렇게 관리해요","content":"성장호르몬 치료는 정기적인 모니터링이 안전하고 효과적인 치료의 핵심입니다.\n\n📅 병원 방문 일정:\n\n처음 3개월: 매월 방문\n• 주사 적응 확인\n• 부작용 체크\n• 주사 기술 점검\n• 키/몸무게 측정\n\n안정기 이후: 3~6개월마다\n• 키 성장 확인\n• 용량 재조정 여부 검토\n\n🔬 정기 검사 일정:\n\n매 3~6개월:\n• 혈액검사: IGF-1 (목표: 0~+2 SDS)\n• 갑상선 기능 (TSH, 유리T4)\n\n매 6~12개월:\n• 골연령 X-ray (성장판 진행 상황)\n\n당뇨 위험군 (비만, 가족력):\n• 혈당 추가 검사\n\n🏠 집에서 매일 확인할 것:\n1. 주사 날짜·부위 기록\n2. 주사 부위 상태 (경결·함몰 여부)\n3. 이상 증상 (두통, 절뚝거림 등)\n\n📊 IGF-1 목표 범위:\n• +2 SDS 초과: 용량 줄이기\n• -2 SDS 이하: 용량 늘리기 또는 주사 기술 확인","tip":"주사 기록 앱이나 수첩을 활용하세요. 날짜·부위를 기록하면 경결 예방에도 도움이 되고, 병원 방문 시 순응도 확인에도 사용됩니다."},"gh_emergency_signs":{"type":"answer","title":"즉시 응급실에 가야 하는 3가지 신호","recommend":true,"urgent":true,"content":"성장호르몬 치료 중 다음 증상은 응급 상황입니다. 즉시 응급실로!\n\n🚨 응급 증상 3가지:\n\n1️⃣ 심한 두통 + 구토 + 시야 장애\n→ 두개내압 상승(가성 뇌종양) 의심\n증상: 아침에 특히 심한 두통, 구토, 흐리게 보임\n→ 치료를 일시 중단하면 대부분 회복\n\n2️⃣ 갑작스러운 절뚝거림 + 고관절·무릎 통증\n→ 대퇴골두 골단 분리증 의심\n특히: 비만 남아에서 더 흔함\n→ 즉각 치료 필요, 방치하면 영구 장애 가능\n\n3️⃣ 주사 부위 고름 + 38.5°C 이상 발열\n→ 심한 세균 감염 의심\n→ 주사 기구 오염 또는 피부 세균 감염\n\n⚠️ 이럴 때 즉시 담당 의사에게 연락:\n• 갑작스러운 시력 변화\n• 심한 알레르기 반응 (발진 + 호흡 곤란)\n• 극심한 근육·관절통으로 일상생활 불가\n\n✅ 일반 부작용과 구별:\n• 단순 두통 (약 먹으면 나음) → 경과 관찰\n• 주사 부위 발적 (며칠 내 호전) → 경과 관찰\n• 성장통 비슷한 다리 통증 → 경과 관찰","tip":"불안하면 언제든 담당 의사에게 연락하세요. 증상 사진을 찍어두면 전화 상담 시 도움이 됩니다."},"puberty_diagnosis_detail":{"type":"question","text":"성조숙증 진단 검사에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"태너 단계란 무엇인가요?","next":"tanner_stage_explain"},{"text":"GnRH 자극검사는 어떻게 진행되나요?","next":"gnrh_stim_test"},{"text":"뇌 MRI가 꼭 필요한가요?","next":"puberty_mri_need"},{"text":"진단 검사 비용이 궁금해요","next":"puberty_diagnosis_cost"},{"text":"검사 결과에 따라 어떻게 진행되나요?","next":"puberty_after_diagnosis"}]},"tanner_stage_explain":{"type":"answer","title":"태너 단계 — 사춘기 발달 정도를 1~5단계로 평가해요","content":"태너 단계는 사춘기 발달 정도를 1(사춘기 전)~5(성인)까지 나누는 의학적 기준입니다.\n\n👧 여아 태너 단계:\n• 1기: 사춘기 전 (유방·음모 없음)\n• 2기: 유두 아래 작은 경결 (유방 시작), 음모 시작 ← 사춘기 시작\n• 3기: 유방·유륜 동시 증대, 음모 증가\n• 4기: 유륜이 유방 위로 돌출\n• 5기: 성인형 유방 (유륜 함몰), 성인 음모\n\n성조숙증: 만 8세 전에 2기 도달\n정상 범위: 8~13세 사이에 2기 도달\n\n👦 남아 태너 단계:\n• 1기: 사춘기 전 (고환 3mL 이하)\n• 2기: 고환 4mL 이상 ← 사춘기 시작\n• 3기: 고환 10mL, 음경 신장, 음모 증가\n• 4기: 고환 15mL, 변성기\n• 5기: 성인 (고환 20mL 이상)\n\n성조숙증: 만 9세 전에 2기 도달\n정상 범위: 9~14세 사이에 2기 도달\n\n💡 오키드계측기:\n고환 크기를 재는 타원형 구슬 모음\n병원에서 태너 단계 평가 시 사용","tip":"태너 단계는 달력 나이와 독립적이에요. 같은 9세라도 태너 1기(미발달)~3기(중기)까지 다양할 수 있습니다."},"gnrh_stim_test":{"type":"answer","title":"GnRH 자극검사 — 성조숙증 확진의 핵심 검사","content":"진성 성조숙증 여부를 확진하는 「금표준」 검사입니다.\n\n🔬 검사 원리:\n인공 GnRH를 주사해 뇌하수체가 얼마나 반응하는지 확인\n→ 성조숙증이면 LH가 크게 상승\n→ 아직 사춘기 전이면 FSH 중심의 낮은 반응\n\n📋 검사 진행:\n1. 병원 도착 (금식 불필요)\n2. 팔에 유치 바늘 1회 삽입\n3. GnRH 유사체(렐리펙트 등) 주사\n4. 0·30·60·90분에 총 4~5회 채혈\n5. 약 90분~2시간 소요\n\n📊 결과 해석:\n• LH 피크 ≥5 IU/L → 진성 성조숙증 ✓\n• LH 피크 <2 IU/L, FSH 우세 → 조기 유방 발육증 (치료 불필요)\n• LH 2~5: 경계 → 추적 관찰\n\n💰 비용 (2025년 기준):\n• 자극검사: 약 5~10만 원 (급여 적용 시)\n• 골반 초음파: 약 3~5만 원\n• 골연령 X-ray: 약 2~3만 원\n• 뇌 MRI: 급여 시 10~20만 원 (비급여 40~60만 원)\n\n⚠️ 주의사항:\n유치 바늘 제거 전까지 팔 움직임 최소화","tip":"GnRH 자극검사는 아이도 부모도 긴장되지만, 이 검사 없이는 치료 여부도, 보험 적용도 결정할 수 없어요. 꼭 필요한 과정입니다."},"puberty_mri_need":{"type":"answer","title":"뇌 MRI — 꼭 받아야 하나요?","content":"모든 아이에게 필요하지는 않아요. 상황에 따라 다릅니다.\n\n📋 뇌 MRI가 필요한 경우:\n\n여아:\n• 만 6세 미만에서 성조숙증 → 필수\n• 6~8세이지만 급격히 빠른 진행\n• 두통·시력 이상·신경 증상 동반\n\n남아:\n• 성조숙증 진단 시 → 항상 필수\n  이유: 남아 성조숙증의 7~16%에서 뇌 병변 발견\n  여아보다 기질적 원인 확률 높음\n\n🧠 MRI에서 확인하는 것:\n• 시상하부 과오종 (양성 종양, 가장 흔한 원인)\n• 뇌하수체 종양\n• 뇌종양\n• 기타 뇌 구조 이상\n\n⚠️ 아이가 가만히 못 있을 때:\n• 20~30분 동안 움직이지 않아야 함\n• 만 7세 미만은 수면 진정 필요할 수 있음\n• 사전에 의사와 상담\n\n💰 비용:\n• 급여 적용 시: 10~20만 원\n• 비급여: 40~60만 원\n• 성조숙증 진단 후 뇌 병변 의심되면 대부분 급여 적용 가능","tip":"여아 만 6~8세는 MRI가 필수는 아니지만, 진행이 매우 빠르다면 찍는 게 안전해요. 남아는 무조건 찍는 것이 권장됩니다."},"puberty_diagnosis_cost":{"type":"answer","title":"성조숙증 진단 검사 비용","content":"2025년 기준 급여 적용 시 예상 비용입니다.\n\n💰 주요 검사 비용 (급여 적용 시):\n\n• 혈액검사 (기본 호르몬): 약 3~5만 원\n• 골연령 X-ray: 약 2~3만 원\n• 골반 초음파 (여아): 약 3~5만 원\n• GnRH 자극검사: 약 5~10만 원\n• 뇌 MRI: 10~20만 원 (비급여 40~60만 원)\n\n첫 방문 예상 총액 (MRI 제외): 약 15~25만 원\n뇌 MRI 포함 시: 약 25~45만 원\n\n📋 급여 적용 기준:\n• 성조숙증 진단 기준 충족 시 대부분 급여\n• 뇌 MRI는 뇌 병변 의심 판단 시 급여 가능\n• 초음파는 급여/비급여 병원마다 다를 수 있음\n\n💡 절약 팁:\n• 실손보험 가입 여부 확인 (비급여 일부 보상 가능)\n• 검사 전 보험 적용 여부 미리 확인 요청\n• 대학병원보다 소아내분비 전문 클리닉이 비용 낮을 수 있음","tip":"진단 검사 비용은 한 번이지만 치료비는 수년간 발생해요. 치료 시작 전에 보험 급여 여부를 꼭 확인하세요."},"puberty_after_diagnosis":{"type":"answer","title":"검사 결과에 따라 어떻게 달라지나요?","content":"GnRH 자극검사 결과에 따라 3가지 방향으로 나뉩니다.\n\n1️⃣ LH 피크 ≥5 → 진성 성조숙증 확진\n→ 치료 시작 (GnRH 주사)\n→ 골연령, 최종 키 예측 후 치료 계획 수립\n→ 뇌 MRI 추가 (남아 필수, 여아 상황에 따라)\n\n2️⃣ LH 피크 <2, FSH 우세 → 조기 유방 발육증\n→ 치료 불필요\n→ 3~6개월마다 추적 관찰\n→ 다음 4가지 나타나면 즉시 재평가:\n  • 유방이 빠르게 커짐\n  • 음모 발달\n  • 키 급성장\n  • 질 분비물\n\n3️⃣ LH 피크 2~5 → 경계값 (빠른 사춘기)\n→ 진성과 가성 중간 상태\n→ 3~6개월마다 경과 관찰\n→ 골연령 빠르면 치료 고려\n→ 성장 속도 유지되면 기다릴 수도 있음\n\n✅ 가성 성조숙증인 경우:\n원인(낭종, 종양, 외부 에스트로겐 노출) 제거\n→ 원인 제거 후 사춘기 중단 여부 확인","tip":"검사 결과가 경계값이라고 실망하지 마세요. 경계값은 치료가 필요 없을 수도 있고, 3~6개월 관찰 후 치료 시작해도 늦지 않은 경우가 많아요."},"gnrh_how_work":{"type":"answer","title":"GnRH 치료 원리와 효과","content":"GnRH 유사체는 「도어벨 계속 누르기」 방식으로 성호르몬을 억제합니다.\n\n🔬 작용 원리:\n\n정상: 뇌에서 GnRH를 「맥동성」으로 분비 (띵동! 띵동! 간헐적)\n→ 뇌하수체 반응 → LH·FSH 분비 → 성호르몬 생성\n\nGnRH 주사 후: GnRH를 「지속적」으로 억제 (꾹~~ 계속 누름)\n→ 뇌하수체 수용체 탈감작(무감각화)\n→ LH·FSH 분비 격감\n→ 성호르몬 억제\n→ 사춘기 진행 멈춤\n\n📊 치료 효과:\n• 성호르몬 분비 억제\n• 골연령 진행 속도 정상화 (빨라지던 것 멈춤)\n• 성장판이 더 오래 열려 있게 됨\n• 최종 키 보호\n• 조기 초경 예방\n\n🕒 효과 나타나는 시기:\n• 2~4주: 성호르몬 억제 시작\n• 3~6개월: 완전 억제\n• 첫 1~2주 「플레어업」: 일시적 호르몬 상승 (정상 반응)\n\n✅ 40년 이상 검증된 안전한 치료:\n• 생식 기능 정상 (치료 종료 후 정상 임신 가능)\n• 골밀도 정상 (회복됨)\n• 대사 이상 없음","tip":"치료를 시작하면 초기 1~2주간 플레어업으로 여아는 소량 질 출혈이 있을 수 있어요. 걱정하지 마세요 — 이는 치료가 작동하는 정상적인 과정입니다."},"gnrh_duration":{"type":"answer","title":"GnRH 치료 기간과 종료 시점","content":"치료 기간은 아이마다 다르지만, 보통 2~4년입니다.\n\n📅 치료 기간:\n• 평균 2~4년\n• 시작이 빠를수록 (만 6세 전) → 더 긴 치료, 더 큰 효과\n• 시작이 늦을수록 (만 8세 이후) → 짧은 치료, 제한적 효과\n\n🔴 치료 종료 시점:\n\n여아: 골연령 12~12.5세\n• 이 시기 = 또래의 정상 사춘기 시기\n• 중단 후 평균 1년 내 초경\n\n남아: 골연령 13~13.5세\n\n⚠️ 이때는 종료 고려:\n• 또래의 정상 사춘기 시기에 맞춰 종료\n• 골연령이 이미 많이 앞서 있어 치료 효과 없을 때\n• 아이가 극심한 부담감 호소 시\n\n💡 종료 후 무슨 일이?\n• 억제되었던 사춘기가 자연스럽게 재개\n• 여아: 종료 후 1년(0.9~1.5년) 내 초경\n• 남아: 종료 후 6~12개월 내 사춘기 진행\n• 생식 기능 완전히 정상으로 회복\n\n📊 급여 종료 연령 (건강보험):\n• 여아 만 11세 → 자동 비급여 전환\n• 여아 만 12세 → 이후에도 필요 시 비급여 치료 가능\n• 남아 만 12세 → 자동 비급여\n• 남아 만 13세 → 이후 비급여","tip":"치료 종료 후 사춘기가 재개되는 것은 정상이에요. 오히려 또래와 비슷한 시기에 초경이 오는 것이 치료 성공의 지표입니다."},"gnrh_flare_up":{"type":"answer","title":"플레어업 현상 — 처음에 호르몬이 잠깐 오르는 현상","content":"GnRH 주사를 처음 맞은 후 7~10일간 성호르몬이 일시적으로 상승하는 현상입니다.\n\n❓ 왜 일어나나요?\n주사 초기에는 억제 전에 뇌하수체가 강하게 반응\n→ 성호르몬이 잠시 더 분비됨\n→ 이후 수용체가 탈감작되며 억제 시작\n\n📊 플레어업 증상:\n여아:\n• 소량의 질 출혈 (소량, 자연 소실)\n• 유방 통증\n• 약간의 감정 기복\n\n남아:\n• 일시적 음경 발기\n• 기분 변화\n\n✅ 안심해도 되는 이유:\n• 7~14일 내 자연 소실\n• 치료가 정상적으로 작동하는 과정\n• 멈추거나 감량할 필요 없음\n\n⚠️ 언제 병원에 연락?\n• 질 출혈이 2주 이상 지속\n• 출혈량이 많아 생리 수준\n• 심한 복통 동반\n\n💡 다음 주사부터는?\n플레어업은 처음에만 발생\n이후에는 꾸준히 억제만 됨","tip":"첫 주사 후 딸아이에게 소량 질 출혈이 생겨도 당황하지 마세요. 약이 작동하는 정상 과정이에요. 2주 이상 지속되거나 양이 많으면 연락주세요."},"gnrh_insurance_detail":{"type":"answer","title":"GnRH 치료 급여 조건과 비용 상세","content":"2025년 1월 강화된 기준 기준으로 설명드립니다.\n\n✅ 급여 조건 5가지 (모두 충족해야 함):\n\n1. 이차 성징 발현 시점\n   • 여아: 만 8세 미만 시작 기록 필요\n   • 남아: 만 9세 미만 시작 기록 필요\n   • ⚠️ 2025년부터 \"의학적으로 확인 가능한 시점\" 필요\n   • 부모 진술만으로 소급 인정 안 될 수 있음\n\n2. GnRH 자극검사 LH 피크 ≥5 IU/L\n\n3. 골연령 초과 (실제 나이보다 앞선 상태)\n\n4. 치료 시작 나이\n   • 여아 만 9세 미만\n   • 남아 만 10세 미만\n\n5. 급여 지속 기간\n   • 여아 만 11세까지 (이후 비급여 전환)\n   • 남아 만 12세까지\n\n💰 비용 비교:\n\n급여 적용 시:\n• 1개월형: 월 약 4~5만 원\n• 3개월형: 회당 약 12~15만 원\n• 연간: 약 50~60만 원\n\n비급여 시:\n• 1개월형: 월 약 11만 원\n• 3개월형: 회당 약 33만 원\n• 연간: 약 130~400만 원\n\n💡 실손보험 확인:\n가입 시기에 따라 비급여 일부 보상 가능","tip":"이차 성징이 의심되면 빨리 병원을 방문해서 기록을 남겨두세요. 2025년부터 기준이 강화되어 늦게 방문하면 급여 적용이 어려울 수 있어요."},"gnrh_drugs_detail":{"type":"answer","title":"GnRH 약물 종류와 주사 방법","content":"국내에서 사용 가능한 GnRH 유사체는 크게 두 계열입니다.\n\n💊 약물 계열:\n\n류프로렐린 계열:\n• 제품명: 루프린, 루페어, Eligard\n• 주사 방법: 피하주사 또는 근육주사\n• 제형: 1개월형, 3개월형\n\n트립토렐린 계열:\n• 제품명: 디페렐린, 데카펩틸\n• 주사 방법: 근육주사 (엉덩이)\n• 제형: 1개월형, 3개월형\n\n두 계열의 효과와 안전성은 동등\n의사가 상황에 맞게 선택\n\n⏱️ 주사 간격 (절대 늦추면 안 됩니다!):\n• 1개월형: 25~29일 이내\n• 3개월형: 77~87일 이내\n\n늦추면 → 성호르몬 일시 상승 (돌파 현상)\n→ 골연령 진행이 다시 빨라질 수 있음\n\n💉 근육주사 vs 피하주사:\n• 근육주사: 생체이용률 높음, 통증 약간 더 있음\n• 피하주사: 통증 적음, 집에서 자가 주사 가능 (일부 제형)\n• 의사가 아이 상황에 맞게 결정\n\n🏥 주사는 병원에서만:\n성조숙증 주사는 병원 방문 시 맞음\n(성장호르몬과 달리 집에서 자가주사 아님)","tip":"주사 날짜를 달력·스마트폰에 꼭 기록해두세요. 하루 이틀 늦는 것도 「돌파 현상」을 일으킬 수 있어요."},"thelarche_vs_precocious":{"type":"answer","title":"조기 유방 발육증 vs 성조숙증 — 어떻게 구별하나요?","content":"가장 중요한 차이는 「다른 사춘기 징후의 유무」입니다.\n\n📊 비교표:\n\n항목 | 조기 유방 발육증 | 진성 성조숙증\n유방 변화 | 있음 | 있음\n음모 발달 | 없음 | 있음\n키 급성장 | 없음 | 있음 (7~8cm↑)\n질 분비물 | 없음 | 있음\n골연령 | 정상 or 경미 초과 | 2년 이상 초과\nGnRH LH 피크 | <2 IU/L | ≥5 IU/L\n치료 필요 | 대부분 불필요 | 필요\n예후 | 87% 자연 호전 | 치료 안 하면 최종 키 손실\n\n🔑 핵심 구별 포인트:\n• 음모 발달 → 진성 성조숙증 강력 시사\n• 키 급성장 → 진성 시사\n• 질 분비물 → 진성 시사\n• 유방만 있고 위 3가지 없음 → 조기 유방 발육증 가능성\n\n✅ 확진 방법:\n• GnRH 자극검사\n  LH <2 → 조기 유방 발육증\n  LH ≥5 → 진성 성조숙증","tip":"음모, 질 분비물, 급성장 중 하나라도 있으면 단순 조기 유방 발육증이 아닐 수 있어요. 빨리 진료받으세요."},"thelarche_prognosis":{"type":"answer","title":"조기 유방 발육증 — 예후와 경과","content":"조기 유방 발육증은 대부분 걱정 없이 좋아집니다.\n\n📊 예후 통계:\n• 87%: 저절로 호전 (51% 완전 소실, 36% 거의 소실)\n• 13%: 사춘기 때까지 유지 (정상 사춘기 시 같이 커짐)\n• 약 10%만: 진성 성조숙증으로 진행\n• 특히 만 2세 이하 발생: 성조숙증 진행 확률 약 2%로 매우 낮음\n\n✅ 조기 유방 발육증이면:\n• 최종 키: 정상 (성장판 조기 폐쇄 없음)\n• 사춘기 시작 시기: 정상\n• 초경 시기: 정상\n• 생식 기능: 정상\n• 유방암 위험: 전혀 증가 없음\n\n📅 추적 관찰 방법:\n• 처음 6개월: 3개월마다 방문\n• 안정적이면: 6개월마다\n• 확인 내용: 유방 크기, 음모, 질 분비물, 성장 속도\n\n🔴 성조숙증으로 넘어가는 4가지 신호:\n1. 유방이 빠르게 커짐\n2. 음모 발달\n3. 질 분비물\n4. 키가 갑자기 7~8cm/년 이상 성장\n\n→ 이 중 하나라도 나타나면 즉시 재평가!","tip":"조기 유방 발육증은 치료가 \"필요 없는\" 것이지 \"방치\"하는 게 아니에요. 3~6개월 정기 추적만 잘 하면 됩니다."},"thelarche_cause":{"type":"answer","title":"조기 유방 발육증 — 환경호르몬이 원인인가요?","content":"부모님들이 가장 많이 걱정하는 부분입니다. 현재까지의 연구 결과를 알려드립니다.\n\n🔬 원인:\n\n대부분 (특발성):\n• 원인 불명\n• 유방 조직이 여성호르몬에 일시적으로 민감하게 반응\n• 난소에서 에스트로겐이 잠깐 분비됐다 멈춤\n\n환경호르몬 가능성:\n• 일부 연구: 라벤더·티트리 오일 사용 후 멍울 → 중단 후 감소\n• 플라스틱(BPA): 가능성 제기되나 인과관계 불명확\n• 콩 제품: 식물성 에스트로겐, 영향 미미\n• 유제품: 연구 결과 불일치\n\n⚠️ 환경호르몬 우려 시 실천 가이드:\n• 전자레인지: 플라스틱 용기 → 유리·스테인리스 교체\n• 라벤더·티트리 오일: 잠시 중단 후 경과 관찰\n• 영수증: 자주 만지지 않도록\n\n❌ 과도한 걱정은 불필요:\n• 대부분은 환경호르몬과 무관\n• 부모님이 미안해할 필요 없음\n• 원인보다 경과 관찰이 더 중요","tip":"명확한 원인 없이 생기는 경우가 대부분이에요. 환경호르몬을 줄이려는 노력은 좋지만, 그것 때문에 생겼다고 자책할 필요는 없어요."},"thelarche_followup":{"type":"answer","title":"조기 유방 발육증 추적 관찰 — 집에서 확인할 것들","content":"정기 병원 방문과 함께 집에서도 주기적으로 확인해주세요.\n\n🏥 병원 방문 주기:\n• 처음 6개월: 3개월마다\n• 이후 안정적이면: 6개월마다\n• 이상 신호 시: 즉시 방문\n\n🔍 집에서 매달 확인할 사항:\n\n1. 유방 크기 변화\n   • 빠르게 커지는지 (3개월 내 1단계 이상 변화)\n   • 한쪽만 있다가 양쪽으로 변했는지\n\n2. 음모 발달 여부\n   • 서혜부·음부에 잔털 있는지\n\n3. 질 분비물 여부\n   • 속옷에 노란색·흰색 분비물\n\n4. 키 성장 속도\n   • 3개월마다 키 측정 기록\n   • 갑자기 빠르게 크는지\n\n⚠️ 즉시 병원 연락할 신호:\n• 유방이 1개월 내 눈에 띄게 커짐\n• 음모 발달\n• 질 분비물\n• 3개월에 2cm 이상 성장\n\n📝 기록 관리:\n• 사진으로 유방 변화 기록 (3개월마다)\n• 키 기록 (날짜 포함)\n→ 병원 방문 시 변화 추적에 도움","tip":"이상 신호를 모르고 지나치는 경우가 많아요. 3개월마다 키 재고 유방 크기 확인하는 습관을 들여주세요."},"vitd_calcium_link":{"type":"answer","title":"비타민D가 칼슘 흡수에 왜 그렇게 중요한가요?","content":"비타민D는 칼슘의 「열쇠」입니다. 열쇠 없이는 문이 열리지 않아요.\n\n🔑 작용 원리:\n1. 비타민D가 소장 세포에 신호 전달\n2. 칼슘 운반 단백질(Calbindin) 생성 촉진\n3. 이 단백질이 칼슘을 장에서 혈액으로 능동 수송\n\n📊 흡수율 차이:\n• 비타민D 부족 시: 칼슘 흡수율 10~15%\n• 비타민D 충분 시: 칼슘 흡수율 30~40%\n→ 같은 우유를 마셔도 2~3배 차이!\n\n💡 실제 계산:\n• 우유 200mL = 칼슘 220mg\n• 비타민D 부족 시: 실제 흡수 22~33mg\n• 비타민D 충분 시: 실제 흡수 66~88mg\n→ 흡수량 3배 차이\n\n🥛 칼슘만 먹어도 의미가 없는 경우:\n• 비타민D 없으면 칼슘의 대부분이 그냥 배출됨\n• 「비타민D 없이 칼슘 보충 = 돈 낭비」\n\n⚠️ 칼슘을 빼앗는 것들:\n• 탄산음료 (인산): 칼슘 배출 촉진\n• 짠 음식: 소변으로 칼슘 손실\n• 카페인: 칼슘 흡수 방해","tip":"우유를 매일 충분히 마시는데도 골밀도가 낮다면 비타민D 수치를 먼저 확인해보세요. 비타민D 없이는 아무리 칼슘을 먹어도 흡수가 안 됩니다."},"vitd_sun":{"type":"answer","title":"햇빛으로 비타민D 만들기 — 얼마나 해야 하나요?","content":"비타민D는 햇빛(자외선 UVB)이 피부에 닿을 때 합성됩니다.\n\n☀️ 효과적인 햇빛 노출 조건:\n• 시간: 오전 10시~오후 2시 사이\n  (UVB가 대기층을 통과하는 시간)\n• 부위: 얼굴 + 팔 정도 노출\n• 시간: 15~30분 (피부색에 따라 다름)\n• 자외선 차단제: 바르면 합성 거의 안 됨\n\n❌ 한국에서 햇빛으로 합성이 어려운 경우:\n• 겨울 (11~2월): 북위 33도 이상에서 UVB 부족\n  → 이 기간은 아무리 햇빛 쬐어도 합성 안 됨\n• 실내 생활 (유리창은 UVB 차단)\n• 미세먼지가 심한 날\n• 야외 활동 적은 아이\n\n📊 한국 아이들의 현실:\n• 한국 아이의 70~80%가 비타민D 부족\n• 실내 생활 ↑, 자외선 차단제 ↑, 미세먼지 ↑\n→ 햇빛만으로는 부족한 경우가 대부분\n\n💊 결론:\n• 여름: 야외 활동 30분 정도면 어느 정도 보충 가능\n• 가을~봄: 보충제 필수\n• 겨울: 반드시 보충제\n\n혈중 목표 농도: 30~50 ng/mL\n(혈액검사로 확인 가능)","tip":"한국의 겨울에는 아무리 햇빛을 많이 쬐어도 비타민D가 만들어지지 않아요. 11월부터 3월까지는 반드시 보충제가 필요합니다."},"vitd_supplement_guide":{"type":"answer","title":"비타민D 보충제 선택과 복용 가이드","content":"올바른 비타민D 보충제 선택법과 복용 방법을 알려드립니다.\n\n💊 D3 vs D2:\n• 비타민D3 (콜레칼시페롤): 권장 ✓\n  동물성, 우리 몸에서 자연적으로 만들어지는 형태\n  효과 D2의 1.5~2배\n• 비타민D2 (에르고칼시페롤): 2순위\n  식물성, 체내 활용율 낮음\n→ 제품 선택 시 「D3」 확인\n\n📏 연령별 권장 용량:\n• 0~12개월: 400 IU/일\n• 1~18세: 600 IU/일\n• 결핍 상태 (혈중 <20ng/mL): 1,000~2,000 IU/일\n• 치료용 (의사 처방): 최대 4,000 IU/일\n\n⏰ 언제 먹이나요?\n• 지용성 비타민 → 식사 중 또는 직후 (기름과 함께 흡수↑)\n• 아침 식사 후 권장\n• 매일 같은 시간 (일정한 습관)\n\n🧪 혈중 농도 확인:\n• 목표: 30~50 ng/mL\n• 20 미만: 결핍\n• 보충 시작 3개월 후 혈액검사 권장\n\n💰 보충제 선택 팁:\n• 성분: 비타민D3 단독 or D3+K2 복합\n• 형태: 액상(유아), 씹어먹는 젤리(소아), 캡슐(청소년)\n• 브랜드보다 성분 확인이 중요","tip":"비타민D는 지용성이라 식사와 함께 먹어야 흡수가 잘 돼요. 공복에 먹으면 흡수율이 떨어집니다."},"calcium_foods":{"type":"answer","title":"칼슘 많은 음식과 현실적인 섭취 팁","content":"칼슘이 풍부한 식품과 실제로 먹이는 방법을 알려드립니다.\n\n🥛 칼슘 함량 TOP 식품:\n• 우유 200mL: 220mg ★★★\n• 멸치 작은 것 20g: 200mg ★★★\n• 치즈 30g: 180~210mg ★★★\n• 요거트 100g: 120~150mg ★★\n• 두부 100g: 80~100mg ★★\n• 뱅어포 10g: 150mg ★★★\n• 깨 10g: 130mg ★★\n• 브로콜리 100g: 40~50mg ★\n\n📊 연령별 하루 칼슘 권장량:\n• 1~3세: 700mg (우유 약 3잔)\n• 4~8세: 1,000mg (우유 약 4~5잔)\n• 9~18세: 1,300mg (우유 약 6잔) ← 가장 중요!\n\n✅ 현실적인 섭취 전략:\n\n우유 거부하는 아이:\n• 우유 → 따뜻하게 + 소량 꿀\n• 요거트 스무디 (냉동 과일 + 요거트)\n• 뱅어포 조림 (밥 반찬)\n• 미역국 (다시마도 칼슘 많음)\n\n매일 목표 달성 조합 예시 (9세, 1,300mg 목표):\n• 아침 우유 1잔 (220mg)\n• 점심 멸치볶음 + 치즈 (350mg)\n• 저녁 두부찌개 + 저녁 우유 (320mg)\n• 간식 요거트 (150mg)\n→ 합계 약 1,040mg ✓\n\n⚠️ 칼슘 흡수 방해 요소:\n• 탄산음료 속 인산\n• 짠 음식 (나트륨과 함께 배출)\n• 철분·아연 보충제 (동시 복용 피하기)","tip":"멸치는 칼슘 챔피언! 뼈까지 먹을 수 있는 멸치볶음, 멸치국물은 아이 칼슘 보충에 최고예요. 우유 못 먹는 아이라면 멸치가 훌륭한 대안입니다."},"protein_why_detail":{"type":"answer","title":"단백질이 성장에 왜 그렇게 중요한가요?","content":"단백질은 성장의 「원재료」입니다. 설계도(호르몬)가 있어도 재료 없으면 집을 못 짓습니다.\n\n🏗️ 단백질이 필요한 이유:\n\n1. 성장호르몬 자체가 단백질\n   → 단백질 없으면 호르몬 생성 불가\n\n2. IGF-1 생성에 단백질이 재료\n   → 간이 IGF-1 만들 때 아미노산 필요\n\n3. 뼈 기질(콜라겐)의 30%가 단백질\n   → 칼슘이 달라붙는 구조물 형성\n\n4. 근육의 75%가 단백질\n   → 성장기 근육 발달에 필수\n\n5. 면역세포·효소·호르몬 모두 단백질\n   → 건강 유지의 기반\n\n📊 단백질 섭취가 부족하면:\n• 성장호르몬 주사를 맞아도 효과 반감\n• IGF-1 수치 저하 (영양 부족 시)\n• 성장 속도 저하\n• 면역력 저하 → 자주 아프면 성장 방해\n\n💡 아미노산의 중요성:\n• 단백질을 구성하는 기본 단위\n• 필수 아미노산 9가지: 체내 합성 불가 → 음식으로 반드시 섭취\n• 동물성 단백질: 필수 아미노산 완전 포함 (완전 단백질)\n• 식물성 단백질: 일부 필수 아미노산 부족 → 다양하게 조합 필요","tip":"성장호르몬 치료 중인 아이라면 단백질 섭취가 더욱 중요해요. 주사는 신호를 보내는 것, 단백질은 그 신호에 반응해 성장을 실행하는 재료입니다."},"protein_daily_need":{"type":"answer","title":"아이에게 하루 단백질이 얼마나 필요한가요?","content":"나이와 체중에 따라 권장량이 다릅니다.\n\n📊 연령별 권장량 (체중 1kg당):\n• 1~3세: 1.0~1.2g/kg\n• 4~13세: 0.95g/kg\n• 14~18세: 0.85g/kg\n• 운동 많이 하는 경우: 1.2~1.7g/kg\n• 성장호르몬 치료 중: 1.2g/kg 권장\n\n🧮 체중별 하루 필요량 (학령기 기준, 0.95g):\n• 20kg: 약 19g\n• 30kg: 약 28.5g\n• 40kg: 약 38g\n• 50kg: 약 47.5g\n\n📋 하루 30g 채우기 (체중 30kg 기준):\n\n아침: 달걀 1개(6g) + 우유 200mL(6.4g) = 12.4g\n점심: 닭가슴살 80g(18g) = 18g\n저녁: 두부 ¼모(8g) = 8g\n→ 합계: 38.4g ✓\n\n💡 분산 섭취가 효과적:\n한 번에 몰아 먹는 것보다 끼니마다 나눠 먹어야\n→ 단백질 합성 효율 극대화\n→ 아침 단백질이 특히 중요 (밤새 성장호르몬의 재료 공급)\n\n⚠️ 과다 섭취 주의 (2.5g/kg 이상):\n• 신장에 부담\n• 칼슘 배출 증가 (뼈 약해짐)\n• 탈수 가능성","tip":"매 끼니 단백질 식품 하나씩만 포함해도 하루 권장량이 자연스럽게 채워져요. 복잡하게 계산하기 어려우면 이 원칙 하나만 지켜보세요."},"protein_best_foods":{"type":"answer","title":"단백질 많은 음식 TOP — 현실 식단에 적용하기","content":"아이가 먹기 좋은 고단백 식품을 알려드립니다.\n\n🥩 동물성 단백질 (흡수율 높음):\n• 닭가슴살 100g: 23g ★★★\n• 참치통조림 100g: 24g ★★★\n• 연어 100g: 20g ★★★\n• 돼지 안심 100g: 22g ★★\n• 소 안심 100g: 21g ★★\n• 달걀 1개 (중): 6g ★★\n• 우유 200mL: 6.4g ★★\n• 그릭요거트 100g: 10g ★★\n• 치즈 30g: 7g ★★\n\n🌱 식물성 단백질 (다양하게 조합해야):\n• 삶은 콩 100g: 9g ★\n• 두부 100g: 8g ★\n• 땅콩버터 30g: 7g ★\n• 귀리 40g (조리 전): 5g ★\n• 아몬드 30g: 6g ★\n\n✅ 아이가 잘 먹는 형태로 변형하기:\n• 달걀: 스크램블·반숙·달걀찜·김밥 속\n• 닭: 치킨너겟·볶음·국물 요리\n• 두부: 순두부찌개·두부부침\n• 참치: 참치김밥·참치주먹밥\n• 우유: 스무디·시리얼에 적용\n\n🔑 동물성:식물성 황금 비율:\n동물성 60~70% + 식물성 30~40%\n동물성으로 필수 아미노산 확보\n식물성으로 섬유질·장 건강 챙기기","tip":"참치통조림은 단백질 챔피언! 저렴하고 조리 쉬우며 아이들도 잘 먹어요. 오일 제거 후 그냥 먹거나 밥에 비벼도 좋습니다."},"protein_timing_detail":{"type":"answer","title":"단백질 섭취 타이밍 — 언제 먹이는 게 가장 효과적인가요?","content":"언제 먹느냐도 성장에 영향을 줍니다.\n\n⭐ 최고의 타이밍 4가지:\n\n1️⃣ 아침 식사 (필수!)\n• 밤새 분비된 성장호르몬의 재료 공급\n• 아침 단백질 없으면 밤에 분비된 GH가 근육을 분해해 에너지로 사용\n• 시간 없을 때: 우유 + 삶은 달걀 하나\n\n2️⃣ 운동 후 30분~1시간 이내\n• 근육 합성 「골든타임」\n• 이 시간에 단백질 공급 → 근육 재생 + 성장 자극\n• 추천: 우유 한 잔 + 바나나\n\n3️⃣ 취침 1~2시간 전\n• 밤새 성장호르몬 분비를 위한 재료 준비\n• 단, 너무 많이 먹으면 소화로 깊은 잠 방해\n• 추천: 따뜻한 우유 1잔\n\n4️⃣ 각 끼니마다 분산\n• 3번에 나눠 먹는 것이 한 번에 몰아 먹는 것보다 합성 효율 높음\n• 매끼 15~20g 목표\n\n❌ 피해야 할 패턴:\n• 아침 굶기 + 저녁에 몰아 먹기\n• 점심에만 집중적으로 먹기\n• 운동 후 2시간 이상 굶기","tip":"아침 단백질이 가장 중요합니다. 시간이 없어도 우유 한 잔만 마셔도 6.4g의 단백질을 공급할 수 있어요."},"protein_excess":{"type":"answer","title":"단백질을 너무 많이 먹으면 안 좋은가요?","content":"「과유불급」이에요. 단백질도 적정량이 중요합니다.\n\n⚠️ 과다 섭취의 기준:\n체중 1kg당 2.5g 이상 섭취 시 문제 가능\n예) 30kg 아이 → 75g/일 이상이면 과다\n\n🚨 과다 섭취 시 부작용:\n\n신장 부담:\n• 단백질 대사 산물(요소 등)을 신장이 처리\n• 지속 과다 섭취 → 신장 여과 부담 증가\n• 신장 기능이 약한 아이는 특히 주의\n\n칼슘 배출 증가:\n• 단백질 과다 → 소변으로 칼슘 배출 증가\n• 역설적으로 뼈 건강에 마이너스\n\n탈수:\n• 단백질 대사 시 많은 물 필요\n• 수분 섭취 부족하면 탈수 위험\n\n✅ 그래도 적정 범위 내에서는 걱정 없어요:\n• 일반적인 음식으로 과다 섭취는 드묾\n• 보충제(단백질 파우더) 남용 시 주의\n\n💊 단백질 보충제 필요한 경우:\n• 극심한 편식 (고기·생선·달걀·유제품 모두 거부)\n• 채식주의 아이\n• 운동선수급 활동량\n→ 이 외에는 자연 식품이 우선","tip":"일반 식품으로만 먹는다면 과다 섭취 걱정은 거의 안 해도 돼요. 단백질 보충제(파우더 등)를 먹일 때만 용량을 주의하세요."},"zinc_deficiency_detail":{"type":"answer","title":"아연 결핍 — 성장에 어떤 영향을 주나요?","content":"아연은 「성장의 미네랄」로 불릴 만큼 중요합니다.\n\n🔬 아연의 역할:\n• GH-IGF1 축 직접 지원\n• DNA 합성에 필수 (세포 분열)\n• 200개 이상의 효소 기능에 관여\n• 식욕 조절 호르몬에 영향\n• 면역 기능 강화\n\n⚠️ 아연 결핍 신호 5가지:\n1. 성장 지연 (가장 중요)\n2. 식욕 감소 (\"밥을 안 먹어요\")\n3. 잦은 감기·감염\n4. 미각 이상 (\"맛이 없다\"고 함)\n5. 상처 회복 지연\n\n→ 아연 결핍 → 식욕 저하 → 영양 부족 → 성장 지연 악순환!\n\n🦪 아연 최고의 식품:\n• 굴 100g: 16~90mg (하루 권장량의 수배!)\n• 소고기 100g: 4~6mg\n• 달걀 1개: 0.6mg\n• 호박씨 30g: 2.2mg\n• 아몬드 30g: 0.9mg\n\n📊 연령별 권장량:\n• 1~3세: 3mg / 4~8세: 5mg\n• 9~13세: 8mg\n• 14~18세: 남아 11mg, 여아 9mg\n\n💊 아연 보충제 필요한 경우:\n• 극심한 편식\n• 채식주의 아이 (식물성은 흡수율 낮음)\n• 자주 아프고 식욕 없는 경우\n→ 의사 상담 후 보충 권장","tip":"아이가 밥을 안 먹는다면 아연 결핍을 의심해볼 수 있어요. 아연 혈액검사를 통해 확인 후 필요시 보충해보세요."},"iron_absorption_tips":{"type":"answer","title":"철분 흡수 높이는 방법 — 먹는 방법이 더 중요해요","content":"같은 음식이라도 어떻게 먹느냐에 따라 철분 흡수율이 크게 달라집니다.\n\n📊 철분 종류별 흡수율:\n• 헴철 (동물성): 15~35% 흡수\n  소고기, 닭고기, 생선, 굴, 조개\n• 비헴철 (식물성): 2~20% 흡수\n  시금치, 두부, 콩, 렌틸콩\n\n✅ 철분 흡수 UP:\n\n비타민C와 함께 먹기 (흡수율 2~3배 ↑):\n• 소고기볶음 + 파프리카 (비타민C 최다)\n• 시금치나물 + 귤 1개\n• 콩조림 + 방울토마토\n• 닭고기 + 브로콜리\n\n동물성 + 식물성 함께:\n• 고기와 채소를 같이 먹으면 비헴철 흡수도 증가\n• 예) 시금치 돼지고기볶음\n\n❌ 철분 흡수 DOWN:\n• 차·커피 (탄닌): 식사 1시간 전후 피하기\n• 칼슘 (우유·칼슘제): 철분과 흡수 경쟁\n  → 철분 보충제와 칼슘제는 2시간 간격\n• 피틴산 (통곡물, 콩): 흡수 방해\n  → 충분히 익혀 먹으면 감소\n\n🔍 철분 결핍 신호:\n• 빙식증 (얼음 씹고 싶음) ← 특징적!\n• 창백한 피부·점막\n• 쉽게 피로감\n• 집중력 저하\n• 손톱이 잘 부러짐","tip":"비타민C와 함께 먹는 것이 철분 흡수의 핵심이에요. 시금치에 귤, 고기에 파프리카 — 이 조합만 기억하세요!"},"vitk_vitc_bone":{"type":"answer","title":"비타민K·C가 뼈에 어떤 역할을 하나요?","content":"비타민D·칼슘만큼 알려지지 않았지만, 뼈 건강에 꼭 필요한 비타민들입니다.\n\n🦴 비타민K — 칼슘을 뼈에 단단히 붙이는 「접착제」\n\n역할:\n• 오스테오칼신 단백질 활성화\n• 오스테오칼신이 칼슘을 뼈에 단단히 결합\n• 혈관에 칼슘이 쌓이는 것 방지\n\n「녹색은 K」로 기억:\n• 시금치 100g: 450µg (하루 권장량의 450%!)\n• 케일 100g: 700µg\n• 브로콜리 100g: 100µg\n\n주의: 지용성이므로 기름과 함께 먹기\n→ 시금치나물에 참기름, 샐러드에 올리브유\n\n─────────────────────────────\n\n🍊 비타민C — 뼈와 연골의 「철근」\n\n역할:\n• 콜라겐 합성에 필수 (뼈 기질의 30%가 콜라겐)\n• 뼈라는 집의 철근(콜라겐) 역할\n• 식물성 철분 흡수율 2~3배 향상\n• 항산화 → 연골 손상 방지\n\n최고 식품:\n• 파프리카 (빨강/노랑) 100g: 150~200mg\n• 딸기 100g: 70mg\n• 귤 1개: 30~40mg\n• 브로콜리 100g: 90mg\n\n주의: 열에 약함 → 생으로 먹거나 짧게 살짝 데치기","tip":"비타민K는 녹색 채소에 많고, 비타민C는 색깔 있는 채소·과일에 많아요. \"매끼 초록 + 색깔 채소 1가지씩\"이면 두 비타민 모두 충분합니다."},"supplement_caution":{"type":"answer","title":"영양제 복용 시 주의사항 — 상호작용이 핵심이에요","content":"여러 영양제를 함께 먹을 때 순서와 조합이 중요합니다.\n\n⚠️ 함께 먹으면 안 되는 조합:\n\n철분 + 칼슘:\n• 같은 흡수 경로 → 서로 방해\n• 최소 2시간 간격으로 분리 복용\n\n철분 + 아연:\n• 과량 섭취 시 서로 흡수 방해\n• 음식으로 섭취하는 수준은 괜찮음\n• 보충제로 둘 다 복용 시 시간 간격\n\n✅ 함께 먹으면 좋은 조합:\n\n비타민D + 칼슘:\n• 함께 먹어야 흡수 극대화\n• 식후 함께 복용 권장\n\n철분 + 비타민C:\n• 흡수율 2~3배 향상\n• 항상 같이 먹기\n\n📋 보충제 복용 시기 권장:\n• 아침 식후: 비타민D + 칼슘 + 종합비타민\n• 점심 식후: 철분 + 비타민C (단독)\n• 취침 전 우유: 추가 칼슘\n\n⚠️ 절대 주의:\n• 철분 보충제: 아이 손에 닿지 않도록 보관\n• 과다 복용 시 심각한 중독 위험\n• 젤리·츄잉 형태 철분: 아이가 사탕으로 착각 가능\n\n💡 모든 보충제는 필요한 경우에만:\n• 균형 잡힌 식사가 가능하면 보충제 불필요\n• 편식 심할 때, 성장 지연 시 의사 상담 후 결정","tip":"여러 보충제를 동시에 먹이면 오히려 서로 방해할 수 있어요. 철분과 칼슘은 반드시 분리해서 먹여야 합니다."},"meal_snacks_detail":{"type":"answer","title":"성장기 아이에게 좋은 간식 TOP 10","content":"간식도 성장을 도울 수 있어요. 이것들을 활용해보세요.\n\n🏆 성장 최강 간식:\n\n1위. 우유 한 잔 (칼슘 220mg + 단백질 6.4g)\n2위. 그릭요거트 (단백질 10g + 칼슘)\n3위. 삶은 달걀 1~2개 (완전 단백질 6g×2)\n4위. 치즈 슬라이스 (칼슘 + 단백질)\n5위. 견과류 한 줌 (아연 + 마그네슘)\n\n✅ 과일 간식 추천:\n• 키위 1개: 비타민C 70mg (흡수 도움)\n• 딸기 10개: 비타민C 60mg\n• 바나나 1개: 마그네슘 + 에너지\n\n✅ 조합 간식:\n• 우유 + 바나나 스무디\n• 그릭요거트 + 딸기\n• 통밀 크래커 + 치즈\n• 삶은 달걀 + 방울토마토\n\n❌ 피해야 할 간식:\n• 탄산음료·에너지드링크 (칼슘 배출 + 카페인)\n• 사탕·캔디 (혈당 스파이크 → GH 억제)\n• 과자·튀김류 (영양 없고 트랜스지방)\n• 가공육 소시지 (나트륨 과다)\n\n⏰ 간식 타이밍:\n• 학교 후 오후 3~4시: 운동·놀이 전 에너지 보충\n• 취침 1~2시간 전: 우유 1잔 (밤 성장호르몬 재료)","tip":"간식도 성장의 기회예요. 과자 대신 삶은 달걀 하나, 탄산 대신 우유 한 잔으로 바꾸는 것만으로도 차이가 생깁니다."},"meal_eating_out":{"type":"answer","title":"외식할 때 어떤 메뉴를 선택하면 좋나요?","content":"외식도 현명하게 선택하면 성장에 도움이 됩니다.\n\n🥇 추천 메뉴:\n\n한식 (최고!):\n• 불고기·삼겹살 + 채소 → 단백질 + 철분\n• 삼계탕·닭볶음탕 → 단백질 + 콜라겐\n• 생선구이 + 미역국 → 오메가3 + 요오드\n• 콩비지·된장찌개 → 식물성 단백질 + 이소플라본\n\n일식:\n• 연어 덮밥 → 오메가3 + 단백질\n• 참치 초밥 → 양질의 단백질\n• 미소 된장국 → 장 건강\n\n양식:\n• 스테이크 + 샐러드 → 단백질 + 채소 밸런스\n• 오믈렛 → 달걀 단백질\n\n⚠️ 주의가 필요한 메뉴:\n• 중식: 염분 과다, 나트륨↑ → 칼슘 배출\n• 패스트푸드: 주 1회 이하로\n• 라면: 나트륨 과다, 영양 불균형\n\n💡 외식 시 팁:\n• 음식 도착 전 물 한 잔 마시기 (과식 방지)\n• 채소 반찬부터 먼저 먹기 (혈당 안정화)\n• 국물 적게 먹기 (나트륨 줄이기)\n• 다음 날 채소·물 섭취 늘리기 (보상)","tip":"외식 다음 날은 채소를 평소보다 많이, 탄산 대신 물을 많이 마셔보세요. 하루의 균형이 틀어진 걸 다음 날 보완하는 「주간 균형」이 중요해요."},"meal_active_child":{"type":"answer","title":"운동 많이 하는 아이 — 식단을 다르게 해야 하나요?","content":"운동량이 많은 아이는 일반 아이보다 더 많은 영양이 필요합니다.\n\n📊 운동하는 아이 vs 일반 아이 차이:\n\n칼로리:\n• 일반 아이 + 300~500kcal 추가\n• 하루 1~2시간 이상 운동 시\n\n단백질:\n• 일반: 0.95g/kg → 운동: 1.2~1.7g/kg\n\n탄수화물:\n• 운동 에너지원으로 충분히\n• 흰쌀밥·빵 OK (운동 시에는 탄수화물 에너지 필요)\n\n⭐ 운동 후 30분~1시간이 핵심:\n「운동 후 골든타임」에 이것들 주세요:\n• 탄수화물 + 단백질 조합\n• 예시: 바나나 1개 + 우유 200mL\n• 예시: 삶은 달걀 2개 + 과일\n• 예시: 참치 주먹밥\n\n✅ 운동하는 아이 하루 식단 예시:\n• 아침: 달걀 2개 + 우유 + 통밀빵\n• 점심: 닭고기 덮밥 + 야채 충분히\n• 운동 후 간식: 바나나 + 우유\n• 저녁: 생선구이 + 밥 + 나물\n• 취침 전: 우유 1잔\n\n⚠️ 주의:\n• 운동 중 수분 보충 필수 (목 마르기 전에)\n• 과도한 단백질 보충제는 불필요 (자연식품으로 충분)","tip":"축구·수영·태권도 등 활발하게 운동하는 아이라면 점심 도시락에 고기 반찬을 한 가지 더 추가하는 것만으로도 큰 도움이 됩니다."},"meal_short_child":{"type":"answer","title":"저신장 아이 — 특별히 신경 써야 할 영양소","content":"저신장 아이는 일반 아이보다 몇 가지 영양소를 더 신경 써야 합니다.\n\n🎯 저신장 아이 우선 영양소:\n\n1위. 단백질 (체중당 1.2g 이상)\n• 성장호르몬의 재료\n• 매 끼니 단백질 식품 필수\n\n2위. 칼슘 (1,000~1,300mg)\n• 뼈의 원재료\n• 우유 하루 3잔 이상 목표\n\n3위. 비타민D (800~1,000 IU)\n• 칼슘 흡수율 결정\n• 보충제 필요한 경우 많음\n\n4위. 아연 (권장량 상한 내)\n• IGF-1 생성에 필요\n• 식욕 저하 시 결핍 확인\n\n5위. 철분 (특히 여아)\n• 빈혈 시 성장 방해\n• 비타민C와 함께 섭취\n\n📋 아침 식사 절대 안 거르기:\n• 밤새 분비된 성장호르몬의 재료 공급\n• 아침 굶으면 호르몬이 근육을 분해해 에너지로 사용\n\n🥛 저체중 + 저신장 아이:\n• 영양 밀도 높은 식품 추가\n  → 견과류, 아보카도, 올리브유\n• 식사 횟수 늘리기 (하루 5~6회)\n• 아연 결핍 여부 확인\n\n💊 영양제 점검:\n혈액검사로 확인 후 필요한 것만:\n• 비타민D 수치 확인\n• 아연, 철분 상태 확인","tip":"저신장 아이에게 \"많이 먹어야 한다\" 강요보다 \"좋은 것을 골라 먹는다\"는 방식이 더 효과적이에요. 아침 식사 꼭 챙기는 것이 가장 중요합니다."},"acanthosis_explain":{"type":"answer","title":"흑색극세포증 — 때가 아니라 인슐린 저항성 신호예요","recommend":true,"content":"목 뒤, 겨드랑이, 사타구니가 까맣게 두꺼워지는 「흑색극세포증(Acanthosis Nigricans)」은 때가 아닙니다.\n\n🔬 원인:\n혈중 인슐린이 높아지면 (고인슐린혈증)\n→ 피부 세포(각질형성세포)를 과도하게 자극\n→ 색소 침착 + 피부 두꺼워짐\n→ 까맣고 벨벳 같은 질감의 피부\n\n✅ 이것이 의미하는 것:\n• 인슐린 저항성 존재 = 대사증후군·당뇨 전 단계\n• 소아 비만에서 매우 흔함 (비만 청소년 70% 이상 동반)\n• 아무리 씻어도 없어지지 않아요 (피부 문제가 아니라 대사 문제)\n\n📍 주로 나타나는 부위:\n• 목 뒤쪽 (가장 흔함)\n• 겨드랑이\n• 사타구니\n• 손가락 관절 (드물지만 있음)\n\n💡 관리:\n• 흑색극세포증 자체 치료보다 인슐린 저항성 개선이 목표\n• 체중 5~10% 감량 + 운동 + 식이 개선\n• 4~6개월 내 인슐린 저항성 개선되면 피부도 서서히 개선\n• 심한 경우 메트포르민 처방 가능","tip":"흑색극세포증은 몸이 '인슐린 위험 신호'를 피부로 표현한 거예요. 발견 즉시 소아내분비과에서 인슐린 저항성 검사(HOMA-IR)를 받아보세요."},"white_coat_hypertension":{"type":"answer","title":"백의 고혈압 — 병원에서만 혈압이 높게 나와요","content":"의사의 흰 가운(백의)을 보면 긴장해서 병원에서만 혈압이 높게 나오는 현상입니다.\n\n📊 얼마나 흔한가요?\n• 소아청소년의 30~40%가 해당\n• 생각보다 매우 흔해요\n\n✅ 진짜 고혈압과 구별 방법:\n• 가정혈압 측정: 집에서 편안한 상태로 아침·저녁 2회씩 1주일 측정\n• 24시간 활동혈압 측정(ABPM): 가장 정확, 일상생활 중 자동 측정\n\n📏 소아청소년 고혈압 기준:\n• 단순한 수치 기준 없음\n• 나이·성별·키에 따른 백분위 기준\n• 95백분위 이상이면 고혈압\n\n🏥 진짜 고혈압이면:\n• 원인 탐색: 비만, 신장 질환, 부신 종양 등\n• 비만이 원인인 경우가 가장 흔함\n• 체중 감량 5~10%로 혈압 10~15mmHg 하강 가능\n• 생활습관 개선으로도 상당 부분 조절\n\n💡 가정에서 혈압 재는 팁:\n• 5분 안정 후 측정\n• 상완(팔 위쪽) 크기에 맞는 커프 사용\n• 같은 팔, 같은 자세로 일관되게","tip":"병원에서 한 번 높게 나왔다고 바로 고혈압 진단하지 않아요. 가정혈압을 일주일 기록해서 의사에게 보여주세요."},"dyslipidemia_explain":{"type":"answer","title":"이상지질혈증 — 콜레스테롤과 중성지방이 비정상인 상태","content":"혈액 속 콜레스테롤과 중성지방 수치가 비정상인 상태를 이상지질혈증이라고 합니다.\n\n📊 진단 기준:\n• 총 콜레스테롤 ≥200 mg/dL\n• LDL(나쁜 콜레스테롤) ≥130 mg/dL\n• HDL(좋은 콜레스테롤) 남아 <40, 여아 <50 mg/dL\n• 중성지방 ≥130 mg/dL\n\n⚠️ 왜 무서운가요?\n• 비만 아이의 40~50%가 이상지질혈증\n• 증상이 없어서 모르고 지나침\n• 10대에 이미 혈관 내 지방 축적(동맥경화 초기) 시작\n• 방치하면 20~30대에 심근경색·뇌졸중 위험\n\n✅ 치료 전략:\n1. 생활습관 개선 우선 (6~12개월)\n   • 체중 10% 감량 → LDL 10~15% 감소, 중성지방 30% 감소\n   • 탄산음료 → 물 교체 (중성지방 2주 내 반응)\n2. 약물 치료 (생활습관 실패 시)\n   • 스타틴: 10세 이상 사용 가능\n   • LDL 30~50% 감소 효과\n   • 장기 안전성 확인됨\n\n💡 중성지방 가장 빠르게 낮추는 법:\n탄산음료를 물로 바꾸면 2주 내 반응!","tip":"이상지질혈증은 증상이 없어요. 비만한 아이라면 반드시 혈액검사로 확인하세요. 초등학생 때 관리 시작하면 성인 심혈관 질환 위험을 크게 낮출 수 있습니다."},"metabolic_cure":{"type":"answer","title":"대사증후군, 완치될 수 있나요?","content":"「완치」보다는 「정상화」와 「평생 관리」의 개념으로 접근해야 합니다.\n\n✅ 좋은 소식:\n청소년기에 적극 관리하면 진단 기준에서 완전히 벗어날 수 있습니다!\n\n📊 정상화 가능한 조건:\n• 체중 7~10% 감량\n• 규칙적인 운동 (주 5회, 30~60분)\n• 균형 잡힌 식단 (특히 정제 탄수화물·당분 줄이기)\n• 충분한 수면\n\n📈 단계별 개선:\n1단계 (2~4주): 중성지방 개선 (탄산음료 끊기만 해도)\n2단계 (1~3개월): 혈당·인슐린 저항성 개선\n3단계 (3~6개월): 혈압·콜레스테롤 개선\n4단계 (6~12개월): 체중 감량으로 전반적 정상화\n\n🎯 최종 목표:\n진단 기준에서 벗어나 정상 대사 상태 회복\n→ 성인이 되어 심혈관 질환 위험을 처음부터 없던 사람 수준으로 낮추는 것\n\n⚠️ 주의사항:\n• 생활습관을 다시 예전으로 돌리면 재발 가능\n• 「완치」 후에도 건강한 생활습관 유지 필요\n• 1~2년에 한 번 추적 검사 권장","tip":"청소년기의 대사증후군은 어른보다 훨씬 빠르게 개선돼요. 지금 시작하면 성인 만성질환을 예방할 수 있습니다."},"diabetes_chronic_complications":{"type":"answer","title":"소아청소년 당뇨의 만성 합병증","recommend":true,"content":"당뇨병 만성 합병증은 수년에 걸쳐 서서히 진행되며, 소아기 발병은 더욱 심각합니다.\n\n⚠️ 만성 합병증 종류:\n\n🫀 심혈관 질환 (가장 위험)\n• 심근경색 위험 5배\n• 뇌졸중 위험 3배\n• 소아기 발병 시 20~30대에 이미 위험 시작\n\n🫘 신장 질환 (당뇨 신증)\n• 신부전 2.7배\n• 투석 필요해질 수 있음\n\n👁️ 눈 질환 (당뇨 망막병증)\n• 실명 원인 1위\n• 어린이 발병 시 더 오래 노출\n\n🦵 신경 합병증\n• 손발 저림, 통증\n• 감각 저하\n\n🦶 발 궤양\n• 상처 회복 지연 → 감염 → 절단\n\n✅ 합병증 예방 핵심:\n• HbA1c 7% 미만 유지\n• 정기 안과·신장·발 검사\n• 혈압·콜레스테롤 관리\n• 금연 (흡연은 합병증 위험 폭발적 증가)\n\n📅 추적 검사 일정:\n• 매 3개월: HbA1c\n• 매년: 안과 검진, 신장 기능, 신경 검사","tip":"소아기에 발병하면 합병증에 더 오래 노출됩니다. 혈당 관리가 지금 당장 나쁘게 느껴지지 않더라도, 10~20년 후를 위해 꼭 철저하게 관리해야 해요."},"obesity_height_myth":{"type":"answer","title":"\"살 찌면 키로 간다\" — 이건 위험한 오해예요!","content":"어른들 사이에 퍼진 이 말은 의학적으로 틀렸습니다. 오히려 반대예요.\n\n❌ 왜 틀린 말인가요?\n\n비만 → 체지방 ↑ → 렙틴·인슐린 ↑ → 성호르몬 분비 촉진\n→ 성조숙증 발생 가능\n→ 성장판이 일찍 닫힘\n→ 최종 키가 더 작아짐!\n\n📊 실제 연구 결과:\n• 비만 + 성조숙증 동반 시: 유전 목표 키보다 5~8cm 작아질 수 있음\n• 비만만 있어도: 여아 2.3cm, 남아 3.1cm 덜 큼 (스웨덴 대규모 연구)\n\n초등 저학년에는 또래보다 5~8cm 크게 보이는 경우가 있지만\n→ 이건 뼈나이가 빠른 것\n→ 성장판이 일찍 닫혀서 중학교 이후 오히려 최단신이 될 수 있음\n\n✅ 올바른 이해:\n• 적정 체중 유지 = 성장판 보호\n• 체중 관리 = 키 성장 관리\n• 살이 키로 가는 게 아니라, 살이 키를 막는다","tip":"우리 부모님 세대의 경험담이 아이에게는 독이 될 수 있어요. 지금은 과식보다 균형 잡힌 영양이 훨씬 중요합니다."},"obesity_longterm":{"type":"answer","title":"소아비만 → 성인비만으로 이어지나요?","content":"안타깝게도 이어지는 경우가 많습니다.\n\n📊 연구 통계:\n• 소아비만의 75~80%: 성인비만으로 이어짐\n• 고도비만 아이: 절반 이상이 성인비만 지속\n• 사춘기 비만은 어린 시절 비만보다 더 지속성 높음\n\n🔬 왜 이어지나요?\n\n1. 지방세포 수가 결정되는 시기 문제:\n• 사춘기에 지방세포 수가 고정됨\n• 이때 지방세포가 많이 만들어지면\n• 평생 살찌기 쉬운 체질\n\n2. 식습관·생활습관의 지속:\n• 어릴 때 형성된 습관은 성인이 되어도 유지\n• 뇌의 포만 중추 역치가 높게 설정\n\n3. 대사 경로의 프로그래밍:\n• 비만 상태가 오래 지속되면 인슐린 저항성·지방 축적 패턴이 고착\n\n✅ 그러나 청소년기 개입은 효과적:\n• 아직 지방세포 수가 확정되기 전에 개입 가능\n• 생활습관을 바꾸면 되돌릴 수 있음\n• 성인이 되기 전에 정상 체중 달성 → 성인비만 위험 크게 감소","tip":"중학교 이전에 관리를 시작하는 것이 결정적으로 중요해요. 사춘기가 오면 지방세포 수가 고정되기 시작합니다."},"eating_speed_obesity":{"type":"answer","title":"빨리 먹는 습관 — 비만의 숨은 원인이에요","content":"빨리 먹는 습관이 비만을 만드는 것은 과학적으로 증명됩니다.\n\n🧠 포만감의 작동 원리:\n• 위장에 음식이 들어오면 → 포만 호르몬(렙틴, CCK, PYY) 분비\n• 이 신호가 뇌(시상하부)에 도달하는 시간: 최소 15~20분\n• 20분보다 빨리 먹으면 → 이미 과식 후에 배부름을 느낌\n\n📊 연구 결과:\n• 빨리 먹는 아이: 천천히 먹는 아이보다 비만 위험 1.5~2배\n• 식사 시간 5분 미만: 과체중 위험 3배\n\n✅ 천천히 먹기 실천법:\n\n1. 최소 20분 식사 목표:\n• 타이머 놓고 20분 이상 먹기\n• 밥 중간에 숟가락 내려놓기 습관\n\n2. 꼭꼭 씹기 (20~30회):\n• 소화에도 도움\n• 포만 호르몬 분비 시간 확보\n\n3. 식사 중 스크린 OFF:\n• TV·스마트폰 보며 먹으면 포만감 인식 방해\n• 집중해서 맛을 느끼며 먹기\n\n4. 작은 그릇 사용:\n• 시각적 포만감 증가\n• 반자동적으로 적게 담게 됨","tip":"식사 시간을 타이머로 재보세요. 10분이 안 된다면 위험 신호예요. 20분을 목표로 아이와 함께 「느리게 먹기 챌린지」를 해보는 건 어떨까요?"},"obesity_prevention_timing":{"type":"answer","title":"비만 예방 — 언제부터 시작해야 하나요?","content":"임신 중 엄마의 건강 관리부터 시작됩니다.\n\n⏰ 생애주기별 비만 예방 골든타임:\n\n🤰 임신기:\n• 엄마의 과체중·임신성 당뇨 → 태아의 대사 이상 위험\n• 임신 중 적절한 체중 증가 (13~18kg)\n• 모유 수유가 소아비만 예방에 도움\n\n👶 생후 0~2세 (1차 골든타임):\n• 지방세포 수 증식 시작\n• 음식 다양성 노출 시기\n• 주스·단 음료 절대 금지\n• 이 시기 형성된 맛 선호도가 평생 지속\n\n🧒 5~7세 「지방 반등기」(2차 골든타임):\n• Adiposity Rebound: 체지방이 한 번 더 증가하는 생리적 시기\n• 이 시기에 반등이 빠를수록 성인비만 위험↑\n• 신체활동 줄어드는 시기 (유치원→초등) → 주의 필요\n\n🎒 학령기 (8~12세):\n• 학업 스트레스 → 감정적 섭식 패턴 시작\n• 디지털 기기 사용 증가 → 신체활동 감소\n• 학교 급식 + 가정 식사 병행 관리 필요\n\n📌 핵심:\n• 비만이 생기기 전에 예방이 훨씬 쉬움\n• 치료보다 예방의 효율이 10배","tip":"5~7세가 비만 예방의 숨은 골든타임이에요. 이 시기에 신체활동 습관과 건강한 식이 패턴을 잡아두면 평생의 건강이 달라집니다."}},
"en":{"start":{"type":"question","text":"Hello! I'm the growth & health advisor for Samsung Jarada Pediatric Clinic. What would you like to know today?","options":[{"text":"I'm worried about my child's height","next":"growth_main"},{"text":"I want to learn about growth hormone therapy","next":"growth_hormone"},{"text":"I'm concerned about precocious puberty","next":"puberty_main"},{"text":"My child is overweight/obese","next":"obesity_main"},{"text":"My child has blood sugar or liver issues","next":"metabolism_main"},{"text":"I want to know about nutrition for growth","next":"nutrition_main"}]},"growth_main":{"type":"question","text":"How old is your child? This will help me guide you better.","options":[{"text":"0–3 years (infant/toddler)","next":"growth_0_3"},{"text":"4–8 years (preschool / early elementary)","next":"growth_4_8"},{"text":"9–13 years (late elementary / middle school)","next":"growth_9_13"},{"text":"14+ years (middle/high school)","next":"growth_14plus"},{"text":"Growth seems to have slowed down suddenly","next":"growth_slowdown"},{"text":"I'd like to know about bone age testing","next":"growth_boneage"}]},"growth_0_3":{"type":"question","text":"What is the growth situation for your 0–3 year old?","options":[{"text":"Born small and not catching up","next":"ans_sga"},{"text":"Born normal, but falling behind since","next":"ans_growth_0_3_normal"},{"text":"Both parents are short","next":"ans_familial_short"},{"text":"How short is short enough to need testing?","next":"ans_growth_check_needed"}]},"ans_sga":{"type":"answer","title":"Small for Gestational Age (SGA) — Early identification matters","recommend":true,"content":"Children born with a birth weight or length below the 3rd percentile for their gestational age are called SGA (Small for Gestational Age).\n\n✅ Good news: 85–90% catch up naturally within 2 years of birth.\n\n⚠️ When to act:\n• Still below the 3rd percentile at age 4 (about 10–15% of SGA children)\n• These children qualify for insurance-covered growth hormone therapy from age 4\n\n📊 Treatment results: average gain of 5–7 cm\n• Starting earlier yields better results\n• Starting after puberty is much less effective\n\n📌 Key monitoring:\n• Measure height every 3 months to track growth velocity\n• Watch and wait until age 4, then consider treatment if not caught up","tip":"Natural catch-up growth is ideal, but if it hasn't happened by age 4, see a pediatric endocrinologist right away."},"ans_growth_0_3_normal":{"type":"answer","title":"Normal birth, but growth falling behind — Find the cause first","recommend":true,"content":"When a normally-born child falls behind in growth, the main causes include:\n\n1️⃣ Hypothyroidism\n• Most common endocrine cause\n• Symptoms: reduced activity, dry skin, constipation, lethargy\n• Simple blood test confirms; growth normalizes with treatment\n\n2️⃣ Growth Hormone Deficiency\n• In infancy: may present as hypoglycemia or prolonged jaundice\n• Round face and chubby appearance\n• IGF-1 blood test can screen\n\n3️⃣ Poor Nutrition\n• Insufficient breast milk, severe picky eating\n• If weight is also low, nutrition is likely the issue\n\n4️⃣ Chronic Disease\n• Congenital heart disease, kidney disease, digestive disorders\n• Frequent colds, feeding difficulties, vomiting alongside poor growth\n\n📌 Recommended tests:\n• Thyroid function (TSH, free T4)\n• IGF-1\n• Complete blood count (anemia, inflammation)\n• Bone age X-ray","tip":"Ages 0–3 are the fastest growth years. Problems found now can still be corrected."},"ans_familial_short":{"type":"answer","title":"Familial short stature — Accurate assessment comes first","content":"When both parents are short, children are likely to be short too. This is called familial short stature.\n\n📌 Characteristics:\n• Normal growth velocity (5–6 cm/year)\n• Bone age matches actual age\n• Tracks at a low percentile consistently\n• At least one parent is shorter than average\n\n🧮 Mid-Parental Height (MPH):\n• Boys: (Father's height + Mother's height + 13) ÷ 2 — range ±5–10 cm\n• Girls: (Father's height + Mother's height – 13) ÷ 2 — range ±5–10 cm\n\nExample: Father 170 cm, Mother 158 cm\n→ Son predicted: (170+158+13)/2 = 170.5 cm (actual range 160–180 cm)\n→ Daughter predicted: (170+158-13)/2 = 157.5 cm (actual range 147–167 cm)\n\n⚠️ Even with familial short stature, see a doctor if:\n• Current height is 10+ cm below predicted\n• Growth velocity has suddenly decreased\n• Child grows less than 4 cm per year\n\n✅ Pure familial short stature doesn't need treatment — healthy lifestyle is enough.","tip":"To confirm whether it's truly genetic or has another cause, a bone age test and IGF-1 check are recommended."},"ans_growth_check_needed":{"type":"answer","title":"Specialist evaluation recommended","recommend":true,"content":"If parents are of normal height but the child is significantly short, or if height is well below the predicted range, a systematic evaluation is needed.\n\n🔬 Recommended tests:\n\n1. Bone Age X-ray ⭐ (Most important)\n• Left hand X-ray, ~5 minutes, completely painless\n• Assesses growth potential and predicts final height\n• Twice as accurate as parent height formula (error ±3–5 cm vs ±8–10 cm)\n\n2. IGF-1 blood test\n• Screens for growth hormone function\n• Single blood draw, no fasting needed\n\n3. Thyroid function (TSH, free T4)\n• Hypothyroidism is a common cause of poor growth\n\n4. Complete blood count\n• Anemia, inflammation, liver/kidney function\n\n5. Growth hormone stimulation test (if needed)\n• If IGF-1 is low or growth velocity is abnormal\n• ~2–3 hours, 4–6 blood draws (IV catheter placed once)\n• Peak below 10 ng/mL suggests deficiency\n\n💡 Approximate costs:\n• Bone age + IGF-1 + thyroid: combined ~50,000–80,000 KRW\n• GH stimulation test: ~150,000–250,000 KRW additional","tip":"The earlier the cause is found, the better the treatment outcome. Don't wait more than 6 months — while growth plates are still open."},"growth_4_8":{"type":"question","text":"What's the growth situation for your 4–8 year old?","options":[{"text":"Both parents are short","next":"ans_familial_short"},{"text":"Among the shortest 3–5% in class","next":"ans_growth_check_needed"},{"text":"Seems to grow less than 4 cm per year","next":"growth_slowdown"},{"text":"What tests should we get?","next":"ans_growth_check_needed"}]},"growth_9_13":{"type":"question","text":"What's the situation for your 9–13 year old?","options":[{"text":"Puberty hasn't started yet and child is short","next":"ans_9_13_no_puberty"},{"text":"Puberty started early — worried about final height","next":"ans_9_13_early_puberty"},{"text":"Puberty is in mid/late stage — any treatment chances left?","next":"ans_9_13_late_puberty"},{"text":"Growth has slowed down noticeably","next":"growth_slowdown"}]},"ans_9_13_no_puberty":{"type":"answer","title":"Pre-puberty — This is the golden window for treatment","recommend":true,"content":"If puberty hasn't started, you're still in the golden window for growth treatment!\n\n🌟 Why is pre-puberty the best time?\n• Growth plates are still wide open\n• Growth hormone therapy is about twice as effective before puberty starts\n• 2+ years of treatment significantly boosts results\n\n📊 Bone age confirms remaining growth potential:\n• Girls with bone age < 11: ample treatment opportunity\n• Boys with bone age < 12: ample treatment opportunity\n\n✅ Recommended evaluations:\n1. Bone age X-ray\n2. IGF-1 blood test\n3. GH stimulation test (if needed)\n\n💰 If insurance criteria are met:\n• Out-of-pocket cost: ~210,000–360,000 KRW/month (30% of drug cost)\n• Potential gains: 5–13 cm depending on diagnosis","tip":"Once puberty begins, growth plates close fast. Get evaluated now while you still have more options."},"ans_9_13_early_puberty":{"type":"answer","title":"Early puberty + height concerns — Evaluate both together","recommend":true,"content":"Early puberty means the rapid growth phase has already been triggered — and the growth plates will close sooner too.\n\n⚠️ The paradox of precocious puberty:\n• Short-term: child may be 5–8 cm taller than peers\n• Long-term: growth plates close early → final height may be 5–15 cm below genetic potential\n\n📊 Research evidence (European long-term follow-up):\n• Untreated precocious puberty: girls end up ~10 cm below genetic target\n• Boys end up ~20 cm below genetic target\n\n🔍 Tests needed now:\n1. Bone age X-ray: how much growth is left?\n2. GnRH stimulation test: is this true central precocious puberty?\n3. Growth hormone check: simultaneous GH assessment\n\n💡 Treatment options:\n• GnRH agonist therapy (puberty suppression)\n• Combined with growth hormone if needed — extra 4–6 cm gain\n• Combined therapy outperforms either alone","tip":"Early puberty doesn't have to mean short stature — timely treatment can protect final height. See a pediatric endocrinologist today."},"ans_9_13_late_puberty":{"type":"answer","title":"Late puberty stage — Accurately assess remaining opportunities","recommend":true,"content":"In mid to late puberty, a bone age X-ray should be the first step to see how much opportunity remains.\n\n📊 Treatment potential by bone age:\n• Girls < bone age 11: good treatment effect\n• Girls bone age 11–12: limited effect\n• Girls bone age 12–13: minimal effect (insurance also ending)\n• Girls bone age 14+: treatment not meaningful\n\n• Boys < bone age 12: good treatment effect\n• Boys bone age 12–14: limited\n• Boys bone age 16+: insurance ends\n\n⏱️ Timing is everything:\n After first period, only ~5–7 cm of growth remains, at just 2–3 cm per year.\n The 1–2 years before first period is the last window for meaningful gains.\n\n✅ What you can do now:\n• Get bone age + final height prediction\n• Start treatment immediately if plates are still open","tip":"Don't give up. Even a few months of treatment while growth plates are open can make a real difference."},"growth_14plus":{"type":"answer","title":"Age 14+ — Check growth plate status first","recommend":true,"content":"At 14+, growth plates are gradually closing — but it may not be too late.\n\n📊 Growth plate status:\n• Girls bone age 14–15: plates nearly closed, little room for treatment\n• Boys bone age 15–17: plates nearly closed\n• Insurance covers treatment only until: girls' 12th birthday, boys' 13th birthday\n\n🔍 Still worth checking:\n1. Bone age X-ray: actual bone age may differ from calendar age\n2. If puberty started late, bone age may be lower than expected\n3. Some boys at 14 still have meaningful treatment potential\n\n💡 One reason for hope:\n'Constitutional growth delay' (late bloomer)\n• Bone age is 2–4 years behind actual age\n• Some teens continue growing well into high school or college\n• More likely if a parent also grew late","tip":"Get a bone age test before giving up. A low bone age means significant growth potential may still remain."},"growth_slowdown":{"type":"answer","title":"Sudden slowdown in growth — An important warning sign","recommend":true,"content":"A sudden drop in growth velocity is a significant warning sign.\n\n📊 Normal growth rates by age:\n• Age 1–2: 10–12 cm/year\n• Age 3–4: 8–10 cm/year\n• Age 5–10 (pre-puberty): 5–7 cm/year ← Under 4 cm/year at this stage needs evaluation\n• Pubertal growth spurt: 8–10 cm/year\n\n⚠️ See a doctor if any of the following apply:\n• Pre-pubertal child growing less than 4 cm/year\n• Growth velocity has noticeably dropped recently\n• Height percentile has crossed 2 or more major lines downward over 6 months\n\n🔍 Possible causes:\n1. Growth hormone deficiency — low IGF-1, stimulation test peak < 10 ng/mL\n2. Hypothyroidism — elevated TSH\n3. Worsening chronic disease — IBD, kidney disease, etc.\n4. Psychological stress — psychosocial short stature\n5. Poor nutrition — severe picky eating, dieting\n6. Precocious puberty — early growth spurt followed by early stop","tip":"Measuring height every 3 months and keeping records makes it easy to track growth velocity — and is very helpful at doctor's appointments."},"growth_boneage":{"type":"answer","title":"Bone Age Test — The most accurate way to assess growth potential","content":"The bone age (skeletal age) test is the most important tool for evaluating a child's growth potential.\n\n🔬 How it works:\nA single left-hand X-ray (about 5 minutes, completely painless, very low radiation)\nThe 27 small bones in the hand and wrist allow very precise maturity assessment.\nRadiation: ~0.0001 mSv (less than a domestic flight)\n\n📊 Prediction accuracy comparison:\n• Parent height formula: error ±8–10 cm\n• Bone age prediction: error ±3–5 cm (pre-puberty) / ±2–3 cm (late puberty)\n\n🎯 What bone age tells us:\n• Current growth plate status (how open they are)\n• Predicted final height without treatment\n• When to start or stop treatment\n• Bone age >2 years ahead: risk of early closure\n• Bone age >2 years behind: plenty of growth remaining\n\n⚠️ Important limitations:\n• Reader-to-reader variability of 6–12 months is possible\n• AI-assisted reading is improving accuracy\n• Meaningful results only from age 5 onwards\n\n🏥 Also used to decide when to stop treatment:\n• Precocious puberty treatment: girls bone age 12, boys 13\n• Growth hormone therapy: girls bone age 14, boys 16","tip":"Bone age is the compass of growth. Knowing skeletal age lets you accurately assess how much growth opportunity remains."},"growth_hormone":{"type":"question","text":"What aspect of growth hormone therapy would you like to know about?","options":[{"text":"Is my child a candidate for treatment?","next":"gh_eligible"},{"text":"How much taller could my child get?","next":"gh_effect"},{"text":"What are the costs and insurance coverage?","next":"gh_cost"},{"text":"Are there side effects?","next":"gh_safety"},{"text":"How are the injections given?","next":"gh_injection"},{"text":"When do we start and stop treatment?","next":"gh_timing"}]},"gh_eligible":{"type":"question","text":"What is your child's current diagnosis or situation?","options":[{"text":"Diagnosed with growth hormone deficiency","next":"ans_gh_deficiency"},{"text":"Turner syndrome (girl, chromosomal)","next":"ans_gh_turner"},{"text":"Born small and still not catching up (SGA)","next":"ans_gh_sga"},{"text":"All tests normal — just short (ISS)","next":"ans_gh_iss"},{"text":"Prader-Willi / Noonan / chronic kidney disease","next":"ans_gh_other"},{"text":"Haven't been tested yet","next":"ans_gh_no_test"}]},"ans_gh_deficiency":{"type":"answer","title":"Growth Hormone Deficiency — Strongest treatment response","recommend":true,"content":"GHD offers the most predictable treatment outcomes and is covered by health insurance.\n\n📊 Treatment outcomes:\n• Year 1 average: 8–10 cm (some exceed 12 cm)\n• Year 2+: 6–7 cm/year (vs 5–6 cm for peers)\n• Overall improvement: 10–13 cm\n• With very early start: 20+ cm possible\n\n⚠️ Without treatment?\nEuropean long-term follow-up data:\n• Girls: average 10 cm below genetic target height\n• Boys: average 20 cm below genetic target height\n\n💉 Treatment protocol:\n• 0.025–0.035 mg/kg/day subcutaneous injection\n• 30 kg child → 0.75–1.05 mg/day\n• Dose recalculated every 3–6 months as weight increases\n\n💰 Insurance coverage:\n• Covered portion: ~210,000–360,000 KRW/month (30% of drug cost)\n• Coverage ends: bone age 14 (girls) / 16 (boys), or < 2 cm/year growth\n\n✅ Coverage criteria (2 different stimulation tests required):\n• Both peak values below 10 ng/mL\n• Height below 3rd percentile\n• Bone age below actual age","tip":"Starting earlier yields dramatically better results. Pre-pubertal treatment for 2+ years roughly doubles the expected benefit."},"ans_gh_turner":{"type":"answer","title":"Turner Syndrome — Earlier is always better","recommend":true,"content":"Turner syndrome involves deletion of one X chromosome (45,X) and qualifies for insurance coverage.\n\n📊 Treatment outcomes:\n• Average gain: 7–8 cm\n• Without treatment: average final height ~143 cm\n• With treatment: ~150 cm — a 7–8 cm difference that's significant in daily life\n\n💉 Treatment:\n• GH alone, or combined with estrogen\n• Estrogen: usually started at low doses around age 11–12 to induce puberty\n• Combined approach tends to yield better final height\n\n💰 Insurance coverage:\n• Height below 3rd percentile\n• Chromosomal analysis (karyotype) confirming diagnosis\n• GH stimulation test results are not required (Turner syndrome itself qualifies)","tip":"Turner syndrome often means no natural puberty. Planning the timing of both growth hormone and estrogen is important."},"ans_gh_sga":{"type":"answer","title":"SGA — Insurance-eligible from age 4","recommend":true,"content":"Children born small who haven't caught up qualify for insurance-covered GH therapy from age 4.\n\n📊 Outcomes: average gain of 5–7 cm\n• Starting before age 4 gives the best catch-up potential\n• Delayed start (especially post-puberty) is much less effective\n\n✅ Coverage criteria:\n• Birth weight or length below 3rd percentile (documentation needed)\n• Still below 3rd percentile after age 4\n• Watch and wait before age 4 for natural catch-up\n\n⚠️ Important:\n• Birth records documenting weight/length are essential\n• Since Jan 2025: birth documentation required for insurance approval","tip":"If natural catch-up hasn't occurred by age 4, start treatment promptly — don't delay further."},"ans_gh_iss":{"type":"answer","title":"Idiopathic Short Stature (ISS) — Careful decision needed","content":"ISS is diagnosed when all tests are normal and the child is simply short — with no identifiable cause.\n\n⚠️ Honest effectiveness overview:\n• Average gain: only 3–5 cm (wide individual variation: 0–7 cm)\n• Impossible to predict beforehand how well a specific child will respond\n• Very difficult to significantly exceed genetic height potential\n\n💰 Cost reality:\n• Not covered by insurance — 100% out-of-pocket\n• 70,000–120,000 KRW/month (varies with weight)\n• 2–3 years total: approximately 20–40 million KRW\n\n📋 Before deciding, consider:\n1. Is the child genuinely distressed by their height?\n2. Plan to reassess after year 1: continue if growing 5+ cm, reconsider if under 3 cm\n3. The child's own willingness (daily injections required)\n4. Family financial situation over the long term\n\n🌟 International guidance:\nThe Pediatric Endocrine Society recommends 'shared decision-making'\n→ Family makes an informed choice after reviewing all available evidence","tip":"There's no rush with ISS. Take time to fully consult, weigh costs and emotional factors, then decide together."},"ans_gh_other":{"type":"answer","title":"Other Insurance-Eligible Conditions","recommend":true,"content":"Prader-Willi syndrome, Noonan syndrome, and chronic kidney disease also qualify.\n\n🔵 Prader-Willi Syndrome:\n• Caused by chromosome 15 abnormality\n• Average gain: 6–8 cm\n• Primary goal: increasing muscle mass and reducing body fat, not just height\n• Strong obesity tendency — weight management is essential during treatment\n• Start in infancy for best muscle development outcomes\n\n🔵 Noonan Syndrome:\n• Similar features to Turner syndrome, caused by gene mutation\n• Average gain: 4–6 cm (wide variation)\n• Cardiac evaluation essential before starting (common co-occurrence)\n• Insurance criteria: confirmed genetic mutation + height below 3rd percentile\n\n🔵 CKD-associated short stature:\n• Average gain: 5–7 cm\n• Continue until transplant; may extend post-transplant if plates remain open\n• Regular kidney function monitoring required","tip":"For these conditions, GH therapy helps not just height but overall health and quality of life."},"ans_gh_no_test":{"type":"answer","title":"Step 1: Get a specialist evaluation","recommend":true,"content":"Without testing, there's no way to know whether your child needs treatment. A pediatric endocrinology visit comes first.\n\n🔬 Standard evaluation sequence:\n\nStep 1. Bone age X-ray (left hand)\n• First and most important\n• Reveals growth potential and predicts final height\n• ~5 minutes, painless, low radiation\n\nStep 2. Blood tests\n• IGF-1: screens for growth hormone function\n• Thyroid function (TSH, free T4)\n• Complete blood count (anemia, inflammation)\n• Liver and kidney function\n\nStep 3. GH stimulation test (if indicated)\n• If IGF-1 is low or growth velocity is abnormal\n• ~2–3 hours, 4–6 blood draws (single IV catheter)\n• Peak < 10 ng/mL suggests GH deficiency\n• Insurance requires 2 tests using different methods\n\n💡 Approximate costs:\n• Bone age + IGF-1 + thyroid: ~50,000–80,000 KRW\n• GH stimulation test: ~150,000–250,000 KRW additional","tip":"Test results determine whether treatment is needed and what kind is appropriate. Delaying testing means losing precious treatment time."},"gh_effect":{"type":"answer","title":"GH Treatment Outcomes — Diagnosis and timing are everything","content":"Results vary considerably by diagnosis and when treatment begins.\n\n📊 Average gains by condition:\n🥇 GH Deficiency → 10–13 cm (8–10 cm in year 1)\n🥈 Turner Syndrome → 7–8 cm\n🥉 SGA → 5–7 cm\n　　Prader-Willi → 6–8 cm (muscle gain is the main benefit)\n　　Noonan Syndrome → 4–6 cm\n　　CKD → 5–7 cm\n　　ISS → 3–5 cm (highly variable)\n\n⏰ Timing is the most critical factor:\n• Bone age ≤6 when starting → maximum effect (~7.4 cm additional on average)\n• Bone age 8–9 → good effect\n• Bone age 11+ → effect diminishes significantly\n• Bone age 14+ → minimal effect, insurance ends\n\n🌟 Four factors that maximize outcomes:\n1️⃣ Start early: 2+ years pre-puberty roughly doubles expected gains\n2️⃣ Daily injections without missing doses\n   → Each 10% improvement in adherence adds ~1.1 cm/year\n3️⃣ Correct dosing: recalculate every 3–6 months as weight changes\n4️⃣ Adequate sleep + nutrition alongside treatment","tip":"GH treatment is not a short-term transformation. It works by maintaining a faster-than-baseline growth rate over several years, gradually accumulating toward a better final height."},"gh_safety":{"type":"answer","title":"Growth Hormone Safety — Validated over 40 years of use","content":"GH therapy is very safe. The product used has been manufactured by recombinant DNA technology since 1985.\n\n✅ Why it's safe:\n• 100% identical structure to naturally produced human GH (191 amino acids)\n• The body does not recognize it as foreign\n• 40+ years of global use, millions of patients treated\n\n📋 Mild side effects (< 3%):\n• Injection site redness/itching/swelling → resolves in 1–2 weeks\n• Headache → usually clears in 1–2 weeks\n• Muscle or joint aches → like growing pains, improve in 2–4 weeks\n• Mild swelling in hands/feet → resolves with time\n\n⚠️ Less common but worth knowing:\n• Hypothyroidism: ~10–20% of multi-pituitary deficiency cases may develop this → blood test monitors for it; easy to correct with medication\n• Blood sugar elevation: only a concern in children with obesity or diabetes family history\n• Scoliosis: monitored at checkups, especially in Turner and PWS\n• Slipped capital femoral epiphysis: very rare; sudden limp/hip pain → ER immediately\n\n🚫 Cancer risk:\n• Large-scale long-term studies: no increased cancer risk in healthy children\n\n🔴 Go to the ER immediately if:\n• Severe headache + vomiting + visual disturbance (possible raised ICP)\n• Sudden limp (possible SCFE)","tip":"Report any unusual symptoms to your doctor right away. Regular blood tests and follow-up visits are the key to safe treatment."},"gh_cost":{"type":"answer","title":"GH Cost and Insurance — Know what to expect","content":"Drug costs vary by weight and diagnosis. Here's the general range:\n\n💰 Drug cost baseline:\n• ~700,000–1,200,000 KRW/month (roughly 25,000–40,000 KRW/kg/month)\n• Cost increases as child grows and dose is adjusted\nExamples:\n• 20 kg child → ~500,000–800,000 KRW/month\n• 40 kg child → ~1,000,000–1,600,000 KRW/month\n\n📋 With insurance coverage:\n• 30% copay → ~210,000–360,000 KRW/month\n• Prescription-based, collected at pharmacy\n• No special application needed (hospital handles it)\n\n📋 Coverage termination criteria (any one applies):\n• Bone age: girls 14–15 / boys 15–16\n• Height: girls exceed 153 cm / boys exceed 165 cm\n• Annual growth: less than 2 cm\n\n⚠️ Not covered:\n• ISS (idiopathic short stature): 100% self-pay\n• 700,000–1,200,000 KRW/month fully out-of-pocket\n• 2–3 years total: approximately 20–40 million KRW\n\n💡 Tax savings tip:\nIn Korea, medical expenses exceeding 3% of total income can receive a 15% tax credit.\n• Income 50M KRW, medical expenses 5M KRW\n→ (5M – 1.5M) × 15% = 525,000 KRW tax credit","tip":"The longer treatment runs, the higher the cost. Ask your doctor to estimate total expected duration and cost at your first visit."},"gh_injection":{"type":"answer","title":"GH Injection Technique — Feels daunting at first, but becomes routine","content":"Growth hormone is given as a daily subcutaneous (SC) injection. Most families feel comfortable within 1–2 weeks.\n\n💉 Key facts:\n• Needle diameter: 0.23 mm (thinner than a mosquito's mouthpart)\n• SC injection hurts far less than intramuscular\n• Ideal time: just before bedtime (9–10 PM)\n  → Aligns with the natural nighttime GH surge\n\n🎯 Rotate among 4 injection sites (change daily):\n1. Abdomen: at least 5 cm from the navel, left and right sides (preferred)\n2. Thigh: front and outer upper third\n3. Back of upper arm: triceps area\n4. Buttock: outer upper quadrant\n\n⚠️ Injecting the same spot repeatedly causes:\nFat atrophy (dimpling) or lipohypertrophy (lumps) → impairs absorption → reduces efficacy\n\n📋 Injection steps:\n1. Wash hands thoroughly (20+ seconds)\n2. Remove from fridge 15–30 min early to reach room temperature (cold = more painful)\n3. Clean the skin with alcohol swab; wait 10–15 seconds to dry\n4. Lightly pinch up 2–3 cm of skin\n5. Insert at 90°, quick and confident (hesitation increases pain)\n6. Press button fully — hold for 10 seconds (critical to prevent leakage)\n7. Pull out at 90° — press gently with gauze for 10 seconds (no rubbing — causes bruising)\n\n🧒 When children are anxious:\n• Give choices: \"Left side or right side today?\"\n• Sticker chart: sticker for every injection, reward when the week's chart is full\n• Pre-warn 10 minutes before: \"It's almost time for your shot\"\n• Never say \"It won't hurt at all\" — broken promises erode trust","tip":"Building a consistent routine at the same time each night prevents missed doses. Higher adherence directly translates to better outcomes."},"gh_timing":{"type":"answer","title":"When to Start and Stop Treatment — Bone age is the guide","content":"Starting and stopping GH treatment is determined primarily by bone age.\n\n🟢 When to start:\n• Earlier is always better (lower bone age = greater effect)\n• Optimal timing: before puberty (girls bone age 6–9, boys bone age 8–10)\n• 2+ years pre-pubertal treatment roughly doubles expected gains\n\n🔴 When to stop (insurance ends):\n• Girls bone age 14–15 / boys bone age 15–16\n• Girls exceed 153 cm / boys exceed 165 cm in height\n• Annual growth below 2 cm\n\n💡 Self-pay continuation after insurance ends:\n• If still growing meaningfully, continuing with self-pay may be worthwhile\n• Discuss with your doctor if still growing 2+ cm/year after coverage ends\n\n📅 Monitoring schedule during treatment:\n• First 3 months: monthly visits (height/weight, side effects, injection technique check)\n• Stable phase: every 3–6 months\n• Every 3–6 months: IGF-1 (target 0 to +2 SD)\n• Every 6–12 months: bone age X-ray\n• Annually: thyroid function, blood glucose","tip":"Don't stop suddenly — growth velocity will fall back to baseline. Always discuss stopping with your doctor first."},"puberty_main":{"type":"question","text":"What are your concerns about precocious puberty?","options":[{"text":"My daughter seems to be developing breasts","next":"puberty_girl"},{"text":"My son's testicles seem enlarged","next":"puberty_boy"},{"text":"Body odor/pubic hair/acne (no breast/testicular changes)","next":"ans_false_puberty"},{"text":"Height is suddenly shooting up fast","next":"ans_rapid_growth"},{"text":"I want to know about GnRH treatment for precocious puberty","next":"gnrh_treatment"},{"text":"I want to know about combined GnRH + GH therapy","next":"gnrh_gh_combo"}]},"puberty_girl":{"type":"question","text":"How old is your daughter?","options":[{"text":"Not yet 8 years old (precocious puberty threshold)","next":"puberty_girl_under8"},{"text":"Between 8 and 10 years old","next":"puberty_girl_8_10"},{"text":"10+ — breast development just started","next":"puberty_girl_normal"},{"text":"Can't tell if it's breast tissue or fat","next":"puberty_girl_unsure"}]},"puberty_girl_under8":{"type":"answer","title":"Breast development before age 8 — See a specialist promptly","recommend":true,"urgent":true,"content":"Breast development before a girl's 8th birthday meets the medical definition of precocious puberty. A prompt evaluation is needed.\n\n📌 How to calculate age accurately:\nUse the registered birthday. Subtract birth year from current year; subtract 1 more if the birthday hasn't passed yet.\nExample: Born May 15, 2017 → As of January 2025 = age 7 (May birthday not yet reached)\n\n🔬 Tests your doctor will order:\n1. Bone age X-ray (most important)\n   → How far is bone age ahead?\n2. GnRH stimulation test (central vs peripheral differentiation)\n   → LH peak ≥5 IU/L = central precocious puberty confirmed\n   → 90 minutes, 5 blood draws (single IV catheter)\n3. Pelvic ultrasound (uterus and ovary size)\n4. Brain MRI\n   → Under age 6: required\n   → Age 6–8: if rapidly progressing or neurological symptoms\n\n⚠️ Treatment decision factors:\n• Bone age >2 years ahead + rapid progression → treatment strongly recommended\n• Bone age not significantly advanced + slow progression → observation may suffice\n\n📊 Without treatment:\n• Girls average 10 cm below genetic target (European long-term data)\n• First period may come as early as age 9–10","tip":"Earlier diagnosis and treatment = better height protection. Don't hesitate — see a specialist today."},"puberty_girl_8_10":{"type":"question","text":"Breast development at age 8–10 — what's the situation?","options":[{"text":"Just noticed for the first time","next":"puberty_girl_new"},{"text":"Has grown noticeably in the past 3–6 months","next":"puberty_girl_progress"},{"text":"Been there for 6+ months with little change","next":"puberty_girl_stable"},{"text":"Not sure if it's breast tissue or fat","next":"puberty_girl_unsure"}]},"puberty_girl_new":{"type":"answer","title":"Newly noticed breast development — Get an evaluation","recommend":true,"content":"If you've just noticed breast development, schedule an evaluation at a pediatric endocrinology clinic.\n\n📌 Breast development at 8–10 years:\n• After age 8, it doesn't technically meet the 'precocious puberty' definition, but evaluation is still needed\n• Age 8–9: consider treatment if progressing fast; observation if slow\n• Age 9–10: already within the normal puberty range\n\n🔍 Key evaluation questions:\n• Is progression fast? (2 Tanner stages in 6 months?)\n• Is bone age >2 years ahead?\n• Has the growth spurt already started?\n• Is predicted final height significantly below genetic target?\n\n📊 Treatment consideration (if any apply):\n• GnRH stimulation test LH peak ≥5 IU/L\n• Bone age >2 years ahead\n• Predicted final height well below genetic target\n• Rapid progression causing psychological distress","tip":"Note the date you first noticed the development and how fast things have changed — extremely useful information for the doctor."},"puberty_girl_progress":{"type":"answer","title":"Rapidly progressing breast development — See a doctor soon","recommend":true,"content":"Noticeable growth over 3–6 months indicates fast progression — evaluation and likely treatment are needed.\n\n⚠️ What fast progression means:\n• Bone age is likely advancing rapidly too\n• Risk of premature growth plate closure\n• Predicted final height may continue to fall\n\n📊 GnRH treatment effect by bone age at start:\n• Bone age < 6 at start: average 7.4 cm additional gain (maximum benefit)\n• Bone age 8–9: beneficial but more limited\n• Bone age 10–11: further limited\n• Bone age 11+: minimal effect\n\n💉 With GnRH treatment:\n• Rapid pubertal progression slows or stops\n• Bone age advancement normalizes\n• First period delayed to around the same time as peers\n• Final height loss is prevented","tip":"The faster the progression, the more urgent treatment becomes. Book an appointment today."},"puberty_girl_stable":{"type":"answer","title":"Stable for 6+ months — May be premature thelarche","content":"If it's been months with little change, this may be 'Premature Thelarche' — an isolated early breast development with a generally benign outlook.\n\n📊 Characteristics:\n• Breast development only — no other pubertal signs\n  (no pubic hair, vaginal discharge, or growth spurt)\n• Bone age normal or mildly advanced\n• Normal growth velocity\n• GnRH stimulation test: very low LH peak (< 2 IU/L, FSH-dominant)\n• Most common under age 2\n\n✅ Outlook:\n• 90%+ resolve naturally without treatment\n• 51% show complete regression of breast tissue\n• Only ~2% progress to true precocious puberty when onset is under age 2\n\n⚠️ Regular monitoring is still needed:\n• Every 3–6 months initially\n• Check: breast size changes, pubic hair, vaginal discharge, growth velocity\n• If changes appear, additional testing may be warranted\n\n🔴 Return immediately if:\n• Breast size grows rapidly\n• Pubic hair or vaginal discharge appears\n• Height suddenly accelerates","tip":"Premature thelarche is usually reassuring — but regular check-ins are important."},"puberty_girl_normal":{"type":"answer","title":"Breast development after age 10 — Normal puberty range","content":"Breast development after age 10 is the start of normal puberty.\n\n📊 Normal puberty timeline for girls:\n• Breast development: average age 9–11 (normal range 8–13)\n• Pubic hair: usually 6 months–1 year after breast development\n• Growth spurt: 6 months–1 year after breast development begins\n• First period: average 2–2.5 years after breast development (average age 12–13)\n\n📈 Growth after first period:\n• Year before: ~8–10 cm (peak growth)\n• Year 1 after: ~2–3 cm\n• Year 2 after: ~1–2 cm\n• Then essentially stops → total ~5–7 cm remaining\n\n✅ Normal signs:\n• Puberty progressing naturally through stages\n• Bone age within 1 year of actual age\n• Predicted final height within genetic target range\n\n⚠️ Seek evaluation if:\n• Puberty advances 2+ stages in 6 months\n• First period expected before age 10\n• Predicted final height significantly below genetic target","tip":"Normal puberty is underway. Maximize remaining growth through balanced nutrition and adequate sleep."},"puberty_girl_unsure":{"type":"answer","title":"Breast tissue vs. fat — How to tell the difference","content":"Many parents ask this question. It's easier to distinguish than you might think.\n\n👆 Home check:\n• Breast glandular tissue: a small, firm disc-like lump just under the nipple\n  (may be mildly tender when pressed — like a small pebble)\n• Fat accumulation: soft, squishy throughout\n  (no firm area directly under the nipple)\n\n📊 Only one side appearing first?\nCompletely normal! Asymmetric or one-sided appearance early on is very common in premature thelarche and early puberty.\n\n🏥 Clinic confirmation:\n• Doctor's physical exam (palpation)\n• Breast ultrasound: clearly distinguishes gland vs fat; completely painless, 5–10 min\n• Finding glandular tissue on ultrasound = breast development confirmed\n\n✅ If you can feel a firm lump:\nUnder age 8 → see a doctor promptly\nAge 8+ → monitor changes and seek evaluation when needed","tip":"When in doubt, a breast ultrasound is the most accurate confirmation. Quick and painless."},"puberty_boy":{"type":"question","text":"What changes are you noticing in your son?","options":[{"text":"Testicles seem enlarged (under age 9)","next":"ans_boy_precocious"},{"text":"Voice breaking, rapid height increase","next":"ans_boy_signs"},{"text":"Pubic hair/body odor only — no testicular changes","next":"ans_boy_false_puberty"},{"text":"Puberty seems very delayed (age 14+)","next":"ans_boy_delayed"}]},"ans_boy_precocious":{"type":"answer","title":"Testicular enlargement before age 9 — Specialist evaluation urgently needed","recommend":true,"urgent":true,"content":"Testicular enlargement before a boy's 9th birthday meets the diagnostic criteria for precocious puberty.\n\n📏 Testicular size threshold:\n• ≥4 mL (length ~2.5 cm) = puberty has begun\n• Parents usually cannot accurately assess this — specialist exam required\n\n⚠️ Why boys need more urgent evaluation:\n• Unlike girls, boys with precocious puberty have a higher rate of organic pathology (brain lesions, etc.)\n• Historically ~40–75% had identifiable causes; now 7–16%, still significantly higher than girls\n• Precocious puberty is rare in boys, making investigation more important\n\n🔬 Required tests:\n1. Bone age X-ray (essential)\n2. GnRH stimulation test (LH peak ≥5 IU/L = true central precocious puberty)\n3. Brain MRI (required for all boys)\n   → Rule out hypothalamic hamartoma, pituitary tumor, etc.\n4. Serum sex hormones (testosterone, LH, FSH, DHEA-S)\n5. Testicular ultrasound (rule out testicular tumor)\n\n📊 Untreated outcomes:\n• European long-term data: boys end up ~20 cm below genetic target\n• Twice the height loss seen in girls (~10 cm)","tip":"Precocious puberty in boys is rare but serious. Get evaluated at a pediatric endocrinology clinic as soon as possible."},"ans_boy_signs":{"type":"answer","title":"Pubertal signs in boys — Timing and speed are what matter","content":"Voice change, facial hair, and rapid height growth are mid-to-late puberty signs.\n\n📊 Normal pubertal sequence in boys:\n1. Testicular enlargement (≥4 mL) ← Puberty begins\n2. Pubic hair (6 months–1 year after testicular enlargement)\n3. Growth spurt (1–2 years after testicular enlargement, peaks around ages 13–15)\n   → 9–10 cm/year during pe
