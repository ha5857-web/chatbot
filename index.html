                    '바뀐': ['성분','효과','부작용'],
                    '게을러': ['자연분비','분비억제','뇌하수체'],
                    '환불': ['치료효과','비용','보장'],
                    '가짜': ['효과','신뢰','검증'],
                    '수치조작': ['검사','정확도','신뢰'],
                    '과잉진료': ['검사','처방','기준'],
                    '직구': ['안전','구매','정품'],
                    '2배맞히': ['용량','과다','부작용'],
                    '2배효과': ['용량','과다','부작용'],
                    '거꾸로매달': ['스트레칭','성장판','운동'],
                    '뼈부러뜨': ['수술','성장판','치료'],
                    '소성장호르몬': ['동물성','안전','종류'],
                    '유전자편집': ['유전','치료','연구'],
                    '레이저로': ['성장판','치료','방법'],
                    '속이빈': ['안전','부작용','골밀도'],
                    '텅비어': ['안전','부작용','골밀도'],
                    '으스러지': ['안전','부작용','골밀도','뼈가 약'],
                    '성장판열': ['성장판','폐쇄','치료'],
                    '탄산': ['칼슘','식이','영양'],
                    '몰아서자': ['수면','규칙','수면주기'],
                    '몰아맞': ['치료기간','용량','효과'],
                    '억제하면큰': ['성조숙증','치료원리','성장판'],
                    '불규칙': ['사춘기','생리','호르몬'],
                    '불법': ['규제','허가','안전'],
                    '장애등급': ['저신장','진단기준','보험'],
                    '복지': ['보험','급여','지원'],
                    '소비자기만': ['효과','보장','치료'],
                };

                // 쿼리 확장
                let expandedTerms = [];
                for (const [slang, medTerms] of Object.entries(SYNONYM_MAP)) {
                    if (query.replace(/\s/g,'').includes(slang.replace(/\s/g,''))) {
                        expandedTerms = expandedTerms.concat(medTerms);
                    }
                }

                // 쿼리를 단어로 분리 (2글자 이상, stopword 제외)
                const QUERY_STOP = new Set(['자꾸','아이가','아이는','선생님','우리','부모님','정말','너무',
                  '왜','언제','어디','무엇','하나요','인가요','나요','어요','있는데','없나요','있나요',
                  '어떻게','했더니','갔더니','맞히고','하는데','같아요','같은데','이에요','이거','그거']);
                const queryWords = query.split(/\s+/).filter(w => w.length >= 2 && !QUERY_STOP.has(w));
                const allSearchTerms = [...new Set([...queryWords, ...expandedTerms])];

                // ── 2. 검색 루프 ──────────────────────────────────────────────
                for (const video of this.db) {
                    if (category !== 'all' && video.category !== category) continue;

                    let score = 0;
                    const matchedKeywords = [];
                    const titleLower = (video.title || '').toLowerCase();
                    const answerLower = (video.answer || '').toLowerCase();
                    const summaryLower = (video.summary || '').toLowerCase();
                    const allContent = titleLower + ' ' + answerLower + ' ' + summaryLower;

                    // 키워드 매칭 (원래쿼리 + 확장어 모두)
                    for (const keyword of video.keywords) {
                        const kw = keyword.toLowerCase();
                        for (const term of allSearchTerms) {
                            // 짧은 키워드는 완전 일치 또는 포함만, 부분 역매칭 제외
                            const exactOrContain = kw.includes(term) || (term.length >= kw.length && term.includes(kw));
                            if (exactOrContain) {
                                const boost = expandedTerms.includes(term) ? 55 : 60;
                                score += boost;
                                matchedKeywords.push(keyword);
                                break;
                            }
                        }
                    }

                    // 패턴 매칭
                    for (const pattern of video.patterns) {
                        const p = pattern.toLowerCase();
                        if (query.includes(p) || p.includes(query)) {
                            score += 120;
                            matchedKeywords.push(pattern);
                        }
                    }

                    // 제목 매칭
                    for (const term of allSearchTerms) {
                        if (titleLower.includes(term)) {
                            score += expandedTerms.includes(term) ? 45 : 35;
                        }
                    }
                    if (titleLower.includes(query)) score += 80;

                    // 답변 본문 매칭 (확장어 포함, 비중 상향)
                    for (const term of allSearchTerms) {
                        if (answerLower.includes(term)) {
                            score += expandedTerms.includes(term) ? 25 : 15;
                        }
                    }
                    if (answerLower.includes(query)) score += 50;

                    // 요약 매칭
                    if (summaryLower.includes(query)) score += 30;
                    for (const term of expandedTerms) {
                        if (summaryLower.includes(term)) score += 20;
                    }

                    if (score > 0) {
                        results.push({
                            ...video,
                            score,
                            matchedKeywords: [...new Set(matchedKeywords)]
                        });
                    }
                }
                
                results.sort((a, b) => b.score - a.score);
                const endTime = performance.now();
                
                // 검색 히스토리 저장
                if (query && results.length > 0) {
                    this.addToHistory(query);
                }
                
                return {
                    results: results.slice(0, 10),
                    totalFound: results.length,
                    searchTime: (endTime - startTime).toFixed(2)
                };
            }

            addToHistory(query) {
                this.searchHistory = this.searchHistory.filter(h => h !== query);
                this.searchHistory.unshift(query);
                this.searchHistory = this.searchHistory.slice(0, 5);
                localStorage.setItem('searchHistory', JSON.stringify(this.searchHistory));
                this.updateHistoryDisplay();
            }

            updateHistoryDisplay() {
                if (typeof renderHistory === 'function') renderHistory();
            }

            toggleFavorite(videoId) {
                if (this.favorites.has(videoId)) {
                    this.favorites.delete(videoId);
                } else {
                    this.favorites.add(videoId);
                }
                localStorage.setItem('favorites', JSON.stringify([...this.favorites]));
            }

            isFavorite(videoId) {
                return this.favorites.has(videoId);
            }

            getAutocomplete(query) {
                if (!query || query.length < 2) return [];
                
                const suggestions = new Set();
                query = query.toLowerCase();
                
                for (const video of this.db) {
                    // 제목 매칭
                    if (video.title.toLowerCase().includes(query)) {
                        suggestions.add(video.title);
                    }
                    
                    // 키워드 매칭
                    for (const keyword of video.keywords) {
                        if (keyword.toLowerCase().includes(query)) {
                            suggestions.add(`${keyword} 관련`);
                        }
                    }
                    
                    if (suggestions.size >= 5) break;
                }
                
                return [...suggestions].slice(0, 5);
            }

            performSearch(query) {
                const inp = document.getElementById('searchInput');
                if (inp) inp.value = query;
                if (typeof performSearch === 'function') performSearch();
            }
        }


        function toggleAns(btn, id) {
            const box = document.getElementById('ans' + id);
            if (!box) return;
            const isOpen = box.style.display !== 'none';
            box.style.display = isOpen ? 'none' : 'block';
            btn.textContent = isOpen ? '📖 답변 보기' : '🔼 닫기';
        }

// ── Search ───────────────────────────────────────────
function performSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const es = document.getElementById('emptyState');
  if (es) es.style.display = 'none';
  const result = searchEngine.search(q, currentCategory);
  displayResults(result, q);
  if (q.length > 1) {
    searchEngine.addToHistory(q);
    renderHistory();
  }
}

// 카테고리 브라우징 (검색 없이 전체 목록)
function browseCategory(cat) {
  const area = document.getElementById('resultsArea');
  const st = document.getElementById('searchTime');

  if (cat === 'all') {
    area.innerHTML = '<div class="empty-state" id="emptyState"><span class="empty-icon">🔬</span><h3>검색어를 입력하거나 위의 질문을 클릭해보세요</h3><p>437개의 전문 Q&A에서 정확한 답변을 찾아드려요</p></div>';
    if (st) st.textContent = '';
    return;
  }

  const CAT_NAMES = { growth:'성장', nutrition:'영양', obesity:'비만', precocious:'성조숙증', insulin:'인슐린' };
  const filtered = videoDB.filter(v => v.category === cat);
  if (st) st.textContent = (CAT_NAMES[cat] || cat) + ' · ' + filtered.length + '개';

  const faves = JSON.parse(localStorage.getItem('chatbot_faves') || '[]');

  function makeCard(r, i) {
    const meta = CAT_META[r.category] || CAT_META.growth;
    const isFav = faves.includes(r.id);
    const hasAnswer = r.answer && r.answer.length > 5;
    const hasVideo  = r.videoUrl && r.videoUrl.length > 10;
    const delay = Math.min(i, 20) * 20;

    const answerHtml = hasAnswer
      ? '<div class="answer-box"><span class="answer-label">✦ 전문의 답변</span>' + r.answer + '</div>'
      : '';
    const videoBtn = hasVideo
      ? '<button class="act-btn video" onclick="window.open(\'' + r.videoUrl.replace(/'/g, "\\'") + '\',\'_blank\')">▶ 영상 보기</button>'
      : '';
    const favBtn = '<button class="act-btn fav ' + (isFav ? 'active' : '') + '" id="fav-' + r.id + '" onclick="toggleFavorite(' + r.id + ')">' + (isFav ? '★ 즐겨찾기' : '☆ 저장') + '</button>';

    return '<article class="result-card" style="animation-delay:' + delay + 'ms">'
      + '<div class="card-header" onclick="toggleCard(this,' + r.id + ')">'
      + '<span class="card-num">#' + r.id + '</span>'
      + '<div class="card-body">'
      + '<p class="card-cat ' + meta.cls + '">' + meta.label + '</p>'
      + '<p class="card-title">' + r.title + '</p>'
      + '<p class="card-summary">' + (r.summary || '') + '</p>'
      + '</div>'
      + '<span class="card-chevron" id="chev-' + r.id + '">⌄</span>'
      + '</div>'
      + '<div class="card-expand" id="expand-' + r.id + '">'
      + answerHtml
      + '<div class="card-actions">' + videoBtn + favBtn + '</div>'
      + '</div>'
      + '</article>';
  }

  const cards = filtered.map(makeCard).join('');
  area.innerHTML = '<div class="result-bar"><span class="result-count"><strong>' + filtered.length + '개</strong>의 ' + (CAT_NAMES[cat] || cat) + ' Q&A</span></div>' + cards;
}

      <span class="ac-icon">🔎</span> ${item}

// ── Favorite ──────────────────────────────────────────
function toggleFavorite(id) {
  const faves = JSON.parse(localStorage.getItem('chatbot_faves') || '[]');
  const idx = faves.indexOf(id);
  if (idx === -1) faves.push(id);
  else faves.splice(idx, 1);
  localStorage.setItem('chatbot_faves', JSON.stringify(faves));
  const btn = document.getElementById('fav-' + id);
  if (btn) {
    const now = faves.includes(id);
    btn.classList.toggle('active', now);
    btn.textContent = now ? '★ 즐겨찾기' : '☆ 저장';
    showToast(now ? '즐겨찾기에 저장했어요' : '즐겨찾기에서 제거했어요');
  }
}
