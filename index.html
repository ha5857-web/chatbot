ak, lasting ~2–3 years\n4. Voice change (around the same time as growth spurt)\n5. Facial hair (the last sign of puberty)\n   → Once facial hair appears, the growth spurt is nearly over\n\n📈 Total pubertal height gain for boys:\n• Growth spurt: 25–30 cm (5–7 cm more than girls)\n• Puberty starts ~2 years later than girls but lasts 2–3 years longer\n• This explains why men average ~13 cm taller than women\n\n✅ Normal ranges:\n• Puberty onset: ages 10–12\n• Before age 9 = precocious puberty\n• Nothing by age 14 = delayed puberty — needs evaluation\n\n🔬 Evaluation recommended if:\n• Puberty began before age 9\n• Bone age >2 years ahead of actual age\n• Predicted final height significantly below genetic target","tip":"Once facial hair appears, the main growth spurt is winding down. Healthy lifestyle habits to maximize remaining growth become the priority."},"ans_boy_false_puberty":{"type":"answer","title":"Peripheral (pseudo) precocious puberty — A different cause","content":"If there's only pubic hair/body odor without any testicular enlargement, peripheral (adrenal) precocious puberty is most likely.\n\n📌 Central vs. peripheral:\n• Central: brain signals → gonads → sex hormones\n  Boys: testicles enlarge first\n• Peripheral: adrenal glands secrete androgens directly, bypassing the brain\n  Boys: normal testicular size, pubic hair/body odor/acne only\n\n📌 Most common cause — Premature adrenarche:\n• Adrenal glands produce DHEA-S earlier than usual\n• Prognosis is usually excellent — rarely progresses to full puberty\n• Monitor over 1–2 years to rule out progression to central puberty\n\n🏥 Still needs evaluation because:\nRarely, adrenal tumor or congenital adrenal hyperplasia can be the cause\nBlood tests (DHEA-S, testosterone, 17-OHP) are necessary to rule these out\n\n⚠️ Key distinction:\nGnRH stimulation test → no LH response = confirms peripheral type\nGnRH treatment is ineffective for peripheral precocious puberty (need to treat underlying cause)","tip":"Pubic hair and body odor without testicular changes require a completely different diagnostic approach. See a specialist."},"ans_boy_delayed":{"type":"answer","title":"Delayed puberty in boys — Constitutional delay is most common","recommend":true,"content":"If a boy has no testicular enlargement (< 4 mL) by age 14, delayed puberty is assessed.\n\n📊 Constitutional delay of growth and puberty — CDGP (60–80%):\n• 'Late bloomer' type — eventual normal development\n• Key sign: parent (usually father) also had late puberty ('grew a lot in senior high school')\n• Bone age 1–3 years behind actual age\n• Still growing steadily at 4–5 cm/year despite being short\n\n✅ Safe to wait if:\n• Father has a history of late growth\n• Bone age is low (growth plates still wide open)\n• Tests are normal (GH, thyroid, etc.)\n• Still growing steadily\n\n⚠️ Pathological causes to rule out:\n• Klinefelter syndrome (47, XXY)\n• Pituitary dysfunction\n• Chronic wasting disease (Crohn's disease, chronic kidney disease)\n• Severe malnutrition\n\n💊 Treatment option (for CDGP):\n• Most will naturally enter puberty given time\n• If severe psychological distress: low-dose testosterone can be given to initiate puberty\n• Final height still within normal genetic range with or without treatment\n\n🔬 Tests:\nBone age + GH stimulation test + chromosomal analysis (to rule out Klinefelter)","tip":"Constitutional delay just means a later start — final height is usually normal. The tough part is being the last in the class to develop."},"ans_false_puberty":{"type":"answer","title":"Peripheral precocious puberty — Different cause, different treatment","content":"If there's pubic hair/body odor/acne WITHOUT breast development (girls) or testicular enlargement (boys), 'peripheral precocious puberty' is suspected.\n\n🔵 Central vs. Peripheral comparison:\nFeature | Central | Peripheral\nBrain signal | Present | Absent\nGirls | Breast development first | No breast development\nBoys | Testicles enlarge first | Normal testicular size\nBoth | LH↑, FSH↑ | DHEA-S↑, normal LH\nTreatment | GnRH agonist | Treat underlying cause\n\n📌 Most common cause — premature adrenarche:\n• Adrenal glands produce DHEA-S early\n• Usually benign, with natural transition to normal puberty in time\n• Some may progress to central puberty — requires follow-up\n\n🔬 Required tests:\n• DHEA-S, testosterone, 17-OHP\n• GnRH stimulation test (to rule out central type)\n• Adrenal/pelvic ultrasound","tip":"Peripheral precocious puberty has a completely different underlying mechanism from central — GnRH injections are ineffective. Accurate diagnosis first."},"ans_early_menarche":{"type":"answer","title":"Early first period — Assess remaining growth window","recommend":true,"content":"The first period signals that the peak growth spurt is largely behind us.\n\n📊 Average remaining growth after first period:\n• Same year: ~2–3 cm\n• Year 2: ~1–2 cm\n• After: nearly nothing\n• Total after first period: ~5–7 cm\n\n📌 Bone age determines what's left:\nIf bone age is below 12 right after first period, a treatment window may still exist.\n\n⚠️ First period before age 10:\nMay indicate precocious puberty was under-treated or untreated. Bone age X-ray needed urgently.\n\n✅ Strategies to maximize remaining growth:\n• Adequate sleep (aim for before 10 PM)\n• Sufficient protein + calcium + vitamin D\n• Minimize stress\n• Regular weight-bearing exercise (jumping rope, volleyball)\n\n🔴 Check treatment eligibility:\n• Bone age < 12 + still in active growth phase → treatment meaningful\n• Bone age > 14 → treatment won't help","tip":"Don't give up after the first period. A bone age test can clarify exactly how much growth opportunity remains."},"ans_rapid_growth":{"type":"answer","title":"Sudden rapid height increase — May be a precocious puberty signal","recommend":true,"content":"A sudden acceleration in height growth can be an early warning sign of precocious puberty.\n\n⚠️ The precocious puberty paradox:\n• Short-term: child appears 5–8 cm taller than peers\n• Height percentile may shoot upward (e.g., 50th → 75th)\n• Long-term: early growth plate closure can result in a final height 5–15 cm below potential\n\n📊 Normal vs. early puberty growth rate:\n• Normal (pre-puberty): 5–7 cm/year\n• Early puberty: 8–10+ cm/year (growth spurt triggered prematurely)\n\n🔍 Check for these simultaneously:\n• Breast development (girls) / testicular enlargement (boys)\n• Pubic hair, body odor, acne\n• Recent height percentile trend\n\n🔬 Recommended evaluation:\n• Bone age X-ray\n• GnRH stimulation test\n• Serum sex hormone levels","tip":"Don't celebrate a sudden growth spurt without first checking whether the growth plates are advancing too fast."},"gnrh_treatment":{"type":"answer","title":"GnRH Agonist Therapy — Detailed Guide","content":"GnRH agonists are the standard treatment for central (true) precocious puberty.\n\n🔬 How it works:\nConstant occupation of pituitary GnRH receptors → desensitization\n→ LH and FSH production drops → sex hormones suppressed → pubertal progression halts\n\n💊 Available medications:\n• Leuprolide: Luprin, Lupeer, Eligard\n• Triptorelin: Diphereline, Decapeptyl\n• Available as 1-month, 3-month, or 6-month formulations\n\n💉 Administration route:\n• IM (into buttock): Diphereline, Decapeptyl\n• SC (into abdomen): some leuprolide formulations\n• IM bioavailability ~1.5–2× higher than SC\n\n⏱️ Injection intervals — do NOT give late:\n• 1-month: every 25–29 days\n• 3-month: every 77–87 days\n• 6-month: every 154–175 days\n\n💰 Costs:\nInsurance-covered:\n• 1-month: ~40,000–50,000 KRW per injection\n• 3-month: ~120,000–150,000 KRW per injection\nSelf-pay:\n• 1-month: ~110,000 KRW\n• 3-month: ~330,000 KRW\n\n✅ Coverage criteria (tightened Jan 2025):\n• Documentation of secondary sex characteristics before age 8 (girls)/9 (boys)\n• GnRH stimulation LH peak ≥5 IU/L\n• Bone age advanced\n• Treatment started before age 9 (girls) / 10 (boys)\n• Coverage period: until girls turn 12 / boys turn 13\n\n🕒 Duration and stopping:\n• Typical treatment: 2–4 years\n• Stop when: girls bone age 12–12.5 / boys bone age 13–13.5\n• First period expected ~1 year after stopping","tip":"Never delay injections — late injections can cause a rebound in sex hormone levels (breakthrough phenomenon)."},"gnrh_gh_combo":{"type":"answer","title":"Combined GnRH + GH Therapy — When to Consider It","content":"Some children on GnRH agonist therapy are also given growth hormone to further improve final height.\n\n🎯 Candidates for combination therapy:\nAt least one of the following:\n① Bone-age-predicted final height below the 3rd percentile\n② Annual growth rate below 4 cm while on GnRH alone (relative GH insufficiency)\n③ Predicted height clearly below genetic target\n\n📊 Expected outcomes:\n• GnRH alone: prevents height loss (stabilizes predicted height)\n• Combined therapy: additional 4–6 cm gain\n• Example: target 155 cm → GnRH alone 154–157 cm → combined 160–162 cm\n\nMechanism:\n• GnRH: slows bone age advancement (buys time)\n• GH: additionally activates IGF-1 pathway (independent of sex hormones)\n• Synergistic effect\n\n💰 Combined therapy cost (self-pay for both):\n• GnRH: ~110,000 KRW/month\n• GH added: ~800,000–1,300,000 KRW/month\n• Combined total: ~910,000–1,410,000 KRW/month\n• Annual: ~10,000,000–16,000,000 KRW\n• 2–3 year total: ~20,000,000–50,000,000 KRW\n\n⚠️ GH insurance note:\nGH added for precocious puberty management is typically not insured\n→ Exception: if GH deficiency is also confirmed (rare)\n\n✅ Recommended approach:\nAssess growth response after 6–12 months of GnRH alone → add GH if growing < 4 cm/year","tip":"The cost is substantial, but so is the potential height gain. Discuss thoroughly with your specialist and decide together as a family."},"obesity_main":{"type":"question","text":"What aspect of your child's weight or obesity concerns you?","options":[{"text":"I'm not sure if my child is clinically obese — what are the criteria?","next":"obesity_diagnosis"},{"text":"Does obesity affect my child's height?","next":"obesity_height"},{"text":"Can obesity cause early puberty?","next":"obesity_puberty"},{"text":"The back of the neck or armpits have darkened","next":"ans_acanthosis"},{"text":"How can we manage childhood obesity?","next":"obesity_management"}]},"obesity_diagnosis":{"type":"answer","title":"Childhood Obesity Criteria — Different from adults","content":"Adult BMI cut-offs (over 25 = overweight) don't apply to children. Percentile-based assessment by age and sex is used.\n\n📊 Pediatric BMI classification:\n• Below 5th percentile → underweight\n• 5th–84th percentile → healthy weight\n• 85th–94th percentile → overweight\n• 95th percentile and above → obese\n• ≥120% of the 95th percentile → severe obesity\n\n🧮 BMI calculation:\nWeight (kg) ÷ Height (m)² = BMI\nExample: height 140 cm (1.4 m), weight 45 kg → BMI = 45 ÷ 1.96 ≈ 23\n\n📏 Obesity Degree (vs. standard weight):\n• +20 to +30%: mild obesity\n• +30 to +50%: moderate obesity\n• +50%+: severe obesity\n\n⚖️ Body fat percentage (most accurate):\n• Boys ≥25% → obese\n• Girls ≥30% → obese\n• Measured with body composition analyzer (InBody); painless\n\n⚠️ See a doctor promptly if:\n• BMI ≥ 95th percentile\n• Obese AND short (endocrine disease must be ruled out)\n  — Simple obesity usually makes children taller than peers, not shorter","tip":"If a child is both obese and short, that's a red flag — it may not be simple obesity."},"obesity_height":{"type":"answer","title":"How obesity affects height — Tall early, shorter in the end","content":"Obese children's growth is on 'fast-forward' — quick start, early finish.\n\n📊 The two-phase pattern:\n\n✅ Early phase (parents are pleased):\n• 5–8 cm taller than peers, in the 75th–95th height percentile\n• Bone age 0.5–1.5 years ahead\n• Cause: fat → leptin↑ → IGF-1↑, insulin↑ → growth plate stimulation\n\n⚠️ Later phase (the real problem):\n• Puberty triggers early\n• Growth plates close prematurely → growth stops earlier than expected\n• Peers are still growing while this child has stalled\n\n📊 Research evidence:\n• Obesity alone: girls 2.3 cm shorter, boys 3.1 cm shorter at final height (Swedish large-scale study)\n• Obesity + rapidly progressive precocious puberty: 5–8 cm below genetic target\n  (example: target 159 cm → actual 151 cm)\n\n💡 Note: obesity without precocious puberty has a more modest impact on final height.\n\n🎯 The key link:\nObesity → triggers precocious puberty → final height loss\nThis chain is the core problem.\n\n✅ Solution:\nWeight management IS height management.\n• 5–10% weight reduction → leptin↓ → bone age advancement normalizes","tip":"Seeming tall in early elementary school can be misleading — the same child may be the shortest by middle school."},"obesity_puberty":{"type":"answer","title":"Obesity and precocious puberty — Weight management is puberty management","content":"Obesity is one of the most important risk factors for precocious puberty.\n\n🔬 The mechanism:\nExcess fat → leptin↑ → brain Kisspeptin system activated\n→ GnRH released → LH and FSH rise → sex hormones increase → puberty starts early\n\nLeptin's dual role: regulates appetite AND signals the brain that the body is ready for puberty.\n\n📊 Research findings:\n• Girls with obesity persisting 1+ year: significantly higher precocious puberty risk\n• Obese girls develop precocious puberty at 2–3× the rate of normal-weight girls\n\n📈 Typical pattern in obese children:\n• Girls: breast development may appear around age 8\n• Boys: less dramatic, but still present\n\n✅ Benefits of weight management:\n• Leptin reduction → lowers risk of early puberty\n• Improved insulin resistance → normalizes sex hormone levels\n• Bone age advancement slows toward normal\n\n⚠️ Rapid weight loss during growth years is dangerous:\nGoal is 'keep growing in height while stabilizing weight'\nAggressive dieting impairs growth","tip":"If precocious puberty is a concern, weight management is the best prevention. Establishing healthy eating habits before school age is ideal."},"ans_acanthosis":{"type":"answer","title":"Acanthosis Nigricans — The skin signal of insulin resistance","recommend":true,"content":"Darkening and thickening of the skin at the back of the neck, armpits, or groin is called acanthosis nigricans.\n\n🔍 Characteristics:\n• Looks like dirt that won't wash off\n• Velvety, soft, thickened texture\n• Most common locations: back of neck, armpits, groin\n\n🧬 Why does it happen?\nHigh insulin levels in the blood (hyperinsulinemia)\n→ Overstimulates skin cells (keratinocytes) → excess melanin deposits → dark, thick patches\n\nHigh insulin = sign of insulin resistance\nInsulin resistance = precursor to pre-diabetes and metabolic syndrome\n\n📊 Statistics:\n• Over 70% of obese teens with acanthosis nigricans have hyperinsulinemia\n• Over 60% have confirmed insulin resistance\n\n✅ Tests needed:\n• Fasting insulin (≥15 µU/mL = hyperinsulinemia)\n• HOMA-IR (insulin resistance index)\n• Fasting blood glucose, HbA1c\n• Lipid panel (cholesterol, triglycerides)\n\n💡 Treatment:\n• Treat the underlying insulin resistance — not the skin itself\n• 5–10% weight loss + exercise + dietary improvement\n• Skin gradually improves as insulin resistance resolves over 4–6 months","tip":"Acanthosis nigricans is the skin's warning light for metabolic risk. If you see it, get a pediatric endocrinology evaluation for insulin resistance."},"obesity_management":{"type":"question","text":"Which aspect of obesity management would you like to know about?","options":[{"text":"Dietary approaches","next":"ans_obesity_diet"},{"text":"Exercise recommendations","next":"ans_obesity_exercise"},{"text":"Overall lifestyle changes","next":"ans_obesity_lifestyle"},{"text":"When is medication appropriate?","next":"ans_obesity_medicine"}]},"ans_obesity_diet":{"type":"answer","title":"Diet for children during the growth years","content":"⚠️ Most important rule: NO calorie restriction to the point of hunger.\nThe goal is 'optimize the food composition', not 'eat less'.\n\n📋 5 core dietary principles:\n\n1️⃣ One protein food at every meal\nBreakfast: one of — egg, milk, yogurt, cheese, peanut butter toast\nLunch: one of — meat, fish, egg, tofu\nDinner: fish or tofu (meat 2–3×/week)\n\n2️⃣ 2–3 dairy servings per day (for calcium)\n\n3️⃣ Half the plate: vegetables\nVariety of colors (each color = different nutrients)\n\n4️⃣ White rice → multigrain rice, white bread → whole wheat\nReducing refined carbs blunts blood sugar spikes\n\n5️⃣ Water only for drinks (no juice or soda)\nEven 100% fruit juice has significant sugar\n\n🚫 Absolutes to avoid:\n• Making children go hungry (stunts growth, causes muscle loss)\n• Using food as reward or punishment\n• Only the child diets while the rest of the family eats normally\n• Late-night eating (especially after 9 PM → suppresses growth hormone)","tip":"Turn off screens during meals. Eating in front of a screen impairs the brain's ability to sense fullness, leading to unconscious overeating."},"ans_obesity_exercise":{"type":"answer","title":"Age-appropriate exercise for obese children","content":"📌 Goal: 60+ minutes of moderate-intensity activity daily (WHO recommendation)\nModerate = slightly breathless but able to hold a conversation\n\n✅ Recommended activities:\n• Brisk walking: family walk after dinner, 30 minutes\n• Swimming: full-body workout with no joint stress\n• Cycling, soccer, basketball, badminton\n• Jump rope: stimulates growth plates + builds cardiovascular fitness\n\n💪 Debunking the myth about strength training:\n'Won't weight training stunt my child's growth?' → ❌ This is a myth.\nAAP (2020 & 2024 guidelines): actively recommends strength training for children\n• Properly designed programs don't harm growth plates or development\n• Actually improves bone density\n• For obese children, may be more effective than aerobic exercise alone\n\n✅ Recommended bodyweight exercises:\n• Squats, push-ups, planks, lunges\n\n📅 Keys to sticking with it:\n1. Let the child choose activities they enjoy — forced exercise won't last\n2. Exercise together as a family (children are 5× more active when parents exercise)\n3. Build activity into daily life: stairs not elevator, walk short distances","tip":"'Exercise 30 minutes' sounds like a lot, but 'put on exercise clothes' is easy. Break any new habit into the smallest possible 2-minute action."},"ans_obesity_lifestyle":{"type":"answer","title":"Lifestyle changes — The 1%-a-day magic","content":"🌟 The magic of 1% daily improvement:\nOne extra flight of stairs today, one extra glass of water tomorrow — in 6 months, the child will be transformed.\n(1% daily improvement = 37× better over a year)\n\n📱 Reducing screen time:\n• Age 6+: max 2 hours/day for non-educational screens (AAP guideline)\n• 5+ hours screen time daily: 5× obesity risk\n• No screens during meals (impairs satiety signals)\n\n😴 Adequate sleep:\n• Elementary school (6–12): 9–12 hours/night\n• Middle/high school (13–18): 8–10 hours/night\n• Insufficient sleep → 58% increased obesity risk\n• Sleep deprivation → ghrelin (hunger) rises, leptin (fullness) falls\n\n🏠 Environment matters more than willpower:\n• Stock the fridge with fruits and vegetables\n• Simply don't buy junk food ('not having it' beats 'resisting it')\n• Water on the table, sodas at the back of the fridge\n• Remote control in a drawer, jump rope in the living room\n\n👨‍👩‍👧 Whole-family involvement:\n• 3+ family dinners per week → 12% reduced obesity risk in children\n• Parents who eat vegetables regularly → children 3× more likely to eat vegetables too","tip":"The most effective childhood obesity treatment is a whole-family lifestyle shift. Don't let the child fight this battle alone."},"ans_obesity_medicine":{"type":"answer","title":"Medication for childhood obesity — A supplementary tool","content":"Medication is never the first choice. It's considered only as a supplement to lifestyle efforts under specific conditions.\n\n📌 Criteria for medication (all must apply):\n• Age 12 or older\n• BMI ≥ 95th percentile\n• Obesity-related comorbidities present (pre-diabetes, hypertension, dyslipidemia, etc.)\n• Lifestyle modifications maintained for 6+ months with insufficient results\n\n💊 Available medications:\n\n1. Metformin (most commonly used)\n• Originally for diabetes; improves insulin sensitivity + slightly reduces appetite\n• Weight loss effect: average 2–3 kg (modest)\n• Side effects: early GI issues (diarrhea, nausea) — usually resolve in 1–2 weeks\n• Pros: well-studied safety record, very inexpensive\n\n2. GLP-1 receptor agonists (most effective, but expensive)\n• Examples: Saxenda (liraglutide), Wegovy (semaglutide)\n• Weight loss: 10–15% body weight (powerful)\n• Approved for ages 12+ (STEP TEENS trial)\n• Side effects: nausea/vomiting initially, resolves with slow dose titration\n• Cost: self-pay only, ~300,000–500,000 KRW/month\n• Risk of weight regain after stopping\n\n⚠️ Medication always requires concurrent lifestyle intervention to work effectively.","tip":"Medication is a tool, not a cure. Diet and exercise remain essential alongside any drug treatment."},"metabolism_main":{"type":"question","text":"Which metabolic concern would you like to learn about?","options":[{"text":"Blood sugar is high (pre-diabetes)","next":"metabolism_prediabetes"},{"text":"High cholesterol or triglycerides","next":"metabolism_lipid"},{"text":"Fatty liver was found","next":"metabolism_fatty_liver"},{"text":"Want to understand HOMA-IR and SPISE","next":"metabolism_spise"}]},"metabolism_prediabetes":{"type":"answer","title":"Pre-Diabetes — The golden window for reversal","recommend":true,"content":"Pre-diabetes means blood sugar is above normal but hasn't reached the diabetes threshold yet.\n\n📊 Diagnostic criteria:\n• Pre-diabetes: fasting glucose 100–125 mg/dL or HbA1c 5.7–6.4%\n• Diabetes: fasting glucose ≥126 mg/dL or HbA1c ≥6.5%\n\n⚠️ Why type 2 diabetes in children is more dangerous than in adults:\n• Onset before age 30: 5× heart attack risk, 3× stroke risk, 3× death risk\n• Longer lifetime exposure to high blood sugar → more vascular damage\n• Progresses faster than in adults, complications arrive earlier\n\n✅ The good news — act now:\n• DPP study (2002): lifestyle intervention → 58% reduction in diabetes onset\n• Metformin alone: only 31% reduction (half as effective as lifestyle changes)\n• 4–6 months of lifestyle improvement can fully reverse insulin resistance\n\n🔬 Recommended testing (age 10+, overweight + risk factors):\n• Fasting glucose\n• HbA1c\n• Fasting insulin + HOMA-IR\n• OGTT (oral glucose tolerance test if indicated)\n\n💊 Treatment sequence:\n1st priority: Lifestyle change (diet + exercise)\n→ 5–7% weight reduction significantly slows diabetes progression\n2nd priority: Metformin (if lifestyle alone insufficient after 6 months)","tip":"Lifestyle intervention is twice as effective as metformin for reversing pre-diabetes. This is the last best chance to turn things around."},"metabolism_lipid":{"type":"answer","title":"Dyslipidemia — Atherosclerosis can begin in the teens","content":"High cholesterol is very common in obese children (40–50% have dyslipidemia).\n\n📊 Diagnostic criteria:\n• Total cholesterol ≥200 mg/dL\n• LDL cholesterol ≥130 mg/dL\n• HDL cholesterol < 40 mg/dL (boys) / <50 mg/dL (girls)\n• Triglycerides ≥130 mg/dL\n\n⚠️ Why this matters:\nFatty streaks (early atherosclerosis) have been found in the blood vessels of teenagers in autopsy studies. Left untreated → plaques form → arteries narrow → heart attack or stroke risk, even at young ages.\n\n✅ Treatment impact of 10% weight loss:\n• Systolic BP down 10–15 mmHg\n• LDL down ~10–15%\n• HDL up ~8–10%\n• Triglycerides down ~30% (fastest to respond)\n\n💊 Medication (if lifestyle inadequate after 6–12 months):\n• Statins (approved from age 10)\n• Reduce LDL by 30–50%\n• Long-term safety confirmed — no impact on growth, puberty, or hormones\n\n📌 Quickest way to lower triglycerides:\n• Replace soda with water (effects within 2 weeks)\n• Reduce refined carbohydrates\n• Omega-3 intake (oily fish 2–3×/week)","tip":"High cholesterol has no symptoms — it's usually discovered only on blood tests. If your child is obese, get a lipid panel."},"metabolism_fatty_liver":{"type":"answer","title":"Fatty Liver — A silent but serious condition","content":"Approximately 40% of obese children have fatty liver disease. Most have absolutely no symptoms.\n\n🔍 What is it?\nFat accumulating to >5% of liver weight; the liver appears bright on ultrasound (a 'bright liver').\n\n⚠️ Causes:\n• Visceral fat: fatty acids from deep abdominal fat flow directly to the liver\n• Insulin resistance: impairs fat breakdown in the liver\n• Liquid fructose: fructose in sodas and juices is metabolized exclusively in the liver\n\n📊 Disease progression:\nSimple steatosis → NASH (inflammation) → fibrosis → cirrhosis\n(The first three stages are reversible)\n\n✅ Treatment:\nNo approved medication for pediatric fatty liver → lifestyle improvement is the only treatment\n\n• 3–5% weight loss: fat starts to decrease, ALT improves\n• 7–10% weight loss: liver inflammation and fibrosis also improve\n• Caution: rapid weight loss can temporarily worsen fatty liver\n• Replace sodas/juices with water (fastest single improvement)\n• Low-carb diet is most effective\n• Exercise alone reduces liver fat even without weight loss (30+ min/day)\n\n🔬 Tests:\n• Blood: ALT, AST\n• Abdominal ultrasound\n• FibroScan (if needed): quantifies fat and fibrosis","tip":"Just switching from soda to water can meaningfully improve fatty liver. Fructose is the primary driver."},"metabolism_spise":{"type":"answer","title":"HOMA-IR & SPISE — Accurately measuring insulin resistance","content":"📊 HOMA-IR (insulin resistance index):\nFormula: (fasting glucose × fasting insulin) ÷ 405\n\n⚠️ Critical: pediatric thresholds differ from adult thresholds — never use the adult cut-off of 2.5\n• Pre-pubertal boys: suspicious ≥2.67\n• Pre-pubertal girls: suspicious ≥2.22\n• Pubertal boys: suspicious ≥5.22\n• Pubertal girls: suspicious ≥3.82\n\nFasting insulin reference:\n• 5–15 µU/mL: normal\n• >15: hyperinsulinemia suspected\n• >20: hyperinsulinemia confirmed\n\n📊 SPISE index (newer, more convenient tool):\nNo fasting insulin needed — estimates insulin sensitivity from standard labs!\nFormula: 600 × HDL^0.185 / TG^0.2 × BMI^1.338\n\n✅ SPISE advantages:\n• Calculated from routine blood test values at no extra cost\n• More stable than direct insulin measurement (insulin fluctuates every 5–10 min)\n• 2025 study: 86% accuracy in predicting metabolic syndrome (outperforms HOMA-IR)\n\n💡 How to improve SPISE:\n• Lower BMI (largest impact — appears as BMI^1.338)\n• Raise HDL: aerobic exercise 5×/week, omega-3 supplementation\n• Lower triglycerides: replace soda with water, cut refined carbs\n  (triglycerides respond fastest — within 2 weeks)","tip":"Recalculate SPISE every 3–6 months to numerically track the real-world impact of your child's lifestyle changes."},"nutrition_main":{"type":"question","text":"What aspect of nutrition for growth would you like to know about?","options":[{"text":"Tell me about Vitamin D, calcium, and magnesium","next":"nutrition_vitamin_d"},{"text":"How does protein affect growth?","next":"nutrition_protein"},{"text":"Are zinc and iron important?","next":"nutrition_zinc_iron"},{"text":"My child is a very picky eater","next":"nutrition_picky"},{"text":"What does an effective growth diet look like in practice?","next":"nutrition_practical"}]},"nutrition_vitamin_d":{"type":"answer","title":"Vitamin D · Calcium · Magnesium — The Three Pillars of Growth","content":"These three nutrients form a synergistic triangle:\nVitamin D (key) → Calcium (raw material) → Magnesium (activates D)\nA deficiency in any one reduces the effectiveness of the others.\n\n☀️ Vitamin D:\n• ~70–80% of Korean children and teens are deficient\n• Vitamin D deficient: calcium absorption rate 10–15%\n• Vitamin D sufficient: absorption rate 30–40% — 2–3× higher\n\nKey insight: No matter how much milk a child drinks, without vitamin D, calcium absorption is poor.\n\nRecommended daily intake:\n• 0–12 months: 400 IU\n• Ages 1–18: 600 IU\n• If deficient: 1,000–2,000 IU\n\n⚠️ Korean winter (Nov–Feb): sunlight cannot generate vitamin D (latitude 33°+, insufficient UVB)\n→ Supplementation is essential in winter\n\nTarget blood level: 30–50 ng/mL\nSupplement choice: D3 (cholecalciferol) > D2 (more effective)\n\n🥛 Calcium:\nDaily recommended intake by age:\n• Age 1–3: 700 mg (~3 cups of milk)\n• Age 4–8: 1,000 mg (~4–5 cups)\n• Age 9–18: 1,300 mg (~6 cups) ← Highest need during growth spurt\n\nBest sources: milk (220 mg/200 mL), small whole fish, tofu, cheese\nAvoiders: soda (phosphoric acid), salty food, caffeine — all deplete calcium\n\n🥜 Magnesium:\n• Essential cofactor for activating Vitamin D\n• 2:1 calcium-to-magnesium ratio is ideal\n• Best sources: nuts/seeds (pumpkin seeds 30g = 150 mg), leafy greens, whole grains","tip":"Daily: 2–3 cups of milk + Vitamin D supplement + varied vegetables and nuts = the foundation of growth nutrition."},"nutrition_protein":{"type":"answer","title":"Protein — The raw material of growth","content":"No amount of growth hormone therapy will work without adequate protein.\nProtein builds muscles, bones, hormones, enzymes, and immune cells — everything.\n\n📊 Daily requirements (per kg of body weight):\n• Age 1–3: 1.0–1.2 g/kg\n• Age 4–13: 0.95 g/kg\n• Age 14–18: 0.85 g/kg\n\nReal-world examples:\n• 20 kg, age 6 → ~19 g/day\n• 30 kg, age 9 → ~28.5 g/day\n• 50 kg, age 15 → ~42.5 g/day\n→ 100g chicken breast (23g) + 1 egg (6g) covers a 30 kg child's daily need\n\n🥩 Protein content of common foods:\n• Chicken breast 100g: 23g\n• Canned tuna 100g: 24g (highest)\n• 1 medium egg: 6g\n• Milk 200mL: 6.4g\n• Tofu 100g: 8g\n• Cooked legumes 100g: 9g\n\n✅ Sample day (30 kg child, target 30g):\n• Breakfast: 1 egg (6g) + milk 200mL (6.4g)\n• Lunch: 80g chicken breast (18g)\n• Dinner: quarter-block tofu (8g)\n→ Total: 38.4g ✓\n\n⚠️ Excessive protein (>2.5 g/kg/day):\nKidney stress, increased calcium excretion, dehydration risk","tip":"Simply including one protein food at every meal naturally meets the daily protein requirement."},"nutrition_zinc_iron":{"type":"answer","title":"Zinc and Iron — Crucial Supporting Nutrients","content":"🔵 Zinc — 'The Growth Mineral'\n\nZinc deficiency impairs IGF-1 production even when GH is normal!\n\nHistoric discovery: Dr. Prasad, 1958\nIn Iran, a 21-year-old man had the development of a 10-year-old → severe zinc deficiency confirmed\n→ After zinc supplementation: grew 12.7–15.2 cm in just 1 year!\n\nDaily recommended intake:\n• Age 1–3: 3 mg / Age 4–8: 5 mg / Age 9–13: 8 mg\n• Age 14–18: boys 11 mg, girls 9 mg\n\nBest source: oysters (100g = 16–90 mg — days' worth in one serving!)\nAnimal sources: beef, chicken, eggs, dairy\nPlant sources: pumpkin seeds, legumes, nuts (lower absorption due to phytates)\n\nZinc deficiency → appetite loss → more deficiency → vicious cycle — watch for this!\n\n🔴 Iron — The Oxygen Carrier\n\nDeficiency doubles the risk of growth delay\nMechanism: iron deficiency → reduced oxygen delivery → energy shortage → slowed cell division → reduced IGF-1\n\nDaily recommended intake:\n• Age 1–3: 7 mg / Age 4–8: 10 mg / Age 9–13: 8 mg\n• Age 14–18: boys 11 mg, girls 15 mg (lost through menstruation)\n\nBest sources:\n• Heme iron (animal, 15–35% absorption): beef liver, chicken liver, beef, oysters\n• Non-heme iron (plant, 2–20%): white beans, lentils, tofu, spinach\n\nKey tip: Vitamin C consumed with iron boosts absorption 2–3×\n\nDeficiency signal: pica (compulsive ice chewing) — a characteristic sign of iron deficiency","tip":"Oysters are the zinc gold standard. Eating them just once a month provides substantial zinc support."},"nutrition_picky":{"type":"answer","title":"Dealing with picky eaters — Patience is the secret weapon","content":"🥦 Child won't eat vegetables:\n• Hide them: finely chop and mix into ground meat or fried rice\n• Change the shape: cut carrots into stars or hearts with cookie cutters\n• Offer dips: yogurt-based dip, peanut butter\n• Start with naturally sweet vegetables: cherry tomatoes, carrots, sweet potato, corn\n\n🥩 Child won't eat meat:\n• Tough texture is often the issue → make it softer: meatballs, burger patties\n• Meat is not essential: fish, eggs, tofu, and legumes fully cover protein needs\n\n🥛 Child won't drink milk:\n• Try different temperatures or mild flavoring: warm milk, a dash of cocoa\n• Mix into cereal, or blend into a banana smoothie\n• Alternatives: yogurt, cheese, calcium-fortified soy milk, small dried fish\n\n✅ 7 rules for overcoming picky eating:\n1. Be patient: a child needs 10–15 exposures to a new food before accepting it — today's refusal isn't final\n2. Never force: 'Eat it all!' creates lasting food aversions\n3. Model it: eat the foods yourself with visible enjoyment\n4. Celebrate small wins: 'You tried one bite of spinach — great job!'\n5. Cook together: children eat what they helped make\n6. Offer choice within limits: 'Do you want broccoli or carrots?' (both are vegetables)\n7. Make mealtimes positive: if meals are associated with being scolded, children learn to dread them","tip":"Picky eating isn't about willpower. A child's brain simply needs repeated exposure to accept new flavors. Most foods get accepted after 10–15 tries."},"nutrition_practical":{"type":"answer","title":"A practical growth diet — Just follow these rules","content":"📋 5 core principles (don't overthink it — these are enough):\n\n1️⃣ One protein food at every meal\nBreakfast: egg, milk, yogurt, cheese toast, or peanut butter on toast — pick one\nLunch: meat, fish, egg, or tofu — pick one\nDinner: fish or tofu (meat 3–4×/week)\n\n2️⃣ 2–3 dairy servings daily\nMorning milk + afternoon yogurt + bedtime milk\n→ 440–660 mg calcium secured daily\n\n3️⃣ 1–2 colorful vegetables at every meal\nGreen (spinach, broccoli) + orange (carrot, bell pepper) + white (radish, cabbage)\n\n4️⃣ Whole grains + whole fruit\nWhite rice → multigrain, white bread → whole wheat\nFruit: 2–3 times daily (whole fruit, not juice)\n\n5️⃣ Balance over the week, not every single day\nIf vegetables were skipped today, add extra tomorrow\n\n🌙 Bedtime routine:\n• 7–8 PM: last light snack\n• Finish dinner 2–3 hours before bed\n• At bedtime: warm milk (calcium + tryptophan promotes sleep)\n• Sugary snacks before bed: strictly avoid (insulin spike suppresses growth hormone)","tip":"A consistent 80-point diet beats a perfect one that's abandoned after a week. Start with one change today."},"booking":{"type":"booking"},"growth_measurement":{"type":"answer","title":"키 올바르게 측정하는 법 — 정확도가 진단을 좌우해요","content":"가정에서 잘못 측정하면 3cm 이상 오차가 생길 수 있어요. 정확한 측정이 진단의 첫걸음입니다.\n\n📅 얼마나 자주?\n• 3개월(12주)마다 1회가 최적\n• 매주·매일 측정 → 오차 범위 내 변동만 확인됨, 불안만 커짐\n• 사춘기 급성장기는 2개월마다로 단축 가능\n• 측정일 고정 권장: 3월 1일, 6월 1일, 9월 1일, 12월 1일\n\n⏰ 언제?\n• 아침 기상 직후 (기상→배변→식전 순서)\n• 이유: 하루 동안 척추 디스크가 눌려 저녁에 최대 2cm 감소\n• 같은 시간대에 측정해야 비교 의미가 있음\n\n📏 측정 방법 (4점 벽 밀착법):\n1. 딱딱한 바닥에 맨발로 서기 (카펫·쿠션 금지)\n2. 뒤꿈치·엉덩이·어깨뼈·뒤통수 → 벽에 동시 4점 밀착\n3. 발은 모아서, 정면을 바라보되 턱을 살짝 당김\n4. 숨을 크게 들이쉬고 최대한 곧게 서기\n   → \"머리가 천장에 닿을 것 같이\" 유도해주세요\n5. 딱딱한 책이나 자를 머리 위에 수평으로 대고 표시\n6. 줄자로 바닥부터 표시까지 측정 (소수점 1자리까지)\n\n🚫 흔한 오측정 원인:\n• 신발 신고 측정\n• 카펫·소파 위에서 측정\n• 머리핀·고무줄 달린 채 측정 (1cm 이상 오차)\n• 저녁에 측정\n• 너무 자주 측정 (매일/매주)\n\n📝 기록 방법:\n날짜 / 신장 / 측정 시각 / 특이사항(감기·수술 직후 등)\n→ 병원 방문 시 이 기록을 가져오면 정확한 성장 속도 평가 가능","tip":"아침 기상 직후, 4점 벽 밀착, 딱딱한 바닥 — 이 세 가지만 지켜도 가정 측정 오차를 1cm 이내로 줄일 수 있어요."},"growth_chart_reading":{"type":"answer","title":"성장곡선 읽는 법 — 숫자보다 방향이 중요해요","content":"병원에서 성장곡선 표를 보셨나요? 복잡해 보이지만 핵심은 딱 하나입니다.\n\n📊 백분위수란?\n100명을 키 순서로 세웠을 때 내 아이의 위치\n• 50백분위: 100명 중 50번째 (평균)\n• 10백분위: 100명 중 10번째 (낮지만 정상)\n• 3백분위: 100명 중 3번째 → 평가 필요 고려\n• 정상 범위: 3~97백분위 (100명 중 94명이 이 안에)\n\n🎯 핵심: 백분위 숫자보다 변화 추세가 중요\n\n✅ 걱정하지 않아도 되는 경우:\n• 10백분위를 따라가도 3세 때도 10백분위, 5세도 10백분위, 7세도 10백분위\n  → 자기 궤도를 안정적으로 유지하면 완전히 정상\n• 부모가 작고 아이도 낮은 백분위를 유지한다면: 가족성 저신장 가능성\n\n⚠️ 주의해야 하는 경우:\n• 50백분위 → 25백분위 → 10백분위로 계속 하락\n  → 2개 이상의 주요 백분위선을 지속 하향 돌파 시 의사 상담 필요\n\n📋 연령별 정상 성장 속도:\n• 출생~1세: 약 25cm\n• 1~2세: 약 10~12cm\n• 2~3세: 약 8~10cm\n• 3세~사춘기 전: 약 5~7cm ← 이 시기 4cm 미만이면 검사 필요\n• 사춘기 급성장기: 여아 8~10cm, 남아 10~12cm\n\n🏥 병원 방문이 필요한 5가지 상황:\n① 3세~사춘기 전에 1년 4cm 미만 성장\n② 2개 이상 주요 백분위선을 지속 하락\n③ 3백분위 미만 (100명 중 3번째보다 작음)\n④ 사춘기가 시작됐는데 키 급성장이 없음\n⑤ 사춘기 전인데 1년에 8cm 이상 — 성조숙증 조기 신호\n\n⚖️ 키와 체중의 균형도 확인:\n• 키는 크는데 체중 안 늘면: 영양 부족 신호\n  → 성장 속도도 실제로는 느릴 수 있음\n• 체중만 늘고 키 안 크면: 비만·성조숙증 위험\n  → 비만 아이는 초반엔 또래보다 커 보이지만 최종 키는 손해","tip":"3개월마다 측정해서 기록해두면 1년 성장량을 정확히 알 수 있어요. '왠지 작은 것 같아'보다 '올해 3.5cm 밖에 안 컸어요'가 훨씬 정확한 정보예요."},"tanner_stage_girl":{"type":"answer","title":"여아 사춘기 발달 단계 (Tanner Stage) — 우리 딸은 몇 기일까요?","content":"병원에서 「타너 2기」「타너 3기」라는 말을 들으셨나요? 이게 무엇인지 정확히 알면 아이의 사춘기 진행 상황을 이해하는 데 큰 도움이 됩니다.\n\n📊 여아 타너 단계 (유방 기준):\n\n1기 — 사춘기 전 상태\n• 유방 평평, 유선 조직 없음, 음모 없음\n• 완전히 어린이 상태\n\n2기 ⭐ — 사춘기 시작\n• 유두 아래 작은 딱딱한 덩어리(유방 싹, 乳芽) 촉지\n• 유륜 살짝 넓어짐\n• 「2기 = 사춘기 시작」의 공식 기준\n• 8세 이전 = 성조숙증 / 8~13세 = 정상 / 13세 이후 = 사춘기 지연\n• 평균 9~11세\n\n3기 — 유방과 유륜이 함께 커짐\n• 유방과 유륜이 동시에 커지지만 경계선 아직 불명확\n• 음모가 나타나기 시작 (음순을 따라 연하고 가는 털)\n\n4기 — 유륜이 유방 위로 돌출\n• 유방 위에 유륜·유두가 따로 올라온 형태\n• 음모가 성인에 가깝지만 대퇴부 안쪽까지 퍼지지 않음\n• 초경이 보통 이 시기(또는 3기 후반)에 옴\n\n5기 — 성인\n• 유방 완전 발달, 유륜과 유방이 같은 면\n• 유두만 돌출\n• 음모가 대퇴 내측까지\n\n⏱️ 여아 사춘기 정상 순서:\n유방 발달 2기 → 급성장기 시작 (6~12개월 후) → 음모 (1~1.5년 후)\n→ 초경 (유방 발달 후 평균 2~2.5년)\n\n📈 초경 후 성장량:\n• 초경 직전 1년: 약 8~10cm (급성장 절정)\n• 초경 후 1년: 약 2~3cm\n• 초경 후 2년: 약 1~2cm\n• 이후 거의 종료 → 총 5~7cm 추가\n\n⚠️ 타너 단계 불일치 주의:\n여아에서 유방은 2기인데 음모가 이미 3~4기라면\n→ 난소나 부신 이상 가능성, 추가 검사 필요","tip":"타너 2기가 확인된 시점부터 평균 2~2.5년 후 초경이 옵니다. 골연령 검사로 이 시기를 더 정확히 예측할 수 있어요."},"tanner_stage_boy":{"type":"answer","title":"남아 사춘기 발달 단계 (Tanner Stage) — 우리 아들은 몇 기일까요?","content":"남아의 사춘기는 여아보다 약 2년 늦게 시작되지만, 더 오래 지속되어 최종 키가 평균 13cm 더 큽니다.\n\n📊 남아 타너 단계 (고환 기준):\n\n1기 — 사춘기 전 상태\n• 고환 3mL 이하, 음경 어린이 크기, 음모 없음\n\n2기 ⭐ — 사춘기 시작\n• 고환 4mL 이상 (음낭 피부가 얇아지고 색이 살짝 어두워짐)\n• 음경은 아직 변화 없음\n• 「2기 = 사춘기 시작」의 공식 기준\n• 9세 이전 = 성조숙증 / 10~14세 = 정상 / 14세 이후 = 사춘기 지연\n• 평균 10~12세\n\n3기 — 고환 약 10mL, 음경 길이 증가\n• 음경 주로 길이가 늘어남\n• 음모 나타나기 시작 (음경 밑동에 가는 털)\n\n4기 — 고환 약 15mL, 음경 굵기 증가\n• 음경 길이+굵기 모두 증가, 귀두 발달\n• 변성기 시작 (목소리 굵어짐)\n• 음모 성인에 가까움 (대퇴부까지 아직 미도달)\n\n5기 — 성인\n• 고환 20mL 이상, 음경 성인 크기\n• 음모 대퇴 내측·배꼽 방향까지\n• 수염 발달 (사춘기의 마지막 신호)\n\n⏱️ 남아 사춘기 정상 순서:\n고환 증대(2기) → 음경 성장 → 음모 → 급성장기(1~2년 후, 평균 13~15세)\n→ 변성기 → 수염\n\n📈 급성장기:\n• 고환 증대 후 1~2년 뒤 시작\n• 연간 9~10cm, 2~3년간 지속\n• 총 급성장량: 25~30cm (여아보다 5~7cm 더)\n\n🔚 급성장 종료 신호:\n수염이 나기 시작하면 급성장기 거의 끝 → 이후 성장 급감\n\n⚠️ 타너 단계 불일치 주의:\n고환은 작은데 음모가 많이 나 있다면\n→ 부신 호르몬 이상(가성 성조숙증) 가능성\n→ DHEA-S 혈액검사 필요","tip":"수염이 나기 시작하면 급성장은 거의 끝이에요. 이 시기를 기다리지 말고 고환 증대(2기)가 확인되는 순간 골연령 검사와 성장 속도를 체크하는 것이 현명합니다."},"gh_stimulation_test":{"type":"answer","title":"성장호르몬 자극검사 — 검사 전 준비부터 결과 해석까지","content":"건강보험 급여로 성장호르몬 치료를 받으려면 반드시 거쳐야 하는 검사예요. 미리 알면 훨씬 덜 힘듭니다.\n\n🔬 자극검사가 필요한 이유:\nIGF-1은 선별검사(간접 평가)로, IGF-1이 낮다고 바로 급여 치료가 되지 않아요.\n자극검사만이 성장호르몬 결핍증의 「금 표준(Gold Standard)」이에요.\n\n📋 검사 전 준비 (가장 중요!):\n• 전날 자정부터 공복 8시간 (물은 소량 OK, 주스·탄산 음료 금지)\n  → 음식 섭취 시 혈당 상승 → 성장호르몬 분비 억제 → 위양성 결과\n• 헐렁하고 편안한 옷 착용 (2~3시간 누워있어야 함, 소매 올리기 쉬운 것)\n• 좋아하는 책이나 장난감 지참 (2~3시간 대기 필요)\n• 아이의 불안 최소화\n  → \"조금 아프지만 금방 끝나\"고 미리 솔직하게 알려주기\n  → 너무 긴장하면 스트레스 호르몬 상승 → 결과 영향\n• 복용 중인 약물 사전 고지 (특히 스테로이드, 갑상선호르몬)\n\n🏥 검사 당일 진행 과정:\n1. 공복 내원 → 정맥 유치침 1회 삽입 (이후 채혈은 유치침으로 무통)\n2. 자극 약물 투여: 클로니딘, 아르기닌, 글루카곤, 인슐린 등\n   → 약물이 뇌에서 성장호르몬 분비를 자극\n3. 30분마다 채혈 × 4~6회 (총 2~3시간)\n4. 가능한 조용히 휴식 (격렬한 놀이 금지)\n\n📊 결과 해석 (피크값 기준):\n• ≥ 10 ng/mL: 정상 → 급여 불가 (다른 원인 찾아야 함)\n• 7~10 ng/mL: 경계 범위 → 다른 지표와 종합 판단\n• 5~7 ng/mL: 부분 결핍 → 급여 가능, 대부분 치료 권장\n• < 5 ng/mL: 완전 결핍 → 급여 가능, 치료 필수\n\n⚠️ 급여 조건 (중요!):\n• 2종류 이상 다른 방법의 자극검사에서 모두 피크값 < 10 ng/mL\n• 단 1회 검사로는 급여 안 됨 (정상인도 컨디션 나쁠 때 낮게 나올 수 있음)\n\n🔍 자극검사만으로 결정하지 않아요:\n의사가 종합적으로 보는 것들:\n• 성장 속도 (GV) ← 가장 중요\n• IGF-1 수치\n• 골연령\n• 현재 키\n• 가족력","tip":"자극검사 결과만으로 치료 여부를 결정하지 않아요. IGF-1이 낮아도 GV가 정상이면 치료 불필요, 자극검사가 경계여도 GV가 나쁘면 치료를 고려합니다. 수치 하나가 아닌 종합 판단이 핵심입니다."},"premature_thelarche_detail":{"type":"answer","title":"조기 유방 발육 vs 진성 성조숙증 — 5가지 감별 포인트","content":"유방이 발달해도 90% 이상은 치료가 필요 없는 「조기 유방 발육」이에요. 하지만 나머지 10%는 진성 성조숙증입니다. 이 두 가지를 구별하는 5가지 포인트를 알아보세요.\n\n📌 정의:\n조기 유방 발육(Premature Thelarche) = 8세 이전 유방 발달만 단독으로 나타남\n• 2세 이하에서 가장 흔함\n• 다른 사춘기 징후가 전혀 없음\n\n🔍 5가지 감별 포인트:\n\n1️⃣ 다른 사춘기 징후 있나요?\n조기 유방 발육:\n• 유방만 발달, 음모·질 분비물·급성장 없음\n• \"그냥 가슴만 살짝 나왔어요\"\n진성 성조숙증:\n• 유방 발달 후 6~12개월 내 음모, 질 분비물 추가\n• 키도 갑자기 빠르게 자람\n\n2️⃣ 골연령이 얼마나 앞서나요?\n조기 유방 발육: 골연령 정상 or 6개월 미만 초과\n진성 성조숙증: 골연령 2년 이상 초과\n또는 처음엔 정상이었는데 6개월 만에 1.5년 급진행\n\n3️⃣ 성장 속도가 빨라졌나요?\n조기 유방 발육: 나이에 맞는 정상 성장 속도 유지\n진성 성조숙증: 성장 속도 갑자기 증가, 백분위 급상승\n\n4️⃣ GnRH 자극검사 결과:\n조기 유방 발육: LH 피크 < 2 IU/L (FSH 위주 반응, 뇌하수체 미활성)\n진성 성조숙증: LH 피크 ≥ 5 IU/L ← 확진 기준\n경계: 3~4 IU/L → 3~6개월 후 재평가\n\n5️⃣ 복부 초음파 소견:\n조기 유방 발육:\n• 자궁 길이 < 4cm, 난소 < 2mL\n• 자궁 내막 얇음\n진성 성조숙증:\n• 자궁 길이 > 4cm (서양배 모양)\n• 난소 증대, 큰 난포(≥ 4mm) 여러 개\n\n✅ 조기 유방 발육의 예후:\n• 90% 이상: 치료 없이 자연 호전\n• 51%: 유선 조직 완전 소실\n• 87%: 완전 또는 거의 완전히 소실\n• 진성 성조숙증으로 진행: 5~10% (2세 이하에서 발생 시 약 2%)\n• 정상 나이(8~13세)에 사춘기 옴, 최종 키 영향 없음\n\n⏰ 추적 관찰 일정:\n• 처음 3~6개월마다 내원\n• 확인 사항: 유방 크기 변화, 음모·질 분비물 유무, 성장 속도\n• 다음 증상 시 즉시 내원:\n  음모 발생 / 질 분비물 / 유방 급속 증대 / 키 갑자기 빠른 성장","tip":"환경 호르몬(플라스틱, 내분비 교란물질)이 원인이라고 걱정하시는 분들이 많은데, 현재 과학적으로 명확한 증거는 없습니다. 유리·스테인리스 용기 사용 정도의 일반적 건강 수칙으로 충분합니다."},"adiposity_rebound":{"type":"answer","title":"Adiposity Rebound (체지방 반등) — 5~7세 비만 예방의 핵심 개념","content":"「Adiposity Rebound」는 소아과 의사들이 가장 주목하는 비만 예방 개념 중 하나입니다.\n\n🔬 Adiposity Rebound란?\n• 영아기 이후 BMI(체지방)가 줄어들다가 다시 올라가는 시점\n• 정상적으로는 5~7세 사이에 시작됨\n• 이 시기가 「지방세포 제2차 급증기」\n\n📊 정상 BMI 변화 패턴:\n태어날 때 → 1세 전후 통통 → BMI 감소 시작\n→ 5~7세: Adiposity Rebound 시작 (BMI 다시 상승)\n→ 이 상승이 너무 이르거나 급격하면 위험\n\n⚠️ 왜 이 시기가 중요한가?\n\n지방세포 수는 두 번 급격히 증가:\n• 1차: 영아기 (12~18개월)\n• 2차: 5~7세 ← Adiposity Rebound 시기\n\n한번 늘어난 지방세포 수는 성인이 돼도 거의 줄지 않아요\n(크기는 줄일 수 있지만, 수는 평생 유지)\n\n📊 Adiposity Rebound 시기별 비만 위험:\n• 3세에 시작: 7세에 시작한 아이보다 평생 비만 위험 2~3배\n• 시작이 빠를수록 + 올라가는 폭이 클수록 → 위험\n\n✅ 이 시기(4~7세)에 해야 할 것:\n\n모니터링:\n• 6개월~1년마다 소아과에서 신장·체중 측정\n• BMI 백분위 변화 추이를 그래프로 확인\n• BMI 백분위 급상승 = 위험 신호, \"더 보자\"는 태도 금물\n\n생활 습관:\n• 매일 1시간 이상 달리고 뛰는 신체 활동\n• 화면 시간 2시간 이하 (특히 식사 중 화면 금지)\n• 식사 중 TV·스마트폰 금지\n• 유치원 환경 확인: 점심 메뉴, 간식, 야외 활동 시간\n\n🔴 위험 신호:\n• BMI 백분위 85 이상으로 급상승\n• 짧은 기간에 바지·신발 사이즈 급증가\n• 배만 나오는 형태의 체형 변화","tip":"Adiposity Rebound는 아이가 자연스럽게 조금 살이 오르는 시기예요. 이때 '아직 어리니까'라고 넘기지 말고, 6개월마다 BMI 백분위를 체크하는 것만으로도 조기 발견이 가능합니다."},"obesity_lifecycle":{"type":"answer","title":"생애주기별 비만 예방 — 시기마다 핵심이 달라요","content":"비만 예방의 효과는 시작 시점에 따라 완전히 달라집니다. 각 시기별 핵심을 알아보세요.\n\n🔑 왜 영아·유아기가 그토록 중요한가?\n3가지 이유:\n① 지방세포 수가 이 시기에 급증 → 한번 늘어난 세포 수는 평생 유지\n② 식습관의 기본 설정이 0~5세에 완성\n③ 대사 시스템이 이 시기에 초기화(프로그래밍)\n\n📅 시기별 핵심 관리:\n\n🤰 임신기 (출생 전)\n• 과도한 영양 → 태아 비만·대사 질환 위험\n• 영양 부족 → '절약 체질' 형성 → 나중에 쉽게 살 찜\n• 특히 위험: 저체중 출생 후 급속 추격 성장 → 대사증후군 위험\n• 균형이 핵심: 너무 많이도, 너무 적게도 안 됨\n\n👶 신생아·영아기 (0~12개월)\n• 지방세포 제1차 급증 시작 (12~18개월)\n• 모유 수유 → 비만 위험 13~22% 감소\n  이유: 자율 조절 수유 / 단백질 적정량 / 장내 균 / 식욕 호르몬\n• 보완식 첫 번째 음식: 반드시 채소!\n  (과일부터 시작하면 단맛에 길들어 채소 거부)\n\n🚶 유아기 (1~3세)\n• 단맛·짠맛 선호도 형성 시기\n• 음식-감정 연결 고리 형성 시작\n  → 달래기 위해 과자 주면 평생 스트레스 = 과자 패턴 형성\n• 식사 규칙성·식사량 자기조절 능력 형성\n• 필수: 하루 3시간 이상 신체 활동 (WHO 권고)\n• 화면: 2세 미만 최소화, 2~3세 하루 1시간 이하\n\n🏫 학령전기 4~5세 (Adiposity Rebound 준비)\n• 유치원 환경 체크: 점심 메뉴, 간식, 야외 활동 시간\n• 6~12개월마다 BMI 백분위 추적 시작\n• BMI 급상승 = 위험 신호, 즉시 대응\n\n🏃 학령전기 5~7세 (Adiposity Rebound 핵심)\n• 지방세포 제2차 급증기\n• 일찍 시작할수록 평생 비만 위험 2~3배\n• 이 시기 시작된 과체중은 방치하면 안 됨\n• 주요 위협: 학원 증가 → 신체 활동 감소, 친구와 간식·패스트푸드","tip":"'아직 어리니까 괜찮다'가 가장 위험한 생각이에요. 오히려 어릴수록 개입 효과가 크고, 지방세포 수가 결정되는 이 시기가 지나면 훨씬 어려워집니다."},"metabolic_syndrome":{"type":"answer","title":"대사증후군 — 여러 대사 이상이 동시에 터지는 도미노","recommend":true,"content":"대사증후군은 어느 날 갑자기 생기는 것이 아니라, 몸 안에서 도미노처럼 연쇄 진행됩니다.\n\n🔬 4단계 연쇄 메커니즘:\n1단계: 내장지방 축적\n   → 복강 깊숙이 내장지방 쌓임, 이 지방이 염증 물질 지속 분비\n\n2단계 (핵심): 인슐린 저항성 발생\n   → 염증 물질이 인슐린 신호 교란 → 세포가 인슐린에 반응 저하\n   → 혈당 상승 시작\n\n3단계: 고인슐린혈증 악순환\n   → 혈당 올라가니 췌장이 인슐린 더 분비\n   → 그래도 세포 반응 더 나빠짐 → 악순환\n\n4단계: 5가지 대사 이상 동시 폭발\n   혈당 상승 + 중성지방 상승 + 혈압 상승 + 동맥경화 진행 + HDL 감소\n\n📊 진단 기준 (5개 중 3개 이상):\n① 복부 비만: 허리 남아 ≥90cm, 여아 ≥85cm\n② 중성지방 ≥ 150 mg/dL\n③ HDL 낮음: 남아 < 40, 여아 < 50 mg/dL\n④ 혈압 ≥ 130/85 mmHg\n⑤ 공복혈당 ≥ 100 mg/dL 또는 당화혈색소 ≥ 5.7%\n\n⚠️ 얼마나 흔한가요?\n• 비만 청소년의 약 30% = 대사증후군\n• 비만 청소년의 약 90% = 1개 이상 위험인자 보유\n• 국내 유병률: 2007년 6.8% → 2018년 13.4% (10년간 2배)\n\n💥 왜 무서운가요?\n단기: 지방간, 다낭성 난소 증후군, 수면무호흡, 심리 문제\n장기: 2형 당뇨병으로 가는 고속도로\n• 30세 미만 2형 당뇨 발병 시:\n  심근경색 5배, 뇌졸중 3배, 신부전 3배 위험\n\n✅ 치료:\n• 목표: 1년 내 체중 7~10% 감량 (주 0.5kg씩 천천히)\n  → 급격한 감량은 실패 확률 높음\n• 체중 7~10% 감량 시 모든 대사 지표 대폭 개선\n• 6~12개월 효과 불충분 시 약물:\n  - 메트포르민 (혈당·인슐린 저항성)\n  - 스타틴 (콜레스테롤)\n  - 혈압약 (혈압 높을 때)\n\n🌟 가장 중요한 사실:\n청소년기 = 대사증후군을 역전시킬 수 있는 황금기\n혈관이 아직 건강하고, 자기 회복력이 강하고, 생활 습관 가소성이 높음\n이 시기를 놓치면 성인이 되어 되돌리기 훨씬 어려워집니다","tip":"대사증후군 진단을 받았어도 너무 무서워하지 마세요. 오히려 이 진단이 '지금 바꿀 수 있는 마지막 경고등'이에요. 청소년기에 발견한 것은 행운입니다."},"cgm_libre":{"type":"answer","title":"연속혈당측정기(Libre) — 비만 아이의 혈당 패턴을 실시간으로","content":"\"닭볶음탕 먹고 나서 혈당이 얼마나 오를까요?\" 이 질문의 답을 Libre로 바로 확인할 수 있어요.\n\n🔬 CGM(연속혈당측정기)이란?\n• 팔 뒤쪽(삼두근)에 센서 부착 → 24시간 연속 혈당 측정\n• 스마트폰으로 스캔하면 즉시 현재 혈당 + 8시간 그래프 확인\n• 따로 손가락 채혈 불필요\n\n📊 Libre가 보여주는 것들:\n• 현재 혈당 수치\n• 8시간 혈당 변화 그래프\n• 추세 화살표 (상승 ↑ / 안정 → / 하락 ↓)\n• Time In Range: 하루 중 정상 범위(70~180 mg/dL) 내 시간 비율 (목표 70% 이상)\n• 평균 혈당 + 변동폭\n\n🎯 비만 아이에게 특히 유용한 이유:\n\n① 공복 혈액검사로는 놓치는 문제 발견\n• 공복 혈당 95 = '정상'으로 기록됨\n• 하지만 식후 혈당 180 = 당뇨 전단계 수준\n• Libre로만 이런 「숨어있는 고혈당」 발견 가능\n\n② 음식-혈당 연결을 눈으로 보여줌\n• \"떡볶이 먹고 30분 후 혈당 +50\" 화면을 보여주면\n  아이가 스스로 \"와, 이렇게 많이 올랐어?!\" → 자발적 변화 시작\n• 다음 날 현미밥+닭가슴살 → 혈당 완만하게 소폭 상승\n  아이 스스로 깨달음: \"이런 음식을 먹어야 하는구나\"\n\n③ 운동 효과 즉시 확인\n• 혈당 130 → 30분 걷기 → 혈당 100\n• 숫자가 내려가는 것을 눈으로 보는 순간 운동 동기 폭발\n\n🔧 사용 방법:\n1. 팔 뒤쪽 소독 후 전용 부착기로 센서 삽입 (1초 미만 따끔)\n2. FreeStyle LibreLink 앱으로 스마트폰을 센서에 1~4cm 근접 스캔\n3. 최소 8시간마다 스캔 (데이터 누락 방지)\n4. 권장: 기상 시 / 식전·식후 / 운동 전·후 / 취침 전 스캔\n5. 가족 모니터링: LibreLinkUp 앱으로 부모 스마트폰에서 실시간 확인 가능\n\n⚠️ 한계와 주의사항:\n• 혈관 속 혈당이 아닌 조직액 측정 → 혈당과 5~15분 차이, ±10~20% 오차\n• 중요한 순간(저혈당 의심 시)에는 손가락 채혈로 확인 필요\n• 격렬한 운동·땀 많이 흘릴 때 센서 탈락 가능 (전용 고정 스티커 활용)\n\n💰 비용:\n• 센서 1개: 약 7~8만 원 (14일 사용)\n• 월 비용: 약 14~16만 원 (센서 2개)\n• 급여: 1형 당뇨 = 30% 부담 / 2형 당뇨·비만 = 비급여 전액 자부담\n\n🌟 추천 사용 방법:\n• 2~4주 집중 사용 (교육 투자 개념)\n• 한번 혈당 패턴 파악 후 → 평생 활용 가능한 지식 획득\n• 3개월 후 재평가 시 다시 단기 사용 가능","tip":"Libre는 치료 도구가 아닌 교육 도구예요. '이 음식을 먹으면 혈당이 이렇게 되는구나'를 아이 스스로 눈으로 보게 하는 것이 핵심입니다. 아이가 스스로 변화하게 만드는 가장 강력한 방법입니다."},"glp1_detail":{"type":"answer","title":"GLP-1 수용체 작동제 (Saxenda·Wegovy) — 새로운 비만 치료 옵션","content":"장에서 자연적으로 나오는 호르몬의 원리를 이용한 강력한 비만 치료제예요.\n\n🔬 작용 원리:\nGLP-1(글루카곤 유사 펩타이드-1) = 식사 후 장에서 자연 분비되는 호르몬\n→ 췌장에서 인슐린 분비 보조 + 위 배출 속도 느리게 + 뇌에 포만감 신호 전달\n\n문제: 자연 호르몬은 수분 만에 분해됨\n해결: 과학자들이 수시간~수일 작용하는 약물로 개발 → GLP-1 수용체 작동제\n\n💊 약물 종류:\n\n리라글루타이드 (Saxenda):\n• 1일 1회 피하주사\n• 국내 12세 이상 소아청소년 비만 치료 승인\n• 바늘 매우 가늘어 대부분 잘 적응\n\n세마글루타이드 (Wegovy):\n• 1주 1회 피하주사 (편리성 ↑)\n• 리라글루타이드보다 효과 더 강력\n• 국내 12세 이상 승인\n\n리벨서스 (경구정):\n• 알약 형태로 복용 (주사 없음)\n• 단, 국내에서는 현재 당뇨 치료에만 승인 (비만 적용 제한적)\n\n📊 효과 (STEP TEENS 연구 - 청소년 대상 임상시험):\n• 위약 대비 체중 약 10~15% 감소 (매우 강력한 효과)\n• 시간표:\n  1~2주 후: 식욕 감소 시작\n  4주 후: 체중 감소 시작\n  약 6개월: 최대 효과 도달\n• 체중 감량 외: 혈당, 혈압, 지방간 등 대사 지표 전반 개선\n\n⚠️ 부작용:\n가장 흔한 (30~40%):\n• 오심·구토·설사·변비\n• 매우 천천히 용량 올리면 대부분 호전 (수주 내)\n\n드문 (즉시 병원 방문):\n• 췌장염·담낭염: 윗배 극심한 통증이 등 쪽으로 퍼지면 즉시 응급실\n\n🚫 절대 금기:\n• 갑상선 수질암 가족력\n• 췌장염 기왕력\n• 임신 중\n\n💰 비용과 현실:\n• 비급여 → 월 약 30~50만 원 전액 자부담\n• 중단 시 반동 위험: 식욕 돌아오고 체중 반등 가능\n  → 전문의와 장기 유지 계획 필수\n\n⭐ 중요: 생활 습관 개선과 반드시 병행해야\n약물만으로는 최대 효과 불가, 식이·운동 동시 진행 필수","tip":"GLP-1 치료제는 '기적의 약'이 아닙니다. 식욕을 낮춰주는 도구일 뿐이고, 그 기회를 활용해 식습관과 운동 패턴을 바꾸는 노력이 함께해야 의미가 있어요."},"obesity_surgery":{"type":"answer","title":"중증 비만 수술 치료 — 대부분에게 해당하지 않는 최후의 수단","content":"먼저 말씀드립니다: 이 내용은 대부분의 아이들에게 해당하지 않아요. 이미 의사에게 수술을 여러 번 권고받은 극소수를 위한 정보입니다.\n\n⚠️ 수술은 되돌릴 수 없는 선택입니다:\n• 절제된 위는 복원 불가\n• 성장기 영양 흡수 제한 → 최종 키 영향 가능\n• 종신 영양제 복용 필수\n• 종신 특수 식이 방법 유지 필수\n\n📋 수술 적응증 (4가지 모두 충족해야 함):\n\n① 성장 완료\n• 최소 13~14세 이상 + 골연령 검사로 확인\n\n② 고도 비만\n• BMI ≥ 40 또는\n• BMI ≥ 35 + 심각한 합병증 동반\n• (참고: 키 160cm에 BMI 40 = 체중 102kg 이상)\n\n③ 비수술 치료 6~12개월 이상 무효\n• 식이·운동·약물 치료 모두 시도했지만 효과 없음\n• \"3개월 해봤는데 안 되더라고요\" → 충분하지 않음\n\n④ 생명을 위협하는 합병증\n• 약으로도 조절 안 되는 2형 당뇨\n• 야간 호흡 정지가 있는 심한 수면무호흡\n• 진행 중인 지방성 간염 + 간 섬유화\n• 단순 비만만으로는 수술 적응증 안 됨\n\n🔪 수술 후 영구 관리 (평생 지켜야 할 규칙):\n• 매 식사 반 공기 이하 (소량씩 자주)\n• 한 입 30번 이상 천천히 씹기\n• 탄산음료 영구 금지\n• 식사 전후 30분간 물도 금지\n• 종신 영양제: 종합비타민 + 칼슘 + 철분\n\n💰 한국의 현실:\n• 수술 가능 병원: 극소수의 대형 대학병원만\n• 수술비: 약 1,000~2,000만 원\n• 대부분 비급여\n• 수술 후 지속 관리비 + 영양제비 추가 발생\n\n⚠️ 반동 위험:\n수술 1~2년 후 체중의 10~20% 다시 증가하는 경우 흔함\n→ 식이 원칙 안 지키거나 운동 안 하면 위가 다시 늘어남\n\n🏥 다학제 팀이 필요해요:\n외과 + 소아내분비과 + 정신건강의학과 + 영양사가 함께하는 병원 선택 필수","tip":"수술은 시작이지 끝이 아닙니다. 수술 성공의 80%는 이후 생활 습관 유지에 달려있어요. 아이 본인이 수술 후 변화를 충분히 이해하고 스스로 결정해야 의미 있습니다."},"gh_basics":{"type":"question","text":"성장호르몬 기초에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"성장호르몬은 우리 몸 어디에서 만들어지나요?","next":"gh_where_made"},{"text":"언제 가장 많이 분비되나요?","next":"gh_when_peak"},{"text":"IGF-1이 뭔가요? 성장호르몬과 어떻게 다른가요?","next":"gh_igf1_explain"},{"text":"성장에 필요한 5가지 요소가 뭔가요?","next":"gh_5_factors"},{"text":"깊은 잠(서파수면)을 자기 위한 환경 조성법은?","next":"gh_sleep_env"}]},"gh_where_made":{"type":"answer","title":"성장호르몬은 뇌하수체에서 만들어져요","content":"뇌 깊숙한 곳에 있는 완두콩 크기의 「뇌하수체」에서 만들어집니다.\n\n🧠 구조와 원리:\n• 시상하부(사령관) → 뇌하수체(공장) → 혈액(고속도로) → 간/성장판\n• 시상하부가 명령을 내리면 뇌하수체가 호르몬을 혈액으로 분비\n• 둘은 「뇌하수체문맥계」라는 전용 혈관망으로 연결\n\n📊 조절 시스템:\n• 액셀: GHRH(방출호르몬) → 분비 촉진\n• 브레이크: 소마토스타틴(억제호르몬) → 분비 억제\n• 음성 피드백: IGF-1이 충분해지면 뇌에 신호 → 자동으로 분비 감소\n\n💡 성장호르몬의 역할 (키만이 아니에요!):\n• 뼈 길이 성장 + 밀도 강화\n• 근육 단백질 합성\n• 복부 지방 분해\n• 심장·간 등 장기 발달\n• 대사 조절 (혈당, 지방 등)","tip":"뇌하수체는 완두콩보다 작지만, 성장·갑상선·부신·생식 등 우리 몸의 거의 모든 호르몬을 조율하는 「마스터 컨트롤 센터」예요."},"gh_when_peak":{"type":"answer","title":"성장호르몬은 자는 동안 가장 많이 분비돼요","content":"잠든 후 첫 1~2시간, 특히 「서파수면(깊은 잠)」 단계에서 하루 분비량의 절반 이상이 나옵니다.\n\n⏰ 분비 타임라인:\n• 밤 9~10시 취침 → 11시~0시 사이 최대 분비\n• 서파수면: 뇌파가 느리고 깊은 단계, 몸이 가장 편안\n• 운동 후 분비도 있지만 수면 중의 1/5 수준\n\n🌙 꼭 지켜야 할 수면 원칙:\n• 취침 시간: 밤 9~10시 사이 권장\n• 총 수면 시간: 초등학생 9~11시간, 중학생 8~10시간\n• 취침 전 단 음식: 혈당 상승 → 인슐린 과다 → 성장호르몬 억제\n• 취침 전 스마트폰: 블루라이트 → 멜라토닌 억제 → 깊은 잠 방해\n\n📊 수면 부족의 영향:\n• 서파수면 감소 → 성장호르몬 분비 감소\n• 만성 수면 부족 아이: 또래보다 최종 키 1~3cm 낮을 수 있음","tip":"\"잘 때 큰다\"는 말은 과학적 사실이에요. 최고의 성장 비결은 취침 전 스마트폰 대신 일찍 자는 것!"},"gh_igf1_explain":{"type":"answer","title":"IGF-1 — 성장호르몬의 '현장 일꾼'이에요","content":"성장호르몬이 「명령서」라면 IGF-1은 「현장에서 실제 일하는 일꾼」입니다.\n\n📊 둘의 차이:\n구분 | 성장호르몬(GH) | IGF-1\n만들어지는 곳 | 뇌하수체 | 주로 간\n혈중 지속 시간 | 약 20분 | 12~15시간\n역할 | 명령 전달 | 실제 성장 실행\n검사 방법 | 자극검사(2~3시간) | 혈액 1회 채취\n\n🎯 IGF-1이 중요한 이유:\n• 성장판에 직접 작용해 세포 분열 → 뼈가 길어짐\n• 혈중에 오래 머물러 안정적 성장 효과\n• 간 뿐 아니라 성장판에서도 직접 생성 (이중 시스템)\n\n🔬 임상적 의미:\n• IGF-1 혈액검사: 성장호르몬 결핍 선별 검사로 사용\n• 단 1회 채혈로 가능 (공복 불필요)\n• 낮으면 → 성장호르몬 자극검사 추가 권장\n• 정상이어도 키가 작다면 → 다른 원인 탐색","tip":"IGF-1을 높이는 자연적인 방법: ① 충분한 수면 ② 운동 (특히 전신 운동) ③ 충분한 단백질 섭취 ④ 아연 충분히 섭취"},"gh_5_factors":{"type":"answer","title":"성장에 필요한 5대 요소","content":"키 성장은 단 하나의 요소가 아니라 5가지가 함께 작용합니다.\n\n🏆 성장의 5대 요소:\n\n1️⃣ 호르몬 (성장·갑상선)\n• 성장호르몬: 간→IGF-1→성장판 자극\n• 갑상선호르몬: 부족하면 성장 전반 저하\n\n2️⃣ 영양 (단백질·칼슘·비타민D)\n• 단백질: 성장의 원재료 (없으면 호르몬이 있어도 못 자람)\n• 칼슘: 뼈의 원재료\n• 비타민D: 칼슘 흡수율 2~3배 향상\n\n3️⃣ 수면 (깊은 잠)\n• 서파수면 중 성장호르몬 최대 분비\n• 9시간 이상 권장\n\n4️⃣ 운동 (성장판 자극)\n• 줄넘기·농구·달리기: 성장판에 적절한 자극\n• 적절한 근력 운동: 뼈 밀도 강화\n\n5️⃣ 스트레스 관리\n• 만성 스트레스 → 코티솔 증가 → 성장호르몬 억제\n• 정서적 안정이 키 성장에도 직결","tip":"5가지 중 하나라도 결핍되면 효율이 떨어져요. 특히 영양이 부족한 상태에서 성장호르몬 주사를 맞아도 원재료가 없으면 제대로 작용하지 못합니다."},"gh_sleep_env":{"type":"answer","title":"깊은 잠을 자기 위한 환경 조성법","content":"깊은 잠(서파수면)을 잘 자야 성장호르몬이 제대로 분비됩니다.\n\n🌙 수면 환경 체크리스트:\n\n✅ 방 온도: 18~20°C (약간 서늘하게)\n• 체온이 낮아져야 깊은 잠에 들 수 있음\n• 너무 더우면 깊은 잠 방해\n\n✅ 방 밝기: 최대한 어둡게\n• 멜라토닌: 어두워야 분비 (깊은 잠 유도)\n• 스마트폰·TV 블루라이트: 멜라토닌 억제\n\n✅ 취침 1시간 전 루틴:\n• 스마트폰·게임 OFF\n• 따뜻한 목욕 (체온 올렸다가 낮추는 효과)\n• 가벼운 스트레칭\n\n✅ 기상 시간 일정 유지:\n• 주말도 평일과 1시간 이내 차이\n• 수면 리듬 유지가 핵심\n\n❌ 수면 방해 요인:\n• 취침 2~3시간 내 야식 (소화 과정이 깊은 잠 방해)\n• 단 음식 (혈당 상승 → 인슐린 → GH 억제)\n• 카페인 (초콜릿, 콜라에도 포함)\n\n📊 연구 결과:\n하루 30분 일찍 자는 것만으로도 IGF-1 수치가 약 15% 상승한다는 연구가 있어요.","tip":"\"일찍 자는 아이가 잘 큰다\"는 말은 정말입니다. 취침 시간이 밤 9~10시 이후로 넘어가면, 성장호르몬 분비 피크를 놓치게 됩니다."},"growth_basics":{"type":"question","text":"키 성장 기초와 백분위수에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"백분위수란 무엇이고 어떻게 보나요?","next":"growth_percentile_explain"},{"text":"집에서 키를 정확하게 재는 방법이 있나요?","next":"growth_measure_method"},{"text":"나이별로 얼마나 자라야 정상인가요?","next":"growth_speed_by_age"},{"text":"성장곡선은 어떻게 읽나요?","next":"growth_curve_reading"},{"text":"병원에 꼭 가야 하는 5가지 신호는?","next":"growth_when_hospital"}]},"growth_percentile_explain":{"type":"answer","title":"백분위수 — 또래 100명 중 몇 번째인지를 나타내요","content":"백분위수는 또래 100명을 키 순서대로 세웠을 때의 위치입니다.\n\n📊 기본 이해:\n• 50백분위 = 100명 중 50번째 = 평균\n• 25백분위 = 100명 중 뒤에서 26번째 (평균보다 작지만 정상)\n• 3~97백분위 = 의학적으로 모두 정상 범위\n\n✅ 핵심 포인트:\n50백분위가 무조건 좋은 것이 아니에요!\n• 10백분위더라도 자기 선을 꾸준히 따라가면 → 정상\n• 50백분위더라도 백분위수가 계속 떨어지면 → 주의\n\n⚠️ 걱정되는 경우:\n• 3백분위 미만: 100명 중 3번째로 작음 → 전문과 평가 권장\n• 두 개 주요 백분위선(예: 50→25→10) 하향 돌파 → 원인 탐색 필요\n\n📏 어떤 백분위수가 중요한가요?\n주요 백분위선: 3, 10, 25, 50, 75, 90, 97\n이 선들을 \"가로지르지 않고 평행하게\" 따라가는 것이 건강한 성장","tip":"키는 절대값보다 \"추세\"가 중요해요. 3개월마다 측정해서 백분위수가 일정하게 유지되는지 확인하는 습관을 들여보세요."},"growth_measure_method":{"type":"answer","title":"집에서 키를 정확하게 재는 방법","content":"측정 방법에 따라 최대 2~3cm 차이가 날 수 있어요. 정확한 측정이 중요합니다.\n\n📏 올바른 측정 자세 (4점 밀착):\n1. 뒤꿈치 → 벽에 붙이기\n2. 엉덩이 → 벽에 붙이기\n3. 어깨 → 벽에 붙이기\n4. 뒤통수 → 벽에 붙이기\n5. 시선: 정면, 귀와 눈이 수평\n6. 척추: 기지개 켜듯 쭉 펴기\n7. 머리 위에 책을 수평으로 놓고 표시\n\n⏰ 언제 재야 정확한가?\n• 아침 기상 직후가 가장 정확 (저녁은 0.5~2cm 작음)\n• 왜? 종일 중력에 눌려 척추 추간판이 압축됨\n• 반드시 신발·양말 벗고 측정\n\n📅 얼마나 자주 재야 하나요?\n• 3개월(12주) 주기 권장\n• 일주일 성장은 1mm 이내 → 측정 오차에 묻힘\n• 계절 변화에 맞춰 재면 기억하기 쉬움 (3/1, 6/1, 9/1, 12/1)\n\n❌ 흔한 실수:\n• 신발·양말 착용한 채 측정\n• 푹신한 카펫 위 측정 (발이 가라앉음)\n• 머리핀·머리끈 착용 상태\n• 뒤꿈치가 벽에서 떨어진 채 측정","tip":"성장 기록을 남길 때는 날짜·시간·체중도 함께 기록하세요. 병원 방문 시 '1년 동안 3.5cm 컸어요'처럼 구체적인 수치를 말할 수 있으면 진단에 큰 도움이 됩니다."},"growth_speed_by_age":{"type":"answer","title":"나이별 정상 성장 속도","content":"나이에 따라 정상 성장 속도가 크게 다릅니다.\n\n📊 나이별 정상 성장 속도:\n\n0~1세: 25cm (일생 중 가장 빠름!)\n1~2세: 10~12cm\n2~3세: 8~10cm\n3세~사춘기 전: 5~7cm/년 ← 이 시기가 가장 중요한 기준\n사춘기 급성장기:\n  • 여아: 8~10cm/년 (1~2년)\n  • 남아: 10~12cm/년 (2~3년)\n\n⚠️ 연간 4cm 미만이면 (사춘기 전):\n• 반드시 소아내분비과 평가 필요\n• 성장호르몬 결핍, 갑상선 저하증, 영양 부족 등 원인 탐색\n\n📌 사춘기 급성장 시기:\n• 여아: 유방 발달 후 6개월~1년 뒤\n• 남아: 고환 증대 후 1~2년 뒤\n• 이 시기에 급성장이 없으면 → 평가 필요\n\n💡 키와 몸무게를 함께 봐야 해요:\n• 키는 크는데 몸무게 안 늘면: 영양 부족 가능성\n• 몸무게만 늘고 키 안 크면: 비만·성조숙증 위험","tip":"초등학교 1~2학년(7~8세)이 '황금 치료 시기'예요. 이때 성장 속도가 느리다면 바로 검사받는 것이 좋습니다. 사춘기가 시작되면 치료 효과가 절반으로 줄어요."},"growth_curve_reading":{"type":"answer","title":"성장곡선 읽는 법 — 점보다 선이 중요해요","content":"성장곡선은 아이의 성장 추세를 한눈에 보여주는 가장 강력한 도구입니다.\n\n📈 읽는 방법:\n1. 가로축 = 나이 / 세로축 = 키\n2. 측정값을 3~6개월마다 점으로 찍기\n3. 점들을 연결해 \"선\"을 만들기\n4. 이 선이 표준 백분위선과 평행하면 정상\n\n✅ 건강한 성장 패턴:\n• 낮은 백분위더라도 자기 선을 꾸준히 따라 올라가면 OK\n• 부모 키에 맞는 백분위를 유지하면 OK\n\n⚠️ 주의가 필요한 패턴:\n• 두 개의 주요 백분위선을 가로질러 하락\n• 6개월 이상 전혀 성장이 없음\n• 또래들은 사춘기 급성장 중인데 혼자만 안 오름\n\n📌 중요한 포인트:\n• 단 한 번의 측정보다 \"추세\"를 보는 것이 핵심\n• 예) 지금 25백분위이지만 1년 전 75백분위였다면 → 원인 탐색 필요\n\n🔍 성장곡선 활용 팁:\n• 3개월마다 같은 조건(아침, 같은 자세)으로 측정\n• 질환관리 앱이나 소아과 앱의 성장 기록 기능 활용","tip":"성장곡선에서 점 하나(지금 키)보다 선의 방향(추세)이 훨씬 중요해요. 의사도 한 번 측정보다 시간에 따른 변화를 더 중요하게 봅니다."},"growth_when_hospital":{"type":"answer","title":"이럴 때는 꼭 병원에 가야 해요 — 5가지 신호","recommend":true,"content":"다음 5가지 중 하나라도 해당하면 소아내분비과 방문을 권장합니다.\n\n🚨 병원 방문 신호 5가지:\n\n1️⃣ 연간 성장 4cm 미만 (사춘기 전)\n   → 성장호르몬 결핍, 갑상선 저하증 등 배제\n\n2️⃣ 백분위수가 두 개 이상의 주요 선을 하향 돌파\n   → 예) 6개월 만에 50→10백분위\n\n3️⃣ 키가 3백분위 미만\n   → 100명 중 3번째로 작음\n\n4️⃣ 사춘기가 왔는데 급성장이 없음\n   → 성장판이 먼저 닫히는 경우 (성조숙증 가능성)\n\n5️⃣ 사춘기 전인데 갑자기 연 8cm 이상 급성장\n   → 성조숙증 초기 신호 (역설적으로 주의 필요)\n\n⬆️ 추가로 확인할 신호:\n• 부모 평균 키에 비해 10cm 이상 작음\n• 머리가 상대적으로 유난히 커 보임\n• 빈번한 저혈당, 심한 신생아 황달 경력\n\n📋 병원 방문 시 챙길 것:\n• 연도별 키·몸무게 기록\n• 부모 양쪽 키\n• 출생 기록 (출생 시 체중·신장)\n• 사진 (얼굴 변화 확인에 도움)","tip":"\"아직 지켜볼게요\"라는 마음에 6개월~1년 미루다가 치료 기회를 잃는 경우가 많아요. 의심되면 빨리 가서 검사받는 것이 최선입니다."},"boneage_method_detail":{"type":"answer","title":"골연령 검사 방법 — 왼손 X-ray 한 장이면 돼요","content":"골연령 검사는 왼손을 X-ray 촬영하는 매우 간단한 검사입니다.\n\n🔬 검사 과정:\n1. 촬영판 위에 왼손바닥을 쫙 펴서 올리기\n2. 10초 이내로 사진 한 장 찍으면 끝\n3. 주사·채혈 전혀 없음\n4. 소요 시간: 5분\n\n☢️ 방사선 안전성:\n• 흉부 X-ray의 1/20 수준 (매우 적음)\n• 제주도 비행기 왕복 시 받는 우주방사선보다 적음\n• WHO 기준으로 연간 수백 번 찍어도 안전한 수준\n\n🦴 무엇을 보는 건가요?\n손가락·손바닥·손목의 20개 이상 뼈를 관찰:\n• 나이에 따라 순차적으로 나타나는 8개 손목뼈(수근골) 모양\n• 성장판(골단)의 형태와 유합 정도\n\n📅 검사 주기:\n• 정상 성장기: 1년에 1회\n• 성장호르몬·성조숙증 치료 중: 6개월마다\n• 뼈나이가 실제보다 2년 이상 빠른 경우: 더 자주","tip":"만 5세 미만에서는 뼈가 충분히 발달하지 않아 판독이 부정확할 수 있어요. 만 5세 이후부터 의미 있는 결과를 얻을 수 있습니다."},"boneage_why_left":{"type":"answer","title":"왜 왼손으로 골연령 검사를 하나요?","content":"1930년대부터 축적된 전 세계 모든 골연령 표준 데이터가 「왼손」을 기준으로 만들어졌기 때문입니다.\n\n📚 역사적 이유:\n• 1930년대 Greulich-Pyle 아틀라스 창시 시 왼손 기준으로 설정\n• 이후 모든 표준 데이터베이스가 왼손 기준 구축\n• 전 세계 공통 기준 유지를 위해 현재까지 왼손 사용\n\n🔑 추가 이유:\n• 대다수가 오른손잡이 → 오른손은 부상이 많아 데이터 변동성 있음\n• 왼손이 더 \"표준적인\" 발달 상태를 반영\n\n✋ 오른손잡이인데 왼손으로 해도 정확한가요?\n네! 손을 사용하는 정도가 골연령에 미치는 영향은 무시할 수 있을 정도로 작습니다. 양손의 뼈 성숙도 차이는 거의 없어요.\n\n🤖 최근 변화:\n• AI 판독 시스템 도입으로 정확도 향상\n• 의사 간 판독 오차(기존 6개월~1년) 감소 추세\n• 일부 병원에서는 AI 보조 판독 사용 중","tip":"왼손이 어색하더라도 걱정 마세요. 왼손 측정이 전 세계 표준이고, 결과 정확도에 영향을 주지 않습니다."},"boneage_fast_slow":{"type":"answer","title":"골연령이 실제 나이보다 빠르거나 느리면?","content":"골연령이 실제 나이와 다를 때의 의미를 정확히 알아야 합니다.\n\n📊 골연령이 실제 나이보다 「빠른」 경우:\n\n⚠️ 의미:\n• 뼈가 실제 나이보다 일찍 늙고 있음\n• 성장판이 일찍 닫힐 가능성 높음\n• 지금은 또래보다 크지만 최종 키는 작을 수 있음\n\n주요 원인:\n• 비만 (렙틴·인슐린이 뼈 성숙 촉진)\n• 성조숙증 (성호르몬 → 성장판 조기 폐쇄)\n• 갑상선 기능 항진증 등\n\n2년 이상 앞서면: 전문의 평가 필수\n\n─────────────────────────────\n\n📊 골연령이 실제 나이보다 「느린」 경우:\n\n✅ 긍정적 신호일 때:\n• 체질성 성장지연 (늦게 크는 체질)\n• 성장판이 더 오래 열려 있음 → 더 오래 자람\n• 지금 작아도 결국 정상 키에 도달\n\n⚠️ 주의가 필요할 때:\n• 성장 속도도 느린 경우 (연 4cm 미만)\n• 성장호르몬 결핍, 영양 불량, 갑상선 저하증 등\n\n구별법: 성장 속도가 정상(5~6cm/년)인가?\n• 정상이면 → 체질성, 기다리면 됨\n• 느리면 → 원인 탐색 필요","tip":"골연령만 보지 말고 성장 속도와 함께 해석해야 합니다. 골연령이 느려도 성장 속도가 정상이면 걱정 없어요!"},"boneage_accuracy":{"type":"answer","title":"골연령으로 예측 키, 얼마나 정확한가요?","content":"골연령 예측 키는 부모 키 공식보다 훨씬 정확하지만, 완벽하지는 않아요.\n\n📊 방법별 정확도 비교:\n\n부모 키 공식 (MPH):\n• 오차 범위: ±8~10cm\n• 총 가능 범위: 20cm\n• 예) 예측 170cm → 실제 160~180cm\n\n골연령 기반 예측:\n• 사춘기 전: 오차 ±5~7cm\n• 사춘기 중기: 오차 ±3~5cm\n• 사춘기 후반: 오차 ±2~3cm (가장 정확)\n\n📌 정확도가 높아지는 조건:\n• 사춘기가 진행될수록 정확\n• 현재 키 + 골연령 + 성장 속도를 함께 고려할 때\n• Bayley-Pinneau법 (사춘기 후반에 정확)\n\n💡 실제 활용 방법:\n• 예측 키 자체보다 「유전 목표 키(MPH)」와의 차이를 봐요\n• 예측 키가 유전 목표보다 5cm 이상 낮으면 → 치료 고려\n\n⚠️ 주의:\n• 골연령 판독은 의사마다 6개월~1년 오차 가능\n• AI 판독 도입으로 개선 중이지만 아직 완벽하지 않음","tip":"예측 키는 확정이 아니라 방향을 보는 도구예요. 치료 여부는 예측 키 하나보다 성장 속도, 유전 목표, 골연령을 종합해서 결정합니다."},"boneage_treatment_end":{"type":"answer","title":"골연령이 치료 종료 기준에 어떻게 사용되나요?","content":"성장호르몬 치료와 성조숙증 치료 모두 골연령을 기준으로 종료를 결정합니다.\n\n📋 성조숙증 치료 (GnRH 주사) 종료 기준:\n• 여아 골연령 12~12.5세\n• 남아 골연령 13~13.5세\n• → 또래의 정상 사춘기 시기와 일치시켜 종료\n• 종료 후 평균 1년 내 초경\n\n📋 성장호르몬 치료 종료 기준:\n급여 종료 기준 (건강보험):\n• 여아 골연령 14~15세\n• 남아 골연령 15~16세\n• 여아 신장 153cm 초과 / 남아 165cm 초과\n• 연간 성장 2cm 미만\n\n자비 치료는 이후에도 가능\n\n💡 왜 달력 나이가 아닌 골연령을 쓰나요?\n• 성장판이 닫히는 시기가 실제로는 골연령에 달려 있음\n• 달력 나이 14세여도 골연령 11세면 → 치료 효과 있음\n• 달력 나이 11세여도 골연령 14세면 → 치료 효과 없음\n\n📅 골연령 추적 주기:\n• 치료 중: 6개월마다\n• 안정기: 1년마다","tip":"치료 종료는 의사가 골연령 검사 결과를 보고 결정합니다. 달력 나이가 14세여도 골연령이 낮으면 치료를 계속할 수 있어요."},"gh_test_detail":{"type":"question","text":"성장호르몬 검사에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"IGF-1 검사와 자극검사의 차이가 뭔가요?","next":"gh_test_types"},{"text":"자극검사는 어떻게 진행되나요?","next":"gh_stim_test_detail"},{"text":"결과를 어떻게 해석하나요?","next":"gh_test_result_reading"},{"text":"검사 전 어떻게 준비해야 하나요?","next":"gh_test_preparation"},{"text":"자극검사에 부작용이 있나요?","next":"gh_stim_side_effect"}]},"gh_test_types":{"type":"answer","title":"IGF-1 검사 vs 자극검사 — 선별 vs 확진","content":"두 검사는 목적과 방식이 완전히 다릅니다.\n\n📊 비교표:\n\n구분 | IGF-1 혈액검사 | 성장호르몬 자극검사\n목적 | 선별(스크리닝) | 확진(진단)\n소요 시간 | 5분 | 2~3시간\n채혈 횟수 | 1회 | 4~6회 (유치 1회)\n금식 여부 | 불필요 | 8시간 금식 필수\n비용 | 낮음 | 높음\n정확도 | 간접 지표 | 금표준(gold standard)\n\n🔬 IGF-1의 한계:\n• 영양 상태, 간 기능에 따라 수치 변동\n• 정상 수치여도 GH 결핍일 수 있음 (위음성 가능)\n• 따라서 IGF-1만으로 확진 불가\n\n✅ 언제 어떤 검사를?\n• IGF-1 먼저 → 낮으면 자극검사 추가\n• 또는 임상적으로 강하게 의심되면 바로 자극검사\n• 보험 급여를 위해서는 자극검사가 필수\n\n💡 자극검사가 \"금표준\"인 이유:\n성장호르몬은 맥동성으로 분비 → 1회 측정으로는 결핍 판단 불가\n자극검사는 인위적으로 분비를 최대한 유도해 최고값을 측정","tip":"IGF-1 검사가 정상이어도 성장이 느리고 다른 이상 신호가 있다면, 자극검사까지 받아보는 게 좋습니다."},"gh_stim_test_detail":{"type":"answer","title":"성장호르몬 자극검사 — 어떻게 진행되나요?","content":"「금표준(Gold Standard)」 검사입니다. 정확하지만 시간이 걸려요.\n\n📋 검사 순서:\n1. 전날 밤 12시부터 8시간 금식 (물은 OK)\n2. 오전 일찍 병원 도착\n3. 정맥 유치 바늘 1회만 삽입 (이후 채혈은 여기서)\n4. 자극 약물 투여\n5. 30분 간격으로 4~5회 채혈\n6. 약 2~3시간 후 종료\n\n💊 사용하는 자극 약물:\n• 클로니딘: 부작용 적음, 가장 흔히 사용\n• 아르기닌: 아미노산 형태, 주사\n• 글루카곤: 저혈당 위험 없음\n• 인슐린: 가장 강력, 저혈당 모니터링 필요\n• 보험 급여: 서로 다른 방법으로 2종 이상 필요\n\n📊 결과 판독:\n• 피크값 ≥10ng/mL: 정상 (보험 불가)\n• 7~10: 경계\n• 5~7: 부분 결핍\n• <5: 완전 결핍 (치료 강력 권장)\n\n⏳ 기다리는 동안:\n• 병원 침대에서 안정 취하기\n• 책·태블릿·장난감 지참 권장\n• 보호자 1명 동반 필수","tip":"자극검사는 아이도 부모도 힘든 검사예요. 하지만 치료 여부를 정확히 판단하고 보험을 적용받기 위해 반드시 필요한 과정입니다."},"gh_test_result_reading":{"type":"answer","title":"성장호르몬 자극검사 결과 해석법","content":"수치만이 아니라 여러 요소를 종합해서 판단합니다.\n\n📊 피크값 기준:\n• ≥10ng/mL: 정상 → 성장호르몬 결핍 아님\n• 7~10ng/mL: 경계 → 추가 관찰\n• 5~7ng/mL: 부분 결핍 → 치료 고려\n• <5ng/mL: 완전 결핍 → 즉시 치료 강력 권장\n\n🔍 수치 외에 함께 고려하는 요소:\n1. 성장 속도 (가장 중요!)\n   → 연간 4cm 미만이면 수치가 경계여도 치료 고려\n2. IGF-1 수치\n   → 낮으면 결핍 가능성 높음\n3. 골연령\n   → 치료 가능한 기간이 얼마 남았는지\n4. 현재 키 위치\n   → 하위 3백분위 미만이면 더 적극적으로\n5. 가족력\n   → 부모 키에 비해 얼마나 작은지\n\n💡 경계값(7~10)이 나왔을 때:\n• 6개월~1년 성장 속도 추가 관찰\n• 다른 요인들 종합 검토\n• 필요시 재검사\n\n✅ 완전 결핍(<5)이면:\n치료 반응이 매우 좋음 → 첫 해 평균 10~12cm","tip":"수치가 10 이상이어도 다른 조건들이 이상하면 치료를 고려할 수 있어요. 숫자 하나보다 전체적인 그림을 보는 것이 중요합니다."},"gh_test_preparation":{"type":"answer","title":"성장호르몬 자극검사 준비 — 이렇게 하면 돼요","content":"검사 전 준비를 잘 해야 정확한 결과가 나옵니다.\n\n📋 검사 전날 (D-1):\n• 밤 12시 이후부터 완전 금식\n• 단, 물은 마셔도 됨\n• 평소와 같이 자기\n• 격렬한 운동 피하기\n\n🌅 검사 당일 (D-day):\n• 최대한 일찍 병원 도착 (오전 9시 이전 권장)\n• 소매 걷기 편한 헐렁한 옷 착용\n• 아이가 좋아하는 장난감·책·태블릿 지참\n• 보호자 1명 동반 필수 (2~3시간 함께 있어야 함)\n\n✅ 검사 중 주의사항:\n• 유치 바늘 삽입 부위 건드리지 않기\n• 30분마다 채혈 시 최대한 안정\n• 클로니딘 사용 시: 졸음 유발 가능 (정상)\n• 인슐린 사용 시: 저혈당 증상(식은땀, 떨림) 의료진에게 즉시 알리기\n\n❓ 자주 묻는 질문:\nQ. 아침약을 먹어도 되나요?\nA. 의사에게 미리 확인 (대부분 금식 기간에 복용 금지)\n\nQ. 철분제·영양제도 중단해야 하나요?\nA. 검사 전 의사에게 복용 중인 모든 약물 알리기","tip":"검사 당일 아이가 충분히 금식을 했는지 확인하세요. 금식이 제대로 안 되면 자극 반응이 억제되어 결핍이 있어도 정상으로 나올 수 있어요."},"gh_stim_side_effect":{"type":"answer","title":"자극검사 부작용 — 대부분 일시적이에요","content":"사용하는 약물에 따라 다르지만 대부분 경미하고 일시적입니다.\n\n💊 약물별 주요 부작용:\n\n클로니딘:\n• 졸음 (가장 흔함, 검사 후 충분히 쉬면 됨)\n• 혈압 일시 저하\n• 두통\n• → 대부분 귀가 후 2~3시간 내 회복\n\n아르기닌:\n• 구역, 구토\n• 두통\n• → 주입 속도 조절로 줄일 수 있음\n\n글루카곤:\n• 구역, 구토\n• 두통\n• → 식사 후 저혈당 주의\n\n인슐린 (가장 강력, 드물게 사용):\n• 저혈당 (가장 주의!)\n• 식은땀, 어지러움, 손 떨림\n• 병원에서 즉시 포도당 보충\n\n✅ 안심해도 되는 이유:\n• 모든 부작용은 의료진이 예상하고 대비함\n• 검사실에서 24시간 모니터링 가능\n• 부작용으로 심각한 상황이 된 사례는 극히 드묾\n\n⚠️ 귀가 후 주의사항:\n• 클로니딘 사용 시: 당일 격렬한 활동 피하기\n• 졸음이 심하면 낮잠 허용","tip":"검사가 무서워서 미루는 분들이 많은데, 대부분의 부작용은 일시적이고 병원에서 즉시 처리됩니다. 치료 기회를 잃는 것이 더 아깝습니다."},"gh_monitoring":{"type":"question","text":"성장호르몬 치료 중 모니터링에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"주사 부위가 붓거나 빨개져요 — 정상인가요?","next":"gh_side_injection_site"},{"text":"두통, 다리 통증 등 부작용이 걱정돼요","next":"gh_side_common"},{"text":"병원 방문 주기와 정기 검사가 궁금해요","next":"gh_monitoring_schedule"},{"text":"어떤 증상일 때 즉시 응급실에 가야 하나요?","next":"gh_emergency_signs"}]},"gh_side_injection_site":{"type":"answer","title":"주사 부위 부작용 — 이렇게 관리하세요","content":"주사 부위 반응은 가장 흔한 부작용이에요. 대부분 관리로 해결됩니다.\n\n🔴 흔한 반응:\n• 빨갛게 부어오름\n• 약간의 가려움\n• 피부 약간 두꺼워짐\n→ 며칠 내 저절로 호전, 치료 중단 불필요\n\n⚠️ 주의가 필요한 상태:\n• 딱딱하게 굳는 경결 (Lipohypertrophy)\n  → 같은 부위에 반복 주사한 결과\n  → 약물 흡수 방해 → 치료 효과 감소\n• 함몰 (Lipoatrophy)\n  → 드물지만 지방 조직 손실\n  → 부위 로테이션으로 예방 가능\n\n✅ 관리 방법:\n1. 반드시 4곳 이상 로테이션\n   복부 → 허벅지 → 팔 뒤쪽 → 엉덩이 순환\n2. 같은 부위 연속 주사 절대 금지\n3. 주사 15~30분 전 냉장고에서 꺼내 상온화\n   (차가운 약물은 통증·반응 증가)\n4. 주사 후 발적: 찬 물수건으로 가볍게 찜질\n5. 주사 전 알코올 소독 후 10~15초 충분히 건조","tip":"딱딱한 경결이 생기면 그 부위는 최소 4주 이상 쉬어야 해요. 경결 부위에 계속 주사하면 약물 흡수가 나빠져 치료 효과가 떨어집니다."},"gh_side_common":{"type":"answer","title":"두통·다리 통증 등 흔한 부작용 대처법","content":"성장호르몬 치료 중 나타날 수 있는 부작용들과 대처법입니다.\n\n📋 흔한 부작용 (3% 미만):\n\n두통:\n• 치료 초기 1~2주 내 흔함\n• 대부분 2주 안에 자연 소실\n• 타이레놀로 조절 가능\n• ⚠️ 예외: 구토 동반 + 아침에 심하면 → 즉시 연락\n\n근육통·관절통 (성장통 비슷):\n• 성장호르몬이 근골격에 작용하며 발생\n• 따뜻한 찜질, 스트레칭으로 완화\n• 2~4주 내 대부분 소실\n\n손발 부종:\n• 치료 초기 일시적 나트륨·수분 저류\n• 용량 조절 또는 시간이 지나면 호전\n\n갑상선 기능 저하:\n• 일부에서 TSH 수치 일시 저하\n• 6개월마다 혈액검사로 확인\n• 필요 시 갑상선 호르몬 보충\n\n⚠️ 절뚝거림·고관절 통증:\n• 대퇴골두 골단 분리증 의심 신호\n• 즉시 병원 내원 (응급 가능성)\n\n⚠️ 등이 휘는 것 같으면:\n• 척추측만증 확인\n• 정기 검진에서 체크","tip":"대부분의 부작용은 치료 초기에 잠시 나타났다가 사라져요. 하지만 절뚝거림, 심한 두통+구토는 즉시 연락해야 하는 응급 신호입니다."},"gh_monitoring_schedule":{"type":"answer","title":"치료 중 모니터링 일정 — 이렇게 관리해요","content":"성장호르몬 치료는 정기적인 모니터링이 안전하고 효과적인 치료의 핵심입니다.\n\n📅 병원 방문 일정:\n\n처음 3개월: 매월 방문\n• 주사 적응 확인\n• 부작용 체크\n• 주사 기술 점검\n• 키/몸무게 측정\n\n안정기 이후: 3~6개월마다\n• 키 성장 확인\n• 용량 재조정 여부 검토\n\n🔬 정기 검사 일정:\n\n매 3~6개월:\n• 혈액검사: IGF-1 (목표: 0~+2 SDS)\n• 갑상선 기능 (TSH, 유리T4)\n\n매 6~12개월:\n• 골연령 X-ray (성장판 진행 상황)\n\n당뇨 위험군 (비만, 가족력):\n• 혈당 추가 검사\n\n🏠 집에서 매일 확인할 것:\n1. 주사 날짜·부위 기록\n2. 주사 부위 상태 (경결·함몰 여부)\n3. 이상 증상 (두통, 절뚝거림 등)\n\n📊 IGF-1 목표 범위:\n• +2 SDS 초과: 용량 줄이기\n• -2 SDS 이하: 용량 늘리기 또는 주사 기술 확인","tip":"주사 기록 앱이나 수첩을 활용하세요. 날짜·부위를 기록하면 경결 예방에도 도움이 되고, 병원 방문 시 순응도 확인에도 사용됩니다."},"gh_emergency_signs":{"type":"answer","title":"즉시 응급실에 가야 하는 3가지 신호","recommend":true,"urgent":true,"content":"성장호르몬 치료 중 다음 증상은 응급 상황입니다. 즉시 응급실로!\n\n🚨 응급 증상 3가지:\n\n1️⃣ 심한 두통 + 구토 + 시야 장애\n→ 두개내압 상승(가성 뇌종양) 의심\n증상: 아침에 특히 심한 두통, 구토, 흐리게 보임\n→ 치료를 일시 중단하면 대부분 회복\n\n2️⃣ 갑작스러운 절뚝거림 + 고관절·무릎 통증\n→ 대퇴골두 골단 분리증 의심\n특히: 비만 남아에서 더 흔함\n→ 즉각 치료 필요, 방치하면 영구 장애 가능\n\n3️⃣ 주사 부위 고름 + 38.5°C 이상 발열\n→ 심한 세균 감염 의심\n→ 주사 기구 오염 또는 피부 세균 감염\n\n⚠️ 이럴 때 즉시 담당 의사에게 연락:\n• 갑작스러운 시력 변화\n• 심한 알레르기 반응 (발진 + 호흡 곤란)\n• 극심한 근육·관절통으로 일상생활 불가\n\n✅ 일반 부작용과 구별:\n• 단순 두통 (약 먹으면 나음) → 경과 관찰\n• 주사 부위 발적 (며칠 내 호전) → 경과 관찰\n• 성장통 비슷한 다리 통증 → 경과 관찰","tip":"불안하면 언제든 담당 의사에게 연락하세요. 증상 사진을 찍어두면 전화 상담 시 도움이 됩니다."},"puberty_diagnosis_detail":{"type":"question","text":"성조숙증 진단 검사에 대해 어떤 부분이 궁금하신가요?","options":[{"text":"태너 단계란 무엇인가요?","next":"tanner_stage_explain"},{"text":"GnRH 자극검사는 어떻게 진행되나요?","next":"gnrh_stim_test"},{"text":"뇌 MRI가 꼭 필요한가요?","next":"puberty_mri_need"},{"text":"진단 검사 비용이 궁금해요","next":"puberty_diagnosis_cost"},{"text":"검사 결과에 따라 어떻게 진행되나요?","next":"puberty_after_diagnosis"}]},"tanner_stage_explain":{"type":"answer","title":"태너 단계 — 사춘기 발달 정도를 1~5단계로 평가해요","content":"태너 단계는 사춘기 발달 정도를 1(사춘기 전)~5(성인)까지 나누는 의학적 기준입니다.\n\n👧 여아 태너 단계:\n• 1기: 사춘기 전 (유방·음모 없음)\n• 2기: 유두 아래 작은 경결 (유방 시작), 음모 시작 ← 사춘기 시작\n• 3기: 유방·유륜 동시 증대, 음모 증가\n• 4기: 유륜이 유방 위로 돌출\n• 5기: 성인형 유방 (유륜 함몰), 성인 음모\n\n성조숙증: 만 8세 전에 2기 도달\n정상 범위: 8~13세 사이에 2기 도달\n\n👦 남아 태너 단계:\n• 1기: 사춘기 전 (고환 3mL 이하)\n• 2기: 고환 4mL 이상 ← 사춘기 시작\n• 3기: 고환 10mL, 음경 신장, 음모 증가\n• 4기: 고환 15mL, 변성기\n• 5기: 성인 (고환 20mL 이상)\n\n성조숙증: 만 9세 전에 2기 도달\n정상 범위: 9~14세 사이에 2기 도달\n\n💡 오키드계측기:\n고환 크기를 재는 타원형 구슬 모음\n병원에서 태너 단계 평가 시 사용","tip":"태너 단계는 달력 나이와 독립적이에요. 같은 9세라도 태너 1기(미발달)~3기(중기)까지 다양할 수 있습니다."},"gnrh_stim_test":{"type":"answer","title":"GnRH 자극검사 — 성조숙증 확진의 핵심 검사","content":"진성 성조숙증 여부를 확진하는 「금표준」 검사입니다.\n\n🔬 검사 원리:\n인공 GnRH를 주사해 뇌하수체가 얼마나 반응하는지 확인\n→ 성조숙증이면 LH가 크게 상승\n→ 아직 사춘기 전이면 FSH 중심의 낮은 반응\n\n📋 검사 진행:\n1. 병원 도착 (금식 불필요)\n2. 팔에 유치 바늘 1회 삽입\n3. GnRH 유사체(렐리펙트 등) 주사\n4. 0·30·60·90분에 총 4~5회 채혈\n5. 약 90분~2시간 소요\n\n📊 결과 해석:\n• LH 피크 ≥5 IU/L → 진성 성조숙증 ✓\n• LH 피크 <2 IU/L, FSH 우세 → 조기 유방 발육증 (치료 불필요)\n• LH 2~5: 경계 → 추적 관찰\n\n💰 비용 (2025년 기준):\n• 자극검사: 약 5~10만 원 (급여 적용 시)\n• 골반 초음파: 약 3~5만 원\n• 골연령 X-ray: 약 2~3만 원\n• 뇌 MRI: 급여 시 10~20만 원 (비급여 40~60만 원)\n\n⚠️ 주의사항:\n유치 바늘 제거 전까지 팔 움직임 최소화","tip":"GnRH 자극검사는 아이도 부모도 긴장되지만, 이 검사 없이는 치료 여부도, 보험 적용도 결정할 수 없어요. 꼭 필요한 과정입니다."},"puberty_mri_need":{"type":"answer","title":"뇌 MRI — 꼭 받아야 하나요?","content":"모든 아이에게 필요하지는 않아요. 상황에 따라 다릅니다.\n\n📋 뇌 MRI가 필요한 경우:\n\n여아:\n• 만 6세 미만에서 성조숙증 → 필수\n• 6~8세이지만 급격히 빠른 진행\n• 두통·시력 이상·신경 증상 동반\n\n남아:\n• 성조숙증 진단 시 → 항상 필수\n  이유: 남아 성조숙증의 7~16%에서 뇌 병변 발견\n  여아보다 기질적 원인 확률 높음\n\n🧠 MRI에서 확인하는 것:\n• 시상하부 과오종 (양성 종양, 가장 흔한 원인)\n• 뇌하수체 종양\n• 뇌종양\n• 기타 뇌 구조 이상\n\n⚠️ 아이가 가만히 못 있을 때:\n• 20~30분 동안 움직이지 않아야 함\n• 만 7세 미만은 수면 진정 필요할 수 있음\n• 사전에 의사와 상담\n\n💰 비용:\n• 급여 적용 시: 10~20만 원\n• 비급여: 40~60만 원\n• 성조숙증 진단 후 뇌 병변 의심되면 대부분 급여 적용 가능","tip":"여아 만 6~8세는 MRI가 필수는 아니지만, 진행이 매우 빠르다면 찍는 게 안전해요. 남아는 무조건 찍는 것이 권장됩니다."},"puberty_diagnosis_cost":{"type":"answer","title":"성조숙증 진단 검사 비용","content":"2025년 기준 급여 적용 시 예상 비용입니다.\n\n💰 주요 검사 비용 (급여 적용 시):\n\n• 혈액검사 (기본 호르몬): 약 3~5만 원\n• 골연령 X-ray: 약 2~3만 원\n• 골반 초음파 (여아): 약 3~5만 원\n• GnRH 자극검사: 약 5~10만 원\n• 뇌 MRI: 10~20만 원 (비급여 40~60만 원)\n\n첫 방문 예상 총액 (MRI 제외): 약 15~25만 원\n뇌 MRI 포함 시: 약 25~45만 원\n\n📋 급여 적용 기준:\n• 성조숙증 진단 기준 충족 시 대부분 급여\n• 뇌 MRI는 뇌 병변 의심 판단 시 급여 가능\n• 초음파는 급여/비급여 병원마다 다를 수 있음\n\n💡 절약 팁:\n• 실손보험 가입 여부 확인 (비급여 일부 보상 가능)\n• 검사 전 보험 적용 여부 미리 확인 요청\n• 대학병원보다 소아내분비 전문 클리닉이 비용 낮을 수 있음","tip":"진단 검사 비용은 한 번이지만 치료비는 수년간 발생해요. 치료 시작 전에 보험 급여 여부를 꼭 확인하세요."},"puberty_after_diagnosis":{"type":"answer","title":"검사 결과에 따라 어떻게 달라지나요?","content":"GnRH 자극검사 결과에 따라 3가지 방향으로 나뉩니다.\n\n1️⃣ LH 피크 ≥5 → 진성 성조숙증 확진\n→ 치료 시작 (GnRH 주사)\n→ 골연령, 최종 키 예측 후 치료 계획 수립\n→ 뇌 MRI 추가 (남아 필수, 여아 상황에 따라)\n\n2️⃣ LH 피크 <2, FSH 우세 → 조기 유방 발육증\n→ 치료 불필요\n→ 3~6개월마다 추적 관찰\n→ 다음 4가지 나타나면 즉시 재평가:\n  • 유방이 빠르게 커짐\n  • 음모 발달\n  • 키 급성장\n  • 질 분비물\n\n3️⃣ LH 피크 2~5 → 경계값 (빠른 사춘기)\n→ 진성과 가성 중간 상태\n→ 3~6개월마다 경과 관찰\n→ 골연령 빠르면 치료 고려\n→ 성장 속도 유지되면 기다릴 수도 있음\n\n✅ 가성 성조숙증인 경우:\n원인(낭종, 종양, 외부 에스트로겐 노출) 제거\n→ 원인 제거 후 사춘기 중단 여부 확인","tip":"검사 결과가 경계값이라고 실망하지 마세요. 경계값은 치료가 필요 없을 수도 있고, 3~6개월 관찰 후 치료 시작해도 늦지 않은 경우가 많아요."},"gnrh_how_work":{"type":"answer","title":"GnRH 치료 원리와 효과","content":"GnRH 유사체는 「도어벨 계속 누르기」 방식으로 성호르몬을 억제합니다.\n\n🔬 작용 원리:\n\n정상: 뇌에서 GnRH를 「맥동성」으로 분비 (띵동! 띵동! 간헐적)\n→ 뇌하수체 반응 → LH·FSH 분비 → 성호르몬 생성\n\nGnRH 주사 후: GnRH를 「지속적」으로 억제 (꾹~~ 계속 누름)\n→ 뇌하수체 수용체 탈감작(무감각화)\n→ LH·FSH 분비 격감\n→ 성호르몬 억제\n→ 사춘기 진행 멈춤\n\n📊 치료 효과:\n• 성호르몬 분비 억제\n• 골연령 진행 속도 정상화 (빨라지던 것 멈춤)\n• 성장판이 더 오래 열려 있게 됨\n• 최종 키 보호\n• 조기 초경 예방\n\n🕒 효과 나타나는 시기:\n• 2~4주: 성호르몬 억제 시작\n• 3~6개월: 완전 억제\n• 첫 1~2주 「플레어업」: 일시적 호르몬 상승 (정상 반응)\n\n✅ 40년 이상 검증된 안전한 치료:\n• 생식 기능 정상 (치료 종료 후 정상 임신 가능)\n• 골밀도 정상 (회복됨)\n• 대사 이상 없음","tip":"치료를 시작하면 초기 1~2주간 플레어업으로 여아는 소량 질 출혈이 있을 수 있어요. 걱정하지 마세요 — 이는 치료가 작동하는 정상적인 과정입니다."},"gnrh_duration":{"type":"answer","title":"GnRH 치료 기간과 종료 시점","content":"치료 기간은 아이마다 다르지만, 보통 2~4년입니다.\n\n📅 치료 기간:\n• 평균 2~4년\n• 시작이 빠를수록 (만 6세 전) → 더 긴 치료, 더 큰 효과\n• 시작이 늦을수록 (만 8세 이후) → 짧은 치료, 제한적 효과\n\n🔴 치료 종료 시점:\n\n여아: 골연령 12~12.5세\n• 이 시기 = 또래의 정상 사춘기 시기\n• 중단 후 평균 1년 내 초경\n\n남아: 골연령 13~13.5세\n\n⚠️ 이때는 종료 고려:\n• 또래의 정상 사춘기 시기에 맞춰 종료\n• 골연령이 이미 많이 앞서 있어 치료 효과 없을 때\n• 아이가 극심한 부담감 호소 시\n\n💡 종료 후 무슨 일이?\n• 억제되었던 사춘기가 자연스럽게 재개\n• 여아: 종료 후 1년(0.9~1.5년) 내 초경\n• 남아: 종료 후 6~12개월 내 사춘기 진행\n• 생식 기능 완전히 정상으로 회복\n\n📊 급여 종료 연령 (건강보험):\n• 여아 만 11세 → 자동 비급여 전환\n• 여아 만 12세 → 이후에도 필요 시 비급여 치료 가능\n• 남아 만 12세 → 자동 비급여\n• 남아 만 13세 → 이후 비급여","tip":"치료 종료 후 사춘기가 재개되는 것은 정상이에요. 오히려 또래와 비슷한 시기에 초경이 오는 것이 치료 성공의 지표입니다."},"gnrh_flare_up":{"type":"answer","title":"플레어업 현상 — 처음에 호르몬이 잠깐 오르는 현상","content":"GnRH 주사를 처음 맞은 후 7~10일간 성호르몬이 일시적으로 상승하는 현상입니다.\n\n❓ 왜 일어나나요?\n주사 초기에는 억제 전에 뇌하수체가 강하게 반응\n→ 성호르몬이 잠시 더 분비됨\n→ 이후 수용체가 탈감작되며 억제 시작\n\n📊 플레어업 증상:\n여아:\n• 소량의 질 출혈 (소량, 자연 소실)\n• 유방 통증\n• 약간의 감정 기복\n\n남아:\n• 일시적 음경 발기\n• 기분 변화\n\n✅ 안심해도 되는 이유:\n• 7~14일 내 자연 소실\n• 치료가 정상적으로 작동하는 과정\n• 멈추거나 감량할 필요 없음\n\n⚠️ 언제 병원에 연락?\n• 질 출혈이 2주 이상 지속\n• 출혈량이 많아 생리 수준\n• 심한 복통 동반\n\n💡 다음 주사부터는?\n플레어업은 처음에만 발생\n이후에는 꾸준히 억제만 됨","tip":"첫 주사 후 딸아이에게 소량 질 출혈이 생겨도 당황하지 마세요. 약이 작동하는 정상 과정이에요. 2주 이상 지속되거나 양이 많으면 연락주세요."},"gnrh_insurance_detail":{"type":"answer","title":"GnRH 치료 급여 조건과 비용 상세","content":"2025년 1월 강화된 기준 기준으로 설명드립니다.\n\n✅ 급여 조건 5가지 (모두 충족해야 함):\n\n1. 이차 성징 발현 시점\n   • 여아: 만 8세 미만 시작 기록 필요\n   • 남아: 만 9세 미만 시작 기록 필요\n   • ⚠️ 2025년부터 \"의학적으로 확인 가능한 시점\" 필요\n   • 부모 진술만으로 소급 인정 안 될 수 있음\n\n2. GnRH 자극검사 LH 피크 ≥5 IU/L\n\n3. 골연령 초과 (실제 나이보다 앞선 상태)\n\n4. 치료 시작 나이\n   • 여아 만 9세 미만\n   • 남아 만 10세 미만\n\n5. 급여 지속 기간\n   • 여아 만 11세까지 (이후 비급여 전환)\n   • 남아 만 12세까지\n\n💰 비용 비교:\n\n급여 적용 시:\n• 1개월형: 월 약 4~5만 원\n• 3개월형: 회당 약 12~15만 원\n• 연간: 약 50~60만 원\n\n비급여 시:\n• 1개월형: 월 약 11만 원\n• 3개월형: 회당 약 33만 원\n• 연간: 약 130~400만 원\n\n💡 실손보험 확인:\n가입 시기에 따라 비급여 일부 보상 가능","tip":"이차 성징이 의심되면 빨리 병원을 방문해서 기록을 남겨두세요. 2025년부터 기준이 강화되어 늦게 방문하면 급여 적용이 어려울 수 있어요."},"gnrh_drugs_detail":{"type":"answer","title":"GnRH 약물 종류와 주사 방법","content":"국내에서 사용 가능한 GnRH 유사체는 크게 두 계열입니다.\n\n💊 약물 계열:\n\n류프로렐린 계열:\n• 제품명: 루프린, 루페어, Eligard\n• 주사 방법: 피하주사 또는 근육주사\n• 제형: 1개월형, 3개월형\n\n트립토렐린 계열:\n• 제품명: 디페렐린, 데카펩틸\n• 주사 방법: 근육주사 (엉덩이)\n• 제형: 1개월형, 3개월형\n\n두 계열의 효과와 안전성은 동등\n의사가 상황에 맞게 선택\n\n⏱️ 주사 간격 (절대 늦추면 안 됩니다!):\n• 1개월형: 25~29일 이내\n• 3개월형: 77~87일 이내\n\n늦추면 → 성호르몬 일시 상승 (돌파 현상)\n→ 골연령 진행이 다시 빨라질 수 있음\n\n💉 근육주사 vs 피하주사:\n• 근육주사: 생체이용률 높음, 통증 약간 더 있음\n• 피하주사: 통증 적음, 집에서 자가 주사 가능 (일부 제형)\n• 의사가 아이 상황에 맞게 결정\n\n🏥 주사는 병원에서만:\n성조숙증 주사는 병원 방문 시 맞음\n(성장호르몬과 달리 집에서 자가주사 아님)","tip":"주사 날짜를 달력·스마트폰에 꼭 기록해두세요. 하루 이틀 늦는 것도 「돌파 현상」을 일으킬 수 있어요."},"thelarche_vs_precocious":{"type":"answer","title":"조기 유방 발육증 vs 성조숙증 — 어떻게 구별하나요?","content":"가장 중요한 차이는 「다른 사춘기 징후의 유무」입니다.\n\n📊 비교표:\n\n항목 | 조기 유방 발육증 | 진성 성조숙증\n유방 변화 | 있음 | 있음\n음모 발달 | 없음 | 있음\n키 급성장 | 없음 | 있음 (7~8cm↑)\n질 분비물 | 없음 | 있음\n골연령 | 정상 or 경미 초과 | 2년 이상 초과\nGnRH LH 피크 | <2 IU/L | ≥5 IU/L\n치료 필요 | 대부분 불필요 | 필요\n예후 | 87% 자연 호전 | 치료 안 하면 최종 키 손실\n\n🔑 핵심 구별 포인트:\n• 음모 발달 → 진성 성조숙증 강력 시사\n• 키 급성장 → 진성 시사\n• 질 분비물 → 진성 시사\n• 유방만 있고 위 3가지 없음 → 조기 유방 발육증 가능성\n\n✅ 확진 방법:\n• GnRH 자극검사\n  LH <2 → 조기 유방 발육증\n  LH ≥5 → 진성 성조숙증","tip":"음모, 질 분비물, 급성장 중 하나라도 있으면 단순 조기 유방 발육증이 아닐 수 있어요. 빨리 진료받으세요."},"thelarche_prognosis":{"type":"answer","title":"조기 유방 발육증 — 예후와 경과","content":"조기 유방 발육증은 대부분 걱정 없이 좋아집니다.\n\n📊 예후 통계:\n• 87%: 저절로 호전 (51% 완전 소실, 36% 거의 소실)\n• 13%: 사춘기 때까지 유지 (정상 사춘기 시 같이 커짐)\n• 약 10%만: 진성 성조숙증으로 진행\n• 특히 만 2세 이하 발생: 성조숙증 진행 확률 약 2%로 매우 낮음\n\n✅ 조기 유방 발육증이면:\n• 최종 키: 정상 (성장판 조기 폐쇄 없음)\n• 사춘기 시작 시기: 정상\n• 초경 시기: 정상\n• 생식 기능: 정상\n• 유방암 위험: 전혀 증가 없음\n\n📅 추적 관찰 방법:\n• 처음 6개월: 3개월마다 방문\n• 안정적이면: 6개월마다\n• 확인 내용: 유방 크기, 음모, 질 분비물, 성장 속도\n\n🔴 성조숙증으로 넘어가는 4가지 신호:\n1. 유방이 빠르게 커짐\n2. 음모 발달\n3. 질 분비물\n4. 키가 갑자기 7~8cm/년 이상 성장\n\n→ 이 중 하나라도 나타나면 즉시 재평가!","tip":"조기 유방 발육증은 치료가 \"필요 없는\" 것이지 \"방치\"하는 게 아니에요. 3~6개월 정기 추적만 잘 하면 됩니다."},"thelarche_cause":{"type":"answer","title":"조기 유방 발육증 — 환경호르몬이 원인인가요?","content":"부모님들이 가장 많이 걱정하는 부분입니다. 현재까지의 연구 결과를 알려드립니다.\n\n🔬 원인:\n\n대부분 (특발성):\n• 원인 불명\n• 유방 조직이 여성호르몬에 일시적으로 민감하게 반응\n• 난소에서 에스트로겐이 잠깐 분비됐다 멈춤\n\n환경호르몬 가능성:\n• 일부 연구: 라벤더·티트리 오일 사용 후 멍울 → 중단 후 감소\n• 플라스틱(BPA): 가능성 제기되나 인과관계 불명확\n• 콩 제품: 식물성 에스트로겐, 영향 미미\n• 유제품: 연구 결과 불일치\n\n⚠️ 환경호르몬 우려 시 실천 가이드:\n• 전자레인지: 플라스틱 용기 → 유리·스테인리스 교체\n• 라벤더·티트리 오일: 잠시 중단 후 경과 관찰\n• 영수증: 자주 만지지 않도록\n\n❌ 과도한 걱정은 불필요:\n• 대부분은 환경호르몬과 무관\n• 부모님이 미안해할 필요 없음\n• 원인보다 경과 관찰이 더 중요","tip":"명확한 원인 없이 생기는 경우가 대부분이에요. 환경호르몬을 줄이려는 노력은 좋지만, 그것 때문에 생겼다고 자책할 필요는 없어요."},"thelarche_followup":{"type":"answer","title":"조기 유방 발육증 추적 관찰 — 집에서 확인할 것들","content":"정기 병원 방문과 함께 집에서도 주기적으로 확인해주세요.\n\n🏥 병원 방문 주기:\n• 처음 6개월: 3개월마다\n• 이후 안정적이면: 6개월마다\n• 이상 신호 시: 즉시 방문\n\n🔍 집에서 매달 확인할 사항:\n\n1. 유방 크기 변화\n   • 빠르게 커지는지 (3개월 내 1단계 이상 변화)\n   • 한쪽만 있다가 양쪽으로 변했는지\n\n2. 음모 발달 여부\n   • 서혜부·음부에 잔털 있는지\n\n3. 질 분비물 여부\n   • 속옷에 노란색·흰색 분비물\n\n4. 키 성장 속도\n   • 3개월마다 키 측정 기록\n   • 갑자기 빠르게 크는지\n\n⚠️ 즉시 병원 연락할 신호:\n• 유방이 1개월 내 눈에 띄게 커짐\n• 음모 발달\n• 질 분비물\n• 3개월에 2cm 이상 성장\n\n📝 기록 관리:\n• 사진으로 유방 변화 기록 (3개월마다)\n• 키 기록 (날짜 포함)\n→ 병원 방문 시 변화 추적에 도움","tip":"이상 신호를 모르고 지나치는 경우가 많아요. 3개월마다 키 재고 유방 크기 확인하는 습관을 들여주세요."},"vitd_calcium_link":{"type":"answer","title":"비타민D가 칼슘 흡수에 왜 그렇게 중요한가요?","content":"비타민D는 칼슘의 「열쇠」입니다. 열쇠 없이는 문이 열리지 않아요.\n\n🔑 작용 원리:\n1. 비타민D가 소장 세포에 신호 전달\n2. 칼슘 운반 단백질(Calbindin) 생성 촉진\n3. 이 단백질이 칼슘을 장에서 혈액으로 능동 수송\n\n📊 흡수율 차이:\n• 비타민D 부족 시: 칼슘 흡수율 10~15%\n• 비타민D 충분 시: 칼슘 흡수율 30~40%\n→ 같은 우유를 마셔도 2~3배 차이!\n\n💡 실제 계산:\n• 우유 200mL = 칼슘 220mg\n• 비타민D 부족 시: 실제 흡수 22~33mg\n• 비타민D 충분 시: 실제 흡수 66~88mg\n→ 흡수량 3배 차이\n\n🥛 칼슘만 먹어도 의미가 없는 경우:\n• 비타민D 없으면 칼슘의 대부분이 그냥 배출됨\n• 「비타민D 없이 칼슘 보충 = 돈 낭비」\n\n⚠️ 칼슘을 빼앗는 것들:\n• 탄산음료 (인산): 칼슘 배출 촉진\n• 짠 음식: 소변으로 칼슘 손실\n• 카페인: 칼슘 흡수 방해","tip":"우유를 매일 충분히 마시는데도 골밀도가 낮다면 비타민D 수치를 먼저 확인해보세요. 비타민D 없이는 아무리 칼슘을 먹어도 흡수가 안 됩니다."},"vitd_sun":{"type":"answer","title":"햇빛으로 비타민D 만들기 — 얼마나 해야 하나요?","content":"비타민D는 햇빛(자외선 UVB)이 피부에 닿을 때 합성됩니다.\n\n☀️ 효과적인 햇빛 노출 조건:\n• 시간: 오전 10시~오후 2시 사이\n  (UVB가 대기층을 통과하는 시간)\n• 부위: 얼굴 + 팔 정도 노출\n• 시간: 15~30분 (피부색에 따라 다름)\n• 자외선 차단제: 바르면 합성 거의 안 됨\n\n❌ 한국에서 햇빛으로 합성이 어려운 경우:\n• 겨울 (11~2월): 북위 33도 이상에서 UVB 부족\n  → 이 기간은 아무리 햇빛 쬐어도 합성 안 됨\n• 실내 생활 (유리창은 UVB 차단)\n• 미세먼지가 심한 날\n• 야외 활동 적은 아이\n\n📊 한국 아이들의 현실:\n• 한국 아이의 70~80%가 비타민D 부족\n• 실내 생활 ↑, 자외선 차단제 ↑, 미세먼지 ↑\n→ 햇빛만으로는 부족한 경우가 대부분\n\n💊 결론:\n• 여름: 야외 활동 30분 정도면 어느 정도 보충 가능\n• 가을~봄: 보충제 필수\n• 겨울: 반드시 보충제\n\n혈중 목표 농도: 30~50 ng/mL\n(혈액검사로 확인 가능)","tip":"한국의 겨울에는 아무리 햇빛을 많이 쬐어도 비타민D가 만들어지지 않아요. 11월부터 3월까지는 반드시 보충제가 필요합니다."},"vitd_supplement_guide":{"type":"answer","title":"비타민D 보충제 선택과 복용 가이드","content":"올바른 비타민D 보충제 선택법과 복용 방법을 알려드립니다.\n\n💊 D3 vs D2:\n• 비타민D3 (콜레칼시페롤): 권장 ✓\n  동물성, 우리 몸에서 자연적으로 만들어지는 형태\n  효과 D2의 1.5~2배\n• 비타민D2 (에르고칼시페롤): 2순위\n  식물성, 체내 활용율 낮음\n→ 제품 선택 시 「D3」 확인\n\n📏 연령별 권장 용량:\n• 0~12개월: 400 IU/일\n• 1~18세: 600 IU/일\n• 결핍 상태 (혈중 <20ng/mL): 1,000~2,000 IU/일\n• 치료용 (의사 처방): 최대 4,000 IU/일\n\n⏰ 언제 먹이나요?\n• 지용성 비타민 → 식사 중 또는 직후 (기름과 함께 흡수↑)\n• 아침 식사 후 권장\n• 매일 같은 시간 (일정한 습관)\n\n🧪 혈중 농도 확인:\n• 목표: 30~50 ng/mL\n• 20 미만: 결핍\n• 보충 시작 3개월 후 혈액검사 권장\n\n💰 보충제 선택 팁:\n• 성분: 비타민D3 단독 or D3+K2 복합\n• 형태: 액상(유아), 씹어먹는 젤리(소아), 캡슐(청소년)\n• 브랜드보다 성분 확인이 중요","tip":"비타민D는 지용성이라 식사와 함께 먹어야 흡수가 잘 돼요. 공복에 먹으면 흡수율이 떨어집니다."},"calcium_foods":{"type":"answer","title":"칼슘 많은 음식과 현실적인 섭취 팁","content":"칼슘이 풍부한 식품과 실제로 먹이는 방법을 알려드립니다.\n\n🥛 칼슘 함량 TOP 식품:\n• 우유 200mL: 220mg ★★★\n• 멸치 작은 것 20g: 200mg ★★★\n• 치즈 30g: 180~210mg ★★★\n• 요거트 100g: 120~150mg ★★\n• 두부 100g: 80~100mg ★★\n• 뱅어포 10g: 150mg ★★★\n• 깨 10g: 130mg ★★\n• 브로콜리 100g: 40~50mg ★\n\n📊 연령별 하루 칼슘 권장량:\n• 1~3세: 700mg (우유 약 3잔)\n• 4~8세: 1,000mg (우유 약 4~5잔)\n• 9~18세: 1,300mg (우유 약 6잔) ← 가장 중요!\n\n✅ 현실적인 섭취 전략:\n\n우유 거부하는 아이:\n• 우유 → 따뜻하게 + 소량 꿀\n• 요거트 스무디 (냉동 과일 + 요거트)\n• 뱅어포 조림 (밥 반찬)\n• 미역국 (다시마도 칼슘 많음)\n\n매일 목표 달성 조합 예시 (9세, 1,300mg 목표):\n• 아침 우유 1잔 (220mg)\n• 점심 멸치볶음 + 치즈 (350mg)\n• 저녁 두부찌개 + 저녁 우유 (320mg)\n• 간식 요거트 (150mg)\n→ 합계 약 1,040mg ✓\n\n⚠️ 칼슘 흡수 방해 요소:\n• 탄산음료 속 인산\n• 짠 음식 (나트륨과 함께 배출)\n• 철분·아연 보충제 (동시 복용 피하기)","tip":"멸치는 칼슘 챔피언! 뼈까지 먹을 수 있는 멸치볶음, 멸치국물은 아이 칼슘 보충에 최고예요. 우유 못 먹는 아이라면 멸치가 훌륭한 대안입니다."},"protein_why_detail":{"type":"answer","title":"단백질이 성장에 왜 그렇게 중요한가요?","content":"단백질은 성장의 「원재료」입니다. 설계도(호르몬)가 있어도 재료 없으면 집을 못 짓습니다.\n\n🏗️ 단백질이 필요한 이유:\n\n1. 성장호르몬 자체가 단백질\n   → 단백질 없으면 호르몬 생성 불가\n\n2. IGF-1 생성에 단백질이 재료\n   → 간이 IGF-1 만들 때 아미노산 필요\n\n3. 뼈 기질(콜라겐)의 30%가 단백질\n   → 칼슘이 달라붙는 구조물 형성\n\n4. 근육의 75%가 단백질\n   → 성장기 근육 발달에 필수\n\n5. 면역세포·효소·호르몬 모두 단백질\n   → 건강 유지의 기반\n\n📊 단백질 섭취가 부족하면:\n• 성장호르몬 주사를 맞아도 효과 반감\n• IGF-1 수치 저하 (영양 부족 시)\n• 성장 속도 저하\n• 면역력 저하 → 자주 아프면 성장 방해\n\n💡 아미노산의 중요성:\n• 단백질을 구성하는 기본 단위\n• 필수 아미노산 9가지: 체내 합성 불가 → 음식으로 반드시 섭취\n• 동물성 단백질: 필수 아미노산 완전 포함 (완전 단백질)\n• 식물성 단백질: 일부 필수 아미노산 부족 → 다양하게 조합 필요","tip":"성장호르몬 치료 중인 아이라면 단백질 섭취가 더욱 중요해요. 주사는 신호를 보내는 것, 단백질은 그 신호에 반응해 성장을 실행하는 재료입니다."},"protein_daily_need":{"type":"answer","title":"아이에게 하루 단백질이 얼마나 필요한가요?","content":"나이와 체중에 따라 권장량이 다릅니다.\n\n📊 연령별 권장량 (체중 1kg당):\n• 1~3세: 1.0~1.2g/kg\n• 4~13세: 0.95g/kg\n• 14~18세: 0.85g/kg\n• 운동 많이 하는 경우: 1.2~1.7g/kg\n• 성장호르몬 치료 중: 1.2g/kg 권장\n\n🧮 체중별 하루 필요량 (학령기 기준, 0.95g):\n• 20kg: 약 19g\n• 30kg: 약 28.5g\n• 40kg: 약 38g\n• 50kg: 약 47.5g\n\n📋 하루 30g 채우기 (체중 30kg 기준):\n\n아침: 달걀 1개(6g) + 우유 200mL(6.4g) = 12.4g\n점심: 닭가슴살 80g(18g) = 18g\n저녁: 두부 ¼모(8g) = 8g\n→ 합계: 38.4g ✓\n\n💡 분산 섭취가 효과적:\n한 번에 몰아 먹는 것보다 끼니마다 나눠 먹어야\n→ 단백질 합성 효율 극대화\n→ 아침 단백질이 특히 중요 (밤새 성장호르몬의 재료 공급)\n\n⚠️ 과다 섭취 주의 (2.5g/kg 이상):\n• 신장에 부담\n• 칼슘 배출 증가 (뼈 약해짐)\n• 탈수 가능성","tip":"매 끼니 단백질 식품 하나씩만 포함해도 하루 권장량이 자연스럽게 채워져요. 복잡하게 계산하기 어려우면 이 원칙 하나만 지켜보세요."},"protein_best_foods":{"type":"answer","title":"단백질 많은 음식 TOP — 현실 식단에 적용하기","content":"아이가 먹기 좋은 고단백 식품을 알려드립니다.\n\n🥩 동물성 단백질 (흡수율 높음):\n• 닭가슴살 100g: 23g ★★★\n• 참치통조림 100g: 24g ★★★\n• 연어 100g: 20g ★★★\n• 돼지 안심 100g: 22g ★★\n• 소 안심 100g: 21g ★★\n• 달걀 1개 (중): 6g ★★\n• 우유 200mL: 6.4g ★★\n• 그릭요거트 100g: 10g ★★\n• 치즈 30g: 7g ★★\n\n🌱 식물성 단백질 (다양하게 조합해야):\n• 삶은 콩 100g: 9g ★\n• 두부 100g: 8g ★\n• 땅콩버터 30g: 7g ★\n• 귀리 40g (조리 전): 5g ★\n• 아몬드 30g: 6g ★\n\n✅ 아이가 잘 먹는 형태로 변형하기:\n• 달걀: 스크램블·반숙·달걀찜·김밥 속\n• 닭: 치킨너겟·볶음·국물 요리\n• 두부: 순두부찌개·두부부침\n• 참치: 참치김밥·참치주먹밥\n• 우유: 스무디·시리얼에 적용\n\n🔑 동물성:식물성 황금 비율:\n동물성 60~70% + 식물성 30~40%\n동물성으로 필수 아미노산 확보\n식물성으로 섬유질·장 건강 챙기기","tip":"참치통조림은 단백질 챔피언! 저렴하고 조리 쉬우며 아이들도 잘 먹어요. 오일 제거 후 그냥 먹거나 밥에 비벼도 좋습니다."},"protein_timing_detail":{"type":"answer","title":"단백질 섭취 타이밍 — 언제 먹이는 게 가장 효과적인가요?","content":"언제 먹느냐도 성장에 영향을 줍니다.\n\n⭐ 최고의 타이밍 4가지:\n\n1️⃣ 아침 식사 (필수!)\n• 밤새 분비된 성장호르몬의 재료 공급\n• 아침 단백질 없으면 밤에 분비된 GH가 근육을 분해해 에너지로 사용\n• 시간 없을 때: 우유 + 삶은 달걀 하나\n\n2️⃣ 운동 후 30분~1시간 이내\n• 근육 합성 「골든타임」\n• 이 시간에 단백질 공급 → 근육 재생 + 성장 자극\n•
