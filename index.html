g thư: không tăng ở trẻ em khỏe mạnh trong nghiên cứu quy mô lớn dài hạn\n\n🔴 Đến cấp cứu ngay nếu:\n• Đau đầu dữ dội + nôn ói + rối loạn thị lực (nghi tăng áp lực nội sọ)\n• Đột ngột跛hành (nghi trượt đầu xương đùi)","tip":"Báo cáo bất kỳ triệu chứng bất thường nào cho bác sĩ ngay. Xét nghiệm máu định kỳ và tái khám đều đặn là chìa khóa cho điều trị an toàn."},"gh_cost":{"type":"answer","title":"Chi phí GH và bảo hiểm — Nên nắm rõ để chuẩn bị","content":"Chi phí thuốc thay đổi tùy theo cân nặng và chẩn đoán. Đây là phạm vi chung:\n\n💰 Chi phí thuốc cơ bản:\n• 70.000–120.000 won/tháng (khoảng 2.500–4.000 won/kg/tháng)\n• Chi phí tăng khi trẻ lớn hơn và liều được điều chỉnh\nVí dụ:\n• Trẻ 20 kg → khoảng 50.000–80.000 won/tháng\n• Trẻ 40 kg → khoảng 100.000–160.000 won/tháng\n\n📋 Với bảo hiểm y tế:\n• Đồng chi trả 30% → 21.000–36.000 won/tháng\n• Lấy thuốc tại nhà thuốc theo đơn bác sĩ\n• Không cần đăng ký đặc biệt (bệnh viện xử lý tự động)\n\n📋 Tiêu chí kết thúc bảo hiểm (bất kỳ điều nào sau):\n• Tuổi xương: bé gái 14–15 / bé trai 15–16\n• Chiều cao: bé gái > 153 cm / bé trai > 165 cm\n• Tăng trưởng hàng năm < 2 cm\n\n⚠️ Không được bảo hiểm:\n• ISS (thấp vô căn): 100% tự chi trả\n• 70.000–120.000 won/tháng toàn bộ tự trả\n• 2–3 năm điều trị tổng cộng: khoảng 20–40 triệu won\n\n💡 Mẹo tiết kiệm thuế:\nTại Hàn Quốc, chi phí y tế vượt quá 3% tổng thu nhập được khấu trừ 15%\nVí dụ: Thu nhập 50 triệu won + chi phí y tế 5 triệu won\n→ (5M – 1,5M) × 15% = tiết kiệm 525.000 won thuế","tip":"Điều trị càng dài thì chi phí càng tích lũy. Hỏi bác sĩ về thời gian điều trị dự kiến và tổng chi phí ước tính ngay trong lần khám đầu tiên."},"gh_injection":{"type":"answer","title":"Kỹ thuật tiêm GH — Lúc đầu có vẻ khó, nhưng sẽ thành thói quen","content":"Tiêm dưới da hàng ngày. Hầu hết các gia đình cảm thấy thoải mái sau 1–2 tuần.\n\n💉 Thông tin cơ bản:\n• Đường kính kim: 0,23 mm (mỏng hơn vòi con muỗi)\n• Tiêm dưới da ít đau hơn tiêm bắp nhiều\n• Thời điểm lý tưởng: ngay trước khi ngủ (21–22 giờ)\n  → Trùng với đỉnh tiết GH tự nhiên ban đêm\n\n🎯 Xoay vòng 4 vị trí tiêm (thay đổi mỗi ngày):\n1. Bụng: cách rốn ít nhất 5 cm, hai bên (ưu tiên nhất)\n2. Đùi: mặt trước và bên ngoài, 1/3 trên\n3. Mặt sau cánh tay: vùng cơ tam đầu\n4. Mông: góc trên ngoài\n\n⚠️ Tiêm cùng một chỗ liên tục sẽ gây:\nTeo mỡ (lõm xuống) hoặc xơ cứng (cục cứng) → cản trở hấp thu → giảm hiệu quả điều trị\n\n📋 Các bước tiêm:\n1. Rửa tay kỹ (hơn 20 giây)\n2. Lấy thuốc ra khỏi tủ lạnh 15–30 phút để đạt nhiệt độ phòng (thuốc lạnh đau hơn)\n3. Lau da bằng bông cồn; để khô 10–15 giây\n4. Nhẹ nhàng véo da lên 2–3 cm\n5. Đâm kim 90°, nhanh và tự tin (do dự thì đau hơn)\n6. Nhấn hết và «giữ 10 giây» (quan trọng để tránh thuốc chảy ngược!)\n7. Rút kim 90° → ép nhẹ bằng gạc 10 giây (không chà xát — gây bầm)\n\n🧒 Khi trẻ sợ:\n• Cho trẻ chọn: «Hôm nay tiêm bên trái hay bên phải bụng?\"\n• Bảng dán nhãn: dán nhãn mỗi lần tiêm, thưởng khi hoàn thành tuần\n• Báo trước 10 phút: «Sắp đến giờ tiêm rồi»\n• Đừng bao giờ nói «Không đau gì cả» — phá vỡ lời hứa làm mất niềm tin","tip":"Tạo thói quen tiêm cùng một giờ mỗi tối giúp không bỏ bữa. Tuân thủ cao hơn trực tiếp dẫn đến kết quả tốt hơn."},"gh_timing":{"type":"answer","title":"Khi nào bắt đầu và kết thúc điều trị — Tuổi xương là thước đo","content":"Bắt đầu và kết thúc điều trị GH được xác định chủ yếu dựa trên tuổi xương.\n\n🟢 Khi nào bắt đầu:\n• Càng sớm càng tốt (tuổi xương thấp hơn = hiệu quả cao hơn)\n• Thời điểm tối ưu: trước dậy thì (bé gái tuổi xương 6–9, bé trai 8–10)\n• 2+ năm điều trị trước dậy thì gần như nhân đôi lợi ích\n\n🔴 Tiêu chí kết thúc (hết bảo hiểm):\n• Bé gái tuổi xương 14–15 / bé trai tuổi xương 15–16\n• Bé gái > 153 cm / bé trai > 165 cm chiều cao\n• Tăng trưởng hàng năm < 2 cm\n\n💡 Tiếp tục tự chi trả sau khi hết bảo hiểm:\n• Nếu vẫn còn tăng trưởng đáng kể, có thể tiếp tục tự chi trả\n• Tham khảo ý kiến bác sĩ nếu bảo hiểm kết thúc nhưng vẫn còn tăng > 2 cm/năm\n\n📅 Lịch theo dõi trong quá trình điều trị:\n• 3 tháng đầu: khám hàng tháng (chiều cao/cân nặng, tác dụng phụ, kỹ thuật tiêm)\n• Giai đoạn ổn định: mỗi 3–6 tháng\n• Mỗi 3–6 tháng: IGF-1 (mục tiêu 0 đến +2 SD)\n• Mỗi 6–12 tháng: X-quang tuổi xương\n• Hàng năm: chức năng tuyến giáp, đường huyết","tip":"Đừng dừng điều trị đột ngột — tốc độ tăng trưởng sẽ trở lại mức cơ bản. Luôn thảo luận với bác sĩ trước khi quyết định dừng."},"puberty_girl_under8":{"type":"answer","title":"Phát triển ngực trước 8 tuổi — Cần đến gặp bác sĩ ngay","recommend":true,"urgent":true,"content":"Phát triển ngực trước sinh nhật 8 tuổi (tuổi đầy đủ) đáp ứng định nghĩa y tế của dậy thì sớm. Cần đánh giá gấp.\n\n🔬 Xét nghiệm bác sĩ sẽ yêu cầu:\n1. X-quang tuổi xương (quan trọng nhất)\n   → Tuổi xương đã tiến trước bao nhiêu?\n2. Nghiệm pháp kích thích GnRH (chìa khóa phân biệt trung ương vs ngoại vi)\n   → Đỉnh LH ≥ 5 UI/L = xác nhận dậy thì sớm trung ương\n   → 90 phút, lấy máu 5 lần (đặt kim một lần)\n3. Siêu âm vùng chậu (kích thước tử cung và buồng trứng)\n4. MRI não\n   → Dưới 6 tuổi: bắt buộc\n   → 6–8 tuổi: nếu tiến triển nhanh hoặc có triệu chứng thần kinh\n\n⚠️ Yếu tố quyết định điều trị:\n• Tuổi xương > 2 năm so với tuổi đời + tiến triển nhanh → điều trị rất được khuyến nghị\n• Tuổi xương không tiến trước nhiều + tiến triển chậm → có thể theo dõi\n\n📊 Nếu không điều trị:\n• Bé gái trung bình thấp hơn chiều cao mục tiêu 10 cm (dữ liệu châu Âu dài hạn)\n• Kinh nguyệt đầu tiên có thể đến sớm lúc 9–10 tuổi","tip":"Chẩn đoán và điều trị sớm bảo vệ chiều cao cuối cùng. Đừng do dự — đến khám bác sĩ ngay hôm nay."},"puberty_girl_new":{"type":"answer","title":"Phát hiện phát triển ngực gần đây — Nên được đánh giá","recommend":true,"content":"Nếu mới phát hiện, hãy đặt lịch khám tại phòng khám nội tiết nhi để đánh giá.\n\n📌 Phát triển ngực ở 8–10 tuổi:\n• Sau 8 tuổi về mặt kỹ thuật không đáp ứng định nghĩa «dậy thì sớm», nhưng vẫn cần đánh giá\n• 8–9 tuổi: xem xét điều trị nếu tiến triển nhanh; theo dõi nếu chậm\n• 9–10 tuổi: đã trong phạm vi dậy thì bình thường\n\n🔍 Câu hỏi đánh giá chính:\n• Tiến triển có nhanh không? (2 giai đoạn Tanner trong 6 tháng?)\n• Tuổi xương có > 2 năm so với tuổi đời không?\n• Giai đoạn tăng trưởng vọt đã bắt đầu chưa?\n• Chiều cao cuối cùng dự đoán có thấp đáng kể so với mục tiêu di truyền không?\n\n📊 Tiêu chí xem xét điều trị (nếu có bất kỳ điều nào):\n• Nghiệm pháp kích thích GnRH đỉnh LH ≥ 5 UI/L\n• Tuổi xương > 2 năm so với tuổi đời\n• Chiều cao dự đoán thấp hơn nhiều so với mục tiêu di truyền\n• Tiến triển nhanh gây đau khổ tâm lý","tip":"Ghi lại ngày phát hiện và tốc độ thay đổi — thông tin rất có giá trị cho bác sĩ."},"puberty_girl_progress":{"type":"answer","title":"Phát triển ngực tiến triển nhanh — Nên đến khám sớm","recommend":true,"content":"Nếu đã tăng đáng kể trong 3–6 tháng, tiến triển nhanh và có thể cần đánh giá và điều trị.\n\n⚠️ Ý nghĩa của tiến triển nhanh:\n• Tuổi xương cũng có thể đang tiến nhanh\n• Nguy cơ đóng sụn tăng trưởng sớm\n• Chiều cao cuối cùng dự đoán có thể tiếp tục giảm\n\n📊 Hiệu quả điều trị GnRH theo tuổi xương khi bắt đầu:\n• Tuổi xương < 6: thêm trung bình 7,4 cm (hiệu quả tối đa)\n• Tuổi xương 8–9: có lợi nhưng hạn chế hơn\n• Tuổi xương 10–11: càng hạn chế hơn\n• Tuổi xương ≥ 11: hiệu quả tối thiểu\n\n💉 Với điều trị (tiêm GnRH):\n• Tiến triển dậy thì nhanh chậm lại hoặc dừng\n• Tốc độ tiến triển của tuổi xương bình thường hóa\n• Kinh nguyệt đầu tiên được hoãn đến khoảng cùng thời điểm với bạn bè\n• Ngăn ngừa mất chiều cao cuối cùng","tip":"Tiến triển càng nhanh thì điều trị càng cấp bách để có hiệu quả. Đặt lịch hẹn ngay hôm nay."},"puberty_girl_stable":{"type":"answer","title":"Không thay đổi hơn 6 tháng — Có thể là tuyến vú sớm","content":"Nếu đã có vài tháng mà không có thay đổi, đây có thể là «tuyến vú sớm (Premature Thelarche)» — phát triển vú đơn độc với tiên lượng thường rất tốt.\n\n📊 Đặc điểm của tuyến vú sớm:\n• Chỉ phát triển vú, không có dấu hiệu dậy thì khác\n  (không có lông mu, tiết dịch âm đạo, hoặc tăng trưởng nhanh)\n• Tuổi xương bình thường hoặc hơi tiến trước\n• Tốc độ tăng trưởng bình thường\n• Nghiệm pháp GnRH: đỉnh LH rất thấp (< 2 UI/L, phản ứng chủ yếu FSH)\n\n✅ Tiên lượng:\n• Hơn 90% tự khỏi mà không cần điều trị\n• 51% mô vú biến mất hoàn toàn\n• Nguy cơ tiến triển thành dậy thì sớm thực sự: ~2% khi khởi phát trước 2 tuổi\n\n⚠️ Vẫn cần theo dõi định kỳ:\n• Khám mỗi 3–6 tháng ban đầu\n• Quan sát: thay đổi kích thước ngực, lông mu, tiết dịch âm đạo, tốc độ tăng trưởng\n\n🔴 Đến khám ngay nếu:\n• Ngực đột nhiên to nhanh\n• Xuất hiện lông mu hoặc tiết dịch âm đạo\n• Chiều cao đột ngột tăng nhanh","tip":"Tuyến vú sớm thường không đáng lo ngại — nhưng cần theo dõi định kỳ."},"puberty_girl_normal":{"type":"answer","title":"Phát triển ngực sau 10 tuổi — Phạm vi dậy thì bình thường","content":"Phát triển ngực sau 10 tuổi là bắt đầu của dậy thì bình thường.\n\n📊 Thời gian bình thường của dậy thì ở bé gái:\n• Bắt đầu phát triển ngực: trung bình 9–11 tuổi (phạm vi bình thường 8–13 tuổi)\n• Lông mu: thường 6 tháng–1 năm sau khi bắt đầu phát triển ngực\n• Giai đoạn tăng trưởng vọt: 6 tháng–1 năm sau khi bắt đầu phát triển ngực\n• Kinh nguyệt đầu tiên: trung bình 2–2,5 năm sau khi bắt đầu phát triển ngực (trung bình 12–13 tuổi)\n\n📈 Tăng trưởng sau kinh nguyệt đầu tiên:\n• Năm trước kinh đầu: ~8–10 cm (đỉnh cao nhất)\n• Năm 1 sau kinh: ~2–3 cm\n• Năm 2 sau kinh: ~1–2 cm\n• Sau đó gần như dừng → tổng cộng ~5–7 cm nữa\n\n✅ Không cần lo lắng nếu:\n• Dậy thì tiến triển tự nhiên qua các giai đoạn\n• Tuổi xương trong vòng 1 năm so với tuổi đời\n• Chiều cao cuối cùng dự đoán trong phạm vi mục tiêu di truyền\n\n⚠️ Cần khám nếu:\n• Dậy thì tiến 2 giai đoạn hoặc hơn trong 6 tháng\n• Kinh nguyệt đầu tiên có vẻ sẽ đến trước 10 tuổi\n• Chiều cao dự đoán thấp hơn mục tiêu di truyền > 5 cm","tip":"Dậy thì bình thường đang diễn ra. Tối đa hóa tăng trưởng còn lại bằng dinh dưỡng cân bằng và ngủ đủ giấc."},"puberty_girl_unsure":{"type":"answer","title":"Mô tuyến vú hay mỡ — Cách phân biệt","content":"Nhiều phụ huynh hỏi câu hỏi này. Dễ phân biệt hơn bạn nghĩ.\n\n👆 Kiểm tra tại nhà:\n• Mô tuyến vú: cảm thấy khối nhỏ cứng ngay dưới núm vú\n  (có thể hơi đau khi ấn — cảm giác như hạt nhỏ hay viên đá)\n• Tích tụ mỡ: mềm và xốp khắp nơi\n  (không có vùng cứng ngay dưới núm vú)\n\n📊 Nếu chỉ có một bên:\nHoàn toàn bình thường! Rất phổ biến ở tuyến vú sớm và giai đoạn đầu dậy thì mà chỉ có một bên trước.\n\n🏥 Xác nhận tại phòng khám:\n• Khám lâm sàng của bác sĩ (sờ nắn)\n• Siêu âm vú: phân biệt rõ ràng mô tuyến và mỡ; hoàn toàn không đau, 5–10 phút\n• Tìm thấy mô tuyến trên siêu âm = bắt đầu phát triển vú được xác nhận\n\n✅ Nếu cảm thấy khối cứng tại nhà:\nDưới 8 tuổi → đến khám ngay\nTừ 8 tuổi trở lên → theo dõi thay đổi và đến khám khi cần","tip":"Khi không chắc, siêu âm vú tại phòng khám là xác nhận chính xác nhất. Nhanh và không đau."},"ans_boy_precocious":{"type":"answer","title":"Tinh hoàn to trước 9 tuổi — Cần đánh giá chuyên khoa gấp","recommend":true,"urgent":true,"content":"Tinh hoàn to trước sinh nhật 9 tuổi đáp ứng tiêu chí chẩn đoán dậy thì sớm.\n\n📏 Tiêu chí kích thước tinh hoàn:\n• ≥ 4 mL (chiều dài ~2,5 cm) = dậy thì bắt đầu\n• Phụ huynh thường không thể đánh giá chính xác — cần bác sĩ chuyên khoa khám\n\n⚠️ Tại sao dậy thì sớm ở bé trai cần chú ý hơn:\n• Khác với bé gái, bé trai có tỷ lệ bệnh lý thực thể cao hơn (tổn thương não...)\n• Trước đây 40–75% có nguyên nhân xác định; nay còn 7–16%, nhưng vẫn đáng kể\n• Dậy thì sớm hiếm ở bé trai, làm việc điều tra càng quan trọng hơn\n\n🔬 Xét nghiệm bắt buộc:\n1. X-quang tuổi xương (bắt buộc)\n2. Nghiệm pháp kích thích GnRH (đỉnh LH ≥ 5 UI/L = dậy thì sớm trung ương thực sự)\n3. MRI não (bắt buộc ở bé trai)\n   → Loại trừ hamartoma vùng dưới đồi (khối u lành tính), u tuyến yên...\n4. Hormone sinh dục trong máu (testosterone, LH, FSH, DHEA-S)\n5. Siêu âm tinh hoàn (loại trừ u tinh hoàn)\n\n📊 Nếu không điều trị:\n• Dữ liệu châu Âu dài hạn: bé trai thấp hơn chiều cao mục tiêu di truyền trung bình 20 cm\n• Gần gấp đôi mất chiều cao so với bé gái (~10 cm)","tip":"Dậy thì sớm ở bé trai hiếm nhưng nghiêm trọng. Đến khám nội tiết nhi càng sớm càng tốt."},"ans_boy_signs":{"type":"answer","title":"Dấu hiệu dậy thì ở bé trai — Thời điểm và tốc độ là điều quan trọng","content":"Vỡ giọng, râu mọc và tăng trưởng vọt là dấu hiệu của giữa/cuối dậy thì.\n\n📊 Trình tự dậy thì bình thường ở bé trai:\n1. Tinh hoàn to (≥ 4 mL) ← Dậy thì bắt đầu\n2. Lông mu (6 tháng–1 năm sau khi tinh hoàn to)\n3. Giai đoạn tăng trưởng vọt (1–2 năm sau khi tinh hoàn to, đỉnh khoảng 13–15 tuổi)\n   → 9–10 cm/năm trong giai đoạn đỉnh, kéo dài ~2–3 năm\n4. Vỡ giọng (khoảng cùng thời điểm với tăng trưởng vọt)\n5. Râu mọc (dấu hiệu cuối cùng của dậy thì)\n   → Khi râu mọc, giai đoạn tăng trưởng vọt sắp kết thúc\n\n📈 Tổng tăng trưởng trong dậy thì ở bé trai:\n• Giai đoạn tăng trưởng vọt: 25–30 cm (nhiều hơn bé gái 5–7 cm)\n• Dậy thì muộn hơn bé gái ~2 năm nhưng kéo dài hơn 2–3 năm\n• Đây là lý do đàn ông trung bình cao hơn phụ nữ ~13 cm\n\n✅ Phạm vi bình thường:\n• Bắt đầu dậy thì: 10–12 tuổi\n• Trước 9 tuổi = dậy thì sớm\n• Không có dấu hiệu đến 14 tuổi = dậy thì muộn — cần đánh giá\n\n🔬 Cần khám nếu:\n• Dậy thì bắt đầu trước 9 tuổi\n• Tuổi xương > 2 năm so với tuổi đời\n• Chiều cao dự đoán thấp hơn nhiều so với mục tiêu di truyền","tip":"Khi râu bắt đầu mọc, giai đoạn tăng trưởng vọt chính sắp kết thúc. Thói quen lối sống lành mạnh để tối đa hóa tăng trưởng còn lại trở thành ưu tiên."},"ans_boy_false_puberty":{"type":"answer","title":"Dậy thì sớm ngoại vi — Nguyên nhân khác","content":"Nếu chỉ có lông mu/mùi cơ thể mà không có thay đổi tinh hoàn, khả năng cao là dậy thì sớm ngoại vi (tuyến thượng thận).\n\n📌 Phân biệt trung ương và ngoại vi:\n• Trung ương: tín hiệu từ não → kích thích tinh hoàn/buồng trứng → hormone sinh dục\n  Bé trai: tinh hoàn to trước\n• Ngoại vi: tuyến thượng thận tiết androgen trực tiếp, không qua não\n  Bé trai: kích thước tinh hoàn bình thường, chỉ lông mu/mùi cơ thể/mụn\n\n📌 Nguyên nhân phổ biến nhất — Dậy thì tuyến thượng thận sớm:\n• Tuyến thượng thận sản xuất DHEA-S sớm hơn bình thường\n• Tiên lượng thường xuất sắc — hiếm khi tiến triển thành dậy thì hoàn toàn\n• Nhưng cần theo dõi 1–2 năm để loại trừ tiến triển thành dậy thì trung ương\n\n🏥 Cần đánh giá vì:\nHiếm gặp nhưng có thể có u tuyến thượng thận hoặc tăng sản thượng thận bẩm sinh\nXét nghiệm máu (DHEA-S, testosterone, 17-OHP) bắt buộc để loại trừ\n\n⚠️ Điểm quan trọng:\nNghiệm pháp GnRH → không có phản ứng LH = xác nhận loại ngoại vi\nThuốc GnRH không có hiệu quả với dậy thì sớm ngoại vi (cần điều trị nguyên nhân)","tip":"Lông mu và mùi cơ thể với kích thước tinh hoàn bình thường cần cách tiếp cận chẩn đoán hoàn toàn khác. Đến khám bác sĩ chuyên khoa."},"ans_boy_delayed":{"type":"answer","title":"Dậy thì muộn ở bé trai — Thường là chậm phát triển thể chất","recommend":true,"content":"Nếu đến 14 tuổi không có tinh hoàn to (< 4 mL), được đánh giá là dậy thì muộn.\n\n📊 Chậm phát triển thể chất và dậy thì (CDGP) — 60–80%:\n• Kiểu «dậy thì muộn» — cuối cùng phát triển bình thường\n• Dấu hiệu chính: bố (thường) cũng từng dậy thì muộn\n• Tuổi xương thấp hơn tuổi đời 1–3 năm\n• Dù thấp, vẫn đang tăng trưởng đều đặn 4–5 cm/năm\n\n✅ Khi có thể chờ đợi:\n• Bố có tiền sử phát triển muộn\n• Tuổi xương thấp (sụn tăng trưởng vẫn mở tốt)\n• Xét nghiệm bình thường (GH, tuyến giáp...)\n• Vẫn tăng trưởng ổn định\n\n⚠️ Nguyên nhân bệnh lý cần loại trừ:\n• Hội chứng Klinefelter (47, XXY)\n• Rối loạn chức năng tuyến yên\n• Bệnh mãn tính suy kiệt (Crohn, bệnh thận mãn...)\n• Suy dinh dưỡng nặng\n\n💊 Lựa chọn điều trị (trong CDGP):\n• Hầu hết sẽ dậy thì tự nhiên khi đến thời điểm\n• Nếu căng thẳng tâm lý nghiêm trọng: có thể dùng testosterone liều thấp để kích thích dậy thì\n• Chiều cao cuối cùng vẫn trong phạm vi di truyền bình thường\n\n🔬 Xét nghiệm: tuổi xương + nghiệm pháp kích thích GH + phân tích nhiễm sắc thể (loại trừ Klinefelter)","tip":"CDGP chỉ đơn giản là bắt đầu muộn hơn — chiều cao cuối cùng thường bình thường. Phần khó là vượt qua giai đoạn khi tất cả bạn bè đã cao hơn."},"ans_false_puberty":{"type":"answer","title":"Dậy thì sớm ngoại vi — Nguyên nhân khác, điều trị khác","content":"Nếu có lông mu/mùi cơ thể/mụn MÀ KHÔNG có phát triển ngực (bé gái) hoặc tinh hoàn to (bé trai), nghi ngờ «dậy thì sớm ngoại vi».\n\n🔵 So sánh trung ương và ngoại vi:\nĐặc điểm | Trung ương | Ngoại vi\nTín hiệu não | Có | Không\nBé gái | Phát triển ngực trước | Không phát triển ngực\nBé trai | Tinh hoàn to trước | Kích thước tinh hoàn bình thường\nCả hai | LH↑, FSH↑ | DHEA-S↑, LH bình thường\nĐiều trị | Tiêm GnRH | Điều trị nguyên nhân\n\n📌 Nguyên nhân phổ biến nhất — dậy thì tuyến thượng thận sớm:\n• Tuyến thượng thận sản xuất DHEA-S sớm hơn bình thường\n• Thường lành tính, chuyển tiếp tự nhiên sang dậy thì bình thường\n• Một số có thể tiến triển thành dậy thì trung ương → cần theo dõi\n\n🔬 Xét nghiệm cần thiết:\n• DHEA-S, testosterone, 17-OHP\n• Nghiệm pháp kích thích GnRH (để loại trừ dậy thì trung ương)\n• Siêu âm tuyến thượng thận/vùng chậu","tip":"Dậy thì sớm ngoại vi có cơ chế hoàn toàn khác với trung ương — thuốc GnRH không có hiệu quả. Chẩn đoán chính xác là điều đầu tiên."},"ans_early_menarche":{"type":"answer","title":"Kinh nguyệt đầu tiên sớm — Đánh giá cơ hội tăng trưởng còn lại","recommend":true,"content":"Kinh nguyệt đầu tiên báo hiệu giai đoạn tăng trưởng vọt gần như đã kết thúc.\n\n📊 Tăng trưởng trung bình sau kinh nguyệt đầu tiên:\n• Cùng năm kinh đến: ~2–3 cm\n• Năm 2: ~1–2 cm\n• Sau đó: gần như không tăng\n• Tổng sau kinh nguyệt đầu tiên: ~5–7 cm\n\n📌 Tuổi xương xác định còn bao nhiêu:\nNếu tuổi xương < 12 ngay sau kinh đầu tiên, có thể vẫn còn cơ hội điều trị.\n\n⚠️ Kinh nguyệt đầu tiên trước 10 tuổi:\nCó thể cho thấy điều trị dậy thì sớm đến muộn. Cần X-quang tuổi xương gấp.\n\n✅ Chiến lược tối đa hóa tăng trưởng còn lại:\n• Ngủ đủ giấc (đặt mục tiêu ngủ trước 22:00)\n• Đủ protein + canxi + vitamin D\n• Giảm thiểu căng thẳng\n• Tập thể dục đều đặn (nhảy dây, bóng chuyền và các bài tập nhảy khác)\n\n🔴 Kiểm tra khả năng điều trị:\n• Tuổi xương < 12 + vẫn đang trong giai đoạn tăng trưởng → điều trị có ý nghĩa\n• Tuổi xương > 14 → điều trị không có hiệu quả","tip":"Đừng bỏ cuộc sau kinh nguyệt đầu tiên. X-quang tuổi xương có thể làm rõ chính xác còn bao nhiêu cơ hội tăng trưởng."},"ans_rapid_growth":{"type":"answer","title":"Chiều cao đột ngột tăng nhanh — Có thể là dấu hiệu dậy thì sớm","recommend":true,"content":"Chiều cao tăng nhanh đột ngột có thể là dấu hiệu cảnh báo sớm của dậy thì sớm.\n\n⚠️ Nghịch lý của dậy thì sớm:\n• Ngắn hạn: trẻ có thể cao hơn bạn bè 5–8 cm\n• Bách phân vị chiều cao có thể tăng vọt (ví dụ: 50 → 75)\n• Dài hạn: sụn tăng trưởng đóng sớm có thể dẫn đến chiều cao cuối cùng thấp hơn tiềm năng 5–15 cm\n\n📊 Tốc độ tăng trưởng bình thường vs dậy thì sớm giai đoạn đầu:\n• Bình thường (trước dậy thì): 5–7 cm/năm\n• Dậy thì sớm giai đoạn đầu: 8–10+ cm/năm (giai đoạn tăng trưởng vọt khởi phát sớm)\n\n🔍 Kiểm tra đồng thời:\n• Phát triển ngực (bé gái) / tinh hoàn to (bé trai)\n• Lông mu, mùi cơ thể, mụn\n• Xu hướng bách phân vị chiều cao gần đây\n\n🔬 Đánh giá được đề nghị:\n• X-quang tuổi xương\n• Nghiệm pháp kích thích GnRH\n• Hormone sinh dục trong máu","tip":"Đừng vội mừng khi chiều cao tăng nhanh — trước tiên hãy kiểm tra xem sụn tăng trưởng có đang tiến triển quá nhanh không."},"gnrh_treatment":{"type":"answer","title":"Điều trị GnRH (điều trị dậy thì sớm) — Hướng dẫn chi tiết","content":"Chất tương tự GnRH (chủ vận) là điều trị tiêu chuẩn cho dậy thì sớm trung ương thực sự.\n\n🔬 Cơ chế tác dụng:\nChiếm liên tục thụ thể GnRH ở tuyến yên → mất nhạy cảm\n→ Sản xuất LH và FSH giảm → hormone sinh dục bị ức chế → tiến triển dậy thì dừng lại\n\n💊 Thuốc có sẵn:\n• Leuprolide: Luprin, Lupeer, Eligard\n• Triptorelin: Diphereline, Decapeptyl\n• Có dạng 1 tháng, 3 tháng, hoặc 6 tháng\n\n💉 Đường dùng:\n• Tiêm bắp (mông): Diphereline, Decapeptyl\n• Tiêm dưới da (bụng): một số dạng leuprolide\n• Sinh khả dụng tiêm bắp ~1,5–2× cao hơn tiêm dưới da\n\n⏱️ Khoảng cách tiêm — KHÔNG được trễ:\n• 1 tháng: mỗi 25–29 ngày\n• 3 tháng: mỗi 77–87 ngày\n• 6 tháng: mỗi 154–175 ngày\n\n💰 Chi phí:\nCó bảo hiểm:\n• 1 tháng: khoảng 40.000–50.000 won mỗi lần\n• 3 tháng: khoảng 120.000–150.000 won mỗi lần\nKhông có bảo hiểm:\n• 1 tháng: khoảng 110.000 won\n• 3 tháng: khoảng 330.000 won\n\n✅ Tiêu chí bảo hiểm (tăng cường từ tháng 1/2025):\n• Cần ghi chép các dấu hiệu dậy thì thứ cấp trước 8 tuổi (bé gái)/9 tuổi (bé trai)\n• Nghiệm pháp GnRH đỉnh LH ≥ 5 UI/L\n• Tuổi xương tiến trước\n• Bảo hiểm đến: ngày trước sinh nhật 12 tuổi (bé gái) / 13 tuổi (bé trai)\n\n🕒 Thời gian điều trị và kết thúc:\n• Điều trị thông thường: 2–4 năm\n• Kết thúc: bé gái tuổi xương 12–12,5 / bé trai tuổi xương 13–13,5\n• Kinh nguyệt đầu tiên: trung bình ~1 năm sau khi kết thúc điều trị","tip":"Đừng bao giờ trễ các mũi tiêm — có thể gây ra sự tái tăng của hormone sinh dục (hiện tượng đột phá)."},"gnrh_gh_combo":{"type":"answer","title":"Điều trị kết hợp GnRH + hormone tăng trưởng — Khi nào cần xem xét?","content":"Một số trẻ đang điều trị với chất tương tự GnRH cũng được dùng hormone tăng trưởng để cải thiện thêm chiều cao cuối cùng.\n\n🎯 Đối tượng phù hợp với liệu pháp kết hợp:\nÍt nhất một trong những điều sau:\n① Chiều cao cuối cùng dự đoán theo tuổi xương < bách phân vị 3\n② Tốc độ tăng trưởng < 4 cm/năm khi dùng GnRH đơn độc (thiếu GH tương đối)\n③ Chiều cao dự đoán rõ ràng thấp hơn mục tiêu di truyền\n\n📊 Hiệu quả mong đợi:\n• GnRH đơn độc: ngăn ngừa mất chiều cao (ổn định chiều cao dự đoán)\n• Liệu pháp kết hợp: thêm 4–6 cm so với đơn độc\n• Ví dụ: mục tiêu 155 cm → GnRH đơn độc 154–157 cm → kết hợp 160–162 cm\n\nCơ chế:\n• GnRH: làm chậm tiến triển tuổi xương (mua thêm thời gian)\n• GH: kích hoạt thêm con đường IGF-1 (độc lập với hormone sinh dục)\n• Hiệu ứng hiệp đồng\n\n💰 Chi phí điều trị kết hợp (tự chi trả):\n• GnRH: khoảng 110.000 won/tháng\n• GH thêm vào: khoảng 800.000–1.300.000 won/tháng\n• Tổng cộng: khoảng 910.000–1.410.000 won/tháng\n• Chi phí hàng năm: khoảng 10–16 triệu won\n• 2–3 năm tổng cộng: khoảng 20–50 triệu won\n\n✅ Cách tiếp cận được đề nghị:\nĐánh giá phản ứng tăng trưởng sau 6–12 tháng GnRH đơn độc → thêm GH nếu tăng trưởng < 4 cm/năm","tip":"Chi phí đáng kể, nhưng tiềm năng tăng chiều cao cũng vậy. Thảo luận kỹ với bác sĩ chuyên khoa và quyết định cùng gia đình."},"obesity_diagnosis":{"type":"answer","title":"Tiêu chí béo phì ở trẻ em — Khác với người lớn","content":"Không áp dụng tiêu chí người lớn (BMI > 25) cho trẻ em. Dùng phân loại theo bách phân vị dựa trên tuổi và giới tính.\n\n📊 Phân loại BMI nhi khoa:\n• < Bách phân vị 5 → Thiếu cân\n• Bách phân vị 5–84 → Bình thường\n• Bách phân vị 85–94 → Thừa cân\n• Bách phân vị ≥ 95 → Béo phì\n• ≥ 120% bách phân vị 95 → Béo phì nặng\n\n🧮 Cách tính BMI:\nCân nặng (kg) ÷ Chiều cao (m)² = BMI\nVí dụ: chiều cao 140 cm (1,4 m), cân nặng 45 kg → BMI = 45 ÷ 1,96 ≈ 23\n\n⚖️ Tỷ lệ mỡ cơ thể (chính xác nhất):\n• Bé trai ≥ 25% → Béo phì\n• Bé gái ≥ 30% → Béo phì\n• Đo bằng máy phân tích thành phần cơ thể (InBody); không đau\n\n⚠️ Cần khám ngay nếu:\n• BMI ≥ bách phân vị 95\n• Béo phì VÀ chiều cao thấp (cần loại trừ bệnh nội tiết)\n  — Béo phì đơn giản thường làm trẻ cao hơn bạn cùng lứa, không thấp hơn","tip":"Nếu trẻ vừa béo phì vừa chiều cao thấp, có thể không phải béo phì đơn giản. Nên được đánh giá."},"obesity_height":{"type":"answer","title":"Béo phì ảnh hưởng đến chiều cao thế nào — Cao ban đầu, thiệt thòi cuối cùng","content":"Tăng trưởng của trẻ béo phì là «chế độ tua nhanh» — nhanh lúc đầu nhưng kết thúc sớm.\n\n📊 Hai giai đoạn:\n\n✅ Giai đoạn đầu (phụ huynh vui mừng):\n• Cao hơn bạn cùng lứa 5–8 cm, bách phân vị chiều cao 75–95\n• Tuổi xương tiến trước 0,5–1,5 năm\n• Nguyên nhân: mỡ → leptin↑ → IGF-1↑, insulin↑ → kích thích sụn tăng trưởng\n\n⚠️ Giai đoạn sau (vấn đề thực sự):\n• Dậy thì bắt đầu sớm hơn\n• Sụn tăng trưởng đóng sớm → tăng trưởng dừng sớm hơn mong đợi\n• Trong khi bạn bè vẫn đang cao, trẻ này đã dừng\n\n📊 Bằng chứng nghiên cứu:\n• Chỉ béo phì: bé gái ít cao hơn 2,3 cm, bé trai ít cao hơn 3,1 cm (nghiên cứu quy mô lớn Thụy Điển)\n• Béo phì + dậy thì sớm nhanh: thấp hơn mục tiêu di truyền 5–8 cm\n\n💡 Lưu ý: béo phì không kèm dậy thì sớm có tác động khiêm tốn hơn đến chiều cao cuối cùng.\n\n🎯 Vấn đề cốt lõi:\nBéo phì → kích thích dậy thì sớm → mất chiều cao cuối cùng. Chuỗi này là vấn đề.\n\n✅ Giải pháp:\nKiểm soát cân nặng LÀ kiểm soát chiều cao\n• Giảm 5–10% cân nặng → leptin↓ → tốc độ tiến triển tuổi xương bình thường hóa","tip":"Cao nhất lớp ở tiểu học có thể là dấu hiệu cảnh báo — trẻ đó có thể là thấp nhất ở trung học."},"obesity_puberty":{"type":"answer","title":"Béo phì và dậy thì sớm — Kiểm soát cân nặng là kiểm soát dậy thì","content":"Béo phì là một trong những yếu tố nguy cơ quan trọng nhất của dậy thì sớm.\n\n🔬 Cơ chế:\nMỡ thừa → leptin↑ → kích hoạt hệ thống Kisspeptin ở não\n→ GnRH↑ → LH và FSH↑ → hormone sinh dục↑ → dậy thì bắt đầu sớm\n\nLeptin điều chỉnh sự thèm ăn nhưng cũng đóng vai trò là tín hiệu cho não biết cơ thể đã sẵn sàng cho dậy thì.\n\n📊 Bằng chứng nghiên cứu:\n• Bé gái béo phì kéo dài ≥1 năm: tăng đáng kể nguy cơ dậy thì sớm\n• Bé gái béo phì dậy thì sớm với tỷ lệ gấp 2–3 lần bé gái cân nặng bình thường\n\n✅ Lợi ích của kiểm soát cân nặng:\n• Giảm leptin → giảm nguy cơ dậy thì sớm\n• Cải thiện kháng insulin → hormone sinh dục bình thường hóa\n• Tốc độ tiến triển tuổi xương bình thường hóa\n\n⚠️ Giảm cân nhanh trong giai đoạn tăng trưởng là nguy hiểm:\nMục tiêu là «tiếp tục cao trong khi ổn định cân nặng»\nChế độ ăn kiêng khắc nghiệt cản trở tăng trưởng","tip":"Nếu lo lắng về dậy thì sớm, kiểm soát cân nặng là biện pháp phòng ngừa tốt nhất. Hình thành thói quen ăn uống lành mạnh trước tuổi đi học là lý tưởng."},"ans_acanthosis":{"type":"answer","title":"Acanthosis nigricans — Dấu hiệu da của kháng insulin","recommend":true,"content":"Da vùng gáy, nách hoặc bẹn bị thâm và dày hơn được gọi là «acanthosis nigricans».\n\n🔍 Đặc điểm:\n• Trông như bụi bẩn không rửa được\n• Kết cấu nhung, mềm và dày\n• Vị trí phổ biến nhất: gáy, nách, bẹn\n\n🧬 Tại sao xảy ra?\nNồng độ insulin trong máu tăng cao (tăng insulin huyết)\n→ Tế bào da (keratinocyte) quá sản xuất → lắng đọng melanin\n→ Da thâm và dày\n\nInsulin cao = dấu hiệu của kháng insulin\nKháng insulin = giai đoạn trước của tiền tiểu đường và hội chứng chuyển hóa\n\n📊 Thống kê:\n• Hơn 70% thiếu niên béo phì có acanthosis nigricans bị tăng insulin huyết\n• Hơn 60% được xác nhận có kháng insulin\n\n✅ Xét nghiệm cần thiết:\n• Insulin nhịn đói (≥ 15 µU/mL = tăng insulin huyết)\n• HOMA-IR (chỉ số kháng insulin)\n• Đường huyết nhịn đói, HbA1c\n• Bảng lipid (cholesterol, triglyceride)\n\n💡 Điều trị:\n• Điều trị kháng insulin cơ bản, không phải chỉ điều trị da\n• Giảm 5–10% cân nặng + tập thể dục + cải thiện chế độ ăn\n• Da dần cải thiện khi kháng insulin giải quyết trong 4–6 tháng","tip":"Acanthosis nigricans là đèn cảnh báo da của cơ thể cho thấy nguy cơ chuyển hóa. Nếu thấy, đến khám nội tiết nhi để đánh giá kháng insulin."},"ans_obesity_diet":{"type":"answer","title":"Chế độ ăn cho trẻ béo phì trong giai đoạn tăng trưởng","content":"⚠️ Quy tắc quan trọng nhất: KHÔNG BAO GIỜ để trẻ đói!\nMục tiêu là «tối ưu hóa thành phần thức ăn», không phải «ăn ít hơn».\n\n📋 5 nguyên tắc ăn uống cốt lõi:\n\n1️⃣ Một nguồn protein trong mỗi bữa ăn\nBữa sáng: một trong — trứng, sữa, sữa chua, phô mai, bánh mì phết bơ đậu phộng\nBữa trưa: một trong — thịt, cá, trứng, đậu hũ\nBữa tối: cá hoặc đậu hũ (thịt 2–3 lần/tuần)\n\n2️⃣ 2–3 phần sữa mỗi ngày (bổ sung canxi)\n\n3️⃣ Một nửa đĩa ăn là rau\nRau nhiều màu sắc (mỗi màu = chất dinh dưỡng khác nhau)\n\n4️⃣ Cơm trắng → gạo lứt, bánh mì trắng → bánh mì nguyên cám\nGiảm carbohydrate tinh chế làm giảm đỉnh đường huyết\n\n5️⃣ Chỉ uống nước (không nước trái cây hay nước ngọt)\nNgay cả nước trái cây 100% cũng có nhiều đường\n\n🚫 Tuyệt đối tránh:\n• Để trẻ đói (cản trở tăng trưởng, mất cơ)\n• Dùng thức ăn như phần thưởng hay hình phạt\n• Chỉ trẻ ăn kiêng trong khi cả nhà ăn bình thường\n• Ăn khuya (đặc biệt sau 21:00 → ức chế tiết hormone tăng trưởng ban đêm)","tip":"Tắt màn hình trong bữa ăn. Ăn trước màn hình khiến não khó nhận biết cảm giác no, dẫn đến ăn quá nhiều mà không biết."},"ans_obesity_exercise":{"type":"answer","title":"Tập thể dục phù hợp cho trẻ béo phì trong giai đoạn tăng trưởng","content":"📌 Mục tiêu: 60+ phút hoạt động thể chất cường độ vừa phải mỗi ngày (khuyến nghị WHO)\nCường độ vừa phải = hơi thở dốc nhưng vẫn nói chuyện được\n\n✅ Hoạt động được đề nghị:\n• Đi bộ nhanh: cả gia đình đi bộ 30 phút sau bữa tối\n• Bơi lội: tập thể dục toàn thân không áp lực khớp\n• Đạp xe, bóng đá, bóng rổ, cầu lông\n• Nhảy dây: kích thích sụn tăng trưởng + cải thiện thể lực tim mạch\n\n💪 Xóa bỏ quan niệm sai về tập tạ:\n«Tập tạ có làm trẻ không cao không?» → ❌ Quan niệm sai!\nHướng dẫn AAP 2020 và 2024: khuyến khích tích cực\n• Các chương trình được thiết kế phù hợp không gây hại cho sụn tăng trưởng\n• Thậm chí cải thiện mật độ xương\n• Ở trẻ béo phì, có thể hiệu quả hơn tập aerobic đơn độc\n\n✅ Bài tập tạ được đề nghị (dùng trọng lượng cơ thể):\n• Squat, chống đẩy, plank, lunges\n\n📅 Bí quyết duy trì thói quen tập:\n1. Để trẻ chọn hoạt động họ thích — tập bị ép buộc không kéo dài\n2. Tập cùng gia đình (khi bố mẹ tập đều đặn, trẻ hoạt động tích cực gấp 5 lần)\n3. Tích hợp hoạt động vào cuộc sống hàng ngày: leo cầu thang thay thang máy, đi bộ quãng ngắn","tip":"«Tập 30 phút» nghe có vẻ nặng, nhưng «thay đồ thể thao» thì dễ. Phân chia bất kỳ thói quen mới nào thành hành động nhỏ nhất có thể thực hiện trong 2 phút."},"ans_obesity_lifestyle":{"type":"answer","title":"Thay đổi lối sống — Phép màu 1% mỗi ngày","content":"🌟 Phép màu cải thiện 1% mỗi ngày:\nHôm nay leo thêm một tầng cầu thang, ngày mai uống thêm một ly nước — tích lũy lại sau 6 tháng trẻ sẽ hoàn toàn khác.\n(Cải thiện 1% mỗi ngày = tốt hơn ~37 lần sau 1 năm)\n\n📱 Giảm thời gian màn hình:\n• Từ 6 tuổi: tối đa 2 giờ/ngày cho mục đích giải trí (hướng dẫn AAP)\n• Hơn 5 giờ màn hình/ngày: nguy cơ béo phì gấp 5 lần\n• Không màn hình trong bữa ăn (cản trở tín hiệu no)\n\n😴 Ngủ đủ giấc:\n• Học sinh tiểu học (6–12 tuổi): 9–12 giờ/đêm\n• Học sinh trung học (13–18 tuổi): 8–10 giờ\n• Thiếu ngủ → tăng 58% nguy cơ béo phì\n• Thiếu ngủ → ghrelin (đói) ↑, leptin (no) ↓\n\n🏠 Môi trường quan trọng hơn ý chí:\n• Để đầy trái cây và rau trong tủ lạnh\n• Đơn giản là không mua đồ ăn vặt («không có nên không ăn» dễ hơn «có mà nhịn»)\n• Nước trên bàn ăn, nước ngọt ở cuối tủ lạnh\n• Điều khiển vào ngăn kéo, dây nhảy ở phòng khách\n\n👨‍👩‍👧 Cả gia đình cùng tham gia:\n• ≥3 bữa ăn gia đình/tuần → giảm 12% nguy cơ béo phì ở trẻ\n• Bố mẹ ăn rau với hứng thú → trẻ có xác suất gấp 3 lần ăn rau","tip":"Điều trị béo phì trẻ em hiệu quả nhất là thay đổi lối sống của cả gia đình. Đừng để trẻ chiến đấu một mình."},"ans_obesity_medicine":{"type":"answer","title":"Thuốc điều trị béo phì ở trẻ em — Công cụ bổ sung","content":"Thuốc không bao giờ là lựa chọn đầu tiên. Được xem xét như hỗ trợ cho thay đổi lối sống dưới các điều kiện cụ thể.\n\n📌 Tiêu chí bắt đầu điều trị thuốc (tất cả phải đáp ứng):\n• 12 tuổi trở lên\n• BMI ≥ bách phân vị 95\n• Có bệnh đi kèm (tiền tiểu đường, tăng huyết áp, rối loạn lipid...)\n• 6+ tháng thay đổi lối sống với kết quả không đủ\n\n💊 Thuốc có sẵn:\n\n1. Metformin (phổ biến nhất)\n• Vốn là thuốc tiểu đường; cải thiện độ nhạy insulin + giảm nhẹ sự thèm ăn\n• Giảm cân: trung bình 2–3 kg (khiêm tốn)\n• Tác dụng phụ: rối loạn tiêu hóa ban đầu — thường cải thiện trong 1–2 tuần\n• Ưu điểm: hồ sơ an toàn được chứng minh tốt, rất rẻ\n\n2. Chất chủ vận thụ thể GLP-1 (mạnh nhất nhưng đắt)\n• Ví dụ: Saxenda (liraglutide), Wegovy (semaglutide)\n• Giảm cân: 10–15% trọng lượng cơ thể (mạnh)\n• Được chấp thuận cho thanh thiếu niên béo phì từ 12 tuổi (thử nghiệm STEP TEENS)\n• Tác dụng phụ: buồn nôn/nôn ban đầu, cải thiện khi tăng liều từ từ\n• Nhược điểm: không có bảo hiểm, khoảng 300.000–500.000 won/tháng\n• Nguy cơ tái tăng cân sau khi dừng\n\n⚠️ Thuốc chỉ có hiệu quả khi kết hợp với thay đổi lối sống.","tip":"Thuốc là công cụ, không phải phép màu. Chế độ ăn và tập thể dục vẫn cần thiết ngay cả khi dùng thuốc."},"metabolism_prediabetes":{"type":"answer","title":"Tiền tiểu đường — Đây là thời điểm vàng để đảo ngược","recommend":true,"content":"Tiền tiểu đường có nghĩa là đường huyết cao hơn bình thường nhưng chưa đạt ngưỡng tiểu đường.\n\n📊 Tiêu chí chẩn đoán:\n• Tiền tiểu đường: đường huyết nhịn đói 100–125 mg/dL hoặc HbA1c 5,7–6,4%\n• Tiểu đường: đường huyết nhịn đói ≥ 126 mg/dL hoặc HbA1c ≥ 6,5%\n\n⚠️ Tại sao tiểu đường type 2 ở trẻ em nguy hiểm hơn ở người lớn:\n• Khởi phát trước 30 tuổi: nguy cơ nhồi máu cơ tim gấp 5×, đột quỵ gấp 3×, tử vong gấp 3×\n• Tuổi càng nhỏ, tổn thương mạch máu càng tích lũy lâu dài\n• Tiến triển nhanh hơn người lớn, biến chứng đến sớm hơn\n\n✅ Tin vui — hãy hành động ngay:\n• Nghiên cứu DPP (2002): thay đổi lối sống → giảm 58% nguy cơ khởi phát tiểu đường\n• Metformin đơn độc: chỉ 31% (hiệu quả một nửa so với thay đổi lối sống)\n• 4–6 tháng cải thiện lối sống có thể đảo ngược hoàn toàn\n\n🔬 Xét nghiệm được đề nghị (≥10 tuổi, thừa cân + yếu tố nguy cơ):\n• Đường huyết nhịn đói\n• HbA1c\n• Insulin nhịn đói + HOMA-IR\n• OGTT (nếu có chỉ định)\n\n💊 Thứ tự ưu tiên điều trị:\n1. Thay đổi lối sống (chế độ ăn + tập thể dục)\n→ Giảm 5–7% cân nặng làm chậm đáng kể tiến triển tiểu đường\n2. Metformin (nếu thay đổi lối sống không đủ sau 6 tháng)","tip":"Thay đổi lối sống hiệu quả gấp đôi metformin trong việc đảo ngược tiền tiểu đường. Đây là cơ hội cuối cùng tốt nhất để thay đổi hướng đi."},"metabolism_lipid":{"type":"answer","title":"Rối loạn lipid máu — Xơ vữa động mạch có thể bắt đầu từ tuổi thiếu niên","content":"Cholesterol cao rất phổ biến ở trẻ em béo phì (40–50% có rối loạn lipid máu).\n\n📊 Tiêu chí chẩn đoán:\n• Tổng cholesterol ≥ 200 mg/dL\n• LDL (cholesterol «xấu») ≥ 130 mg/dL\n• HDL (cholesterol «tốt») < 40 mg/dL (bé trai) / < 50 mg/dL (bé gái)\n• Triglyceride ≥ 130 mg/dL\n\n⚠️ Tại sao đáng lo ngại:\nNghiên cứu đã tìm thấy dải mỡ (xơ vữa sớm) trong mạch máu của thiếu niên khi khám nghiệm tử thi. Không điều trị → mảng bám hình thành → động mạch hẹp → nguy cơ nhồi máu cơ tim hoặc đột quỵ ngay cả ở người trẻ.\n\n✅ Tác động của giảm 10% cân nặng:\n• Huyết áp tâm thu giảm 10–15 mmHg\n• LDL giảm ~10–15%\n• HDL tăng ~8–10%\n• Triglyceride giảm ~30% (phản ứng nhanh nhất)\n\n💊 Thuốc (nếu thay đổi lối sống không đủ sau 6–12 tháng):\n• Statin (được chấp thuận từ 10 tuổi)\n• Giảm LDL 30–50%\n• An toàn dài hạn đã được xác nhận — không ảnh hưởng đến tăng trưởng, dậy thì, hormone\n\n📌 Cách giảm triglyceride nhanh:\n• Thay nước ngọt bằng nước lọc (hiệu quả trong 2 tuần)\n• Giảm carbohydrate tinh chế\n• Tăng omega-3 (cá béo 2–3 lần/tuần)","tip":"Cholesterol cao không có triệu chứng — thường bị bỏ qua. Nếu trẻ béo phì, hãy yêu cầu xét nghiệm máu kiểm tra lipid."},"metabolism_fatty_liver":{"type":"answer","title":"Gan nhiễm mỡ — Bệnh im lặng nhưng nghiêm trọng","content":"Khoảng 40% trẻ béo phì bị gan nhiễm mỡ. Hầu hết hoàn toàn không có triệu chứng!\n\n🔍 Gan nhiễm mỡ là gì?\nMỡ tích lũy chiếm hơn 5% trọng lượng gan. Gan trông «sáng» trên siêu âm (bright liver).\n\n⚠️ Nguyên nhân:\n• Mỡ nội tạng: axit béo từ mỡ bụng sâu chảy trực tiếp vào gan\n• Kháng insulin: làm suy giảm quá trình phân giải mỡ trong gan\n• Fructose lỏng: fructose trong nước ngọt và nước trái cây chỉ được chuyển hóa tại gan\n\n📊 Các giai đoạn tiến triển:\nGan nhiễm mỡ đơn giản → Viêm gan mỡ (NASH) → Xơ gan → Xơ gan nặng\n(Ba giai đoạn đầu có thể đảo ngược)\n\n✅ Điều trị:\nKhông có thuốc được phê duyệt cho gan nhiễm mỡ ở trẻ em\n→ Thay đổi lối sống là phương pháp điều trị duy nhất\n\n• Giảm 3–5% cân nặng: mỡ bắt đầu giảm, ALT cải thiện\n• Giảm 7–10%: viêm gan và xơ hóa cũng cải thiện\n• Chú ý: giảm cân nhanh có thể làm xấu hơn gan nhiễm mỡ (0,5–1 kg/tuần)\n• Thay nước ngọt/nước trái cây bằng nước lọc: hiệu quả nhanh nhất\n• Chế độ ăn ít carbohydrate hiệu quả nhất\n• Tập thể dục riêng lẻ có thể giảm mỡ gan ngay cả không giảm cân","tip":"Chỉ thay nước ngọt bằng nước lọc có thể cải thiện gan nhiễm mỡ. Fructose là thủ phạm chính."},"metabolism_spise":{"type":"answer","title":"HOMA-IR & SPISE — Đo lường kháng insulin chính xác","content":"📊 HOMA-IR (đánh giá kháng insulin):\nCông thức: (Đường huyết nhịn đói × Insulin nhịn đói) ÷ 405\n\n⚠️ Quan trọng: Ngưỡng ở trẻ em khác với người lớn — KHÔNG dùng ngưỡng người lớn 2,5\n• Bé trai trước dậy thì: nghi ngờ ≥ 2,67\n• Bé gái trước dậy thì: nghi ngờ ≥ 2,22\n• Bé trai tuổi dậy thì: nghi ngờ ≥ 5,22\n• Bé gái tuổi dậy thì: nghi ngờ ≥ 3,82\n\nInsulin nhịn đói tham chiếu:\n• 5–15 µU/mL: bình thường\n• > 15: nghi tăng insulin huyết\n• > 20: xác nhận tăng insulin huyết\n\n📊 Chỉ số SPISE (công cụ mới tiện hơn):\nĐánh giá độ nhạy insulin mà không cần insulin nhịn đói!\nCông thức: 600 × HDL^0,185 / TG^0,2 × BMI^1,338\n\n✅ Ưu điểm của SPISE:\n• Tính từ xét nghiệm máu thông thường, không cần lấy máu thêm\n• Ổn định hơn insulin (insulin thay đổi mỗi 5–10 phút)\n• Nghiên cứu 2025: độ chính xác 86% trong dự đoán hội chứng chuyển hóa (vượt trội HOMA-IR)\n\n💡 Cách cải thiện SPISE:\n• Giảm BMI (tác động lớn nhất: xuất hiện như BMI^1,338)\n• Tăng HDL: aerobic 5 lần/tuần, bổ sung omega-3\n• Giảm triglyceride: thay nước ngọt bằng nước lọc, giảm carbohydrate tinh chế\n  (Triglyceride phản ứng nhanh nhất — trong vòng 2 tuần)","tip":"Tính SPISE mỗi 3–6 tháng để theo dõi bằng con số hiệu quả thực sự của việc thay đổi lối sống của trẻ."},"nutrition_vitamin_d":{"type":"answer","title":"Vitamin D · Canxi · Magie — Ba trụ cột của sự tăng trưởng","content":"Ba chất này tạo thành «tam giác hiệp đồng»:\nVitamin D (chìa khóa) → Canxi (nguyên liệu) → Magie (kích hoạt Vitamin D)\nThiếu bất kỳ chất nào cũng làm giảm đáng kể hiệu quả của các chất còn lại.\n\n☀️ Vitamin D:\n• Khoảng 70–80% trẻ em và thanh thiếu niên Hàn Quốc bị thiếu hụt\n• Khi thiếu Vitamin D: tỷ lệ hấp thụ canxi 10–15%\n• Khi đủ Vitamin D: tỷ lệ hấp thụ 30–40% — cao hơn 2–3 lần!\n\n💡 Chính yếu: Dù uống bao nhiêu sữa, nếu thiếu Vitamin D thì canxi không được hấp thụ tốt.\n\nLiều lượng được đề nghị:\n• 0–12 tháng: 400 IU\n• 1–18 tuổi: 600 IU\n• Khi thiếu hụt: 1.000–2.000 IU\n\n⚠️ Mùa đông Hàn Quốc (tháng 11–2): ánh nắng không tổng hợp đủ Vitamin D (vĩ độ > 33°, UVB không đủ)\n→ Cần bổ sung bằng thực phẩm chức năng\n\nMức mục tiêu trong máu: 30–50 ng/mL\nChọn thực phẩm bổ sung: D3 (cholecalciferol) > D2 (hiệu quả hơn)\n\n🥛 Canxi:\nLượng khuyến nghị hàng ngày theo tuổi:\n• 1–3 tuổi: 700 mg (~3 ly sữa)\n• 4–8 tuổi: 1.000 mg (~4–5 ly)\n• 9–18 tuổi: 1.300 mg (~6 ly) ← Nhu cầu cao nhất: giai đoạn tăng trưởng vọt\n\nNguồn tốt nhất: sữa (220 mg/200 mL), cá nhỏ nguyên con (ăn cả xương), đậu hũ, phô mai\nNước ngọt, thức ăn mặn và caffeine «đánh cắp» canxi\n\n🥜 Magie:\n• Đồng yếu tố thiết yếu để kích hoạt Vitamin D\n• Tỷ lệ canxi:magie lý tưởng là 2:1\n• Nguồn tốt nhất: hạt (hạt bí đỏ 30 g = 150 mg), rau xanh đậm, ngũ cốc nguyên hạt","tip":"Mỗi ngày: 2–3 ly sữa + thực phẩm bổ sung Vitamin D + rau và hạt đa dạng = nền tảng dinh dưỡng cho tăng trưởng."},"nutrition_protein":{"type":"answer","title":"Protein — Nguyên liệu thô của sự tăng trưởng","content":"Không có đủ protein, bất kỳ liệu pháp hormone tăng trưởng nào cũng sẽ không hoạt động tốt.\nProtein là nguyên liệu thô để xây dựng cơ, xương, hormone, enzyme và tế bào miễn dịch — mọi thứ.\n\n📊 Nhu cầu hàng ngày (theo kg trọng lượng cơ thể):\n• 1–3 tuổi: 1,0–1,2 g/kg\n• 4–13 tuổi: 0,95 g/kg\n• 14–18 tuổi: 0,85 g/kg\n\nVí dụ thực tế:\n• 20 kg, 6 tuổi → ~19 g/ngày\n• 30 kg, 9 tuổi → ~28,5 g/ngày\n• 50 kg, 15 tuổi → ~42,5 g/ngày\n→ 100g ức gà (23g) + 1 quả trứng (6g) đủ nhu cầu hàng ngày cho trẻ 30 kg\n\n🥩 Hàm lượng protein của các thực phẩm phổ biến:\n• Ức gà 100 g: 23 g\n• Cá ngừ đóng hộp 100 g: 24 g (cao nhất)\n• 1 quả trứng vừa: 6 g\n• Sữa 200 mL: 6,4 g\n• Đậu hũ 100 g: 8 g\n• Đậu luộc 100 g: 9 g\n\n✅ Thực đơn mẫu một ngày (trẻ 30 kg, mục tiêu 30 g):\n• Sáng: 1 trứng (6 g) + sữa 200 mL (6,4 g)\n• Trưa: 80 g ức gà (18 g)\n• Tối: ¼ miếng đậu hũ (8 g)\n→ Tổng: 38,4 g ✓\n\n⚠️ Protein quá nhiều (> 2,5 g/kg/ngày):\nGánh nặng thận, tăng bài tiết canxi, nguy cơ mất nước","tip":"Chỉ cần có một thực phẩm giàu protein trong mỗi bữa ăn là lượng protein hàng ngày được đáp ứng tự nhiên."},"nutrition_zinc_iron":{"type":"answer","title":"Kẽm và Sắt — Chất dinh dưỡng hỗ trợ quan trọng","content":"🔵 Kẽm — «Khoáng chất của sự tăng trưởng»\n\nThiếu kẽm làm giảm IGF-1 ngay cả khi hormone tăng trưởng tiết ra bình thường!\n\nPhát hiện lịch sử: TS. Prasad, 1958\nỞ Iran, một người đàn ông 21 tuổi có sự phát triển như đứa trẻ 10 tuổi → xác nhận thiếu kẽm nặng\n→ Sau khi bổ sung kẽm: cao thêm 12,7–15,2 cm chỉ trong 1 năm!\n\nLượng khuyến nghị hàng ngày:\n• 1–3 tuổi: 3 mg / 4–8 tuổi: 5 mg / 9–13 tuổi: 8 mg\n• 14–18 tuổi: bé trai 11 mg, bé gái 9 mg\n\nNguồn tốt nhất: hàu sò (100 g = 16–90 mg — lượng khuyến nghị của nhiều ngày trong một khẩu phần!)\nNguồn động vật: thịt bò, gà, trứng, sữa\nNguồn thực vật: hạt bí đỏ, các loại đậu, các loại hạt (hấp thu kém hơn do phytate)\n\nThiếu kẽm → chán ăn → thiếu hụt hơn → vòng luẩn quẩn. Cần chú ý!\n\n🔴 Sắt — Vận chuyển oxy\n\nThiếu sắt làm tăng gấp đôi nguy cơ chậm tăng trưởng\nCơ chế: thiếu sắt → giảm cung cấp oxy → thiếu năng lượng → tế bào phân chia chậm → giảm IGF-1\n\nLượng khuyến nghị hàng ngày:\n• 1–3 tuổi: 7 mg / 4–8 tuổi: 10 mg / 9–13 tuổi: 8 mg\n• 14–18 tuổi: bé trai 11 mg, bé gái 15 mg (mất qua kinh nguyệt)\n\nNguồn tốt nhất:\n• Sắt heme (động vật, hấp thu 15–35%): gan bò, gan gà, thịt bò, hàu sò\n• Sắt không heme (thực vật, hấp thu 2–20%): đậu trắng, đậu lăng, đậu hũ, rau bina\n\nMẹo chính: Ăn Vitamin C cùng với sắt tăng hấp thu gấp 2–3 lần\n\nDấu hiệu thiếu hụt: thèm ăn đá (pica) — triệu chứng đặc trưng của thiếu sắt","tip":"Hàu sò là vua của kẽm. Ăn một lần mỗi tháng đã là sự hỗ trợ bổ sung kẽm đáng kể."},"nutrition_picky":{"type":"answer","title":"Trẻ ăn uống kén chọn — Kiên nhẫn là bí quyết","content":"🥦 Trẻ không chịu ăn rau:\n• Giấu rau «ẩn»: thái nhỏ trộn vào thịt băm hoặc cơm chiên\n• Thay đổi hình dạng: cắt cà rốt thành hình sao hay trái tim bằng khuôn bánh quy\n• Cho ăn kèm sốt: sốt sữa chua, bơ đậu phộng\n• Bắt đầu với rau ngọt tự nhiên: cà chua bi, cà rốt, khoai lang, ngô\n\n🥩 Trẻ không chịu ăn thịt:\n• Thường do thịt dai hoặc có mùi → nấu mềm hơn: viên thịt, hamburger\n• Không cần thiết ăn thịt: cá, trứng, đậu hũ và các loại đậu đủ bổ sung protein\n\n🥛 Trẻ không chịu uống sữa:\n• Thử thay đổi nhiệt độ hay hương vị: sữa ấm, thêm chút cacao\n• Trộn vào ngũ cốc, hoặc xay sinh tố với chuối\n• Thay thế: sữa chua, phô mai, sữa đậu nành tăng cường canxi, cá nhỏ\n\n✅ 7 quy tắc vượt qua ăn uống kén chọn:\n1. Kiên nhẫn: trẻ cần tiếp xúc một loại thức ăn mới 10–15 lần mới chấp nhận — không bỏ cuộc sau hôm nay\n2. Không bao giờ ép buộc: «Ăn hết mới được đứng dậy!» → có thể tạo ác cảm lâu dài\n3. Bố mẹ làm gương: ăn ngon miệng trước mặt trẻ\n4. Khen ngay cả một miếng nhỏ: «Con ăn một miếng rau bina rồi, giỏi lắm!\"\n5. Nấu ăn cùng nhau: những gì tự làm thì muốn ăn hơn\n6. Cho chọn lựa trong giới hạn: «Con muốn súp lơ hay cà rốt?» (cả hai đều là rau)\n7. Bữa ăn phải vui vẻ: nếu luôn bị la mắng ở bàn ăn, trẻ sẽ ghét giờ ăn","tip":"Kén ăn không phải vấn đề ý chí. Não trẻ đơn giản là cần thời gian để chấp nhận hương vị mới. Với 10–15 lần tiếp xúc, hầu hết sẽ được chấp nhận."},"nutrition_practical":{"type":"answer","title":"Chế độ ăn thực tế để cao lên — Chỉ cần tuân theo các quy tắc này","content":"📋 5 nguyên tắc cốt lõi (đừng phức tạp hóa — làm được điều này là đủ):\n\n1️⃣ Một thực phẩm protein trong mỗi bữa ăn\nBữa sáng: trứng, sữa, sữa chua, bánh mì phô mai, hoặc bánh mì bơ đậu phộng — chọn một\nBữa trưa: thịt, cá, trứng, hoặc đậu hũ — chọn một\nBữa tối: cá hoặc đậu hũ (thịt 3–4 lần/tuần)\n\n2️⃣ 2–3 phần sữa mỗi ngày\nSữa buổi sáng + sữa chua buổi chiều + sữa trước giờ ngủ\n→ Đảm bảo 440–660 mg canxi hàng ngày\n\n3️⃣ 1–2 loại rau nhiều màu sắc trong mỗi bữa ăn\nXanh (rau bina, bông cải) + cam (cà rốt, ớt chuông) + trắng (củ cải, bắp cải)\n\n4️⃣ Ngũ cốc nguyên hạt + trái cây nguyên\nCơm trắng → gạo lứt, bánh mì trắng → bánh mì nguyên cám\nTrái cây: 2–3 lần/ngày (trái cây tươi, không nước trái cây)\n\n5️⃣ Cân bằng theo tuần, không phải mỗi ngày\nNếu hôm nay thiếu rau, bù thêm ngày mai\n\n🌙 Thói quen trước khi ngủ:\n• Trước khi ngủ: một ly sữa ấm (canxi + tryptophan giúp ngủ)\n• Tránh tuyệt đối đồ ăn ngọt trước khi ngủ (insulin↑ → hormone tăng trưởng↓)\n\n🏆 Combo chiến thắng để tăng trưởng:\nNgủ đủ giấc + Dinh dưỡng cân bằng + Tập thể dục đều đặn\n→ Tiết hormone tăng trưởng tối đa + Tăng trưởng xương và cơ tối ưu","tip":"Chế độ ăn 80 điểm duy trì mỗi ngày hiệu quả hơn chế độ ăn hoàn hảo bỏ dở sau một tuần. Bắt đầu một thay đổi nhỏ ngay hôm nay."},"booking":{"type":"booking"}},
};

// 1. 승인기의 비밀 접두사와 동일하게 입력
const CODE_PREFIX = "Z";

// 2. Cloudflare Worker 주소 (배포 후 발급받는 주소)
//    예) https://jarada-chatbot.계정명.workers.dev
const WORKER_URL = "https://jarada-chatbot.ha5857.workers.dev";

// 3. Worker 접근 키 (Cloudflare에서 설정한 WORKER_KEY 값)
//    → 이 값은 Worker 주소만 사용 가능하게 하는 보조 키
//    → Anthropic API 키와 다릅니다 (Anthropic 키는 Cloudflare에만 보관)
const WORKER_KEY = "jaradaclinic1004";

const DAILY_LIMIT = 5;
const AI_DAILY_LIMIT = 5;  // AI 직접 답변 일일 제한
const STORAGE_CODE = "jrd_code";
const STORAGE_IP = "jrd_ip";
const STORAGE_USAGE = "jrd_usage";

// ── IP 가져오기 ────────────────────────────────────────────────
async function fetchIP() {
  try {
    const r = await fetch("https://api.ipify.org?format=json", {signal: AbortSignal.timeout(3000)});
    const d = await r.json();
    return d.ip || "unknown";
  } catch { return "unknown"; }
}

// ── 코드 유효성 검사 (알고리즘 방식: 파일 수정 불필요) ──────────
// 코드 형식: 접두사(1~3) + 발급월(2) + 생월(2) + 생일(2)
// 예) Z + 06 + 10 + 15 = Z061015
function validateCode(input) {
  const c = input.trim().toUpperCase();
  const px = CODE_PREFIX.toUpperCase();

  // 1. 접두사 확인
  if (!c.startsWith(px)) return {ok:false, msg:"유효하지 않은 코드입니다."};
  const rest = c.slice(px.length); // 접두사 제거

  // 2. 나머지 6자리 숫자인지 확인
  if (!/^\d{6}$/.test(rest)) return {ok:false, msg:"코드 형식이 올바르지 않습니다. (6자리 숫자)"};

  // 3. 발급 월 (앞 2자리)
  const issueMonth = parseInt(rest.slice(0,2));
  if (issueMonth < 1 || issueMonth > 12) return {ok:false, msg:"코드 형식 오류 (발급 월)"};

  // 4. 생년월일 (뒤 4자리) 유효성
  const bMonth = parseInt(rest.slice(2,4));
  const bDay   = parseInt(rest.slice(4,6));
  if (bMonth < 1 || bMonth > 12 || bDay < 1 || bDay > 31)
    return {ok:false, msg:"코드 형식 오류 (생년월일)"};

  // 5. 발급 월이 현재 월 또는 전월인지 (30일 유효기간)
  const now = new Date();
  const curM  = now.getMonth() + 1;
  const prevM = curM === 1 ? 12 : curM - 1;
  const day   = now.getDate();

  if (issueMonth !== curM && issueMonth !== prevM)
    return {ok:false, msg:"코드 유효기간이 만료되었습니다. (병원에 문의해 주세요)"};

  // 전월 발급이면 30일 이후 만료
  if (issueMonth === prevM && day > 30)
    return {ok:false, msg:"코드 유효기간이 만료되었습니다."};

  // 만료일 계산 (발급 월 말일)
  const yr = issueMonth <= curM ? now.getFullYear() : now.getFullYear()-1;
  const lastDay = new Date(yr, issueMonth, 0).toISOString().slice(0,10);

  return {ok:true, code:c, expires:lastDay};
}

// ── 일일 사용 횟수 ────────────────────────────────────────────────
function getUsageKey(code, ip) {
  const today = new Date().toISOString().slice(0,10);
  return `jrd_usage_${code}_${today}`;
}
function getUsage(code, ip) {
  try { return parseInt(localStorage.getItem(getUsageKey(code, ip)) || "0"); }
  catch { return 0; }
}
function incrUsage(code, ip) {
  try {
    const k = getUsageKey(code, ip);
    const n = getUsage(code, ip) + 1;
    localStorage.setItem(k, String(n));
    return n;
  } catch { return 1; }
}
function checkLimit(code, ip) {
  const used = getUsage(code, ip);
  return {ok: used < DAILY_LIMIT, used, remaining: Math.max(0, DAILY_LIMIT - used)};
}

      <p style="font-size:13px;color:#666;margin-bottom:8px">이용 코드를 입력해 주세요</p><p style="font-size:11px;color:#aaa;margin-bottom:16px">형식: 접두사 + 발급월(2자리) + 아이 생월일(4자리)<br>예) Z + 06 + 10 + 27 = <strong style='color:#2d7a3a'>Z061027</strong></p>

        maxlength="10">

        style="width:100%;margin-top:16px;padding:14px;background:#2d7a3a;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer">
        입력하기
      </button>
      <p style="margin-top:16px;font-size:12px;color:#aaa">코드가 없으시면 병원에 문의해 주세요<br>📞 02-523-0111</p>
    </div>`;
  document.body.appendChild(overlay);

  const inp = document.getElementById("codeInp");
  const btn = document.getElementById("codeBtn");
  const err = document.getElementById("codeErr");

  inp.addEventListener("input", () => {
    inp.value = inp.value.toUpperCase();
    inp.style.borderColor = "#ddd";
    err.textContent = "";
  });
  inp.addEventListener("keydown", e => { if (e.key==="Enter") btn.click(); });

  btn.addEventListener("click", async () => {
    const v = validateCode(inp.value);
    if (!v.ok) {
      err.textContent = v.msg;
      inp.style.borderColor = "#e53e3e";
      inp.focus();
      return;
    }
    btn.textContent = "확인 중...";
    btn.disabled = true;
    const ip = await fetchIP();
    localStorage.setItem(STORAGE_CODE, v.code);
    localStorage.setItem(STORAGE_IP, ip);
    document.body.removeChild(overlay);
    onSuccess(v.code, ip);
  });

  setTimeout(() => inp.focus(), 100);
}

// ── 메인 초기화 ─────────────────────────────────────────────────
async function initGate(onReady) {
  const savedCode = localStorage.getItem(STORAGE_CODE);
  if (savedCode) {
    const v = validateCode(savedCode);
    if (v.ok) {
      const ip = localStorage.getItem(STORAGE_IP) || await fetchIP();
      return onReady(v.code, ip);
    }
    localStorage.removeItem(STORAGE_CODE); // 만료된 코드 삭제
  }
  showCodeModal(onReady);
}

// ── 사용량 차감 + API 호출 통합 ────────────────────────────────────
async function callAIWithGate(q) {
  // ① Worker URL 확인
  if (!WORKER_URL) {
    return {text:"서비스 설정이 필요합니다. 관리자에게 문의해 주세요.", noKey:true};
  }

  // ② 코드/IP 확인
  const code = localStorage.getItem(STORAGE_CODE);
  const ip   = localStorage.getItem(STORAGE_IP) || "unknown";
  if (!code) return {text:"이용 코드가 필요합니다. 페이지를 새로고침해 주세요.", noKey:true};

  // ③ 만료 확인
  const v = validateCode(code);
  if (!v.ok) {
    localStorage.removeItem(STORAGE_CODE);
    location.reload();
    return null;
  }

  // ④ 일일 제한 확인
  const limit = checkLimit(code, ip);
  if (!limit.ok) {
    return {
      text: "오늘 무료 AI 질문 " + DAILY_LIMIT + "회를 모두 사용했습니다.\n내일 다시 이용해 주세요. (매일 자정 초기화)",
      limited: true
    };
  }

  // ⑤ 주제 필터 (API 호출 없이 즉시 거절)
  if (!isHealthQuestion(q)) {
    return {
      text: "저는 소아 성장·비만·대사·영양에 관한 질문만 답변할 수 있어요.\n성장호르몬, 키, 비만, 성조숙증, 영양소 등에 대해 물어봐 주세요! 😊",
      offTopic: true
    };
  }

  // ⑥ 사용량 차감
  const used = incrUsage(code, ip);
  const remaining = DAILY_LIMIT - used;

  const SYS = [
    "당신은 삼성자라다 소아청소년과 성장·비만·대사 전문 챗봇입니다.",
    "규칙:",
    "1. 소아 성장·키·체중·비만·성조숙증·영양·수면·대사·혈당·지방간에 관한 질문에만 답한다.",
    "2. 위 범위 밖이면: '저는 소아 성장·비만·대사 관련 질문만 답변할 수 있어요.'만 출력.",
    "3. 3문장 이내 간결하게. 의학적으로 정확하게.",
    "4. 마지막 줄: '자세한 상담은 삼성자라다 소아내분비과와 함께하세요 📞 02-523-0111'",
    "5. 한국어로만 답변."
  ].join("\n");

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 12000);

  try {
    console.log("🚀 API 호출 시작:", {WORKER_URL, model: "claude-haiku-4-5-20251001", q});
    const res = await fetch(WORKER_URL, {
      method: "POST",
      signal: controller.signal,
      headers: {
        "Content-Type": "application/json",
        "X-Worker-Key": WORKER_KEY,
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 300,
        system: SYS,
        messages: [{role:"user", content:q}]
      })
    });
    clearTimeout(timer);
    console.log("📡 Worker 응답 상태:", res.status, res.statusText);
    
    if (!res.ok) {
      const errText = await res.text().catch(()=>"");
      console.warn("❌ Worker HTTP 오류:", res.status, errText);
      return {text:"응답 오류가 발생했습니다. (상태: " + res.status + ") 잠시 후 다시 시도해 주세요.", limited:false};
    }
    
    let data;
    const contentType = res.headers.get("content-type") || "";
    if (contentType.includes("application/json")) {
      data = await res.json();
    } else {
      const text = await res.text();
      console.warn("⚠️ Worker 응답이 JSON이 아님:", text.substring(0, 200));
      try {
        data = JSON.parse(text);
      } catch(e) {
        return {text:"Worker 응답 형식 오류. 관리자에게 문의해 주세요.", limited:false};
      }
    }
    
    console.log("✅ API 응답 수신:", data);
    
    // 다양한 응답 형식 지원
    const text = 
      data.content?.[0]?.text ||
      data.text ||
      data.message ||
      (typeof data === 'string' ? data : null);
    
    if (!text) {
      console.warn("⚠️ API 응답에서 텍스트를 찾을 수 없음:", data);
      return {text:"AI 답변을 받지 못했습니다. 잠시 후 다시 시도해 주세요.", limited:false};
    }
    
    return {text: String(text).trim(), remaining, limited:false};
  } catch(e) {
    clearTimeout(timer);
    console.error("💥 API 호출 예외:", e.name, e.message, e.stack);
    if (e.name==="AbortError") {
      return {text:"응답 시간이 초과되었습니다. (12초) 잠시 후 다시 시도해 주세요.", limited:false};
    }
    return {text:"네트워크 오류: " + (e.message || "알 수 없는 오류"), limited:false};
  }
}

function buildLG(){
  const g=document.getElementById("lgG");g.innerHTML="";

    d.className="lg-opt"+(code===CL?" act":"");

function esc(s){
  if(!s)return"";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/\n/g,"<br>");
}
function scrollBot(){setTimeout(()=>document.getElementById("chat").scrollTo({top:99999,behavior:"smooth"}),50);}
function showNode(id){window._lastNodeId=id;
  VP.push(id);
  const node=tr()[id];
  if(!node)return;
  document.getElementById("pF").style.width=Math.min(10+VP.length*10,95)+"%";
  if(node.type==="question"){addBot(null,node.text,false,false,null);renderOpts(node.options);}

const STOP = new Set(['이','가','은','는','을','를','의','도','에','로','으로','에서','와','과','해요','하나요','되나요','있나요','어떤','어떻게','무엇','뭔가요','뭐','좋은가요','알려주세요','궁금','해','거','요','게','된','는데','인가요','인지','좀','더','가장','제일','잘','좋은','좋을','그리고','하면','이면','처럼','같은','이런','저런','다른','많이','적게','오래']);

function extractKW(q) {
  return q.replace(/[^가-힣a-zA-Z0-9\s\-]/g,'').split(/\s+/).filter(w=>w.length>=2&&!STOP.has(w));
}

function strictLocalMatch(q) {
  const ql = q.toLowerCase().replace(/\s+/g,' ');
  
  // 1단계: EXPERT_MAP에서 전문 용어 직접 매칭
  for (const {node, terms} of EXPERT_MAP) {
    const matched = terms.filter(t => ql.includes(t.toLowerCase()));
    if (matched.length >= 1) return node;
  }
  
  // 2단계: 기존 KW 매칭 — 단, 핵심 구별 키워드 2개 이상 필요
  const kws = extractKW(q);
  let bestNode = null, bestScore = 0;
  
  for (const {n, k} of KW) {
    const hits = k.filter(w => ql.includes(w.toLowerCase()));
    if (hits.length === 0) continue;
    
    // 일반 단어만 있는 경우 제외 (예: '성장'만 있는 경우)
    const genericTerms = ['성장','growth','成长','크','클','키','小','身','height'];
    const hasSpecific = hits.some(w => !genericTerms.some(g => w.toLowerCase() === g.toLowerCase()) && w.length >= 3);
    
    if (!hasSpecific && hits.length < 2) continue; // 너무 일반적인 매칭 제외
    
    const score = hits.length * (hasSpecific ? 2 : 1);
    if (score > bestScore) { bestScore = score; bestNode = n; }
  }
  
  return bestScore >= 2 ? bestNode : null; // 최소 점수 이상일 때만 매칭
}

function checkLimit(code, ip) {
  const today = new Date().toISOString().slice(0, 10);
  const key = `${STORAGE_USAGE}_${code}_${today}`;
  const used = parseInt(localStorage.getItem(key) || "0");
  return {ok: used < DAILY_LIMIT, used, remaining: Math.max(0, DAILY_LIMIT - used)};
}

function incrUsage(code, ip) {
  const today = new Date().toISOString().slice(0, 10);
  const key = `${STORAGE_USAGE}_${code}_${today}`;
  const used = parseInt(localStorage.getItem(key) || "0");
  const newUsed = used + 1;
  localStorage.setItem(key, String(newUsed));
  return newUsed;
}

}

function validateCode(code) {
  if (!code || code.length !== 7) return {ok: false, msg: "코드 형식이 잘못되었습니다 (7자리)"};
  const prefix = code[0];
  const issueMonth = parseInt(code.substring(1, 3));
  const birthMonth = parseInt(code.substring(3, 5));
  const birthDay = parseInt(code.substring(5, 7));
  
  if (isNaN(issueMonth) || isNaN(birthMonth) || isNaN(birthDay)) {
    return {ok: false, msg: "형식이 올바르지 않습니다"};
  }
  if (issueMonth < 1 || issueMonth > 12) {
    return {ok: false, msg: "발급 월이 유효하지 않습니다 (1-12)"};
  }
  if (birthMonth < 1 || birthMonth > 12) {
    return {ok: false, msg: "생월이 유효하지 않습니다 (1-12)"};
  }
  if (birthDay < 1 || birthDay > 31) {
    return {ok: false, msg: "생일이 유효하지 않습니다 (1-31)"};
  }
  
  const today = new Date();
  const codeYear = today.getFullYear();
  const codeDate = new Date(codeYear, issueMonth - 1, 1);
  const expireDate = new Date(codeYear, issueMonth, 0);
  
  if (today > expireDate) {
    return {ok: false, msg: "코드가 만료되었습니다"};
  }
  
  return {ok: true, code};
}

// AI 답변을 채팅창에 직접 표시
function addDirectAI(result) {
  const chat = document.getElementById("chat");
  const row = document.createElement("div");
  row.className = "row bot";
  const ava = document.createElement("div");
  ava.className = "ava"; ava.textContent = result.offTopic ? "🌿" : "🤖";
  const bub = document.createElement("div");
  bub.className = "bub";
  if (result.offTopic || result.noKey) {
    // 주제 외 질문 또는 키 없음 → 심플하게
    bub.innerHTML = '<div class="ai-body">' + esc(result.text).replace(/\n/g,'<br>') + '</div>';
  } else {
    bub.innerHTML = '<div class="ai-direct">' +
      '<span class="ai-badge">AI 일반 답변</span>' +
      '<div class="ai-body">' + esc(result.text).replace(/\n/g,'<br>') + '</div>' +
      (!result.limited ? '<div class="ai-remain">오늘 남은 AI 질문: <strong>' + result.remaining + '/' + AI_DAILY_LIMIT + '</strong>회</div>' : '') +
      '</div>';
  }
  row.appendChild(ava); row.appendChild(bub);
  chat.appendChild(row); scrollBot();
}

// ══════════════════════════════════════════════
// sendQ 교체: 엄격 매칭 → AI 직접 답변 순서
// ══════════════════════════════════════════════
async function sendQ() {
  const el = document.getElementById("inp");
  const q = el.value.trim(); if (!q) return;
  el.value = "";
  document.getElementById("sndBtn").disabled = true;
  addUsr(q);
  document.getElementById("oL").innerHTML = "";

  // 1단계: 엄격한 로컬 매칭
  const localNode = strictLocalMatch(q);
  if (localNode && tr()[localNode]) {
    document.getElementById("sndBtn").disabled = false;
    setTimeout(() => showNode(localNode), 400);
    return;
  }

  // 2단계: AI 직접 답변
  const chat = document.getElementById("chat");
  const loadRow = document.createElement("div");
  loadRow.className = "row bot"; loadRow.id = "loadRow";
  const la = document.createElement("div"); la.className = "ava"; la.textContent = "🤖";
  const lb = document.createElement("div"); lb.className = "rt-bub";
  lb.innerHTML = '<div class="rt-spin"></div><span>' + lm().srch + "</span>";
  loadRow.appendChild(la); loadRow.appendChild(lb);
  chat.appendChild(loadRow); scrollBot();

  let aiResult = null;
  try {
    aiResult = await callAIWithGate(q);
  } catch(e) {
    console.warn("AI 호출 오류:", e);
  } finally {
    const ind = document.getElementById("loadRow"); if (ind) ind.remove();
    document.getElementById("sndBtn").disabled = false;
  }

  if (aiResult) {
    addDirectAI(aiResult);
  } else {
    // API 호출 실패한 경우
    const failMsg = {
      text: "죄송합니다. 현재 AI 답변 서비스를 이용할 수 없습니다.\n관련 항목에서 정보를 확인하거나 병원에 문의해 주세요. 📞 02-523-0111",
      noKey: true
    };
    addDirectAI(failMsg);
  }
  // ✅ AI 답변 후에도 현재 옵션 버튼 복원
  restoreOptions();
}

function restoreOptions() {
  // 현재 노드의 옵션 버튼을 다시 표시
  const oL = document.getElementById("oL");
  if (!oL || oL.innerHTML.trim()) return; // 이미 있으면 skip
  const node = tr()[window._lastNodeId];
  if (node && node.options) {
    oL.innerHTML = "";
    node.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "opt";
      btn.textContent = opt.text;
      btn.onclick = () => { showNode(opt.next); };
      oL.appendChild(btn);
    });
    // 힌트 텍스트
    const hint = document.querySelector(".opt-hint");
    if (hint) hint.style.display = "block";
  }
}
