<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>삼성자라다 AI 챗봇</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #F7F5F1;
  --surface:   #FFFFFF;
  --surface2:  #F2EFE9;
  --ink:       #1A1512;
  --ink2:      #6B6258;
  --ink3:      #A09890;
  --accent:    #3B5BDB;
  --accent2:   #1E3A8A;
  --accent-lt: #EEF2FF;
  --teal:      #0D9488;
  --teal-lt:   #F0FDFA;
  --amber:     #D97706;
  --amber-lt:  #FFFBEB;
  --rose:      #E11D48;
  --rose-lt:   #FFF1F2;
  --sage:      #4D7C5A;
  --sage-lt:   #F0FDF4;
  --border:    #E8E3DB;
  --shadow:    0 2px 16px rgba(26,21,18,.08);
  --shadow-lg: 0 8px 40px rgba(26,21,18,.12);
  --r:         14px;
  --r-sm:      8px;
  --serif:     'Noto Serif KR', Georgia, serif;
  --sans:      'Noto Sans KR', system-ui, sans-serif;
}

html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.6;
}

/* ── Header ────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 200;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.header-inner {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
  height: 60px;
}
.logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--teal));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.logo-text h1 {
  font-family: var(--serif);
  font-size: 1rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.2;
}
.logo-text span {
  font-size: .7rem;
  color: var(--ink3);
  font-weight: 300;
}
.header-badge {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.badge-count {
  font-size: .72rem;
  background: var(--accent-lt);
  color: var(--accent);
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500;
}
.badge-pro {
  font-size: .68rem;
  background: var(--ink);
  color: #fff;
  padding: 3px 8px;
  border-radius: 6px;
  font-weight: 500;
  letter-spacing: .04em;
}

/* ── Main Layout ───────────────────────────────────── */
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* ── Hero Search ───────────────────────────────────── */
.hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 28px 24px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.hero-title {
  font-family: var(--serif);
  font-size: 1.35rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 4px;
}
.hero-sub {
  font-size: .82rem;
  color: var(--ink3);
  margin-bottom: 20px;
}

.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  transition: border-color .2s, box-shadow .2s;
  overflow: hidden;
}
.search-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,91,219,.12);
  background: #fff;
}
.search-icon {
  padding: 0 14px;
  color: var(--ink3);
  font-size: 1rem;
  flex-shrink: 0;
}
#searchInput {
  flex: 1;
  border: none;
  background: transparent;
  font-family: var(--sans);
  font-size: .95rem;
  color: var(--ink);
  padding: 14px 0;
  outline: none;
  min-width: 0;
}
#searchInput::placeholder { color: var(--ink3); }
.search-clear {
  display: none;
  border: none;
  background: none;
  color: var(--ink3);
  padding: 0 8px;
  cursor: pointer;
  font-size: 1rem;
}
.search-clear.show { display: block; }
#searchBtn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 0 22px;
  height: 100%;
  min-height: 50px;
  cursor: pointer;
  font-family: var(--sans);
  font-size: .88rem;
  font-weight: 500;
  transition: background .15s;
  flex-shrink: 0;
}
#searchBtn:hover { background: var(--accent2); }

.search-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 10px;
  font-size: .75rem;
  color: var(--ink3);
}
.search-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink3); }
#searchTime { color: var(--teal); font-weight: 500; }

/* ── Autocomplete ──────────────────────────────────── */
.autocomplete-wrap {
  position: relative;
}
#autocompleteList {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  box-shadow: var(--shadow-lg);
  z-index: 300;
  overflow: hidden;
  display: none;
}
.ac-item {
  padding: 11px 16px;
  cursor: pointer;
  font-size: .88rem;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background .1s;
}
.ac-item:hover { background: var(--accent-lt); color: var(--accent); }
.ac-icon { font-size: .8rem; color: var(--ink3); }

/* ── Category Tabs ─────────────────────────────────── */
.cat-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 20px;
  margin-bottom: 16px;
}
.cat-label {
  font-size: .7rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 12px;
}
.cat-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border: 1.5px solid var(--border);
  border-radius: 24px;
  background: var(--surface);
  color: var(--ink2);
  font-family: var(--sans);
  font-size: .82rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all .15s;
}
.cat-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
.cat-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.cat-btn .cat-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: .7;
}
.cat-count {
  font-size: .7rem;
  opacity: .7;
}

/* ── Quick Questions ───────────────────────────────── */
.quick-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 20px;
  margin-bottom: 16px;
}
.quick-label {
  font-size: .7rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 12px;
}
.quick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}
.q-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 12px;
  font-family: var(--sans);
  font-size: .8rem;
  color: var(--ink2);
  cursor: pointer;
  text-align: left;
  line-height: 1.4;
  transition: all .15s;
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.q-btn::before {
  content: "→";
  color: var(--ink3);
  flex-shrink: 0;
  margin-top: 1px;
  font-size: .75rem;
}
.q-btn:hover {
  background: var(--accent-lt);
  border-color: var(--accent);
  color: var(--accent);
}
.q-btn:hover::before { color: var(--accent); }

/* ── Results Area ──────────────────────────────────── */
#resultsArea { margin-top: 8px; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 64px 24px;
  color: var(--ink3);
}
.empty-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  display: block;
  opacity: .5;
}
.empty-state h3 {
  font-family: var(--serif);
  font-size: 1.05rem;
  color: var(--ink2);
  margin-bottom: 6px;
}
.empty-state p { font-size: .82rem; }

/* No results */
.no-results {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 40px 24px;
  text-align: center;
  color: var(--ink3);
}
.no-results h3 {
  font-family: var(--serif);
  font-size: 1rem;
  color: var(--ink2);
  margin-bottom: 6px;
}
.no-results p { font-size: .82rem; }

/* Result count bar */
.result-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding: 0 2px;
}
.result-count {
  font-size: .8rem;
  color: var(--ink2);
  font-weight: 500;
}
.result-count strong { color: var(--accent); }

/* ── Result Card ───────────────────────────────────── */
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 10px;
  overflow: hidden;
  transition: box-shadow .15s, border-color .15s;
  animation: slideIn .2s ease;
}
.result-card:hover {
  box-shadow: var(--shadow);
  border-color: #D4CABB;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 18px 14px;
  cursor: pointer;
}
.card-num {
  font-size: .68rem;
  font-weight: 700;
  color: var(--ink3);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 7px;
  flex-shrink: 0;
  margin-top: 2px;
  font-family: 'SF Mono', 'Consolas', monospace;
  letter-spacing: .03em;
}
.card-body { flex: 1; min-width: 0; }
.card-cat {
  font-size: .67rem;
  font-weight: 600;
  letter-spacing: .07em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.card-title {
  font-size: .92rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.45;
  margin-bottom: 5px;
}
.card-summary {
  font-size: .8rem;
  color: var(--ink2);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-chevron {
  color: var(--ink3);
  font-size: 1rem;
  flex-shrink: 0;
  margin-top: 2px;
  transition: transform .2s;
}
.card-chevron.open { transform: rotate(180deg); }

/* Category colors */
.cat-growth   { color: var(--accent); }
.cat-nutrition { color: var(--teal); }
.cat-obesity  { color: var(--amber); }
.cat-precocious { color: var(--rose); }
.cat-insulin  { color: var(--sage); }
.cat-final    { color: var(--ink2); }

/* Card expand area */
.card-expand {
  display: none;
  border-top: 1px solid var(--border);
}
.card-expand.open { display: block; }

.answer-box {
  padding: 18px;
  font-size: .86rem;
  line-height: 1.9;
  color: var(--ink2);
  background: var(--surface2);
  border-left: 3px solid var(--accent);
}
.answer-label {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
  display: block;
}

.card-actions {
  display: flex;
  gap: 8px;
  padding: 12px 18px;
  background: var(--surface);
}
.act-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: .8rem;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink2);
  transition: all .15s;
}
.act-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
.act-btn.video {
  background: #FF0000;
  border-color: #FF0000;
  color: #fff;
}
.act-btn.video:hover { background: #CC0000; border-color: #CC0000; }
.act-btn.fav.active { border-color: var(--amber); color: var(--amber); }

/* ── History ───────────────────────────────────────── */
.history-section {
  padding-top: 10px;
  display: none;
}
.history-section.show { display: block; }
.history-label {
  font-size: .7rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 10px;
}
.history-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.h-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: .78rem;
  color: var(--ink2);
  cursor: pointer;
  transition: all .15s;
}
.h-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }

/* ── Toast ─────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink);
  color: #fff;
  padding: 10px 20px;
  border-radius: 24px;
  font-size: .82rem;
  z-index: 999;
  transition: transform .3s;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Mobile ─────────────────────────────────────────── */
@media (max-width: 640px) {
  .header-inner { height: 54px; }
  .logo-text h1 { font-size: .92rem; }
  .hero { padding: 20px 16px 16px; }
  .hero-title { font-size: 1.15rem; }
  .main { padding: 16px 12px 80px; }
  .cat-section, .quick-section { padding: 14px 14px; }
  .quick-grid { grid-template-columns: 1fr; }
  .card-header { padding: 14px 14px 12px; }
  .card-title { font-size: .86rem; }
  .card-actions { flex-wrap: wrap; }
  .act-btn { flex: 1; justify-content: center; }
  .answer-box { padding: 14px; font-size: .82rem; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo-mark">🌱</div>
    <div class="logo-text">
      <h1>삼성자라다 AI 챗봇</h1>
      <span>소아내분비·성장 전문 Q&A</span>
    </div>
    <div class="header-badge">
      <span class="badge-count">437 Q&A</span>
      <span class="badge-pro">PRO v10</span>
    </div>
  </div>
</header>

<!-- Main -->
<main class="main">

  <!-- Hero Search -->
  <section class="hero">
    <h2 class="hero-title">무엇이 궁금하세요?</h2>
    <p class="hero-sub">성장·성조숙증·비만·영양·인슐린 — 437개 전문 Q&A에서 찾아드려요</p>
    <div class="autocomplete-wrap">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput"
          placeholder="예: 성장호르몬 주사 부작용, 목 뒤 까만데, 뼈나이 검사…"
          autocomplete="off" inputmode="search">
        <button class="search-clear" id="clearBtn" title="지우기">✕</button>
        <button id="searchBtn">검색</button>
      </div>
      <div id="autocompleteList"></div>
    </div>
    <div class="search-meta">
      <span>데이터베이스 437개</span>
      <span class="dot"></span>
      <span id="searchTime"></span>
    </div>

    <!-- History -->
    <div class="history-section" id="historySection">
      <p class="history-label">🕑 최근 검색</p>
      <div class="history-chips" id="historyChips"></div>
    </div>
  </section>

  <!-- Category Tabs -->
  <section class="cat-section">
    <p class="cat-label">📂 카테고리</p>
    <div class="cat-tabs" id="catTabs">
      <button class="cat-btn active" data-category="all">
        <span class="cat-dot"></span> 전체 <span class="cat-count">437</span>
      </button>
      <button class="cat-btn" data-category="growth">
        <span class="cat-dot"></span> 성장 <span class="cat-count" id="cnt-growth"></span>
      </button>
      <button class="cat-btn" data-category="precocious">
        <span class="cat-dot"></span> 성조숙증 <span class="cat-count" id="cnt-precocious"></span>
      </button>
      <button class="cat-btn" data-category="nutrition">
        <span class="cat-dot"></span> 영양 <span class="cat-count" id="cnt-nutrition"></span>
      </button>
      <button class="cat-btn" data-category="obesity">
        <span class="cat-dot"></span> 비만 <span class="cat-count" id="cnt-obesity"></span>
      </button>
      <button class="cat-btn" data-category="insulin">
        <span class="cat-dot"></span> 인슐린 <span class="cat-count" id="cnt-insulin"></span>
      </button>
    </div>
  </section>

  <!-- Quick Questions -->
  <section class="quick-section">
    <p class="quick-label">💬 자주 묻는 질문</p>
    <div class="quick-grid">
      <button class="q-btn" data-query="키 작은데 뭘 챙겨줘요">키 작은데 뭘 챙겨줘요?</button>
      <button class="q-btn" data-query="우유 알레르기 있는데 어떡해요">우유 알레르기 있는데 어떡해요?</button>
      <button class="q-btn" data-query="비만이 키 성장에 영향 주나요">비만이 키 성장에 영향 주나요?</button>
      <button class="q-btn" data-query="인슐린 저항성이 뭐예요">인슐린 저항성이 뭐예요?</button>
      <button class="q-btn" data-query="목 뒤가 까만데 때 안 밀려요">목 뒤가 까만데 때 안 밀려요</button>
      <button class="q-btn" data-query="왜 자꾸 단것만 찾나요">왜 자꾸 단것만 찾나요?</button>
    </div>
  </section>

  <!-- Results -->
  <div id="resultsArea">
    <div class="empty-state" id="emptyState">
      <span class="empty-icon">🔬</span>
      <h3>검색어를 입력하거나 위의 질문을 클릭해보세요</h3>
      <p>437개의 전문 Q&A에서 정확한 답변을 찾아드려요</p>
    </div>
  </div>

</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const videoDB = [

    { id: 275, title: "비엠아이로 우리 아이의 비만 여부를 판단할 때 주의할 점이 있나요?", keywords: ["비만"], patterns: [], summary: "비엠아이로 우리 아이의 비만 여부를 판단할 때 주의할 점이 있나요? 성인과 기준이 다른가요? 네, 아이들의 비엠아이 판정 기준은 성인과 완전히 ...", related: [], category: "obesity", answer: "비엠아이로 우리 아이의 비만 여부를 판단할 때 주의할 점이 있나요? 성인과 기준이 다른가요? 네, 아이들의 비엠아이 판정 기준은 성인과 완전히 다릅니다. 성인은 이십오 이상이라는 고정된 수치를 기준으로 하지만, 아이들은 나이와 성별에 따라 키와 몸무게가 계속 변하기 때문에, 백분위수라는 상대적인 지표로 평가해야 합니다. 백분위수가 같은 나이, 같은 성별 아이의 백명을 한 줄로 세웠을 때, 우리 아이가 어디쯤 있을지를 나타내는 숫자인데요. 오백분위수 미만이면 저체중, 오십백분위수 이상에서 팔십오 백분위수 미만은 정상으로 봅니다. 팔십오백분위수 이상에서 구십오 백분위수 미만은 과체중 그리고 구십오 백분위수 이상이면 비만으로 진단합니다. 이는 백 명 중 체중이 뒤에서 오 등 안에 들 정도로 많다는 뜻입니다. 성인 기준을 아이에게 그대로 적용하면 비만을 정상으로 오해하거나 반대로 정상인 아이를 비만으로 착각할 수 있습니다. 따라서 반드시 소아 청소년 성장 도표상에 백분위수를 확인해야 합니다.", videoUrl: "https://youtube.com/shorts/v2cBdl0TgQM?si=QH9ZEUT9hnjbxGFG" },
    { id: 276, title: "비만도는 어떻게 계산하고, 어떤 기준으로 판단하나요?", keywords: ["비만"], patterns: [], summary: "비만도는 어떻게 계산하고, 어떤 기준으로 판단하나요? 비만도는 현재 아이의 키에 적합한 표준 체중과 비교하여, 실제 체중이 얼마나 더 나가는지를...", related: [], category: "obesity", answer: "비만도는 어떻게 계산하고, 어떤 기준으로 판단하나요? 비만도는 현재 아이의 키에 적합한 표준 체중과 비교하여, 실제 체중이 얼마나 더 나가는지를 나타내는 지표입니다. 계산 방법은 실제 체중에서 표준 체중을 뺀 값을 다시 표준 체중으로 나눈 뒤 백을 곱하면 되는데요. 예를 들어, 아이의 키에 맞는 표준 체중이 사십 킬로그램인데 실제 체중이 사십팔 킬로그램이라면, 초과한 팔 킬로그램을 표준 체중으로 나누어 이십 퍼센트라는 비만도 값이 나옵니다. 판정 기준은 다음과 같습니다. 마이너스 십에서 플러스 십 퍼센트 사이는 정상, 플러스 십에서 이십 퍼센트 미만은 과체중입니다. 그리고 플러스 이십에서 삼십 퍼센트 미만은 경도 비만, 삼십에서 오십 퍼센트 미만은 중등도 비만이며, 오십 퍼센트 이상은 고도 비만으로 분류합니다. 비만도가 오십 퍼센트 이상이라는 것은 표준 체중보다 절반 이상 몸무게가 더 나간다는 뜻인데요. 이는 소아 성인병이나 합병증 위험이 매우 높은 심각한 상태임을 의미합니다.", videoUrl: "https://youtube.com/shorts/9GwHUj6vbGk?si=qNT9Hzt3YTiCQmAe" },
    { id: 277, title: "체지방률은 BMI나 비만도보다 정확하다고 하던데, 어떻게 측정하나요?", keywords: ["비만", "운동"], patterns: [], summary: "체지방률은 BMI나 비만도보다 정확하다고 하던데, 어떻게 측정하나요? 체지방률은 아이의 몸속에 있는 지방의 실제 비율을 재는 것이기에 가장 정확...", related: [], category: "obesity", answer: "체지방률은 BMI나 비만도보다 정확하다고 하던데, 어떻게 측정하나요? 체지방률은 아이의 몸속에 있는 지방의 실제 비율을 재는 것이기에 가장 정확한 방법입니다. 비엠아이나 비만도는 근육과 지방을 구분하지 못해, 근육량이 많은 운동선수 아이가 비만으로 오해받는 한계가 있지만, 체지방률은 이를 정확히 가려냅니다. 측정 방법은 생체전기저항분석법을 주로 사용하는데요. 병원이나 보건소에 있는 체성분 분석기를 이용합니다. 맨발로 기계에 올라가 손잡이를 잡고 있으면 미세한 전류가 몸을 통과하며, 수분이 많은 근육과 수분이 적은 지방을 구분해냅니다. 전혀 아프거나 위험하지 않으며 몇 분 안에 결과가 나옵니다. 체지방률을 통한 비만 진단 기준은 성별에 따라 조금 다릅니다. 남자아이는 체지방률이 이십오 퍼센트 이상일 때, 여자아이는 삼십 퍼센트 이상일 때 비만으로 진단합니다. 여자아이는 신체 특성상 남자아이보다 지방 비율이 조금 더 높은 것이 정상이므로 진단 기준에 차이가 있습니다.", videoUrl: "https://youtube.com/shorts/Hdr_zpSRim8?si=REqCBq4q-y7vgSYU" },
    { id: 278, title: "우리나라 소아비만 비율이 얼마나 되나요? 요즘 아이들이 예전보다 비만이 많나요?", keywords: ["비만", "수면", "우리나라", "소아비만", "비율이"], patterns: ["우리나라 소아비만 비율이 얼마나 되나요? 요즘 아이들이 예전보다 비만이 많나요?"], summary: "우리나라 소아비만 비율이 얼마나 되나요? 요즘 아이들이 예전보다 비만이 많나요? 네, 현재 우리나라 소아비만은 매우 심각한 수준입니다. 이천이십삼년 기준 소아청소...", related: [], category: "obesity", answer: "우리나라 소아비만 비율이 얼마나 되나요? 요즘 아이들이 예전보다 비만이 많나요? 네, 현재 우리나라 소아비만은 매우 심각한 수준입니다. 이천이십삼년 기준 소아청소년 비만 유병률은 십삼 점 팔 퍼센트이며, 과체중까지 포함하면 이십이 점 일 퍼센트에 달합니다. 즉, 한 반에 서른 명이 있다면 네 명은 비만이고, 다섯 명 중 한 명꼴로 체중 관리가 필요한 상태입니다. 지난 십 년간의 변화를 보면 더욱 놀라운데요. 남아의 경우 이천십이년에는 십 점 사 퍼센트였으나, 이천이십일년에는 이십오 점 구 퍼센트로 약 이 점 오 배 급증했습니다. 여아 역시 이천십이년 팔 점 팔 퍼센트에서 이천이십일년 십이 점 삼 퍼센트로 약 일 점 사 배 증가했습니다. 특히 코로나 일구 시기를 거치며 급격히 늘어났는데, 외출 제한으로 활동량은 줄어든 반면 배달 음식이나 고열량 간식 섭취는 늘어났기 때문입니다. 다행히 이천이십일년 이후 조금씩 감소하는 추세이긴 하지만, 여전히 예전에 비해 훨씬 높은 수준이므로 각별한 주의가 필요합니다.", videoUrl: "https://youtube.com/shorts/71by_Er6fEU?si=aBQ-e9SVQ2jIa7eZ" },
    { id: 279, title: "소아비만은 유전인가요?", keywords: ["비만", "수면", "유전"], patterns: [], summary: "소아비만은 유전인가요? 부모가 비만이면 아이도 비만이 될 확률이 높나요? 많은 분이  우리는 가족력이 있어서 다들 통통해요 라고 말씀하시곤 합니...", related: [], category: "obesity", answer: "소아비만은 유전인가요? 부모가 비만이면 아이도 비만이 될 확률이 높나요? 많은 분이 \"우리는 가족력이 있어서 다들 통통해요\"라고 말씀하시곤 합니다. 실제로 유전적 요인은 분명히 존재합니다. 연구에 따르면 부모 모두 비만일 때 자녀가 비만이 될 확률은 약 팔십 퍼센트, 한쪽 부모님만 비만일 때는 약 사십 퍼센트 정도로 나타납니다. 하지만 이 수치가 오로지 유전자 때문만은 아닙니다. 이는 가족이 공유하는 식습관과 생활 환경이 유전적 소인과 결합된 결과입니다. 즉, 유전보다 더 무서운 것은 살찌는 습관의 대물림입니다. 첫째로 식습관 문제입니다. 맵고 짠 음식이나 고칼로리 배달 음식을 즐기는 가족 분위기가 영향을 줍니다. 둘째는 활동량 부족입니다. 텔레비전 시청이나 스마트폰 사용 위주의 정적인 휴식 습관이 원인이 되기도 하죠. 그 외에도 수면 부족이나 스트레스 관리 방식 등 생활 패턴 자체가 닮아가는 것이 큰 이유입니다. 따라서 아이의 비만은 아이 혼자만의 숙제가 아닙니다. 가족 전체의 생활 습관을 함께 점검하고 바꾸는 것이 가장 확실한 해결책입니다.", videoUrl: "https://youtube.com/shorts/3TkbpwPV7b4?si=QQw274uWu-GID36U" },

    { id: 297, title: "인슐린 저항성이 있으면 왜 살이 더 잘 찌나요?", keywords: ["인슐린", "운동", "영양", "호르몬"], patterns: [], summary: "인슐린 저항성이 있으면 왜 살이 더 잘 찌나요? 인슐린 저항성이 생기면 우리 몸은 혈당을 조절하기 위해 췌장에서 평소보다 훨씬 많은 양의 인슐린...", related: [], category: "insulin", answer: "인슐린 저항성이 있으면 왜 살이 더 잘 찌나요? 인슐린 저항성이 생기면 우리 몸은 혈당을 조절하기 위해 췌장에서 평소보다 훨씬 많은 양의 인슐린을 뿜어내게 됩니다. 문제는 인슐린이 단순히 혈당만 조절하는 게 아니라, 강력한 지방 저장 호르몬이라는 점입니다. 그 이유는 크게 세 가지입니다. 첫째로 지방 연소를 차단합니다. 혈액 속에 인슐린 농도가 높게 유지되면 우리 몸은 이를 에너지가 넘치는 상태로 착각합니다. 그래서 이미 몸에 쌓인 지방을 꺼내 쓰는, 즉 지방을 태우는 스위치를 아예 꺼버립니다. 둘째는 지방 저장을 가속화합니다. 인슐린은 혈액 속의 영양분을 어떻게든 지방 세포 속에 집어넣으려는 성질이 있는데요. 인슐린 수치가 높으면 남는 에너지를 지방으로 저장하는 속도가 매우 빨라집니다. 셋째는 에너지 효율의 악순환입니다. 결과적으로 세포는 에너지를 못 받아서 배고프다고 아우성치는데, 몸은 지방만 계속 쌓아두는 에너지 저장 모드로 고착되는 것이죠. 이 때문에 인슐린 저항성이 있는 아이들은 다른 아이들과 똑같이 먹거나 오히려 적게 먹어도 살이 더 쉽게 찌고요. 운동을 해도 살이 잘 빠지지 않는 억울한 상황이 반복되는 것입니다.", videoUrl: "https://youtube.com/shorts/rXSOSN1ROgs?si=jOJJHfllz-OVkUqH" },

    { id: 299, title: "우리 아이 목 뒤가 까만데 때가 안 밀려요. 이게 인슐린 저항성인가요?  네, 부모님...", keywords: ["사춘기", "인슐린", "비만", "당뇨병", "콜레스테롤"], patterns: ["우리 아이 목 뒤가 까만데 때가 안 밀려요. 이게 인슐린 저항성인가요?  네, 부모님께서 "], summary: "우리 아이 목 뒤가 까만데 때가 안 밀려요. 이게 인슐린 저항성인가요? 네, 부모님께서 보신 것은 단순히 씻기지 않은 때가 아닙니다. 의학적으로는 흑색극세포증이라...", related: [], category: "insulin", answer: "우리 아이 목 뒤가 까만데 때가 안 밀려요. 이게 인슐린 저항성인가요? 네, 부모님께서 보신 것은 단순히 씻기지 않은 때가 아닙니다. 의학적으로는 흑색극세포증이라 불리는 증상인데요. 이는 아이의 몸이 보내는 매우 중요한 건강 경고 신호입니다. 왜 이런 변화가 생기는 걸까요? 혈액 속에 인슐린 수치가 너무 높아지면, 즉 인슐린 저항성이 생기면 과도한 인슐린이 피부 세포의 증식을 비정상적으로 자극합니다. 이 과정에서 피부가 벨벳처럼 두꺼워지고 색소가 침착되어 검게 변하게 되는 것이죠. 주로 목 뒤나 겨드랑이, 사타구니처럼 피부가 접히는 부위에 잘 나타납니다. 그런데 이건 때가 아니기 때문에 아무리 강하게 밀어도 지워지지 않습니다. 오히려 과하게 문지르면 피부에 상처가 나거나 증상이 더 나빠질 수 있습니다. 흑색극세포증은 현재 아이의 몸속에서 인슐린이 제대로 일하지 못하고 있다는 증거입니다. 향후 제이 형 당뇨병이나 대사 증후군으로 진행될 위험이 매우 높다는 것을 시각적으로 보여주는 지표인 셈이죠. 이 증상을 없애는 유일하고 근본적인 방법은 피부 연고가 아닙니다. 체중 감량과 식단 교정을 통해 인슐린 저항성을 개선하는 것이 정답입니다. 살이 빠지고 대사가 정상화되면 피부 색깔도 자연스럽게 다시 밝아집니다.", videoUrl: "https://youtube.com/shorts/xloWBF3Ks90?si=2D2yF30e-fyXaYtm" },

    { id: 301, title: "인슐린 저항성이 있으면 밥 먹고 나서 유독 졸려 하나요?", keywords: ["인슐린", "단백질"], patterns: [], summary: "인슐린 저항성이 있으면 밥 먹고 나서 유독 졸려 하나요? 네, 그렇습니다. 식사 후 참기 힘들 정도로 졸음이 쏟아지는 식곤증은, 인슐린 저항성을...", related: [], category: "insulin", answer: "인슐린 저항성이 있으면 밥 먹고 나서 유독 졸려 하나요? 네, 그렇습니다. 식사 후 참기 힘들 정도로 졸음이 쏟아지는 식곤증은, 인슐린 저항성을 알리는 대표적인 신호 중 하나입니다. 그 원리는 이렇습니다. 첫째로 혈당 스파이크와 추락 때문입니다. 인슐린 저항성이 있는 아이가 당분이 많거나 흰밥, 빵, 면 같은 정제 탄수화물 위주의 식사를 하면, 혈당이 비정상적으로 치솟는 혈당 스파이크가 발생합니다. 둘째는 인슐린의 과다 투입입니다. 치솟은 혈당을 잡기 위해 췌장은 감당하기 힘들 정도의 인슐린을 한꺼번에 쏟아내는데요. 마지막으로 반동성 저혈당이 찾아옵니다. 과도한 인슐린 때문에 이번에는 혈당이 정상 범위 아래로 급격히 떨어지게 됩니다. 이때 뇌로 가는 에너지 공급이 일시적으로 줄어들면서 극심한 피로감과 참기 힘든 졸음이 찾아오는 것이죠. 단순히 배가 불러서 졸린 수준을 넘어, 아이가 식후에 정신을 못 차릴 정도로 졸려 하거나 짜증을 낸다면 몸속에서 혈당 롤러코스터가 작동하고 있다는 강력한 증거입니다. 이를 예방하기 위해 거꾸로 식사법을 실천해 보세요. 첫째, 채소와 같은 식이섬유를 먼저 먹어 혈당 방어막을 칩니다. 둘째, 고기나 생선 같은 단백질을 먹어 포만감을 줍니다. 마지막으로 밥이나 빵 같은 탄수화물은 가장 나중에, 적은 양만 섭취하는 것이 좋습니다.", videoUrl: "https://youtube.com/shorts/IzWRKwtlJzg?si=_Bt7L3jonORWvas9" },
    { id: 302, title: "인슐린 저항성을 그냥 두면 바로 당뇨가 되나요?", keywords: ["비만", "인슐린"], patterns: [], summary: "인슐린 저항성을 그냥 두면 바로 당뇨가 되나요? 오늘 당장 당뇨병 진단을 받는 것은 아니지만, 인슐린 저항성은 당뇨병으로 가는 직행열차를 탄 것...", related: [], category: "insulin", answer: "인슐린 저항성을 그냥 두면 바로 당뇨가 되나요? 오늘 당장 당뇨병 진단을 받는 것은 아니지만, 인슐린 저항성은 당뇨병으로 가는 직행열차를 탄 것과 같습니다. 우리 몸은 보통 세 단계를 거쳐 당뇨로 진행되는데요. 첫째는 과부하 단계입니다. 세포가 인슐린에 반응하지 않자, 췌장이 혈당을 낮추기 위해 평소보다 몇 배나 많은 인슐린을 억지로 짜내어 보냅니다. 이때까지는 검사 결과상 혈당이 정상으로 나올 수 있어 놓치기 쉽습니다. 둘째는 당뇨 전단계입니다. 췌장이 서서히 지치기 시작하면서 식후 혈당부터 조절 능력을 잃어가는 단계입니다. 혈당이 정상보다 높지만 당뇨 기준에는 미치지 않는 아주 아슬아슬한 상태이죠. 마지막은 제이 형 당뇨병입니다. 췌장의 세포가 결국 탈진해서 기능을 잃게 되면, 인슐린 분비 자체가 줄어들고 혈당이 통제 불능 상태가 됩니다. 이것이 바로 당뇨병의 시작입니다. 중요한 점은 인슐린 저항성과 당뇨 전단계는 다시 정상으로 되돌릴 수 있는 마지막 기회, 즉 골든타임이라는 것입니다. 아이들은 성인보다 세포의 회복력이 빠르기 때문에, 식단과 생활 습관을 조금만 교정해도 췌장의 기능을 충분히 회복시킬 수 있습니다. 지금이 골든타임이라는 증거들도 확인해 보세요. 당화혈색소 수치가 조금씩 오르고 있거나, 공복 혈당은 정상인데 식후 혈당만 높게 나타나는 경우, 그리고 복부 비만이 심해지며 목 뒤나 겨드랑이 색소가 짙어진다면 지금 바로 관리를 시작해야 합니다.", videoUrl: "https://youtube.com/shorts/dQDdpe2LZL8?si=qDL1KL4xgyORjJLV" },

    { id: 312, title: "수면이 인슐린 저항성과 무슨 관계가 있나요?", keywords: ["인슐린", "수면", "운동", "호르몬"], patterns: [], summary: "수면이 인슐린 저항성과 무슨 관계가 있나요? 많은 부모님이 식단과 운동에는 공을 들이시지만, 수면의 중요성은 놓치시는 경우가 많습니다. 잠이 부...", related: [], category: "insulin", answer: "수면이 인슐린 저항성과 무슨 관계가 있나요? 많은 부모님이 식단과 운동에는 공을 들이시지만, 수면의 중요성은 놓치시는 경우가 많습니다. 잠이 부족하면 아무리 좋은 음식을 먹고 운동을 해도 그 효과가 절반으로 뚝 떨어지기 때문인데요. 그 이유는 이렇습니다. 첫째로 식욕 조절 호르몬이 무너집니다. 잠이 부족하면 포만감을 느끼게 하는 렙틴 호르몬은 약 십오 점 오 퍼센트 감소하고요. 반대로 배고픔을 느끼게 하는 그렐린 호르몬은 급격히 증가합니다. 결국 아이는 자제력을 잃고 폭식을 하거나 자극적인 음식을 더 찾게 됩니다. 둘째는 스트레스 호르몬과 인슐린이 충돌합니다. 잠을 못 자면 스트레스 호르몬인 코티솔 수치가 높아지는데요. 이 코티솔은 인슐린의 작용을 직접 방해해서 혈당을 높이고 인슐린 저항성을 악화시키는 주범입니다. 셋째는 인슐린 민감도가 눈에 띄게 떨어집니다. 연구에 따르면 하루 다섯 시간만 자는 아이는 여덟 시간 자는 아이보다 인슐린 민감도가 약 이십 퍼센트나 감소합니다. 똑같은 음식을 먹어도 혈당 처리가 훨씬 안 되는 몸이 되는 것이죠. 아이들의 대사 시스템을 위해서는 충분한 잠이 필수입니다. 초등학생은 아홉 시간에서 열두 시간, 중고등학생은 여덟 시간에서 열 시간 정도의 수면이 권장됩니다. 주말에 몰아 자는 것보다 매일 정해진 시간에 일어나는 규칙성이 무엇보다 중요하고요. 특히 자기 전 스마트폰의 블루라이트는 멜라토닌 분비를 방해하므로 잠들기 전에는 화면을 멀리하는 습관을 꼭 길러주시기 바랍니다.", videoUrl: "https://youtube.com/shorts/LWvxlkqXfSQ?si=c718BcGG5y3iZCsO" },

    { id: 314, title: "인슐린 저항성이 있으면 반드시 약을 먹어야 하나요?", keywords: ["비만", "인슐린", "운동", "치료"], patterns: [], summary: "인슐린 저항성이 있으면 반드시 약을 먹어야 하나요? 아니요, 반드시 그런 것은 아닙니다. 대부분의 아이는 식단과 운동 같은 생활 습관 개선만으로...", related: [], category: "insulin", answer: "인슐린 저항성이 있으면 반드시 약을 먹어야 하나요? 아니요, 반드시 그런 것은 아닙니다. 대부분의 아이는 식단과 운동 같은 생활 습관 개선만으로도 인슐린 저항성을 충분히 극복하고 정상으로 돌아올 수 있습니다. 다만, 신체 상태에 따라 약물 치료가 필요한 특수한 경우가 있습니다. 일반적으로 열 살 이상의 소아청소년 중에서 다음과 같은 상황일 때 약물 사용을 검토합니다. 첫째, 삼 개월에서 육 개월간 노력했음에도 수치가 개선되지 않을 때입니다. 둘째, 당뇨 전단계나 당뇨로 확진되어 합병증 예방이 시급할 때입니다. 셋째, 비만도가 너무 높아 운동을 시작하기조차 어렵거나 이미 합병증이 동반된 경우입니다. 주로 사용하는 치료제로는 간에서 당 생성을 억제하는 알약인 '메트포르민'과, 최근 청소년에게도 허가된 식욕 억제 주사제인 '지엘피 원 유사체' 등이 있습니다. 여기서 가장 중요한 점은 약은 보조 바퀴일 뿐이라는 사실입니다. 약물은 고장 난 대사 시스템이 잘 돌아가도록 돕는 역할을 할 뿐, 아이 스스로 달리는 힘인 근육과 올바른 식습관을 대신해주지는 못합니다. 약물 치료를 하더라도 건강한 생활 습관이 병행되지 않으면, 약을 끊는 순간 인슐린 저항성은 다시 악화될 수밖에 없습니다.", videoUrl: "https://youtube.com/shorts/IofJwQ3kNmI?si=hhOfM3AfZuXbeR46" },
    { id: 315, title: "호마 아이알 검사 결과를 어떻게 이해해야 하나요?", keywords: ["사춘기", "인슐린", "호르몬"], patterns: [], summary: "호마 아이알 검사 결과를 어떻게 이해해야 하나요? 호마 아이알은 공복 상태의 혈당과 인슐린 수치를 종합해서, 우리 몸이 인슐린에 얼마나 잘 반응...", related: [], category: "insulin", answer: "호마 아이알 검사 결과를 어떻게 이해해야 하나요? 호마 아이알은 공복 상태의 혈당과 인슐린 수치를 종합해서, 우리 몸이 인슐린에 얼마나 잘 반응하는지 수치화한 지표입니다. 검사 결과지에서 공복 혈당과 공복 인슐린 수치를 찾아보세요. 이 두 수치를 곱한 뒤 사백 오로 나누면 호마 아이알 지수가 나옵니다. 여기서 꼭 알아두셔야 할 점은 아이들은 성인과 기준이 다르다는 것입니다. 성인은 보통 이 점 오 이상이면 저항성이 있다고 보지만, 소아청소년은 성장을 위해 호르몬이 요동치는 시기라 훨씬 높은 기준치를 적용합니다. 따라서 성인 기준을 아이에게 그대로 대입해 너무 걱정하실 필요는 없습니다. 사춘기 단계별 의심 기준을 살펴볼까요? 사춘기 전이라면 남아는 이 점 육칠, 여아는 이 점 이이 이상일 때 의심해 볼 수 있습니다. 반면 성장이 급격한 사춘기 중에는 남아는 오 점 이이, 여아는 삼 점 팔이 이상을 기준으로 봅니다. 이 수치를 넘어가면 인슐린이 제 역할을 못 해 췌장이 무리하고 있다는 뜻입니다. 결과를 해석할 때는 단 한 번의 수치보다 아이의 체중 변화나 피부 상태, 식습관을 함께 고려하는 흐름이 중요합니다. 특히 사춘기 절정기에는 건강한 아이도 일시적으로 수치가 성인의 두 배 이상 치솟을 수 있는데요. 이는 성장을 위한 자연스러운 과정일 수 있으므로, 반드시 소아청소년과 전문의의 정확한 판독을 받으시기 바랍니다.", videoUrl: "https://youtube.com/shorts/tofOEVk15Ek?si=zPsfnAoEOPdW1J92" },
    { id: 316, title: "스트레스 관리가 인슐린 저항성에 왜 중요한가요?", keywords: ["인슐린", "운동", "치료", "호르몬"], patterns: [], summary: "스트레스 관리가 인슐린 저항성에 왜 중요한가요? 많은 분이 인슐린 저항성을 음식과 운동의 문제로만 생각하시지만, 실은 마음의 상태가 혈당 조절에...", related: [], category: "insulin", answer: "스트레스 관리가 인슐린 저항성에 왜 중요한가요? 많은 분이 인슐린 저항성을 음식과 운동의 문제로만 생각하시지만, 실은 마음의 상태가 혈당 조절에 엄청난 영향을 미칩니다. 그 이유는 다음과 같습니다. 첫째로 코티솔의 역습 때문입니다. 아이가 학업이나 친구 관계로 스트레스를 받으면 몸에서 코티솔이라는 호르몬이 분비되는데요. 코티솔은 비상 상황에 대비해 에너지를 확보하려고, 간에 저장된 당을 혈액 속으로 마구 뿜어내게 만듭니다. 둘째는 코티솔과 인슐린이 충돌하기 때문입니다. 코티솔은 인슐린의 일을 방해하는 천적과 같습니다. 혈당은 높아지는데 코티솔이 인슐린의 작용을 막아서니, 췌장은 혈당을 잡기 위해 더 많은 인슐린을 짜내야 하는 과부하 상태에 빠집니다. 셋째는 뱃살의 주범이 되기 때문입니다. 코티솔은 특히 내장 지방에 지방을 쌓으라는 강력한 신호를 보냅니다. 스트레스가 심할수록 배만 올챙이처럼 나오게 되고, 이 내장 지방은 다시 인슐린 저항성을 악화시키는 악순환을 만듭니다. 결국 아이에게 스트레스는 설탕을 계속 먹는 것과 비슷한 신체적 효과를 냅니다. 아무리 식단을 조절해도 아이의 마음이 불안하면 인슐린 저항성이 좀처럼 개선되지 않는 이유가 바로 여기에 있습니다. 아이의 대사를 돕기 위해 부모님의 따뜻한 공감과 충분한 휴식을 선물해 주세요. 부모님의 지지는 코티솔 수치를 낮추고 대사를 안정시키는 가장 좋은 천연 치료제입니다.", videoUrl: "https://youtube.com/shorts/bUKQ4u2paCI?si=7JbqZ7f1o-9bH1Rx" },
    { id: 317, title: "우리 아이, 언제 병원에 가야 하나요?", keywords: ["사춘기", "비만", "인슐린", "운동", "치료", "호르몬"], patterns: [], summary: "우리 아이, 언제 병원에 가야 하나요? 인슐린 저항성과 소아비만은 단순히 살이 찐 상태가 아니라, 치료가 필요한 대사 질환일 수 있습니다. 다음...", related: [], category: "insulin", answer: "우리 아이, 언제 병원에 가야 하나요? 인슐린 저항성과 소아비만은 단순히 살이 찐 상태가 아니라, 치료가 필요한 대사 질환일 수 있습니다. 다음과 같은 징후가 보인다면 지체하지 말고 소아내분비 전문의를 찾아야 합니다. 첫째로 신체적 경고 신호가 보일 때입니다. 목 뒤나 겨드랑이 피부가 검고 두꺼워지는 흑색극세포증이 관찰된다면 이는 가장 확실한 신호입니다. 또한 아이가 물을 너무 많이 마시고 소변을 자주 보거나, 많이 먹어도 오히려 살이 빠지고 항상 피곤해한다면 즉시 진료를 받아야 합니다. 둘째는 건강검진 수치에 주의가 필요할 때입니다. 공복 혈당이 백 이상이거나, 이삼 개월간의 평균 혈당인 당화혈색소가 오 점 칠 퍼센트 이상인 경우입니다. 또한 중성지방 수치가 높고 좋은 콜레스테롤 수치가 낮게 나온다면 대사에 문제가 생겼다는 뜻입니다. 셋째는 가족력과 환경을 고려해야 합니다. 아이가 비만이면서 직계 가족 중 제이 형 당뇨병 환자가 있는 경우, 혹은 삼 개월에서 육 개월간 식단과 운동을 열심히 했는데도 체중이 계속 늘어난다면 전문가의 도움이 필요합니다. 전문의 상담이 중요한 이유는 아이들의 몸이 성인과 다르기 때문입니다. 단순히 수치 하나로 판단하지 않고 사춘기 발달 단계와 뼈 나이, 호르몬 균형을 종합적으로 평가해야 합니다. 그래야 아이의 성장을 방해하지 않으면서도 건강을 회복할 수 있는 맞춤형 치료 계획을 세울 수 있습니다.", videoUrl: "https://youtube.com/shorts/MGA6c8eCnpg?si=fd_X7MVwsdJSzNNa" },
    { id: 318, title: "중학생에게도 지방간이 생길 수 있나요?", keywords: ["비만", "운동"], patterns: [], summary: "중학생에게도 지방간이 생길 수 있나요? 네, 충분히 생길 수 있습니다. 최근에는 술을 전혀 마시지 않는 아이들에게 생기는 비알코올성 지방간이 심...", related: [], category: "insulin", answer: "중학생에게도 지방간이 생길 수 있나요? 네, 충분히 생길 수 있습니다. 최근에는 술을 전혀 마시지 않는 아이들에게 생기는 비알코올성 지방간이 심각한 문제가 되고 있습니다. 현재 비만 아동의 약 사십 퍼센트에서 지방간이 발견될 정도로 흔해졌는데요. 우리나라 청소년 열 명 중 한 명 이상은 간에 기름이 끼어 있는 상태라고 볼 수 있습니다. 문제는 간이 침묵의 장기라는 점입니다. 간세포의 팔십 퍼센트가 손상될 때까지도 통증이나 신호를 보내지 않기 때문에, 아이들은 간에 염증이 생기고 딱딱해져 가는데도 아무런 불편함을 느끼지 못합니다. 술도 안 마시는 아이들에게 왜 이런 일이 생길까요? 주범은 바로 탄산음료나 주스, 과자에 들어있는 과당입니다. 과당은 간에서만 대사되는데, 너무 많이 먹으면 간이 이를 다 처리하지 못하고 바로 지방으로 바꿔서 간세포에 쌓아버리는 것이죠. 어린 나이에 생긴 지방간은 유병 기간이 길기 때문에, 이삼십 대라는 젊은 나이에 간경화나 간암으로 진행될 위험을 안고 있습니다. 하지만 너무 걱정만 하실 필요는 없습니다. 아이들은 성인보다 회복력이 훨씬 좋습니다. 설탕을 줄이는 식단 교정과 꾸준한 운동만으로도 지방간은 다시 깨끗한 정상 상태로 돌아올 수 있습니다.", videoUrl: "https://youtube.com/shorts/CwSBfIcbKIo?si=Kaw3l3A-sTDJATuN" },
    { id: 319, title: "지방간이란 정확히 무엇인가요?", keywords: [], patterns: [], summary: "지방간이란 정확히 무엇인가요? 지방간은 말 그대로 간세포 속에 지방이 과도하게 쌓여 있는 상태를 말합니다. 간이 에너지를 처리하고 남은 기름기를...", related: [], category: "insulin", answer: "지방간이란 정확히 무엇인가요? 지방간은 말 그대로 간세포 속에 지방이 과도하게 쌓여 있는 상태를 말합니다. 간이 에너지를 처리하고 남은 기름기를 세포마다 빽빽하게 저장해 둔 모습이라고 이해하면 쉽습니다. 정상적인 간은 전체 무게의 오 퍼센트 미만이 지방이지만, 이 비중을 넘어서면 지방간으로 진단합니다. 시각적으로도 차이가 큰데요. 건강한 간은 선명한 붉은 갈색을 띠지만, 지방간이 심해지면 기름기 때문에 점점 노란빛으로 변하며 크기도 부어오릅니다. 마치 비계가 층층이 낀 고기처럼 변하는 것이죠. 병원에서 초음파 검사를 해보면 그 차이가 더 명확합니다. 지방층에 초음파가 반사되어 간이 유독 하얗고 반짝거리게 보이는데, 이를 의학적으로 '밝은 간'이라고 부릅니다. 지방이 낀 것 자체는 당장 아프지 않을 수 있습니다. 하지만 간세포 속에 들어찬 지방은 주변 세포를 압박하고 미세한 염증을 일으키는데요. 이 염증이 반복되면 간이 딱딱해지는 간섬유화나 간경변으로 진행될 수 있기 때문에 초기에 관리하는 것이 무엇보다 중요합니다. 우리 아이의 간 건강을 위해 세 가지를 체크해 보세요. 첫째, 배가 많이 나왔다면 간에도 지방이 쌓였을 확률이 높습니다. 둘째, 간의 해독 능력이 떨어져 아이가 평소보다 쉽게 지칠 수 있습니다. 셋째, 혈액 검사상 간 수치인 에이에스티와 에이엘티가 정상 범위를 벗어나지 않았는지 꼭 확인해 보시기 바랍니다.", videoUrl: "https://youtube.com/shorts/BjPsnP7_Iv4?si=dIYsziYHm9TP_P_m" },
    { id: 320, title: "간은 우리 몸에서 어떤 역할을 하나요?", keywords: ["단백질", "영양"], patterns: [], summary: "간은 우리 몸에서 어떤 역할을 하나요? 간은 우리 몸에서 가장 큰 장기이자, 오백 가지 이상의 업무를 동시에 수행하는 거대한 화학 공장입니다. ...", related: [], category: "nutrition", answer: "간은 우리 몸에서 어떤 역할을 하나요? 간은 우리 몸에서 가장 큰 장기이자, 오백 가지 이상의 업무를 동시에 수행하는 거대한 화학 공장입니다. 아이의 성장과 건강한 일상을 위해 크게 네 가지 핵심 업무를 담당하고 있는데요. 첫째로 영양소 관리와 에너지 저장입니다. 우리가 먹은 음식물은 간에서 포도당으로 바뀌어 저장됩니다. 아이가 뛰어놀거나 공부할 때, 간은 저장해둔 포도당을 꺼내 에너지를 일정하게 공급하는 배터리 역할을 합니다. 둘째는 해독 작용과 살균입니다. 몸속으로 들어온 약물이나 대사 과정에서 생긴 독소를 분해해서 무해하게 만듭니다. 또한 면역 세포를 통해 혈액 속 세균을 잡아먹는 필터 역할도 담당하죠. 셋째는 소화제인 담즙을 생산합니다. 지방의 소화와 흡수를 돕는 담즙을 만들어 쓸개에 저장하는데요. 이 담즙이 없으면 아이가 먹은 고기나 기름진 음식을 제대로 소화하기 어렵습니다. 넷째는 필수 단백질 합성입니다. 피가 났을 때 멈추게 하는 혈액 응고 인자와, 몸의 붓기를 막아주는 알부민 등 성장에 꼭 필요한 단백질들을 직접 만들어냅니다. 그런데 지방간이 생기면 어떤 문제가 발생할까요? 간세포에 지방이 가득 차면 공장의 기계들이 제대로 돌아가지 못합니다. 에너지가 공급되지 않아 아이가 쉽게 피곤해하고 면역력이 떨어지며, 독소 배출이 안 되어 피부 트러블이나 소화 불량이 생길 수 있습니다. 우리 아이의 활기찬 성장을 위해 간 건강을 지켜주는 것이 정말 중요한 이유입니다.", videoUrl: "https://youtube.com/shorts/w5vx2bK2n0g?si=XjCIMucT5mB1DcrP" },
    { id: 321, title: "알코올성 지방간과 비알코올성 지방간의 차이는 무엇인가요?", keywords: ["알코올성", "비알코올성", "지방간", "종류", "차이"], patterns: ["알코올성 지방간과 비알코올성 지방간 차이가 뭐예요?", "우리 아이는 술을 안 마시는데 지방간이 생겼어요", "어린이도 지방간에 걸리나요?"], summary: "• 지방간 종류: 알코올성/비알코올성 - 결과적으로 간세포 파괴 동일", related: [322, 323, 324, 327, 318], category: "insulin", answer: "알코올성 지방간과 비알코올성 지방간의 차이는 무엇인가요? 지방간은 크게 두 종류로 나뉘지만, 결과적으로 간세포가 파괴된다는 점은 같습니다. 특히 우리 아이들에게 생기는 지방간은 비알코올성이라는 점에 주목해야 합니다. 알코올성 지방간은 과도한 음주가 원인이지만, 비알코올성 지방간은 과도한 열량과 액상과당, 정제 탄수화물이 주범입니다. 넘치는 당분이 간에서 지방으로 전환되어 쌓이는 것이죠. 그래서 복부 비만이나 인슐린 저항성을 동반하는 경우가 많습니다. 술 대신 당분이 독이 됩니다. 비알코올성 지방간은 술을 전혀 마시지 않는데도 생기는데요. 아이들이 즐겨 먹는 음료수의 액상과당이나 설탕, 흰 밀가루 등은 간 입장에서 술과 다를 바 없는 독소로 작용합니다. \"애들은 좀 통통해도 괜찮아\"라고 방치해서는 안 되는 이유가 바로 여기에 있습니다. 단순히 지방이 끼는 단계를 넘어 간에 염증이 생기는 지방간염, 간이 딱딱해지는 간경변, 심지어 간암으로까지 진행될 수 있기 때문입니다. 성인은 이 과정이 수십 년 걸리지만, 소아비만 아이들은 진행 속도가 훨씬 빨라서 이삼십 대에 이미 간 손상이 심각해질 수 있습니다. 술을 끊으면 되는 성인과 달리, 우리 아이들은 식습관과 운동, 수면까지 생활 전반을 바꿔야 하므로 부모님의 세심한 지도가 무엇보다 중요합니다.", videoUrl: "https://youtube.com/shorts/5MlnHa8hdn4?si=hzdYvZvSQFRMmQKT" },
    { id: 322, title: "왜 우리 아이에게 지방간이 생긴 걸까요?", keywords: ["지방간", "원인", "이유", "발생", "생기는"], patterns: ["왜 우리 아이한테 지방간이 생겼나요?", "지방간의 원인이 뭐예요?", "아이가 많이 먹지도 않는데 지방간이 생겼어요"], summary: "• 핵심 원인 4가지: 복부 비만, 인슐린 저항성, 과당, 가족력+운동 부족", related: [321, 327, 316, 325, 318], category: "insulin", answer: "부모님, 꼭 기억해 주세요. 아이의 지방간은 뱃살과 단 음료, 그리고 움직임 부족이라는 세 박자가 맞물릴 때 발생합니다. 하지만 반대로 이 세 가지만 조금씩 조절해 주셔도, 아이의 간은 빠르게 다시 선홍빛 건강을 찾을 수 있습니다.", videoUrl: "https://youtube.com/shorts/ONjO9ek1dpg?si=Q4OTkP5HIYa1hdC7" },
    { id: 323, title: "지방간은 어떻게 진단하나요?", keywords: ["지방간", "진단", "검사", "확인"], patterns: ["지방간은 어떻게 진단하나요?", "지방간 검사 방법이 궁금해요", "지방간 진단 기준이 뭐예요?"], summary: "• 4가지 진단 방법: 혈액검사, 초음파, 간 섬유화 스캔, 정밀검사", related: [324, 322, 332, 319, 325], category: "insulin", answer: "부모님, 꼭 기억해 주세요. 학교 건강검진 결과지에 적힌 기준은 성인용인 경우가 많습니다. 우리 아이의 에이엘티 수치가 이십이에서 이십육을 넘었다면, 소아청소년과 전문의와 꼭 상담해 보시는 것이 안전합니다.", videoUrl: "https://youtube.com/shorts/5ismnArKSqM?si=ruNA56Sp3Sy11oWr" },
    { id: 324, title: "지방간이 진행되면 어떤 단계를 거치나요?", keywords: ["지방간", "단계", "진행", "악화"], patterns: ["지방간이 진행되면 어떻게 되나요?", "지방간 단계가 있나요?", "지방간염이 뭐예요?"], summary: "• 4단계 진행: 단순 지방간 → 지방간염 → 간섬유화 → 간경변증", related: [323, 325, 329, 330, 319], category: "insulin", answer: "부모님, 꼭 기억해 주세요. 아이들은 성인보다 세포의 재생력이 훨씬 뛰어납니다. 일단계와 이단계 시기에 체중을 오에서 십 퍼센트만 감량해도 간에 낀 기름과 염증은 놀라울 정도로 빠르게 사라집니다. 지금이 바로 우리 아이의 간을 살릴 수 있는 골든타임입니다.", videoUrl: "https://youtube.com/shorts/OaG5NpDljSk?si=h3T3pov1M9W8kHe6" },
    { id: 325, title: "지방간을 치료하려면 어떻게 해야 하나요?", keywords: ["지방간", "치료", "없애기", "개선"], patterns: ["지방간 치료는 어떻게 하나요?", "지방간에 먹는 약이 있나요?", "아이 지방간을 어떻게 없애나요?"], summary: "• 승인된 약물 없음 - 생활 습관 개선이 최선", related: [326, 328, 329, 327, 322], category: "insulin", answer: "지방간을 치료하려면 어떻게 해야 하나요? 현재 전 세계적으로 소아청소년의 지방간을 직접 치료하도록 승인된 마법 같은 약은 없습니다. 하지만 실망하실 필요는 없습니다. 생활 습관 개선이 그 어떤 약보다 강력하고 확실한 치료법이기 때문입니다. 첫째로 체중 감량의 퍼센트에 집중해 주세요. 완벽한 정상 체중이 목표가 아닙니다. 아주 작은 감량만으로도 간은 숨을 쉬기 시작합니다. 몸무게의 삼에서 오 퍼센트만 줄여도 간세포 사이에 낀 기름이 눈에 띄게 빠지기 시작하고요. 칠에서 십 퍼센트를 감량하면 간에 생긴 염증과 딱딱해진 흉터까지 개선될 수 있습니다. 둘째는 천천히 빼는 것이 간을 살리는 길입니다. 마음이 급해서 아이를 굶기거나 급격히 살을 빼게 하면, 간은 오히려 비상 상황으로 인식해서 지방을 더 쌓거나 손상될 수 있습니다. 한 달에 일에서 이 킬로그램 정도만 천천히 감량하는 것이 간에 무리를 주지 않는 가장 효과적인 방법입니다. 셋째는 식단과 운동의 시너지입니다. 단순히 양을 줄이는 것보다 음료수에 든 액상과당과 정제 탄수화물을 끊는 것이 간의 지방 합성을 멈추는 가장 빠른 길입니다. 또한 근육을 움직여서 혈액 속의 남는 에너지를 태워야, 간에 저장된 지방이 에너지로 끌어 써지면서 빠져나가게 됩니다. 마지막으로 부모님을 위한 전략입니다. 음료수만 끊어도 절반은 성공입니다. 물이나 보리차로 바꾸는 습관이 간 수치를 떨어뜨리는 가장 강력한 한 방이 됩니다. 또한 아이들은 키가 커야 하므로 무조건 굶기기보다는 단백질과 채소가 풍부한 양질의 식사를 꼭 챙겨주시기 바랍니다.", videoUrl: "https://youtube.com/shorts/2n7SOSzd0LY?si=QR1bOyxcJgyFlT6L" },
    { id: 326, title: "지방간에 좋은 음식과 나쁜 음식은 무엇인가요?", keywords: ["지방간", "음식", "식단", "먹으면"], patterns: ["지방간에 좋은 음식이 뭐예요?", "지방간이 있으면 뭘 먹으면 안 되나요?", "지방간 식단은 어떻게 짜나요?"], summary: "[나쁜 음식 - 피해야 할 것]", related: [325, 327, 311, 328, 322], category: "insulin", answer: "지방간에 좋은 음식과 나쁜 음식은 무엇인가요? 간 건강을 되찾는 식사 원칙은 단순합니다. 간을 힘들게 하는 것은 빼고, 간이 재생하는 데 필요한 재료는 넣어주는 것인데요. 먼저 절대 피해야 할 나쁜 음식입니다. 첫째는 탄산음료나 가공 주스에 들어있는 액상과당입니다. 과당은 간으로 직행해 바로 지방으로 변하기 때문에, 지방간이 있는 아이에게는 가장 독한 술을 마시는 것과 같습니다. 둘째는 라면이나 빵, 떡 같은 정제 탄수화물입니다. 혈당을 급격히 높여서 간에 지방이 쌓이게 만듭니다. 셋째는 튀김이나 패스트푸드 같은 기름진 음식인데요. 간세포의 염증을 일으키고 인슐린 저항성을 악화시킵니다. 반대로 꼭 챙겨 먹어야 할 좋은 음식도 있습니다. 현미나 귀리 같은 통곡물은 당 흡수를 늦추고 노폐물 배출을 돕습니다. 두부나 닭가슴살, 흰살생선에 풍부한 단백질은 간세포가 재생될 때 가장 중요한 원료가 되고요. 고등어나 삼치 같은 등푸른생선에 들어있는 오메가 쓰리는 간의 염증을 가라앉히는 데 효과적입니다. 부모님께서 특히 주의하실 점이 있습니다. 과일은 비타민이 풍부하지만 과당 함량도 높습니다. 지방간이 있다면 과일은 하루에 사과 반 쪽 정도인 한 주먹 분량으로 양을 제한하는 것이 좋습니다. 특히 갈아서 마시는 주스 형태는 흡수가 너무 빨라 더욱 피해야 합니다. 아이들이 좋아하는 음식을 한 번에 끊기는 참 어렵죠. 그래서 지혜로운 대체 전략이 필요합니다. 흰 쌀밥 대신 현미 잡곡밥으로 바꾸고, 탄산음료 대신 탄산수에 레몬즙을 짜서 주거나, 튀긴 치킨 대신 구운 치킨을 선택하는 것부터 시작해 보세요. 이런 작은 변화가 아이의 간을 살리는 위대한 시작이 될 것입니다.", videoUrl: "https://youtube.com/shorts/Jzx_mfIFSyw?si=vcaym-Wq3E3w1RNW" },
    { id: 327, title: "과당이 왜 그렇게 나쁜가요?", keywords: ["과당", "액상과당", "위험"], patterns: ["과당이 왜 나쁜가요?", "액상과당이 뭐가 문제예요?", "과당과 설탕의 차이는 뭐예요?"], summary: "• 과당 대사: 100% 간에서만 독점 처리", related: [322, 326, 321, 316, 325], category: "obesity", answer: "부모님, 우리 아이의 간을 위해 당분 줄이기 수칙을 실천해 주세요. 가장 먼저 마시는 당분을 끊어야 합니다. 탄산음료와 과일주스를 물이나 보리차로 바꿔주시는 것만으로도 충분합니다. 그리고 과일은 주스보다는 섬유질이 풍부한 생과일을 직접 씹어 먹게 해주세요. 그래야 당 흡수가 천천히 이루어져 아이의 간이 편안해집니다.", videoUrl: "https://youtube.com/shorts/D2MQqE_qgZw?si=jIn_gLAtLUt1lKxB" },
    { id: 328, title: "운동은 지방간에 어떤 도움이 되나요?", keywords: ["운동", "지방간", "효과"], patterns: ["운동하면 지방간이 좋아지나요?", "어떤 운동이 지방간에 좋아요?", "운동을 얼마나 해야 하나요?"], summary: "• 3가지 효과: 간 지방 연소, 근육 방어막, 인슐린 저항성 개선", related: [325, 329, 326, 316, 322], category: "insulin", answer: "부모님, 꼭 기억해 주세요. 꾸준히 운동하면 삼 개월 이내에 혈액 검사상 간 수치가 눈에 띄게 좋아지는 것을 확인할 수 있습니다. 하지만 운동을 벌처럼 느끼게 해서는 안 됩니다. 지방간이 있는 아이들은 쉽게 지칠 수 있으므로, 처음에는 식사 후 십오 분 가족 산책처럼 아주 작은 습관부터 즐겁게 시작해 보시기 바랍니다.", videoUrl: "https://youtube.com/shorts/kH4WAGdNvgI?si=vmcHPnsfX9LLuLJY" },
    { id: 329, title: "지방간 회복에는 얼마나 시간이 걸리나요?", keywords: ["지방간", "회복", "시간", "기간"], patterns: ["지방간은 얼마나 걸려서 나아지나요?", "지방간 회복 기간이 궁금해요", "언제쯤 간이 정상으로 돌아오나요?"], summary: "• 간 재생 능력: 우리 몸에서 가장 뛰어남", related: [325, 328, 324, 332, 330], category: "insulin", answer: "부모님, 아이의 지방간 회복은 단거리 달리기라기보다 마라톤에 가깝습니다. 일 년이라는 시간이 길어 보일 수 있지만, 이 기간에 만들어진 건강한 식습관은 아이가 평생 당뇨나 고혈압 걱정 없이 살 수 있는 튼튼한 뿌리가 될 것입니다.", videoUrl: "https://youtube.com/shorts/7basHjX8QAs?si=Xl-NpVYxtyU6-VGy" },
    { id: 330, title: "지방간이 있어도 증상이 없다면 치료하지 않아도 되나요?", keywords: ["지방간", "증상", "없다", "무증상"], patterns: ["지방간이 있는데 아프지 않으면 괜찮나요?", "증상이 없으면 치료 안 해도 되나요?", "아이가 배 안 아픈데 왜 운동해야 하나요?"], summary: "• 절대 안 됨 - 증상 없음 ≠ 건강함", related: [324, 325, 331, 323, 329], category: "insulin", answer: "지방간이 있어도 증상이 없다면 치료하지 않아도 되나요? 절대 안 됩니다. 오히려 증상이 없는 지금이 치료할 수 있는 마지막 기회라고 보셔야 합니다. 간이 보내는 신호가 없다는 것은 건강하다는 뜻이 아니라, 간이 묵묵히 고통을 견디고 있다는 뜻이기 때문입니다. 간은 세포의 칠십에서 팔십 퍼센트가 파괴될 때까지도 통증을 느끼지 못하는 침묵의 장기입니다. 만약 아이가 복통을 느끼거나 눈이 노랗게 변하는 황달 같은 증상이 나타났다면, 그때는 이미 간이 딱딱하게 굳은 간경변증으로 진행되었을 가능성이 매우 높습니다. 특히 소아 지방간은 성인보다 더 위험합니다. 어린 나이에 시작된 만큼 간이 손상될 수 있는 기간이 훨씬 길기 때문인데요. 성인이 되어 지방간이 생긴 사람보다 이삼십 대라는 이른 나이에 간부전이나 간암으로 진행될 위험이 압도적으로 높습니다. 가장 중요한 점은 되돌릴 수 없는 지점이 있다는 사실입니다. 단순 지방간 시기에는 생활 습관만으로 백 퍼센트 회복이 가능하지만, 간이 완전히 굳어버리는 단계에 들어서면 현대 의학으로도 원래 상태로 되돌리기가 매우 어렵습니다. 지금 아이의 몸 안에서는 증상이 없어도 이런 일들이 일어나고 있습니다. 간세포 사이에 낀 기름이 주변 세포를 계속 압박하고, 지방에서 나온 염증 물질이 혈액을 타고 온몸을 돌아다니며 심장병이나 당뇨병의 위험을 높이고 있습니다. 아이가 배가 안 아픈데 왜 운동해야 하느냐고 묻는다면 이렇게 말씀해 주세요. \"아프지 않을 때 지켜야 나중에도 아프지 않을 수 있어. 지금은 네 몸속의 소중한 화학 공장인 간을 깨끗하게 청소해 주는 시간이야\"라고 말이죠.", videoUrl: "https://youtube.com/shorts/c0tfZ3-weAk?si=6ekOo5cvpdReXsWR" },
    { id: 331, title: "지방간이 다른 질환과도 연관이 있나요?", keywords: ["지방간", "연관", "다른 질환"], patterns: ["지방간이 다른 질환과 연관이 있나요?", "지방간이 있으면 다른 병도 생기나요?", "지방간과 당뇨병이 관계있나요?"], summary: "• 지방간 = 대사 시스템 전체 고장의 경고 신호", related: [333, 316, 336, 334, 325], category: "insulin", answer: "부모님, 이제는 나무가 아닌 숲을 보셔야 합니다. 아이의 간 수치 하나에만 일희일비하기보다 혈당과 혈압, 체지방 같은 전체적인 대사 환경을 함께 관리해 주세요. 간이 깨끗해지면 신기하게도 혈압이 안정되고 혈당 수치도 자연스럽게 정상을 찾게 될 것입니다.", videoUrl: "https://youtube.com/shorts/rYk7JOUWJX4?si=bwUQzWgXZPWikX8E" },
    { id: 332, title: "지방간 진단 후 정기 검사는 얼마나 자주 해야 하나요?", keywords: ["지방간", "정기 검사", "추적"], patterns: ["지방간 검사는 얼마나 자주 해야 하나요?", "정기 검진 주기가 궁금해요", "언제 다시 검사받아야 하나요?"], summary: "• 기본 원칙: 3-6개월마다 정기 검사", related: [323, 329, 325, 331, 324], category: "insulin", answer: "지방간 관리를 위해 정기적으로 어떤 검사를 받아야 하나요? 지방간은 겉보기에 좋아졌다고 해서 안심할 수 없습니다. 정기적인 검사를 통해 간 내부가 실제로 얼마나 회복되었는지 확인하는 것이 매우 중요한데요. 시기별로 필요한 검사들을 알려드리겠습니다. 먼저 삼 개월에서 육 개월 간격으로 받는 혈액 검사입니다. 이 검사는 생활 습관 개선이 효과가 있는지 확인하는 성적표 역할을 하는데요. 간세포의 염증 정도를 나타내는 에이엘티와 에이에스티 수치를 확인합니다. 이 수치가 점차 내려가고 있다면 관리가 아주 잘 되고 있다는 뜻입니다. 이때 인슐린 저항성이나 중성지방, 당화혈색소 지표도 함께 검사해서 전신 대사 상태가 좋아지고 있는지 종합적으로 판단하게 됩니다. 다음으로 육 개월에서 일 년 간격으로 받는 영상 검사입니다. 간의 물리적인 변화를 직접 확인하는 단계인데요. 복부 초음파를 통해 간의 색깔이 정상적으로 돌아오고 있는지, 하얗고 반짝이던 현상이 사라졌는지 확인합니다. 최근에는 간 섬유화 스캔이라는 정밀 검사도 많이 사용하는데요. 통증 없이 간에 지방이 얼마나 꼈는지와 간이 얼마나 딱딱해졌는지를 정확한 숫자로 보여주기 때문에, 아이에게 치료 동기를 부여하는 데 아주 효과적입니다. 부모님을 위한 검사 관리 팁 두 가지를 기억해 주세요. 첫째, 검사 결과를 기록해 주세요. 날짜별로 간 수치 변화를 기록해 두면 아이에게 큰 힘이 됩니다. \"지난번보다 수치가 이만큼이나 좋아졌네! 정말 대단하다\"라고 구체적으로 칭찬해 주시기 바랍니다. 둘째, 공복 유지가 필수입니다. 정확한 검사를 위해 보통 여덟 시간 이상의 공복이 필요하므로, 검사 전날 밤부터 물 외에는 아무것도 먹지 않도록 준비해 주셔야 합니다.", videoUrl: "https://youtube.com/shorts/9w7evKfe2DA?si=rnU5DWEJgLA_lwIC" },
    { id: 333, title: "비만인 아이가 고혈압이 생길 수 있나요?", keywords: ["비만", "고혈압"], patterns: ["비만이면 고혈압도 생기나요?", "아이가 살이 쪄서 혈압이 높아요", "소아 고혈압이 있나요?"], summary: "• 소아청소년 고혈압: 비만이 가장 큰 원인", related: [334, 335, 333, 331, 316], category: "insulin", answer: "비만한 아이들에게 고혈압이 얼마나 흔한가요? 비만 아동의 약 십 퍼센트에서 삼십 퍼센트가 고혈압을 가지고 있습니다. 이는 정상 체중 아이들보다 무려 세 배나 높은 수치인데요. 살이 찌면 몸 전체에 피를 보내기 위해 심장이 더 강하게 펌프질을 해야 하고, 늘어난 지방 조직이 혈관을 압박해서 혈압이 오르게 됩니다. 문제는 고혈압 역시 지방간처럼 증상이 거의 없다는 점입니다. 머리가 아프거나 어지러운 증상이 나타날 정도면 이미 혈압이 매우 높은 상태인데요. 대부분은 정기 검진이나 학교 신체검사에서 우연히 발견되곤 합니다. 이렇게 어릴 때 생긴 고혈압을 방치하면 혈관이 일찍부터 딱딱해집니다. 이는 성인이 되었을 때 심장병이나 뇌졸중, 그리고 콩팥 질환으로 이어질 위험을 수배 이상 높이는 아주 위험한 신호입니다. 하지만 실망하실 필요는 없습니다. 아이들의 혈관은 아직 탄력적이기 때문에, 체중을 조금만 조절하고 식습관을 고쳐도 혈압이 정상으로 돌아오는 속도가 성인보다 훨씬 빠릅니다. 지금 우리 아이의 혈압에 관심을 갖는 것이 평생의 혈관 건강을 지키는 가장 확실한 방법입니다.", videoUrl: "https://youtube.com/shorts/_SMAjEb0RmU?si=aeSA49Eg9TyZmlmt" },
    { id: 334, title: "소아청소년 혈압은 어떻게 측정하나요?", keywords: ["혈압", "측정", "방법"], patterns: ["아이 혈압은 어떻게 재나요?", "소아 혈압 정상 범위는?", "아이 혈압이 높다는데 기준이 뭐예요?"], summary: "• 소아청소년 혈압: 성인 기준(120/80) 적용 불가", related: [333, 335, 348, 334], category: "insulin", answer: "부모님, 만약 아이의 혈압이 높게 나왔더라도 당장 약부터 고민하실 필요는 없습니다. 먼저 싱겁게 먹기와 매일 삼십 분 걷기를 딱 이 주일만 실천해 보세요. 혈관 탄력이 좋은 아이들은 이 짧은 노력만으로도 수치가 놀라울 정도로 안정되는 경우가 많습니다.", videoUrl: "https://youtube.com/shorts/ahbmNL4qcWU?si=aKY7ds0d5fOF588J" },
    { id: 335, title: "백의고혈압이 뭔가요?", keywords: ["백의고혈압"], patterns: ["백의고혈압이 뭐예요?", "병원에서만 혈압이 높게 나와요", "집에서는 정상인데 병원에서만 높아요"], summary: "• 백의고혈압: 병원에서만 혈압 상승 (가정/학교에서는 정상)", related: [334, 333, 348, 353], category: "insulin", answer: "부모님, 아이가 병원에서 혈압을 잴 때 이번에도 높게 나오면 어쩌나 하는 걱정 섞인 눈빛이 아이를 더 긴장시킬 수 있습니다. 그럴 때는 \"이건 그냥 키 재는 것처럼 네 몸이 얼마나 씩씩한지 확인하는 거야\"라고 편안하게 말씀해 주세요. 부모님의 따뜻한 한마디가 아이의 혈압을 안정시키는 가장 좋은 약이 될 수 있습니다.", videoUrl: "https://youtube.com/shorts/DEOawbdasU4?si=adoEFDneFGyQ_z8f" },
    { id: 336, title: "이상지질혈증이 뭔가요?", keywords: ["이상지질혈증"], patterns: ["이상지질혈증이 뭐예요?", "콜레스테롤이 높다는데 어떡하죠?", "아이도 콜레스테롤 관리가 필요한가요?"], summary: "• 이상지질혈증: 혈액 속 지방 성분 불균형", related: [337, 338, 339, 340, 333], category: "insulin", answer: "부모님, 꼭 기억해 주세요. 비만으로 인한 고혈압은 충분히 해결 가능합니다. 아이들의 혈관은 어른들과 달리 아직 유연합니다. 인슐린 저항성을 개선하고 체중을 조금만 조절해도, 늘어났던 혈액량이 줄어들고 예민했던 신경이 안정되면서 혈압이 정상으로 돌아오는 속도가 성인보다 훨씬 빠릅니다.", videoUrl: "https://youtube.com/shorts/g7RpfRwKH1w?si=qiJAVFR0XObmheYK" },
    { id: 337, title: "LDL 콜레스테롤이 높으면 어떻게 되나요?", keywords: ["LDL", "나쁜 콜레스테롤"], patterns: ["LDL 콜레스테롤이 높으면 어떻게 되나요?", "나쁜 콜레스테롤을 낮추려면?", "LDL 수치가 높다는데 위험한가요?"], summary: "• LDL (Low Density Lipoprotein): 나쁜 콜레스테롤", related: [336, 340, 341, 342, 348], category: "insulin", answer: "부모님, 꼭 기억해 주세요. 치료에서 조급함은 금물입니다. 우리 아이들은 계속 성장해야 하므로 무조건 적게 먹이는 식단은 위험합니다. 영양소는 골고루 섭취하되 싱겁게 먹기와 충분히 움직이기를 온 가족의 습관으로 만들어 주세요. 부모님이 함께해주시는 그 습관이 아이의 혈압을 치료하는 가장 확실한 열쇠입니다.", videoUrl: "https://youtube.com/shorts/oh1Gwtol0VU?si=k94bgfhBRKdLIRoI" },
    { id: 338, title: "HDL 콜레스테롤을 높이려면 어떻게 해야 하나요?", keywords: ["HDL", "좋은 콜레스테롤"], patterns: ["HDL 콜레스테롤을 높이려면?", "좋은 콜레스테롤이 낮다는데 어떡하죠?", "HDL 수치가 낮아요"], summary: "• HDL (High Density Lipoprotein): 좋은 콜레스테롤", related: [336, 337, 339, 348, 328], category: "insulin", answer: "부모님, 꼭 기억해 주세요. 아이들의 이상지질혈증, 특히 중성지방 수치는 식습관의 영향을 아주 크게 받습니다. 빵이나 떡, 설탕 같은 정제 탄수화물을 줄이는 것만으로도 수치는 금방 좋아질 수 있습니다. 또한 고등어나 견과류에 들어있는 오메가 쓰리 같은 좋은 지방은 혈관 속 나쁜 기름을 줄이는 데 큰 도움을 줍니다.", videoUrl: "https://youtube.com/shorts/8oQtR7E2Onc?si=_6phodUEMj8-1mLf" },
    { id: 339, title: "중성지방을 낮추려면 어떻게 해야 하나요?", keywords: ["중성지방", "트리글리세라이드"], patterns: ["중성지방을 낮추려면?", "중성지방이 높다는데 어떡하죠?", "중성지방이 뭐예요?"], summary: "• 중성지방 (Triglyceride): 혈액 속 에너지 저장 형태", related: [336, 327, 338, 326, 348], category: "growth", answer: "부모님, 이러한 과정이 반복되면 아이의 피는 끈적해지고, 어린 나이임에도 혈관 내벽에 기름 찌꺼기가 쌓이는 조기 동맥경화가 진행될 수 있습니다. 하지만 다행히 아이들은 체중 감량과 식단 조절을 통해 인슐린 저항성만 개선해도 간에서 나쁜 기름을 만드는 속도가 급격히 줄어듭니다. 혈액이 다시 맑아지는 속도가 성인보다 훨씬 빠르니까요, 지금부터 시작하는 관리가 아이의 혈관 건강을 지키는 가장 확실한 방법입니다.", videoUrl: "https://youtube.com/shorts/SzkEyqcr0HM?si=NbuB9HLCA9GpHtGT" },
    { id: 340, title: "동맥경화가 어린 나이에도 시작될 수 있나요?", keywords: ["동맥경화"], patterns: ["동맥경화가 아이에게도 생기나요?", "어린 나이에 혈관이 막힐 수 있나요?", "동맥경화는 언제부터 시작되나요?"], summary: "• 동맥경화: 혈관벽에 지방 침착 → 혈관 좁아짐", related: [337, 336, 341, 333, 348], category: "insulin", answer: "이상지질혈증은 어떻게 치료하나요? 아이들의 이상지질혈증 치료는 약물보다 생활 습관의 기적을 만드는 것이 우선입니다. 피를 맑게 하는 가장 확실한 방법 세 가지를 알려드릴게요. 첫째로 체중 십 퍼센트 감량의 위력입니다. 현재 체중에서 십 퍼센트만 감량해도 혈액 속 수치는 마법처럼 변합니다. 나쁜 콜레스테롤인 엘디엘은 십에서 십오 퍼센트가 줄어들고, 중성지방은 무려 삼십 퍼센트나 감소합니다. 아이들은 성장이 필요하므로 무조건 굶기기보다 건강한 음식으로 바꿔 먹이며 천천히 감량하는 것이 핵심입니다. 둘째는 식단의 질을 바꾸는 것입니다. 고기의 비계나 버터에 많은 포화지방, 그리고 튀김이나 과자에 든 트랜스지방은 혈관 벽을 망가뜨리는 주범이므로 피해야 합니다. 대신 고등어 같은 등푸른생선에 풍부한 오메가 쓰리를 챙겨주세요. 중성지방을 낮추는 데 효과적입니다. 또한 채소의 식이섬유는 몸 밖으로 나쁜 콜레스테롤을 끌고 나가는 청소부 역할을 합니다. 셋째로 운동은 착한 콜레스테롤을 위한 유일한 약입니다. 약물로도 올리기 힘든 것이 바로 혈관 청소부인 좋은 콜레스테롤, 에이치디엘인데요. 이를 높이는 가장 효과적인 방법은 규칙적인 유산소 운동입니다. 숨이 약간 찰 정도의 운동은 나쁜 기름은 태우고 좋은 기름은 채워줍니다. 부모님을 위한 실천 가이드입니다. 우선 간식만 바꿔도 혈액이 달라집니다. 과자나 빵 대신 견과류 한 줌이나 신선한 채소 스틱을 간식으로 주세요. 또한 음식을 튀기기보다 굽거나 찌는 방식으로 조리법만 바꿔도, 아이가 섭취하는 나쁜 지방의 양을 획기적으로 줄일 수 있습니다.", videoUrl: "https://youtube.com/shorts/OtD22TfpVuE?si=5zUGj9SXaXaZ7hd4" },
    { id: 341, title: "가족성 고콜레스테롤혈증이 뭔가요?", keywords: ["가족성", "고콜레스테롤혈증"], patterns: ["가족성 고콜레스테롤혈증이 뭐예요?", "아이 콜레스테롤이 너무 높아요", "부모도 콜레스테롤이 높은데 유전인가요?"], summary: "• 가족성 고콜레스테롤혈증 (Familial Hypercholesterolemia): 유전성 질환", related: [337, 336, 340, 342, 343], category: "insulin", answer: "부모님, 아이의 콜레스테롤 수치가 높다는 것은 혈관이 남들보다 빠르게 나이 들고 있다는 신호입니다. 약물 치료는 이를 멈추는 강력한 브레이크 역할을 합니다. 전문의의 처방 아래 약을 복용하면서, 아이가 올바른 습관을 가질 수 있도록 곁에서 따뜻하게 응원해 주시기 바랍니다.", videoUrl: "https://youtube.com/shorts/bnb8OWAXTfI?si=hYBBg2FY-jzYaBw3" },
    { id: 342, title: "콜레스테롤 검사는 언제 받아야 하나요?", keywords: ["콜레스테롤", "검사", "시기"], patterns: ["콜레스테롤 검사는 언제 받나요?", "아이가 몇 살 때 검사해야 하나요?", "콜레스테롤 검사 주기는?"], summary: "• 권장 검사 시기:", related: [336, 341, 337, 332, 343], category: "insulin", answer: "부모님, 식사 후 삼십 분 산책하는 습관을 들여보세요. 식사로 먹은 당분이 중성지방으로 변해 간에 쌓이기 전에 운동으로 태워버리는 것이 중요합니다. 또한 밥은 적게 먹어도 과자나 과일주스를 즐긴다면 중성지방은 절대 떨어지지 않으니, 간식 습관을 꼭 함께 점검해 주시기 바랍니다.", videoUrl: "https://youtube.com/shorts/D1HKOQ0EJRs?si=UU4Y9OORcycZJPzp" },
    { id: 343, title: "아이도 콜레스테롤 약을 먹어야 하나요?", keywords: ["콜레스테롤 약", "스타틴"], patterns: ["아이도 콜레스테롤 약을 먹어야 하나요?", "스타틴이 아이에게 안전한가요?", "약 먹으면 키 안 크나요?"], summary: "• 원칙: 생활 습관 개선 우선 (6-12개월)", related: [341, 337, 342, 336, 348], category: "insulin", answer: "부모님, 아이의 혈액 검사 결과에서 에이치디엘 수치가 사십 미만이라면 청소부가 부족한 상태입니다. 이 숫자를 높이기 위해 오늘부터 아이와 함께 매일 저녁 삼십 분 산책하기를 실천해 보세요. 부모님과 함께 걷는 그 시간이 아이의 혈관을 깨끗하게 청소하는 소중한 시간이 될 것입니다.", videoUrl: "https://youtube.com/shorts/S5HPCm3zK3U?si=1XzyeJ8q1O_cXimM" },
    { id: 344, title: "대사증후군이 정확히 무엇인가요?", keywords: ["대사증후군", "정의"], patterns: ["대사증후군이 뭐예요?", "대사증후군 진단 기준은?", "아이도 대사증후군에 걸리나요?"], summary: "• 대사증후군: 여러 대사 이상이 동시 발생하는 상태", related: [345, 346, 348, 316, 331], category: "insulin", answer: "부모님, 너무 걱정만 하실 필요는 없습니다. 지금 바로 시작하면 완벽히 되돌릴 수 있기 때문입니다. 아이들의 동맥경화가 성인과 다른 점은 엄청난 회복력에 있습니다. 아이들의 혈관은 성인처럼 완전히 딱딱해진 상태가 아닙니다. 기름기가 끼어 있더라도 식단과 운동을 통해 혈액을 맑게 해주면 다시 매끈하고 탄력 있는 상태로 돌아가는 속도가 매우 빠릅니다. 어린 시절의 혈관 세포는 재생 능력이 탁월합니다. 지금 지방간과 이상지질혈증을 잘 관리해 주시면, 아이는 성인이 되었을 때 동맥경화가 전혀 없었던 사람과 같은 건강한 혈관을 가질 수 있습니다. 아이들은 살쪄도 나중에 다 키로 가고 혈관도 튼튼해진다는 말은 자칫 위험할 수 있습니다. 하지만 반대로 지금 관리하면 전혀 늦지 않았다는 말은 의학적으로 매우 정확한 사실입니다. 아이의 혈관 건강은 오늘 부모님이 챙겨주시는 식탁 위에서부터 다시 시작됩니다.", videoUrl: "https://youtube.com/shorts/IWKtW9bEJpk?si=tBXhgx56i6zfa6AK" },
    { id: 345, title: "대사증후군은 얼마나 흔한가요?", keywords: ["대사증후군", "빈도", "흔한"], patterns: ["대사증후군은 얼마나 흔한가요?", "우리 아이만 대사증후군인가요?", "대사증후군 많이 생기나요?"], summary: "• 전체 소아청소년: 약 5%", related: [344, 346, 347, 348], category: "insulin", answer: "부모님 중 한 분이라도 엘디엘 수치가 백구십 이상이거나 이미 약을 복용 중일 때입니다. 셋째, 가족 중에 남성은 오십오 세, 여성은 육십오 세 이전이라는 젊은 나이에 협심증이나 심근경색 같은 심장 질환을 앓은 분이 계실 때입니다. 이 질환을 가진 아이들은 태어날 때부터 높은 콜레스테롤 수치에 혈관이 노출됩니다. 그래서 일반적인 비만 아동보다 동맥경화가 훨씬 빠르고 강력하게 진행되는데요. 스타틴 같은 약물 치료를 하지 않으면 이삼십 대라는 매우 이른 나이에 심각한 심장 질환이 생길 수 있습니다. 약물은 유전적으로 부족한 콜레스테롤 제거 능력을 보완해서 혈관이 망가지는 것을 막아주는 생명줄 역할을 합니다. 부모님, 꼭 하셔야 할 일이 있습니다. 바로 가족 모두가 검사를 받는 것입니다. 이 병은 유전될 확률이 오십 퍼센트나 됩니다. 아이가 진단을 받았다면 부모님과 형제, 자매 모두 혈액 검사를 받아야 합니다. 일찍 발견해서 관리할수록 아이의 미래는 드라마틱하게 좋아질 수 있습니다.", videoUrl: "https://youtube.com/shorts/D9NbzFTpw1k?si=auNherHPGcOi9uSU" },
    { id: 346, title: "대사증후군은 왜 생기나요?", keywords: ["대사증후군", "원인"], patterns: ["대사증후군은 왜 생기나요?", "대사증후군 원인이 뭐예요?", "왜 여러 증상이 같이 오나요?"], summary: "• 핵심 원인: 인슐린 저항성", related: [344, 316, 322, 347, 348], category: "insulin", answer: "부모님, 아이의 콜레스테롤 수치를 미리 아는 것은 아이의 미래 혈관 건강을 위한 보험을 드는 것과 같습니다. 특히 비만한 아이라면 이번 방학을 이용해 가까운 소아청소년과에서 혈액 검사를 꼭 받아보시길 추천합니다.", videoUrl: "https://youtube.com/shorts/V_zQ7ZcsExU?si=PxWvzyJS8VkJUJKj" },
    { id: 347, title: "대사증후군이 있으면 어떤 위험이 있나요?", keywords: ["대사증후군", "위험", "합병증"], patterns: ["대사증후군이 있으면 어떻게 되나요?", "대사증후군 합병증은?", "대사증후군 위험은?"], summary: "• 단기 위험 (소아청소년기):", related: [344, 363, 331, 340, 348], category: "insulin", answer: "부모님, 고혈압과 이상지질혈증을 관리하면 지방간까지 덤으로 좋아집니다. 아이들은 회복력이 매우 뛰어나기 때문에, 올바른 식단과 운동만으로도 두 질환을 동시에 해결할 수 있는 가능성이 성인보다 훨씬 높습니다. 오늘부터 시작하는 가족의 작은 습관이 아이의 평생 건강을 결정합니다.", videoUrl: "https://youtube.com/shorts/ZMKxu2twOHs?si=IkBA70mQfS9MjDDN" },
    { id: 348, title: "대사증후군은 어떻게 치료하나요?", keywords: ["대사증후군", "치료", "관리"], patterns: ["대사증후군은 어떻게 치료하나요?", "대사증후군 개선 방법은?", "대사증후군에 약이 필요한가요?"], summary: "• 핵심 치료: 생활 습관 개선 (체중 5-10% 감량)", related: [344, 325, 349, 350, 354], category: "insulin", answer: "부모님, 하지만 꼭 기억해야 할 희망의 메시지가 있습니다. 대사증후군은 충분히 되돌릴 수 있는 단계입니다. 뿌리인 복부 비만과 인슐린 저항성만 해결하면, 고혈압부터 고혈당까지 복잡하게 얽혀 있던 모든 실타래가 한꺼번에 풀리게 됩니다. 우리 아이의 건강한 미래를 위해 오늘부터 그 실타래를 하나씩 풀어가 보시기 바랍니다", videoUrl: "https://youtube.com/shorts/nUmjb7KrCQs?si=MWbtrNqdv1zW5LIu" },
    { id: 349, title: "대사증후군에 좋은 식단은 무엇인가요?", keywords: ["대사증후군", "식단", "음식"], patterns: ["대사증후군에 좋은 음식은?", "대사증후군 식단은 어떻게 짜나요?", "뭘 먹으면 안 되나요?"], summary: "[피해야 할 음식]", related: [348, 326, 311, 350], category: "insulin", answer: "소아청소년에게 대사증후군이 얼마나 흔한가요? 어린 나이에 벌써 성인병 증세가 있겠어라고 생각하기 쉽지만, 최근 소아청소년의 대사 건강 수치는 매우 우려스러운 수준입니다. 먼저 비만 아동 세 명 중 한 명은 대사증후군을 앓고 있습니다. 일반 청소년 전체로 보면 삼에서 오 퍼센트 수준이지만, 비만 청소년으로 범위를 좁히면 그 비율은 약 삼십 퍼센트까지 급격히 올라갑니다. 즉, 살이 찐 아이들 열 명 중 세 명은 이미 몸의 대사 시스템이 무너진 상태라는 뜻입니다. 더 놀라운 점은 비만 청소년의 구십 퍼센트가 잠재적 위험군이라는 사실입니다. 대사증후군 진단 기준인 세 개에 미치지 않더라도, 비만 청소년 대부분은 고혈압이나 고혈당 같은 다섯 가지 위험 인자 중 최소 한 개 이상을 이미 가지고 있습니다. 이는 언제든 대사증후군으로 넘어갈 수 있는 위험한 대기 상태임을 의미합니다. 부모님께서 안심해서는 안 되는 이유가 있습니다. 대사증후군은 진행형 상태이기 때문입니다. 지금 당장 위험 인자가 한두 개라고 해서 건강한 것이 아닙니다. 관리가 없다면 그 숫자가 늘어나는 것은 시간문제일 뿐입니다. 또한 어릴 때 대사증후군이 시작되면 성인이 되었을 때 당뇨병이나 심혈관 질환이 나타나는 시기가 이삼십 대로 훨씬 빨라집니다. 특히 체중은 정상이어도 유독 배만 볼록한 아이라면 이미 내장 지방으로 인해 대사 이상이 시작되었을 가능성이 큽니다. 아이의 몸에 나타난 단 하나의 이상 신호를 가볍게 여기지 마세요. 살짝 높은 혈압이나 중성지방 수치는 몸이 보내는 마지막 구조 신호입니다. 이 신호가 나타났을 때 식단과 활동량을 조절하면, 여러 질병이 겹치는 대사증후군으로 진행되는 것을 확실히 막을 수 있습니다.", videoUrl: "https://youtube.com/shorts/iSxG8BajsEw?si=hzRTx9zS9GhWmErD" },
    { id: 350, title: "대사증후군 개선을 위한 운동은 어떻게 해야 하나요?", keywords: ["대사증후군", "운동"], patterns: ["대사증후군에 어떤 운동이 좋아요?", "운동을 얼마나 해야 하나요?", "유산소와 근력 운동 둘 다 해야 하나요?"], summary: "• 목표: 주당 300분 이상 중강도 활동", related: [348, 328, 349, 354], category: "insulin", answer: "부모님, 꼭 기억해 주세요. 대사증후군은 어느 날 갑자기 생기는 병이 아닙니다. 과도하게 먹고 뱃살이 늘어나면서 인슐린 저항성이 생기고, 결국 전신 대사가 마비되는 과정을 거칩니다. 다행히 아이들은 내장 지방을 줄이기만 해도 이 염증 공장의 가동이 멈춥니다. 마비되었던 대사 시스템이 놀라울 정도로 빠르게 복구되니, 지금 바로 아이의 뱃살 관리부터 시작해 보시기 바랍니다.", videoUrl: "https://youtube.com/shorts/qZSDbScfQH8?si=niUXqGcSnCHZbJCM" },
    { id: 351, title: "대사증후군이 유전되나요?", keywords: ["대사증후군", "유전"], patterns: ["대사증후군이 유전되나요?", "부모가 대사증후군이면 아이도 걸리나요?", "가족력이 있으면 어떡하죠?"], summary: "• 유전적 소인: 있음 (가족력 중요)", related: [346, 341, 348], category: "insulin", answer: "부모님, 나중에 크면 건강해지겠지라는 막연한 기대는 이 위험한 경고등을 무시하는 것과 같습니다. 하지만 반대로 지금 이 경고등이 켜졌을 때 생활 습관을 바로잡으면, 아이의 미래에서 당뇨병과 심장병이라는 단어를 완전히 지워버릴 수 있습니다. 질병은 삼십 대 이후에 관리하는 것이 아니라 바로 지금 관리해야 합니다. 아이들의 혈관과 췌장은 아직 젊습니다. 지금 관리를 시작하면 성인이 되어 겪을 고통스러운 질병들을 충분히 예방할 수 있는 기회의 시간은 아직 충분합니다. 부모님의 결단이 아이의 평생 건강을 결정합니다.", videoUrl: "https://youtube.com/shorts/X9Lm1C07SHE?si=ujaJyL2gTOpdzTl7" },
    { id: 352, title: "대사증후군과 다낭성난소증후군은 관계가 있나요?", keywords: ["다낭성난소증후군", "PCOS"], patterns: ["다낭성난소증후군과 대사증후군 관계는?", "생리가 불규칙한데 대사증후군인가요?", "PCOS가 있으면 대사증후군도 오나요?"], summary: "• 다낭성난소증후군 (PCOS): 여성 호르몬 장애", related: [344, 316, 348], category: "insulin", answer: "부모님, 완벽보다 지속 가능함이 더 중요합니다. 이 모든 것을 한꺼번에 바꾸려 하면 아이가 쉽게 포기할 수 있습니다. 이번 주는 음료수 끊기, 다음 주는 저녁 식사 후 산책하기처럼 하나씩 늘려가며 아이의 성취감을 높여주시기 바랍니다.", videoUrl: "https://youtube.com/shorts/zjpF_I9GF28?si=us_DiS9pXqGkfgs7" },
    { id: 353, title: "가족 모두가 함께 노력해야 하나요?", keywords: ["가족", "부모", "역할"], patterns: ["가족이 함께 노력해야 하나요?", "아이만 식단 조절하면 안 되나요?", "부모 역할이 뭐예요?"], summary: "• 가족 참여 필수: 아이 혼자 힘으로는 어려움", related: [348, 424], category: "growth", answer: "부모님, 아이가 약을 먹게 되었다고 해서 죄책감을 느끼실 필요는 없습니다. 오히려 약물 치료는 아이의 췌장과 혈관이 더 이상 망가지지 않도록 보호막을 쳐주는 과정입니다. 이 보호막 안에서 아이가 건강한 생활 습관을 진짜 자기 것으로 만드는 시간을 벌어준다고 생각하시면 좋습니다.", videoUrl: "https://youtube.com/shorts/Vq70RCgEjFs?si=4uXzAI-ht9t-S3o0" },
    { id: 354, title: "대사증후군은 얼마나 걸려서 개선되나요?", keywords: ["대사증후군", "개선", "시간"], patterns: ["대사증후군은 언제 나아지나요?", "개선 기간이 얼마나 걸리나요?", "빨리 낫나요?"], summary: "• 단계별 개선:", related: [348, 329], category: "insulin", answer: "부모님, 식탁 위의 절대 규칙 두 가지를 기억해 주세요. 먼저 아이의 의지력을 시험하지 마세요. 집 안의 서랍이나 냉장고에서 과자와 음료수를 아예 치우는 것이 첫걸음입니다. 눈에 보이지 않아야 마음에서도 멀어집니다. 또한 아이와 함께 요리해 보세요. 아이가 직접 샐러드를 버무리거나 채소를 씻으며 요리에 참여하면, 새로운 식단에 대한 거부감이 훨씬 줄어듭니다.", videoUrl: "https://youtube.com/shorts/7oCTsXzWE1E?si=30BTOKTSqsViDD-3" },
    { id: 355, title: "대사증후군이 있으면 병원에 자주 가야 하나요?", keywords: ["대사증후군", "병원", "방문"], patterns: ["병원에 얼마나 자주 가야 하나요?", "검사는 언제 받나요?", "나아지면 병원 안 가도 되나요?"], summary: "• 초기 집중 관리: 3개월마다", related: [348, 332], category: "insulin", answer: "부모도 대사증후군이 있는데, 우리 아이도 위험한가요? 네, 부모님이 당뇨나 심혈관 질환이 있으면 자녀의 위험이 두 배에서 세 배 정도 증가하는 것은 사실입니다. 하지만 너무 상심하지 마세요. 이는 단순히 타고난 유전자 때문만은 아닙니다. 가장 큰 이유는 가족이 공유하는 식습관과 생활 환경의 영향이 크기 때문입니다. 같은 식탁에서 같은 음식을 먹고, 비슷한 활동량을 공유하다 보니 대사 질환이 대물림되는 것처럼 보이는 것이죠. 다행히 유전자는 바꿀 수 없지만, 환경은 바꿀 수 있습니다. 부모님이 먼저 싱겁게 먹고 즐겁게 움직이는 건강한 습관을 실천하면, 아이에게 전달되는 유전적 위험을 충분히 이겨낼 수 있습니다. 부모님의 대사증후군 관리가 곧 우리 아이의 질병 예방 활동이기도 합니다. \"우리 집안 내력이니까 어쩔 수 없어\"라고 포기하기보다, \"나부터 바뀌어서 우리 아이의 미래를 바꾸겠다\"는 마음가짐이 중요합니다. 오늘 부모님이 선택하시는 건강한 한 끼가 아이의 유전자 스위치를 건강한 방향으로 켜줄 것입니다.", videoUrl: "https://youtube.com/shorts/IBecu8nLuYI?si=FpYiw7g1LBJKzm2d" },
    { id: 356, title: "대사증후군이 있어도 학교생활에 지장이 없나요?", keywords: ["대사증후군", "학교", "생활"], patterns: ["대사증후군이 있어도 학교생활 괜찮나요?", "체육 수업 참여해도 되나요?", "급식은 어떻게 먹이죠?"], summary: "• 학교생활: 대부분 정상적 참여 가능", related: [348, 371], category: "insulin", answer: "부모님, 속도보다 방향이 중요합니다. 한 달에 십 킬로그램을 빼는 것보다, 한 달에 오백 그램을 빼더라도 그 습관을 평생 유지할 수 있느냐가 훨씬 중요합니다. 급격한 다이어트는 요요 현상을 불러와 대사 시스템을 더 망가뜨릴 수 있습니다. 지금 당장 일 년 뒤를 생각하면 막막할 수 있습니다. 그래서 첫 사 주의 기적에 집중해 보세요. 사 주 동안 음료수만 물로 바꿔보자는 작은 목표가 중성지방 수치를 바꾸고, 그 변화가 아이와 부모님께 큰 동기부여가 될 것입니다.", videoUrl: "https://youtube.com/shorts/aXUujj5xZ9A?si=tjT6MDZwpqirojCC" },
    { id: 357, title: "대사증후군은 완치가 가능한가요?", keywords: ["대사증후군", "완치"], patterns: ["대사증후군은 완치가 되나요?", "평생 가는 병인가요?", "완전히 나을 수 있나요?"], summary: "• 완치 개념: 진단 기준에서 벗어남", related: [354, 348], category: "insulin", answer: "부모님, 다행히 두 질환은 치료법도 같습니다. 뱃살을 줄이고 인슐린 저항성을 개선하면 간에 낀 기름이 빠짐과 동시에 혈압과 혈당도 정상으로 돌아옵니다. 즉, 체중 관리와 식단이라는 한 가지 목표만 제대로 실천해도 두 가지 큰 병을 동시에 해결할 수 있습니다.", videoUrl: "https://youtube.com/shorts/eZAiAFD1Z_0?si=0ih6M6B2y_uPhW_n" },
    { id: 358, title: "대사증후군과 지방간은 어떤 관계인가요?", keywords: ["대사증후군", "지방간", "관계"], patterns: ["대사증후군과 지방간 관계는?", "지방간이 있으면 대사증후군도 있나요?", "둘이 같이 오나요?"], summary: "• 밀접한 관계: 대사증후군의 간 증상 = 지방간", related: [331, 344], category: "insulin", answer: "여아에서 대사증후군과 다낭성난소증후군은 관련이 있나요? 네, 두 질환은 인슐린 저항성이라는 공통된 뿌리를 공유하고 있어 매우 밀접하게 연결되어 있습니다. 비만한 여자아이에게 대사증후군 신호가 보인다면, 호르몬 불균형으로 인한 다낭성난소증후군이 동반될 가능성이 매우 높습니다. 왜 비만하면 난소에 문제가 생길까요? 바로 인슐린 저항성이 범인입니다. 몸속에 인슐린이 너무 많아지면, 이 인슐린이 난소를 직접 자극해서 남성호르몬인 안드로겐을 과도하게 만들어내게 합니다. 높아진 남성호르몬은 정상적인 배란을 방해해서 생리 불순을 일으키고, 난소에 작은 물혹들이 여러 개 생기는 상태를 만듭니다. 부모님께서는 아이의 몸에 나타나는 세 가지 의심 증상을 체크해 보세요. 첫째는 생리 불순입니다. 초경을 한 지 이 년이 지났음에도 주기가 매우 불규칙하거나 몇 달씩 생리를 거르는 경우입니다. 둘째는 피부 변화입니다. 여드름이 심해지거나, 목 뒤나 겨드랑이 피부가 검고 두껍게 변하는 흑색가시세포증이 나타날 수 있습니다. 셋째는 다모증입니다. 인중이나 턱, 팔다리에 털이 굵고 진하게 자라는 경우입니다. 다행히 다낭성난소증후군 치료의 첫걸음도 결국 체중 감량입니다. 체중의 오에서 십 퍼센트만 줄여도 인슐린 수치가 낮아지면서 난소에 가해지는 자극이 줄어듭니다. 결과적으로 남성호르몬 수치가 떨어지고, 끊겼던 배란이 다시 시작되면서 생리 주기가 마법처럼 규칙적으로 돌아오는 경우가 많습니다. 사춘기 아이에게 생리 불순이나 여드름은 큰 스트레스입니다. 이를 단순히 사춘기라서 그렇다고 넘기기보다, 몸 안의 대사 시스템이 보내는 호르몬 신호로 받아들여 주세요. 체중 관리는 단순히 외모를 위한 것이 아니라, 아이의 소중한 여성 건강을 지키는 가장 중요한 치료입니다.", videoUrl: "https://youtube.com/shorts/_frkNjGiB_A?si=ooQYLoulL95JEZFP" },
    { id: 359, title: "대사증후군 약물 치료는 언제 시작하나요?", keywords: ["대사증후군", "약물"], patterns: ["대사증후군 약을 먹어야 하나요?", "약물 치료는 언제 시작하나요?", "메트포르민이 뭐예요?"], summary: "• 원칙: 생활 습관 개선 우선 (6-12개월)", related: [348, 343, 378], category: "insulin", answer: "부모님, 오늘부터 너 살 빼야 해라는 말 대신, 우리 가족 건강을 위해 오늘 저녁은 엄마 아빠랑 같이 산책하러 나갈까라고 제안해 보세요. 아이는 혼자가 아니라는 느낌을 받을 때 가장 큰 변화의 힘을 발휘합니다.", videoUrl: "https://youtube.com/shorts/m4wCPKIlJno?si=dINPN1ROwJtEx6__" },
    { id: 360, title: "대사증후군이 있으면 운동선수가 될 수 없나요?", keywords: ["대사증후군", "운동선수"], patterns: ["대사증후군이 있어도 운동선수 될 수 있나요?", "격한 운동해도 되나요?", "운동부 들어가도 괜찮아요?"], summary: "• 가능: 조기 관리 시 정상 활동 모두 가능", related: [350, 348], category: "insulin", answer: "부모님, 정기 방문일이 아니더라도 즉시 병원을 찾아야 할 때가 있습니다. 짧은 기간에 살이 갑자기 찌거나, 심한 두통, 잦은 갈증, 혹은 이유 없는 복통 같은 새로운 증상이 나타날 때입니다. 또한 아이가 식단이나 운동에 대해 극심한 스트레스를 호소하며 거부증을 보인다면 전문가의 도움을 받아 심리적 위기를 함께 해결해야 합니다.", videoUrl: "https://youtube.com/shorts/hz2yeOCqKyo?si=DJeieL0jYZKqX0ui" },
    { id: 361, title: "대사증후군과 지방간은 같이 치료할 수 있나요?", keywords: ["대사증후군", "지방간", "같이"], patterns: ["지방간이랑 대사증후군 같이 치료되나요?", "둘 다 있으면 어떻게 관리하죠?", "치료법이 다른가요?"], summary: "• 동일한 치료 방법으로 동시 개선 가능", related: [358, 348, 325], category: "insulin", answer: "부모님, 아이가 대사증후군이라는 틀에 갇혀 스스로를 환자라고 느끼지 않게 하는 것이 가장 중요합니다. 이거 먹지 마라는 금지보다는 이걸 먹으면 우리 몸이 더 튼튼해져라는 긍정적인 선택지를 주세요. 관리를 통해 살이 빠지고 체력이 좋아지는 과정을 아이가 직접 체감하게 되면, 대사 관리는 힘든 숙제가 아니라 즐거운 자기계발이 될 것입니다.", videoUrl: "https://youtube.com/shorts/3YTT343pAbw?si=dlxP_PSawaLruT12" },
    { id: 362, title: "대사증후군이 있으면 수면무호흡증도 생기나요?", keywords: ["수면무호흡증", "코골이"], patterns: ["대사증후군이 있으면 코골이도 생기나요?", "수면무호흡증과 관계 있나요?", "아이가 자다가 숨을 안 쉬는데 관련 있나요?"], summary: "• 높은 연관성: 대사증후군 환자 30-50% 수면무호흡증", related: [344, 347, 348], category: "insulin", answer: "부모님, 대사증후군 관리의 최종 종착지는 어디일까요? 단기적으로는 삼 개월 내에 혈압이나 혈당 수치 중 하나를 정상으로 돌리는 것입니다. 중기적으로는 일 년 내에 대사증후군 진단 기준에서 탈피하는 것이죠. 그리고 최종 목표는 성인이 되어서도 만성 질환 걱정 없이 살 수 있는 습관을 선물하는 것입니다. 성인이 되어 고착화된 대사증후군을 고치는 것은 몇 배의 노력이 들지만, 아이들은 성장 호르몬과 높은 대사량 덕분에 조금만 노력해도 몸이 금방 반응합니다. 지금이 가장 빠르고 효과적인 때입니다. 부모님과 아이가 함께하는 오늘의 노력은 아이의 평생 건강을 결정짓는 가장 가치 있는 투자가 될 것입니다.", videoUrl: "https://youtube.com/shorts/bGaNcAG863U?si=qC7LfF1WAQ4ioRzH" },
    { id: 363, title: "제2형 당뇨병이 뭔가요?", keywords: ["제2형 당뇨병"], patterns: ["제2형 당뇨병이 뭐예요?", "제1형이랑 제2형 차이는?", "아이도 당뇨병에 걸리나요?"], summary: "• 제2형 당뇨병: 인슐린 저항성 + 췌장 기능 저하", related: [364, 316, 366, 367], category: "insulin", answer: "부모님, 너무 절망하실 필요는 없습니다. 성장기 아이들은 성인보다 회복력 또한 매우 뛰어나기 때문입니다. 지금 즉시 식단에서 액상과당을 끊고 매일 운동을 시작하면, 지쳐있는 췌장 기능을 보호하고 무서운 합병증을 충분히 막을 수 있습니다. 아이의 몸이 보내는 신호를 놓치지 마세요. 갑자기 물을 많이 마시거나 소변 횟수가 늘어난다면, 혹은 살이 찌는데도 기운이 없어 보인다면 바로 검사를 받아보는 것이 좋습니다. 부모님의 빠른 대처가 아이의 췌장을 살리는 골든타임을 지켜낼 수 있습니다.", videoUrl: "https://youtube.com/shorts/FRt4hnYHjDw?si=wvwkz3fNy7HxlXsa" },
    { id: 364, title: "소아청소년 당뇨병 진단 기준은 무엇인가요?", keywords: ["당뇨병", "진단", "기준"], patterns: ["당뇨병 진단 기준이 뭐예요?", "혈당이 얼마나 높으면 당뇨병인가요?", "당화혈색소가 뭐예요?"], summary: "• 진단 기준 (하나 이상):", related: [363, 365, 370], category: "insulin", answer: "부모님 진단 기준에 아주 살짝 못 미치는 전 단계라고 해서 안심해서는 안 됩니다. 전 단계는 이미 우리 아이 몸의 인슐린 시스템에 과부하가 걸려있다는 강력한 경고 입니다. 하지만 다행히 아이들은 이 단계에서 생활 습관을 조금만 교정해도 정상 수치로 되돌아올 확률이 매우 높습니다. 지금이 바로 식단과 운동이라는 최고의 처방을 내려야 할 골든 타임입니다. 아이의 미래를 위해 이 경고 신호를 절대 놓치지 마세요.", videoUrl: "https://youtube.com/shorts/smqxLoDHlqk?si=UwaTEvC9pGXo52lN" },
    { id: 365, title: "우리 아이도 당뇨병 검사를 받아야 하나요?", keywords: ["당뇨", "검사", "대상"], patterns: ["아이도 당뇨 검사 받아야 하나요?", "당뇨 검사는 언제 받나요?", "누가 당뇨 검사를 받아야 하나요?"], summary: "• 검사 대상 (10세 이상 또는 사춘기 + 비만 + 하나 이상):", related: [364, 363, 366], category: "insulin", answer: "어떤 아이들이 당뇨병 검사를 받아야 하나요? 우리 아이가 성인병인 당뇨병 위험군에 해당하는지 확인하는 것은 매우 중요합니다. 특히 다음과 같은 조건에 해당한다면 반드시 혈당 검사를 받아보셔야 합니다. 먼저 열 세 이상이거나 사춘기가 시작된 비만 아동이 대상입니다. 이 중에서도 가족 중에 당뇨병 환자가 있거나, 인슐린 저항성의 증거인 흑색극세포증이 나타난다면 지체하지 말고 검사해야 합니다. 흑색극세포증은 목 뒤나 겨드랑이가 마치 때가 낀 것처럼 검게 변하는 증상을 말하는데요. 또한 이미 고혈압이나 지질 이상 진단을 받은 아이들도 필수 검사 대상입니다. 부모님께서 꼭 기억하셔야 할 신호가 바로 이 흑색극세포증입니다. 이는 단순히 씻지 않아서 생기는 때가 아닙니다. 몸속 인슐린이 너무 과해져서 피부 세포를 자극해 나타나는 중요한 의학적 신호입니다. 아이의 목 뒤나 겨드랑이, 사타구니가 거뭇하고 거칠거칠하다면 당뇨병 위험이 크다는 뜻이니 꼭 병원을 방문해 주세요. 설령 검사 결과가 정상으로 나오더라도 안심은 금물입니다. 비만도가 유지된다면 최소한 삼 년마다 재검사를 받아야 하며, 만약 아이의 체중이 급격히 늘어난다면 그보다 더 자주 혈당 수치를 확인해야 합니다. 아이의 피부가 보내는 구조 신호를 놓치지 않는 부모님의 세심한 관찰이 당뇨병 예방의 시작입니다.", videoUrl: "https://youtube.com/shorts/l3xmSQq6mh0?si=5rxy8sWotDdGhXD2" },
    { id: 366, title: "소아청소년 당뇨병은 왜 위험한가요?", keywords: ["당뇨병", "위험", "무서운"], patterns: ["소아 당뇨병이 왜 무서운가요?", "당뇨병 합병증은?", "아이 당뇨병이 더 위험한가요?"], summary: "• 조기 발병 → 합병증 노출 기간↑", related: [363, 368], category: "insulin", answer: "부모님, 아이들의 당뇨병은 시간과의 싸움입니다. 췌장이 스스로 혈당을 조절하는 능력을 완전히 잃기 전에 서둘러 관리를 시작해야 합니다. 췌장이 망가지는 속도가 빠른 만큼, 우리가 대응해야 하는 속도도 빨라야 합니다. 다행히 아이들은 회복 탄력성이 좋아 이 빠른 진행 속도를 늦추거나 정상으로 되돌릴 기회도 성인보다 훨씬 큽니다. 지금 시작하는 식단 관리와 운동이 아이의 이삼십 대를 지켜주는 가장 확실한 투자가 될 것입니다. 췌장이 더 이상 지치지 않도록 오늘부터 아이의 짐을 함께 나누어 들어주세요.", videoUrl: "https://youtube.com/shorts/UCKPuRQNZlQ?si=9F0krZx8woxwN-le" },
    { id: 367, title: "아이 당뇨병 증상은 무엇인가요?", keywords: ["당뇨병", "증상", "신호"], patterns: ["아이 당뇨병 증상은?", "물을 많이 마시는데 당뇨인가요?", "목이 검어지는데 왜 그래요?"], summary: "• 제2형 당뇨병: 대부분 무증상 (서서히 진행)", related: [364, 365, 363], category: "insulin", answer: "부모님, 아이가 요즘 너무 피곤해라고 하거나 왜 이렇게 물을 많이 마시지라는 생각이 든다면 이미 당뇨가 꽤 진행된 상태일 수 있습니다. 특히 따로 다이어트를 하지 않았는데도 살이 저절로 빠진다면 이는 몸이 보내는 비상사태 신호입니다. 하지만 제이형 당뇨병은 초기에는 증상이 전혀 없는 경우가 아주 많습니다. 그래서 증상이 나타날 때까지 기다리기보다, 아이가 비만하다면 미리 정기적인 검진을 통해 혈당 건강을 체크해 주시는 것이 무엇보다 중요합니다. 부모님의 세심한 관찰이 아이의 소중한 에너지를 지키는 시작입니다.", videoUrl: "https://youtube.com/shorts/ZKtzteVONTk?si=FVW4uBT7VUOFWebO" },
    { id: 368, title: "소아청소년 당뇨병은 어떻게 치료하나요?", keywords: ["당뇨병", "치료", "관리"], patterns: ["아이 당뇨병 치료는 어떻게 하나요?", "당뇨약을 먹어야 하나요?", "인슐린 주사 맞아야 하나요?"], summary: "• 목표: HbA1c <7% (개별화)", related: [369, 370, 371], category: "insulin", answer: "부모님, 치료의 최종 목표는 아이가 약 없이도 혈당을 스스로 조절할 수 있는 몸을 만드는 것입니다. 약물은 췌장이 다시 건강해질 때까지 곁에서 도와주는 지팡이 역할을 합니다. 아이가 약을 먹는 동안 식단과 운동을 통해 체중을 감량하고 근육을 키우면, 나중에는 지팡이 없이도 스스로 건강하게 걷는 것처럼 약 없이 정상 수치를 유지할 수 있게 됩니다. 오늘부터 시작하는 건강한 식탁과 즐거운 운동이 우리 아이의 췌장을 다시 춤추게 할 것입니다. 부모님이 아이의 든든한 치료 파트너가 되어주세요.", videoUrl: "https://youtube.com/shorts/9VqRvJNsqZg?si=cww1aHMuqBIirscA" },
    { id: 369, title: "혈당은 어떻게 측정하나요?", keywords: ["혈당", "측정", "재는", "단것"], patterns: ["혈당은 어떻게 재나요?", "혈당 측정기 사용법은?", "혈당은 언제 재야 하나요?"], summary: "• 자가 혈당 측정:", related: [368, 389, 370], category: "insulin", answer: "부모님, 급성 합병증은 골든타임이 가장 중요합니다. 아이가 평소와 다르게 심하게 헐떡이거나 의식이 혼미하다면 지체하지 말고 응급실을 방문하세요. 특히 운동 전후나 식사를 거른 경우에는 저혈당 위험이 큽니다. 아이의 가방이나 주머니에 항상 비상용 사탕이나 주스를 챙겨주시고, 주변 친구들이나 선생님께도 아이의 상태를 미리 알려 대처할 수 있도록 도와주세요.", videoUrl: "https://youtube.com/shorts/MbUjE7M1mg8?si=uBi8dQaA8JfTasb0" },
    { id: 370, title: "당화혈색소가 뭔가요?", keywords: ["당화혈색소", "HbA1c"], patterns: ["당화혈색소가 뭐예요?", "HbA1c가 뭐예요?", "당화혈색소 정상 범위는?"], summary: "• 당화혈색소 (HbA1c): 최근 2-3개월 평균 혈당 반영", related: [364, 368, 369], category: "insulin", answer: "부모님, 만성 합병증이 정말 무서운 이유는 초기에는 아무런 통증이나 증상이 없다는 점입니다. 돌이킬 수 없을 정도로 혈관이 망가진 후에야 뒤늦게 신호를 보냅니다. 하지만 희망은 있습니다. 혈당을 정상 범위로 꾸준히 유지하면 이러한 합병증의 발생을 칠십 퍼센트 이상 막거나 늦출 수 있습니다. 지금 아이와 함께 실천하는 식단과 운동은 아이의 이십 대와 삼십 대 미래를 지켜주는 가장 확실한 건강 보험입니다. 오늘 하루의 관리가 아이의 평생을 바꿀 수 있다는 마음으로 조금 더 힘을 내주시기 바랍니다.", videoUrl: "https://youtube.com/shorts/y_sKnJQnJSs?si=abDRyyl_yb__pAP6" },
    { id: 371, title: "당뇨병이 있어도 학교생활에 지장이 없나요?", keywords: ["당뇨병", "학교", "생활"], patterns: ["당뇨병 있어도 학교생활 괜찮나요?", "체육 수업 참여해도 되나요?", "급식은 어떻게 먹이죠?"], summary: "• 정상적 학교생활 가능", related: [368, 369, 356], category: "insulin", answer: "부모님, 아이들은 바늘에 대한 공포감이 클 수 있습니다. 처음에는 부모님이 직접 측정하는 모습을 보여주며 안심시켜 주시고, 아이가 스스로 측정에 성공하면 큰 칭찬과 격려를 해주세요. 만약 혈당 수치가 높게 나왔다면 절대 아이를 혼내지 마세요. 대신 이 음식은 우리 아이 혈당을 많이 올리는구나, 다음에는 양을 조금 줄여서 먹어보자라고 말하며 함께 해결책을 찾는 건강 파트너가 되어주셔야 합니다. 혈당 측정기는 아이를 감시하는 도구가 아니라, 건강한 미래를 함께 만들어가는 내비게이션이라는 점을 꼭 기억해 주세요.", videoUrl: "https://youtube.com/shorts/KmKfyGEwg4A?si=fp4M5IuYNSzsKI53" },
    { id: 372, title: "당뇨병이 있을 때 외식은 어떻게 하나요?", keywords: ["당뇨병", "외식"], patterns: ["당뇨병 있으면 외식 못 하나요?", "외식할 때 뭘 먹어야 하나요?", "햄버거 먹어도 되나요?"], summary: "• 외식 가능 (선택적 주문)", related: [368, 349], category: "insulin", answer: "부모님, 당화혈색소는 시험 기간이나 며칠간의 반짝 식단 조절로는 절대 속일 수 없는 몸의 정직한 성적표입니다. 만약 검사 당일 혈당 수치가 조금 높게 나오더라도, 당화혈색소 수치가 안정적이라면 그동안 아이가 평소에 관리를 아주 잘해왔다는 뜻입니다. 이럴 때는 아이를 듬뿍 격려해 주세요. 반대로 검사 당일 혈당이 낮더라도 이 수치가 높게 나왔다면, 평소의 식습관을 다시 한번 꼼꼼히 점검해 봐야 합니다. 당화혈색소는 아이의 미래 건강을 예보하는 가장 중요한 수치인 만큼, 삼 개월마다 정기적인 검사를 통해 아이의 건강 성적표를 꾸준히 관리해 주시기 바랍니다.", videoUrl: "https://youtube.com/shorts/9q8H0PDQNY0?si=qH5D_RYRAdW9GWDv" },
    { id: 373, title: "당뇨병 아이의 심리적 지원은 어떻게 하나요?", keywords: ["당뇨병", "심리", "우울"], patterns: ["아이가 당뇨 때문에 우울해해요", "당뇨병 심리 지원은?", "아이가 스트레스받는데 어떡하죠?"], summary: "• 정서적 어려움: 낙인, 스트레스, 우울, 불안", related: [368, 371], category: "insulin", answer: "부모님, 아이가 운동을 힘든 치료라고 느끼지 않게 하는 것이 가장 중요합니다. 축구, 배드민턴, 댄스처럼 아이가 진심으로 즐거워하는 종목을 직접 선택하게 해주세요. 운동은 혈당을 낮출 뿐만 아니라 스트레스를 해소하고 자존감을 높여주어 당뇨 관리의 가장 든든한 아군이 됩니다. 다만 한 가지 꼭 기억해 주세요. 만약 운동 전 혈당이 이백오십 이상으로 너무 높다면, 이때 격렬한 운동을 하는 것은 오히려 몸에 무리가 갈 수 있습니다. 이런 날은 가벼운 산책으로 대신하며 아이의 컨디션을 세심하게 살펴주시는 것이 좋습니다. 즐거운 움직임이 우리 아이의 혈당을 잡는 마법이 될 것입니다.", videoUrl: "https://youtube.com/shorts/OvrzAGmeQ0M?si=FwCKFhXe-eop33L-" },
    { id: 374, title: "당뇨병을 예방할 수 있나요?", keywords: ["당뇨병", "예방"], patterns: ["당뇨병을 예방할 수 있나요?", "전당뇨에서 정상으로 돌아갈 수 있나요?", "당뇨병 예방법은?"], summary: "• 제2형 당뇨병: 60-70% 예방 가능", related: [364, 368, 423], category: "insulin", answer: "부모님, 아이가 학교에서 나만 다르다는 소외감을 느끼지 않게 하는 것이 무엇보다 중요합니다. 당뇨 관리를 부끄러워하거나 숨겨야 할 비밀이 아니라, 자신의 안전을 위해 꼭 지켜야 할 당당한 규칙으로 인식하게 도와주세요. 아이가 보건실을 눈치 보지 않고 편안하게 이용할 수 있도록, 학기 초에 보건 선생님과 미리 친해지는 시간을 갖게 해주는 것도 정서적 안정에 큰 도움이 됩니다. 학교는 아이의 꿈이 자라는 곳인 동시에, 스스로를 돌보는 법을 배우는 훌륭한 배움터가 될 수 있습니다. 부모님과 학교가 한 팀이 되어 우리 아이를 든든하게 지켜주세요.", videoUrl: "https://youtube.com/shorts/weO5o9_EBVg?si=Xfi1OmbmZJuO4wF4" },
    { id: 375, title: "당뇨병성 케톤산증이 뭔가요?", keywords: ["케톤산증", "DKA"], patterns: ["케톤산증이 뭐예요?", "DKA가 뭐예요?", "당뇨 응급 상황은?"], summary: "• 당뇨병성 케톤산증 (DKA): 급성 생명 위협 합병증", related: [366, 368], category: "insulin", answer: "당뇨병이 있으면 외식은 어떻게 해야 하나요? 외식을 아예 안 할 수는 없기에, 아이에게 똑똑하게 메뉴를 고르고 먹는 법을 가르쳐주는 것이 중요합니다. 먼저 메뉴 선택이 핵심입니다. 양념을 적게 넣은 비빔밥이나 구운 고기, 생선, 그리고 채소를 마음껏 먹을 수 있는 샤부샤부 같은 식당을 추천합니다. 소스가 많고 당분이 높은 중식이나 양식, 패스트푸드는 가급적 피하는 것이 좋은데요. 어떤 메뉴를 고르든 밥은 평소의 반 공기 정도만 먹는 습관을 들여보세요. 여기서 부모님이 알려주실 비법이 하나 있습니다. 바로 먹는 순서입니다. 식당에 가면 메인 음식이 나오기 전에 먼저 차려지는 샐러드나 채소 반찬을 먼저 먹도록 해주세요. 채소를 먼저 먹으면 당 흡수가 느려져 혈당이 급격히 오르는 것을 막아줍니다. 또한 소스나 드레싱은 미리 뿌리지 말고 따로 요청해서 살짝 찍어 먹는 방식을 권합니다. 외식 전후로 아이와 함께 혈당을 직접 재보는 것도 훌륭한 공부가 됩니다. 어떤 음식을 먹었을 때 혈당이 얼마나 오르는지 눈으로 확인하면, 아이 스스로 음식을 조절하는 능력이 생깁니다. 외식은 단순히 배를 채우는 시간이 아니라, 건강한 사회생활을 준비하는 소중한 훈련 과정입니다. 즐겁고 똑똑한 외식으로 아이의 자신감을 키워주세요.", videoUrl: "https://youtube.com/shorts/7MfVflVV6Oo?si=wjNPBrEVm_of6umi" },
    { id: 376, title: "당뇨병이 있으면 운동할 때 주의할 점은?", keywords: ["당뇨병", "운동", "주의"], patterns: ["당뇨병 있는데 운동해도 되나요?", "운동할 때 주의할 점은?", "운동 후 저혈당 오는데 어떡하죠?"], summary: "• 운동 권장: 혈당 조절, 인슐린 감수성↑", related: [368, 369, 350], category: "insulin", answer: "당뇨병 아이의 심리적 지원은 어떻게 해야 하나요? 아이가 당뇨를 내가 나쁜 짓을 해서 걸린 벌이라고 느끼지 않게 하는 것이 가장 중요합니다. 혈당 수치 결과 하나에 일희일비하며 아이를 혼내기보다, 오늘 이만큼 노력했네라고 말하며 관리하려 했던 습관과 과정 자체를 칭찬해 주세요. 사실 혈당을 완벽하게 관리하기란 어른에게도 매우 어려운 일입니다. 아이가 느끼는 답답한 마음을 충분히 공감해 주시고, 무엇을 하라고 시키는 지시자가 아닌 함께 걷는 든든한 건강 파트너가 되어주세요. 특히 사춘기 아이들에게 당뇨병은 신체적 고통보다 왜 나만 친구들처럼 마음껏 못 먹을까 하는 심리적 박탈감을 더 크게 줍니다. 이럴 때일수록 무조건 참아야 한다는 말보다, 속상하겠지만 우리 함께 방법을 찾아보자라는 따뜻한 위로를 먼저 건네주세요. 부모님부터 혈당 수치에 너무 예민하게 반응하지 않아야 아이도 당뇨를 자신의 삶의 일부로 당당하게 받아들일 수 있습니다. 부모님의 여유로운 마음이 아이로 하여금 스스로 건강을 관리할 마음의 근육을 키우게 합니다. 아이는 혼자가 아니라는 확신을 가질 때 가장 큰 변화의 힘을 발휘합니다.", videoUrl: "https://youtube.com/shorts/hZVF1iDW4zY?si=OepAgRfwugjj0tfd" },
    { id: 377, title: "당뇨병과 사춘기는 어떤 관계가 있나요?", keywords: ["당뇨병", "사춘기"], patterns: ["사춘기에 혈당이 왜 올라가요?", "아침 혈당이 높은데 왜 그래요?", "사춘기 당뇨 관리는?"], summary: "• 사춘기: 혈당 조절 어려운 시기", related: [368, 369, 373], category: "insulin", answer: "부모님, 당뇨병 예방은 아이 혼자만의 숙제가 아닙니다. 온 가족의 생활 양식을 바꾸는 가족 프로젝트가 되어야 합니다. 아이에게만 현미밥을 먹이고 운동을 강요하기보다, 부모님이 먼저 탄산음료를 끊고 저녁 식사 후 아이의 손을 잡고 산책하는 모습을 보여주세요. 이러한 환경의 변화가 아이가 가진 유전적 위험과 비만 요인을 이겨낼 가장 강력한 방어막이 됩니다. 부모님이 오늘 바꾸시는 식단과 생활 습관이 우리 아이의 미래에서 당뇨병이라는 단어를 지워줄 것입니다. 아이의 건강한 내일을 위해 오늘부터 온 가족이 함께 시작해 보세요.", videoUrl: "https://youtube.com/shorts/K9HcgYt2zP8?si=Z2nb1p5CQA2eQXDH" },
    { id: 378, title: "소아청소년도 비만 치료약을 먹을 수 있나요?", keywords: ["비만 약물", "살 빼는 약"], patterns: ["아이도 살 빼는 약 먹을 수 있나요?", "비만 약물은 언제 쓰나요?", "살 빼는 약 부작용은?"], summary: "• 원칙: 생활 습관 개선 우선 (6-12개월)", related: [379, 380, 368], category: "obesity", answer: "부모님, 약물 치료를 시작한다고 해서 죄책감을 느끼실 필요는 전혀 없습니다. 때로는 아이의 의지만으로 해결되지 않는 생물학적인 한계가 있을 수 있기 때문입니다. 아이의 몸이 너무 힘든 상태일 때 약물의 도움을 받는 것은 오히려 현명한 선택일 수 있습니다. 다만 약을 먹는 동안 아이가 약만 먹으면 살이 빠진다고 오해하지 않도록 잘 설명해 주세요. 건강한 음식을 선택하고 몸을 움직이는 즐거움을 함께 찾아주시는 부모님의 노력이 곁들여질 때, 약물 치료의 효과는 극대화됩니다. 약물이라는 지팡이를 짚고 걷는 동안 아이가 스스로 달릴 수 있는 근육을 키울 수 있도록 든든한 페이스메이커가 되어주세요.", videoUrl: "https://youtube.com/shorts/RfUJS9Yb90Y?si=wHkps140GxGQw0Uy" },
    { id: 379, title: "메트포르민이 뭔가요?", keywords: ["메트포르민"], patterns: ["메트포르민이 뭐예요?", "메트포르민 효과는?", "메트포르민 부작용은?"], summary: "• 메트포르민: 인슐린 저항성 개선 약물", related: [378, 316, 368], category: "insulin", answer: "부모님, 메트포르민은 전 세계적으로 가장 오랫동안 안전하게 사용되어 온 제이형 당뇨병의 일차 치료제입니다. 간혹 벌써 약을 먹어야 하나 하고 걱정하시기도 하지만, 오히려 췌장이 완전히 지치기 전에 일찍 복용해서 췌장 기능을 지켜주는 방어막 역할을 해준다고 생각하시면 좋습니다. 만약 약 복용 초기에 아이가 배가 아프다고 하면, 약을 식사 직후나 식사 중간에 복용하게 해주세요. 그러면 위장 자극을 훨씬 줄여줄 수 있습니다. 췌장이 스스로 회복할 시간을 벌어주는 이 소중한 지팡이를 잘 활용해서, 아이의 대사 건강을 다시 정상으로 돌려놓읍시다.", videoUrl: "https://youtube.com/shorts/yFR1z5aYq48?si=p3VNYmfnDBpKwlbQ" },
    { id: 380, title: "GLP-1 작용제가 뭔가요?", keywords: ["GLP-1", "위고비", "오젬픽"], patterns: ["GLP-1이 뭐예요?", "위고비, 오젬픽 효과는?", "GLP-1 부작용은?"], summary: "• GLP-1 작용제: 식욕 억제 + 혈당 조절 약물", related: [378, 381, 382], category: "insulin", answer: "부모님, 이 약들은 단순히 살을 빼주는 마법의 주사가 아닙니다. 아이가 스스로 식욕을 조절하기 힘든 생물학적인 상태를 보완해 주는 든든한 조력자라고 생각하셔야 합니다. 뇌가 배부르다는 신호를 더 잘 느끼게 해주는 동안, 아이는 배고픔을 참는 고통 없이 건강한 음식을 선택하고 식사량을 조절하는 연습을 할 귀중한 기회를 얻게 됩니다. 다만 주사 부위의 통증이나 메스꺼움, 구토 같은 증상이 나타날 수 있으므로 반드시 전문가의 세밀한 진료와 관찰이 동반되어야 합니다. 약물의 힘을 빌려 체중을 줄이는 동안 아이의 몸이 건강한 식습관을 완전히 익힐 수 있도록 부모님께서 곁에서 꾸준히 응원해 주세요.", videoUrl: "https://youtube.com/shorts/a4oXyUrONLQ?si=1DzoL-Qp8PR-vA4y" },
